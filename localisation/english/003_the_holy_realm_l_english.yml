chaosx.events_log.evolution.type.holy_realm: "§YHoly Realm Evolution§!"
chaosx.events_log.window.event_details.holy_realm: "The Holy Realm begins as a Tibetan-centered mountain refuge, then develops through the Bodhisattva state, Arhat Administration, Buddha Mandate, Divine Sovereignty, and possible Final Silence.\n\nThe system tracks Spiritual Legitimacy, Compassion Drift, Mandala Reach, and Final Silence Pressure as country variables. Events, focuses, and decisions remember restraint, refugee policy, Arhat conduct, diplomacy, coercive force, and final doctrine choices.\n\nFinal Silence is a world-end scenario gated by sovereignty, armed final doctrine, 1945 or later, Chaos Meter above 1000, the Realm having the most factories, strike capability, and world-end settings."
chaosx.events_log.window.evolution_details.holy_realm.title.event_detail: "Holy Realm Stage"
chaosx.events_log.window.evolution_details.holy_realm.title.selected: "Holy Realm Stage"
chaosx.events_log.window.evolution_details.holy_realm.body: "The stage log records the Realm's transition from refuge to Bodhisattva state, Arhat bureaucracy, Buddha Mandate, and final doctrine escalation. Stage values map to the current campaign milestone and the actor is the country carrying the Holy Realm."
