l_english:
chaosx.nr3.1.t: "The Holy Realm"
chaosx.nr3.2.t: "The Figure at the High Monastery"
chaosx.nr3.2.d: "Refugees, monks, deserters, and frightened officials have begun climbing into the high valleys. Their stories differ, but their destination is the same: a monastery that has started issuing shelter seals in the name of a Bodhisattva who refuses a throne but accepts responsibility for suffering.\n\nThe state can treat the mountain refuge as a temporary crisis, or it can let the seal become law."
chaosx.nr3.2.a: "Let the refuge become the Realm."
chaosx.nr3.2.b: "Keep the monasteries outside the state."
chaosx.nr3.3.t: "A Seal from [From.GetName]"
chaosx.nr3.3.d: "[From.GetName] has sent white-clothed clerks through the passes with a simple offer: join the Holy Realm before the lowlands burn too deeply to be saved. The invitation promises cores, protection, and administrative continuity under the Mandala Bureau."
chaosx.nr3.3.a: "Accept the seal."
chaosx.nr3.3.b: "The pass remains ours."
chaosx.nr3.10.t: "The Bodhisattva Accepts the Seal"
chaosx.nr3.10.d: "The Bodhisattva refuses coronation rites, but the refusal itself becomes the constitution. Refuge officials kneel before an empty seat, then rise with authority to feed, shelter, judge, and conscript in the name of mercy."
chaosx.nr3.10.a: "Compassion must govern."
chaosx.nr3.20.t: "The Arhat Administration"
chaosx.nr3.20.d: "The refuge has grown too large for monastery kitchens and emergency ledgers. The Arhats propose a civil service of oath-bound administrators who will decide which villages receive grain, which roads remain open, and which pleas are false attachment."
chaosx.nr3.20.a: "Let the Arhats take office."
chaosx.nr3.20.b: "Give them ledgers, not souls."
chaosx.nr3.30.t: "The Buddha Mandate"
chaosx.nr3.30.d: "The Holy Realm no longer describes itself as a refuge. Its proclamations speak of a mandate to prevent suffering wherever state failure, empire, ideology, or panic keeps the wheel turning. Foreign ministries translate the words as doctrine. The Realm calls them diagnosis."
chaosx.nr3.30.a: "The mandate is given."
chaosx.nr3.40.t: "The Throne Without a Body"
chaosx.nr3.40.d: "The Arhats argue that a Bodhisattva-led state still depends on human hesitation. A state built for final mercy must be sovereign even against the compassion of its servants. The proposal has no crown, only decrees that no one may countersign."
chaosx.nr3.40.a: "Sovereignty must be divine."
chaosx.nr3.40.b: "No doctrine is above refusal."
chaosx.nr3.70.t: "The Final Warning"
chaosx.nr3.70.d: "The Mandala Bureau has completed sealed routes, strike lists, and sermons written for countries that may not survive to read them. The last warning is ready: the Holy Realm can renounce the doctrine, or arm it before the world mistakes restraint for doubt."
chaosx.nr3.70.a: "Arm the final doctrine."
chaosx.nr3.70.b: "Renounce it before the seal hardens."
chaosx.nr3.71.t: "Foreign Offices Study the Mandate"
chaosx.nr3.71.d: "The Holy Realm has announced a Buddha Mandate that reaches beyond the Himalayas. Its language mixes peacekeeping, administration, and a doctrine of rescue that can become occupation without changing vocabulary."
chaosx.nr3.71.a: "Prepare a containment file."
chaosx.nr3.72.t: "Holy Realm Warning"
chaosx.nr3.72.d: "The Holy Realm has entered a stage that can threaten the wider campaign. Its Mandala counters are visible through decisions and event logs. If it arms the final doctrine, every player receives warning before the Final Silence can begin."
chaosx.nr3.72.a: "Understood."
chaosx.nr3.73.t: "Final Silence Begins"
chaosx.nr3.73.d: "The Holy Realm has begun strikes outside its own territory. The world-end scenario is active. Foreign states will be struck in waves, suffer fallout, lose population, and degrade toward wasteland unless the campaign has already ended by other means."
chaosx.nr3.73.a: "The sky has become doctrine."
chaosx.nr3.80.t: "The Final Silence"
chaosx.nr3.80.d: "The final ledger is open. The Realm is sovereign, the final doctrine is armed, the world is past the chaos threshold, and no country commands more factories. Strike capability exists. The settings permit a world-end scenario.\n\n[GetHolyRealmFinalMemory]\n\nThe last order does not name enemies. It names every place where suffering can return."
chaosx.nr3.80.a: "Turn the page."
chaosx.nr3.82.t: "Final Silence Strike Wave"
chaosx.nr3.90.t: "The Ledger Closes"
chaosx.nr3.90.d: "Foreign state categories have collapsed into wasteland under repeated waves. The Mandala Bureau records no victory, no armistice, and no conquered capital. It records silence outside the Realm."
chaosx.nr3.90.a: "The page is blank."
chaosx.news.9.t: "The Holy Realm Forms"
chaosx.news.9.d: "A Tibetan-centered mountain refuge has transformed into the Holy Realm, a Bodhisattva-led state built from monastery seals, refugee ledgers, and emergency authority. Neighboring Himalayan governments have received offers to join the Mandala before the lowlands carry the wider world's violence into the passes."
chaosx.news.9.a: "A refuge becomes a state."
holy_realm_final_memory_arhats_checked: "The Arhats enter the final chamber under constraint, their ledgers marked by earlier investigations."
holy_realm_final_memory_arhats_empowered: "The Arhats enter the final chamber without apology; they have governed every mercy that led here."
holy_realm_final_memory_coercive_force: "The doctrine of coercive pacification has already taught the Realm to call force a form of release."
holy_realm_final_memory_open_refuge_roads: "The first refuge roads remain in the archive, proof that the Realm began by saving those who climbed."
holy_realm_final_memory_default: "The Mandala Bureau presents a clean file: formation, mandate, warning, launch."

