holy_realm_chaos_value_low: "§G[?global.chaos_meter_value|.0]§!"
holy_realm_chaos_value_rising: "§Y[?global.chaos_meter_value|.0]§!"
holy_realm_chaos_value_high: "§O[?global.chaos_meter_value|.0]§!"
holy_realm_chaos_value_final: "§R[?global.chaos_meter_value|.0]§!"
THR_status_value_row_tt: "This is a read-only Mandala Ledger value row. Hover the row description for the full mechanics."
THR_status_spiritual_legitimacy: "§GSpiritual Legitimacy§!: §Y[?spiritual_legitimacy|.0]§!"
THR_status_spiritual_legitimacy_desc: "Spiritual Legitimacy measures whether subjects, refugees, Arhats, and foreign observers believe the Realm is a sincere refuge rather than a warlord state. It rises from peaceful unification, mercy, Bodhisattva missions, successful protection, low scandal pressure, and nonviolent diplomacy. It falls when doctrine fails or the Realm humiliates its own vows. Positive gains are reduced above §Y55§! and reduced again above §Y80§!, so the last points require major milestones instead of routine decisions."
THR_status_compassion_drift: "§OCompassion Drift§!: §Y[?compassion_drift|.0]§!"
THR_status_compassion_drift_desc: "Compassion Drift tracks whether compassion is still a restraint or has become an excuse for control. Negative or low values support mercy, audits, open refuge, de-escalation, and the Vow against Annihilation. High values come from forced vows, harsh Arhats, coercive pacification, border pressure, expansionist administration, and sealed doctrine. Drift changes event text, AI route willingness, Arhat decision tone, expansionist reactions, and harsher doctrine outcomes. Movement toward either extreme slows past §Y70§! and again past §Y90§!, so sustained doctrine choices matter more than repeated small actions."
THR_status_mandala_reach: "§CMandala Reach§!: §Y[?mandala_reach|.0]§!"
THR_status_mandala_reach_desc: "Mandala Reach is the Realm's external religious, diplomatic, administrative, and expansionist reach. It rises from integrated states, protectorates, peace letters, pilgrim routes, accepted submissions, Bodhisattva visits, and major Mandala decisions. It gates diplomacy and expansion decisions, including border integration, northern Indian registers, Chinese registers, peace-letter acceptance modifiers, and late Final Silence preparation requiring at least §Y60§! reach for Ministry-level authorization. Positive gains slow above §Y55§! and again above §Y80§!, so actual regional power is needed for the highest tiers.\n\nCurrent source pattern: [GetHolyRealmMandalaReachSourceLine]"
holy_realm_mandala_reach_source_refuge: "mostly refuge administration, pass roads, and early Bodhisattva missions."
holy_realm_mandala_reach_source_himalayan: "Himalayan consolidation, refuge law, and regional administration."
holy_realm_mandala_reach_source_letters: "foreign peace letters, submission records, border courts, and Mandala diplomacy."
holy_realm_mandala_reach_source_faction: "Mandala of Nations members, relief offices, development missions, and peacekeeping work."
holy_realm_mandala_reach_source_world: "world-register claims, global war goals, and kneeling-province administration."
THR_status_sealed_ledger: "[GetHolyRealmFinalPressureLine]"
THR_status_sealed_ledger_desc: "Final Silence Pressure rises from restricted doctrine readings, nuclear preparation, Divine Sovereignty, coercive doctrine, and the Final Silence side of the doctrine balance. It falls from mercy councils, Bodhisattva vow missions, renunciation, and the Vow against Annihilation. It gates Final Silence preparation focuses at §Y45§!, §Y55§!, §Y65§!, and §Y75§! pressure; gains slow above §Y55§! and again above §Y80§!. The actual launch still requires 80 nukes, sovereignty, 1945 or later, more than 1000 Chaos, factory dominance, strike capability, world-end settings, and Final Silence dominance in the doctrine balance."
holy_realm_mandala_final_pressure_locked: "Final Silence Pressure: §glocked§!"
holy_realm_mandala_final_pressure_veiled: "Final Silence Pressure: §Y[?final_silence_pressure|.0]§!"
holy_realm_mandala_final_pressure_revealed: "Final Silence Pressure: §R[?final_silence_pressure|.0]§!"
holy_realm_mandala_warning_calm: "Final Silence Pressure is quiet. Later doctrine slots remain closed."
holy_realm_mandala_warning_quiet: "Final Silence Pressure has no formal alert. Some doctrine records carry restricted seals."
holy_realm_mandala_warning_open: "Final Silence Pressure is active."
holy_realm_mandala_warning_active: "Final Silence is active."
