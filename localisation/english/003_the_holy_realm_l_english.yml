holy_realm_panel_conquest_borders: "Borders: the Mandala Bureau can pressure border courts."
holy_realm_panel_conquest_northern_india: "Borders: the Northern Indian Register can integrate held Raj-core states by administration."
holy_realm_panel_conquest_eastern: "Borders: the Eastern Mandala can integrate held Chinese-core states after Arhat administration."
holy_realm_panel_conquest_world: "Borders: the world has been asked to kneel, but this remains expansionist doctrine, not Final Silence."
