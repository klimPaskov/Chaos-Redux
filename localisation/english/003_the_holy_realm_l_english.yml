chaosx.news.9.t: "A Mountain Refuge Takes Shape"
chaosx.news.9.d: "Reports from the Himalayan passes describe monks, refugees, and local officials gathering around a new shelter seal. The movement calls itself the Holy Realm and claims its purpose is peace, protection, and the orderly reception of those fleeing the lowlands.\n\nRefugees are reaching safe mountain roads, local fighting has slowed near protected corridors, and foreign observers report unusually calm relief administration. Diplomats cannot yet decide whether they are watching a religious revival, an emergency government, or something in between."
chaosx.news.9.a: "The mountains keep their own records."
chaosx.news.82.t: "The Mandate beyond the Passes"
chaosx.news.82.d: "Foreign delegations visiting the Holy Realm report strict ritual protocol, unusually efficient refugee corridors, and officials who speak of suffering as an administrative category. Nearby states have begun watching the Realm's envoys more carefully, though most reports still describe a government seeking order rather than conquest."
chaosx.news.82.a: "The reports remain cautious."
chaosx.news.83.t: "Rumors from the Sealed Roads"
chaosx.news.83.d: "Unconfirmed intelligence from remote mountain routes describes closed sacred sites, unusual military transport, and periods of radio silence from Holy Realm bureaus. Several diplomats mention a phrase translated as Final Silence, but none can say whether it is a ritual term, a doctrine name, or a mistranslation."
chaosx.news.83.a: "No one agrees on the meaning."
holy_realm_final_memory_arhats_checked: "The Arhats enter the final chamber under constraint, their ledgers marked by earlier investigations."
holy_realm_final_memory_arhats_empowered: "The Arhats enter the final chamber without apology; they have governed every mercy that led here."
holy_realm_final_memory_coercive_force: "The doctrine of coercive pacification has already taught the Realm to call force a form of release."
holy_realm_final_memory_open_refuge_roads: "The first refuge roads remain in the archive, proof that the Realm began by saving those who climbed."
holy_realm_final_memory_closed_roads: "The first closed passes are cited as precedent: a road can be sealed when its mercy has expired."
holy_realm_final_memory_non_return: "The doctrine of non-return has replaced victory, punishment, and warning with one administrative word: release."
holy_realm_final_memory_world_wound: "The final warning chain has marked the world itself as the wound the state was built to close."
holy_realm_final_memory_default: "The Mandala Bureau presents a clean file: formation, mandate, warning, launch."

holy_realm_quiet_envoys_opinion: "Quiet Envoys"
holy_realm_condemned_opinion: "Condemned the Mandate"

holy_realm_mountain_refuge: "Mountain Refuge"
holy_realm_mountain_refuge_desc: "The state is organized around protected valleys, refugee seals, emergency stores, and defended high passes."
holy_realm_bodhisattva_state: "Bodhisattva-Led State"
holy_realm_bodhisattva_state_desc: "The head of state refuses kingship while accepting authority over relief, law, and moral obligation."
holy_realm_bodhisattva_pramudita: "Pramudita Bodhisattva"
holy_realm_bodhisattva_pramudita_desc: "The leader has entered the Joyful Ground. Refuge work becomes easier to justify, the state gains Political Power, and the early Holy Realm feels sincere."
holy_realm_bodhisattva_vimala: "Vimala Bodhisattva"
holy_realm_bodhisattva_vimala_desc: "The leader has entered the Stainless Ground. Civil administration, compliance, and moral authority strengthen as offices are asked to prove their purity."
holy_realm_bodhisattva_acala: "Acala Bodhisattva"
holy_realm_bodhisattva_acala_desc: "The leader has entered the Immovable Ground. The Realm gains stronger mountain defense, special forces capacity, and political discipline."
holy_realm_bodhisattva_dharmamegha: "Dharmamegha Bodhisattva"
holy_realm_bodhisattva_dharmamegha_desc: "The leader has entered the Cloud of Doctrine. At the tenth bhumi the Bodhisattva becomes a major state engine, granting very strong Political Power, research, manpower, organization, and stability bonuses."
holy_realm_arhat_administration: "Arhat Administration"
holy_realm_arhat_administration_desc: "Oath-bound officials administer shelter, registers, factories, and discipline through the Mandala Bureau."
holy_realm_buddha_mandate: "Buddha Mandate"
holy_realm_buddha_mandate_desc: "The Realm claims a duty to prevent suffering beyond its borders, whether through envoys, peacekeepers, or administration."
holy_realm_himalayan_unity: "Himalayan Unity"
holy_realm_himalayan_unity_desc: "Bhutanese, Nepali, and Tibetan routes have entered the same shelter seal. Guides, stores, and local defenders move through the mountain circle with fewer petitions."
holy_realm_outer_pass_guardians: "Guardians of the Outer Passes"
holy_realm_outer_pass_guardians_desc: "The border guard is trained to defend narrow roads, ration altitude supply, and hold the Mandala without triumphal language."
holy_realm_border_quiet: "The Roads Must Be Quiet"
holy_realm_border_quiet_desc: "Outer roads are patrolled as administrative arteries. Travel continues, but every movement receives a seal."
holy_realm_pacification_without_triumph: "Pacification without Triumph"
holy_realm_pacification_without_triumph_desc: "Force is recorded as treatment rather than victory. The army receives tools for limited pacification while the ledgers avoid celebration."
holy_realm_arhat_outer_register: "Outer Valleys Register"
holy_realm_arhat_outer_register_desc: "Arhat registrars classify conquered or integrated valleys by road, vow, storehouse, and petition risk."
holy_realm_mandala_borders: "Mandala Borders"
holy_realm_mandala_borders_desc: "The Mandala Bureau treats nearby courts as pressure points rather than ordinary foreign capitals."
holy_realm_world_border_doctrine: "The World Is a Border"
holy_realm_world_border_doctrine_desc: "Under extreme chaos, every frontier is treated as a wound where doctrine may be applied by force."
holy_realm_peacekeeping_mandate: "Peacekeeping Mandate"
holy_realm_peacekeeping_mandate_desc: "The Realm sends white-flag formations and relief officers where the world cannot stop the wheel by itself."
holy_realm_coercive_pacification: "Coercive Pacification"
holy_realm_coercive_pacification_desc: "Mercy is interpreted as force applied before suffering grows larger."
holy_realm_divine_sovereignty: "Divine Sovereignty"
holy_realm_divine_sovereignty_desc: "The state claims final authority over the use, refusal, and escalation of all doctrine."
holy_realm_final_silence_network: "Final Silence Network"
holy_realm_final_silence_network_desc: "Sealed routes, launch cells, and doctrinal ledgers prepare a world-end branch under strict conditions."
holy_realm_mandala_peace_vow: "Mandala Peace Vow"
holy_realm_mandala_peace_vow_desc: "Members of the Mandala of Nations are bound to refuge, mediation, and defensive aid. The vow blocks offensive war declarations while the country remains inside the faction."
holy_realm_mandala_peace_vow_rule_desc: "Mandala of Nations members are bound by the Peace Vow and cannot declare offensive wars."
holy_realm_vow_against_annihilation_crusade: "Vow against Annihilation Crusade"
holy_realm_vow_against_annihilation_crusade_desc: "The Realm renounces the final doctrine after coming close enough to know its shape. The vow becomes militant: no totalizing state may be allowed to inherit the world-ending temptation."
holy_realm_vow_against_annihilation_faction_name: "Vow against Annihilation"

holy_realm_mandala_category: "Holy Mandala"
holy_realm_mandala_category_desc: "The Mandala records refuge policy, spiritual authority, administrative discipline, foreign missions, integration work, and late doctrine preparation."
holy_realm_mandala_gui_values: "§GSpiritual Legitimacy§!: §Y[?spiritual_legitimacy|.0]§!  §CBodhi§!: §Y[?bodhi_progress|.0]/108§!  §WDhyana§!: §Y[?dhyana_depth|.0]/4§!"
holy_realm_mandala_gui_secondary: "§YTeachings§!: §Y[?teaching_successes|.0]/12§!  §OMeditation Charge§!: §Y[?meditation_charge|.0]§!  §RDefilements§!: §Y[?defilements|.0]§!"
