holy_realm_panel_chaos_calm: "Chaos: the Realm is still understood as a stabilizing refuge."
holy_realm_panel_conquest_quiet: "Borders: the mountain circle is not the center of policy."
holy_realm_panel_conquest_open: "Borders: Bhutan or Nepal remain outside the Mandala; the conquest cleanup focus can record the omission."
holy_realm_panel_conquest_vow: "Borders: the mountain circle has been completed by vow."
holy_realm_panel_conquest_force: "Borders: the mountain circle is being completed by authority."
holy_realm_panel_conquest_letters: "Borders: letters of peace and authority can be sent to eligible neighbors."
holy_realm_panel_conquest_submission: "Borders: a foreign court has entered the Mandala without war."
holy_realm_panel_conquest_refusal: "Borders: a refused letter is recorded in the Mandala ledger."
