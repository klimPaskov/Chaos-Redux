THR_throne_without_body: "The Throne Without a Body"
THR_throne_without_body_desc: "Let doctrine govern beyond any single human hesitation."
THR_doctrine_last_war: "Doctrine of the Last War"
THR_doctrine_last_war_desc: "Define final war as the act that prevents the return of all wars."
THR_reactors_prayer_wheels: "Reactors and Prayer Wheels"
THR_reactors_prayer_wheels_desc: "Bind nuclear and thermonuclear research to the final doctrine."
THR_all_roads_end_silence: "All Roads End in Silence"
THR_all_roads_end_silence_desc: "Arm the final doctrine and send the warning before it becomes action."
THR_no_one_leaves_mandala: "No One Leaves the Mandala"
THR_no_one_leaves_mandala_desc: "Close the moral circle around every road, border, and launch cell."
THR_final_silence: "Final Silence"
