holy_realm_panel_tab_doctrine: "Doctrine"
holy_realm_panel_tab_warnings: "Final Silence Pressure"
holy_realm_panel_tab_refuge_text: "Refuge policy responds to shelters, open roads, registries, exiles, and the second refuge. Peaceful refuge choices can lower Chaos slightly once, raise legitimacy, and keep Final Silence Pressure out of view."
holy_realm_panel_tab_arhats_text: "Arhat power follows the administration stage, vow offices, examinations, inquiries, false-attainment reviews, and silent offices. Restraint lowers drift; sealed records and expanded methods raise it."
holy_realm_panel_tab_diplomacy_text: "Mandala Reach follows quiet envoys, pilgrimage, mediation, peacekeeping, foreign observation, and the optional conquest branch.\n[GetHolyRealmPanelConquestLine]"
holy_realm_panel_tab_doctrine_text: "[GetHolyRealmPanelDoctrineLine]\nEvolutions unlock access to stronger focus paths. Focuses, decisions, and event memories determine whether the Realm remains merciful or hardens into sacred rule."
holy_realm_panel_tab_warnings_text: "[GetHolyRealmWarningLine]\nFinal Silence remains visually quiet until the warning chain, final doctrine, or late-stage conditions make it relevant."
holy_realm_panel_final_warning_button: "Ledger"
holy_realm_panel_final_warning_button_tt: "Open the Final Silence Ledger when the final doctrine, warning chain, or Mandala break makes it relevant."
holy_realm_panel_leader_frame_tt: "Leader stage frame: changes with the current Holy Realm stage, final doctrine state, and Mandala break memory."
holy_realm_ledger_title: "Final Silence Ledger"
holy_realm_ledger_close_tt: "Close the Final Silence Ledger."
holy_realm_ledger_summary_completed: "The Empty Mandala record is complete. Foreign state categories have collapsed into silence."
holy_realm_ledger_summary_interrupted: "The launch network has broken. The Mandala remains fractured, but the world-end sequence is interrupted."
holy_realm_ledger_summary_active: "Final Silence is active. Strike waves, fallout, deaths, and wasteland progression are being resolved in grouped pulses."
holy_realm_ledger_summary_armed: "Final doctrine is armed. Warning events, launch integrity, world-end settings, industry, year, chaos, sovereignty, and strike capability still control authorization."
holy_realm_ledger_summary_locked: "The ledger is sealed. It remains locked until late doctrine and warning conditions make it relevant."
holy_realm_ledger_doctrine_status: "Doctrine: [GetHolyRealmPanelDoctrineLine]"
holy_realm_ledger_weapon_status: "Weapon Stage: [GetHolyRealmFinalMemory]"
holy_realm_ledger_world_status: "World Ledger: wave §Y[?global.holy_realm_final_silence_wave|.0]§!"
holy_realm_ledger_integrity_status: "Launch Network Integrity follows Final Silence Pressure and Mandala break state."
holy_realm_mapicon_protected_tt: "Holy Realm protected boundary: the state is inside the Realm's protected Mandala and is excluded from Final Silence strike waves."
holy_realm_mapicon_marked_tt: "Marked state: the final ledger has entered this state into the warning register, but strike waves have not yet resolved here."
holy_realm_mapicon_struck_tt: "Struck state: a Final Silence wave has reached this state."
holy_realm_mapicon_burning_tt: "Burning state: fallout and air degradation are active after a Final Silence strike."
holy_realm_mapicon_wasteland_tt: "Wasteland state: repeated Final Silence effects have degraded the state category."
holy_realm_mapicon_silent_tt: "Silent state: the Empty Mandala completion state has recorded this state as resolved by Final Silence."
holy_realm_mapicon_mandala_broken_tt: "Mandala Break state: the Holy Realm's final network has fractured here after interruption."
holy_realm_mapicon_foreign_containment_tt: "Foreign containment state: this country has prepared containment measures against late Holy Realm escalation."
holy_realm_mapicon_evacuation_tt: "Evacuation state: emergency evacuation policy was chosen during the Final Silence warning chain."
holy_realm_mapicon_launch_network_tt: "Launch network disruption state: this country has committed assets to disrupt the Final Silence network."
holy_realm_foreign_response_category: "Holy Realm Containment"
holy_realm_foreign_response_category_desc: "Foreign observation and response tools become urgent only after sealed Holy Realm warnings or active world-end behavior."
holy_realm_expansion_category: "Letters of Peace and Authority"
holy_realm_expansion_category_desc: "Expansionist Mandala tools. The Realm sends formal letters to eligible border states, records acceptance or refusal, prepares forced integration only after refusal, and cores submitted or administered territory through staged decisions."
holy_realm_doctrine_balance_category: "Vow and Final Silence"
holy_realm_doctrine_balance_category_desc: "The doctrine balance decides whether late Holy Realm politics bends toward §Gthe Vow against Annihilation§! or §RFinal Silence§!. Decisions here cost Political Power and move the balance directly. If Final Silence influence dominates, Final Silence Pressure ticks upward each day; if the Vow dominates, pressure slowly falls."
holy_realm_final_doctrine_balance: "Vow and Final Silence"
holy_realm_vow_against_annihilation_side: "Vow against Annihilation"
holy_realm_final_silence_side: "Final Silence"
holy_realm_balance_middle_path_range: "Unsettled Doctrine"
holy_realm_vow_influence_range: "Vow Influence"
holy_realm_vow_dominant_range: "Vow Dominant"
holy_realm_final_silence_influence_range: "Final Silence Influence"
holy_realm_final_silence_dominant_range: "Final Silence Dominant"
holy_realm_balance_middle_path_range_tt: "Doctrine is contested. The Realm receives modest stability and Political Power while neither annihilation nor renunciation dominates."
holy_realm_vow_influence_range_tt: "The Vow is shaping policy. Final Silence Pressure falls slowly each day and offensive war becomes politically costly."
holy_realm_vow_dominant_range_tt: "The Vow dominates late doctrine. Final Silence Pressure and Compassion Drift fall daily; defensive strength and civilian confidence rise."
holy_realm_final_silence_influence_range_tt: "Final Silence Pressure is shaping policy. Pressure and Compassion Drift rise slowly each day, and nuclear production improves."
holy_realm_final_silence_dominant_range_tt: "Final Silence dominates late doctrine. Final Silence Pressure and Compassion Drift rise daily, nuclear preparation accelerates, and the darkest final focuses become available."
THR_bop_public_vow_of_non_annihilation: "Public Vow of Non-Annihilation"
THR_bop_public_vow_of_non_annihilation_desc: "Spend Political Power to move the doctrine balance toward the Vow, lower Final Silence Pressure, lower Compassion Drift, and raise Spiritual Legitimacy. This is the basic political action for keeping the late Realm from Final Silence."
THR_bop_mercy_council: "Convene a Mercy Council"
THR_bop_mercy_council_desc: "Spend Political Power to give mercy doctrine institutional weight. Moves the balance toward the Vow, lowers Final Silence Pressure, raises Spiritual Legitimacy, and lowers Chaos once."
THR_bop_send_bodhisattva_to_council: "Send the Bodhisattva to Council"
THR_bop_send_bodhisattva_to_council_desc: "Requires the Bodhisattva to have progressed beyond the first bhumis. Advances the bhumi system, strengthens the leader trait, moves the doctrine balance toward the Vow, and lowers Final Silence Pressure."
THR_bop_read_sealed_ledger: "Review Final Silence Pressure"
THR_bop_read_sealed_ledger_desc: "Spend Political Power to let final doctrine clerks review restricted pressure registers. Moves the balance toward Final Silence and raises Final Silence Pressure."
THR_bop_seal_launch_ledgers: "Seal the Launch Ledgers"
THR_bop_seal_launch_ledgers_desc: "Requires meaningful Final Silence Pressure. Moves the balance toward Final Silence, raises pressure and Compassion Drift, and increases Chaos."
THR_bop_expand_silence_cells: "Expand Silence Cells"
THR_bop_expand_silence_cells_desc: "Requires Final Silence path access, 55 Final Silence Pressure, and Mandala Reach above 50. Moves the balance strongly toward Final Silence and grants Political Power and Command Power for late preparation."
THR_bop_white_mandala_oath: "White Mandala Oath"
THR_bop_white_mandala_oath_desc: "A late oath for pulling the Realm back before the final doctrine is armed. It moves the balance sharply toward the Vow, lowers Final Silence Pressure and Compassion Drift, and restores stability."
THR_bop_empty_mandala_session: "Empty Mandala Session"
THR_bop_empty_mandala_session_desc: "A late Final Silence session. Requires pressure above 70 and a doctrine balance already leaning toward Final Silence. It moves the balance sharply toward Final Silence and raises both Final Silence Pressure and Compassion Drift."
THR_bop_lamp_processions: "Lamp Processions"
THR_bop_lamp_processions_desc: "Hold public vows and temple processions to pull doctrine toward the Vow, reduce Final Silence Pressure, raise Spiritual Legitimacy, and slightly improve stability."
THR_bop_open_lotus_audit: "Open the Lotus Audit"
THR_bop_open_lotus_audit_desc: "Review sealed administrative ledgers under mercy doctrine. Requires some Final Silence Pressure, moves the balance toward the Vow, and lowers pressure."
THR_bop_reconcile_outer_monasteries: "Reconcile Outer Monasteries"
THR_bop_reconcile_outer_monasteries_desc: "Use the outer monastery network to steady Mandala administration. Requires Mandala Reach, moves doctrine toward the Vow, improves reach, lowers Compassion Drift, and reduces Chaos."
THR_bop_release_sealed_names: "Release Sealed Names"
THR_bop_release_sealed_names_desc: "Publish restricted memorial registers before final doctrine is armed. Requires Final Silence Pressure, moves doctrine strongly toward the Vow, lowers pressure, and raises Spiritual Legitimacy."
THR_bop_black_ledger_drills: "Black Ledger Drills"
THR_bop_black_ledger_drills_desc: "Run restricted command drills for the sealed ledger offices. Moves doctrine toward Final Silence, raises pressure, and grants Command Power."
THR_bop_silent_transit_codes: "Silent Transit Codes"
THR_bop_silent_transit_codes_desc: "Prepare quiet movement codes for doctrine offices. Requires Mandala Reach, moves doctrine toward Final Silence, raises pressure and reach, and improves war support."
THR_bop_nuclear_sutra_committee: "Nuclear Sutra Committee"
THR_bop_nuclear_sutra_committee_desc: "Bind technical doctrine offices to the final ledger. Requires Final Silence Pressure, moves doctrine strongly toward Final Silence, raises pressure, grants Command Power, and increases Chaos."
THR_bop_last_pass_watch: "Last-Pass Watch"
THR_bop_last_pass_watch_desc: "Assign vow-keepers to final doctrine checkpoints. Requires Spiritual Legitimacy, moves doctrine toward the Vow, lowers pressure, and steadies internal command."
THR_bop_guarded_silence_clause: "Guarded Silence Clause"
THR_bop_guarded_silence_clause_desc: "Record a limited last-resort clause inside early doctrine. Moves the balance slightly toward Final Silence, raises Final Silence Pressure, and increases Compassion Drift."
THR_bop_last_resort_register: "Last-Resort Register"
THR_bop_last_resort_register_desc: "Open a narrow register for emergency doctrine without arming the final path. Requires some chaos pressure, Mandala Reach, or Compassion Drift. Moves the balance slightly toward Final Silence, raises pressure, and grants Command Power."
THR_repair_high_pass_storehouses: "Repair High-Pass Storehouses"
THR_repair_high_pass_storehouses_desc: "Commit officials and labor to pass roads, storehouses, and shelter routes. Improves a controlled state, raises Spiritual Legitimacy, and extends Mandala Reach."
THR_white_scarf_relief_caravans: "White-Scarf Relief Caravans"
THR_white_scarf_relief_caravans_desc: "Send guarded relief caravans through war pressure and high-chaos conditions. The route can repair one strained controlled state, then needs time before another relief stage can be organized."
THR_mandala_ledger_scribes: "Mandala Ledger Scribes"
THR_mandala_ledger_scribes_desc: "Assign trained scribes to the civil register. Grants Political Power, improves Mandala Reach, and slightly increases Compassion Drift as administration tightens."
THR_snow_line_signal_posts: "Snow-Line Signal Posts"
THR_snow_line_signal_posts_desc: "Build high-altitude signal posts and defensive watches. Grants Command Power, adds local air defense, and extends Mandala Reach."
THR_second_refuge_register: "Second Refuge Register"
THR_second_refuge_register_desc: "Open a second register for protected families and displaced workers. Requires Spiritual Legitimacy, adds manpower, raises legitimacy, and reduces Compassion Drift."
THR_arhat_road_audit: "Arhat Road Audit"
THR_arhat_road_audit_desc: "Send Arhat auditors through outer roads and registered provinces. Improves compliance control in non-core holdings, grants Command Power, raises Mandala Reach, and increases Compassion Drift."
THR_mandala_border_courts: "Mandala Border Courts"
THR_mandala_border_courts_desc: "Open formal border courts for disputes, petitions, and foreign envoys. Requires high Mandala Reach, improves foreign opinion, grants Political Power, and expands Mandala Reach."
THR_bop_arhat_case_files: "Open Arhat Case Files"
THR_bop_arhat_case_files_desc: "Let Arhat offices organize difficult internal cases under sealed procedure. Moves doctrine toward Final Silence, increases Compassion Drift, and grants Command Power."
THR_bop_border_silence_offices: "Border Silence Offices"
THR_bop_border_silence_offices_desc: "Create quiet offices for border emergencies and doctrinal containment. Requires Buddha Mandate and Mandala Reach, moves doctrine toward Final Silence, raises pressure and reach, and improves war support."
THR_bop_forceful_mercy_precedent: "Forceful Mercy Precedent"
THR_bop_forceful_mercy_precedent_desc: "Record coercive action as a lawful extension of mercy during severe chaos. Moves doctrine toward Final Silence, raises pressure and Compassion Drift, and increases Chaos."
THR_bodhisattva_mission_refuge_circuit: "Bodhisattva Mission: Refuge Circuit"
THR_bodhisattva_mission_refuge_circuit_desc: "Send the Bodhisattva through refugee roads and high-valley shelters. Advances the bhumi, strengthens the leader trait, raises Spiritual Legitimacy, lowers Final Silence Pressure, and lowers Chaos once."
THR_bodhisattva_mission_white_scarf_envoys: "Bodhisattva Mission: White-Scarf Envoys"
THR_bodhisattva_mission_white_scarf_envoys_desc: "Send the Bodhisattva with quiet envoys. Advances the bhumi, strengthens the leader trait, raises Mandala Reach, lowers Compassion Drift, and improves foreign opinion."
THR_bodhisattva_mission_wounded_border: "Bodhisattva Mission: Wounded Border"
THR_bodhisattva_mission_wounded_border_desc: "Send the Bodhisattva to a tense border. Advances the bhumi and raises Mandala Reach. If doctrine leans toward Final Silence, Compassion Drift rises; otherwise the mission lowers Final Silence Pressure."
THR_focus: "Holy Realm Focus Tree"
THR_open_refuge_roads: "Open Refuge Roads"
THR_open_refuge_roads_desc: "Let more refugees enter the high valleys and bind them to the shelter seal. The first major opening of the roads slightly lowers global chaos."
THR_register_refugee_lineages: "Register Refugee Lineages"
THR_register_refugee_lineages_desc: "Convert refugee memory into administrative reach. The first full registry slightly lowers global chaos by calming the camps."
THR_close_refuge_roads: "Close Refuge Roads"
THR_close_refuge_roads_desc: "Shut the high passes before the camps become a second country."
THR_mandala_open_refuge_corridors: "Open Mandala Refuge Corridors"
THR_mandala_open_refuge_corridors_desc: "Coordinate faction refugee corridors. This act of kindness strengthens the Mandala of Nations and lowers global chaos."
THR_mandala_white_flag_congress: "White-Flag Congress"
THR_mandala_white_flag_congress_desc: "Convene a congress of members while the Realm is at peace. The act records peace as a faction duty and lowers global chaos."
THR_mandala_open_granaries: "Open the Faction Granaries"
THR_mandala_open_granaries_desc: "Open stores across the Mandala of Nations for relief and road repair. Faction members in Africa, South America, and Asia can receive local recovery work where roads, war pressure, or rural conditions make the aid useful."
THR_mandala_arbitration_letters: "Letters Carried Past the Guns"
THR_mandala_arbitration_letters_desc: "Target a country at war and ask both sides to accept Mandala arbitration. A white peace is signed only if the first side and one active enemy both accept."
THR_mandala_observer_mission: "Mandala Observer Mission"
THR_mandala_observer_mission_desc: "Send white-flag observers to a country at war. The mission builds diplomatic reach, improves relations, and creates a cooldown before the same target can host another observer mission."
THR_mandala_development_mission: "Mandala Development Mission"
THR_mandala_development_mission_desc: "Send wells, clinics, road crews, and storehouse officers to a poor or war-torn African, South American, or Asian state. The target receives real local recovery work and a cooldown."
THR_assign_arhat_overseers: "Assign Arhat Overseers"
THR_assign_arhat_overseers_desc: "Send oath-bound administrators to settle petitions, ration stores, reduce resistance in non-core administered territory, and expand Mandala Reach at the cost of Compassion Drift."
THR_assign_arhat_to_province: "Assign Arhat to a Province"
THR_assign_arhat_to_province_desc: "Let an Arhat rebuild one controlled state with roads, civil industry, and local register work. Non-core states receive compliance and lower resistance."
THR_assign_arhat_to_army: "Assign Arhat to the Army"
THR_assign_arhat_to_army_desc: "Attach vow-keepers to the regiments guarding the passes and raise a new group of elite Vow-Keeper Mountaineers."
THR_hold_dharma_teaching: "Hold Dharma Teaching"
THR_hold_dharma_teaching_desc: "Teach one ground of the Bodhisattva path to the state. Each teaching has gameplay impact: it can advance the Bodhisattva bhumi, strengthen the leader trait, alter Mandala values, shift the doctrine balance, spawn units, reduce Chaos, or raise Final Silence Pressure depending on the chosen interpretation."
THR_question_false_attainment: "Question False Attainment"
THR_question_false_attainment_desc: "Investigate whether an Arhat office has mistaken silence for peace."
THR_investigate_arhat_abuses: "Investigate Arhat Abuses"
THR_investigate_arhat_abuses_desc: "Discipline officials whose detachment has become cruelty. The first investigation slightly lowers global chaos."
THR_send_quiet_envoys: "Send Quiet Envoys"
THR_send_quiet_envoys_desc: "Approach foreign governments through relief, pilgrimage, and private warning."
THR_offer_mediation_to_war_torn_state: "Offer Mediation to a War-Torn State"
THR_offer_mediation_to_war_torn_state_desc: "Send envoys to governments that cannot end their wars. The first mediation effort slightly lowers global chaos."
THR_stand_between_armies: "Stand Between Armies"
THR_stand_between_armies_desc: "Send one limited Mandala Peacekeeping Brigade to an eligible minor democratic defender. Requires manpower, infantry equipment, and support equipment; the recipient cannot receive another brigade for a year."
THR_demand_pacification_settlement: "Demand a Pacification Settlement"
THR_demand_pacification_settlement_desc: "Tell a belligerent state that the Realm can place peace under administration."
THR_audit_foreign_target_ledgers: "Audit Foreign Target Ledgers"
THR_audit_foreign_target_ledgers_desc: "Convert foreign casualty reports, refusal records, and strategic files into sealed final ledgers."
THR_prepare_realm_shelters_for_nonreturn: "Prepare Shelters of Nonreturn"
THR_prepare_realm_shelters_for_nonreturn_desc: "Harden a protected Realm state for the doctrine of nonreturn."
THR_send_global_final_warning: "Send a Final Warning"
THR_send_global_final_warning_desc: "Send one formal warning to a foreign government. Each target can receive this warning only once."
THR_secure_outer_pass_roads: "Secure Outer Pass Roads"
THR_secure_outer_pass_roads_desc: "Turn border roads into protected administrative routes. The decision strengthens the conquest branch without opening Final Silence pressure."
THR_register_outer_valleys: "Register the Outer Valleys"
THR_register_outer_valleys_desc: "Send Arhat registrars through held valleys to reduce resistance, raise compliance, and bind the roads to the Mandala."
THR_pressure_border_courts: "Pressure Border Courts"
THR_pressure_border_courts_desc: "Use Mandala Reach to pressure neighboring courts. This raises control, suspicion, and a small amount of chaos."
THR_choose_restraint_doctrine: "Doctrine of Restraint"
THR_choose_restraint_doctrine_desc: "Keep the Mandate inside the limits of refusal."
THR_choose_peacekeeping_doctrine: "Doctrine of Peacekeeping"
THR_choose_peacekeeping_doctrine_desc: "Use the Mandate to send protectors rather than conquerors."
THR_choose_coercive_pacification: "Doctrine of Coercive Pacification"
THR_choose_coercive_pacification_desc: "Accept force as preventive mercy. This raises global chaos."
THR_renounce_final_silence: "Renounce the Sealed Doctrine"
THR_renounce_final_silence_desc: "Close the sealed doctrine before the state forgets how to refuse it. The first renunciation significantly lowers global chaos."
THR_arm_final_silence: "Arm the Final Doctrine"
THR_arm_final_silence_desc: "Prepare the warning chain and final strike network."
THR_launch_final_silence: "Begin Final Silence"
THR_launch_final_silence_desc: "Enter Final Silence after Buddhahood, the last doctrine, an anti-chaos power display, and the Extinction of Defilements rite. Chaos above 1000 turns the route terminal if world-end rules allow it; otherwise the Empty Seat remains."
THR_send_peace_letter: "Send a Letter of Peace"
THR_send_peace_letter_desc: "Send a formal offer to an eligible neighboring country. Acceptance is rare; major powers and faction members cannot accept."
THR_prepare_forced_integration: "Prepare Forced Integration"
THR_prepare_forced_integration_desc: "Record a refused letter as authority for war. This grants a war goal without starting the war automatically."
THR_administer_submitted_territory: "Administer Submitted Territory"
THR_administer_submitted_territory_desc: "Send Arhat registrars through peacefully submitted or already registered states to raise compliance and reduce resistance."
THR_integrate_himalayan_mandala_state: "Integrate a Himalayan Mandala State"
THR_integrate_himalayan_mandala_state_desc: "Core a held Himalayan or peacefully submitted state after Mandala administration."
THR_mandate_kneeling_province: "Mandate the Kneeling Province"
THR_mandate_kneeling_province_desc: "Integrate an owned and controlled province claimed through The World Is Asked to Kneel without adding it to the normal Mandala core pools."
THR_integrate_northern_indian_register_state: "Core a Northern Indian Register State"
THR_integrate_northern_indian_register_state_desc: "Core a held Raj-core state after the Northern Indian Register, sufficient Mandala Reach, and Arhat administration."
THR_integrate_eastern_mandala_state: "Core an Eastern Mandala State"
THR_integrate_eastern_mandala_state_desc: "Core a held Chinese-core state after the Eastern Mandala, high Mandala Reach, and Arhat administration."
THR_condemn_buddha_mandate: "Condemn the Buddha Mandate"
THR_condemn_buddha_mandate_desc: "Publicly reject the Realm's right to administer foreign suffering."
THR_build_mountain_containment: "Prepare Mountain Containment"
THR_build_mountain_containment_desc: "Prepare borders, intelligence files, and coalition channels for a Holy Realm crisis."
THR_disrupt_final_silence_network: "Disrupt the Final Network"
THR_disrupt_final_silence_network_desc: "Pressure the final doctrine network before it launches."

THR_mountain_refuge: "Mountain Refuge"
THR_mountain_refuge_desc: "Turn the high valleys into a defensible refuge with roads, stores, and legal shelter seals."
THR_shelter_border_villages: "Shelter the Border Villages"
THR_shelter_border_villages_desc: "Accept the villages nearest the passes into the refuge system."
THR_guard_high_passes: "Guard the High Passes"
THR_guard_high_passes_desc: "Fortify the approaches before the lowlands push their wars upward."
THR_bodhisattva_accepts_seal: "The Bodhisattva Accepts the Seal"
THR_bodhisattva_accepts_seal_desc: "Transform the refuge into a Bodhisattva-led state."
THR_first_doctrine_suffering: "The First Doctrine of Suffering"
THR_first_doctrine_suffering_desc: "Make relief, judgement, and policy answer to the language of suffering."
THR_rewrite_civil_register: "Rewrite the Civil Register"
THR_rewrite_civil_register_desc: "Replace emergency lists with a state register of villages, households, vows, and duties. Non-core administered lands receive compliance and lower resistance; core lands receive infrastructure and civil industry instead."
THR_mandala_bureau: "The Mandala Bureau"
THR_mandala_bureau_desc: "Build the administrative center that turns refuge work into state capacity."
THR_arhat_examinations: "Arhat Examinations"
THR_arhat_examinations_desc: "Select officials who claim detachment from fear, faction, and personal gain."
THR_arhats_take_office: "The Arhats Take Office"
THR_arhats_take_office_desc: "Create the Arhat Administration and let its ledgers govern the Realm."
THR_labs_snow_line: "Laboratories at the Snow Line"
THR_labs_snow_line_desc: "Tie high-altitude research to the doctrine of prevention. The snow-line laboratories add three research slots and a large nuclear research program."
THR_refuge_foundries: "Refuge Foundries"
THR_refuge_foundries_desc: "Arm the passes without admitting that the refuge has become a fortress. Every controlled state receives new military and civilian industry."
THR_vow_keeper_regiments: "Vow-Keeper Regiments"
THR_vow_keeper_regiments_desc: "Organize troops whose oaths bind them to protection before conquest. The focus creates an elite Vow-Keeper Mountaineer template, spawns six equipped mountain divisions, and adds major manpower, army experience, and doctrine discounts."
THR_quiet_envoys: "Quiet Envoys"
THR_quiet_envoys_desc: "Send letters and relief missions before the mandate becomes an ultimatum."
THR_buddha_mandate: "The Unshaken Seat"
THR_buddha_mandate_desc: "Prepare the seat beneath which the Bodhisattva may become Buddha. Buddhahood requires Bodhi at 108, the fourth Dhyana, low Defilements, twelve successful teaching missions, and at least one teaching success during a major chaos crisis."
THR_lamps_remain_lit: "The Lamps Remain Lit"
THR_lamps_remain_lit_desc: "Choose restraint while ordinary peace still feels possible. If global chaos rises too far, this exact hopeful path passes out of reach."
THR_white_flags_foreign_roads: "White Flags on Foreign Roads"
THR_white_flags_foreign_roads_desc: "Send peacekeepers and relief columns where state failure keeps the wheel turning."
THR_vow_against_annihilation: "Vow Against Annihilation"
THR_vow_against_annihilation_desc: "Bind the Mandate against world-ending doctrine."
THR_pacification_mandate: "Pacification Mandate"
THR_pacification_mandate_desc: "Treat force as the sharp instrument of mercy."
THR_release_through_administration: "Release Through Administration"
THR_release_through_administration_desc: "Pacify territory through registers, relief, and imposed order rather than celebration."
THR_throne_without_body: "The Throne Without a Body"
THR_throne_without_body_desc: "Let doctrine govern beyond any single human hesitation."
THR_doctrine_last_war: "The Last Doctrine"
THR_doctrine_last_war_desc: "Open the sealed doctrine path without authorizing its final use."
THR_reactors_prayer_wheels: "Reactors and Prayer Wheels"
THR_reactors_prayer_wheels_desc: "Bind nuclear and thermonuclear research to the final doctrine. The focus builds reactors and a nuclear facility, then grants major nuclear research bonuses. The arsenal must still be produced."
THR_all_roads_end_silence: "Seal the Remote Roads"
THR_all_roads_end_silence_desc: "Survey sacred roads, close remote sites, and let foreign observers guess at the purpose."
THR_no_one_leaves_mandala: "No One Leaves the Mandala"
THR_no_one_leaves_mandala_desc: "Close the moral circle around every road, border, and launch cell. The Realm expands its reactor network, receives nuclear research acceleration, and raises Final Silence Pressure."
THR_final_silence: "The Last Authorization"
THR_final_silence_desc: "Authorize the sealed doctrine only if every strict final condition has been met."
THR_convene_mountain_assembly: "Convene Mountain Assembly"
THR_convene_mountain_assembly_desc: "Give the refuge a chamber before the chamber becomes a ministry. The assembly unlocks Dharma Teaching decisions, advances the Bodhisattva bhumi, grants major Political Power, and slightly reduces Chaos."
THR_seal_of_refuge: "The Seal of Refuge"
THR_seal_of_refuge_desc: "Turn shelter seals into state law. Protected communities provide manpower, stability, infrastructure, civil industry, Spiritual Legitimacy, Mandala Reach, and a small Chaos reduction."
THR_ministry_of_vows: "Ministry of Vows"
THR_ministry_of_vows_desc: "Centralize vows, registers, and duties under a single office."
THR_silent_offices: "Silent Offices"
THR_silent_offices_desc: "Build offices that process petitions without political theatre."
THR_village_without_petitions: "A Village without Petitions"
THR_village_without_petitions_desc: "Review the first district where silence may mean peace or fear."
THR_question_false_attainment_focus: "The Question of False Attainment"
THR_question_false_attainment_focus_desc: "Test whether Arhat office has become a credential instead of a burden."
THR_count_mountain_roads: "Count Mountain Roads"
THR_count_mountain_roads_desc: "Record every road that can carry grain, pilgrims, troops, or refugees. Every controlled state receives major infrastructure and a listening post, and the Realm gains Political Power and Mandala Reach."
THR_monastic_labor_vows: "Monastic Labor Vows"
THR_monastic_labor_vows_desc: "Bind construction and relief work to monastic labor vows."
THR_shelters_under_stone: "Shelters under Stone"
THR_shelters_under_stone_desc: "Prepare the valleys for bombardment and winter."
THR_quiet_mobilization: "Quiet Mobilization"
THR_quiet_mobilization_desc: "Mobilize without parades or public triumph."
THR_mountain_artillery_mandalas: "Mountain Artillery Mandalas"
THR_mountain_artillery_mandalas_desc: "Place artillery where the passes force the world into narrow lines."
THR_permit_foreign_pilgrimage: "Permit Foreign Pilgrimage"
THR_permit_foreign_pilgrimage_desc: "Let foreign witnesses enter the Realm under vow and register."
THR_letters_to_war_tired: "Letters to the War-Tired"
THR_letters_to_war_tired_desc: "Write to governments whose people have forgotten why the war continues."
THR_shelter_exiles: "Shelter the Exiles"
THR_shelter_exiles_desc: "Give foreign exiles a legal place beneath the seal. Exile communities provide manpower, civil construction in every controlled state, Political Power, Spiritual Legitimacy, and a small Chaos reduction."
THR_mandala_of_nations: "Mandala of Nations"
THR_mandala_of_nations_desc: "Offer a coalition of refusal, mediation, and witnessed peace. Members take a peace vow, cannot declare offensive wars, and pursue acts of kindness that lower global chaos."
THR_refusal_of_empires: "Refusal of Empires"
THR_refusal_of_empires_desc: "Reject imperial claims over suffering outside the mountains."
THR_no_victory_parades: "No Victory Parades"
THR_no_victory_parades_desc: "Pacification cannot be permitted to become conquest in ceremonial dress. The Realm gains political power and command authority while lowering Final Silence Pressure and chaos."
THR_last_border_is_wound: "The Last Border Is a Wound"
THR_last_border_is_wound_desc: "Treat every uncontrolled frontier as evidence that suffering remains unadministered. The Realm gains political power, war support, Final Silence Pressure, and coercive chaos."
THR_last_human_signature: "The Last Human Signature"
THR_last_human_signature_desc: "Remove the final personal countersignature from doctrine."
THR_sermon_without_translation: "A Sermon without Translation"
THR_sermon_without_translation_desc: "Issue doctrine that foreign ministries cannot render into normal state language."
THR_compassion_of_non_return: "Compassion of Non-Return"
THR_compassion_of_non_return_desc: "Define mercy as the prevention of every possible return."
THR_ministry_of_release: "Ministry of Silence"
THR_ministry_of_release_desc: "Give the final doctrine an office and force the authorization chamber to decide whether it can still be refused. The ministry expands nuclear facilities, prepares a limited thermonuclear payload set if the technology exists, and opens the authorization event."
THR_refuse_final_debate: "Refuse Final Debate"
THR_refuse_final_debate_desc: "Refuse to let apocalypse become a legitimate subject of policy."
THR_peace_without_ownership: "Peace without Ownership"
THR_peace_without_ownership_desc: "Keep peacekeeping separate from possession."
THR_world_still_burns: "The World Still Burns"
THR_world_still_burns_desc: "Continue aid and mediation without claiming the world can be solved."
THR_second_refuge: "The Second Refuge"
THR_second_refuge_desc: "Turn renunciation into a new shelter system for those fleeing the wider collapse."
THR_lamps_entered_register: "The Lamps Are Entered into the Register"
THR_lamps_entered_register_desc: "The lamps remain, but they are counted, assigned, and watched by clerks who no longer trust ordinary mercy to survive the world."
THR_seal_roads_from_panic: "Seal the Roads from Panic"
THR_seal_roads_from_panic_desc: "Keep the roads open only where the registers can protect them from panic, armies, and uncontrolled flight."
THR_no_more_peace_delegations: "No More Peace Delegations"
THR_no_more_peace_delegations_desc: "Foreign envoys may still arrive, but the Realm no longer accepts ordinary pleas as policy."
THR_sort_worthy_broken: "Sort the Worthy from the Broken"
THR_sort_worthy_broken_desc: "The refugee lines continue, but the Arhats begin separating useful labor, protected families, and cases the Realm says cannot be saved by open shelter alone."
THR_world_marked_as_wound_focus: "The World Is Marked as a Wound"
THR_world_marked_as_wound_focus_desc: "Foreign capitals are not named as enemies. They are entered as symptoms in the same register that once counted refugees. The focus raises Mandala Reach and Final Silence Pressure, updates world-threat state, and fires a late doctrine teaching event."
THR_complete_himalayan_mandala: "Complete the Himalayan Mandala"
THR_complete_himalayan_mandala_desc: "Some courts beyond the passes did not enter the Mandala when invited. The Realm records the omission without anger. If the mountain circle cannot be completed by vow, it can still be completed by authority."
THR_guardians_outer_passes: "Guardians of the Outer Passes"
THR_guardians_outer_passes_desc: "Train the border guard to hold narrow roads, carry winter supply, and defend the shelter seal beyond the first valleys. Every controlled state receives forts and infrastructure, while the Realm gains Political Power, Command Power, army experience, and Mandala Reach."
THR_letters_beyond_passes: "Letters beyond the Passes"
THR_letters_beyond_passes_desc: "Open the separate expansionist Mandala tree. The Realm sends peaceful formal demands to nearby courts, records refusal without rage, and keeps force as the next entry in the ledger."
THR_mandala_receives_borderlands: "The Mandala Receives the Borderlands"
THR_mandala_receives_borderlands_desc: "Expand the letters to nearby borderlands and prepare staged integration for states that enter by vow, occupation, or Arhat administration."
THR_high_pass_states_enter_mandala: "The High Pass States Enter the Mandala"
THR_high_pass_states_enter_mandala_desc: "The first register is local and visible: Tibet, Bhutan, Nepal, and Kham are brought into a single administrative circle when the Realm owns and controls them."
THR_roads_must_be_quiet: "The Roads Must Be Quiet"
THR_roads_must_be_quiet_desc: "Roads that carry grain, refugees, envoys, and patrols must stop carrying rumor. The focus unlocks border-control decisions, adds the Border Quiet idea, and grants Political Power, Command Power, Mandala Reach, and Compassion Drift."
THR_pacification_without_triumph: "Pacification without Triumph"
THR_pacification_without_triumph_desc: "If force is used, it must not become a parade. The focus unlocks pacification tools, adds the Pacification without Triumph idea, grants major Command Power and army experience, and raises Compassion Drift and Chaos."
THR_outer_valleys_register: "The Outer Valleys Register"
THR_outer_valleys_register_desc: "Send Arhat registrars into held valleys to classify vows, petitions, stores, and risks before resistance grows into another war."
THR_mandala_borders: "Mandala Borders"
THR_mandala_borders_desc: "The Mandala Bureau learns to pressure border courts through roads, relief, observation files, and carefully limited claims."
THR_peace_by_submission: "Peace by Submission"
THR_peace_by_submission_desc: "Make the letters more persuasive only when the Realm is clearly stronger. Surrender without war can calm chaos slightly, but coercive authority leaves a record."
THR_northern_indian_register: "The Northern Indian Register"
THR_northern_indian_register_desc: "Prepare claims and Arhat authority for the first northern Indian ledger. The register names the region before it absorbs it."
THR_northern_indian_state_registers: "Northern Indian State Registers"
THR_northern_indian_state_registers_desc: "The northern Indian register is made legal doctrine. The focus adds claims and a direct expansion path; state cores require expensive integration decisions after control is secured."
THR_eastern_mandala: "The Eastern Mandala"
THR_eastern_mandala_desc: "Extend the expansionist Mandala toward western China first. The Realm learns to cross from border pressure into larger registers."
THR_western_chinese_registers: "Western Chinese Registers"
THR_western_chinese_registers_desc: "Sichuan, Qinghai, Gansu, Yunnan, Ningxia, Suiyuan, Shaanbei, and Urumqi are entered into the Mandala as core claims of sacred administration."
THR_eastern_chinese_registers: "Eastern Chinese Registers"
THR_eastern_chinese_registers_desc: "Only in extreme disorder does the Realm open registers for the eastern Chinese heartlands. The focus adds claims and direct attack paths while leaving actual coring to expensive integration decisions."
THR_world_is_a_border: "The World Is Asked to Kneel"
THR_world_is_a_border_desc: "Only under extreme chaos does the Realm ask larger frontiers to submit. This is imperial Mandala logic, not the final nuclear doctrine."
THR_low_chaos_focus_tt: "Requires Chaos Meter below §Y250§!. The Realm still believes ordinary peace can be preserved."
THR_peace_chaos_focus_tt: "Requires Chaos Meter below §Y400§!. This path depends on a world where patient diplomacy still has room."
THR_mercy_chaos_focus_tt: "Requires Chaos Meter below §Y600§!. Mercy remains possible, but the window is closing."
THR_mid_chaos_focus_tt: "Requires Chaos Meter above §Y400§!. The Realm will not justify this measure while global chaos remains comparatively restrained."
THR_chaos_tier_focus_tt: "Requires §RChaos Tier§! or worse. At this level the Realm starts turning toward the sealed final doctrine."
THR_high_chaos_focus_tt: "Requires Chaos Meter above §Y600§!. This belongs to the harsher route opened by a violent world."
THR_extreme_chaos_focus_tt: "Requires Chaos Meter above §Y800§!. The Realm must believe the world has passed beyond ordinary repair."
THR_final_launch_chaos_tt: "Final Silence launch requires Chaos Meter above §Y1000§!. Preparations may be completed before this threshold."
THR_final_ritual_ready_tt: "Requires Buddhahood, the armed Final Silence doctrine, an anti-chaos Buddha power display, the Extinction of Defilements rite, a controlled capital, and no active False Buddha Schism."
THR_final_silence_stockpile_required_tt: "Requires at least §Y80§! nuclear weapons produced by the Realm. The 1947 thermonuclear variant also requires thermonuclear doctrine or technology, at least §Y120§! nuclear weapons, and §Y24§! prepared thermonuclear payloads."
THR_final_signature_pressure_tt: "Requires §Y45§! Final Silence Pressure. This can be built before Chaos reaches §Y1000§! through focus rewards, BoP decisions, and late doctrine choices."
THR_final_sermon_pressure_tt: "Requires §Y55§! Final Silence Pressure. The final doctrine must be more than a rumor before this focus can be taken."
THR_final_non_return_pressure_tt: "Requires §Y65§! Final Silence Pressure. The doctrine must be close to irreversible before this focus can be taken."
THR_final_ministry_pressure_tt: "Requires §Y75§! Final Silence Pressure. The Ministry of Silence is a late preparation focus, not the launch condition."
THR_final_ministry_reach_tt: "Requires §Y60§! Mandala Reach. The Realm must have enough diplomatic, administrative, or expansionist reach to build a global final network."
THR_final_bop_leans_final_tt: "Requires the §RFinal Silence§! side to have influence in the Vow and Final Silence Balance of Power."
THR_final_bop_dominant_tt: "Requires §RFinal Silence§! to dominate the Vow and Final Silence Balance of Power."
THR_vow_bop_required_tt: "Requires the doctrine balance to lean toward the §GVow against Annihilation§!. Use Vow and Final Silence decisions to pull doctrine away from Final Silence first."
THR_arm_final_bop_required_tt: "Requires the doctrine balance to lean toward §RFinal Silence§!. Final Silence can be prepared before Chaos reaches §Y1000§!, but the Realm must first choose that doctrine politically."
THR_vow_keeper_mandala_reach_required_tt: "Requires more than §Y18§! Mandala Reach. Large Vow-Keeper formations need a real administrative and territorial base."
THR_complete_himalayan_mandala_available_tt: "Bhutan or Nepal remain outside the Holy Realm, exist as valid targets, and can legally be declared on."
THR_complete_himalayan_mandala_bypass_tt: "The high passes are already unified, integrated, subject-bound, absent, or not legal war targets."
THR_complete_himalayan_mandala_effect_tt: "Grants annexation war goals against valid Bhutanese, Nepali, or Sikkimese targets only. If all entered peacefully, this focus bypasses."
THR_high_pass_states_enter_mandala_effect_tt: "Unlocks high-pass core decisions and directly integrates owned Sikkim if it is already under Realm control. The remaining Himalayan cores come from expensive state decisions."
THR_no_victory_parades_effect_tt: "Adds §Y250§! Political Power, §Y75§! Command Power, stability, lowers Final Silence Pressure, and reduces Chaos slightly."
THR_last_border_is_wound_effect_tt: "Adds §Y300§! Political Power, war support, Final Silence Pressure, and coercive Chaos."
THR_northern_indian_register_effect_tt: "Opens the Northern Indian Register: claims, letters, and integration decisions can target nearby northern Indian states."
THR_northern_indian_state_registers_effect_tt: "Adds claims and a direct expansion path into the Northern Indian Register. Actual cores come from expensive state decisions after control is secured."
THR_eastern_mandala_effect_tt: "Extends expansion pressure toward western China and raises Mandala Reach enough for the Chinese registers to matter."
THR_western_chinese_registers_effect_tt: "Adds claims and direct attack paths for western Chinese register states. Actual cores come from expensive state decisions after control is secured."
THR_eastern_chinese_registers_effect_tt: "Adds claims and direct attack paths for eastern Chinese register states under extreme-chaos expansion doctrine. Actual cores come from expensive state decisions after control is secured."
THR_reactors_prayer_wheels_effect_tt: "Builds nuclear reactors in controlled states, adds a nuclear facility in the capital, and grants a strong nuclear research bonus. The arsenal must still be produced."
THR_no_one_leaves_mandala_effect_tt: "Expands the reactor network, adds nuclear research acceleration, and raises Final Silence Pressure."
THR_ministry_of_release_effect_tt: "Adds the Final Silence Network idea, expands nuclear facilities, prepares §Y24§! thermonuclear payloads if the technology exists, and opens the authorization chamber event."
THR_mandala_bureau_agency_tt: "Creates or expands the Mandala Bureau intelligence agency with cryptology, passive defense, invisible ink, diplomatic training, and radio operations upgrades."
THR_last_human_signature_effect_tt: "Unlocks target-list audit decisions, raises Final Silence Pressure, and moves the doctrine balance toward Final Silence."
THR_sermon_without_translation_effect_tt: "Unlocks once-per-target final warning actions, raises war support, and moves the doctrine balance toward Final Silence."
THR_compassion_of_non_return_effect_tt: "Unlocks internal shelter preparation decisions for Realm states, steadies the country, and marks controlled states for protection work."
THR_convene_mountain_assembly_effect_tt: "Unlocks Dharma Teaching decisions, advances the Bodhisattva bhumi, adds §Y300§! Political Power, §Y50§! Command Power, Spiritual Legitimacy, and a small Chaos reduction."
THR_seal_of_refuge_effect_tt: "Codifies refuge law, marks controlled states as protected, adds manpower, stability, infrastructure, civil industry, Spiritual Legitimacy, Mandala Reach, and a small Chaos reduction."
THR_rewrite_civil_register_effect_tt: "Non-core controlled states receive compliance, lower resistance, and Arhat register flags. Core controlled states receive infrastructure and civil industry instead."
THR_vow_keeper_regiments_effect_tt: "Creates an elite Vow-Keeper Mountaineer template, equips it, and spawns §Y6§! strong mountain divisions in the capital state."
THR_world_marked_as_wound_effect_tt: "Records a late world-wound doctrine memory, raises Mandala Reach and Final Silence Pressure, increases doctrinal Chaos, updates world-threat state, and opens a Dharmamegha teaching event."
THR_conquest_bodhisattva_required_tt: "The Holy Realm must have recognized the Bodhisattva-led state before securing the outer passes."
THR_conquest_refuge_order_required_tt: "Requires the Seal of Refuge, the civil register, or an equivalent administrative memory."
THR_conquest_compassionate_force_required_tt: "Requires the question of compassionate force to be opened through pacification doctrine or release-through-administration."
THR_conquest_arhat_required_tt: "Requires Arhat Administration or its evolution path access."
THR_conquest_mandala_reach_required_tt: "Requires Mandala diplomacy, quiet-envoy memory, or enough Mandala Reach to pressure border courts."
THR_conquest_high_doctrine_required_tt: "Requires the Buddha Mandate, Divine Sovereignty, or coercive pacification doctrine."
THR_labs_snow_line_bonus: "Laboratories at the Snow Line"
THR_vow_keeper_regiments_bonus: "Vow-Keeper Regiments"
THR_final_silence_bonus: "Doctrine of the Last War"

super_event.7.t: "The Buddha Mandate"
super_event.7.q: "That is the safe refuge, that is the best refuge. \n §Y-Dhammapada 192-§!"
super_event.7.a: "Refuge becomes an order."
super_event.7.d: "The Holy Realm has proclaimed the Buddha Mandate. Refuge, administration, and military intervention are being presented as one indivisible duty, carried across borders by envoys, monks, officers, and civil registers.\n\nForeign ministries now face a state that does not describe expansion as conquest. It describes the world as a wound and its own authority as treatment."
super_event.8.t: "Final Silence"
super_event.8.q: "Do not kill, nor cause slaughter. \n §Y-Dhammapada 129-§!"
super_event.8.a: "The register opens."
super_event.8.d: "The Holy Realm has begun the Final Silence under world-end conditions. Launch doctrine, sacred administration, and extinction logic have been merged into a single sequence aimed at every state outside the Realm.\n\nThe strikes will continue unless the system is interrupted. What began as refuge law has become an accounting of who is permitted to remain."
super_event.9.t: "Thermonuclear Final Silence"
super_event.9.q: "Thou seest Me as Time who kills. \n §Y-Bhagavad-Gita, Chapter XI-§!"
super_event.9.a: "The second sun receives its orders."
super_event.9.d: "The Final Silence has begun with thermonuclear doctrine active. Strike waves are stronger, fallout lasts longer, and every non-Realm state is exposed to catastrophic population loss.\n\nThe Realm's language remains devotional, but the material fact is simpler: the sacred state has found a way to make apocalypse repeatable."
super_event.10.t: "The Mandala Breaks"
super_event.10.q: "Victory breeds hatred, for the conquered is unhappy. \n §Y-Dhammapada 201-§!"
super_event.10.a: "The circle fails to close."
super_event.10.d: "Foreign disruption, internal fracture, or broken launch control has interrupted the Final Silence. The immediate world-end sequence has failed, leaving damaged command networks, terrified neighbors, and a doctrine that has not been fully disarmed.\n\nThe danger remains, but the Realm has learned that even a mandala can crack."
super_event.11.t: "Divine Sovereignty"
super_event.11.q: "A man is not just if he carries a matter by violence. \n §Y-Dhammapada 256-§!"
super_event.11.a: "Office and altar share a seal."
super_event.11.d: "The Holy Realm has accepted Divine Sovereignty under mounting crisis. Doctrine, office, and ruler are no longer easy for observers to separate; commands arrive with the language of law, ritual, and personal mandate at once.\n\nForeign courts still debate whether this is centralization, sanctification, or political collapse. Inside the Realm, the distinction is becoming irrelevant."
super_event.51.t: "Mandala of Nations"
super_event.51.q: "Hatred is never appeased by hatred in this world. \n §Y-Dhammapada 5-§!"
super_event.51.a: "The white flags answer each other."
super_event.51.d: "The Holy Realm has opened the Mandala of Nations as an organized international project. Member states bind themselves to refuge law, witnessed mediation, and defensive aid while their offices begin treating relief, diplomacy, and anti-chaos work as a shared mandate.\n\nThe coalition is not asking the world to withdraw from politics. It is building a different machinery for power, one ledger, road, and white flag at a time."

holy_realm_bodhisattva_category: "Bodhisattva Missions"
holy_realm_bodhisattva_category_desc: "The Bodhisattva travels, teaches, visits foreign courts, and quietly spreads the Holy Realm's influence. Stronger missions require Spiritual Legitimacy and Mandala Reach."
holy_realm_buddha_powers_category: "Powers of the Awakened"
holy_realm_buddha_powers_category_desc: "Buddha powers spend Meditation Charge and can only be directed at true chaos enemies: outbreak realms, weaponized zombie countries, revolutionary chaos states, alien or nonhuman chaos polities, and countries explicitly flagged as chaos threats."
holy_realm_last_pass_mobilization: "Last-Pass Mobilization"
holy_realm_last_pass_mobilization_desc: "The Realm formed under immediate threat. Refuge officers, monks, and mountaineer cadres are committed to holding the last roads long enough for the new order to survive."
holy_realm_one_mandala_state: "One Mandala State"
holy_realm_one_mandala_state_desc: "The refuge, Bodhisattva office, Arhat registers, Buddha Mandate, and late sacred state have been folded into one public identity. It is not merely a bureaucracy or doctrine; it is the claim that every road, court, and shelter belongs to a single vow."
holy_realm_mandala_protectorate: "Mandala Protectorate"
holy_realm_mandala_protectorate_DEF: "the Mandala Protectorate"
holy_realm_mandala_protectorate_ADJ: "Mandala"

THR_bodhisattva_refuge_circuit: "Walk the Refuge Circuit"
THR_bodhisattva_refuge_circuit_desc: "Send the Bodhisattva through refugee roads and high-valley shelters. Requires Spiritual Legitimacy, advances the bhumi, lowers Final Silence Pressure, and strengthens the public vow."
THR_bodhisattva_visit_neighboring_country: "Visit a Neighboring Court"
THR_bodhisattva_visit_neighboring_country_desc: "Send the Bodhisattva to a neighboring or unstable country. The visit can improve opinion, leave a recent-visit record, and raise Mandala Reach."
THR_bodhisattva_visit_distant_unstable_country: "Visit a Distant Unstable Country"
THR_bodhisattva_visit_distant_unstable_country_desc: "A costly long-distance mission. Requires higher Spiritual Legitimacy and Mandala Reach, and targets weak or unstable foreign states."
THR_bodhisattva_visit_collapsing_capital: "Visit a War-Torn Capital"
THR_bodhisattva_visit_collapsing_capital_desc: "Send the Bodhisattva to a capital close to collapse or deep wartime instability. This is expensive, but it can create the strongest foreign mission memory."
THR_bodhisattva_hold_teachings_for_refugees: "Hold Teachings for Refugees"
THR_bodhisattva_hold_teachings_for_refugees_desc: "Spend Political Power on a domestic teaching circuit. Advances the bhumi, raises Spiritual Legitimacy, and lowers Compassion Drift."
THR_bodhisattva_teach_foreign_officers: "Teach Foreign Officers"
THR_bodhisattva_teach_foreign_officers_desc: "Turn visiting officers into disciplined witnesses. Requires Mandala Reach, advances the bhumi, and gives limited military experience."
THR_bodhisattva_send_letters_after_visit: "Send Letters After a Visit"
THR_bodhisattva_send_letters_after_visit_desc: "Follow up after a foreign visit. The target must already have received the Bodhisattva."
THR_bodhisattva_establish_mandala_mission: "Establish a Mandala Mission"
THR_bodhisattva_establish_mandala_mission_desc: "Create a small spiritual mission in a previously visited unstable country. It improves influence and can help later conversion."
THR_bodhisattva_invite_foreign_pilgrims: "Invite Foreign Pilgrims"
THR_bodhisattva_invite_foreign_pilgrims_desc: "Spend Political Power to bring pilgrims into the Realm, raising Spiritual Legitimacy and Mandala Reach."
THR_bodhisattva_support_sympathetic_government: "Support a Sympathetic Government"
THR_bodhisattva_support_sympathetic_government_desc: "A rare conversion attempt. Requires high Spiritual Legitimacy, high Mandala Reach, a weak visited target, and no major-power protection."
THR_begin_concentration_sequence: "Begin the Concentration Vow"
THR_begin_concentration_sequence_desc: "Begin the fallback concentration sequence for deep meditation. Complete the four beats, Intention, Energy, Mind, and Investigation, before the vow expires to gain Meditation Charge, Bodhi, Detachment, and progress toward the next Dhyana."
THR_hold_intention: "Hold Intention"
THR_hold_intention_desc: "Hold the first beat of concentration. This advances the sequence and builds Meditation Charge."
THR_hold_energy: "Hold Energy"
THR_hold_energy_desc: "Hold the second beat of concentration. This advances the sequence and builds Meditation Charge."
THR_hold_mind: "Hold Mind"
THR_hold_mind_desc: "Hold the third beat of concentration. This advances the sequence and builds Meditation Charge."
THR_hold_investigation: "Hold Investigation"
THR_hold_investigation_desc: "Complete the fourth beat of concentration. The sequence grants Bodhi, Detachment, Meditation Charge, and, if enough charge has gathered, the next Dhyana."
THR_realize_buddhahood_beneath_seat: "Realize Buddhahood Beneath the Seat"
THR_realize_buddhahood_beneath_seat_desc: "The Unshaken Seat has been prepared and all required teaching and meditation conditions are met. The Bodhisattva realizes Buddhahood, changes the Realm's stage, and reveals the super-event."
THR_buddha_power_one_becomes_many: "Power: One Becomes Many"
THR_buddha_power_one_becomes_many_desc: "Spend Meditation Charge to project the Buddha's presence against a true chaos enemy. The target loses stability and war support, and the Realm records a demonstrated Buddha power."
THR_buddha_power_passing_through_walls: "Power: Passing Through Walls"
THR_buddha_power_passing_through_walls_desc: "Spend Meditation Charge against a true chaos enemy. Their command boundaries fail temporarily, reducing organization and recovery."
THR_buddha_power_walking_on_water: "Power: Walking on Water"
THR_buddha_power_walking_on_water_desc: "Spend Meditation Charge against a true chaos enemy. Their supply lines falter as the Realm's envoys move where roads should not hold."
THR_buddha_power_vanishing_from_sight: "Power: Vanishing from Sight"
THR_buddha_power_vanishing_from_sight_desc: "Spend Meditation Charge against a true chaos enemy. Their officers lose the thread of where the Realm's presence begins and ends."
THR_buddha_power_seated_in_sky: "Power: Seated in the Sky"
THR_buddha_power_seated_in_sky_desc: "Spend Meditation Charge against a true chaos enemy. The target's air confidence, war support, and recovery are shaken."
THR_buddha_power_touching_sun_moon: "Power: Touching the Sun and Moon"
THR_buddha_power_touching_sun_moon_desc: "Spend Meditation Charge against a true chaos enemy. Industry and public confidence falter under a sign no ministry can explain."
THR_buddha_power_extinction_defilements: "Power: Extinction of Defilements"
THR_buddha_power_extinction_defilements_desc: "Spend full Meditation Charge to complete the inner rite required for Final Silence. Requires Dhyana Depth 4, very low Defilements, Buddhahood, and at least one prior Buddha power shown against a true chaos enemy."
holy_realm_power_walls_unsealed: "Walls Unsealed"
holy_realm_power_walls_unsealed_desc: "The country's boundaries of command and shelter have failed under a Buddha power."
holy_realm_power_waters_crossed: "Waters Crossed"
holy_realm_power_waters_crossed_desc: "The country's supply officers report crossings and interruptions where no ordinary route should exist."
holy_realm_power_vanished_sight: "Vanished from Sight"
holy_realm_power_vanished_sight_desc: "The country's ministries cannot keep the Realm's presence fixed in reports or maps."
holy_realm_power_sky_seated: "Seated in the Sky"
holy_realm_power_sky_seated_desc: "The country's soldiers and pilots carry the sight of an impossible seated figure above the front."
holy_realm_power_sun_moon_touched: "Sun and Moon Touched"
holy_realm_power_sun_moon_touched_desc: "The country's factories and offices slow under a celestial sign associated with the awakened Realm."
holy_realm_power_defilements_extinguished: "Defilements Extinguished"
holy_realm_power_defilements_extinguished_desc: "The country's chaos doctrine has been struck at its motive force, leaving officials unable to explain why zeal has become fear."
THR_send_regional_peace_letter: "Send Regional Letter of Peace"
THR_send_regional_peace_letter_desc: "Send a letter beyond immediate neighbors to a regional target tied to the Mandala. Acceptance can produce peaceful submission, protectorate status, or staged integration."
THR_integrate_mandala_protectorate_state: "Integrate a Protectorate State"
THR_integrate_mandala_protectorate_state_desc: "Spend Political Power to draw one eligible state from a Mandala protectorate into direct Realm administration. Non-eligible land remains under the protectorate."

chaosx.nr3.120.t: "The Bodhisattva at the Border Court"
chaosx.nr3.120.d: "The visitor arrived without a treaty draft. The court expected demands and heard teachings on refuge, restraint, and the cost of refusing roads to the desperate."
chaosx.nr3.120.a: "Receive the visitor."
chaosx.nr3.121.t: "A Distant Teaching Mission"
chaosx.nr3.121.d: "Foreign officials argued over whether the Bodhisattva's arrival was diplomacy, sermon, or quiet interference. By the time they agreed on nothing, the crowd outside had already learned the name of the Realm."
chaosx.nr3.121.a: "Let the mission speak."
chaosx.nr3.121.b: "Turn the mission away."
chaosx.nr3.122.t: "The Bodhisattva Enters the War-Torn Capital"
chaosx.nr3.122.d: "The capital's shelters opened before the ministries did. The Bodhisattva spoke to officers, widows, and clerks in the same hall, as if rank had become another form of injury."
chaosx.nr3.122.a: "Record the visit."
chaosx.nr3.123.t: "Letters After the Visit"
chaosx.nr3.123.d: "The letters did not demand submission. They listed names, shelters, debts, and roads left open after the Bodhisattva departed."
chaosx.nr3.123.a: "File the letters."
chaosx.nr3.124.t: "A Government Looks to the Mandala"
chaosx.nr3.124.d: "The state is weak, isolated, and recently visited. Ministers who once feared absorption now ask whether protectorate vows are safer than another month of collapse."
chaosx.nr3.124.a: "Enter the Mandala."
chaosx.nr3.124.b: "Remain outside."
chaosx_nr3_124_a_tt: "The country becomes a Mandala protectorate or peacefully submits eligible territory."
chaosx_nr3_124_b_tt: "The target refuses conversion. The Holy Realm records the refusal and gains a small amount of Mandala Reach and Compassion Drift."
chaosx.nr3.125.t: "Letters Carried Past the Guns"
chaosx.nr3.125.d: "Mandala envoys have asked this government to name one active enemy and accept witnessed arbitration. The letter promises neither victory nor punishment. It offers a white flag, a table, and the knowledge that refusal will be entered in another country's ledger."
chaosx.nr3.125.a: "Hear the other side."
chaosx.nr3.125.b: "Return the letter unopened."
chaosx_nr3_125_a_tt: "The other belligerent receives a matching arbitration offer. Peace only follows if both sides accept."
chaosx_nr3_125_b_tt: "Refuses Mandala arbitration. The Holy Realm records the refusal."
chaosx.nr3.126.t: "The Second Letter Arrives"
chaosx.nr3.126.d: "The enemy has allowed Mandala witnesses to carry a second letter across the line. This offer is narrower than surrender and weaker than victory: a white peace under the eyes of a foreign institution that will remember who accepted it."
chaosx.nr3.126.a: "Sign under the white flag."
chaosx.nr3.126.b: "Keep the front open."
chaosx_nr3_126_a_tt: "If the first side is still at war with this country, both sides sign a white peace."
chaosx_nr3_126_b_tt: "Refuses Mandala arbitration. The Holy Realm records the refusal."
chaosx.nr3.127.t: "The White Flags Hold"
chaosx.nr3.127.d: "The Mandala letters did not end a war by command. They found two exhausted signatures and kept the road open long enough for both to meet. The Holy Realm records the peace as proof that arbitration can become machinery rather than sentiment."
chaosx.nr3.127.a: "Enter the signatures."
chaosx_nr3_127_a_tt: "Records a successful Mandala arbitration, raises Mandala Reach and Spiritual Legitimacy, and lowers Chaos."

chaosx.events_log.evolution.type.holy_realm: "§YHoly Realm Evolution§!"
chaosx.events_log.window.event_details.holy_realm: "The Holy Realm begins as a Tibetan-centered mountain refuge, then develops through the Bodhisattva state, Arhat Administration, Buddha Mandate, and later sacred-rule doctrines if the player or AI chooses them.\n\nThe system tracks Spiritual Legitimacy, Compassion Drift, Mandala Reach, and Final Silence Pressure. Events, focuses, and decisions remember restraint, refugee policy, Arhat conduct, diplomacy, coercive force, and doctrine choices.\n\nThe darker doctrine branches remain locked behind late stages, chosen focuses, warning events, strike capability, date, Chaos Meter, industry, sovereignty, and world-end settings."
chaosx.events_log.window.evolution_details.holy_realm.title.event_detail: "[GetEventsLogEventDetailHolyRealmEvolutionTitle]"
chaosx.events_log.window.evolution_details.holy_realm.title.selected: "[GetEventsLogSelectedHolyRealmEvolutionTitle]"
chaosx.events_log.window.evolution_details.holy_realm.title.stage_1: "Mountain Refuge"
chaosx.events_log.window.evolution_details.holy_realm.title.stage_2: "Bodhisattva Path"
chaosx.events_log.window.evolution_details.holy_realm.title.stage_3: "Arhat Administration Path"
chaosx.events_log.window.evolution_details.holy_realm.title.stage_4: "Buddha Mandate Path"
chaosx.events_log.window.evolution_details.holy_realm.title.stage_5: "Divine Sovereignty Path"
chaosx.events_log.window.evolution_details.holy_realm.title.stage_6: "Final Doctrine Path"
chaosx.events_log.window.evolution_details.holy_realm.body: "[GetEventsLogSelectedHolyRealmEvolutionBody]"
chaosx.events_log.window.evolution_details.holy_realm.body.event_detail: "[GetEventsLogEventDetailHolyRealmEvolutionBody]"
chaosx.events_log.window.evolution_details.holy_realm.body.generic: "Unlocks stronger focus paths, later text, and AI willingness. The selected focuses, decisions, and events carry the actual mechanics."
chaosx.events_log.window.evolution_details.holy_realm.body.stage_1: "Unlocks the mountain refuge identity, loads the Holy Realm focus tree, and opens defensive refuge, high-pass, shelter policy, and Himalayan Mandala cleanup content."
chaosx.events_log.window.evolution_details.holy_realm.body.stage_2: "Unlocks the Bodhisattva state branch, spiritual legitimacy, civil-register focuses, early doctrine framing, and the political prerequisite for outer-pass security."
chaosx.events_log.window.evolution_details.holy_realm.body.stage_3: "Unlocks the Arhat administrative branch, stronger bureaucracy, vow officials, refugee industry, mountain defense, quiet diplomacy, and outer-valley administration."
chaosx.events_log.window.evolution_details.holy_realm.body.stage_4: "Unlocks the Buddha Mandate branch, restraint, peacekeeping, coercive pacification, Mandala Reach expansion, doctrine choices, and low/high-chaos route alternatives."
chaosx.events_log.window.evolution_details.holy_realm.body.stage_5: "Unlocks Divine Sovereignty content and makes the Realm more willing to treat sacred authority as state policy. The dangerous effects still require chosen focuses, events, and decisions."
chaosx.events_log.window.evolution_details.holy_realm.body.stage_6: "Unlocks the final doctrine branch. Final Silence still requires late focuses, Ministry of Silence authorization, warning events, year, Chaos Meter, factory dominance, strike capability, sovereignty, and world-end settings."
