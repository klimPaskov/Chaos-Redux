chaosx.nr3.1.t: "The Holy Realm"
chaosx.nr3.2.t: "The Figure at the High Monastery"
chaosx.nr3.2.d: "Refugees, monks, deserters, and frightened officials have begun climbing into the high valleys. Their stories differ, but their destination is the same: a monastery where lamps stay lit through the night and clerks issue shelter seals in the name of a Bodhisattva who refuses a throne but accepts responsibility for suffering.\n\nThe first reports are almost ordinary in their kindness: food counted without panic, children sent to warm rooms, soldiers told to leave their rifles outside the kitchens. The state can treat the mountain refuge as a temporary crisis, or it can let the seal become law."
chaosx.nr3.2.a: "Let the monasteries handle it."
chaosx.nr3.2.b: "Invite the figure into government."
chaosx.nr3.2.c: "Restrict the gatherings."
chaosx.nr3.2.e: "Proclaim the new mandate."
chaosx_nr3_2_a_tt: "Keeps the refuge outside government, gains minor stability, and blocks Holy Realm formation here."
chaosx_nr3_2_b_tt: "Forms the Holy Realm, loads the Holy Realm focus tree, creates the Mountain Refuge, and invites Bhutan and Nepal to enter the Mandala."
chaosx_nr3_2_c_tt: "Suppresses the gathering, harms stability, and blocks Holy Realm formation here."
chaosx_nr3_2_e_tt: "Forms the Holy Realm immediately with a harder mandate and an earlier stage event."
chaosx.nr3.3.t: "A Seal from [From.GetName]"
chaosx.nr3.3.d: "[From.GetName] has sent white-clothed clerks through the passes with an unusual offer of shared refuge. The text speaks of protected roads, monastery stores, and administrative continuity under a new seal. Foreign observers are still unsure whether the proposal is religious, political, or military."
chaosx.nr3.3.a: "Accept the seal."
chaosx.nr3.3.b: "The pass remains ours."
chaosx_nr3_3_a_tt: "Joins the Holy Realm peacefully. The Realm annexes the country, cores Himalayan states, gains Mandala Reach and Spiritual Legitimacy, and records unity by vow."
chaosx_nr3_3_b_tt: "Refuses the seal. The Realm records the refusal, gains a small amount of Mandala Reach, and may later complete the mountain circle through the expansion branch."
chaosx.nr3.4.t: "The Roads Climb Toward Silence"
chaosx.nr3.4.d: "The first refugees arrived before the snow melted. Then came deserters, widows, monks, wounded soldiers, foreign children, and men who claimed to have forgotten their country.\n\nThe camps are quiet by the standards of the age. Fires are rationed, bread is counted, and the border villages sleep under patrols that have been ordered to protect rather than recruit. The officers asked how many could be admitted. The Bodhisattva asked how many could be turned away and still leave the Realm unchanged."
chaosx.nr3.4.a: "Open the refuge roads."
chaosx.nr3.4.b: "Register every name."
chaosx.nr3.4.c: "Close the passes until order returns."
chaosx_nr3_4_a_tt: "Accepts large refugee movement: gains manpower, Spiritual Legitimacy, small Compassion Drift, and slightly reduces Chaos."
chaosx_nr3_4_b_tt: "Creates a refugee registry: gains Political Power and Mandala Reach, and slightly reduces Chaos."
chaosx_nr3_4_c_tt: "Closes the passes: gains small stability, loses Spiritual Legitimacy, raises Final Silence Pressure, and increases Chaos."
chaosx.nr3.10.t: "The Bodhisattva Accepts the Seal"
chaosx.nr3.10.d: "The Bodhisattva refuses coronation rites, but the refusal itself becomes the constitution. Refuge officials kneel before an empty seat, then rise with authority to feed, shelter, judge, and conscript in the name of mercy."
chaosx.nr3.10.a: "Compassion must govern."
chaosx.nr3.20.t: "The Arhat Administration"
chaosx.nr3.20.d: "The refuge has grown too large for monastery kitchens and emergency ledgers. The Arhats propose a civil service of oath-bound administrators who will decide which villages receive grain, which roads remain open, and which pleas are false attachment."
chaosx.nr3.20.a: "Let the Arhats take office."
chaosx.nr3.20.b: "Give them ledgers, not souls."
chaosx_nr3_20_a_tt: "Creates the Arhat Administration, adds the Arhat Administration idea, empowers Arhat memory, and increases doctrinal Chaos."
chaosx_nr3_20_b_tt: "Creates the Arhat Administration under restraint, records checked Arhats, lowers Compassion Drift, and slightly reduces Chaos."
chaosx.nr3.21.t: "A Village without Petitions"
chaosx.nr3.21.d: "The district office reports that no petitions were filed for ninety days. The Arhat overseer calls it proof of peace. The local clerk has asked to be reassigned.\n\nThe petition box remains in the square. Its slot has been polished smooth by weather, not by use."
chaosx.nr3.21.a: "Praise the overseer."
chaosx.nr3.21.b: "Send an inquiry."
chaosx.nr3.21.c: "Remove the Arhat quietly."
chaosx.nr3.21.e: "Expand the method."
chaosx_nr3_21_a_tt: "Praises the overseer: gains stability, raises Compassion Drift, and increases doctrinal Chaos."
chaosx_nr3_21_b_tt: "Investigates the district: gains Spiritual Legitimacy and slightly reduces Chaos."
chaosx_nr3_21_c_tt: "Removes the overseer: spends Political Power, lowers Compassion Drift, and slightly reduces Chaos."
chaosx_nr3_21_e_tt: "Expands the silent method: gains Political Power, raises Final Silence Pressure, and significantly increases doctrinal Chaos."
chaosx.nr3.22.t: "The Question of False Attainment"
chaosx.nr3.22.d: "The examinations have produced officials whose vows read correctly and whose districts have become silent too quickly. The Mandala Bureau asks whether a false Arhat is a fraud, a useful clerk, or a warning about the office itself."
chaosx.nr3.22.a: "Expose the false attainment."
chaosx.nr3.22.b: "Seal the record."
chaosx.nr3.22.c: "Review the office, not the man."
chaosx_nr3_22_a_tt: "Exposes false attainment: loses stability, gains Spiritual Legitimacy, and slightly reduces Chaos."
chaosx_nr3_22_b_tt: "Seals the record: gains Political Power, raises Compassion Drift, and increases doctrinal Chaos."
chaosx_nr3_22_c_tt: "Reviews the office: lowers Final Silence Pressure and slightly reduces Chaos."
chaosx.nr3.30.t: "The Unshaken Seat"
chaosx.nr3.30.d: "The Holy Realm no longer describes itself only as a refuge. The seat is prepared, but no proclamation can make a Buddha by decree. The Bodhisattva's teachings, meditation, and remaining defilements must answer where the ministries cannot."
chaosx.nr3.30.a: "Let the seat be tested."
chaosx_nr3_30_a_tt: "Marks §YThe Unshaken Seat§! and adds Bodhi. If the Bodhisattva has reached §Y108 Bodhi§!, the §YFourth Dhyana§!, low Defilements, twelve teaching successes, and a crisis teaching success, Buddhahood is realized. If Bodhi is complete but Defilements remain severe, the False Buddha Schism begins to gather."
chaosx.nr3.31.t: "The Question of Compassionate Force"
chaosx.nr3.31.d: "The Mandate has crossed the border in every ministry before it crosses one on the map. The Quietists demand refusal. The envoys ask for white-flag authority. The Arhats argue that mercy which cannot compel has already chosen delay."
chaosx.nr3.31.a: "The witness must remain able to refuse."
chaosx.nr3.31.b: "Stand between armies."
chaosx.nr3.31.c: "Compel peace before suffering grows."
chaosx_nr3_31_a_tt: "Chooses restraint doctrine, lowers Final Silence Pressure, and reduces Chaos."
chaosx_nr3_31_b_tt: "Chooses peacekeeping doctrine, adds the Peacekeeping Mandate idea, raises Mandala Reach, and slightly reduces Chaos."
chaosx_nr3_31_c_tt: "Chooses coercive pacification, adds the Coercive Pacification idea, raises Final Silence Pressure, and increases doctrinal Chaos."
chaosx.nr3.40.t: "The Throne Without a Body"
chaosx.nr3.40.d: "The Arhats argue that a Bodhisattva-led state still depends on human hesitation. A state built to carry sacred responsibility must be able to continue when ordinary signatures fail. The proposal has no crown, only decrees that no one may countersign."
chaosx.nr3.40.a: "Sovereignty must be divine."
chaosx_nr3_40_a_tt: "Enters Divine Sovereignty, replaces the Buddha Mandate idea, raises Final Silence Pressure, and heavily increases Chaos."
chaosx.nr3.70.t: "The Authorization Chamber"
chaosx.nr3.70.d: "The Mandala Bureau has completed sealed routes, restricted ledgers, and messages prepared for governments that may never receive them. The ministers do not speak of threat. They speak of whether a doctrine that has been written can still be refused."
chaosx.nr3.70.a: "Arm the final doctrine."
chaosx.nr3.70.b: "Renounce it before the seal hardens."
chaosx_nr3_70_a_tt: "Arms the final doctrine, begins the warning chain, raises Final Silence Pressure and global chaos, and warns other human players."
chaosx_nr3_70_b_tt: "Renounces the final doctrine, opens the Lamps Remain Lit branch, lowers Final Silence Pressure, and records the Vow against Annihilation."
chaosx.nr3.74.t: "The Ledgers Are Sealed"
chaosx.nr3.74.d: "The target ledgers have been moved beneath stone and guarded by officials who no longer sign their own names. The first warning has passed from doctrine into procedure."
chaosx.nr3.74.a: "Seal the first ledger."
chaosx.nr3.74.b: "Reopen the chamber."
chaosx_nr3_74_a_tt: "Begins the visible Final Silence warning chain, marks foreign states, raises Final Silence Pressure, and increases Chaos."
chaosx_nr3_74_b_tt: "Renounces Final Silence before launch and records the refusal as a late Vow against Annihilation."
chaosx.nr3.75.t: "No More Peace Delegations"
chaosx.nr3.75.d: "The Foreign Office has stopped accepting delegations that ask the Realm to explain the sealed doctrine. The reply is brief and procedural: the chamber has no further translation to provide."
chaosx.nr3.75.a: "Close the outer road."
chaosx.nr3.76.t: "Reports from the High Passes"
chaosx.nr3.76.d: "The embassy cable is incomplete. It describes sealed airfields, missing ministers, quiet radio towers, and a doctrine that no translator will sign.\n\nThe final line was added by hand: foreign intelligence believes the phrase Final Silence may refer to more than border policy, but no proof has reached the capital."
chaosx.nr3.76.a: "Prepare containment."
chaosx.nr3.76.b: "Send one final envoy."
chaosx.nr3.76.c: "Evacuate marked cities."
chaosx.nr3.77.t: "The Sky Is Entered into the Register"
chaosx.nr3.77.d: "The Ministry of Silence has begun treating the sky as an administrative route. Airfields report sealed orders. Reactor officers receive prayer slips folded into technical memoranda. The purpose remains unspoken."
chaosx.nr3.77.a: "Record the sky."
chaosx.nr3.78.t: "The Last Debate Is Cancelled"
chaosx.nr3.78.d: "The Quietists arrived before dawn and found the chamber locked. No arrests were made. Their petitions were accepted, stamped, and placed in a cabinet marked for later review."
chaosx.nr3.78.a: "There will be no later debate."
chaosx.nr3.79.t: "The World Is Marked as a Wound"
chaosx.nr3.79.d: "The final map does not use enemy colors. It marks cities, ports, rail hubs, farms, and hospitals with the same black ink. The Arhats call this a complete register."
chaosx.nr3.79.a: "The warning is complete."
chaosx.nr3.71.t: "Foreign Offices Study the Mandate"
chaosx.nr3.71.d: "The Holy Realm has announced a Buddha Mandate that reaches beyond the Himalayas. Its language mixes relief, mediation, and disciplined administration. Nearby governments worry about influence and legitimacy more than war."
chaosx.nr3.71.a: "Open an observation file."
chaosx.nr3.72.t: "Unconfirmed Reports from the Holy Realm"
chaosx.nr3.72.d: "Diplomatic cables from the mountains mention sealed archives, unfamiliar ministry names, and councils that meet without ordinary minutes. The reports do not agree on what the Realm is preparing, or whether it is preparing anything at all."
chaosx.nr3.72.a: "Keep the file open."
chaosx.nr3.73.t: "Final Silence Begins"
chaosx.nr3.73.d: "The Holy Realm has entered Final Silence as a terminal world-end scenario. Foreign ministries receive no demand, no ultimatum, and no list of enemies. The announcement only states that the last register has closed."
chaosx.nr3.73.a: "The last register closes."
chaosx.nr3.80.t: "The Final Silence"
chaosx.nr3.80.d: "The final ledger is open. The Realm is sovereign, the Awakened One has extinguished the inner defilements, and the doctrine has passed beyond warning. If the world's suffering has crossed the last threshold, the silence becomes terminal. If it has not, the Realm leaves a living aftermath beneath the Empty Seat.\n\n[GetHolyRealmFinalMemory]\n\nThe last order does not name enemies. It names every place where suffering can return."
chaosx.nr3.80.a: "Turn the page."
chaosx_nr3_80_a_tt: "Completes Final Silence. If Chaos is above 1000 and world-end rules allow it, the terminal world-end branch fires. Otherwise the Realm enters the Empty Seat aftermath without setting a world-end."
chaosx.nr3.81.t: "The Empty Seat"
chaosx.nr3.81.d: "No conquest proclamation follows the rite. The old leader's name is removed from the register and the seat remains empty, guarded by witnesses who know that the Final Silence ended as an aftermath rather than a world-end.\n\nThe Sangha Compact keeps its roads open. The Realm speaks less, but its surviving offices turn toward reconstruction."
chaosx.nr3.81.a: "Leave the seat empty."
chaosx.nr3.82.t: "Final Silence Strike Wave"
chaosx.nr3.83.t: "The Mandala Breaks"
chaosx.nr3.83.d: "The launch network failed before the last road could close. The Mandala Bureau records broken routes, missing ledgers, and foreign interference in the same hand.\n\nThe world remains guilty and alive."
chaosx.nr3.83.a: "The ledger failed before the world did."
chaosx.nr3.90.t: "The Ledger Closes"
chaosx.nr3.90.d: "The world-end register closes under Final Silence. The Mandala Bureau records no victory, no armistice, and no conquered capital. It records the silence outside the Realm and the empty seat within it."
chaosx.nr3.90.a: "The page is blank."
chaosx.nr3.100.t: "A Letter of Peace and Authority"
chaosx.nr3.100.d: "A formal letter has arrived from the Holy Realm. It offers protection, Arhat administration, and entry into the Mandala without war. The language is peaceful, but the last page records what refusal will mean if the Realm later decides the road must be quiet.\n\nAcceptance chance: [GetHolyRealmPeaceLetterAcceptanceChance]\n[GetHolyRealmPeaceLetterAcceptanceReason]"
chaosx.nr3.100.a: "Enter the Mandala without war."
chaosx.nr3.100.b: "Refuse the letter."
chaosx_nr3_100_a_tt: "If accepted, eligible core territory enters the Mandala peacefully. Countries with non-eligible land become Mandala protectorates for staged integration. Mandala Reach and Spiritual Legitimacy rise, and chaos decreases slightly once."
chaosx_nr3_100_b_tt: "Refuses the letter. The Holy Realm records refusal, gains Mandala Reach and Compassion Drift, and unlocks forced integration decisions."
chaosx.nr3.101.t: "A Letter Is Accepted"
chaosx.nr3.101.d: "[holy_realm_peace_letter_target.GetName] has entered the Mandala without war. The Foreign Office records the surrender as protection rather than conquest, and the Arhats begin sorting roads, stores, and local offices under the submitted seal."
chaosx.nr3.101.a: "Record peaceful submission."
chaosx.nr3.102.t: "A Letter Is Refused"
chaosx.nr3.102.d: "[holy_realm_peace_letter_target.GetName] has refused the letter of peace and authority. The Mandala Bureau does not declare anger. It opens a refusal page, assigns road clerks, and waits for the Realm to decide whether authority must follow the letter."
chaosx.nr3.102.a: "Record refusal."
chaosx.nr3.110.t: "Pramudita, the Joyful Ground"
chaosx.nr3.110.d: "A public teaching explains the first bhumi of the Bodhisattva path: Pramudita, the joy that arises when compassion becomes action instead of sentiment. Refuge clerks repeat the phrase while stamping food seals; soldiers hear it as an order to protect without triumph."
chaosx.nr3.110.a: "Joy belongs to the protected."
chaosx.nr3.110.b: "Joy belongs to disciplined service."
chaosx_nr3_110_a_tt: "Advances the Bodhisattva bhumi, raises Spiritual Legitimacy, and slightly reduces Chaos."
chaosx_nr3_110_b_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, gains Political Power, and raises Mandala Reach."
chaosx.nr3.111.t: "Vimala, the Stainless Ground"
chaosx.nr3.111.d: "The Arhats teach Vimala as stainless conduct: not purity as suspicion, but conduct that leaves no hidden harm in the ledger. Junior officials ask whether a perfect register can still become cruel."
chaosx.nr3.111.a: "Audit the office before the village."
chaosx.nr3.111.b: "Let the register prove its own purity."
chaosx_nr3_111_a_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, lowers Compassion Drift, and raises Spiritual Legitimacy."
chaosx_nr3_111_b_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, gains Political Power and Mandala Reach, and records a stricter Arhat interpretation."
chaosx.nr3.112.t: "Acala, the Immovable Ground"
chaosx.nr3.112.d: "The Bodhisattva path names Acala as the immovable ground. The army hears the teaching as steadiness under fire; the Quietists warn that immovable compassion can become an immovable command."
chaosx.nr3.112.a: "The vow protects."
chaosx.nr3.112.b: "The vow compels."
chaosx_nr3_112_a_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, spawns Vow-Keeper Mountaineers, and raises Spiritual Legitimacy."
chaosx_nr3_112_b_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, gains army experience, and raises Compassion Drift."
chaosx.nr3.113.t: "Dharmamegha, the Cloud of Doctrine"
chaosx.nr3.113.d: "The tenth bhumi, Dharmamegha, is described as a cloud of doctrine that gives rain to all beings. In the late registers the metaphor becomes difficult: rain, order, release, and silence can all be written in the same hand."
chaosx.nr3.113.a: "Let the cloud remain mercy."
chaosx.nr3.113.b: "Let doctrine finish the rain."
chaosx_nr3_113_a_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, pushes the doctrine balance toward the Vow against Annihilation, and lowers Final Silence Pressure."
chaosx_nr3_113_b_tt: "Advances the Bodhisattva bhumi, strengthens the leader trait, pushes the doctrine balance toward Final Silence, raises Final Silence Pressure, and increases doctrinal Chaos."
