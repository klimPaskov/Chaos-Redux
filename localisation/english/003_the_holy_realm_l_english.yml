holy_realm_peace_letter_reason_major: "Major powers will read the letter as a threat to sovereignty and always refuse."
holy_realm_peace_letter_reason_faction: "Faction members will not submit while bound to another alliance."
holy_realm_peace_letter_reason_mandala_reach: "High Mandala Reach, Holy Realm strength, low target stability, and ongoing war make acceptance barely possible."
holy_realm_peace_letter_reason_possible: "Acceptance is rare and depends on weakness, instability, war pressure, and the Holy Realm's reach."
holy_realm_peace_letter_reason_none: "The target is not desperate enough to treat submission as protection."
