l_english:
chaosx.nr72.1.t: "Northern Ireland"

chaosx.nr72.2.t: "Reclaim the North?"
chaosx.nr72.2.d: ""
chaosx.nr72.2.a: "Take the north"
chaosx.nr72.2.b: "We are too unimportant to even exist"

chaosx.nr72.3.t: "Ireland sends an ultimatum"
chaosx.nr72.3.d: "Ireland wants Northern Ireland back"
chaosx.nr72.3.a: "They want to be conquered!"
chaosx.nr72.3.b: "It's not worth a war"









chaosx.nr72.4.t: "We lost Northern Ireland!"
chaosx.nr72.4.d: "Irish troops have taken Belfast and we should consider making peace with them."
chaosx.nr72.4.a: "It's lost"
chaosx.nr72.4.b: "They shall be destroyed!"

chaosx.news.63.t: "Ireland claims the North!"
chaosx.news.63.d: "Ireland's recent assertion of sovereignty over Northern Ireland has reignited tensions in the region. The move, spurred by nationalist sentiments, has sparked controversy and protests from unionist communities. As both sides navigate this delicate situation, concerns mount over the potential for renewed conflict and the implications for the fragile peace process."
chaosx.news.63.a: "Can't they live in peace?"
