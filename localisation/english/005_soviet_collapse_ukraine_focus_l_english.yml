l_english:
soviet_collapse_ukraine_focus_tree: "Ukraine Collapse"
soviet_collapse_ukraine_focus_tree_desc: "Ukraine answers the Soviet Collapse through survival, republican politics, socialist sovereignty, military rule, foreign influence, grain power, League leadership, expansion, armed forces, industry, Black Banner relations, and post-Union identity."
ukr_soviet_collapse_emergency_rada: "Emergency Rada"
ukr_soviet_collapse_emergency_rada_desc: "The emergency rada binds ministries, radio rooms, depot guards, and city committees into one authority before Moscow can split them apart."
ukr_soviet_collapse_seal_the_grain_ledgers: "Seal the Grain Ledgers"
ukr_soviet_collapse_seal_the_grain_ledgers_desc: "Grain offices, silo receipts, and ration books are sealed under Ukrainian guard so food authority cannot be quietly returned to Moscow."
ukr_soviet_collapse_seal_the_grain_ledgers_mechanics_tt: "Secures the grain administration, adds a small stability reserve, captures train stock, and strengthens depot control."
ukr_soviet_collapse_count_the_depot_keys: "Count the Depot Keys"
ukr_soviet_collapse_count_the_depot_keys_desc: "Depot key rings, truck parks, and repair stores are inventoried into a usable logistics reserve before scattered guards sell or hide them."
ukr_soviet_collapse_count_the_depot_keys_mechanics_tt: "Inventories support equipment, improves depot control, and expands railway authority into a usable supply network."
ukr_soviet_collapse_first_republican_line: "First Republican Line"
ukr_soviet_collapse_first_republican_line_desc: "Kyiv turns the first reliable garrisons, local manpower rolls, and field works into a defensive line that answers to the republic."
ukr_soviet_collapse_moscows_officers_in_our_barracks: "Moscow's Officers in Our Barracks"
ukr_soviet_collapse_moscows_officers_in_our_barracks_desc: "The emergency state studies which officers can be absorbed, watched, or removed before old command habits decide the barracks."
ukr_soviet_collapse_seal_the_ministry_doors: "Seal the Ministry Doors"
ukr_soviet_collapse_seal_the_ministry_doors_desc: "Clerks copy seals, payroll books, mobilization lists, and ration files before loyal officials can return them to central custody."
ukr_soviet_collapse_kyiv_radio_watch: "Kyiv Radio Watch"
ukr_soviet_collapse_kyiv_radio_watch_desc: "Broadcast crews and student guards keep Kyiv on the air long enough for soldiers and towns to hear one Ukrainian chain of command."
ukr_soviet_collapse_oblast_commissars_accounted: "Oblast Commissars Accounted"
ukr_soviet_collapse_oblast_commissars_accounted_desc: "Every oblast office must name who commands it, who pays it, and which guard detachment keeps its files safe."
ukr_soviet_collapse_railway_guard_oath: "Railway Guard Oath"
ukr_soviet_collapse_railway_guard_oath_desc: "Rail workers and armed guards swear to move food, refugees, and soldiers under Ukrainian schedules first."
ukr_soviet_collapse_first_reserve_rolls: "First Reserve Rolls"
ukr_soviet_collapse_first_reserve_rolls_desc: "Reservists are sorted by home district, equipment access, and whether their officers are still waiting for Soviet confirmation."
ukr_soviet_collapse_city_supply_boards: "City Supply Boards"
ukr_soviet_collapse_city_supply_boards_desc: "Municipal supply boards merge bread, fuel, hospital stock, and militia needs so panic does not become Moscow's ally."
ukr_soviet_collapse_oblast_defense_lines: "Oblast Defense Lines"
ukr_soviet_collapse_oblast_defense_lines_desc: "Regional defense lines make each city approach costly while the republic decides which fronts matter most."
ukr_soviet_collapse_depot_receipts_in_ukrainian_hands: "Depot Receipts in Ukrainian Hands"
ukr_soviet_collapse_depot_receipts_in_ukrainian_hands_desc: "Captured inventories become legal evidence that the republic can arm itself without asking the center."
ukr_soviet_collapse_first_winter_authority: "First Winter Authority"
ukr_soviet_collapse_first_winter_authority_desc: "The emergency state prepares for rationing, cold depots, and broken rail links before the first crisis season exposes it."
ukr_soviet_collapse_survival_cabinet_settled: "Survival Cabinet Settled"
ukr_soviet_collapse_survival_cabinet_settled_desc: "The provisional cabinet stops arguing over offices and accepts a war cabinet built for survival rather than ceremony."
ukr_soviet_collapse_restore_the_central_rada_memory: "Restore the Central Rada Memory"
ukr_soviet_collapse_restore_the_central_rada_memory_desc: "Democratic organisers frame the emergency as an interrupted civic tradition rather than a military mutiny."
ukr_soviet_collapse_municipal_ballot_registers: "Municipal Ballot Registers"
ukr_soviet_collapse_municipal_ballot_registers_desc: "Cities rebuild ballot lists under guard so elections can outlast martial law and refugee movement."
ukr_soviet_collapse_legal_parties_reopen: "Legal Parties Reopen"
ukr_soviet_collapse_legal_parties_reopen_desc: "Parties banned, absorbed, or silenced under Soviet rule receive supervised offices and a place in the emergency debate."
ukr_soviet_collapse_court_the_jurists: "Court the Jurists"
ukr_soviet_collapse_court_the_jurists_desc: "Judges and legal scholars draft opinions that make sovereignty look like law restored, not opportunism."
ukr_soviet_collapse_civil_press_charter: "Civil Press Charter"
ukr_soviet_collapse_civil_press_charter_desc: "Newspapers receive wartime rules that protect military secrecy without returning the press to ministry dictation."
ukr_soviet_collapse_minority_guarantee_decrees: "Minority Guarantee Decrees"
ukr_soviet_collapse_minority_guarantee_decrees_desc: "The republic promises language, religious, and municipal guarantees before Moscow can pose as their only shield."
ukr_soviet_collapse_local_governor_elections: "Local Governor Elections"
ukr_soviet_collapse_local_governor_elections_desc: "Emergency governors are forced to seek civic mandates in districts that can still hold guarded votes."
ukr_soviet_collapse_constitutional_commission: "Constitutional Commission"
ukr_soviet_collapse_constitutional_commission_desc: "A commission turns declarations, court opinions, and military necessities into a draft constitutional order."
ukr_soviet_collapse_watch_the_security_ministry: "Watch the Security Ministry"
ukr_soviet_collapse_watch_the_security_ministry_desc: "Civilian inspectors limit the emergency police before wartime habits become permanent institutions."
ukr_soviet_collapse_republic_day_plebiscite: "Republic Day Plebiscite"
ukr_soviet_collapse_republic_day_plebiscite_desc: "A controlled but real plebiscite asks citizens whether the republic should remain temporary or become a state."
ukr_soviet_collapse_constitutional_republic: "Constitutional Republic"
ukr_soviet_collapse_constitutional_republic_desc: "Ukraine claims survival through law, votes, and guarded pluralism, making every Soviet ultimatum a foreign demand."
ukr_soviet_collapse_soviets_without_moscow: "Soviets Without Moscow"
ukr_soviet_collapse_soviets_without_moscow_desc: "Factory soviets and village committees argue that socialism can survive only after the center stops commanding it."
ukr_soviet_collapse_workers_guard_the_plants: "Workers Guard the Plants"
ukr_soviet_collapse_workers_guard_the_plants_desc: "Plant committees take security rosters, machine tools, and strike discipline into the same emergency structure."
ukr_soviet_collapse_red_ukrainian_manifesto: "Red Ukrainian Manifesto"
ukr_soviet_collapse_red_ukrainian_manifesto_desc: "The government rejects both restoration and Moscow hardliners with a manifesto for republican socialism."
ukr_soviet_collapse_unionists_inside_the_republic: "Unionists Inside the Republic"
ukr_soviet_collapse_unionists_inside_the_republic_desc: "Local unionists are offered places in councils if they accept Ukrainian command and reject Soviet reconquest."
ukr_soviet_collapse_factory_wage_guarantees: "Factory Wage Guarantees"
ukr_soviet_collapse_factory_wage_guarantees_desc: "Wage guarantees keep industrial workers at the benches while the state converts Soviet payrolls into Ukrainian obligations."
ukr_soviet_collapse_village_soviet_congress: "Village Soviet Congress"
ukr_soviet_collapse_village_soviet_congress_desc: "Village soviets meet under armed neutrality to trade grain, guards, and legitimacy for protection from requisition parties."
ukr_soviet_collapse_red_militia_schools: "Red Militia Schools"
ukr_soviet_collapse_red_militia_schools_desc: "Militia schools teach political discipline, depot security, and how to fight without surrendering to army cliques."
ukr_soviet_collapse_social_property_statutes: "Social Property Statutes"
ukr_soviet_collapse_social_property_statutes_desc: "Factories and rail yards become social property under republican law rather than ministries waiting for Moscow's seal."
ukr_soviet_collapse_purge_central_loyalists_carefully: "Purge Central Loyalists Carefully"
ukr_soviet_collapse_purge_central_loyalists_carefully_desc: "The republic removes central loyalists through committees and evidence, avoiding a panic that would feed Soviet propaganda."
ukr_soviet_collapse_internationalist_broadcasts: "Internationalist Broadcasts"
ukr_soviet_collapse_internationalist_broadcasts_desc: "Broadcasts call to soldiers and workers across the former union without promising obedience to another capital."
ukr_soviet_collapse_socialist_sovereign_republic: "Socialist Sovereign Republic"
ukr_soviet_collapse_socialist_sovereign_republic_desc: "Ukraine presents itself as a red republic with its own mandate, forcing Moscow to fight a socialist rival rather than a simple secession."
ukr_soviet_collapse_directory_of_national_defense: "Directory of National Defense"
ukr_soviet_collapse_directory_of_national_defense_desc: "Officers, ministers, and rail officials accept a military directory until the first Soviet campaign is decided."
ukr_soviet_collapse_front_command_kyiv: "Front Command Kyiv"
ukr_soviet_collapse_front_command_kyiv_desc: "Kyiv becomes the clearing house for scattered garrisons, retreating units, and commanders who no longer trust Soviet channels."
ukr_soviet_collapse_officer_screening_boards: "Officer Screening Boards"
ukr_soviet_collapse_officer_screening_boards_desc: "Officers are screened by origin, unit loyalty, depot access, and whether their hesitation can still be used."
ukr_soviet_collapse_discipline_the_volunteers: "Discipline the Volunteers"
ukr_soviet_collapse_discipline_the_volunteers_desc: "Volunteer formations receive ranks, supply officers, and courts before enthusiasm becomes armed disorder."
ukr_soviet_collapse_river_line_plans: "River Line Plans"
ukr_soviet_collapse_river_line_plans_desc: "The Dnipro, Southern Bug, and Dniester become defensive calculations rather than lines drawn on optimistic maps."
ukr_soviet_collapse_armored_train_sections: "Armored Train Sections"
ukr_soviet_collapse_armored_train_sections_desc: "Rail workshops build armored sections to move command posts, guns, and political officers through broken corridors."
ukr_soviet_collapse_airfield_disarmament_orders: "Airfield Disarmament Orders"
ukr_soviet_collapse_airfield_disarmament_orders_desc: "Airfields are seized or disarmed before Soviet pilots can remove aircraft or bomb the republic's rail hubs."
ukr_soviet_collapse_field_police_compacts: "Field Police Compacts"
ukr_soviet_collapse_field_police_compacts_desc: "Field police coordinate with civilian committees so arrests, deserter returns, and depot discipline do not become private wars."
ukr_soviet_collapse_reserve_corps_statute: "Reserve Corps Statute"
ukr_soviet_collapse_reserve_corps_statute_desc: "The directory creates reserve corps tied to regions, rail access, and emergency stockpiles."
ukr_soviet_collapse_general_staff_without_moscow: "General Staff Without Moscow"
ukr_soviet_collapse_general_staff_without_moscow_desc: "The republic proves that it can plan campaigns, not only local defense, without Soviet staff tables."
ukr_soviet_collapse_directory_state: "Directory State"
ukr_soviet_collapse_directory_state_desc: "The military directory claims temporary supremacy until the war ends, with enough institutions to make temporary rule dangerous."
ukr_soviet_collapse_open_the_liaison_offices: "Open the Liaison Offices"
ukr_soviet_collapse_open_the_liaison_offices_desc: "Foreign contact offices accept observers, journalists, and unofficial military missions, then feed their reports into the Ukrainian League council."
ukr_soviet_collapse_warsaw_transit_notes: "Warsaw Transit Notes"
ukr_soviet_collapse_warsaw_transit_notes_desc: "Polish transit channels are negotiated through deniable notes, customs offices, and border rail timetables."
ukr_soviet_collapse_bucharest_grain_bargain: "Bucharest Grain Bargain"
ukr_soviet_collapse_bucharest_grain_bargain_desc: "Romanian access to grain and ports becomes leverage for supplies, advisers, and pressure on Moscow."
ukr_soviet_collapse_ankara_black_sea_cables: "Ankara Black Sea Cables"
ukr_soviet_collapse_ankara_black_sea_cables_desc: "Black Sea cables court Turkey with port security, shipping guarantees, and warnings about Soviet naval chaos."
ukr_soviet_collapse_london_observer_mission: "London Observer Mission"
ukr_soviet_collapse_london_observer_mission_desc: "British observers make the crisis visible in parliaments without forcing immediate alliance commitments."
ukr_soviet_collapse_paris_medical_columns: "Paris Medical Columns"
ukr_soviet_collapse_paris_medical_columns_desc: "French medical and relief columns cross the line between humanitarian presence and political recognition."
ukr_soviet_collapse_washington_credit_files: "Washington Credit Files"
ukr_soviet_collapse_washington_credit_files_desc: "American credit discussions tie recognition to ledgers, ports, food flows, and fears of a permanent Soviet enemy."
ukr_soviet_collapse_berlin_border_calculus: "Berlin Border Calculus"
ukr_soviet_collapse_berlin_border_calculus_desc: "German officers and diplomats are studied as a danger, a source of weapons, and a patron that could own too much."
ukr_soviet_collapse_japanese_far_east_probe: "Japanese Far East Probe"
ukr_soviet_collapse_japanese_far_east_probe_desc: "Japanese interest is treated as leverage over Moscow, but every message carries the risk of wider partition politics."
ukr_soviet_collapse_patronage_risk_board: "Patronage Risk Board"
ukr_soviet_collapse_patronage_risk_board_desc: "A risk board tracks which arms, advisers, loans, and intelligence favors could become foreign control after victory."
ukr_soviet_collapse_recognized_but_unowned: "Recognized but Unowned"
ukr_soviet_collapse_recognized_but_unowned_desc: "Ukraine accepts foreign help while declaring that no patron will inherit the republic's emergency."
ukr_soviet_collapse_grain_ledger_emergency: "Grain Ledger Emergency"
ukr_soviet_collapse_grain_ledger_emergency_desc: "Every elevator, kolkhoz store, flour mill, and military ration office is entered into a wartime grain ledger."
ukr_soviet_collapse_guard_the_silos: "Guard the Silos"
ukr_soviet_collapse_guard_the_silos_desc: "Silo guards receive legal cover, ammunition, and orders to resist both Soviet requisitions and local hoarding."
ukr_soviet_collapse_bread_card_ministries: "Bread Card Ministries"
ukr_soviet_collapse_bread_card_ministries_desc: "Ration cards become the state's proof that it can feed citizens and punish districts that trade with its enemies."
ukr_soviet_collapse_rail_grain_convoys: "Rail Grain Convoys"
ukr_soviet_collapse_rail_grain_convoys_desc: "Grain convoys move under guard with priority over every train that does not keep the republic alive."
ukr_soviet_collapse_port_elevator_authority: "Port Elevator Authority"
ukr_soviet_collapse_port_elevator_authority_desc: "Black Sea grain elevators receive emergency authority to bargain with shippers, guards, and foreign observers."
ukr_soviet_collapse_village_quota_bargains: "Village Quota Bargains"
ukr_soviet_collapse_village_quota_bargains_desc: "Villages trade quotas for local security and reduced requisition terror, keeping food moving without turning every field hostile."
ukr_soviet_collapse_ration_police_limits: "Ration Police Limits"
ukr_soviet_collapse_ration_police_limits_desc: "The ration police are given written limits so bread power does not immediately become private revenge."
ukr_soviet_collapse_military_bakery_network: "Military Bakery Network"
ukr_soviet_collapse_military_bakery_network_desc: "Field bakeries, flour trains, and guarded depots make the army dependent on Ukrainian food logistics."
ukr_soviet_collapse_food_as_recognition: "Food as Recognition"
ukr_soviet_collapse_food_as_recognition_desc: "Foreign missions learn that food exports and relief access will depend on treating Ukraine as a government."
ukr_soviet_collapse_granaries_as_fortresses: "Granaries as Fortresses"
ukr_soviet_collapse_granaries_as_fortresses_desc: "Granaries become fortified administrative centers where food, guards, and political authority share one gate."
ukr_soviet_collapse_the_bread_state: "The Bread State"
ukr_soviet_collapse_the_bread_state_desc: "The republic survives by making bread a weapon of statehood, grim enough to frighten allies as well as Moscow."
ukr_soviet_collapse_bread_state_dynamic_rewards_tt: "Bread-state rewards scale from owned states, accumulated grain authority, and Soviet depot vulnerability."
ukr_soviet_collapse_invite_republic_liaisons: "Invite Republic Liaisons"
ukr_soviet_collapse_invite_republic_liaisons_desc: "Ukraine invites breakaway liaison officers to Kyiv before the League can become only a slogan."
ukr_soviet_collapse_common_cipher_rooms: "Common Cipher Rooms"
ukr_soviet_collapse_common_cipher_rooms_desc: "Cipher rooms let republics share warnings without giving every member access to every secret."
ukr_soviet_collapse_league_supply_timetable: "League Supply Timetable"
ukr_soviet_collapse_league_supply_timetable_desc: "A common supply timetable links fronts, hospitals, and evacuation routes across several fragile states."
ukr_soviet_collapse_mediate_border_claims: "Mediate Border Claims"
ukr_soviet_collapse_mediate_border_claims_desc: "Border claims are frozen through emergency mediation so Moscow cannot recruit the disappointed."
ukr_soviet_collapse_league_volunteer_passports: "League Volunteer Passports"
ukr_soviet_collapse_league_volunteer_passports_desc: "Volunteer passports move trained men between republics without turning every crossing into smuggling."
ukr_soviet_collapse_anti_reconquest_staff: "Anti-Reconquest Staff"
ukr_soviet_collapse_anti_reconquest_staff_desc: "The League staff plans defense against Soviet reconquest while keeping Ukrainian dominance formally limited."
ukr_soviet_collapse_shared_refugee_statutes: "Shared Refugee Statutes"
ukr_soviet_collapse_shared_refugee_statutes_desc: "Refugee rules prevent member states from dumping the human cost of the crisis on weaker neighbors."
ukr_soviet_collapse_league_arms_board: "League Arms Board"
ukr_soviet_collapse_league_arms_board_desc: "The arms board assigns foreign deliveries by front need and patronage risk, not by which minister shouted first."
ukr_soviet_collapse_constitutional_congress_security: "Constitutional Congress Security"
ukr_soviet_collapse_constitutional_congress_security_desc: "Ukraine provides security for a League congress without making it look like a Ukrainian parliament."
ukr_soviet_collapse_no_capital_above_the_others: "No Capital Above the Others"
ukr_soviet_collapse_no_capital_above_the_others_desc: "Kyiv promises that the League will not become another capital above the republics."
ukr_soviet_collapse_league_of_equal_republics: "League of Equal Republics"
ukr_soviet_collapse_league_of_equal_republics_desc: "Ukraine leads by restraint, turning the defensive league into a political order that still fears domination."
ukr_soviet_collapse_black_sea_security_claim: "Black Sea Security Claim"
ukr_soviet_collapse_black_sea_security_claim_desc: "The republic argues that ports and sea lanes outside inherited Soviet lines decide whether Ukraine can survive."
ukr_soviet_collapse_dniester_forward_files: "Dniester Forward Files"
ukr_soviet_collapse_dniester_forward_files_desc: "Forward files map crossings, minorities, depot sites, and diplomatic risks along the Dniester frontier."
ukr_soviet_collapse_protect_the_port_approaches: "Protect the Port Approaches"
ukr_soviet_collapse_protect_the_port_approaches_desc: "Ukraine prepares to secure approaches to Odessa and nearby ports before another state controls its food exports."
ukr_soviet_collapse_carpathian_corridor_watch: "Carpathian Corridor Watch"
ukr_soviet_collapse_carpathian_corridor_watch_desc: "Mountain passes and western rail corridors are watched as lifelines, not just borders."
ukr_soviet_collapse_danube_contact_groups: "Danube Contact Groups"
ukr_soviet_collapse_danube_contact_groups_desc: "Contact groups study the Danube as trade route, defense line, and temptation for wider claims."
ukr_soviet_collapse_black_sea_protectorate_theory: "Black Sea Protectorate Theory"
ukr_soviet_collapse_black_sea_protectorate_theory_desc: "Strategists sketch a protectorate logic that turns survival corridors into a regional security claim."
ukr_soviet_collapse_border_referendum_offices: "Border Referendum Offices"
ukr_soviet_collapse_border_referendum_offices_desc: "Border offices prepare plebiscite language, observers, and pressure campaigns for disputed districts."
ukr_soviet_collapse_secure_the_southern_customs: "Secure the Southern Customs"
ukr_soviet_collapse_secure_the_southern_customs_desc: "Customs posts become military-political tools for controlling food, arms, refugees, and foreign missions."
ukr_soviet_collapse_league_alarm_over_kyiv: "League Alarm over Kyiv"
ukr_soviet_collapse_league_alarm_over_kyiv_desc: "League partners warn that Ukrainian security claims can become hegemony if Kyiv stops listening."
ukr_soviet_collapse_regional_staff_maps: "Regional Staff Maps"
ukr_soviet_collapse_regional_staff_maps_desc: "Maps in the general staff extend beyond the former union, changing the meaning of independence."
ukr_soviet_collapse_map_larger_than_the_union: "A Map Larger than the Union"
ukr_soviet_collapse_map_larger_than_the_union_desc: "Ukraine stops acting only as a breakaway republic and claims the right to reorder the region around it."
ukr_soviet_collapse_regularize_defense_battalions: "Regularize Defense Battalions"
ukr_soviet_collapse_regularize_defense_battalions_desc: "Emergency battalions receive tables, numbers, and supply officers before local pride breaks operational control."
ukr_soviet_collapse_dnipro_operational_school: "Dnipro Operational School"
ukr_soviet_collapse_dnipro_operational_school_desc: "Officers learn to use river lines, rail hubs, and city belts as one operational system."
ukr_soviet_collapse_territorial_rifle_corps: "Territorial Rifle Corps"
ukr_soviet_collapse_territorial_rifle_corps_desc: "Territorial corps tie manpower to home districts while preserving a central reserve for threatened fronts."
ukr_soviet_collapse_armored_stockpile_claims: "Armored Stockpile Claims"
ukr_soviet_collapse_armored_stockpile_claims_desc: "Tank parks and repair shops are claimed through inventories, guards, and commanders willing to defect."
ukr_soviet_collapse_air_defense_over_kyiv: "Air Defense over Kyiv"
ukr_soviet_collapse_air_defense_over_kyiv_desc: "Air defense crews defend the capital, depots, and radio nodes that make sovereignty visible."
ukr_soviet_collapse_black_sea_flotilla_watch: "Black Sea Flotilla Watch"
ukr_soviet_collapse_black_sea_flotilla_watch_desc: "Naval officers and port guards watch the fleet for defections, sabotage, and chances to deny Soviet landings."
ukr_soviet_collapse_cossack_cavalry_screens: "Cossack Cavalry Screens"
ukr_soviet_collapse_cossack_cavalry_screens_desc: "Mounted and motorized screens patrol open country where rail lines cannot cover every village."
ukr_soviet_collapse_engineer_bridge_commands: "Engineer Bridge Commands"
ukr_soviet_collapse_engineer_bridge_commands_desc: "Engineers receive authority over bridge demolition, repair, and guarded crossings on the major rivers."
ukr_soviet_collapse_partisan_counter_orders: "Partisan Counter-Orders"
ukr_soviet_collapse_partisan_counter_orders_desc: "Irregular warfare manuals are rewritten for a republic defending itself against the state that taught them."
ukr_soviet_collapse_combined_front_doctrine: "Combined Front Doctrine"
ukr_soviet_collapse_combined_front_doctrine_desc: "The army blends regular formations, territorial guards, rail troops, and foreign-supplied units into one front method."
ukr_soviet_collapse_army_of_the_republic: "Army of the Republic"
ukr_soviet_collapse_army_of_the_republic_desc: "Ukraine fields an army that can survive the first war and threaten a second one."
ukr_soviet_collapse_donbas_factory_accounting: "Donbas Factory Accounting"
ukr_soviet_collapse_donbas_factory_accounting_desc: "Industrial accounts show which mines, plants, and workshops can still answer Ukrainian orders."
ukr_soviet_collapse_kharkiv_design_tables: "Kharkiv Design Tables"
ukr_soviet_collapse_kharkiv_design_tables_desc: "Design bureaus are kept open under guard so technical staff do not scatter with Soviet evacuation orders."
ukr_soviet_collapse_dnipro_steel_contracts: "Dnipro Steel Contracts"
ukr_soviet_collapse_dnipro_steel_contracts_desc: "Steel contracts are rewritten around emergency rail access, military priority, and scarce coal."
ukr_soviet_collapse_odessa_repair_yards: "Odessa Repair Yards"
ukr_soviet_collapse_odessa_repair_yards_desc: "Repair yards support rail, naval, and truck needs while port politics remain unstable."
ukr_soviet_collapse_luhansk_munitions_cells: "Luhansk Munitions Cells"
ukr_soviet_collapse_luhansk_munitions_cells_desc: "Munitions cells hide tools, dies, and workers from raids that could decapitate local production."
ukr_soviet_collapse_tractor_plants_to_prime_movers: "Tractor Plants to Prime Movers"
ukr_soviet_collapse_tractor_plants_to_prime_movers_desc: "Tractor production is redirected toward artillery movers, evacuation columns, and improvised armored carriers."
ukr_soviet_collapse_coal_for_the_war_cabinet: "Coal for the War Cabinet"
ukr_soviet_collapse_coal_for_the_war_cabinet_desc: "Coal allocation becomes a cabinet question because each train decides factories, heat, and military movement."
ukr_soviet_collapse_depot_repair_brigades: "Depot Repair Brigades"
ukr_soviet_collapse_depot_repair_brigades_desc: "Repair brigades turn captured Soviet stock into usable rifles, trucks, and artillery before winter rusts it away."
ukr_soviet_collapse_technical_university_mobilization: "Technical University Mobilization"
ukr_soviet_collapse_technical_university_mobilization_desc: "Technical universities supply engineers, radio staff, mechanics, and emergency industrial planners."
ukr_soviet_collapse_republican_procurement_board: "Republican Procurement Board"
ukr_soviet_collapse_republican_procurement_board_desc: "A procurement board balances foreign aid, local contracts, military urgency, and corruption risk."
ukr_soviet_collapse_industrial_sovereignty: "Industrial Sovereignty"
ukr_soviet_collapse_industrial_sovereignty_desc: "The republic's industry stops being inherited Soviet machinery and becomes an argument for permanent statehood."
ukr_soviet_collapse_reports_from_huliaipole: "Reports from Huliaipole"
ukr_soviet_collapse_reports_from_huliaipole_desc: "Reports of black flags and elected guards force Kyiv to decide whether old enemies can be wartime partners."
ukr_soviet_collapse_village_committee_envoys: "Village Committee Envoys"
ukr_soviet_collapse_village_committee_envoys_desc: "Envoys meet village committees that distrust every ministry but know every road and requisition store."
ukr_soviet_collapse_no_requisition_without_receipts: "No Requisition Without Receipts"
ukr_soviet_collapse_no_requisition_without_receipts_desc: "Kyiv limits requisitions in black-banner districts to keep grain moving without creating a southern revolt."
ukr_soviet_collapse_free_soviet_border_posts: "Free Soviet Border Posts"
ukr_soviet_collapse_free_soviet_border_posts_desc: "Border posts manned by free soviets are tolerated if they block Soviet troops and report their movements."
ukr_soviet_collapse_anarchist_depot_bargain: "Anarchist Depot Bargain"
ukr_soviet_collapse_anarchist_depot_bargain_desc: "The republic trades autonomy guarantees for depot access, accepting military value and political embarrassment."
ukr_soviet_collapse_black_banner_rail_sabotage: "Black Banner Rail Sabotage"
ukr_soviet_collapse_black_banner_rail_sabotage_desc: "Sabotage teams strike Soviet rail movement while Kyiv tries to keep them away from Ukrainian supply trains."
ukr_soviet_collapse_committee_courts_problem: "Committee Courts Problem"
ukr_soviet_collapse_committee_courts_problem_desc: "Committee courts settle local disputes but risk becoming a rival justice system in the middle of the war."
ukr_soviet_collapse_kyiv_or_no_capitals_debate: "Kyiv or No Capitals Debate"
ukr_soviet_collapse_kyiv_or_no_capitals_debate_desc: "Ministers and black-banner delegates argue whether the emergency state is a shield or another capital to abolish."
ukr_soviet_collapse_southern_free_zone_statute: "Southern Free Zone Statute"
ukr_soviet_collapse_southern_free_zone_statute_desc: "A statute defines the free zone's obligations, autonomy, and line beyond which Kyiv will not follow."
ukr_soviet_collapse_black_international_channels: "Black International Channels"
ukr_soviet_collapse_black_international_channels_desc: "Foreign anarchists, deserters, and smugglers move through channels Kyiv can neither fully approve nor fully close."
ukr_soviet_collapse_no_masters_but_the_front: "No Masters but the Front"
ukr_soviet_collapse_no_masters_but_the_front_desc: "The black-banner alliance survives because Moscow is worse, but every victory makes the settlement harder."
ukr_soviet_collapse_what_the_republic_is_for: "What the Republic Is For"
ukr_soviet_collapse_what_the_republic_is_for_desc: "The crisis has lasted long enough that Ukraine must define more than what it refuses."
ukr_soviet_collapse_language_of_command: "Language of Command"
ukr_soviet_collapse_language_of_command_desc: "Military orders, court notices, school decrees, and ration cards choose the language of the new state."
ukr_soviet_collapse_memory_of_famine_and_war: "Memory of Famine and War"
ukr_soviet_collapse_memory_of_famine_and_war_desc: "Public memory is handled carefully because hunger, occupation, and repression can unite citizens or poison the state."
ukr_soviet_collapse_churches_under_emergency_law: "Churches under Emergency Law"
ukr_soviet_collapse_churches_under_emergency_law_desc: "Religious institutions receive protection and surveillance, reflecting both public need and wartime suspicion."
ukr_soviet_collapse_veterans_of_three_flags: "Veterans of Three Flags"
ukr_soviet_collapse_veterans_of_three_flags_desc: "Veterans who served Soviet, local, or foreign banners are sorted into the republic's memory without pretending they agree."
ukr_soviet_collapse_schools_for_a_state_at_war: "Schools for a State at War"
ukr_soviet_collapse_schools_for_a_state_at_war_desc: "Schools teach evacuation, civic duty, language, and the meaning of independence under shellfire."
ukr_soviet_collapse_citizenship_for_the_uncertain: "Citizenship for the Uncertain"
ukr_soviet_collapse_citizenship_for_the_uncertain_desc: "Citizenship rules offer a place to minorities, refugees, and former Soviet officials who accept the republic."
ukr_soviet_collapse_monuments_without_moscow: "Monuments Without Moscow"
ukr_soviet_collapse_monuments_without_moscow_desc: "Monuments are removed, renamed, or reinterpreted so the state can remember without copying Soviet erasure."
ukr_soviet_collapse_diaspora_return_offices: "Diaspora Return Offices"
ukr_soviet_collapse_diaspora_return_offices_desc: "Diaspora offices invite money, volunteers, technicians, and political arguments from abroad."
ukr_soviet_collapse_republic_after_the_crisis: "Republic after the Crisis"
ukr_soviet_collapse_republic_after_the_crisis_desc: "The government plans demobilization, constitutional settlement, and how emergency powers end if victory comes."
ukr_soviet_collapse_ukraine_after_the_union: "Ukraine after the Union"
ukr_soviet_collapse_ukraine_after_the_union_desc: "Ukraine becomes a political identity shaped by survival, food, railways, foreign pressure, and the unresolved question of power."
ukr_soviet_collapse_patronage_balance_dynamic_rewards_tt: "Patronage safeguards scale from owned states, foreign promises, patron rivalry, foreign volunteer pools, and Soviet foreign appetite."
ukr_soviet_collapse_audit_the_patron_ledgers: "Audit the Patron Ledgers"
ukr_soviet_collapse_audit_the_patron_ledgers_desc: "Every foreign promise is copied into Ukrainian ledgers before a helpful mission becomes a private claim on the state."
ukr_soviet_collapse_border_promises_registry: "Border Promises Registry"
ukr_soviet_collapse_border_promises_registry_desc: "Border, port, and transit promises are registered as state obligations, not favors owed to whichever patron arrived first."
ukr_soviet_collapse_volunteer_rolls_under_state_seal: "Volunteer Rolls under State Seal"
ukr_soviet_collapse_volunteer_rolls_under_state_seal_desc: "Foreign volunteers receive Ukrainian papers, unit assignments, and limits before their sponsors can count them as a separate army."
ukr_soviet_collapse_embassy_observer_limits: "Embassy Observer Limits"
ukr_soviet_collapse_embassy_observer_limits_desc: "Observers may inspect aid and front conditions, but Ukrainian offices decide which files and depots they are allowed to see."
ukr_soviet_collapse_intelligence_firebreak_rooms: "Intelligence Firebreak Rooms"
ukr_soviet_collapse_intelligence_firebreak_rooms_desc: "Shared intelligence is routed through firebreak rooms so outside services can help against Moscow without owning Ukrainian secrets."
ukr_soviet_collapse_credit_without_concessions: "Credit without Concessions"
ukr_soviet_collapse_credit_without_concessions_desc: "Loans, grain credits, and port insurance are rewritten to keep emergency finance from becoming postwar surrender."
ukr_soviet_collapse_arms_for_fronts_not_clients: "Arms for Fronts, Not Clients"
ukr_soviet_collapse_arms_for_fronts_not_clients_desc: "Foreign arms are assigned by front need and depot control rather than by the patron that wants a loyal ministry."
ukr_soviet_collapse_league_review_of_patrons: "League Review of Patrons"
ukr_soviet_collapse_league_review_of_patrons_desc: "Ukraine lets League partners review foreign channels so alliance trust survives even when Kyiv receives the largest missions."
ukr_soviet_collapse_diaspora_subscription_bonds: "Diaspora Subscription Bonds"
ukr_soviet_collapse_diaspora_subscription_bonds_desc: "Diaspora money is turned into public bonds, reducing dependence on foreign ministries while still feeding the emergency budget."
ukr_soviet_collapse_neutral_mission_protocols: "Neutral Mission Protocols"
ukr_soviet_collapse_neutral_mission_protocols_desc: "Military, medical, and press missions accept protocols that treat Ukraine as the host government, not a prize board."
ukr_soviet_collapse_publish_the_foreign_accounts: "Publish the Foreign Accounts"
ukr_soviet_collapse_publish_the_foreign_accounts_desc: "The government publishes enough foreign accounts to discipline patrons without exposing every channel Moscow could burn."
ukr_soviet_collapse_sovereign_patrons_doctrine: "Sovereign Patrons Doctrine"
ukr_soviet_collapse_sovereign_patrons_doctrine_desc: "Ukraine keeps patrons useful by making sovereignty the rule every mission, loan, convoy, and volunteer roll must answer."
ukr_soviet_collapse_audit_emergency_decrees: "Audit Emergency Decrees"
ukr_soviet_collapse_audit_emergency_decrees_desc: "A civilian audit separates necessary wartime orders from habits that would let the emergency state survive the war unchanged."
ukr_soviet_collapse_coalition_ombudsmen: "Coalition Ombudsmen"
ukr_soviet_collapse_coalition_ombudsmen_desc: "Coalition ombudsmen hear complaints from parties, soldiers, minorities, and cities before private grievances become Soviet propaganda."
ukr_soviet_collapse_provincial_courts_reopen: "Provincial Courts Reopen"
ukr_soviet_collapse_provincial_courts_reopen_desc: "Provincial courts return under guard, forcing commanders and ministries to justify arrests in local records."
ukr_soviet_collapse_war_crimes_registry: "War Crimes Registry"
ukr_soviet_collapse_war_crimes_registry_desc: "The republic records bombardments, reprisals, illegal requisitions, and executions so the crisis leaves evidence instead of rumor."
ukr_soviet_collapse_exile_precinct_ballots: "Exile Precinct Ballots"
ukr_soviet_collapse_exile_precinct_ballots_desc: "Refugee and exile precincts keep displaced citizens inside the constitutional process rather than outside the state."
ukr_soviet_collapse_civilian_command_statute: "Civilian Command Statute"
ukr_soviet_collapse_civilian_command_statute_desc: "A statute defines when elected ministers may overrule generals and when the front may demand secrecy from parliament."
ukr_soviet_collapse_demobilization_calendar: "Demobilization Calendar"
ukr_soviet_collapse_demobilization_calendar_desc: "The government publishes a demobilization calendar tied to front safety, depot security, and League guarantees."
ukr_soviet_collapse_republic_accountable_to_law: "Republic Accountable to Law"
ukr_soviet_collapse_republic_accountable_to_law_desc: "Ukraine claims that emergency sovereignty matters only if the state can be made answerable after victory."
ukr_soviet_collapse_soviet_trade_councils: "Soviet Trade Councils"
ukr_soviet_collapse_soviet_trade_councils_desc: "Factory, rail, and village councils bargain over quotas and front priorities without restoring command from Moscow."
ukr_soviet_collapse_unionist_amnesty_commissions: "Unionist Amnesty Commissions"
ukr_soviet_collapse_unionist_amnesty_commissions_desc: "Unionist militants may return through commissions if they accept local soviet authority and reject central reconquest."
ukr_soviet_collapse_workers_defense_exports: "Workers Defense Exports"
ukr_soviet_collapse_workers_defense_exports_desc: "Workshops export rifles, repair crews, and agitators to friendly republics, making solidarity a logistical practice."
ukr_soviet_collapse_communes_without_commissars: "Communes without Commissars"
ukr_soviet_collapse_communes_without_commissars_desc: "Local communes receive space to administer food and guards while the republic denies Moscow a monopoly on socialism."
ukr_soviet_collapse_socialist_volunteer_charter: "Socialist Volunteer Charter"
ukr_soviet_collapse_socialist_volunteer_charter_desc: "Foreign and local socialist volunteers accept a charter that binds them to Ukrainian supply discipline and civilian limits."
ukr_soviet_collapse_red_federal_terms: "Red Federal Terms"
ukr_soviet_collapse_red_federal_terms_desc: "Kyiv drafts federal terms for any future socialist union where republic consent outranks party appointment."
ukr_soviet_collapse_anti_bureaucrat_purge_limits: "Anti-Bureaucrat Purge Limits"
ukr_soviet_collapse_anti_bureaucrat_purge_limits_desc: "The purge of central loyalists is capped by evidence rules so revolutionary defense does not become ministerial revenge."
ukr_soviet_collapse_republican_socialist_commonwealth: "Republican Socialist Commonwealth"
ukr_soviet_collapse_republican_socialist_commonwealth_desc: "Ukraine offers a socialist order that can federate outward without surrendering the republic back to a single center."
ukr_soviet_collapse_front_tribunals: "Front Tribunals"
ukr_soviet_collapse_front_tribunals_desc: "Front tribunals punish treason, looting, and illegal requisition while keeping emergency justice inside written military law."
ukr_soviet_collapse_officer_oath_renewals: "Officer Oath Renewals"
ukr_soviet_collapse_officer_oath_renewals_desc: "Officers renew their oath after each campaign season, tying promotion to Ukrainian command rather than Soviet seniority."
ukr_soviet_collapse_mobilization_districts: "Mobilization Districts"
ukr_soviet_collapse_mobilization_districts_desc: "Mobilization districts balance manpower, industry, and refugee movement so the directory does not empty loyal regions first."
ukr_soviet_collapse_strategic_rail_command: "Strategic Rail Command"
ukr_soviet_collapse_strategic_rail_command_desc: "A strategic rail command moves reserves, prisoners, grain, and guns through one military schedule."
ukr_soviet_collapse_staff_college_at_war: "Staff College at War"
ukr_soviet_collapse_staff_college_at_war_desc: "The staff college trains officers from field reports, captured Soviet manuals, and League liaison files."
ukr_soviet_collapse_emergency_rank_reforms: "Emergency Rank Reforms"
ukr_soviet_collapse_emergency_rank_reforms_desc: "Rank reforms promote capable defectors and militia commanders without letting every armed committee claim command."
ukr_soviet_collapse_victory_transition_pledge: "Victory Transition Pledge"
ukr_soviet_collapse_victory_transition_pledge_desc: "The directory pledges a transition process if the crisis ends, reducing fear that military government is the final constitution."
ukr_soviet_collapse_state_of_the_directory: "State of the Directory"
ukr_soviet_collapse_state_of_the_directory_desc: "The high command becomes a state within the state, powerful enough to win and dangerous enough to restrain."
ukr_soviet_collapse_ration_courts: "Ration Courts"
ukr_soviet_collapse_ration_courts_desc: "Ration courts decide hoarding, diversion, and military priority cases before food authority becomes private punishment."
ukr_soviet_collapse_grain_export_licenses: "Grain Export Licenses"
ukr_soviet_collapse_grain_export_licenses_desc: "Export licenses turn each shipment into a recognition bargain, a supply contract, and a warning to foreign patrons."
ukr_soviet_collapse_fortress_granary_districts: "Fortress Granary Districts"
ukr_soviet_collapse_fortress_granary_districts_desc: "Granary districts combine guards, rail clerks, mills, and courts into hardened nodes of wartime administration."
ukr_soviet_collapse_famine_memory_safeguards: "Famine Memory Safeguards"
ukr_soviet_collapse_famine_memory_safeguards_desc: "Public safeguards acknowledge famine memory and limit requisition terror while preserving enough grain authority to fight."
ukr_soviet_collapse_rail_ration_priority: "Rail Ration Priority"
ukr_soviet_collapse_rail_ration_priority_desc: "Rail priority lists put flour, hospital food, coal, and front bread ahead of less vital cargo."
ukr_soviet_collapse_farmers_bargain_congress: "Farmers Bargain Congress"
ukr_soviet_collapse_farmers_bargain_congress_desc: "Farmers receive a guarded congress to bargain quotas, seed, horses, and local defense obligations with the state."
ukr_soviet_collapse_hungry_cities_compact: "Hungry Cities Compact"
ukr_soviet_collapse_hungry_cities_compact_desc: "Cities sign a compact that trades ration discipline for guaranteed minimum deliveries and militia restraint."
ukr_soviet_collapse_granary_state_doctrine: "Granary State Doctrine"
ukr_soviet_collapse_granary_state_doctrine_desc: "Ukraine defines food sovereignty as a doctrine: every ally may buy grain, but no power may command the granaries."
ukr_soviet_collapse_rotating_secretariat: "Rotating Secretariat"
ukr_soviet_collapse_rotating_secretariat_desc: "A rotating secretariat keeps the League from becoming a Ukrainian foreign ministry with extra flags."
ukr_soviet_collapse_common_frontier_fund: "Common Frontier Fund"
ukr_soviet_collapse_common_frontier_fund_desc: "The frontier fund moves money, engineers, doctors, and rail crews to whichever member faces the next Soviet thrust."
ukr_soviet_collapse_disputed_ministries_arbitration: "Disputed Ministries Arbitration"
ukr_soviet_collapse_disputed_ministries_arbitration_desc: "League arbitration handles border ministries, railway offices, and refugee agencies claimed by more than one republic."
ukr_soviet_collapse_league_refugee_bank: "League Refugee Bank"
ukr_soviet_collapse_league_refugee_bank_desc: "A refugee bank tracks food, housing, labor, and debt so displaced people do not become a weapon between members."
ukr_soviet_collapse_member_army_standards: "Member Army Standards"
ukr_soviet_collapse_member_army_standards_desc: "Common army standards let League forces cooperate without erasing their flags, languages, or command traditions."
ukr_soviet_collapse_sanctions_against_patronage: "Sanctions against Patronage"
ukr_soviet_collapse_sanctions_against_patronage_desc: "League rules penalize members that turn foreign aid into private patronage at the expense of the common front."
ukr_soviet_collapse_charter_of_equal_capitals: "Charter of Equal Capitals"
ukr_soviet_collapse_charter_of_equal_capitals_desc: "The charter writes the promise that no capital, even Kyiv, may speak for another republic without consent."
ukr_soviet_collapse_league_permanent_council: "League Permanent Council"
ukr_soviet_collapse_league_permanent_council_desc: "The emergency coalition becomes a permanent council designed to survive victory, rivalry, and foreign recognition."
ukr_soviet_collapse_black_sea_customs_mission: "Black Sea Customs Mission"
ukr_soviet_collapse_black_sea_customs_mission_desc: "Customs missions follow ports, grain, fuel, and refugee traffic beyond inherited borders without openly declaring annexation."
ukr_soviet_collapse_odessa_security_conference: "Odessa Security Conference"
ukr_soviet_collapse_odessa_security_conference_desc: "The Odessa conference turns naval routes, port police, and foreign observers into arguments for Ukrainian security leadership."
ukr_soviet_collapse_dniester_observer_line: "Dniester Observer Line"
ukr_soviet_collapse_dniester_observer_line_desc: "Observer posts along the Dniester freeze the frontier while Kyiv learns how much influence can exist without a formal border."
ukr_soviet_collapse_danube_guarantee_notes: "Danube Guarantee Notes"
ukr_soviet_collapse_danube_guarantee_notes_desc: "Guarantee notes promise navigation and minority protections while keeping the Danube inside Ukrainian strategic planning."
ukr_soviet_collapse_protectorate_without_annexation: "Protectorate without Annexation"
ukr_soviet_collapse_protectorate_without_annexation_desc: "Kyiv experiments with protection treaties that bind neighbors to Ukrainian security without painting the map too quickly."
ukr_soviet_collapse_border_plebiscite_commissions: "Border Plebiscite Commissions"
ukr_soviet_collapse_border_plebiscite_commissions_desc: "Plebiscite commissions prepare legal language, watchers, and relief promises for contested border districts."
ukr_soviet_collapse_league_containment_bargain: "League Containment Bargain"
ukr_soviet_collapse_league_containment_bargain_desc: "Ukraine bargains with the League over what expansion can be accepted as defense and what must be restrained."
ukr_soviet_collapse_dnipro_commonwealth: "Dnipro Commonwealth"
ukr_soviet_collapse_dnipro_commonwealth_desc: "The republic imagines a wider commonwealth of ports, rivers, railways, and guarantees centered on Kyiv but not simply annexed by it."
ukr_soviet_collapse_reserve_rotation_law: "Reserve Rotation Law"
ukr_soviet_collapse_reserve_rotation_law_desc: "Reserve rotation keeps front units from becoming local warlord formations while giving districts a predictable share of service."
ukr_soviet_collapse_river_flotilla_cadres: "River Flotilla Cadres"
ukr_soviet_collapse_river_flotilla_cadres_desc: "River flotilla cadres guard crossings, ferry guns, and deny Soviet raids along the Dnipro system."
ukr_soviet_collapse_air_warning_belt: "Air Warning Belt"
ukr_soviet_collapse_air_warning_belt_desc: "An air warning belt links observers, radios, and city defense committees before raids can silence the capital."
ukr_soviet_collapse_depot_artillery_schools: "Depot Artillery Schools"
ukr_soviet_collapse_depot_artillery_schools_desc: "Captured depots supply artillery schools that train crews from old Soviet stocks and emergency repair tables."
ukr_soviet_collapse_railway_corps_command: "Railway Corps Command"
ukr_soviet_collapse_railway_corps_command_desc: "The railway corps becomes a military arm responsible for armored trains, bridge repair, and troop timetables."
ukr_soviet_collapse_intelligence_platoon_net: "Intelligence Platoon Net"
ukr_soviet_collapse_intelligence_platoon_net_desc: "Small intelligence platoons feed front commanders reports from villages, rail workers, refugees, and League liaisons."
ukr_soviet_collapse_veteran_settlement_rolls: "Veteran Settlement Rolls"
ukr_soviet_collapse_veteran_settlement_rolls_desc: "Veteran rolls promise land, work, or pensions so the army can demobilize without throwing armed men into politics."
ukr_soviet_collapse_national_defense_army: "National Defense Army"
ukr_soviet_collapse_national_defense_army_desc: "The emergency forces become a national defense army built from regulars, territorials, rail troops, and vetted volunteers."
ukr_soviet_collapse_mine_safety_boards: "Mine Safety Boards"
ukr_soviet_collapse_mine_safety_boards_desc: "Mine safety boards keep coal flowing without letting emergency production bury workers faster than the front consumes shells."
ukr_soviet_collapse_machine_tool_census: "Machine Tool Census"
ukr_soviet_collapse_machine_tool_census_desc: "A machine-tool census locates lathes, presses, dies, and skilled crews that Soviet evacuation orders failed to remove."
ukr_soviet_collapse_port_cranes_priority: "Port Cranes Priority"
ukr_soviet_collapse_port_cranes_priority_desc: "Port cranes receive military priority because each repaired crane changes grain exports, arms landings, and evacuation capacity."
ukr_soviet_collapse_electrical_grid_guards: "Electrical Grid Guards"
ukr_soviet_collapse_electrical_grid_guards_desc: "Grid guards defend substations, repair crews, and coal deliveries from sabotage and desperate requisition teams."
ukr_soviet_collapse_wartime_patents_bureau: "Wartime Patents Bureau"
ukr_soviet_collapse_wartime_patents_bureau_desc: "A wartime patents bureau records emergency designs so engineers cooperate without losing every claim to the state."
ukr_soviet_collapse_foreign_contracts_audit: "Foreign Contracts Audit"
ukr_soviet_collapse_foreign_contracts_audit_desc: "Foreign contracts are audited for spare parts, debt traps, and patron concessions before they enter factory ledgers."
ukr_soviet_collapse_reconstruction_bonds: "Reconstruction Bonds"
ukr_soviet_collapse_reconstruction_bonds_desc: "Bonds finance rail repair, housing, and plant recovery while tying postwar reconstruction to public accounts."
ukr_soviet_collapse_arsenal_economy: "Arsenal Economy"
ukr_soviet_collapse_arsenal_economy_desc: "Ukraine organizes an arsenal economy able to repair, feed, arm, and rebuild without returning to Soviet ministries."
ukr_soviet_collapse_huliaipole_black_flag: "The Black Flag at Huliaipole"
ukr_soviet_collapse_huliaipole_black_flag_desc: "Reports from the southern villages speak of black flags, elected guards, and committees that answer neither Kyiv nor Moscow."
ukr_soviet_collapse_ukrainian_commune_debate_mechanics_tt: "Opens the commune settlement debate, raises local authority and recognition, and adds pressure on Moscow's old-movement control if the Union Crisis is active."
ukr_soviet_collapse_equipment_corridor_authority_mechanics_tt: "Places foreign supply corridors under Ukrainian authority, strengthens depot control and liaison reach, and unlocks League unit deployment tools."
