l_english:
chaosx.nr74.1.t: "Japan in California"
chaosx.nr74.2.t: "We landed in California!"
chaosx.nr74.2.d: "Our nation has made a bold move, landing forces in California. This decisive action signals our determination to demonstrate our military prowess and challenge the dominance of the Americans on their own soil."
chaosx.nr74.2.a: "Luck is on our side!"

chaosx.news.65.t: "Japan lands in California!"
chaosx.news.65.d: "The successful landing of Japanese forces in California sends shockwaves across the Pacific, altering the course of the war. With California under Japanese control, the balance of power shifts dramatically, raising concerns about the war's outcome and the security of the Americans."
chaosx.news.65.a: "How?!"
