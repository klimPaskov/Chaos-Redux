chaosx.nr28.1.t: "Large Asteroid Incoming"
chaosx.nr28.1.d: "Our scientist are trying to calculate where a large asteroid will land. Asteroid will land in a random location and will destroy huge amount of industry and kill a lot of people in impacted states. If we predict right we will get a massive boost to our research"
chaosx.nr28.1.a: "It will land somewhere in [?global.asteroid_country.GetName]"
chaosx.nr28.1.b: "It will land somewhere in [?global.rand_country_1.GetName]"
chaosx.nr28.1.c: "It will land somewhere in [?global.rand_country_2.GetName]"
chaosx.nr28.1.e: "It will land somewhere in [?global.rand_country_1.GetName]"
chaosx.nr28.1.f: "It will land somewhere in [?global.asteroid_country.GetName]"
chaosx.nr28.1.g: "It will land somewhere in [?global.rand_country_2.GetName]"
chaosx.nr28.1.h: "It will land somewhere in [?global.rand_country_1.GetName]"
chaosx.nr28.1.i: "It will land somewhere in [?global.rand_country_2.GetName]"
chaosx.nr28.1.j: "It will land somewhere in [?global.asteroid_country.GetName]"
chaosx.nr28.1.k: "It will not land on Earth!"

chaosx.nr28.2.t: "Asteroid Incoming"

chaosx.news.29.t: "Asteroid Incoming"
chaosx.news.29.d: "With the specter of a looming asteroid impact casting a shadow of uncertainty and apprehension, scientists in [FROM.GetName] have embarked on a frantic race against time to calculate the precise location where the colossal celestial object is projected to make landfall. Armed with cutting-edge technology and mathematical models, these dedicated experts are working tirelessly to provide vital information that could determine the fate of millions."
chaosx.news.29.a: "Where will it land?"

chaosx.news.30.t: "[FROM.FROM.GetName] Saves Millions!"
chaosx.news.30.d: "In a remarkable triumph of scientific precision and foresight, the asteroid prediction efforts led by scientists in [FROM.FROM.GetName] have proven to be correct, leading to the successful evacuation of industry and population from the calculated impact region. With the imminent threat looming large, the accuracy of the prediction has enabled timely and effective measures to be implemented, ultimately saving countless lives and averting a catastrophic disaster."
chaosx.news.30.a: "They saved millions!"

chaosx.news.32.t: "Asteroid Impact"
chaosx.news.32.d: "In a devastating turn of events, [FROM.GetName] faces the catastrophic impact of a massive asteroid, plunging the nation into a state of emergency and turmoil. With the celestial threat looming large in the skies above, the resilience and preparedness of [FROM.GetName] are put to the ultimate test as citizens and authorities grapple with the immediate aftermath of the disaster."
chaosx.news.32.a: "God save those people!"
