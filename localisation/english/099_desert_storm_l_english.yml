chaosx.nr99.1.t: "Sandstorm"

chaosx.nr99.2.t: "Sandstorm"
chaosx.nr99.2.d: "A formidable sandstorm blankets the continent of [GetSandstormContinent], enveloping vast expanses of land in a dense cloak of dust and debris. This atmospheric tempest, characterized by its formidable force and breadth, disrupts transportation, issues health warnings, and disrupts the daily routines of millions. Authorities issue urgent advisories, urging residents to take shelter indoors to mitigate respiratory issues and hazardous visibility conditions."
chaosx.nr99.2.a: "Horrible, horrible"
