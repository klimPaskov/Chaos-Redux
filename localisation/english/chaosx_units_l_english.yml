l_english:
zombies: "Zombies Horde"
zombies_desc: "Zombies don't consume supply and they only use men for their divisions"
infected_zombies: "Infected Horde"
infected_zombies_desc: "A living infected mass driven by a weaponized neurobiological plague. It is the baseline strain for controlled outbreak deployment."
rabid_zombies: "Rabid Horde"
rabid_zombies_desc: "A rage-driven horde built for speed and immediate shock action. It hits fast, but it is less stable in prolonged fighting."
parasitic_zombies: "Parasitic Horde"
parasitic_zombies_desc: "A coordinated outbreak sustained by parasitic takeover. It balances mobility and resilience better than common infected swarms."
mutant_zombies: "Mutant Horde"
mutant_zombies_desc: "A transformed bioweapon strain that has begun to outgrow its original pathology. It is faster and more brutal than common infected, but less stable than the dead types."
undead_zombies: "Undead Horde"
undead_zombies_desc: "A reanimated dead horde. It is slow, dense, and difficult to break."
necrotic_zombies: "Necrotic Horde"
necrotic_zombies_desc: "A heavily decayed reanimation strain hardened into a siege formation. It is the most stubborn of the conventional dead types."
demonic_zombies: "Demonic Zombie Horde"
demonic_zombies_desc: "An extra-scientific corruption given form as a zombie host. It carries aggressive striking power and unsettling resilience."
wendigo_zombies: "Wendigo Pack"
wendigo_zombies_desc: "A predatory convergence strain with an armored hide, closer to an evolved monster than a controllable outbreak."
armored_undead_zombies: "Undead Horde"
armored_undead_zombies_desc: "A reanimated dead horde hardened by an unusually extreme profile of strength and durability."
armored_necrotic_zombies: "Necrotic Horde"
armored_necrotic_zombies_desc: "A heavily decayed reanimation strain whose strongest specimens have thickened into an armored wall of dead flesh."
armored_demonic_zombies: "Demonic Zombie Horde"
armored_demonic_zombies_desc: "An extra-scientific corruption reinforced by an exceptionally strong and durable host profile."
livens_projector_support: "Livens Projector Company"
livens_projector_support_desc: "A specialized chemical warfare support unit equipped with Livens projectors for delivering gas drums in sudden, concentrated salvoes. The selected projectile type determines its battlefield effects. While engaged in combat, it can contribute to local chemical contamination. Chemical weapon deployment from this unit increases international condemnation."
livens_projector_support_chlorine: "Livens Chlorine Company"
livens_projector_support_chlorine_desc: "Livens projector support company configured for chlorine payload employment. Requires chlorine cylinders and increases international condemnation when used."
