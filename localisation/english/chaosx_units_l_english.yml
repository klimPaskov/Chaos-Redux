chaos_battalion: "Chaos Battalion"
chaos_battalion_desc: "An elite extermination assault battalion built for catastrophic breakthrough attacks and contamination warfare. It excels in fortifications, cities, and dense wet terrain, but is notably weaker in open dry ground, mountains, river crossings, and amphibious assaults.\n\nRequired to appear in Division Designer: Chaos Battalion I, Chlorine Gas, Phosgene, Mustard Gas, Lewisite, Sarin, Soman, Anthrax Bomb Delivery Systems, Plague Bomb Delivery Systems, Tularemia Bomb Delivery Systems, and available Light Tank Flame Chassis equipment.\n\nSpecial-project-gated requirements: Sarin Program and Soman Program projects (for Sarin/Soman tech), plus Anthrax Bomb, Plague Bomb, and Tularemia Bomb projects (for their delivery-system techs).\n\nIf Chaos Battalion was unlocked before these requirements were completed and it still does not appear after you complete them, save and reload the game."
