chaos_meter.window.air.overview_header.tt: "Quick summary of contamination escalation rules."
chaos_meter.window.air.overview_body: "§YMonthly model§!:\n- Chemical state: §Y+[?global.air_contamination_chemical_state_gain_percent|.2]%§!\n- Outbreak state: §Y+[?global.air_contamination_outbreak_state_low_gain_percent|.2]% to +[?global.air_contamination_outbreak_state_high_gain_percent|.2]%§!\n- Nuke: §Y+[?global.air_contamination_nuke_gain_percent|.1]%§!, Thermonuke: §Y+[?global.air_contamination_thermonuclear_gain_percent|.1]%§!\n- Active natural recovery: §G-[?global.air_contamination_decay_percent|.3]%§!\n\nEach 1% of global contamination increases attrition, reduces monthly population growth, and lowers weekly stability for every normal country.\n\n§YThresholds§!:\n- §Y[?global.air_contamination_threshold_spread_percent|.0]%§!: outbreak spread pressure rises\n- §Y[?global.air_contamination_threshold_winter_percent|.0]%§!: nuclear winter can start\n- §Y[?global.air_contamination_threshold_severe_winter_percent|.0]%§!: severe nuclear winter can start\n- §Y[?global.air_contamination_threshold_irreversible_percent|.0]%§!: irreversible contamination and state degradation"
