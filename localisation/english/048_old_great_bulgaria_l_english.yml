chaosx.news.51.t: "Old Great Bulgaria"
chaosx.news.51.d: "[FROM.GetName] has made a bold announcement, declaring its ambitions to restore the boundaries of the ancient Old Great Bulgaria. With Bulgaria calling for neighboring countries to cede what it perceives as its rightful lands, tensions in the region are on the rise as diplomatic discussions ensue to address the implications of this assertive stance."
chaosx.news.51.a: "Who's next?"
