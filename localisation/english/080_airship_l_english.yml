l_english:
chaosx.nr80.1.t: "Airship"

chaosx.nr80.2.t: "Airship"
chaosx.nr80.2.d: "Our nation is tasked with ensuring the safety and hospitality of the USA airship expedition as it embarks on its journey to explore the world. It is imperative that we demonstrate our commitment to international cooperation and showcase the beauty and wonders of our country to the expedition crew."
chaosx.nr80.2.a: "More responsibilities..."

chaosx.nr80.3.t: "Our airship"
chaosx.nr80.3.d: "As our nation's airship sets out to explore the world amidst ongoing global conflicts, ensuring its safety becomes paramount. In a world marred by war, we must navigate carefully, deploying necessary precautions to protect our expedition from potential dangers."
chaosx.nr80.3.a: "Oh the people!"

chaosx.nr80.4.t: "Airship crashed!"
chaosx.nr80.4.d: "The crash of the USA airship on our soil presents our nation with dire consequences, potentially leading to heightened tensions and the looming specter of war with the USA."
chaosx.nr80.4.a: "It was an accident!"

chaosx.nr80.5.t: "[FROM.GetName] crashed our airship!"
chaosx.nr80.5.d: ""
chaosx.nr80.5.a: "They are officially dead"

chaosx.nr80.6.t: "Airship"
chaosx.nr80.6.d: "Our nation rejoices as our airship expedition successfully returns home, defying the odds and completing its journey without incident."
chaosx.nr80.6.a: "It's party time!"

chaosx.nr80.7.t: "Airship arrives back safely!"
chaosx.nr80.7.d: ""
chaosx.nr80.7.a: "A miracle!"

chaosx.nr80.8.t: "The Airship is over our country!"
chaosx.nr80.8.d: "We will not let it crash on our soil!"
chaosx.nr80.8.a: "Look, there!"

chaosx.nr80.9.t: "The Airship has left our country!"
chaosx.nr80.9.d: "We have been able to prevent the airship from crashing on our soil."
chaosx.nr80.9.a: "A relief!"

chaosx.news.69.t: "The Airship is back home!"
chaosx.news.69.d: "Against all odds, the USA airship has triumphantly returned home after a perilous journey fraught with uncertainty. Despite facing daunting challenges and the looming threat of never returning, the airship has emerged unscathed."
chaosx.news.69.a: "Fairy tales are more than true"

chaosx.news.70.t: "Airship crashed in [FROM.GetName]"
chaosx.news.70.d: "A high-profile airship expedition launched by the USA to explore the world has ended in tragedy after the vessel crashed in a foreign country, igniting a bitter conflict between the two nations. The crash site becomes a flashpoint of tension as the host country accuses the USA of violating its airspace and sovereignty. In response, the USA demands access to the crash site for investigation, escalating tensions and triggering a war between the two nations."
chaosx.news.70.a: "Oh, the humanity"
