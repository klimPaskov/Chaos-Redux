l_english:
chaosx.nr91.1.t: "The World Revolution"

chaosx.nr91.2.t: "The World Revolution"
chaosx.nr91.2.d: "Chaos reigns as communism spreads its grip across nations. With Lenin's mysterious return, revolutionary committees are trying to turn every communist-controlled state into a front of the World Revolution.\n\nAgitation zones raise scattered local cells. Insurgent strongholds provide organized militias. Communist lockdown zones become prepared red bases with the strongest rebel formations."
chaosx.nr91.2.a: "Destroy communism for once and for all"

chaosx.nr91.3.t: "The World Revolution"
chaosx.nr91.3.d: "In our country, the resurgence of communism amid the global chaos triggered by Lenin's return prompts a conflicted response. Some view it as an opportunity to align with the global movement, seeing potential benefits in solidarity and ideological unity."
chaosx.nr91.3.a: "That's not our revolution"
chaosx.nr91.3.b: "Join the cause!"
