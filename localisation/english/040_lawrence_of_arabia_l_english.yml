chaosx.nr40.2.t: "Lawrence of Arabia triumphs!"
chaosx.nr40.2.d: ""
chaosx.nr40.2.a: "We will call it Newarabialand!"

chaosx.news.45.t: "Lawrence of Arabia"
chaosx.news.45.d: "In a stunning diplomatic maneuver reminiscent of his legendary exploits, Lawrence of Arabia has orchestrated the allegiance of an Arabian country to the United Kingdom, effectively puppeting them into becoming part of the UK's colonial empire. Leveraging his influence and rapport with local leaders, Lawrence has navigated intricate political landscapes to secure this strategic alliance."
chaosx.news.45.a: "He is on it again"
