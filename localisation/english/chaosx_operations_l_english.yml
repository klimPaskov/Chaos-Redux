l_english:
operation_plant_plague_outbreak: "Plant Plague Outbreak"
operation_plant_plague_outbreak_desc: "Send operatives to discreetly seed a controlled outbreak in a selected enemy state. Success depends on network coverage and mission execution."
operation_plant_smallpox_outbreak: "Plant Smallpox Outbreak"
operation_plant_smallpox_outbreak_desc: "Send operatives to quietly trigger a severe outbreak in a selected enemy state. The mission is costly, dangerous, and politically explosive if exposed."
operation_plant_weaponized_zombie_outbreak: "Plant Weaponized Zombie Outbreak"
operation_plant_weaponized_zombie_outbreak_desc: "Send operatives to introduce a weaponized zombie outbreak in a selected enemy state. The final effect follows the profile developed by the creator country."
operation_plant_bioweapon_outcome_tt: "The operation rolls an abstract success chance from mission preparation, network strength, and payload profile. On success, the selected state suffers the matching outbreak effect."
bioweapon_plant_reservoir: "Prepare Local Contact Points"
bioweapon_plant_reservoir_desc: "Operatives prepare quiet access routes and local contact points before the main action begins."
bioweapon_plant_reservoir_outcome: "The team established the necessary local access without drawing attention."
bioweapon_seed_medical_chain: "Compromise Response Channels"
bioweapon_seed_medical_chain_desc: "Operatives disrupt early warning and response channels so the target reacts more slowly."
bioweapon_seed_medical_chain_outcome: "The target's local response network was confused long enough for the mission to proceed."
bioweapon_contaminate_transport_hub: "Stage the Outbreak"
bioweapon_contaminate_transport_hub_desc: "Operatives stage the outbreak through abstract covert placement in the selected state."
bioweapon_contaminate_transport_hub_outcome: "The team completed the final staging action and withdrew before confirmation reached local authorities."
