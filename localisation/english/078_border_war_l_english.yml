chaosx.nr78.1.t: "Border war"
chaosx.nr78.1.d: "Tensions escalate as our neighbor [?border_war_country.GetName] lays claim to lands along our border, sparking a potential border war."

chaosx.nr78.2.a: "Announce our readiness"
chaosx.nr78.2.b: "Just end them"

chaosx.nr78.3.t: "Start the border war!"
chaosx.nr78.3.d: "Our neighbor has announced their readiness"
chaosx.nr78.3.a: "Engage!"

chaosx.nr78.4.t: "We won a battle!"
chaosx.nr78.4.d: ""
chaosx.nr78.4.a: "Just a few more victories!"

chaosx.nr78.5.t: "We lost a battle!"
chaosx.nr78.5.d: ""
chaosx.nr78.5.a: "Could be worse"

chaosx.nr78.6.t: "Battle cancelled"
chaosx.nr78.6.d: ""
chaosx.nr78.6.a: "Mhm"

chaosx.news.78.t: "Border War!"
chaosx.news.78.d: "Tensions along the border between [?global.border_war_country.GetName] and [FROM.GetName] have escalated as clashes continue in the ongoing conflict between the two nations. The border has become a volatile front line where forces from both sides engage in fierce battles for territorial control. With no end in sight to the conflict, the region remains gripped by uncertainty and fear as civilians brace for the impact of escalating violence along the border."
chaosx.news.78.a: "Conflicts will never end..."
