l_english:
chaosx.nr10.1.t: "Symbol of War/Peace"
chaosx.nr10.2.t: "Path to Glory: A Crossroads of War and Peace"
chaosx.nr10.2.d: "As our nation stands at a critical juncture, a unique opportunity has emerged, presenting a choice between becoming an exemplar of war and heroism or a shining beacon of peace and prosperity. This momentous decision not only shapes our nation's destiny but also positions us as a model for others to idolize on the world stage.\n\nOpting for the heroic path, our nation can commit to a resolute and ambitious military campaign, demonstrating unparalleled bravery and determination on the battlefield. This option aims to forge a legacy of war and heroism, with the world looking to our nation as a paragon of military might.\n\nChoosing the path of peace and prosperity, our nation can prioritize diplomatic solutions, economic development, and international cooperation. This option seeks to showcase our commitment to stability and well-being, positioning us as an example for others to emulate."
chaosx.nr10.2.a: "We are the symbol of war"
chaosx.nr10.2.b: "We are the symbol of peace"
chaosx.nr10.2.c: "We can't even lead our own people!"

chaosx.nr10.3.t: "[From.GetName] is the symbol of War"
chaosx.nr10.3.d: "In a diplomatic appeal that echoes across international borders, [From.GetName] has emerged as a symbol of war, seeking support and respect from the global community. The nation has reached out to other nations in a bid to forge alliances and garner recognition for its strategic position. Shall we join them?"
chaosx.nr10.3.a: "We must idolize them"
chaosx.nr10.3.b: "They are no better than us"

chaosx.nr10.4.t: "[From.GetName] is the symbol of Peace"
chaosx.nr10.4.d: "In a diplomatic appeal that echoes across international borders, [From.GetName] has emerged as a symbol of peace and prosperity, seeking support and respect from the global community. The nation has reached out to other nations in a bid to forge alliances and garner recognition for its successes. Shall we join them?"
chaosx.nr10.4.a: "We must idolize them"
chaosx.nr10.4.b: "They are pathetic losers"

chaosx.nr10.5.t: "[From.GetName] supports us!"
chaosx.nr10.5.d: ""
chaosx.nr10.5.a: "Great!"

chaosx.nr10.6.t: "[From.GetName] denies us!"
chaosx.nr10.6.d: ""
chaosx.nr10.6.a: "How unwise!"

chaosx.news.7.t: "Nation Forges Ahead in Heroic Crusade"
chaosx.news.7.d: "In a bold and resolute move, [Root.GetName] has chosen the path of war and heroism, embarking on a military campaign that has captured the attention of the world. With unparalleled determination, our nation has set out to forge a legacy of unyielding valor and martial prowess, demonstrating the strength and courage of our armed forces.\n\nReports from the frontlines indicate swift and decisive military actions, with [Root.GetName]'s forces showcasing remarkable prowess in strategic planning and tactical execution. The nation has rallied behind the call for a heroic crusade, as citizens express unwavering support for their troops and leaders."
chaosx.news.7.a: "Really?"

chaosx.news.8.t: "A Model of Diplomacy"
chaosx.news.8.d: "In a groundbreaking move towards stability and global harmony, [Root.GetName] has chosen the path of peace and prosperity, positioning itself as a model for other nations to follow. By prioritizing diplomatic solutions, economic development, and international cooperation, our nation is paving the way for a future defined by stability and well-being.\n\nReports from diplomatic circles indicate successful negotiations, economic partnerships, and collaborative initiatives aimed at fostering peace. [Root.GetName]'s commitment to dialogue and cooperation has garnered widespread admiration from nations around the world, earning diplomatic bonuses and fostering positive international relations."
chaosx.news.8.a: "Are they?"
