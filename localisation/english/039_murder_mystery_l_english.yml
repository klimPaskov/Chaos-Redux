chaosx.nr39.1.t: "Murder Mystery"

chaosx.nr39.2.t: "Our Country Leader has been assassinated!"
chaosx.nr39.2.d: "Under unknown circumstances our country leader has been assassinated. [From.GetLeader] has taken over. The mysterious villain has proved elusive as we are unable to uncover the details of the murder."
chaosx.nr39.2.a: "Nobody's safe"

chaosx.news.44.t: "Murder Mystery"
chaosx.news.44.d: "The leader of [From.GetName], [From.GetLeader] has been assassinated under mysterious circumstances, sending shockwaves through the nation and the international community. Their beloved leader, known for his charisma and leadership, was targeted in a brazen attack that has left authorities scrambling for answers.\nDetails surrounding the assassination remain scarce, with speculation running rampant about the identity and motives of the assailant. As investigations intensify, conspiracy theories abound, fueling uncertainty and fear among the populace."
chaosx.news.44.a: "Disturbing..."
