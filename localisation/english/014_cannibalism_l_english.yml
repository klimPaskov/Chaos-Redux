chaosx.nr14.1.t: "Cannibalism"
chaosx.nr14.2.t: "Cannibalism"
chaosx.nr14.2.d: "Our soldiers are eating people! Even when food supplies are fulfilled, our soldiers don't seem to want to eat anything else than human meat. Let's hope that's a temporary problem."
chaosx.nr14.2.a: "War calls for desperate measures"
chaosx.nr14.2.b: "We must stop it!"
chaosx.nr14.2.c: "We must stop it!"

chaosx.news.17.t: "Cannibalism"
chaosx.news.17.d: "A shocking revelation has emerged from the testimonies of former prisoners of war and local witnesses who claim that the [From.GetName] army engaged in cannibalism during their war. According to these sources, [From.GetAdjective] soldiers and officers not only killed and ate their enemies, but also their own comrades and civilians in the territories they occupied."
chaosx.news.17.a: "Survival of the fittest"
