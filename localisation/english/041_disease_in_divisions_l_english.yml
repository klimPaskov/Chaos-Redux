l_english:
chaosx.nr41.1.t: "Disease in divisions"

chaosx.nr41.2.t: "Disease in divisions!"
chaosx.nr41.2.d: "Amidst the chaos of war, a sudden disease outbreak has struck frontline divisions within our nation, incapacitating soldiers and disrupting military operations. The origin and nature of the illness remain elusive, posing a significant challenge to medical teams and military leadership tasked with containing the outbreak while maintaining combat readiness. Our nation now faces a race against time to mitigate the spread of the disease and safeguard the health and effectiveness of our armed forces."
chaosx.nr41.2.a: "A Disaster!"

chaosx.news.46.t: "Sudden Disease in [From.GetName]"
chaosx.news.46.d: "A sudden and alarming disease outbreak has struck the frontline divisions of [From.GetName] as they engage in combat on the battlefield. Reports indicate that soldiers within these divisions have been afflicted by a mysterious illness, causing widespread concern among military authorities and medical personnel."
chaosx.news.46.a: "Let's just go home..."
