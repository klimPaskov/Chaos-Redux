chaosx.nr92.1.t: "Greenland sale"
chaosx.nr92.2.t: "Sell Greenland?"
chaosx.nr92.2.d: ""
chaosx.nr92.2.a: "Put Greenland on sale"
chaosx.nr92.2.b: "Keep Greenland!"

chaosx.nr92.3.t: "Greenland sale"
chaosx.nr92.3.d: "Greenland is put up for sale. With the vast island on offer, our government faces the urgency of seizing this chance before it slips away"
chaosx.nr92.3.a: "Unexpected"

chaosx.nr92.4.t: "Greenland sold"
chaosx.nr92.4.d: "Our country has successfully completed the purchase of Greenland. This significant acquisition opens up new opportunities and possibilities for our nation. As celebrations ensue, there's a sense of pride and anticipation for what lies ahead."
chaosx.nr92.4.a: "Hippity Hoppity"

chaosx.news.73.t: "Greenland sold to [FROM.GetName]"
chaosx.news.73.d: "In a historic transaction, Greenland, the world's largest island, has been sold to [FROM.GetName], marking a significant shift in geopolitical dynamics."
chaosx.news.73.a: "Who needs ice?"
