l_english:
soviet_collapse_register_defecting_barracks: "Register Defecting Barracks"
soviet_collapse_register_defecting_barracks_desc: "Local officers, quartermasters, and barracks committees are recorded under republican authority before Moscow can order them away or dissolve their depots."
soviet_collapse_focus_decision_register_defecting_barracks_cost: "Costs: £pol_power §R12§!, £manpower_texticon §R450§!, £infantry_equipment_text_icon §R90§!. Unlock: army, opening, or capital-defense focus preparation."
soviet_collapse_register_defecting_barracks_tt: "Converts defecting barracks into a scaled local defense package. Adds dynamically scaled manpower, infantry equipment, and emergency units through the breakaway support system."
soviet_collapse_raise_railway_guards: "Raise Railway Guards"
soviet_collapse_raise_railway_guards_desc: "Rail workers and local soldiers form guarded timetable companies to protect stations, supply nodes, and republic troop movements."
soviet_collapse_focus_decision_raise_railway_guards_cost: "Costs: £pol_power §R20§!, £manpower_texticon §R900§!, £infantry_equipment_text_icon §R180§!, £support_equipment_text_icon §R25§!, £GFX_train_texticon §R2§!. Unlock: rail, depot, logistics, or corridor focuses."
soviet_collapse_raise_railway_guards_tt: "Spawns a Railway Guard Company, raises depot control, and strengthens rail objective preparation."
soviet_collapse_guard_grain_convoys: "Guard Grain Convoys"
soviet_collapse_guard_grain_convoys_desc: "Armed convoy offices protect grain shipments, port schedules, and ration trains moving under Ukrainian authority."
soviet_collapse_focus_decision_guard_grain_convoys_cost: "Costs: £pol_power §R12§!, £GFX_fuel_texticon §R150§!, £support_equipment_text_icon §R25§!. Unlock: Ukrainian grain, bread, depot, or industry focuses."
soviet_collapse_guard_grain_convoys_tt: "Improves stability and adds recognition progress by proving that Ukrainian supply institutions can feed civilians and armies."
soviet_collapse_accept_foreign_training_cadres: "Accept Foreign Training Cadres"
soviet_collapse_accept_foreign_training_cadres_desc: "Foreign instructors are embedded in republican units under local command, with political officers tracking concessions and patron pressure."
soviet_collapse_focus_decision_accept_foreign_training_cadres_cost: "Costs: £pol_power §R20§!, £infantry_equipment_text_icon §R180§!, £support_equipment_text_icon §R55§!. Unlock: foreign aid, recognition corridor, or liaison focuses. Heavy support use risks worsening the Union Crisis."
soviet_collapse_accept_foreign_training_cadres_tt: "Spawns a Foreign Training Cadre, grants dynamic army experience, and raises Foreign Penetration, Armed Breakaway Momentum, and Command Obedience risk on the Soviet crisis meter."
soviet_collapse_raise_mountain_pass_detachments: "Raise Mountain Pass Detachments"
soviet_collapse_raise_mountain_pass_detachments_desc: "Mountain districts organize local pass guards with enough equipment and staff to hold roads that regular commands can no longer supervise."
soviet_collapse_focus_decision_raise_mountain_pass_detachments_cost: "Costs: £pol_power §R20§!, £manpower_texticon §R900§!, £infantry_equipment_text_icon §R180§!, £support_equipment_text_icon §R25§!. Unlock: Caucasus, Tajik, mountain, pass, or regional army focuses."
soviet_collapse_raise_mountain_pass_detachments_tt: "Spawns a Mountain Pass Detachment suited to regional defense and pass-control objectives."
soviet_collapse_raise_steppe_patrols: "Raise Steppe Patrols"
soviet_collapse_raise_steppe_patrols_desc: "Mounted and motor-pool patrol columns connect distant settlements, rail stations, and border posts before the steppe fragments into isolated commands."
soviet_collapse_focus_decision_raise_steppe_patrols_cost: "Costs: £pol_power §R20§!, £manpower_texticon §R900§!, £GFX_fuel_texticon §R150§!, £infantry_equipment_text_icon §R180§!. Unlock: Kazakhstan, Central Asian, steppe, federation, or mobility focuses."
soviet_collapse_raise_steppe_patrols_tt: "Spawns Steppe Patrol Columns for southern and Kazakh route defense, with mobility suited to wide-front crisis objectives."
