l_english:
chaosx.nr12.1.t: "Formation of Africa"
chaosx.nr12.2.t: "Form Africa?"
chaosx.nr12.2.d: "The figurehead leading this movement, known as the King of Africa, has emerged with a vision of pan-African unity, transcending historical divisions and fostering a sense of shared identity. The King of Africa is envisioned as a unifying symbol, embodying the aspirations and common heritage of the African people."
chaosx.nr12.2.a: "Unite Africa under one!"
chaosx.nr12.2.b: "That would end badly"

chaosx.nr12.3.t: "Africa question"
chaosx.nr12.3.d: "Under the leadership of the King of Africa, [From.GetName] has extended an open invitation to all African nations, calling for dialogue, cooperation, and collaboration towards the realization of a united Africa. The call emphasizes the shared history, cultural ties, and collective potential of the continent to address common challenges and seize opportunities. We should we cede them our African lands?"
chaosx.nr12.3.a: "Africa is for Africa!"
chaosx.nr12.3.b: "That's absolutely out of question!"

chaosx.nr12.4.t: "[From.GetName] accepts!"
chaosx.nr12.4.d: ""
chaosx.nr12.4.a: "Yes!"

chaosx.nr12.5.t: "[From.GetName] denies!"
chaosx.nr12.5.d: ""
chaosx.nr12.5.a: "War it is!"

chaosx.news.10.t: "The King of Africa"
chaosx.news.10.d: "In a historic and ambitious announcement, [From.GetName], has declared its aspiration to unite the entire continent into a single country. The proclamation, delivered by so called \"King of Africa\", has sent shockwaves through the region and beyond, raising questions about the feasibility of such a grand vision."
chaosx.news.10.a: "But the colonies..."
