chaosx.nr4.1.t: "Random War"
chaosx.nr4.2.t: "Orders Across the Border"
chaosx.nr4.2.d: "War has been declared after a sudden border command escalated beyond recall. The general staff is already moving troops into position, while foreign capitals try to understand whether this was calculated pressure or a command structure losing control."
chaosx.nr4.2.a: "Stand by the order."
chaosx.nr4.2.b: "Blame the general staff."
chaosx.nr4.3.t: "War Without Warning"
chaosx.nr4.3.d: "A foreign government has crossed the line from threats to open war. Their formations are moving, their public statements leave little room for retreat, and our commanders are demanding immediate authority to stabilize the front."
chaosx.nr4.3.a: "Hold the line."
chaosx.nr4.3.b: "Mobilize the reserves."
chaosx.news.104.t: "[GetRandomWarNewsTitle]"
chaosx.news.104.t.single: "War Between [?global.random_war_news_first_aggressor.GetName] and [?global.random_war_news_first_target.GetName]"
chaosx.news.104.t.chain: "War Chain Pulls in [GetRandomWarNewsCountryCountTitle] Countries"
chaosx.news.104.d: "[GetRandomWarNewsDesc]"
chaosx.news.104.d.single: "[?global.random_war_news_first_aggressor.GetName] has declared war on [?global.random_war_news_first_target.GetName] after a sudden escalation that diplomats are still trying to reconstruct. Armies are already moving, and nearby capitals are watching for the next border shock."
chaosx.news.104.d.three: "[?global.random_war_news_first_aggressor.GetName], [?global.random_war_news_first_target.GetName], and [?global.random_war_news_third_country.GetName] are now at war after a chain of sudden declarations. The first declaration sent [?global.random_war_news_first_aggressor.GetName] against [?global.random_war_news_first_target.GetName], while the latest front pits [?global.random_war_news_last_aggressor.GetName] against [?global.random_war_news_last_target.GetName]."
chaosx.news.104.d.chain: "A chain of sudden declarations has pulled [GetRandomWarNewsCountryCount] countries into open war. The first declaration sent [?global.random_war_news_first_aggressor.GetName] against [?global.random_war_news_first_target.GetName], while the latest front pits [?global.random_war_news_last_aggressor.GetName] against [?global.random_war_news_last_target.GetName]."
chaosx.news.104.a: "Another front opens."
