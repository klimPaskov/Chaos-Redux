random_war_hold_the_line: "Hold the Line"
random_war_hold_the_line_desc: "Field commands are turning the front into a hard defensive line: rapid entrenchment, stronger organization, faster reinforcement, and far better core-territory defense."
random_war_reserve_mobilization: "Reserve Mobilization"
random_war_reserve_mobilization_desc: "Emergency manpower calls are pulling reserves and rear-area formations into the line, sharply accelerating mobilization, training, reinforcement, and available manpower."
