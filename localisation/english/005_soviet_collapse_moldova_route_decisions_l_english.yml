l_english:
mol_soviet_collapse_negotiate_prut_statute: "Negotiate the Prut Statute"
mol_soviet_collapse_negotiate_prut_statute_desc: "Moldovan ministers draft the Prut statute as written guarantees, aid terms, and voting rules before Romanian support becomes a claim over the republic."
mol_soviet_collapse_accept_romanian_military_mission: "Accept a Romanian Military Mission"
mol_soviet_collapse_accept_romanian_military_mission_desc: "Romanian officers are admitted through Moldovan command posts to train river detachments, inspect depots, and keep the Prut channel open."
mol_soviet_collapse_assert_no_union_without_sfat: "No Union Without the Sfat"
mol_soviet_collapse_assert_no_union_without_sfat_desc: "The council declares that no emergency cabinet, foreign mission, or border commander can decide union without a Sfat vote."
mol_soviet_collapse_fortify_bendery_tiraspol_line: "Fortify the Bendery-Tiraspol Line"
mol_soviet_collapse_fortify_bendery_tiraspol_line_desc: "Bridge engineers, depot guards, and anti-air crews turn the Dniester crossings into a defended line instead of a rumor on the map."
mol_soviet_collapse_open_odessa_chisinau_customs_board: "Open the Odessa-Chisinau Customs Board"
mol_soviet_collapse_open_odessa_chisinau_customs_board_desc: "Customs clerks and rail officers record grain, refugees, repairs, and convoy shares between Odessa and Chisinau."
mol_soviet_collapse_publish_sfat_limits_on_patronage: "Publish Sfat Limits on Patronage"
mol_soviet_collapse_publish_sfat_limits_on_patronage_desc: "The council publishes limits on foreign missions, cabinet access, and emergency supply rights before patronage can swallow policy."
mol_soviet_collapse_prut_statute_cost_text: "Costs 45 Political Power and 10 Command Power."
mol_soviet_collapse_romanian_mission_cost_text: "Costs 40 Political Power, 20 Command Power, and 1000 Fuel."
mol_soviet_collapse_sfat_veto_cost_text: "Costs 50 Political Power."
mol_soviet_collapse_dniester_line_cost_text: "Costs 25 Command Power, 450 Infantry Equipment, and 60 Support Equipment."
mol_soviet_collapse_customs_board_cost_text: "Costs 35 Political Power, 2 Trains, and 2 Convoys."
mol_soviet_collapse_patronage_limits_cost_text: "Costs 30 Political Power."
mol_soviet_collapse_negotiate_prut_statute_tt: "Raises Prut statute support, recognition progress, and independence resilience, but adds Romanian patronage strain and Soviet foreign concern."
mol_soviet_collapse_accept_romanian_military_mission_tt: "Improves the Dniester line and provides rifles and support gear, while increasing patronage strain."
mol_soviet_collapse_assert_no_union_without_sfat_tt: "Creates a Sfat veto clause, lowers patronage strain, and improves independence resilience."
mol_soviet_collapse_fortify_bendery_tiraspol_line_tt: "Raises Dniester line integrity, strengthens a core crossing state, and increases depot control."
mol_soviet_collapse_open_odessa_chisinau_customs_board_tt: "Strengthens customs traffic, league support, liaison reach, and core-state infrastructure."
mol_soviet_collapse_publish_sfat_limits_on_patronage_tt: "Reduces Moldovan patronage strain and stabilizes the republic."
