chaosx.events_log.window.evolution_details.war_contagion.title.event_detail: "War Contagion"
chaosx.events_log.window.evolution_details.war_contagion.title.stage_1: "Triangular Incident"
chaosx.events_log.window.evolution_details.war_contagion.title.stage_2: "Four Fronts"
chaosx.events_log.window.evolution_details.war_contagion.title.stage_3: "Contagious Ultimatums"
chaosx.events_log.window.evolution_details.war_contagion.title.stage_4: "The War Week"
chaosx.events_log.window.evolution_details.war_contagion.title.stage_5: "Open Season"
chaosx.events_log.window.evolution_details.war_contagion.body.event_detail: "War Contagion turns a single sudden war into a named crisis chain that can draw more countries into the same shock."
chaosx.events_log.window.evolution_details.war_contagion.body: "[GetEventsLogSelectedRandomWarEvolutionBody]"
chaosx.events_log.window.evolution_details.war_contagion.body.stage_1: "Triangular Incident pulls the first target into the next declaration, creating a three-country chain before the shock settles."
chaosx.events_log.window.evolution_details.war_contagion.body.stage_2: "Four Fronts keeps the chain moving through another country, with early openings for compatible special powers to enter the crisis."
chaosx.events_log.window.evolution_details.war_contagion.body.stage_3: "Contagious Ultimatums spreads the crisis through five declarations and gives major powers or faction members a stronger chance to become part of the chain."
chaosx.events_log.window.evolution_details.war_contagion.body.stage_4: "The War Week stretches the crisis across six declarations, making compatible special-country involvement a common part of the escalation."
chaosx.events_log.window.evolution_details.war_contagion.body.stage_5: "Open Season breaks the last restraints on the chain, turning the crisis into seven or eight rapid declarations at World Collapse intensity."
chaosx.events_log.window.evolution_details.soviet_collapse.title.event_detail: "Union Crisis Fractures"
chaosx.events_log.window.evolution_details.soviet_collapse.title.stage_1: "The Pattern of Secession"
chaosx.events_log.window.evolution_details.soviet_collapse.title.stage_2: "Depots Choose Flags"
chaosx.events_log.window.evolution_details.soviet_collapse.title.stage_3: "Foreign Liaison Offices"
chaosx.events_log.window.evolution_details.soviet_collapse.title.stage_4: "The Old Underground Wakes"
chaosx.events_log.window.evolution_details.soviet_collapse.title.stage_5: "The War of Committees"
chaosx.events_log.window.evolution_details.soviet_collapse.title.stage_6: "The Former Union Becomes Many Worlds"
chaosx.events_log.window.evolution_details.soviet_collapse.body.event_detail: "The Soviet crisis can twist beyond ordinary republic secession. Copycat declarations, depot defections, foreign liaison offices, old movements, committee rule, and local authorities can all pull the former Union into stranger forms of collapse."
chaosx.events_log.window.evolution_details.soviet_collapse.body: "When the crisis mutates, the break is no longer only a republic leaving Moscow. Depots, offices, movements, and local committees begin making their own claims on power."
chaosx.events_log.window.evolution_details.soviet_collapse_secession.title.event_detail: "Republic Secession Timeline"
chaosx.events_log.window.evolution_details.soviet_collapse_secession.title.stage_1: "First Durable Secession"
chaosx.events_log.window.evolution_details.soviet_collapse_secession.title.stage_2: "Regional Cascade"
chaosx.events_log.window.evolution_details.soviet_collapse_secession.title.stage_3: "Union Unmade"
chaosx.events_log.window.evolution_details.soviet_collapse_secession.title.stage_4: "Maximum Rupture"
chaosx.events_log.window.evolution_details.soviet_collapse_secession.title.stage_5: "World Collapse Rupture"
chaosx.events_log.window.evolution_details.soviet_collapse_secession.body.event_detail: "First Durable Secession: a republic ministry, garrison, or depot network stops obeying Moscow and survives long enough to make its break visible.\n\nRegional Cascade: several republics are free, and release pressure spreads through foreign attention, depot weakness, League coordination, and public refusal.\n\nUnion Unmade: Moscow has lost Union-wide command. Remaining ordinary republics are forced out of the old center, and the former Union enters open war over its borders.\n\nMaximum Rupture: every remaining republic and eligible special splinter can break from the former Union. The crisis becomes a map-wide struggle over who inherits the old state.\n\nWorld Collapse Rupture: the same break reaches its final intensity, forcing the last eligible remnants into the open while the former Union becomes one front among a collapsing world."
chaosx.events_log.window.evolution_details.soviet_collapse_secession.body.stage_1: "First Durable Secession: a republic ministry, garrison, or depot network stops obeying Moscow and survives long enough to make its break visible."
chaosx.events_log.window.evolution_details.soviet_collapse_secession.body.stage_2: "Regional Cascade: several republics are free, and release pressure spreads through foreign attention, depot weakness, League coordination, and public refusal."
chaosx.events_log.window.evolution_details.soviet_collapse_secession.body.stage_3: "Union Unmade: Moscow has lost Union-wide command. Remaining ordinary republics are forced out of the old center, and the former Union enters open war over its borders."
chaosx.events_log.window.evolution_details.soviet_collapse_secession.body.stage_4: "Maximum Rupture: every remaining republic and eligible special splinter can break from the former Union. The crisis becomes a map-wide struggle over who inherits the old state."
chaosx.events_log.window.evolution_details.soviet_collapse_secession.body.stage_5: "World Collapse Rupture: the same break reaches its final intensity, forcing the last eligible remnants into the open while the former Union becomes one front among a collapsing world."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title: "Non-Republic Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.event_detail: "Non-Republic Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.stage_successor: "Non-Republic Authority Breaks Away"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.stage_3: "Factory and Depot Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.stage_4: "Fringe Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.civilian_factory_successor: "Construction-State Breakaway"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.military_factory_successor: "Arsenal-State Breakaway"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.totalen_successor: "Factory and Depot Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.world_collapse_successor: "Fringe Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body: "As Moscow loses command, breakaways can come from more than republic ministries. Factory cities, military districts, old movements, strange claimants, and sealed offices can turn guards, papers, and supply lines into new governments."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.event_detail: "As Moscow loses command, breakaways can come from more than republic ministries. Factory cities, military districts, old movements, strange claimants, and sealed offices can turn guards, papers, and supply lines into new governments."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.stage_3: "Factory cities, military offices, and local committees are turning emergency authority into breakaway governments before Moscow can bring them back into line."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.stage_4: "Fringe claimants and stranger offices are breaking from the former Union as maximum collapse pressure gives them room to become governments."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.totalen_successor: "Factory cities, military offices, and local committees are turning emergency authority into breakaway governments before Moscow can bring them back into line."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.world_collapse_successor: "Fringe claimants and stranger offices are breaking from the former Union as maximum collapse pressure gives them room to become governments."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.civilian_factory: "Factory-city boards have turned production ledgers, work brigades, and construction offices into public authority. The city now governs through contracts, workshops, and guarded worksites."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.military_factory: "Arsenal boards and factory guards have turned arms production into state power. Contracts, stockpiles, and guarded workshops now decide who can bargain with the new authority."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.ancient_claims: "Ancient Claims Return: old names, river routes, pass tolls, and oasis charters have become armed state programs. Their councils claim modern authority through guarded roads, courts, and public seals."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.dead_are_citizens: "The Dead Are Citizens: casualty registers, memorial armies, and revenant naval rolls have become public authority. The new state treats the former Union as an unfinished roll call."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.pale_railway: "Depots Choose Flags: railway offices and rolling-stock ledgers have become state power. Timetables, guarded junctions, and supply authority now carry political force."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.successor: "As Moscow loses command, breakaways can come from more than republic ministries. Factory cities, military districts, old movements, strange claimants, and sealed offices can turn guards, papers, and supply lines into new governments."
chaosx.events_log.window.evolution_details.soviet_collapse_pattern.title.stage_1: "Contagious Declarations"
chaosx.events_log.window.evolution_details.soviet_collapse_pattern.title.stage_2: "Republics Call Back"
chaosx.events_log.window.evolution_details.soviet_collapse_pattern.body: "The crisis has become repeatable. Declarations start copying one another, and surviving republics can make refusal look like a method instead of an accident."
chaosx.events_log.window.evolution_details.soviet_collapse_depots.title.stage_1: "Local Depots Taken"
chaosx.events_log.window.evolution_details.soviet_collapse_depots.title.stage_2: "Military Districts Fray"
chaosx.events_log.window.evolution_details.soviet_collapse_depots.body: "Military stores, district officers, and supply routes are slipping out of Moscow's ledgers and becoming political facts for breakaway governments."
chaosx.events_log.window.evolution_details.soviet_collapse_liaison.title.stage_1: "Quiet Requests"
chaosx.events_log.window.evolution_details.soviet_collapse_liaison.title.stage_2: "Recognition Line"
chaosx.events_log.window.evolution_details.soviet_collapse_liaison.body: "Outside governments are moving past observation and beginning to treat breakaway authorities as possible partners."
chaosx.events_log.window.evolution_details.soviet_collapse_old_underground.title.stage_1: "Old Names at Roadblocks"
chaosx.events_log.window.evolution_details.soviet_collapse_old_underground.title.stage_2: "Ghost Movements Organize"
chaosx.events_log.window.evolution_details.soviet_collapse_old_underground.body: "Civil-war memories, sailor slogans, peasant guard networks, and old anti-center symbols are returning as living local politics."
chaosx.events_log.window.evolution_details.soviet_collapse_red_resistance.title.stage_1: "The District Refuses Moscow"
chaosx.events_log.window.evolution_details.soviet_collapse_red_resistance.title.stage_2: "Soviets without the Capital"
chaosx.events_log.window.evolution_details.soviet_collapse_red_resistance.body: "Soviet or socialist forces reject breakaway nationalism, but they no longer accept the capital's emergency authority."
chaosx.events_log.window.evolution_details.soviet_collapse_committees.title.stage_1: "Local Authorities Split"
chaosx.events_log.window.evolution_details.soviet_collapse_committees.title.stage_2: "Rail and City Committees"
chaosx.events_log.window.evolution_details.soviet_collapse_committees.body: "The collapse is spreading below the republic level. Rail commands, city committees, security offices, and local guards are becoming political actors."
chaosx.events_log.window.evolution_details.soviet_collapse_wrong_flags.title.stage_1: "Borrowed Banners"
chaosx.events_log.window.evolution_details.soviet_collapse_wrong_flags.title.stage_2: "Hybrid Authorities"
chaosx.events_log.window.evolution_details.soviet_collapse_wrong_flags.body: "Old symbols and new claims no longer match clean labels, making the former union harder to read and harder to settle."
