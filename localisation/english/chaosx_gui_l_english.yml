chaosx.scenarios.zombie.name: "Zombie Apocalypse"
chaosx.scenarios.zombie.desc.diverse: "Launches several outbreaks with mixed zombie profiles. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.random: "Launches several outbreaks that each roll a profile independently. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.standard: "Launches standard outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.rabid: "Launches fast, aggressive outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.parasitic: "Launches parasitic outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.mutant: "Launches mutant outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.undead: "Launches undead outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.necrotic: "Launches necrotic outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.demonic: "Launches demonic outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.wendigo: "Launches wendigo outbreaks across multiple regions. Intensity controls outbreak count, starting states, divisions, and early pressure."
chaosx.scenarios.zombie.desc.connected: "Launches one connected outbreak front with concentrated starting forces. Intensity controls the number of linked states, divisions, and early pressure."
chaosx.scenarios.zombie.impact.low: "§RLaunches hostile outbreaks immediately.§! Low intensity keeps the initial footprint limited."
chaosx.scenarios.zombie.impact.medium: "§RLaunches hostile outbreaks immediately.§! Medium intensity creates a broad crisis with room for containment."
chaosx.scenarios.zombie.impact.high: "§RLaunches hostile outbreaks immediately.§! High intensity starts with more regions, troops, and pressure."
chaosx.scenarios.zombie.impact.maximum: "§RLaunches hostile outbreaks immediately.§! Maximum intensity opens with severe global pressure."
chaosx.scenarios.clones.name: "Army of Clones"
chaosx.scenarios.clones.desc.standard: "Creates a hostile artificial army across Poland, parts of Germany, and the western Soviet borderlands. Intensity controls territory, equipment, divisions, and pressure on neighbors."
chaosx.scenarios.clones.desc.aryan: "Creates a stronger hostile variant with better equipment, extra formations, and more aggressive pressure on neighboring countries."
chaosx.scenarios.clones.impact.low: "§RTransfers territory and starts wars immediately.§! Low intensity keeps the starting front narrower."
chaosx.scenarios.clones.impact.medium: "§RTransfers territory and starts wars immediately.§! Medium intensity creates a hard regional front."
chaosx.scenarios.clones.impact.high: "§RTransfers territory and starts wars immediately.§! High intensity expands the front and army stockpiles."
chaosx.scenarios.clones.impact.maximum: "§RTransfers territory and starts wars immediately.§! Maximum intensity creates the largest starting army and front."
chaosx.scenarios.soviet_collapse.name: "Soviet Collapse"
chaosx.scenarios.soviet_collapse.desc.normal: "Fires the Union Unmade collapse immediately, releases every available ordinary Soviet republic, forms local defensive leagues, and starts the anti-Soviet wars. Intensity controls the extra starting forces granted to each breakaway."
chaosx.scenarios.soviet_collapse.desc.chaos: "Fires the Union Unmade collapse immediately, releases ordinary republics, enables the high-chaos splinters that can exist, forms local factions, and starts the anti-Soviet wars. Intensity controls the extra starting forces granted to each breakaway."
chaosx.scenarios.soviet_collapse.impact.low: "§RBreaks the Soviet Union immediately.§! Low intensity adds only a limited emergency army to each republic."
chaosx.scenarios.soviet_collapse.impact.medium: "§RBreaks the Soviet Union immediately.§! Medium intensity gives the republics enough force to hold a broad opening front."
chaosx.scenarios.soviet_collapse.impact.high: "§RBreaks the Soviet Union immediately.§! High intensity gives stronger republics a large starting army."
chaosx.scenarios.soviet_collapse.impact.maximum: "§RBreaks the Soviet Union immediately.§! Maximum intensity gives the strongest republics a very large starting army."
chaosx.scenarios.final_silence.name: "Final Silence"
chaosx.scenarios.final_silence.desc.nuclear: "Starts the Final Silence world-end sequence from the current country with the nuclear variant. The launcher becomes the surviving Realm-side authority while every other valid state is struck in waves, suffers fallout, records deaths, and degrades toward wasteland."
chaosx.scenarios.final_silence.desc.thermonuclear: "Starts the Final Silence world-end sequence from the current country with the thermonuclear variant. The launcher becomes the surviving Realm-side authority while every other valid state is struck in waves, suffers stronger fallout, records heavier deaths, and degrades toward wasteland."
chaosx.scenarios.final_silence.impact.nuclear: "§RStarts Final Silence immediately.§! The payload is nuclear. The wave sequence remains the canonical Final Silence sequence."
chaosx.scenarios.final_silence.impact.thermonuclear: "§RStarts Thermonuclear Final Silence immediately.§! The payload is thermonuclear. The wave sequence remains the canonical Final Silence sequence."
chaosx.scenarios.fury.name: "The World in Fury"
chaosx.scenarios.fury.desc.pact: "Turns eligible non-player minor countries into dispersed Fury actors and organizes them into the Fury Pact. Higher intensity spreads more Fury states across the world and grants stronger evolved openings."
chaosx.scenarios.fury.desc.hostile: "Turns eligible non-player minor countries into dispersed hostile Fury actors that immediately pursue neighboring wars. Higher intensity spreads more Fury states across the world and escalates their opening pressure."
chaosx.scenarios.type.fury.pact: "Fury Pact"
chaosx.scenarios.type.fury.hostile: "Hostile Fury"
chaosx.scenarios.fury.impact.low: "§RCreates two dispersed Fury actors immediately.§! The player and player-linked countries are excluded."
chaosx.scenarios.fury.impact.medium: "§RCreates five dispersed Fury actors immediately.§! The player and player-linked countries are excluded."
chaosx.scenarios.fury.impact.high: "§RCreates nine dispersed Fury actors immediately.§! The player and player-linked countries are excluded."
chaosx.scenarios.fury.impact.maximum: "§RCreates up to sixteen dispersed Fury actors when enough safe candidates exist.§! The player and player-linked countries are excluded."
chaosx.scenarios.intensity: "Intensity"
chaosx.scenarios.intensity.tt: "§YLow§!: serious but limited.\n§YMedium§!: major regional or global threat.\n§YHigh§!: large pressure with more territory or outbreaks.\n§YMaximum§!: severe crisis strength."
