chaosx.triggerable_scenarios.1.t: "Zombie Apocalypse Launched"
chaosx.triggerable_scenarios.1.d: "The Zombie Apocalypse scenario has begun. Outbreak centers are active across the world according to the selected intensity and type settings. Each outbreak follows the profile chosen from the scenario window."
chaosx.triggerable_scenarios.1.a: "Containment begins."
chaosx.triggerable_scenarios.2.t: "Army of Clones"
chaosx.triggerable_scenarios.2.d: "A hostile artificial army has seized a broad front in Eastern Europe and the western Soviet borderlands. Its leadership frames the formations as engineered obedience and racial myth, but the result is a military crisis for every country around it."
chaosx.triggerable_scenarios.2.a: "A new front opens."
chaosx.triggerable_scenarios.3.t: "The Clone Army Mobilizes"
chaosx.triggerable_scenarios.3.d: "The clone formations move under forced discipline and laboratory command. Their orders are simple: expand, break neighboring states, and turn the surrounding front into a test ground."
chaosx.triggerable_scenarios.3.a: "Advance."
chaosx.triggerable_scenarios.4.t: "The Union Unmade"
chaosx.triggerable_scenarios.4.d: "The Soviet Union has collapsed at once. Republic councils, regional leagues, and armed committees have left Moscow's command structure and opened the war for the former Union."
chaosx.triggerable_scenarios.4.a: "The map breaks open."
chaosx.triggerable_scenarios.5.t: "Final Silence"
chaosx.triggerable_scenarios.5.d: "The Final Silence scenario has begun. The current country has become the surviving launch authority, and every other valid state will be struck through the canonical Final Silence wave sequence."
chaosx.triggerable_scenarios.5.a: "The register opens."

