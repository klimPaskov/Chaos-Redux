chaosx.help.title: "Chaos Redux Help"
chaosx.help.close.tt: "Close Help"
chaosx.help.body: "[GetChaosxHelpBody]"
chaosx.help.tab.overview: "Overview"
chaosx.help.tab.events: "Events"
chaosx.help.tab.chaos_meter: "Chaos"
chaosx.help.tab.warfare: "Warfare"
chaosx.help.tab.controls: "Controls"
chaosx.help.body.overview: "§YCurrent State§!\nChaos: [GetChaosMeterValueColored]  Tier: §Y[GetChaosTierName]§!\nCurrent timer: §Y[?event_timer_days|0]§! days  Dynamic timer: §Y[?timer_window_dynamic_min_days|0]§!-§Y[?timer_window_dynamic_max_days|0]§! days\nEvents fired: §Y[?global.total_events_fired|0]§!  Evolutions fired: §Y[?global.events_log_evolution_sequence|0]§!\nClusters fired: §Y[?global.total_event_clusters_fired|0]§!\n\n§YCore Loop§!\nChaos Redux uses one global Chaos Meter and a weighted event pool. Each eligible player country has its own timer. When a timer reaches zero, the system checks which events are valid, skips disabled or already-spent events, and then picks from the remaining weights. The dynamic timer is the effective roll range after timer caps, day reductions, and the current chaos modifier are applied.\n\n§YPlayer Control§!\nSettings let you pause automatic events for your country, trigger events or clusters by hand, adjust timer ranges, tune weights and recovery, and inspect history. Event Logs show what fired, what is still available, and which staged systems have advanced.\n\n§YMultiplayer§!\nMultiplayer uses the same global event pool and Chaos Meter for everyone, so major world state stays shared. Player countries keep their own timers and event-system toggles, so one player can pause automatic events without stopping the whole campaign. Global systems such as deaths, contamination, scenarios, super-events, and world-end scenarios affect the shared world."
chaosx.help.body.events: "§YLive Values§!\nEvents fired: §Y[?global.total_events_fired|0]§!  Unique events left: §Y[?global.unfired_total_events_count|0]§!\nMajor left: §Y[?global.unfired_major_events_count|0]§!  Fire once left: §Y[?global.unfired_fire_once_events_count|0]§!  Repeatable never fired: §Y[?global.unfired_repeatable_events_count|0]§!\nDisabled events: §Y[?global.disabled_events^num|0]§!\n\n§YEvent Types§!\nRepeatable events can return to the automatic pool after firing, so they may appear several times when their triggers and recovered weight allow it. Fire once events are ordinary unique events: after they fire automatically, they leave the normal pool. Major events are unique high-impact events with their own count and gating; after firing, they also leave normal automatic selection unless fired manually.\n\n§YEvolutions§!\nEvolutions are staged progress markers inside a larger event system, not separate event rolls. When a stage fires, the log records how far that system has advanced.\n\n§YClusters§!\nClusters are bundled rolls. When a cluster succeeds, it tries to fire a small group of connected member events, and each member still checks whether it is valid. The cluster log shows which members fired or were skipped.\n\n§YWorld-End Scenarios§!\nWorld-end scenarios are terminal branches unlocked at World Collapse tier. An enabled branch can resolve the campaign from the global situation, and once an end state is active, automatic event firing is disabled for all countries."
chaosx.help.body.chaos_meter: "§YLive Values§!\nChaos: [GetChaosMeterValueColored]  Tier: §Y[GetChaosTierName]§!\nTimer modifier: §Y[?global.chaos_timer_modifier|.2]x§!\nRecorded deaths: §Y[GetChaosMeterDeathsTotalDisplay]§!\n\n§YChaos Meter§!\nThe Chaos Meter is global. Higher tiers shorten effective event timing, unlock stronger escalation paths, and make cluster rolls more likely once their unlock tier is reached.\n\n§YDeaths System§!\nThe Deaths System records military losses, civilian deaths, strategic bombing, nuclear strikes, contamination, outbreaks, occupation policy losses, and other mass-casualty sources. Recorded deaths can add chaos through the deaths-to-chaos rule and are shown through the deaths mapmode."
chaosx.help.body.warfare: "§YChaos Warfare§!\nChaos warfare covers weapons and military systems that change a war beyond normal battles. It connects technologies, doctrine, decisions, unit design, delivery methods, state modifiers, mapmodes, diplomatic condemnation, cleanup, and chaos gain. These systems are meant to create lasting territory problems as well as battlefield effects.\n\n§YChemical Warfare§!\nChemical warfare is built around agents, delivery methods, protective gear, and contamination. It can use shells, projectors, aircraft, or other delivery paths, and it can leave chemical contamination in states. Chemical pressure can affect combat, state safety, cleanup needs, diplomatic reaction, and long-term chaos.\n\n§YBiological Warfare§!\nBiological warfare is built around research projects, facilities, pathogens, defenses, field tests, and outbreak control. Biological attacks can create disease contamination or outbreaks, force prevention and cure decisions, and leave long-term hazards in affected states. The main danger is that effects can keep spreading after the original attack.\n\n§YContamination And Mitigation§!\nChemical, biological, and nuclear contamination are tracked at state level. Cleanup, filters, masks, medical defenses, doctrine, technologies, and decisions change duration, strength, and exposure. The mapmode helps find contaminated states, while death and chaos systems record severe failures."
chaosx.help.body.controls: "§YShortcuts§!\nSettings: §YCtrl+Shift+C§!\nChaos Meter: §YCtrl+Shift+M§!\nEvent Logs toggle: §YCtrl+Shift+E§!\nEvent Logs Events tab: §YCtrl+E§!\nEvent Timer: §YCtrl+Shift+T§!\nScenarios: §YCtrl+Shift+S§!\nHelp: §YCtrl+Shift+H§!\nDisable Event System toggle: §YCtrl+Shift+D§!\n\n§YSettings§!\nTrigger Events lets you select, filter, and manually fire event IDs or event clusters. Timer System controls the automatic event interval and tag eligibility. Chaos Meter controls the global chaos value and world-end settings. Advanced Settings tunes event weights, recovery, repeatable cap behavior, and timing. Miscellaneous contains utility and super-event audio controls. Scenarios opens manual sandbox and challenge setups.\n\n§YEvent Log Windows§!\nRows in History, Events, Evolutions, and Clusters open detail windows. Event, evolution, and cluster detail windows are movable and can be used for inspection or manual triggering."

