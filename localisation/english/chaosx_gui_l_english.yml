chaosx.events_log.window.event_details.entry_placeholder.generic: "This window lists the tracked event metadata.\nDetailed per-event design notes can be added here later."
chaosx.events_log.window.event_details.evolutions_header: ""
chaosx.events_log.window.event_details.evolutions_empty: "This event has no evolution stages."
chaosx.events_log.window.event_details.evolution_entry: "[GetEventsLogEventDetailEvolutionTitle]\nChaos Tier: [GetEventsLogEventDetailEvolutionTierView]"
chaosx.events_log.window.event_details.evolution_entry_meta: "Chaos Tier: [GetEventsLogEventDetailEvolutionTierView]\nEvolution Stage: §Y[GetEventsLogEventDetailEvolutionStageView]§!"
chaosx.events_log.window.event_details.evolution_entry_body_generic: "This milestone marks a shift in the event's story or consequences."
chaosx.events_log.window.event_details.communism_spread: "Communist organizers build pressure through national propaganda and local control. The national spirit gives a small daily communist drift, while each communist-controlled state adds another §R+0.01§! daily drift through dynamic pressure.\n\nControlled states can become Agitation Zones, Insurgent Strongholds, or Communist Lockdowns. Regular state intervention works only against the first two levels. Emergency national intervention affects all controlled states, but can trigger a custom communist uprising from converted controlled states.\n\nAs the movement evolves, controlled states may produce rare surprise revolts, stranger worker incidents, and broader revolutionary pressure."
chaosx.events_log.window.event_details.zombie_outbreak: "The outbreak begins in one random populous state. Zombies use only manpower for their divisions, and thus depend a lot on the population of states they capture. If the horde gets momentum, it spreads fast and captured land is cored right away.\n\nSecondary outbreaks happen most likely in big, crowded, less developed states. Chaos makes those outbreaks more common over time, and each zombie evolution makes the horde harder to contain.\n\nIf you want to keep the event under control, the main things that matter are holding the front, cutting outbreak risk with prevention decisions, pushing cure research, and joining the Anti-Zombie League."
chaosx.events_log.window.event_details.random_war: "Random War turns border orders, panicked ultimatums, and opportunistic claims into sudden declarations between eligible sovereign countries.\n\nHigher chaos tiers unlock War Contagion stages that spread one incident into a wider war web. Later stages can draw compatible Chaos Redux special countries, major powers, and faction members into the chain."
chaosx.events_log.window.event_details.soviet_collapse: "The Soviet Union is losing command over its republics, rail offices, garrisons, and depots. Moscow can answer with force, negotiation, isolation, or party discipline, but each visible failure gives local authorities more room to act.\n\nCurrent reading: [GetEventsLogSovietCollapseDetailCrisisState]\nFirst wave: [GetEventsLogSovietCollapseDetailFirstWave]\nFree Republics' League: [GetEventsLogSovietCollapseDetailLeague]\nMoscow Authority: [GetEventsLogSovietCollapseDetailAuthority]\nUnion Crisis Threat: [GetEventsLogSovietCollapseDetailThreat]\nForeign intervention: [GetEventsLogSovietCollapseDetailForeign]\nOld movements and splinters: [GetEventsLogSovietCollapseDetailMutation]\n\nBreakaway republics can seek recognition, seize depots, coordinate defenses, or draw more republics into the crisis while Moscow tries to restore command or force a new settlement."
chaosx.events_log.window.event_details.independence_wave: "Independence Wave turns weak borders, ignored petitions, and old public claims into new governments. Hosts are protected from total deletion, but each wave can still tear away ministries, rail hubs, ports, protectorates, and unusual claimant states.\n\nLater waves bring larger breaks, harder border disputes, more patron interference, and rarer claims that can reshape whole regions."
chaosx.events_log.window.event_details.fury: "Fury turns an eligible non-player minor country into a rogue war state driven by an unnatural rage. The player, subjects, majors, player-linked countries, and island-only countries are kept out of the Fury selection pool, but they can still become targets when ordinary target rules allow it.\n\nThe actor receives the Fury Column template, stockpiles scaled to its size, recurring reinforcement waves, Fury decisions, and a shared focus tree. It attacks valid neighboring targets, records its first conquest, and can escalate through Hardened Fury, second-actor cooperation or rivalry, and all-border violence."
chaosx.events_log.window.evolution_details.independence_wave.title.stage_1: "Dossier Surge"
chaosx.events_log.window.evolution_details.independence_wave.title.stage_2: "Rising Chaos Release Pattern"
chaosx.events_log.window.evolution_details.independence_wave.title.stage_3: "Chaos Tier Release Pattern"
chaosx.events_log.window.evolution_details.independence_wave.title.stage_4: "Great Partition Week"
chaosx.events_log.window.evolution_details.independence_wave.title.stage_5: "Open Season"
chaosx.events_log.window.evolution_details.independence_wave.body.stage_1: "A first surge of petitions becomes real state work. Four to six countries can break away, mostly from republic committees, dormant claimants, and local councils that already have papers, guards, or public witnesses."
chaosx.events_log.window.evolution_details.independence_wave.body.stage_2: "At Rising Chaos, petitions begin copying one another across several hosts. Five to seven new countries can appear, and city boards, railway committees, protectorates, dormant claims, and rule-bound claimant families can join the same wave."
chaosx.events_log.window.evolution_details.independence_wave.body.stage_3: "At Chaos Tier, border files turn dangerous. Six to nine new countries can appear, with stronger claims, wider patron pressure, and commissions that can make each release a lasting regional dispute."
chaosx.events_log.window.evolution_details.independence_wave.body.stage_4: "The wave becomes a partition week. Eight to twelve new countries can appear, including restored names, local polities, and strange claimants that turn paperwork into a world crisis."
chaosx.events_log.window.evolution_details.independence_wave.body.stage_5: "The release wave reaches open season. Ten to sixteen countries can appear, claims outside old expectations become easier to press, and every greedy border file can give the old host a reason to answer with threats, talks, or war plans."
chaosx.events_log.window.evolution_details.fury.title.stage_1: "Hardened Fury"
chaosx.events_log.window.evolution_details.fury.title.stage_2: "Two Fires"
chaosx.events_log.window.evolution_details.fury.title.stage_3: "All Borders at Once"
chaosx.events_log.window.evolution_details.fury.body.event_detail: "Fury evolutions change how the rage mutates, how many rogue actors can exist, and how violently they attack nearby countries."
chaosx.events_log.window.evolution_details.fury.body.stage_1: "Hardened Fury turns the first outbreak into a more disciplined rage. The actor replaces emergency National Fury with Hardened Fury, gains momentum and reach, and opens stronger military and depot routes."
chaosx.events_log.window.evolution_details.fury.body.stage_2: "Two Fires allows a second Fury actor to exist when safe candidates remain. The two actors can cooperate, compete, or turn their fury on each other while nearby countries face more than one rogue threat."
chaosx.events_log.window.evolution_details.fury.body.stage_3: "All Borders at Once allows up to three Fury actors and shifts the danger from serial neighbor wars to simultaneous attacks. Fury actors can open all valid neighboring fronts and unlock the highest escalation routes."
chaosx.events_log.window.evolution_details.independence_wave_tier.body: "The Independence Wave has crossed another release scale. The map can shed more countries at once, and later waves bring broader claims, harder borders, and more dangerous patrons."
chaosx.events_log.window.evolution_details.independence_wave_dossier.body: "A new government has opened its public case. Papers, witnesses, guards, and local offices give the claim enough shape to survive beyond the first proclamation."
chaosx.events_log.window.evolution_details.independence_wave_formation.body: "A released government has grown beyond emergency survival. Control, legitimacy, and public institutions now support a larger claim."
chaosx.events_log.window.evolution_details.independence_wave_package.body: "A public claim file has been opened. Councils, records, witnesses, or guarded offices give the new state a clearer identity and a stronger case."
chaosx.events_log.window.event_details.soviet_collapse.crisis.terminal: "central command has failed as a Union-wide authority."
chaosx.events_log.window.event_details.soviet_collapse.crisis.active: "orders still move from Moscow, but republic ministries, rail offices, and garrisons are testing which commands will be obeyed."
chaosx.events_log.window.event_details.soviet_collapse.crisis.dormant: "the crisis is not currently active on the map."
chaosx.events_log.window.event_details.soviet_collapse.first_wave.active: "the first emergency declarations are still shaping the crisis."
chaosx.events_log.window.event_details.soviet_collapse.first_wave.ended: "the opening rupture has been overtaken by the full collapse."
chaosx.events_log.window.event_details.soviet_collapse.first_wave.settled: "the opening shock has passed into the wider struggle over authority."
chaosx.events_log.window.event_details.soviet_collapse.first_wave.none: "no active first wave is visible."
chaosx.events_log.window.event_details.soviet_collapse.league.exists: "organized breakaway coordination exists."
chaosx.events_log.window.event_details.soviet_collapse.league.absent: "breakaway cooperation has not become a formal league."
chaosx.events_log.window.event_details.soviet_collapse.authority.terminal: "Moscow can no longer speak for the Union."
chaosx.events_log.window.event_details.soviet_collapse.authority.failing: "authority is failing and local offices are preparing their own answers."
chaosx.events_log.window.event_details.soviet_collapse.authority.shaken: "authority is shaken, but the center still has instruments to answer the crisis."
chaosx.events_log.window.event_details.soviet_collapse.authority.contested: "authority is contested and depends on visible successes."
chaosx.events_log.window.event_details.soviet_collapse.authority.recovering: "authority is recovering enough for Moscow to pressure the edges again."
chaosx.events_log.window.event_details.soviet_collapse.threat.terminal: "the crisis has crossed into terminal rupture."
chaosx.events_log.window.event_details.soviet_collapse.threat.severe: "the crisis is severe and broad failure is credible."
chaosx.events_log.window.event_details.soviet_collapse.threat.rising: "the crisis is rising through visible failures and widening refusal."
chaosx.events_log.window.event_details.soviet_collapse.threat.contained: "the crisis is still contained enough for outcomes to change."
chaosx.events_log.window.event_details.soviet_collapse.foreign.dominant: "outside patrons are shaping the crisis as much as local ministries."
chaosx.events_log.window.event_details.soviet_collapse.foreign.organized: "foreign channels are organized and increasingly hard to ignore."
chaosx.events_log.window.event_details.soviet_collapse.foreign.limited: "foreign observers and aid channels are present but not yet decisive."
chaosx.events_log.window.event_details.soviet_collapse.foreign.watchful: "foreign governments are watching for leverage."
chaosx.events_log.window.event_details.soviet_collapse.mutation.high: "high-chaos authorities and old claims are pressing beyond ordinary republican politics."
chaosx.events_log.window.event_details.soviet_collapse.mutation.visible: "old movements, strange symbols, and irregular authorities are becoming visible."
chaosx.events_log.window.event_details.soviet_collapse.mutation.quiet: "ordinary republic politics still dominate the visible crisis."
