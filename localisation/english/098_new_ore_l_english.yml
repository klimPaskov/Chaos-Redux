l_english:
chaosx.nr98.1.t: "New ore"

chaosx.nr98.2.t: "New ore found!"
chaosx.nr98.2.d: "In a groundbreaking discovery, our country has unearthed a new ore with properties surpassing those of steel. This remarkable find promises to revolutionize our military capabilities, particularly in the realm of tank warfare."
chaosx.nr98.2.a: "Our tanks impenetrable"

chaosx.news.77.t: "New ore found"
chaosx.news.77.d: "A significant discovery by [FROM.GetName] unveils a special ore stronger than steel, with potential applications in military technology, particularly tank armor. Tensions rise among neighboring nations vying for control of [?global.ore_state_container.GetName] where the resource lies. As diplomatic negotiations falter, competition intensifies, raising concerns about regional stability and the specter of conflict."
chaosx.news.77.a: "The good Lord made us all out of iron"
