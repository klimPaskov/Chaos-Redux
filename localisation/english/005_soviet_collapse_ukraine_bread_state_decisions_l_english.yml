l_english:
ukr_soviet_collapse_register_black_soil_committees: "Register the Black Soil Committees"
ukr_soviet_collapse_register_black_soil_committees_desc: "Village granaries, armed committees, and rail clerks are placed on one ledger so food authority can move faster than panic requisition."
ukr_soviet_collapse_register_black_soil_committees_tt: "Builds grain authority, depot control, local defenses, and republican resilience, but raises Bread State coercion and old-movement pressure."
ukr_soviet_collapse_black_soil_committees_cost_text: "£pol_power 35  £command_power 10  £infantry_equipment_text_icon 350  £support_equipment_text_icon 40"
ukr_soviet_collapse_black_soil_committees_cost_text_blocked: "£pol_power §R35§!  £command_power §R10§!  £infantry_equipment_text_icon §R350§!  £support_equipment_text_icon §R40§!"
ukr_soviet_collapse_conduct_total_grain_census: "Conduct the Total Grain Census"
ukr_soviet_collapse_conduct_total_grain_census_desc: "Every village, train, missing sack, and depot request is copied into Kyiv's ration books before local authorities can hide the surplus."
ukr_soviet_collapse_conduct_total_grain_census_tt: "Expands grain authority, raises coercion, improves logistics in a core state, and increases League support and Soviet old-movement pressure."
ukr_soviet_collapse_grain_census_cost_text: "£pol_power 45  £GFX_train_texticon 2  £GFX_fuel_texticon 1200"
ukr_soviet_collapse_grain_census_cost_text_blocked: "£pol_power §R45§!  £GFX_train_texticon §R2§!  £GFX_fuel_texticon §R1200§!"
ukr_soviet_collapse_lock_the_bread_line: "Lock the Bread Line"
ukr_soviet_collapse_lock_the_bread_line_desc: "Ration offices become checkpoints, granary guards become front reserves, and the state decides who moves only after the army is fed."
ukr_soviet_collapse_lock_the_bread_line_tt: "Raises grain authority, coercion, manpower, war support, and local defenses while damaging stability and increasing Soviet collapse pressure."
ukr_soviet_collapse_bread_line_cost_text: "£pol_power 30  £command_power 20  £infantry_equipment_text_icon 500"
ukr_soviet_collapse_bread_line_cost_text_blocked: "£pol_power §R30§!  £command_power §R20§!  £infantry_equipment_text_icon §R500§!"
ukr_soviet_collapse_release_village_rations: "Release Village Rations"
ukr_soviet_collapse_release_village_rations_desc: "The ration offices open controlled reserves before the villages decide the Bread State is only another requisition army."
ukr_soviet_collapse_release_village_rations_tt: "Reduces Bread State coercion and restores stability."
ukr_soviet_collapse_village_ration_relief_cost_text: "£pol_power 25  £GFX_train_texticon 1"
ukr_soviet_collapse_village_ration_relief_cost_text_blocked: "£pol_power §R25§!  £GFX_train_texticon §R1§!"
ukr_soviet_collapse_execute_last_harvest_plan: "Execute the Last Harvest Plan"
ukr_soviet_collapse_execute_last_harvest_plan_desc: "The final harvest plan moves grain authority, fuel, trains, and guarded factories under one wartime order."
ukr_soviet_collapse_execute_last_harvest_plan_tt: "Requires accumulated grain authority. Converts the route into emergency arms production, war support, and stronger Soviet old-movement pressure."
ukr_soviet_collapse_last_harvest_plan_cost_text: "£pol_power 70  £GFX_train_texticon 4  £convoy_texticon 4  £GFX_fuel_texticon 2000"
ukr_soviet_collapse_last_harvest_plan_cost_text_blocked: "£pol_power §R70§!  £GFX_train_texticon §R4§!  £convoy_texticon §R4§!  £GFX_fuel_texticon §R2000§!"
