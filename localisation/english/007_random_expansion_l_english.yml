l_english:
chaosx.nr7.1.t: "Fury"
chaosx.nr7.2.t: "Fury Takes Command"
chaosx.nr7.2.d: "[ROOT.GetName] has gone rogue. Reports from the capital describe officers shouting through hoarse voices, reservists flooding the streets, and whole units moving as if a fever has taken the state.\n\nThe first orders do not read like policy. They read like rage searching for a neighbor to break."
chaosx.nr7.2.a: "The rage has a flag."
chaosx.nr7.10.t: "Fury Target Loop"
chaosx.nr7.20.t: "Fury Weekly Reinforcement"
chaosx.nr7.30.t: "Fury First Conquest"
chaosx.nr7.40.t: "Fury Evolution Sync"
chaosx.news.7007.t: "A Minor State Enters Fury"
chaosx.news.7007.d: "[fury_news_actor.GetName] has taken its first neighbor. Refugees speak of soldiers who did not slow after victory, officers with bloodshot eyes, and crowds in the conquered towns whispering that something more than ambition is pushing the columns forward.\n\nForeign ministries still call it a border crisis. Survivors call it Fury."
chaosx.news.7007.a: "It has tasted conquest."
fury_national_fury: "National Fury"
fury_national_fury_desc: "The state is organized around fast border war, field columns, and emergency mobilization."
fury_hardened_fury: "Hardened Fury"
fury_hardened_fury_desc: "The War Office has survived its opening crisis and hardened its doctrine into a stronger campaign machine."
fury_overextension: "Fury Overextension"
fury_overextension_desc: "Rapid conquest has filled the ministries with occupied districts, broken timetables, and unrest."
fury_compliance_drive: "Compliance Drive"
fury_compliance_drive_desc: "Occupation registers, guarded offices, and settlement boards turn seized territory into administered ground."
fury_pact_command: "Fury Pact Command"
fury_pact_command_desc: "Fury states share liaison officers, reserve signals, and attack timings without surrendering their own ambitions."
fury_rival_doctrine: "Rival Column Doctrine"
fury_rival_doctrine_desc: "Competing Fury commands learn from one another by racing toward the next border."
anti_fury_border_watch: "Anti-Fury Border Watch"
anti_fury_border_watch_desc: "Border guards, depot reserves, and defensive timetables prepare the country for a nearby Fury assault."
anti_fury_emergency_aid: "Anti-Fury Emergency Aid"
anti_fury_emergency_aid_desc: "Rail officers and depot clerks keep aid moving toward the country currently marked in Fury files."
anti_fury_staff_talks: "Firebreak Staff Talks"
anti_fury_staff_talks_desc: "Neighboring staffs share road tables, reserve timings, and emergency border instructions before Fury crosses another line."
anti_fury_supply_denial: "Anti-Fury Supply Denial"
anti_fury_supply_denial_desc: "Rail crews and field detachments deny Fury the depots and timetables it needs for another fast border war."
fury_war_office_category: "Fury War Office"
fury_war_office_category_desc: "Direct target files, occupation registers, reinforcement depots, settlement boards, and Fury cooperation or rivalry."
anti_fury_response_category: "Anti-Fury Response"
anti_fury_response_category_desc: "Prepare border watches, aid routes, staff talks, supply denial, and diplomatic refusal against nearby Fury states."
fury_select_new_target: "Select the Next Target"
fury_select_new_target_desc: "Open the current neighbor file and order the War Office to move before the front cools."
fury_select_new_target_tt: "Fury selects a valid weaker AI neighbor when possible and declares an annexation war."
fury_open_forward_depots: "Open Forward Depots"
fury_open_forward_depots_desc: "Spend command authority and infantry stockpiles to move new columns and supply crates toward the active front."
fury_open_forward_depots_tt: "Spawns an extra weekly reinforcement wave and increases Fury momentum."
fury_register_occupation_settlement: "Register Occupation Settlement"
fury_register_occupation_settlement_desc: "Spend command authority, rifles, and support stores to record one occupied state for settlement work."
fury_register_occupation_settlement_tt: "Marks one non-core controlled state for settlement and improves compliance drive."
fury_count_captured_registers: "Count the Captured Registers"
fury_count_captured_registers_desc: "Spend command authority, rifles, and support stores to count offices, names, and claims in an occupied state."
fury_count_captured_registers_tt: "Marks a non-core controlled state for administrative settlement work."
fury_count_captured_registers_effect_tt: "A captured state receives a settlement register and compliance work."
fury_rail_registry_survey: "Rail and Registry Survey"
fury_rail_registry_survey_desc: "Spend trains and support stores to align the occupation register with rails, depots, and supply offices."
fury_rail_registry_survey_tt: "Marks one registered state as rail-ready, lowering occupation pressure."
fury_rail_registry_survey_effect_tt: "A registered state receives rail registry records and additional compliance."
fury_garrison_the_names_mission: "Garrison the Names"
fury_garrison_the_names_mission_desc: "Keep the capital and registered states under control while the War Office assigns garrisons to the names in its books."
fury_core_state_by_administration: "Core by Administration"
fury_core_state_by_administration_desc: "Spend command authority, manpower, rifles, and support stores to integrate a compliant registered state through offices and rail records."
fury_core_state_by_administration_tt: "Cores a highly compliant registered state and lowers occupation pressure."
fury_core_state_by_administration_effect_tt: "One registered state becomes a core through administrative integration."
fury_core_state_by_march: "Core by March"
fury_core_state_by_march_desc: "Spend men, rifles, support stores, and stability to force a registered state into the Fury state before the offices are ready."
fury_core_state_by_march_tt: "Cores a lower-compliance registered state at a heavier internal cost."
fury_core_state_by_march_effect_tt: "One registered state becomes a core through military integration."
fury_restore_the_registers_mission: "Restore the Registers"
fury_restore_the_registers_mission_desc: "Occupation pressure has overrun the books. Hold the capital and registered states while the War Office rebuilds the register chain."
fury_form_war_table: "Form a Fury War Table"
fury_form_war_table_desc: "Coordinate with another Fury command so the rage spreads through agreed attacks rather than accidental rivalry."
fury_form_war_table_tt: "Adds Pact Command, increases pact cohesion, and improves relations with other Fury actors."
fury_mark_rival_column: "Mark a Rival Column"
fury_mark_rival_column_desc: "Record another Fury command as the measure to beat and sharpen doctrine through competition."
fury_mark_rival_column_tt: "Adds Rival Column Doctrine and increases momentum."
fury_survey_beyond_the_border: "Survey Beyond the Border"
fury_survey_beyond_the_border_desc: "When nearby targets are exhausted, the War Office searches for a new reachable line."
fury_survey_beyond_the_border_tt: "Clears the no-neighbor pause and queues a new target scan."
fury_share_terminal_reserves: "Share Terminal Reserves"
fury_share_terminal_reserves_desc: "Move men, rifles, and support stores from one terminal Fury office to another before the global front cools."
fury_share_terminal_reserves_tt: "Sends manpower and equipment to another World in Fury actor, improves pact cohesion, and reduces overextension."
fury_share_terminal_reserves_effect_tt: "A terminal Fury actor receives manpower, rifles, and support stores from the shared reserve."
fury_assign_terminal_fronts: "Assign Terminal Fronts"
fury_assign_terminal_fronts_desc: "Spend command authority and staff experience to align the terminal pact's front tables."
fury_assign_terminal_fronts_tt: "Improves pact cohesion, target preparation, and momentum for World in Fury actors."
fury_assign_terminal_fronts_effect_tt: "World in Fury actors receive coordinated front preparation and reduced overextension."
anti_fury_border_watch_tt: "Spends command authority and rifles to start a timed border watch mission."
anti_fury_border_watch_start_tt: "A border watch mission begins. Holding the capital and border watch for the full period creates the Anti-Fury Border Watch."
anti_fury_border_watch_mission: "Hold the Anti-Fury Border Watch"
anti_fury_border_watch_mission_desc: "Keep the capital secure while border guards and depot officers test Fury's next crossing timetable."
anti_fury_send_emergency_aid: "Send Emergency Aid to the Target"
anti_fury_send_emergency_aid_desc: "Send rifles, support stores, and trains toward the country currently listed in Fury target files."
anti_fury_send_emergency_aid_tt: "Supplies one active Fury target and reduces Fury momentum."
anti_fury_send_emergency_aid_effect_tt: "Aid moves to a current Fury target, opening a timed aid-route mission."
anti_fury_aid_route_mission: "Keep the Aid Route Open"
anti_fury_aid_route_mission_desc: "Keep the emergency route open long enough for the target to turn supplies into resistance."
anti_fury_firebreak_staff_talks: "Firebreak Staff Talks"
anti_fury_firebreak_staff_talks_desc: "Spend command authority and army experience to align border timetables with other staffs watching Fury."
anti_fury_firebreak_staff_talks_tt: "Adds Firebreak Staff Talks and raises anti-Fury response pressure."
anti_fury_firebreak_staff_talks_effect_tt: "Staff talks improve defensive planning against nearby Fury pressure."
anti_fury_start_supply_denial: "Start Supply Denial"
anti_fury_start_supply_denial_desc: "Commit rifles and command authority to deny Fury the rail stores it expects to seize."
anti_fury_start_supply_denial_tt: "Starts a timed supply denial mission against neighboring Fury actors."
anti_fury_start_supply_denial_effect_tt: "Supply denial begins. Holding the mission period raises Fury overextension and lowers its momentum."
anti_fury_supply_denial_mission: "Deny Fury Supply"
anti_fury_supply_denial_mission_desc: "Keep the capital secure while rail crews and border detachments deny Fury the depots it needs."
anti_fury_recognition_denial: "Deny Fury Recognition"
anti_fury_recognition_denial_desc: "Refuse Fury's border claims and slow the political recognition of its pact records."
anti_fury_recognition_denial_tt: "Spends command authority to lower Fury pact cohesion or response pressure."
anti_fury_recognition_denial_effect_tt: "Recognition denial weakens one Fury pact record and adds containment pressure."
