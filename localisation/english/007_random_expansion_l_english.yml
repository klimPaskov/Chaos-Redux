fury_open_the_war_office: "Open the War Office"
fury_open_the_war_office_desc: "A single office gathers officers, depot clerks, and border files under the Fury command."
fury_count_the_rifles: "Count the Rifles"
fury_count_the_rifles_desc: "Every usable rifle is counted, stamped, and assigned to a column."
fury_capital_guard: "Capital Guard"
fury_capital_guard_desc: "The first column protects the capital so the rest can move outward."
fury_first_target_files: "First Target Files"
fury_first_target_files_desc: "Neighbor files are ranked by weakness, reach, and border access."
fury_first_target_files_tt: "Queues a Fury target scan and attack order."
fury_field_columns: "Field Columns"
fury_field_columns_desc: "Infantry columns are trained for quick movement, rough supply, and repeated border assaults."
fury_forward_depots: "Forward Depots"
fury_forward_depots_desc: "Rail sheds, road stores, and captured warehouses become the next march line."
fury_occupation_registers: "Occupation Registers"
fury_occupation_registers_desc: "Seized districts are written into occupation books before resistance can become the only authority."
fury_conquest_coring: "Conquest Coring"
fury_conquest_coring_desc: "Settlement boards prepare the legal claim that follows the columns."
fury_hardened_doctrine: "Hardened Doctrine"
fury_hardened_doctrine_desc: "The first evolution turns emergency Fury into a more disciplined war system."
fury_second_war_table: "Second War Table"
fury_second_war_table_desc: "A second Fury command makes cooperation useful and rivalry dangerous."
fury_rival_column: "Rival Column"
fury_rival_column_desc: "The War Office watches another Fury actor as a standard to surpass."
fury_all_borders: "All Borders"
fury_all_borders_desc: "The final escalation treats every valid neighbor as an active target."
fury_world_in_fury: "World in Fury"
fury_world_in_fury_desc: "The rage no longer belongs to one country. Every quiet neighbor feels the same pressure gathering at the roads."
fury_world_in_fury_threat: "World in Fury"
fury_war_office_without_a_door: "The War Office Without a Door"
fury_war_office_without_a_door_desc: "No minister leaves the office cleanly. Every order becomes an attack call, every depot another pulse of the same rage."
fury_war_office_without_a_door_tt: "Unlocks the Fury War Office structure and improves target preparation."
fury_first_war_office_orders: "First War Office Orders"
fury_first_war_office_orders_desc: "The first orders are copied before they are signed. The columns only need the office to stop moving paper long enough to move men."
fury_depot_cadres: "Depot Cadres"
fury_depot_cadres_desc: "Storehouse clerks are turned into cadre officers who know where rifles are missing and where they can be taken."
fury_storm_columns: "Storm Columns"
fury_storm_columns_desc: "The columns train for short violent crossings, fast assembly, and no expectation that the next border waits."
fury_logistics_under_movement: "Logistics Under Movement"
fury_logistics_under_movement_desc: "Trains, trucks, and stores are assigned while already moving, with the rear treated as another active front."
fury_officer_tables: "Officer Tables"
fury_officer_tables_desc: "Commanders work from tables that list depots, roads, targets, and replacement officers in the same ink."
fury_one_border_at_a_time: "One Border at a Time"
fury_one_border_at_a_time_desc: "The War Office keeps one border open, one file active, and one victim close enough for the columns."
fury_weak_neighbor_doctrine: "Weak Neighbor Doctrine"
fury_weak_neighbor_doctrine_desc: "Strength is not admired. It is measured, avoided, and returned to after weaker files are exhausted."
fury_capital_first_plans: "Capital First Plans"
fury_capital_first_plans_desc: "Every target file begins with the capital, the road into it, and the first office to be seized there."
fury_cut_the_rail_before_the_war: "Cut the Rail Before the War"
fury_cut_the_rail_before_the_war_desc: "Supply lines are treated as borders that can be crossed before the formal border is touched."
fury_the_next_neighbor: "The Next Neighbor"
fury_the_next_neighbor_desc: "A finished war is only a closed file. The office has another file already tied with red cord."
fury_census_of_taken_states: "Census of Taken States"
fury_census_of_taken_states_desc: "Names, factories, rail stops, and occupied offices are counted before anyone asks whether the land has settled."
fury_new_registry_offices: "New Registry Offices"
fury_new_registry_offices_desc: "Conquered districts receive guards, shouted orders, and occupation patrols before they receive promises."
fury_rail_and_registry: "Rail and Registry"
fury_rail_and_registry_desc: "The registry follows the rails, and the rails are repaired for the registry."
fury_garrison_the_names: "Garrison the Names"
fury_garrison_the_names_desc: "Each listed town receives a garrison entry. The paper record and the armed post arrive together."
fury_core_by_administration: "Core by Administration"
fury_core_by_administration_desc: "The office waits for registers, compliance, and controlled routes before it declares the state part of the machine."
fury_core_by_march: "Core by March"
fury_core_by_march_desc: "The columns write the claim first and leave the office to make the resistance fit the file."
fury_the_other_fire_answers: "The Other Fire Answers"
fury_the_other_fire_answers_desc: "Another Fury command answers in the same language: tables, border files, and marching hours."
fury_shared_war_tables: "Shared War Tables"
fury_shared_war_tables_desc: "The commands compare targets without admitting that either command trusts the other."
fury_partition_before_victory: "Partition Before Victory"
fury_partition_before_victory_desc: "The spoils are promised before the battle ends so the columns do not waste time arguing afterward."
fury_joint_cadre_transfers: "Joint Cadre Transfers"
fury_joint_cadre_transfers_desc: "Cadres move between Fury commands with rifles, clerks, and the practical suspicion that keeps both offices sharp."
fury_fury_pact_command: "Fury Pact Command"
fury_fury_pact_command_desc: "The pact keeps its own files, but the main table decides which borders move first."
fury_no_second_fury: "No Second Fury"
fury_no_second_fury_desc: "A rival Fury office is not a partner. It is proof that the method can be stolen."
fury_claim_the_same_map: "Claim the Same Victim"
fury_claim_the_same_map_desc: "The rival's chosen victim is named again, louder, until both Fury commands race toward it."
fury_absorb_the_rival_fire: "Absorb the Rival Fire"
fury_absorb_the_rival_fire_desc: "Defeating another Fury means taking its officers, its rage, and its unfinished wars."
fury_last_fury_standing: "Last Fury Standing"
fury_last_fury_standing_desc: "One War Office remains to decide which border is next."
fury_harden_the_columns: "Harden the Columns"
fury_harden_the_columns_desc: "The first failures are stamped into doctrine, and the columns stop treating improvisation as temporary."
fury_depot_officers_without_leave: "Depot Officers Without Leave"
fury_depot_officers_without_leave_desc: "Depot officers are assigned permanently to the march. Leave is a word for offices that still close."
fury_forced_march_tables: "Forced March Tables"
fury_forced_march_tables_desc: "Every road receives a forced-march hour and every delay receives a replacement column."
fury_occupation_as_recruitment: "Occupation as Recruitment"
fury_occupation_as_recruitment_desc: "Occupied registers are made to feed manpower lists, garrison rolls, and replacement drafts."
fury_three_war_offices: "Three War Offices"
fury_three_war_offices_desc: "The command is split into three offices so every border can be processed at once."
fury_storms_on_all_fronts: "Storms on All Fronts"
fury_storms_on_all_fronts_desc: "No front waits for the others. The columns learn to arrive everywhere badly supplied and on time."
fury_no_target_is_first: "No Target Is First"
fury_no_target_is_first_desc: "The target list loses its order. Every valid neighbor becomes an active file."
fury_all_roads_are_front_roads: "All Roads Are Front Roads"
fury_all_roads_are_front_roads_desc: "Rear roads, supply roads, and occupied roads are all marked as routes to another border."
fury_the_last_neighbor_has_fallen: "The Last Neighbor Has Fallen"
fury_the_last_neighbor_has_fallen_desc: "The local files close, but the office does not. Empty borders become a different kind of instruction."
fury_the_last_neighbor_has_fallen_threat: "Fury Exhausts Its Border"
fury_carry_the_orders_overseas: "Carry the Orders Overseas"
fury_carry_the_orders_overseas_desc: "Convoy lists and foreign shores enter the War Office without ceremony."
fury_continental_ignitions: "Continental Ignitions"
fury_continental_ignitions_desc: "Other continents are read as unopened offices with their doors still intact."
fury_main_fury_pact: "Main Fury Pact"
fury_main_fury_pact_desc: "The largest Fury table claims the right to coordinate every lesser fire."
fury_world_in_fury_candidate_tt: "Marks this Fury as the terminal candidate. If the world is already collapsing and enough safe minor states remain to seed, §YThe World in Fury§! begins."
fury_no_neutral_map: "No Neutral Ground"
fury_no_neutral_map_desc: "Neutrality is treated as cowardice waiting to be punished."
fury_no_neutral_map_threat: "No Neutral Ground"
fury_world_in_fury_faction: "The World in Fury"
chaosx.nr7.50.t: "The World in Fury"
chaosx.nr7.50.d: "Fury has stopped being a small-state problem. The first rogue country has become a signal, and other weak governments are answering with the same fever: sudden mobilization, neighbor wars, and columns that keep moving after every warning should have stopped them.\n\nPlayer governments receive this warning before terminal Fury rules can threaten them directly."
chaosx.nr7.50.a: "The fever crosses frontiers."
chaosx.nr7.51.t: "Fury Finds Too Few Hosts"
chaosx.nr7.51.d: "A terminal Fury candidate is ready to spread the rage, but too few safe minor countries remain for the outbreak to take hold. The branch remains blocked until enough eligible countries exist."
chaosx.nr7.51.a: "The fever has nowhere to leap."
chaosx.nr7.52.t: "Fury Turns Toward a Player"
chaosx.nr7.52.d: "The terminal Fury pact has named [fury_terminal_player_target.GetName] as its next victim. The earlier warning period has ended; ordinary Fury setup rules still keep player-linked countries from becoming Fury, but the World in Fury no longer treats them as untouchable."
chaosx.nr7.52.a: "The rage has chosen."
chaosx.nr7.53.t: "The Last Fury Breaks"
chaosx.nr7.53.d: "The last terminal Fury actor has fallen. Its burned convoys, empty barracks, and silent columns remain behind, but no active Fury state is still strong enough to drag another country into the fever."
chaosx.nr7.53.a: "Let the silence hold."
super_event.59.t: "Fury Becomes a State"
super_event.59.q: "\"The condition of man is a condition of war of every one against every one.\"\n §Y-Thomas Hobbes-§!"
super_event.59.a: "The rage has a state."
super_event.59.d: "A minor country has stopped behaving like a country at all. Its soldiers pour into the streets with fever-bright discipline, its officers point them toward the nearest neighbor, and its civilians watch their own government become something hungry.\n\nFury is not policy. It is a force wearing a uniform, and it has learned that conquest makes the burning worse."
super_event.60.t: "The World in Fury"
super_event.60.q: "\"The condition of man is a condition of war of every one against every one.\"\n §Y-Thomas Hobbes-§!"
super_event.60.a: "No country is calm."
super_event.60.d: "The rage has multiplied. Minor states across the world answer one another with the same sudden mobilizations, the same red-eyed officers, the same columns pressing into neighbors before reason can take hold.\n\nThis is not one war spreading outward. It is Fury finding hosts everywhere at once."
