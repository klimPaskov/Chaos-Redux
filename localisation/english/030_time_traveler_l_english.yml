chaosx.nr30.1.t: "Time Traveler"
chaosx.nr30.2.t: "Time Traveler"
chaosx.nr30.2.d: "A mysterious individual claiming to be a time traveler has surfaced within our nation's borders, delivering cryptic insights into future military endeavors. Initially met with skepticism, the predictions of the time traveler gained traction within military and government circles, prompting strategic adjustments and contingency planning."
chaosx.nr30.2.a: "I wonder..."

chaosx.nr30.3.t: "Time Traveler talked"
chaosx.nr30.3.d: "In a surprising development, our country, has proposed an alliance with the USSR, following warnings from a purported time traveler regarding the outcome of a potential war against the Soviet Union. This proposed Berlin-Moscow Axis marks a significant shift in our nation's strategy, aimed at safeguarding our security and stability. As discussions progress, we remain committed to exploring diplomatic solutions to ensure peace and cooperation in Europe."
chaosx.nr30.3.a: "Ally Moscow"
chaosx.nr30.3.b: "Our Fatherland must be bigger!"

chaosx.nr30.4.t: "[From.GetName] proposes alliance"
chaosx.nr30.4.d: ""
chaosx.nr30.4.a: "Ally Berlin"
chaosx.nr30.4.b: "Nazi dogs!"

chaosx.nr30.5.t: "Unholy Alliance"
chaosx.nr30.5.d: ""
chaosx.nr30.5.a: "Form Berlin-Moscow Axis"

chaosx.nr30.6.t: "[From.GetName] denies us!"
chaosx.nr30.6.d: ""
chaosx.nr30.6.a: "Whores!"

chaosx.nr30.7.t: "Time Traveler talked"
chaosx.nr30.7.d: "In a remarkable twist, a time traveler has provided our nation with crucial intelligence regarding Japan's military plans. This unexpected disclosure has significantly enhanced our understanding of Japanese military strategies and preparations, granting us invaluable insight into their intentions and capabilities. With this newfound intelligence, our nation stands poised to strengthen its position in the Pacific theater and safeguard our interests in the region. As we analyze the implications of this revelation, our commitment to ensuring stability and security in the Asia-Pacific remains unwavering."
chaosx.nr30.7.a: "We've got em!"

chaosx.news.33.t: "Time Traveler"
chaosx.news.33.d: "Reports have emerged of a mysterious individual claiming to be a time traveler, appearing in [From.GetName] and extending a helping hand with vital intelligence. Donning unconventional attire and exuding an air of enigmatic knowledge, this unexpected visitor has stunned authorities and citizens alike with their precise insights into imminent security threats and covert operations. While skepticism abounds regarding the origins and motives of the time traveler, their invaluable assistance has proven instrumental in thwarting potential dangers and safeguarding national security. As [From.GetName] grapples with the implications of this extraordinary encounter, questions abound about the nature of time travel and its potential impact on intelligence gathering and defense strategies."
chaosx.news.33.a: "Curious..."

chaosx.news.34.t: "The Berlin-Moscow Axis"
chaosx.news.34.d: "Following revelations from the mysterious time traveler regarding a potential German invasion of the Soviet Union, German intelligence has initiated diplomatic talks. Concerned by the forecast of defeat, Germany has proposed an alliance with the Soviet Union, forming the Berlin-Moscow Axis. This unexpected move signals a significant shift in European geopolitics, sparking speculation about the future of the war and international relations."
chaosx.news.34.a: "Unexpected"

chaosx.news.35.t: "USA Intelligence"
chaosx.news.35.d: "In a stunning revelation linked to the mysterious time traveler's presence, the United States intelligence agencies have reportedly gained unprecedented knowledge regarding Japan's military operations. The time traveler's insights have unveiled the intricacies of Japan's surprise operations and military planning, rendering them ineffective as the element of surprise has been neutralized. This newfound intelligence marks a significant advantage for the United States, altering the dynamics of the Pacific theater and potentially reshaping the course of the war. As tensions escalate and strategies evolve, the world watches with bated breath to see how this newfound knowledge will impact the conflict between the United States and Japan."
chaosx.news.35.a: "Japan stands no chance"
