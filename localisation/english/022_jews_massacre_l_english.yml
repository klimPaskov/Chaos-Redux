chaosx.nr22.1.t: "Jews Massacre"

chaosx.nr22.2.t: "Spain offers to murder all jews"
chaosx.nr22.2.d: ""
chaosx.nr22.2.a: "They are mad!"

chaosx.nr22.3.t: "Spain wants to rid the world of filthy jews!"
chaosx.nr22.3.d: ""
chaosx.nr22.3.a: "Invite them to our faction!"
chaosx.nr22.3.b: "They are mad!"

chaosx.nr22.4.t: "1391"
chaosx.nr22.4.d: "We must restore our previous glory and show our racial superiority over these sub-humans called jews!"
chaosx.nr22.4.a: "Let the massacre begin!"
chaosx.nr22.4.b: "..."

chaosx.news.22.t: "Spain declares war on jews!"
chaosx.news.22.d: "A wave of anti-Jewish riots has erupted in several cities and towns of Spain, leaving thousands of Jews dead, injured, or forcibly converted to Christianity. The violence, which began in Seville in June, has spread to other parts of Castile, Aragon, Valencia, and Catalonia, fueled by religious fanaticism, social unrest, and economic grievances.\n\nSpain is now extending the killing into many jew infested countries and is expecting help in the process."
chaosx.news.22.a: "It's 1391 all over again!"
