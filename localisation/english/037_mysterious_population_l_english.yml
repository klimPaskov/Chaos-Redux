chaosx.nr37.1.t: "Mysterious Population"

chaosx.nr37.2.t: "Mysterious Population"
chaosx.nr37.2.d: "Our nation has stumbled upon a massive population seemingly appearing out of nowhere in a remote region. Representatives from this newfound populace have offered support to our military efforts, presenting their manpower as a resource. As we cautiously engage with the enigmatic group, diplomatic channels are opened to establish dialogue and ascertain their origins and intentions."
chaosx.nr37.2.a: "Now green coloured??? Enslave them!"

chaosx.news.42.t: "Mysterious population, aliens?"
chaosx.news.42.d: "[From.GetName] has uncovered a previously unknown population in a remote region, seemingly materializing out of thin air. Representatives from this newfound populace are offering support to [From.GetName]'s military efforts and to serve as their manpower. The sudden appearance of this vast population has ignited curiosity and caution, prompting authorities to investigate further."
chaosx.news.42.a: "New race?"
