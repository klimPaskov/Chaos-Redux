l_english:
chaosx.nr89.1.t: "Tech sharing group"
chaosx.nr89.2.t: "Join a tech sharing group"
chaosx.nr89.2.d: "Our nation has been extended an invitation to join a technology sharing group, presenting an opportunity to collaborate with other advanced nations in the pursuit of scientific innovation and technological advancement."
chaosx.nr89.2.a: "Commonwealth research group"
chaosx.nr89.2.b: "Comintern research group"
chaosx.nr89.2.c: "Axis research group"
chaosx.nr89.2.e: "Japanese research group"
chaosx.nr89.2.f: "US research group"
chaosx.nr89.2.g: "Our technology is only for us!"

chaosx.nr89.3.t: "Our tech sharing group"
chaosx.nr89.3.d: "To foster international cooperation and accelerate scientific progress, our nation has extended invitations to every country to join our research group. This initiative aims to create a collaborative platform where nations can share knowledge, resources, and expertise to tackle pressing global challenges and drive innovation across various fields."
chaosx.nr89.3.a: "Let's see!"

chaosx.nr89.4.t: "[FROM.GetName] has joined our research group!"
chaosx.nr89.4.d: "Together, we stand united in our commitment to pushing the boundaries of scientific discovery and shaping a better future for all."
chaosx.nr89.4.a: "Sharing is caring"
