chaosx.nr73.1.t: "Mongols Rise"

chaosx.nr73.2.t: "Restore the Mongol glory?"
chaosx.nr73.2.d: ""
chaosx.nr73.2.a: "Restore our glory!"
chaosx.nr73.2.b: "We should just be"

chaosx.news.64.t: "The Mongols rise once again"
chaosx.news.64.d: "In a startling development, the Mongol people have risen once again, asserting their influence in the region and beyond. With a renewed sense of identity and unity, the Mongols have embarked on a campaign to reclaim their historical legacy and assert their place on the world stage. Led by charismatic leaders and fueled by a desire for revival, the Mongol resurgence sends shockwaves through neighboring nations."
chaosx.news.64.a: "Legacy of the Khan"
