l_english:
biological_raid_available_tooltip: "You must have an unlocked biological or anti-zombie raid payload available to use this raid category."
raid_category_biological_raids: "Biological Raids"
raid_category_header_biological_raids: "Biological Raids"
tooltip_raid_category_biological_raids: "§YBiological Raids§!\nStrategic raids for biological payloads, including epidemic weapons and anti-zombie containment bombs."

raid_type_anthrax_strike: "Anthrax Strike"
raid_anthrax_strike_tt: "The anthrax bomb has been deployed, causing widespread illness. The effects can be reduced by taking special defense decisions against biological weapons.\n"

raid_type_plague_strike: "Plague Strike"
raid_plague_strike_tt: "The plague bomb has been deployed, causing devastating long-term contamination. The effects can be reduced by taking special defense decisions against biological weapons.\n"

raid_type_tularemia_strike: "Tularemia Strike"
raid_tularemia_strike_tt: "The tularemia bomb has been deployed, causing tactical disruption to enemy forces. The effects can be reduced by taking special defense decisions against biological weapons.\n"

raid_type_smallpox_strike: "Smallpox Strike"
raid_smallpox_strike_tt: "The smallpox bomb has been deployed, triggering a permanent epidemic that will devastate the target population until comprehensive vaccination programs are implemented. This strategic bioweapon attack may spread to neighboring regions and requires immediate international response. The effects can only be countered by national vaccination programs.\n"
raid_type_zombie_cure_strike: "Anti-Zombie Bomb Strike"
raid_zombie_cure_strike_tt: "A cure-saturation payload has drenched the target state with anti-zombie decontaminants. While any country still maintains an active cure, zombie-held control of the treated state becomes far less useful for movement, local supply, and manpower extraction."
zombie_cure_raid_available_tooltip: "An active zombie cure is required before anti-zombie bomb strikes can be launched."
raid_type_weaponized_zombie_strike_low: "Weaponized Zombie Strike"
raid_type_weaponized_zombie_strike_medium: "Weaponized Zombie Strike"
raid_type_weaponized_zombie_strike_high: "Weaponized Zombie Strike"
raid_weaponized_zombie_strike_low_tt: "A tailored zombie-strain payload has been dispersed over the target area. Surviving delivery aircraft may seed a smaller outbreak, while successful strikes can create a full weaponized zombie state."
raid_weaponized_zombie_strike_medium_tt: "$raid_weaponized_zombie_strike_low_tt$"
raid_weaponized_zombie_strike_high_tt: "$raid_weaponized_zombie_strike_low_tt$"

chemical_raid_available_tooltip: "You must have an unlocked chemical raid payload available to use chemical raids."
raid_category_chemical_raids: "Chemical Raids"
raid_category_header_chemical_raids: "Chemical Raids"
tooltip_raid_category_chemical_raids: "§YChemical Raids§!\nStrategic delivery raids for specialized chemical payloads launched by bombers or rockets. Lethal nerve-agent raids increase international condemnation, while the US special disruption payloads do not."

raid_type_chemical_sarin_strike: "Sarin Strike"
raid_type_chemical_sarin_rocket_strike: "Sarin Rocket Strike"
raid_type_chemical_soman_strike: "Soman Strike"
raid_type_chemical_soman_rocket_strike: "Soman Rocket Strike"
raid_type_chemical_malodor_strike: "Malodor Strike"
raid_type_chemical_aphrodisiac_strike: "Aphrodisiac Strike"

raid_chemical_nerve_sarin_tt: "A sarin (GB) payload has been released over the target area, causing immediate damage to units in the struck province plus severe but short-lived contamination and panic. This chemical strike increases international condemnation."
raid_chemical_nerve_soman_tt: "A soman (GD) payload has been released over the target area, causing immediate damage to units in the struck province plus very strong but short-lived contamination and panic. This chemical strike increases international condemnation."
raid_chemical_malodor_tt: "A concentrated malodorant payload, later nicknamed the 'smelly bomb,' has drenched the target area. Units in the struck province lose organization immediately while the state suffers heavy short-term disruption to entrenchment, defense, movement, occupation control, and sortie preparation. This raid does not add international condemnation."
raid_chemical_aphrodisiac_tt: "A speculative aerosol behavioral-agent payload, later nicknamed the 'gay bomb,' has been released over the target area. Units in the struck state become more aggressive but far less coordinated, resilient, and prepared. This raid does not add international condemnation."
