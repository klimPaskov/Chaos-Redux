soviet_collapse_review_republic_release_risk: "Republic Release Risk Ledger"
soviet_collapse_review_republic_release_risk_desc: "This ledger is informational. It shows the current MTTH release state before another republic appears on the map.\n\n§YRoll Gate: [This.GetSovietCollapseReleaseRollGateStatus]§!\n§LThe gate opens only after pacing, real or latent release pressure, sustained pressure, and a valid candidate pool all align.§!\n\n§RRelease Urgency: [?soviet_collapse_release_urgency_score|1]§!\n§LDriven by Armed Breakaway Momentum, weak Moscow Authority, Overall Union Crisis Threat, Foreign Penetration, depot exposure, League Cohesion, Old Movement Resurgence, breakaway count, and failed objectives.§!\n\n§OCandidates Available: [?soviet_collapse_progressive_release_candidate_count|0]§!\n§LThe number of republics that currently satisfy the progressive release candidate rules. No release roll can succeed while this is zero.§!\n\n§YStored Release Pressure: [?soviet_collapse_progressive_release_pressure|1]§!\n§LUnresolved pressure accumulates across eligible monthly checks, opens the accumulated-pressure gate at the configured threshold, and resets after a real release or empty candidate pool.§!\n\n§YLatest Release Weight: [?soviet_collapse_last_progressive_release_weight|1]§!\n§YLatest Miss Weight: [?soviet_collapse_last_progressive_release_miss_weight|1]§!\n§LThese weights are recomputed during the monthly release check when candidates exist. Higher release weight and lower miss weight mean the next monthly check is more likely to produce a republic.§!\n\n§YLatest Candidates: [?soviet_collapse_last_progressive_release_candidate_count|0]§!\n§YLatest Pressure: [?soviet_collapse_last_progressive_release_pressure|1]§!\n§YLatest Urgency: [?soviet_collapse_last_progressive_release_urgency_score|1]§!\n§YLatest Cascade: [?soviet_collapse_last_progressive_release_cascade_score|1]§!\n\n§YFamily Drivers:§!\n§LMomentum: [?soviet_collapse_last_progressive_release_family_momentum_component|1] | Authority loss: [?soviet_collapse_last_progressive_release_family_authority_component|1] | Threat: [?soviet_collapse_last_progressive_release_family_threat_component|1]\nForeign: [?soviet_collapse_last_progressive_release_family_foreign_component|1] | Regional cascade: [?soviet_collapse_last_progressive_release_family_cascade_component|1]§!\n\n§YFamily Candidate Pools:§!\n§LWestern: [?soviet_collapse_last_progressive_release_family_western_candidates|0] | Baltic: [?soviet_collapse_last_progressive_release_family_baltic_candidates|0] | Caucasus: [?soviet_collapse_last_progressive_release_family_caucasus_candidates|0]\nCentral Asia: [?soviet_collapse_last_progressive_release_family_central_asia_candidates|0] | Kazakhstan: [?soviet_collapse_last_progressive_release_family_kazakhstan_candidates|0] | Internal: [?soviet_collapse_last_progressive_release_family_internal_candidates|0]\nPressure Successors: [?soviet_collapse_last_progressive_release_family_pressure_successor_candidates|0] | General: [?soviet_collapse_last_progressive_release_family_general_candidates|0]§!\n\n§YFamily Weights:§!\n§LWestern: [?soviet_collapse_last_progressive_release_family_western_weight|1] | Baltic: [?soviet_collapse_last_progressive_release_family_baltic_weight|1] | Caucasus: [?soviet_collapse_last_progressive_release_family_caucasus_weight|1]\nCentral Asia: [?soviet_collapse_last_progressive_release_family_central_asia_weight|1] | Kazakhstan: [?soviet_collapse_last_progressive_release_family_kazakhstan_weight|1] | Internal: [?soviet_collapse_last_progressive_release_family_internal_weight|1]\nPressure Successors: [?soviet_collapse_last_progressive_release_family_pressure_successor_weight|1] | General: [?soviet_collapse_last_progressive_release_family_general_weight|1]§!\n\n§YLocks:§!\n§LProgressive release cooldown: [This.GetSovietCollapseProgressiveReleaseCooldownStatus]\nFirst-month collapse lock: [This.GetSovietCollapseFirstMonthReleaseLockStatus]\nStrong-center guard: [This.GetSovietCollapseStrongCenterReleaseLockStatus]§!"
