soviet_collapse_review_republic_release_risk: "Republic Release Risk Ledger"
soviet_collapse_review_republic_release_risk_desc: "This ledger is informational. It shows the current MTTH release state before another republic appears on the map.\n\n§RRelease Urgency: [?soviet_collapse_release_urgency_score|1]§!\n§LDriven by Armed Breakaway Momentum, weak Moscow Authority, Overall Union Crisis Threat, Foreign Penetration, depot exposure, League Cohesion, Old Movement Resurgence, breakaway count, and failed objectives.§!\n\n§OCandidates Available: [?soviet_collapse_progressive_release_candidate_count|0]§!\n§LThe number of republics that currently satisfy the progressive release candidate rules. No release roll can succeed while this is zero.§!\n\n§YStored Release Pressure: [?soviet_collapse_progressive_release_pressure|1]§!\n§LUnresolved pressure accumulates across eligible monthly checks, opens the accumulated-pressure gate at the configured threshold, and resets after a real release or empty candidate pool.§!"
