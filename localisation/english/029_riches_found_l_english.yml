l_english:
chaosx.nr29.1.t: "Riches Found"

chaosx.nr29.2.t: "Riches Found!"
chaosx.nr29.2.d: "Through diligent exploration and unwavering luck, we have found vast reserves of gold within our borders. Truly a glorious day!"
chaosx.nr29.2.a: "Luck is ours!"

chaosx.news.31.t: "Vast Gold Reserves"
chaosx.news.31.d: "In a historic revelation that sends shockwaves through global markets, [FROM.GetName] announces the discovery of vast gold reserves within its borders. Geological surveys and exploratory drilling have unveiled a treasure trove of precious metal, positioning [FROM.GetName] as a new powerhouse in the global gold market."
chaosx.news.31.a: "That's a lot of gold!"
