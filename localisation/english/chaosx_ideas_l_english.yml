desert_storm: "Sandstorm"
searching_for_cure: "Searching for a cure"
searching_for_cure_desc: "It takes time and effort to find the effective cure against the Zombies."
searching_for_cure_tier_1: "Searching for a cure (Evolved Zombies)"
searching_for_cure_tier_1_desc: "The zombies have evolved, making cure research more challenging and requiring additional resources."
searching_for_cure_tier_2: "Searching for a cure (Advanced Zombies)"
searching_for_cure_tier_2_desc: "Advanced zombie mutations make cure development extremely difficult, draining our research capabilities and economy."
searching_for_cure_tier_3: "Searching for a cure (Ultimate Zombies)"
searching_for_cure_tier_3_desc: "The ultimate zombie form poses an unprecedented challenge. Cure research requires massive resources and is causing social unrest."
cure_activated: "Zombies Cure Activated"
cure_activated_desc: "We have found an effective cure against the Zombies! This is a matter of time until the Zombies evolve to resist the cure."
cure_sharing_bonus: "Cure Sharing Bonus"
cure_sharing_bonus_desc: "The cure is active against the zombies, sharply reducing their combat performance, speed, and manpower conversion while they adapt."
zombie_postwar_global_vigilance: "Global Vigilance Regime"
zombie_postwar_global_vigilance_desc: "The zombie wars forced governments into permanent sanitary oversight, emergency stockpiles, and coordinated outbreak drills. Research and special-project work benefit from that shared discipline, but the administrative burden never really goes away.\n\nDynamic zombie outbreak chance: §GReduced§!."

outbreak_prevention_hygiene_measures: "Strict Hygiene Protocols"
outbreak_prevention_hygiene_measures_desc: "Mandatory sanitization, health inspections, and hygiene protocols are in effect. These measures provide basic protection against zombie outbreaks and modestly reduce the impact of other disease contamination, with only a light administrative and industrial burden."

outbreak_prevention_migration_restricted: "Migration Restrictions"
outbreak_prevention_migration_restricted_desc: "Internal movement is restricted to slow the spread of infection. The policy creates a manageable drag on growth, administration, and trade, while also slightly reducing broader disease exposure."

outbreak_prevention_quarantine_protocols: "Quarantine Protocols"
outbreak_prevention_quarantine_protocols_desc: "Extensive quarantine measures are enforced with isolation facilities and movement controls. They create noticeable economic friction, but sharply reduce zombie outbreak risk and materially strengthen broader disease containment without crippling the country."

outbreak_prevention_borders_closed: "Completely Closed Borders"
outbreak_prevention_borders_closed_desc: "All borders are sealed with no external movement permitted. The policy imposes a heavy but still sustainable burden on trade and growth while offering near-maximum protection against external infection sources and imported disease contamination."

outbreak_prevention_extreme_martial_law: "Extreme Martial Law"
outbreak_prevention_extreme_martial_law_desc: "Total military control with shoot-on-sight orders for suspected infected. The social and economic burden is still severe, but no longer outright paralyzing, while the armed forces gain stronger control over both zombie suppression and wider disease containment."

