azl_investment_penalty: "League Research Investment"
azl_investment_penalty_desc: "We have diverted significant resources to the Anti-Zombie League's research programs, temporarily reducing our domestic research and production capabilities while contributing to humanity's fight against the undead."

# Antibiotics Mass Production
anthrax_antibiotics_mass_production_idea: "Anthrax Antibiotics Mass Production"
anthrax_antibiotics_mass_production_idea_desc: "Industrial-scale production of antibiotics and medical countermeasures provides our population with significant protection against anthrax bioweapons. Our civilian factories are producing medical supplies at maximum capacity, increasing consumer goods burden but dramatically reducing the effects of anthrax contamination. Effectiveness scales with industrial capacity - each civilian factory improves our resistance by 1% (maximum 30%)."

developing_anthrax_antibiotics_research_slowdown: "Emergency Anthrax Antibiotics Development"
developing_anthrax_antibiotics_research_slowdown_desc: "Our scientists and researchers are working frantically to develop anthrax antibiotics capabilities from scratch. This emergency program diverts significant resources from other research projects but is essential for protecting our population against anthrax bioweapons."

plague_antibiotics_mass_production_idea: "Plague Antibiotics Mass Production"
plague_antibiotics_mass_production_idea_desc: "Industrial-scale production of specialized antibiotics and medical countermeasures provides our population with crucial protection against plague bioweapons. Due to plague's extreme virulence, this requires significant civilian factory dedication and increases consumer goods burden substantially, but provides vital resistance against this devastating disease. Effectiveness scales with industrial capacity - each civilian factory improves our resistance by 1% (maximum 25%)."

developing_plague_antibiotics_research_slowdown: "Emergency Plague Antibiotics Development"
developing_plague_antibiotics_research_slowdown_desc: "Our scientists and researchers are working around the clock to develop plague antibiotics capabilities from scratch. This intensive emergency program requires substantial resources and significantly slows other research projects, but is absolutely critical for population survival against plague bioweapons."

tularemia_antibiotics_mass_production_idea: "Tularemia Antibiotics Mass Production"
tularemia_antibiotics_mass_production_idea_desc: "Industrial-scale production of tularemia antibiotics and medical countermeasures provides our population and military with excellent protection against tularemia bioweapons. Due to tularemia's relatively manageable nature, this program has a lower consumer goods burden while providing highly effective resistance. Effectiveness scales with industrial capacity - each civilian factory improves our resistance by 1.5% (maximum 40%)."

developing_tularemia_antibiotics_research_slowdown: "Emergency Tularemia Antibiotics Development"
developing_tularemia_antibiotics_research_slowdown_desc: "Our scientists and researchers are developing tularemia antibiotics capabilities from scratch. This emergency program has a relatively moderate impact on other research projects due to tularemia's easier treatment profile, making it a practical defensive measure against tactical bioweapons."

# Smallpox Vaccination Programs
smallpox_vaccination_program_idea: "National Smallpox Vaccination Program"
smallpox_vaccination_program_idea_desc: "Unprecedented national-scale vaccination program against smallpox provides our population with strategic-level protection against the ultimate biological weapon. Due to smallpox's extreme contagiousness and lethality, this program requires massive civilian factory dedication and severely increases consumer goods burden, but provides essential resistance against permanent epidemics."

chemical_first_use_surprise_idea: "Chemical Battlefield Surprise"
chemical_first_use_surprise_idea_desc: "Our first successful live chemical deployment has caught enemy formations off guard. For a short window, frontline chemical units and cylinder attacks operate with heightened effectiveness while the enemy adapts.\n\n§YChemical Support Companies§! gain §G+50%§! effectiveness while this idea is active.\n\nThis bonus is granted only once per country and cannot be regained."

chemical_command_reagent_optimization_spirit: "Reagent Optimization Corps"
chemical_command_reagent_optimization_spirit_desc: "Chaos Warfare command staffs centralize reagent accounting, reserve cycling, and shock-company force design. Cylinder assault chains become cheaper to execute, while dedicated chemical formations are reorganized for immediate field adoption."
chemical_command_reagent_optimization_spirit_tt: "§YChemical attacks that cost Command Power§! cost §G20%§! less, and §YChemical cylinder abilities§! consume §G20%§! fewer cylinder payloads.\n§YChemical sub-unit§! template design costs are reduced to §G0 Army XP§!."

chemical_air_deep_strike_spirit: "Chemical Deep Strike Office"
chemical_air_deep_strike_spirit_desc: "Air command integrates chemical raid scheduling with theater-level strike planning, improving target conditioning and sustained contamination pressure across contested air regions."
chemical_air_deep_strike_spirit_tt: "§YChemical raids§! and §Ychemical air-bomb attacks§! are §G20%§! more effective, including stronger and longer-lasting contamination from those operations."

chemical_division_contamination_command_spirit: "Chemical Division Command Cell"
chemical_division_contamination_command_spirit_desc: "Division command staffs standardize frontline chemical sequencing across Livens teams, tank-shell companies, and chaos battalions. Mixed chemical formations execute denser releases with better battlefield persistence."
chemical_division_contamination_command_spirit_tt: "§YAll chemical combat subunits§! gain §G+20%§! chemical combat effect scaling:\n- Livens projector support profiles\n- Chemical tank-shell support profiles\n- Chaos battalion contamination, damage, and condemnation output\n\nIf §YChemical Barrage§! is a preferred tactic, its preferred selection weight is increased by §G+100%§!."

chemical_operations_academy_spirit: "Chemical Operations Academy"
chemical_operations_academy_spirit_desc: "The academy codifies chemical warfare command methods for the entire officer corps. New and rising generals are screened for chemical operational aptitude and integrated into frontline gas-command doctrine."
chemical_operations_academy_spirit_tt: "§YArmy leaders§! have a §G50%§! chance to gain §YChemical Operations Commander§! when first assigned and on level-up.\n§YChemical Operations Commander§! can only be manually assigned while this spirit is active.\nThis spirit is available without §YChaos Warfare§! doctrine."

weaponized_zombie_creator_cure_advantage: "Creator Zombie Familiarity"
weaponized_zombie_creator_cure_advantage_desc: "Our researchers understand the profile of this custom zombie better than anyone else, granting a temporary advantage while the rest of the world struggles to react."

weaponized_zombie_type_infected: "Infected Horde"
weaponized_zombie_type_infected_desc: "A baseline weaponized zombie outbreak, still recognizably infected but tuned for battlefield deployment rather than random spread."
weaponized_zombie_type_rabid: "Rabid Horde"
weaponized_zombie_type_rabid_desc: "A weaponized zombie profile built around speed, frenzy, and immediate shock violence."
weaponized_zombie_type_parasitic: "Parasitic Horde"
weaponized_zombie_type_parasitic_desc: "A parasite-driven zombie outbreak with stronger internal coordination and better survival under pressure."
weaponized_zombie_type_mutant: "Mutant Horde"
weaponized_zombie_type_mutant_desc: "An unstable transformed zombie family, shaped by extreme mutation rather than clean disease logic."
weaponized_zombie_type_undead: "Undead Horde"
weaponized_zombie_type_undead_desc: "A true undead zombie outbreak, harder to destroy and less dependent on living biological limits."
weaponized_zombie_type_necrotic: "Necrotic Horde"
weaponized_zombie_type_necrotic_desc: "A necrotic reanimation zombie family optimized for attrition, durability, and battlefield persistence."
weaponized_zombie_type_demonic: "Demonic Zombie Horde"
weaponized_zombie_type_demonic_desc: "A corrupted extra-scientific zombie outbreak, stronger and more violent than normal infected but inherently less controllable."

weaponized_zombie_rabid_horde: "Rabid Horde"
weaponized_zombie_rabid_horde_desc: "A stripped-down assault zombie optimized for aggression, speed, and immediate battlefield violence."

weaponized_zombie_necrotic_siege: "Necrotic Siege"
weaponized_zombie_necrotic_siege_desc: "A slow, stubborn zombie built around durability and attritional pressure rather than rapid spread."

weaponized_zombie_parasitic_directed: "Directed Parasitic Behavior"
weaponized_zombie_parasitic_directed_desc: "A semi-directed parasitic zombie profile that retains enough selective behavior to be steered toward chosen targets."

weaponized_zombie_controlled_loyalty: "Controlled Loyalty Conditioning"
weaponized_zombie_controlled_loyalty_desc: "A rare selective-control profile that preserves enough cognition or conditioning to remain temporarily obedient to its creators."

weaponized_zombie_purifier: "Purifier Targeting"
weaponized_zombie_purifier_desc: "A selective profile that largely ignores normal humans and turns its violence toward other infected hordes."

weaponized_zombie_semi_sapient: "Semi-Sapient Cunning"
weaponized_zombie_semi_sapient_desc: "Fragments of mind remain inside the infected, producing a chillingly selective and partly self-directed outbreak."

weaponized_zombie_creator_betrayer: "Controlled Loyalty Conditioning"
weaponized_zombie_creator_betrayer_desc: "A selective-control profile that appears stable enough to preserve obedience to its creators in the field."

weaponized_zombie_wendigo: "Wendigo"
weaponized_zombie_wendigo_desc: "The project has produced something beyond ordinary outbreak logic: a hyper-violent convergence of undeath, mutation, and predatory intelligence."
weaponized_zombie_wendigo_world_end: "Wendigo Ascendancy"
weaponized_zombie_wendigo_world_end_desc: "The Wendigo horror has crossed from engineered catastrophe into continental dominance. Its packs move as an end-state predator rather than an outbreak."
