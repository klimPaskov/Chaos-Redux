l_english:
chaosx.nr79.1.t: "The Battle for a minor"
chaosx.nr79.1.d: "Our nation is called upon to defend a neutral minor that has come under threat from our enemies. The imperative to safeguard our ally's loyalty and support is paramount, as their alignment with our adversaries could jeopardize our strategic interests and regional stability."
chaosx.nr79.1.a: "We are the Master!"

chaosx.nr79.2.t: "[?global.minor_to_attract.GetName] is ours!"
chaosx.nr79.2.d: "Our nation celebrates a significant victory as we successfully aligned the minor to our cause. Through skillful diplomacy and strategic overtures, we have secured their loyalty and commitment, ensuring that they remain steadfast allies in our shared endeavors."
chaosx.nr79.2.a: "Well worth it!"

chaosx.news.66.t: "The Master"
chaosx.news.66.d: "A minor country that once served as a battleground for major powers has been successfully won over by [FROM.GetName]. Through strategic negotiations and skilled diplomacy, the new ally has secured the allegiance of the minor nation, marking a significant shift in regional alliances. The diplomatic triumph underscores the growing influence and diplomatic acumen of the victorious nation."
chaosx.news.66.a: "Spread love everywhere you go"
