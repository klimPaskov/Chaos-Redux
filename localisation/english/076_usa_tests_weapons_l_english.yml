l_english:
chaosx.nr76.1.t: "USA tests weapons!"

chaosx.nr76.1.d: "A tragedy has struck our nation as the USA conducts weapons testing within our borders, resulting in the loss of countless lives and widespread destruction of buildings and infrastructure. The gravity of this dire situation has prompted urgent deliberations within our government, with voices calling for retaliation and war against the USA."
chaosx.nr76.1.a: "Nothing we can do"
chaosx.nr76.1.b: "They asked for it"
