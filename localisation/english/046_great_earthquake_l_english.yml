chaosx.nr46.1.t: "Global Earthquake"

chaosx.nr46.2.t: "The Earth Earthquake"
chaosx.nr46.2.d: "Our country is reeling from the devastating impact of a global earthquake, which has shaken the very foundations of our planet and left widespread destruction in its wake. This seismic event, of medium strength, has caused significant damage to industries around the world, including ours, and has tragically resulted in the loss of many lives. The scale of this catastrophe is unprecedented, with communities worldwide grappling with the aftermath of collapsed infrastructure, disrupted supply chains, and humanitarian crises."
chaosx.nr46.2.a: "The entire world shakes from fear"
