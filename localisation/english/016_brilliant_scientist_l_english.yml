l_english:
chaosx.nr16.1.t: "Brilliant Scientist"
chaosx.nr16.2.t: "Brilliant Scientist"
chaosx.nr16.2.d: "A previously unknown scientist has demonstrated an impressive set of skills and knowledge and is offering to help our country in technological research. It is believed that he is not from this world, and that was sent by aliens to learn more about our world's advancements. Any gift is a gift no matter what!"
chaosx.nr16.2.a: "We will be so much ahead!"

chaosx.news.18.t: "Brilliant Scientist"
chaosx.news.18.d: "The scientific community is buzzing with excitement as a brilliant and enigmatic scientist, has extended an offer to assist [From.GetName] in a technological revolution that could reshape the nation's future. Doctor, known for his pioneering work in various scientific disciplines, has caught the attention of government officials and researchers alike.\n\nSome voices in the community are suggesting that the doctor may not be of this world, pointing to his seemingly unparalleled intellect and the rapid pace of his technological advancements. The speculation has led to whispers of extraterrestrial origins, though the scientific community remains cautious about such sensational claims."
chaosx.news.18.a: "An alien?"
