l_english:
chaosx.nr68.1.t: "Alien colony"

chaosx.nr68.2.t: "An alien colony?"
chaosx.nr68.2.d: "A medieval alien colony has unexpectedly appeared on our soil, sparking uncertainty and apprehension among our populace. With limited information about their intentions and capabilities, the prospect of military action looms large but carries significant risks. As our government weighs its options, diplomatic engagement and cautious assessment must precede any decision to ensure the safety and security of our nation."
chaosx.nr68.2.a: "It's too much of a risk..."
chaosx.nr68.2.b: "Obliterate them, leaving only ashes"

chaosx.nr68.3.t: "The reckless wrath"
chaosx.nr68.3.d: "Our nation's decision to attack the alien race known as the ZIN has unleashed a catastrophic chain of events. In response to our aggression, the ZIN's gods have unleashed their reckless wrath upon us, vowing relentless retaliation until we relent. Faced with dire consequences, we are presented with two stark options: accept land loss as punishment or continue fighting in a perilous quest to reach their capital."
chaosx.nr68.3.a: "It was a mistake"
chaosx.nr68.3.b: "Who are they!?"

chaosx.news.60.t: "An alien colony?"
chaosx.news.60.d: "In an unprecedented development, a mysterious alien colony known as ZIN has settled within the borders of [FROM.GetName]. society of ZIN appears to operate within a medieval framework. As speculation and curiosity abound, efforts to establish communication and cooperation with the alien settlers are underway."
chaosx.news.60.a: "Mysterious"
