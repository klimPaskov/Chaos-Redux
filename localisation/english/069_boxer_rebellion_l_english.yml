chaosx.nr69.1.t: "The Boxer Rebellion"

chaosx.nr69.2.t: "The Boxer Rebellion"
chaosx.nr69.2.d: "Our nation finds itself embroiled in a new Boxer Rebellion, fueled by foreign influence encroaching upon our lands. In a resolute bid to reclaim our rightful territory, we must take decisive action to expel those who refuse to relinquish control. With the spirit of the Boxers coursing through our veins, we stand ready to defend our land and assert our sovereignty against all who dare to challenge us."
chaosx.nr69.2.a: "The Middle Kingdom is ours"
chaosx.nr69.2.b: "No"










chaosx.nr69.3.t: "China sends an ultimatum"

chaosx.nr69.3.d: "Our nation faces a critical decision regarding the fate of our colonies in China. The option to retain control risks escalating tensions and sparking conflict with the Chinese authorities. Conversely, relinquishing control will avoid war but entails ceding territory and influence."
chaosx.nr69.3.a: "They have no authority"
chaosx.nr69.3.b: "Cede the lands back to them"

chaosx.news.61.t: "The Boxer Rebellion"
chaosx.news.61.d: "In a resurgence reminiscent of the Boxer Rebellion, China has adopted a stringent anti-foreign influence policy, demanding the expulsion of every foreign entity from the middle kingdom. This dramatic move harkens back to a tumultuous era in Chinese history and signals a renewed assertiveness in asserting sovereignty and autonomy. The policy, which echoes nationalist sentiments and calls for the protection of Chinese culture and interests, has sent shockwaves through the international community, raising concerns about diplomatic relations and global stability"
chaosx.news.61.a: "1899"
