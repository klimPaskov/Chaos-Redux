chaosx.nr94.1.t: "Half gone"

chaosx.nr94.2.t: "Half gone!"
chaosx.nr94.2.d: "A startling revelation shakes the nation as it is discovered that nearly half of our military equipment has vanished without a trace. The disappearance of such a substantial portion of our defense assets raises grave concerns about national security."
chaosx.nr94.2.a: "A huge loss for us!"

chaosx.news.75.t: "Half gone"
chaosx.news.75.d: "[FROM.GetName] finds itself in crisis as it is revealed that half of its military equipment has vanished without explanation. The sudden disappearance of such a substantial portion of the country's defense assets raises serious concerns about national security and readiness. Efforts to investigate the disappearance and recover the missing equipment are underway, but the situation has left the nation vulnerable and exposed to potential threats."
chaosx.news.75.a: "Unfortunate"
