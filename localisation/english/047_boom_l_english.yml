l_english:
chaosx.nr47.1.t: "BOOM!"

chaosx.nr47.2.t: "BOOM!"
chaosx.nr47.2.d: "Our country reels from the aftermath of a devastating bombing, shrouded in mystery, as scientists confirm the use of an atomic-level explosive device. The attack, carried out with unparalleled power, has left widespread destruction and loss of life, sending shockwaves across our nation and beyond. As investigations unfold to unravel the origins of this sinister act, our people mourn the tragic loss and brace for the uncertain future wrought by this unprecedented assault."
chaosx.nr47.2.a: "Oh God Almighty, why us?"

chaosx.news.50.t: "The Great BOOM!"
chaosx.news.50.d: "[From.GetName] is reeling in shock and devastation following a catastrophic explosion of unprecedented scale, its origins shrouded in mystery. The explosion has left a trail of destruction in its wake, causing widespread damage to infrastructure and claiming numerous casualties.\nAs authorities launch investigations into the cause of the explosion, speculation runs rampant about the possible involvement of a mysterious entity. The uncertainty surrounding the incident only adds to the sense of fear and unease gripping the nation, as citizens grapple with the aftermath of this tragic event."
chaosx.news.50.a: "Where next?"
