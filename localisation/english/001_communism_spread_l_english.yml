l_english:
chaosx.nr1.1.t: "Communist Insurgency"
chaosx.nr1.1.d: "The ideology that advocates for a classless society where all property and wealth are collectively owned by the people has gained ground in Europe, Asia and beyond, challenging the dominance of capitalism and democracy."
chaosx.nr1.1.a: "A low class individual is not welcome in the Custerdome."
chaosx.nr1.1.b: "A world where all is free!"

chaosx.nr1.2.t: "Communists Target Industry in [communist_sabotage_state.GetName]"
chaosx.nr1.2.d: "Reports from [communist_sabotage_state.GetName] describe coordinated communist pressure against local industry. Factory managers are requesting army protection, union committees are disrupting production schedules, and suspected militia couriers have been seen near rail depots and warehouses.\n\nThe scale of the damage depends on how deeply revolutionary control has taken root in the state."
chaosx.nr1.2.a: "Absorb the disruption."
chaosx.nr1.2.b: "Deploy security detachments."
chaosx_tt_1_2a: "Industrial and logistical damage will be applied in [communist_sabotage_state.GetName]."

chaosx.nr1.3.t: "Emergency Anti-Communist Intervention"
chaosx.nr1.3.d: "The government has invoked emergency powers against communist-controlled territories. Army units are preparing mass raids, factory occupations, militia disarmament operations, and arrests of revolutionary committees.\n\nThe operation may restore authority, but if the controlled states are too organized the crackdown could trigger a communist uprising."
chaosx.nr1.3.a: "Force the country back under control."
chaosx.nr1.3.b: "The uprising begins."

chaosx.nr1.4.t: "Communist Control Spreads"
chaosx.nr1.4.d: "Communist cells have gained effective local influence in [communist_target_state.GetName]. The state is not lost, but local administration is now contested by strikes, propaganda networks, and revolutionary organizers.\n\nEvery controlled state increases daily communist support."
chaosx.nr1.4.a: "Mark the state for intervention."

chaosx.nr1.5.t: "Communist Control Escalates"
chaosx.nr1.5.d: "The situation in [communist_target_state.GetName] has deteriorated. Local cells are consolidating into open power structures, and loyal authorities are losing access to workplaces, depots, and municipal offices.\n\nIf a state reaches full communist lockdown, normal intervention will no longer be enough and military access will collapse into a demilitarized revolutionary zone."
chaosx.nr1.5.a: "This is becoming a territorial crisis."

chaosx.nr1.6.t: "Local Intervention Succeeds"
chaosx.nr1.6.d: "Security forces have disrupted communist networks in [communist_target_state.GetName]. Arrests, weapons seizures, and patrols have restored at least part of the loyal administration's authority, though the state will bear scars from the operation."
chaosx.nr1.6.a: "Keep pressure on the remaining cells."

chaosx.nr1.7.t: "Local Intervention Backfires"
chaosx.nr1.7.d: "The intervention in [communist_target_state.GetName] has gone badly. Communist organizers evaded the sweep, local workers rallied against the operation, and several units report organized resistance from armed cells.\n\nThe failed crackdown has strengthened revolutionary propaganda."
chaosx.nr1.7.a: "A dangerous failure."

chaosx.nr1.8.t: "Revolutionary War Imminent"
chaosx.nr1.8.d: "Army officers warn that communist-controlled states are coordinating openly. Red militias are mobilizing, factories are refusing central government orders, and revolutionary committees are now communicating across regional lines.\n\nThe government can strike immediately, attempt concessions, or prepare loyalist forces for the coming confrontation."
chaosx.nr1.8.a: "Launch emergency intervention now."
chaosx.nr1.8.b: "Offer concessions to delay revolt."
chaosx.nr1.8.c: "Prepare loyalist forces."

chaosx.nr1.9.t: "Emergency Intervention Restores Control"
chaosx.nr1.9.d: "The nationwide emergency operation has broken the communist control network before it could become an open rebellion. Some states were cleared outright, while others remain damaged and politically tense.\n\nThe country has avoided civil war, but the intervention has left industry disrupted and local trust badly shaken."
chaosx.nr1.9.a: "The state survives."

chaosx.nr1.10.t: "Communist Uprising"
chaosx.nr1.10.d: "The emergency intervention has triggered open revolt. Communist-controlled states have raised red militias, seized local depots, and declared a revolutionary authority against the central government.\n\nThe uprising has not inherited the national stockpile. Its strength comes from the states it controlled, the industry it captured, and the support it built before the crackdown."
chaosx.nr1.10.a: "Crush the revolt."

chaosx.nr1.11.t: "Unstable Revolutionary Activity"
chaosx.nr1.11.d: "The communist movement has become harder to predict. Cells in controlled states are no longer waiting for central instructions; local agitators are testing police patrols, raiding small depots, and probing weak points in loyal administration.\n\nControlled states may now produce rare surprise incidents."
chaosx.nr1.11.a: "Every controlled state is a risk."

chaosx.nr1.12.t: "Dark Worker Rituals"
chaosx.nr1.12.d: "Reports from controlled workplaces now describe stranger behavior after the factory whistles fall silent. Workers gather behind locked gates, recite names of dead organizers, and swear oaths over broken tools and emptied cartridge boxes.\n\nSecurity officials dismiss some of it as theater, but the ceremonies are giving the movement discipline, secrecy, and a language of sacrifice."
chaosx.nr1.12.a: "Watch the night shifts."

chaosx.nr1.13.t: "Whispers of the World Revolution"
chaosx.nr1.13.d: "Captured pamphlets no longer speak only of local committees. They refer to a coming World Revolution, to red governments rising from controlled districts everywhere, and to a future war in which every lockdown zone becomes a ready-made front.\n\nThe words are still whispers, but they are spreading through the most hardened communist states. From this point on, the World Revolution can enter the major-event pool."
chaosx.nr1.13.a: "This is larger than one country."

chaosx.nr1.14.t: "Surprise Revolt in [communist_evolution_state.GetName]"
chaosx.nr1.14.d: "A sudden communist action has erupted in [communist_evolution_state.GetName]. Local cells moved without warning, forcing loyal police back from several districts and calling workers into the streets before the army could assemble a coherent response.\n\nMost such revolts remain local, but in deeply locked down territory even a small spark can become an uprising."
chaosx.nr1.14.a: "Contain it before it spreads."

chaosx.nr1.15.t: "Worker Rituals in [communist_evolution_state.GetName]"
chaosx.nr1.15.d: "Informants in [communist_evolution_state.GetName] describe a ritual gathering inside a controlled industrial site. The participants carried tools wrapped in red cloth, burned payroll ledgers, and pledged that no factory would serve the old order when the signal came.\n\nProduction resumes by morning, but the message has already moved through the workshops."
chaosx.nr1.15.a: "The factories are becoming political temples."

chaosx.nr1.16.t: "The World Revolution Is Whispered"
chaosx.nr1.16.d: "Communist couriers from [communist_evolution_state.GetName] have been intercepted carrying coded references to foreign cells, exile committees, and a future revolutionary front. The plans are incomplete, but the language is unmistakable: controlled states are being imagined as the first bases of a wider upheaval."
chaosx.nr1.16.a: "The warning is clear."

chaosx.nr1.17.t: "The Communist Insurgency Collapses"
chaosx.nr1.17.d: "The last organized communist control networks have been broken. Local committees are scattered, state authorities report no remaining revolutionary zones, and the communist party no longer has enough public support to keep the insurgency alive.\n\nThe government has not erased every sympathizer, but the territorial crisis is over."
chaosx.nr1.17.a: "The state is secure."

chaosx.nr1.18.t: "Red Banner Over [communist_evolution_state.GetName]"
chaosx.nr1.18.d: "Before dawn, communist organizers in [communist_evolution_state.GetName] raised a red banner over the state capital and declared the surrounding districts liberated from central authority. Loyal police withdrew after crowds blocked the roads with tram cars, factory carts, and commandeered trucks.\n\nThe declaration may be premature, but it has given every local cell a symbol to rally around."
chaosx.nr1.18.a: "Pull it down."

chaosx.nr1.19.t: "The Governor Vanishes"
chaosx.nr1.19.d: "The loyalist governor of [communist_evolution_state.GetName] has disappeared hours before a planned security sweep. His office was found empty except for torn police maps, a stack of unsigned resignation forms, and a red armband folded on the desk.\n\nRevolutionary committees deny involvement, but their patrols were already moving before the army knew the operation had failed."
chaosx.nr1.19.a: "Find who opened the gates."

chaosx.nr1.27.t: "The Red Choir"
chaosx.nr1.27.d: "A factory shift in [communist_evolution_state.GetName] refused to leave after the whistle. Through the night, workers chanted in rhythm with idle machinery and called themselves the Red Choir. Soldiers sent to disperse them reported that the crowd repeated every order back in perfect unison until the officers withdrew.\n\nBy morning, the gathering had ended, but the name has already spread."
chaosx.nr1.27.a: "Break the rhythm."

chaosx.nr1.28.t: "The Machines Keep Running"
chaosx.nr1.28.d: "Power was cut to an industrial site in [communist_evolution_state.GetName] after communist organizers occupied the yard. The machines kept turning for nearly an hour afterward. Engineers insist there is a mundane explanation. Workers outside the gates insist the factory chose the revolution.\n\nProduction records from the night shift do not match any government order."
chaosx.nr1.28.a: "Seal the records."

chaosx.nr1.29.t: "Symbols in Oil and Blood"
chaosx.nr1.29.d: "Local police in [communist_evolution_state.GetName] found burned production ledgers arranged in a circle on a factory floor. Around them were slogans painted in oil, blood, and red dye, all promising that the old state would be fed into its own machines.\n\nThe ritual may be theater, but the workers who saw it are refusing to speak."
chaosx.nr1.29.a: "Scrub the floor clean."

chaosx.nr1.30.t: "The Hidden Portrait"
chaosx.nr1.30.d: "Informants in [communist_evolution_state.GetName] report that workers gathered around a hidden portrait of Lenin and chanted that he is coming. Local party officials publicly call the story a provocation, yet their youngest organizers repeat the phrase with growing confidence.\n\nWhether rumor, propaganda, or mass hysteria, the message is spreading: the revolution is waiting for a returned leader."
chaosx.nr1.30.a: "Confiscate the portrait."

chaosx.nr1.31.t: "A Voice Through the Machines"
chaosx.nr1.31.d: "A night shift in [communist_evolution_state.GetName] claims Lenin's voice came through the factory machinery after midnight. Managers describe a burst of static from the public-address system. Workers describe instructions, promises, and a command to prepare for the World Revolution.\n\nNo recording survived, but pamphlets quoting the voice appeared before sunrise."
chaosx.nr1.31.a: "This is coordinated hysteria."

chaosx.nr1.32.t: "He Has Returned"
chaosx.nr1.32.d: "Red pamphlets have appeared across [communist_evolution_state.GetName] with only three words printed beneath Lenin's face: He has returned. Captured couriers deny knowing who printed them, but each carried the same route map toward other controlled districts.\n\nThe phrase is short enough to remember and strange enough to fear."
chaosx.nr1.32.a: "Burn every copy."

communism_national_counter_agitation: "Disrupt Communist Organizing"
communism_national_counter_agitation_desc: "Use police files, informant networks, radio addresses, and targeted pressure on party organizers to reduce national communist support. Controlled states still need local or emergency intervention, but weaker national support makes the wider insurgency easier to defeat."
communism_national_counter_agitation_cost: "£command_power §Y20§! £pol_power §Y35§!"

