chaosx.events_log.window.evolution_details.communism.title.event_detail: "[GetEventsLogEventDetailCommunismEvolutionName]"
chaosx.events_log.window.evolution_details.communism.body: "[GetEventsLogSelectedCommunismEvolutionIntro]\n\nGameplay impact: [GetEventsLogSelectedCommunismEvolutionGameplayImpact]"
chaosx.events_log.window.evolution_details.communism.body_intro.stage_1: "Unstable Revolutionary Activity begins once communist control exists in at least one state."
chaosx.events_log.window.evolution_details.communism.body_intro.stage_2: "Dark Worker Rituals begin once insurgent strongholds are established and revolutionary discipline hardens around workplaces."
chaosx.events_log.window.evolution_details.communism.body_intro.stage_3: "Whispers of the World Revolution begin once communist lockdown zones start speaking as if they are already part of a global front."
chaosx.events_log.window.evolution_details.communism.body_impact.stage_1: "rare surprise revolts can erupt in controlled states, usually worsening local control or causing temporary disruption."
chaosx.events_log.window.evolution_details.communism.body_impact.stage_2: "worker ritual incidents can spread fear through controlled industrial sites and slightly increase communist support."
chaosx.events_log.window.evolution_details.communism.body_impact.stage_3: "World Revolution becomes eligible for the major-event pool, and each later foreshadowing incident adds §R200§! weight while slightly increasing communist support."
