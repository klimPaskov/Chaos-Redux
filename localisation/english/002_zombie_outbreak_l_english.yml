weaponized_zombie_archetype_name_unknown: "Unknown Zombie"

weaponized_zombie_archetype_summary_rabid_horde: "The final result favors raw violence over subtlety. It will spread fast, hit hard, and behave much like an intentionally intensified outbreak horde."
weaponized_zombie_archetype_summary_necrotic_siege: "The final result is slower but brutally hard to stop, ideal for grinding assaults and persistent territorial collapse."
weaponized_zombie_archetype_summary_parasitic_directed: "The final result preserves enough selective behavior to steer the outbreak toward chosen enemies for at least a time."
weaponized_zombie_archetype_summary_controlled_loyalty: "The final result is unusually obedient for an infected zombie, allowing temporary creator-side control and selective hostility."
weaponized_zombie_archetype_summary_purifier: "The final result is selective and human-sparing, focusing its aggression on other infected populations rather than mankind at large."
weaponized_zombie_archetype_summary_semi_sapient: "The final result retains disturbing traces of intelligence, producing a more selective and self-directed outbreak than ordinary zombie hordes."
weaponized_zombie_archetype_summary_creator_betrayer: "The final result appears selectively obedient, allowing creator-side control and selective hostility for field deployment."
weaponized_zombie_archetype_summary_canonical_convergence: "The final result collapses back toward the classic undead pattern, tending to merge with and reinforce the broader zombie apocalypse."
weaponized_zombie_archetype_summary_wendigo: "The final result is no longer a mere tailored outbreak. It is a predatory convergence of mutation, undeath, and extreme aggression that borders on the apocalyptic."
weaponized_zombie_archetype_summary_unknown: "The final result resists clean classification, but it is unquestionably dangerous."

super_event.6.t: "Wendigo"
super_event.6.d: "The thing that escaped the laboratories of [GetWendigoSuperEventOriginName] is no longer being classified as an ordinary outbreak. Reports describe predatory speed, impossible endurance, cannibal hunger, and mutations that make familiar containment doctrine useless.\n\nOfficials still choose careful words, but the rumors do not. Something from the edge of hunger has entered the war, and every route away from it is becoming shorter."
super_event.6.a: "We are the dead"
super_event.6.q: "Energy and persistence conquer all things. \n §Y-Benjamin Franklin-§!"
wendigo_super_event_origin_name: "[wendigo_super_event_creator.GetNameDef]"
wendigo_super_event_origin_name_unknown: "an unknown power"

chaosx.nr2.10.a: "Open our ports"
chaosx.nr2.10.a.tt: "Approve the evacuation. The refugees will be moved out of [FROM.GetNameDef]'s currently controlled states and concentrated in our island capital."
chaosx.nr2.10.b: "We cannot take them"
chaosx.nr2.10.b.tt: "[FROM.GetNameDefCap] will have to fend for itself"
