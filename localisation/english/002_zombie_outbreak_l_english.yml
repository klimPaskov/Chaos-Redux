chaosx.nr2.1.t: "Zombie Outbreak"
chaosx.nr2.1.a: "Brainzz Horde"

chaosx.nr2.2.t: "Cure Activated!"
chaosx.nr2.2.d: "In an effort to stop the Zombies, the cure has been activated!"
chaosx.nr2.2.a: "Finally!"

chaosx.nr2.7.t: "Anti Zombie League Formation"
chaosx.nr2.7.d: "Major world powers have announced the formation of the Anti Zombie League, a military alliance dedicated to combating the growing zombie threat. The league seeks to coordinate global efforts against the undead menace and pool resources for the development and distribution of anti-zombie measures.\n\n[From.GetAdjective] representatives have extended an invitation for us to join this coalition. Membership would require implementing outbreak prevention protocols and participating in cure research sharing, but would also provide access to enhanced protection measures and coordinated military support.\n\nThe zombie forces currently field approximately [?total_zombie_divisions] divisions across their territories."
chaosx.nr2.7.a: "Join the Anti Zombie League!"
chaosx.nr2.7.b: "We need time to consider this proposal"
chaosx.nr2.7.c: "We will handle the zombie threat on our own"

# Custom effect tooltips for the Anti Zombie League event
azl_zombie_overwhelming_force_tt: "The zombie threat is so overwhelming that all civilized nations must unite!"
azl_can_join_later_tt: "We can still join the Anti Zombie League through decisions"
azl_refused_to_join_tt: "We have refused to join the Anti Zombie League and will face the zombie threat alone"

chaosx.news.3.t: "Zombie Outbreak in [outbreak_state.GetName]!"
chaosx.news.3.d: "Reports are flooding in from [outbreak_state.GetName] of a massive zombie outbreak! The zombie plague can spread across vast distances, potentially through infected individuals or carriers who traveled undetected."
chaosx.news.3.a: "We must close our borders immediately!"

chaosx.news.81.t: "Weaponized Zombie Deployment in [weaponized_zombie_target_state.GetName]"
chaosx.news.81.d: "Shock is spreading as [FROM.GetNameDef] deploys a weaponized zombie outbreak in [weaponized_zombie_target_state.GetName]. The released horde is being identified as [weaponized_zombie_new_country.GetWeaponizedZombieTypeName], derived from [weaponized_zombie_new_country.GetWeaponizedZombieNatureSummary]. Witnesses describe infected that appear [weaponized_zombie_new_country.GetWeaponizedZombieLifeStateSummary], confirming that this is no spontaneous plague but a deliberately engineered catastrophe."
chaosx.news.81.a: "This changes everything"

chaosx_cbw_doom.1.t: "Doomsday Release in [From.GetNameDef]!"
chaosx_cbw_doom.1.d: "In a desperate act, [From.GetNameDef] has ordered the release of its chemical stockpiles across controlled areas. Reports speak of widespread contamination and immediate casualties among armies and civilians alike.\n\nForeign observers warn that the effects may linger long after the order was given."
chaosx_cbw_doom.1.a: "This will stain the world."

chaosx_cbw_doom.2.t: "Doomsday Release in [From.GetNameDef]!"
chaosx_cbw_doom.2.d: "In a desperate act, [From.GetNameDef] has unleashed biological agents across controlled areas. Early reports describe outbreaks spreading through cities and countryside alike, with military formations suffering sudden losses as panic spreads.\n\nMedical authorities fear secondary waves in the weeks to come."
chaosx_cbw_doom.2.a: "A plague of war."

super_event.1.t: "Undead?"
super_event.1.d: "The first confirmed dead have risen. Reports from [outbreak_state.GetName] describe corpses moving after clinical death, attacking the living, and spreading panic faster than officials can establish a cordon.\n\nGovernments still argue over the cause, but the practical facts are already clear: the infected do not respond to surrender, exhaustion, or ordinary fear. Every failed quarantine gives the horde another road."
super_event.1.a: "Do you like to take a yo-yo for a ride?"
super_event.1.q: "This, then, is how you should pray: 'Our Father in heaven, hallowed be your name.' \n §Y-Matthew 6:9-§!"

super_event.2.t: "The Alliance of Man"
super_event.2.d: "The old wars have been forced aside. Under [azl_faction_leader.GetName]'s leadership, the Anti-Zombie League binds armies, laboratories, rail networks, and border commands into a single emergency front against the dead.\n\nIts members do not share trust, ideology, or even a common peace. They share only the knowledge that no state can outlast the horde alone."
super_event.2.a: "What does a zombie vegetarian eat? Graaaaains!"
super_event.2.q: "Believe in the light while you have the light, so that you may become children of light. \n §Y-John 12:36-§!"

super_event.3.t: "Zombie Apocalypse"
super_event.3.d: "The last coordinated defensive lines have failed. Cities that once served as evacuation hubs now feed the horde, and surviving governments can no longer prove that any front, cure program, or military command still matters at world scale.\n\nHumanity has not vanished, but it has lost the world. The living endure in bunkers, convoys, islands, and sealed districts while the dead inherit the roads between them."
super_event.3.a: "We are the dead"
super_event.3.q: "Energy and persistence conquer all things. \n §Y-Benjamin Franklin-§!"

super_event.5.t: "The Dead Are Buried"
super_event.5.d: "The last organized zombie strongholds have been erased. After the collapse of the main horde, remaining nests were isolated, burned out, and cleared until no infected war-state remained capable of holding territory.\n\nFor the first time since the outbreak began, humanity can count the dead without expecting them to rise again. The victory is real, but every grave is also a ledger."
super_event.5.a: "Count them, bury them, rebuild."
super_event.5.q: "Be not ye afraid of them. \n §Y-Nehemiah 4:14-§!"

chaosx.nr2.12.t: "The Survivor Compact"
chaosx.nr2.12.d: "The zombie wars have ended, but the peace that follows them will not be the old peace. Governments that stood in the line of death are now binding laboratories, rail networks, and industrial ministries into a permanent survivor compact. Shared engineering, construction, and biowarfare research will continue across borders, while strict sanitary oversight becomes the new normal.\n\nRecorded zombie war dead: [?global.zombie_campaign_zombie_dead|0]\nRecorded civilian dead under zombie occupation: [?global.zombie_campaign_civilian_dead|0]\nRecorded dead in the survivor ledger: [?global.zombie_campaign_total_dead|0]"
chaosx.nr2.12.a: "The dead will be remembered"

chaosx.nr2.13.t: "Day of the Buried"
chaosx.nr2.13.d: "Today we mark the anniversary of the zombie war's end. The guns have long fallen silent, but the graves remain. Bells ring, public squares fill, and the names of the lost are spoken again so that panic, sacrifice, and survival are not reduced to statistics.\n\nRecorded zombie war dead: [?global.zombie_campaign_zombie_dead|0]\nRecorded civilian dead under zombie occupation: [?global.zombie_campaign_civilian_dead|0]\nRecorded dead in the survivor ledger: [?global.zombie_campaign_total_dead|0]"
chaosx.nr2.13.a: "Honor them all"

chaosx.nr2.14.t: "The Distant Front"
chaosx.nr2.14.d: "The zombie war no longer touches our borders. The Anti Zombie League still exists, but the fighting has shifted far away and many governments now question whether they should remain tied to a wartime alliance that no longer protects their own frontier.\n\nWe can stay in the League out of principle, or step away and leave the distant front to those still directly exposed."
chaosx.nr2.14.a: "Withdraw from the League"
chaosx.nr2.14.b: "Remain in the League"

chaosx.nr2.15.t: "A New Zombie Front"
chaosx.nr2.15.d: "The main zombie outbreak has opened a fresh continental front against Anti Zombie League territory. Governments that once stepped back from the alliance are now being asked whether the time has come to return to coordinated resistance before this new theater grows into another global catastrophe."
chaosx.nr2.15.a: "Stay out for now"
chaosx.nr2.15.b: "Rejoin the League"

chaosx.events_log.window.evolution_details.zombie.title.selected: "Zombie Evolution [GetEventsLogSelectedEvolutionStageRoman]"
chaosx.events_log.window.evolution_details.zombie.title.event_detail: "Zombie Evolution [GetEventsLogEventDetailEvolutionStageRoman]"
chaosx.events_log.window.evolution_details.zombie.body: "[GetEventsLogSelectedZombieEvolutionIntro]\n\nModifiers on the evolved horde:\n- Supply consumption: §G[?events_log_selected_zombie_supply_consumption_factor|%]§!\n- Conscription: §G[?events_log_selected_zombie_conscription|%+]§!\n[GetEventsLogSelectedZombieEvolutionDefenceLine]- Attack speed: §G[?events_log_selected_zombie_attack_speed_factor|%+]§!\n[GetEventsLogSelectedZombieEvolutionArmyAttackLine]- No supply grace: §G[?events_log_selected_zombie_no_supply_grace|0]§! hours\n- Out of supply factor: §G[?events_log_selected_zombie_out_of_supply_factor|%+]§!\n- Night attack: §G[?events_log_selected_zombie_night_attack|%+]§!\n- Anti-Zombie League cure research time: §R[?events_log_selected_zombie_cure_days|0]§! days\n\nGameplay impact: [GetEventsLogSelectedZombieEvolutionGameplayImpact]"
chaosx.events_log.window.evolution_details.zombie.line.defence: "- Defence: §R[?events_log_selected_zombie_defence|%]§!\n"
chaosx.events_log.window.evolution_details.zombie.line.army_attack: "- Army attack: §G[?events_log_selected_zombie_army_attack_factor|%+]§!\n"
chaosx.events_log.window.evolution_details.zombie.body_intro.stage_1: "The first zombie mutation."
chaosx.events_log.window.evolution_details.zombie.body_intro.stage_2: "The second adaptation turns the horde into a faster assault force and the cure is harder to find."
chaosx.events_log.window.evolution_details.zombie.body_intro.stage_3: "The final mutation makes the horde even stronger and resilient to the cure."
chaosx.events_log.window.evolution_details.zombie.body_impact.stage_1: "the horde becomes much harder to starve out and starts winning more night pushes."
chaosx.events_log.window.evolution_details.zombie.body_impact.stage_2: "containment lines crack more easily, especially once the zombies keep moving without supply."
chaosx.events_log.window.evolution_details.zombie.body_impact.stage_3: "late-stage zombies are extremely hard to exhaust and can overrun weak fronts even while deep out of supply."


chaosx.weaponized_zombies.1.t: "Weaponize the Zombies: Final Conclusions"
chaosx.weaponized_zombies.1.d: "The project is complete. Our researchers now classify the zombie as [GetWeaponizedZombieNatureSummary], and the infected appear to be [GetWeaponizedZombieLifeStateSummary]. The resulting outbreak type is [GetWeaponizedZombieTypeName].\n\nStrength: [?weaponized_zombie_strength|.0]\nInfectiousness: [?weaponized_zombie_infectiousness|.0]\nSpeed: [?weaponized_zombie_speed|.0]\nDurability: [?weaponized_zombie_durability|.0]\nCure Resistance: [?weaponized_zombie_cure_resistance|.0]\nObedience Profile: [?weaponized_zombie_friendliness|.0]\n\n[GetWeaponizedZombieArchetypeSummary]"
chaosx.weaponized_zombies.1.a: "Begin production"
chaosx.weaponized_zombies.9.t: "[FROM.GetName]: Outbreak Profile"
chaosx.weaponized_zombies.9.d: "Current observations classify this outbreak as [FROM.GetWeaponizedZombieNatureSummary], and the infected appear to be [FROM.GetWeaponizedZombieLifeStateSummary]. The resulting outbreak type is [FROM.GetWeaponizedZombieTypeName].\n\nStrength: [?FROM.weaponized_zombie_strength|.0]\nInfectiousness: [?FROM.weaponized_zombie_infectiousness|.0]\nSpeed: [?FROM.weaponized_zombie_speed|.0]\nDurability: [?FROM.weaponized_zombie_durability|.0]\nCure Resistance: [?FROM.weaponized_zombie_cure_resistance|.0]\nObedience Profile: [?FROM.weaponized_zombie_friendliness|.0]\n\n[FROM.GetWeaponizedZombieArchetypeSummary]"
chaosx.weaponized_zombies.9.a: "File the report"

chaosx.weaponized_zombies.2.t: "Weaponized Zombie Field Test"
chaosx.weaponized_zombies.2.d: "The field trial in [weaponized_zombie_target_state.GetName] has concluded. The data confirms that the zombies can be delivered outside laboratory conditions, and the resulting observations will accelerate doctrine and production planning. Even when the test remained controlled, everyone involved now understands how thin the line was."
chaosx.weaponized_zombies.2.a: "Catalog every result"

chaosx.weaponized_zombies.3.t: "Domestic Test, Controlled Outcome"
chaosx.weaponized_zombies.3.d: "The domestic field trial in [weaponized_zombie_target_state.GetName] did not produce a full containment failure. Researchers gathered practical data, but the exercise has badly shaken everyone involved. Even under controlled conditions, the zombies were far too close to breaking free."
chaosx.weaponized_zombies.3.a: "Keep the data, tighten security"

chaosx.weaponized_zombies.4.t: "Domestic Test Outbreak"
chaosx.weaponized_zombies.4.d: "The so-called controlled domestic test in [weaponized_zombie_target_state.GetName] has failed. Infected assets escaped the trial environment and seeded a real outbreak on our own territory. We have gained field data, but only by proving that our program can turn inward at any moment."
chaosx.weaponized_zombies.4.a: "Contain what we unleashed"

chaosx.weaponized_zombies.5.t: "Laboratory Containment Failure"
chaosx.weaponized_zombies.5.d: "A containment failure has occurred in our biowarfare complex in [weaponized_zombie_target_state.GetName]. The program's tailored zombies have escaped the laboratory environment and seeded a live outbreak. Equipment has been lost, the surrounding area is collapsing, and the project has now inflicted the very catastrophe its critics predicted."
chaosx.weaponized_zombies.5.a: "Seal the site and pray"

chaosx.weaponized_zombies.6.t: "Creator Betrayal Resolution"

chaosx.weaponized_zombies.7.t: "Field Control Failure"
chaosx.weaponized_zombies.7.d: "Reports from one of our deployed weaponized outbreaks indicate a total collapse of handling protocols. Contact teams are missing, command assumptions can no longer be trusted, and prior exemptions for our own forces should be considered void until proven otherwise."
chaosx.weaponized_zombies.7.a: "Treat it as hostile"

chaosx.weaponized_zombies.8.t: "Weaponize the Zombies"
chaosx.weaponized_zombies.8.d: "The project reached its final stage, but no usable weapon emerged from it. Instead, the biowarfare complex in [weaponized_zombie_target_state.GetName] suffered a terminal containment collapse as the zombies crossed into something beyond the program's design limits. What has escaped is... death."
chaosx.weaponized_zombies.8.a: "The project has failed, and with it the world"

