tensions_rising_cautious_alignment_desc: "Foreign offices are watching rival blocs and guarantees more closely after the latest diplomatic incident."
tensions_rising_alarmist_rearmament: "Alarmist Rearmament"
tensions_rising_alarmist_rearmament_desc: "Staff rooms, newspapers, and ministries are pressing for visible readiness before any government admits why."
tensions_rising_general_staff_fever: "General Staff Fever"
tensions_rising_general_staff_fever_desc: "Military offices are preparing around rumours that diplomats still deny."
tensions_rising_permanent_alert_desc: "The state has learned to treat every denial as a possible warning order."
chaos_meter.history.reason.special.tensions_rising: "Tensions Rising"
chaosx.events_log.evolution.type.tensions_rising: "§YTensions Rising Milestone§!"
chaosx.events_log.window.event_details.tensions_rising: "Tensions Rising is a repeatable diplomatic-pressure incident. In calm conditions it adds world tension and does not fire once world tension is full. At higher chaos tiers it can still fire at maximum world tension, adding staged chaos, temporary timer pressure, timed opinion penalties, AI readiness ideas, delayed reports, and achievement tracking.\n\nIt does not create war goals, countries, cores, focus trees, formables, or a world-end scenario. Its effects remain indirect: public tension, shorter event timing, relation strain, and short-lived AI posture changes."
chaosx.events_log.window.evolution_details.tensions_rising.title.stage_1: "Cable Traffic Increase"
chaosx.events_log.window.evolution_details.tensions_rising.title.stage_2: "Competing Accusations"
chaosx.events_log.window.evolution_details.tensions_rising.title.stage_3: "Staff Readiness"
chaosx.events_log.window.evolution_details.tensions_rising.title.stage_4: "Extended Alert"
chaosx.events_log.window.evolution_details.tensions_rising.body.event_detail: "Tensions Rising milestones show how the incident scales as the Chaos Meter climbs. Each stage adds indirect pressure without creating a direct war goal or terminal branch."
chaosx.events_log.window.evolution_details.tensions_rising.body.stage_1: "The first evolved stage turns private cables into public pressure. World tension rises, chaos increases, relation shocks begin, and later incidents can briefly gather pace."
chaosx.events_log.window.evolution_details.tensions_rising.body.stage_2: "Rumours and denials circulate through more capitals. Timed relation damage can affect additional pairs, neutral shipping and press reports begin to react, and governments adopt broader readiness postures."
chaosx.events_log.window.evolution_details.tensions_rising.body.stage_3: "Staff offices treat the pattern as a planning concern. Relation shocks deepen, diplomatic aftershocks last longer, and peaceful players can begin the Thin Wire watch while world tension remains full."
chaosx.events_log.window.evolution_details.tensions_rising.body.stage_4: "The highest stage applies the largest chaos and world tension packet, the longest diplomatic shock, and the strongest temporary AI posture pressure without ending the world."
