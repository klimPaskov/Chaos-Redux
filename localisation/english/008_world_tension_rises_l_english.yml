chaosx.nr8.1.t: "Tensions Rising"
chaosx.nr8.1.d: "[GetTensionsRisingMainDesc]"
chaosx.nr8.1.a: "[GetTensionsRisingOption]"
chaosx.nr8.1.a.tt: "[GetTensionsRisingEffectText]"
chaosx.nr8.baseline.d: "A chain of public accusations, military communiques, and unattributed leaks has unsettled diplomatic circles. No capital admits there is a crisis, yet border offices, newspapers, and staff rooms have all begun behaving as if one is near."
chaosx.nr8.baseline.a: "Another file on the desk."
chaosx.nr8.baseline.effect: "World tension increases by 10."
chaosx.nr8.stage_1.d: "The cables are moving faster than the diplomats. Every denial is copied, every correction is reprinted, and every quiet military note seems to reach a foreign desk before dawn."
chaosx.nr8.stage_1.a: "The wires hum all night."
chaosx.nr8.stage_1.effect: "World tension increases by 10. Chaos increases by 10."
chaosx.nr8.stage_2.d: "Rumour has become a commodity. Newspapers sell it, ministries launder it, border officers fear it, and foreign rivals repeat it with just enough distance to deny authorship."
chaosx.nr8.stage_2.a: "Everyone has a source."
chaosx.nr8.stage_2.effect: "World tension increases by 20. Chaos increases by 15."
chaosx.nr8.stage_3.d: "Staff offices remain lit long after the public briefings end. Maps are checked, train schedules copied, and commanders told that nothing is happening while being ordered to prepare for it."
chaosx.nr8.stage_3.a: "Keep the offices staffed."
chaosx.nr8.stage_3.effect: "World tension increases by 50. Chaos increases by 25."
chaosx.nr8.stage_4.d: "The latest round of warnings has become routine across foreign offices. Capitals compare denials, watch railway notices, and prepare contingency files while insisting the situation remains manageable."
chaosx.nr8.stage_4.a: "Log the latest alerts."
chaosx.nr8.stage_4.effect: "World tension increases by 100. Chaos increases by 50."
chaosx.nr8.report.a: "File it with the others."
chaosx.nr8.2.t: "The Telegram Nobody Signed"
chaosx.nr8.2.d: "A message circulated through several foreign ministries today. Every government named in the document denied writing it. Several denied receiving it. None denied reading it."
chaosx.nr8.3.t: "Embassy Side Doors"
chaosx.nr8.3.d: "Reporters have noticed embassy staff abandoning front entrances in several capitals. Officials insist the change is procedural. The guards at the front gates have been doubled."
chaosx.nr8.4.t: "The Calm Map Says Nothing"
chaosx.nr8.4.d: "The public measures say the world can grow no more tense. The offices disagree. Clerks still copy new warnings, commanders still ask for clearer orders, and newspapers still find darker words."
chaosx.nr8.5.t: "Insurance Rates Jump in Neutral Ports"
chaosx.nr8.5.d: "Neutral shipping firms have begun rewriting their rates before any government admits danger. It is often said that merchants hear war before diplomats name it."
chaosx.nr8.6.t: "The Rumour That Arrived Twice"
chaosx.nr8.6.d: "Two capitals received the same rumour through different channels, with the same phrasing, the same missing signature, and the same urgent warning. Both deny being the source."
chaosx.nr8.7.t: "Staff Cars After Midnight"
chaosx.nr8.7.d: "Staff cars were seen outside several ministries long after midnight. Official spokesmen said the meetings were routine. No one asked why routine now requires blackout curtains."
chaosx.nr8.8.t: "Fleets Keep Radio Silence"
chaosx.nr8.8.d: "A naval movement passed without public explanation today. Harbour offices confirmed nothing, denied nothing, and asked newspapers not to print ship names."
chaosx.nr8.9.t: "Border Lamps"
chaosx.nr8.9.d: "Lamps stayed lit along a quiet border through the night. Local commanders blamed weather, then training, then paperwork. None of the explanations satisfied anyone nearby."
chaosx.nr8.10.t: "One Denial Too Many"
chaosx.nr8.10.d: "The third denial came faster than the first accusation. By the time it reached the morning papers, several foreign editors had decided speed was evidence enough."
chaosx.nr8.12.t: "The Last Normal Briefing"
chaosx.nr8.12.d: "The briefing began with ordinary phrasing. It ended with no questions, no jokes, and no one willing to call the day ordinary again."
