chaosx.easter_egg.1.t: "Chamberlain risen from the dead"
chaosx.easter_egg.1.d: "The year is 1941. The world is at war. Britain is under siege by the enemy forces, and its prime minister, [From.GetLeader], is struggling to rally the nation and its allies. But a shocking event is about to change the course of history. Neville Chamberlain, the former prime minister who resigned in disgrace after his failed policy of appeasement, has returned from the dead. And he is not the same man he was before.\n\nChamberlain claims that he has been resurrected by a mysterious power, and that he has a divine mission to save Britain and the world from tyranny. He says that he has seen the error of his ways, and that he now possesses supernatural abilities that can turn the tide of the war. He challenges [From.GetLeader] to a duel for the leadership of the country, and promises to bring peace and prosperity to the people.\n\nBut is Chamberlain telling the truth? Or is he a pawn of a darker force, bent on destroying democracy and freedom? And how will the world react to his miraculous return?"

chaosx.easter_egg.1.a: "He was clearly sent back by God!"
chaosx.easter_egg.1.b: "He is a fraud, a charlatan, a liar! This not the real Chamberlain!"

chamberlain_the_immortal: "The Second Son of God" # Trait
chamberlain_the_immortal_desc: "Chamberlain The Immortal is a legendary figure who has returned from the dead to lead Britain in its darkest hour. He possesses supernatural abilities and a divine mission to save the nation and the world from tyranny."

chaosx.news.1.t: "CHAMBERLAIN RETURNS FROM THE DEAD"
chaosx.news.1.d: "Neville Chamberlain, the former prime minister who died in November 1940, has reappeared in London and claimed the leadership of the country. Chamberlain says that he has been resurrected by a mysterious power and that he has a divine mission to save Britain and the world from tyranny.\n\nChamberlain challenged the current prime minister, to a duel for the premiership, and defeated him in a display of supernatural abilities that shocked the nation. Chamberlain claims that he can manipulate the elements, heal wounds, and foresee the future.\n\nChamberlain has announced that he will form a new government and seek the support of Parliament and the public. He has also declared that he will pursue a new strategy to win the war, using his powers to aid the British forces and their allies. He has promised to bring peace and prosperity to the people, and to restore Britain's glory and honour."
chaosx.news.1.a: "What?"

chaosx.news.2.t: "CHAMBERLAIN?!?"
chaosx.news.2.d: "The British public and press have reacted with disbelief and ridicule to the news that Neville Chamberlain, the former prime minister who died in 1940, has reappeared in Berlin and claimed the leadership of the country. Chamberlain says that he has been resurrected by a mysterious power and that he has a divine mission to save Britain and the world from tyranny.\n\nChamberlain challenged the current prime minister, to a duel for the premiership, and claims to have defeated him in a display of supernatural abilities that he says can manipulate the elements, heal wounds, and foresee the future.\n\nHowever, most Britons have dismissed Chamberlain's claims as a hoax, a delusion, or a propaganda stunt. Many have mocked Chamberlain's alleged powers, calling him a \"magician\", a \"charlatan\", or a \"madman\". Some have made jokes about his infamous \"peace for our time\" speech, saying that he has now brought \"war for our time\" or \"jokes for our time\".\n\nThe government has issued a statement denying that Chamberlain has any legitimacy or authority, and reaffirming its support for Churchill and his war cabinet. It has also warned the public not to be deceived or distracted by Chamberlain's antics, and to remain vigilant and united in the face of the war."
chaosx.news.2.a: "What?"

chaosx.news.19.t: "UK collapse"
chaosx.news.19.d: "In a seismic turn of events, the United Kingdom finds itself grappling with an unprecedented crisis as one of its constituent nations, officially declares independence. The announcement has sent shockwaves through the political landscape, reshaping the dynamics of the British Isles."
chaosx.news.19.a: "That was unexpected"

