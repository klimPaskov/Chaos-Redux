biowarfare.1.t: "Auschwitz Human Experimentation"
biowarfare.1.d: "Our concentration camps in Auschwitz provide us with an opportunity to conduct human experimentation on a large scale. We can test various biological agents and their effects on human subjects, gathering invaluable data for our biowarfare program."
biowarfare.1.a: "Make use of this opportunity"
biowarfare.1.b: "We must proceed with caution and ethics"

biowarfare.4.t: "Franciszek Witaszek executed!"
biowarfare.4.d: "Our biowarfare scientist, Franciszek Witaszek, has been captured by the Nazi occupiers and executed."
biowarfare.4.a: "Tragic" 



chaosx_contamination.1.t: "Atmospheric Contamination Reaches 25%"
chaosx_contamination.1.d: "Global contamination has reached a level where disease outbreaks spread more easily across regions. Environmental stress is no longer local; it now begins to shape wider strategic conditions."
chaosx_contamination.1.a: "The air is changing."

chaosx_contamination.2.t: "Atmospheric Contamination Reaches 50%"
chaosx_contamination.2.d: "Contamination has crossed a critical midpoint. Climate instability now includes the possibility of recurring nuclear-winter periods, worsening worldwide living and combat conditions."
chaosx_contamination.2.a: "This is no longer temporary."

chaosx_contamination.3.t: "Atmospheric Contamination Reaches 75%"
chaosx_contamination.3.d: "Severe atmospheric degradation is now entrenched. Extreme winter episodes can strike with much greater force, and global recovery capacity is rapidly shrinking."
chaosx_contamination.3.a: "The world is entering collapse weather."

chaosx_contamination.4.t: "Atmospheric Contamination Reaches 100%"
chaosx_contamination.4.d: "The contamination threshold has passed into irreversibility. Cleanup no longer restores the atmosphere; degradation now compounds and begins to push regions toward long-term wasteland conditions."
chaosx_contamination.4.a: "There is no return."

chaosx_contamination.5.t: "Nuclear Winter Period Begins"
chaosx_contamination.5.d: "A new nuclear winter period has begun. Atmospheric particulates and toxic fallout are suppressing stability and accelerating contamination pressure."
chaosx_contamination.5.a: "Brace for the cold ash."

chaosx_contamination.6.t: "Severe Nuclear Winter Begins"
chaosx_contamination.6.d: "A severe nuclear winter has formed. Massive fallout circulation is intensifying contamination and driving harsh global deterioration."
chaosx_contamination.6.a: "The sky has turned against us."

chaosx_contamination.7.t: "Air Cleanliness Treaty Signed"
chaosx_contamination.7.d: "With atmospheric damage now at existential levels, governments with no active condemnation record have formed an emergency treaty banning unconventional weapons. Treaty members coordinate sanctions against all outside states to force global compliance."
chaosx_contamination.7.a: "No more unconventional escalation."

chaosx_contamination.8.t: "Air Cleanliness Treaty Violated"
chaosx_contamination.8.d: "[Root.GetNameDef] has deployed unconventional weapons after joining the Air Cleanliness Treaty. The violator is expelled, condemned, and now faces coordinated embargoes."
chaosx_contamination.8.a: "The pact is enforced."

chaosx_contamination.9.t: "Invitation: Air Cleanliness Treaty"
chaosx_contamination.9.d: "[From.GetNameDef] is forming an international treaty to halt unconventional weapon escalation and coordinate cleanup efforts. We have been invited to join."
chaosx_contamination.9.a: "Join the treaty."
chaosx_contamination.9.b: "Decline for now."

chaosx_contamination.10.t: "Air Cleanliness Treaty Formed"
chaosx_contamination.10.d: "We have launched the Air Cleanliness Treaty and issued invitations worldwide. Member states are expected to avoid unconventional weapons and cooperate on contamination reduction."
chaosx_contamination.10.a: "Begin coordination."

chaosx_contamination.11.t: "Global Cleaning Day"
chaosx_contamination.11.d: "Treaty members coordinated a synchronized global decontamination push. Joint filtering, cleanup logistics, and emergency containment actions have reduced atmospheric pressure."
chaosx_contamination.11.a: "Sustain the effort."

super_event.4.t: "Fallout"
super_event.4.d: "The atmosphere has tipped into irreversible contamination. Nuclear winters roll across continents, crops fail, and even untouched regions choke under radioactive dust. Civilization enters a long collapse where survival is now all that matters."
super_event.4.a: "No marigolds in the promised land"
super_event.4.q: "Smell that air! Couldn't you just drink it like booze? \n §Y-Oliver Swanick-§!"











