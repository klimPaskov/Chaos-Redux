# Welcome event (outdated)
chaosx.activation.1.t: "Welcome to Chaos Redux!"
chaosx.activation.1.d: "A dynamic timer controls when events occur. The mod features the Chaos Meter, which tracks global turmoil - the more chaos, the greater the danger. Your actions either fuel or fight the chaos. Have fun!\n\nWe are always looking for feedback and suggestions. If you have any ideas or issues, please let us know on our Discord server: §Bhttps://discord.gg/rAXesGcT2t§!. Thank you for playing Chaos Redux!"
chaosx.activation.1.a: "Ok"

# Welcome event
chaosx_welcome_text_loc: "[GetChaosXIntroText][GetChaosXEventSystemText][GetChaosXEventClassificationText][GetChaosXTimerSystemText][GetChaosXChaosMeterText][GetChaosXChaosSourcesText][GetChaosXChaosTimingText][GetChaosXWorldEndText][GetChaosXEventEvolutionText][GetChaosXConfigurationText][GetChaosXChaosConfigText][GetChaosXMultiplayerText][GetChaosXDebugText][GetChaosXUnconventionalSystemsText][GetChaosXDeathsAirSystemsText][GetChaosXDonationText][GetChaosXClosingText]"
chaosx_welcome_intro_loc: "Thank you for playing our mod! Chaos Redux implements an adaptive event system that responds to player actions, world state, and previous events. The system uses weight-based probability, dynamic timing, and chaos-driven escalation to create an unpredictable and challenging experience.\n\nAt the heart of the mod is the §YChaos Meter§!. As world tension, wars, deaths, and strange events push the meter higher, the world descends deeper into madness.\n\n§YDynamic & Evolving Events§!: The mod features a smart event system, through mechanisms like timer compression and adaptive weights. As chaos builds, events can §YEvolve§! into more severe forms, potentially culminating in §YWorld End Scenarios§! when the meter reaches critical levels. There are also §YSuper Events§! to make your experience even more immersive. \n\nWe are always looking for feedback and suggestions. If you have any ideas or issues, please let us know on our Discord server!\n\n\n\n"
chaosx_core_event_system_loc: "§YCore Principles§!\n\nThe event system constantly adapts to the current world state, remembers what has already fired, and shifts future probabilities accordingly. As chaos rises, events become more frequent and more dangerous, while the settings menu still lets you tune how aggressive the whole system should be. At the moment the pool contains §Y[?global.welcome_event_pool_total|.0]§! events in total, including §Y[?global.welcome_major_events_total|.0]§! major events, §Y[?global.welcome_fire_once_events_total|.0]§! fire-once events, and §Y[?global.welcome_repeatable_events_total|.0]§! repeatable events.\n\n"
chaosx_event_classification_loc: "§YEvent Classification§!\n\n§YFire-once events§! begin with a weight of §Y[?global.welcome_fire_once_initial_weight|.0]§! and can only happen once in a campaign; after firing, their weight is permanently reduced to §Y[?global.welcome_post_fire_weight|.0]§!. §GRepeatable events§! also begin at §Y[?global.welcome_repeatable_initial_weight|.0]§!, but after firing they recover by §G+[?global.welcome_repeatable_recovery_rate|.0]§! each month while their cap is reduced by §Y[?global.welcome_repeatable_cap_reduction|.0%]§! each time, producing a progression of §Y[?global.welcome_repeatable_weight_progression^0|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^1|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^2|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^3|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^4|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^5|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^6|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^7|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^8|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^9|.0]§! -> §Y[?global.welcome_repeatable_weight_progression^10|.0]§!. §RMajor events§! are different: they begin inactive at §Y[?global.welcome_major_initial_weight|.0]§!, gain §Y[?global.welcome_major_activation_weight|.0]§! weight whenever a minor event fires, and once one of them triggers, the fired event and the remaining unfired major events are reset to §Y[?global.welcome_post_fire_weight|.0]§!. Major events are also always presented as super events.\n\n"
chaosx_timer_system_loc: "§YDynamic Timer System§!\n\nInstead of relying on a fixed monthly pulse, Chaos Redux uses a live timer. The timer decreases by §Y[?global.welcome_timer_daily_tick|.0]§! each day, event selection begins when it reaches §Y[?global.welcome_timer_trigger_threshold|.0]§!, and the standard range sits at §Y[?global.welcome_timer_base_min_days|.0]§! to §Y[?global.welcome_timer_base_max_days|.0]§! days, with an initial starting range of §Y[?global.welcome_timer_random_start_min|.0]§! to §Y[?global.welcome_timer_random_start_max|.0]§! days.\n\nMinor events steadily accelerate the pace. Each one increases the daily decrement by §G+[?global.welcome_timer_decrement_step|.0]§! up to a cap of §Y[?global.welcome_timer_max_daily_decrement|.0]§!, and every §Y[?global.welcome_timer_minor_event_interval|.0]§! minor events the upper timer range compresses by §Y[?global.welcome_timer_compression_step|.0]§! day, up to a total compression of §Y[?global.welcome_timer_max_total_compression|.0]§! days. When a major event fires, that acceleration is cleared back to §Y[?global.welcome_timer_reset_value|.0]§!, giving the system breathing room and returning it to the standard range.\n\n"
chaosx_chaos_meter_loc: "§YChaos Meter System§!\n\nThe Chaos Meter is the main global pressure system and currently runs from §Y[?global.welcome_chaos_tier_0_min|.0]§! up to §Y[?global.welcome_chaos_tier_final_min|.0]+§!. Calm World covers §Y[?global.welcome_chaos_tier_0_min|.0]§! to §Y[?global.welcome_chaos_tier_0_max|.0]§!, Gathering Storm covers §Y[?global.welcome_chaos_tier_1_min|.0]§! to §Y[?global.welcome_chaos_tier_1_max|.0]§!, Rising Chaos covers §Y[?global.welcome_chaos_tier_2_min|.0]§! to §Y[?global.welcome_chaos_tier_2_max|.0]§!, Chaos Tier covers §Y[?global.welcome_chaos_tier_3_min|.0]§! to §Y[?global.welcome_chaos_tier_3_max|.0]§!, Totalen Chaos covers §Y[?global.welcome_chaos_tier_4_min|.0]§! to §Y[?global.welcome_chaos_tier_4_max|.0]§!, and World Collapse begins at §Y[?global.welcome_chaos_tier_final_min|.0]§!. Each step upward makes the world less stable and opens the door to harsher event outcomes.\n\n"
chaosx_chaos_sources_loc: "§YChaos Sources§!\n\nChaos rises through wars, annexations, faction movement, militarization, deaths, and other destabilizing developments. Major wars add §R+[?global.welcome_chaos_delta_war_major|.0]§!, minor wars add §R+[?global.welcome_chaos_delta_war_minor|.0]§!, major annexations add §R+[?global.welcome_chaos_delta_annex_major|.0]§!, minor annexations add §R+[?global.welcome_chaos_delta_annex_minor|.0]§!, and major ideological shifts to non-democratic rule add §R+[?global.welcome_chaos_delta_ideology_major_non_democratic|.0]§!. Puppeting contributes between §R+[?global.welcome_chaos_delta_puppet_minor|.0]§! and §R+[?global.welcome_chaos_delta_puppet_major|.0]§!, joining a faction contributes between §R+[?global.welcome_chaos_delta_faction_join_minor|.0]§! and §R+[?global.welcome_chaos_delta_faction_join_major|.0]§!, and nuclear use adds §R+[?global.welcome_chaos_delta_nuke|.0]§!.\n\nThe meter also reacts to slower world trends. Each percentage point of world tension adds §R+[?global.welcome_chaos_delta_world_tension|.0]§!, every §Y[?global.welcome_chaos_scale_mils|.0]§! military factories or §Y[?global.welcome_chaos_scale_divisions|.0]§! divisions adds another point, and every §R+[?global.welcome_chaos_scaled_gain|.0]§! casualties adds §R+[?global.welcome_chaos_scaled_gain|.0]§!. Chaos can also fall again through peace deals, releases, and other stabilizing outcomes: major peace lowers it by §G[?global.welcome_chaos_delta_peace_major|.0]§!, minor peace by §G[?global.welcome_chaos_delta_peace_minor|.0]§!, democratic liberation by §G[?global.welcome_chaos_delta_liberate_democratic|.0]§!, releases by up to §G[?global.welcome_chaos_delta_release_free|.0]§!, faction exits by as much as §G[?global.welcome_chaos_delta_faction_leave_major|.0]§!, and the system also applies a monthly decay of §G[?global.welcome_chaos_delta_monthly_decay|.0]§!. I listed only some of the chaos sources, there are many more things that contribute to chaos.\n\n"
chaosx_chaos_timing_loc: "§YChaos Effects on Timing§!\n\nChaos does not just change event content, it also changes pacing. Calm World uses the baseline timer multiplier of §Y[?global.welcome_chaos_timer_modifier_calm|.1]x§!. Gathering Storm shifts that to §Y[?global.welcome_chaos_timer_modifier_gathering|.1]x§!, making events §Y[?global.welcome_chaos_timer_speedup_gathering|.0]%§! faster. Rising Chaos uses §Y[?global.welcome_chaos_timer_modifier_rising|.1]x§! for §Y[?global.welcome_chaos_timer_speedup_rising|.0]%§! faster timing, Chaos Tier uses §Y[?global.welcome_chaos_timer_modifier_chaos|.1]x§! for §Y[?global.welcome_chaos_timer_speedup_chaos|.0]%§! faster timing, Totalen Chaos uses §Y[?global.welcome_chaos_timer_modifier_critical|.1]x§! for §Y[?global.welcome_chaos_timer_speedup_critical|.0]%§! faster timing, and World Collapse uses §Y[?global.welcome_chaos_timer_modifier_collapse|.1]x§!, which means §Y[?global.welcome_chaos_timer_speedup_collapse|.0]%§! faster timing than the calm baseline.\n\n"
chaosx_unconventional_systems_loc: "§YChemical and Biological Warfare§!\n\nChaos Redux also includes §YChemical Warfare§! and §YBiowarfare§! systems. Chemical attacks and pathogen outbreaks contaminate states, inflict civilian losses, and feed directly into the deaths and air systems.\n\nThese mechanics also generate §YInternational Condemnation§!, which represents how much the world reacts to unconventional warfare use. Higher condemnation makes diplomacy harsher and retaliation more likely.\n\n"
chaosx_deaths_air_systems_loc: "§YDeaths and Air Cleanliness Systems§!\n\nThe §YDeaths System§! tracks military losses, strategic bombing, chemical attacks, biowarfare outbreaks, nuclear strikes, radioactive fallout, occupation policy losses and more. Every §Y[?global.welcome_chaos_deaths_per_point|*1]§! recorded deaths add §R+[?global.welcome_chaos_scaled_gain|.0]§! chaos.\n\nThe §YAir Cleanliness System§! tracks global atmospheric contamination from unconventional warfare and outbreaks. As contamination rises through §Y[?global.welcome_air_threshold_spread_percent|.0]%§!, §Y[?global.welcome_air_threshold_winter_percent|.0]%§!, §Y[?global.welcome_air_threshold_severe_winter_percent|.0]%§!, and §Y[?global.welcome_air_threshold_irreversible_percent|.0]%§!, it applies increasing global penalties to attrition, population, and stability.\n\n"
chaosx_world_end_loc: "§YWorld End Scenario Mechanic§!\n\nOnce the Chaos Meter reaches §Y[?global.welcome_chaos_tier_final_min|.0]§! or higher, the campaign can enter a World End Scenario. The specific scenario depends on the wider world state, and once it begins, automatic event firing is halted so the campaign can conclude in a deliberate way instead of drifting forever in late-game slowdown. All world end scenarios have a special super event.\n\n"
chaosx_event_evolution_loc: "§YEvent Evolution and Clusters§!\n\nMany events do not stay static. Once chaos reaches the necessary level, an event can evolve into a more dangerous version, and some evolutions also require specific prior events before they become available. This creates escalation chains that reflect the world you have already shaped instead of just drawing from a flat random pool.\n\nRelated events can also appear as clusters. As chaos rises, the chance for a cluster to fire grows. Events in a cluster tend to share themes and later events in a cluster tend to be more severe. Clusters are classified simply as events as well, so clusters can be repeatable, fire once or major.\n\n"
chaosx_configuration_loc: "§YConfiguration and Settings§!\n\nThe settings interface lets you decide how hands-on or hands-off the system should be. For example, you can enable or disable the event system per country, filter events and fire events manually, etc. The same interface also handles timer tuning, tag-management behavior, and many other settings\n\n"
chaosx_chaos_config_loc: "The chaos configuration allows you directly adjust the current chaos level, jump between chaos tiers, or disable chaos-meter system entirely."
chaosx_multiplayer_loc: "§YMultiplayer Compatibility§!\n\nIn multiplayer, all players share the same global event pool and the same global Chaos Meter, so the overall direction of the campaign is collective. At the same time, each player still keeps their own local timer and their own settings, which means the shared world state can still reach different players at different moments or through different targets.\n\n"
chaosx_debug_loc: "§YDebug and Monitoring§!\n\nThe debug and monitoring tools expose the system in a practical way. They track total event statistics, timer values and progression, weight and cap behavior, and the current state of the Chaos Meter with its recent changes.\n\n"
chaosx_donation_loc: "§YDonation§!\n\nIf you've enjoyed my mod and would like to see more in the future, please consider making a donation.\nThis project was made with care and love, and it's that same love that brings out the best in what we create. Love allows us to see the unseen in one another, to believe in potential before it becomes reality. By offering your support, you help that unseen possibility take form.\nEvery contribution helps me continue, and reminds me that the time and heart I've put into this wasn't a waste.\nThank you for your kindness.\n\n\n"
chaosx_closing_loc: "Have fun playing Chaos Redux! ;)"

chaosx_close_button_txt: "Let's go!"
chaosx_close_button_txt_desc: "Death! Ride, ride to ruin and the world's ending!"
