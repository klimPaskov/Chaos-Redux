l_english:
chaosx.nr25.1.t: "Antarctica Race"
chaosx.nr25.2.t: "Antarctica Race"
chaosx.nr25.2.d: "Reports from remote scientific outposts in Antarctica confirm the crash landing of an unidentified flying object (UFO) deep within the icy expanse. Eyewitness accounts describe a peculiar, otherworldly craft of unknown origin, sparking a flurry of speculation and intrigue across the globe. Governments, corporations, and clandestine organizations alike are now scrambling to secure control over this unprecedented discovery, initiating a race that could shape the future of humanity."
chaosx.nr25.2.a: "The race begins!"

chaosx.nr25.3.t: "Antarctica Race Over"
chaosx.nr25.3.d: "We have secured the alien technology!"
chaosx.nr25.3.a: "We secured Antarctica!"

chaosx.news.25.t: "Alien Technology in Antarctica"
chaosx.news.25.d: "Reports from Antarctica confirm the astonishing crash landing of an unidentified flying object. Governments across the globe are mobilizing resources and dispatching expeditions to secure the crash site, with some nations advocating for international collaboration to investigate the UFO's secrets. Meanwhile, others are opting for unilateral action, launching national missions to assert sovereignty over Antarctica and claim ownership of the alien technology within."
chaosx.news.25.a: "Interesting..."

chaosx.news.26.t: "Antarctica Race Over"
chaosx.news.26.d: "In a momentous achievement hailed as a triumph of national prowess and ingenuity, [FROM.GetName] has emerged victorious in the global race to secure the alien technology found within the crashed UFO in Antarctica. Following a relentless pursuit marked by unparalleled determination and strategic acumen, [FROM.GetName] now stands as the sole possessor of this groundbreaking extraterrestrial technology."
chaosx.news.26.a: "With great tech comes great responsibility"
