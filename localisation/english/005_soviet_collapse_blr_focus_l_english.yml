l_english:
soviet_collapse_belarus_focus_tree: "Belarus Collapse"
soviet_collapse_belarus_focus_tree_desc: "A runtime Soviet Collapse focus tree for an event-created Belarus."
blr_soviet_collapse_minsk_junction_authority: "Minsk Junction Authority"
blr_soviet_collapse_minsk_junction_authority_desc: "Minsk takes command of timetables, switching yards, and rail guards before Moscow can move loyal units through the republic."
blr_soviet_collapse_audit_the_western_timetables: "Audit the Western Timetables"
blr_soviet_collapse_audit_the_western_timetables_desc: "Rail clerks compare Soviet orders with local movement records to learn which trains still obey the center."
blr_soviet_collapse_switchyard_guard_posts: "Switchyard Guard Posts"
blr_soviet_collapse_switchyard_guard_posts_desc: "Armed posts at junctions make every troop train negotiate with Belarusian authority."
blr_soviet_collapse_locomotive_fuel_committees: "Locomotive Fuel Committees"
blr_soviet_collapse_locomotive_fuel_committees_desc: "Fuel committees decide which engines move troops, refugees, food, and depot stores."
blr_soviet_collapse_sealed_military_freight: "Sealed Military Freight"
blr_soviet_collapse_sealed_military_freight_desc: "Freight manifests are opened under guard, turning hidden Soviet shipments into Belarusian bargaining chips."
blr_soviet_collapse_rail_repair_columns: "Rail Repair Columns"
blr_soviet_collapse_rail_repair_columns_desc: "Repair crews follow the crisis front so bridges, sidings, and signal boxes can recover faster than Moscow expects."
blr_soviet_collapse_armored_junction_sections: "Armored Junction Sections"
blr_soviet_collapse_armored_junction_sections_desc: "Improvised armored rail sections protect dispatchers and mobile reserves along the main corridors."
blr_soviet_collapse_evacuation_platform_rules: "Evacuation Platform Rules"
blr_soviet_collapse_evacuation_platform_rules_desc: "Station rules prevent refugee trains, troop movements, and food deliveries from destroying one another."
blr_soviet_collapse_league_transit_clock: "League Transit Clock"
blr_soviet_collapse_league_transit_clock_desc: "League-bound trains receive common clocks and guarded paperwork that make Belarus the hinge of coalition movement."
blr_soviet_collapse_all_routes_answer_minsk: "All Routes Answer Minsk"
blr_soviet_collapse_all_routes_answer_minsk_desc: "Rail authority becomes state authority as every usable route must pass through Minsk offices."
blr_soviet_collapse_republic_of_junctions: "Republic of Junctions"
blr_soviet_collapse_republic_of_junctions_desc: "Belarus survives by making movement itself a sovereign institution."
blr_soviet_collapse_forest_depth_doctrine: "Forest Depth Doctrine"
blr_soviet_collapse_forest_depth_doctrine_desc: "Belarusian defense plans use forests, marshes, and dispersed villages to slow direct Soviet pressure."
blr_soviet_collapse_marsh_guide_rolls: "Marsh Guide Rolls"
blr_soviet_collapse_marsh_guide_rolls_desc: "Local guides are registered, supplied, and protected before both armies try to force them into service."
blr_soviet_collapse_hidden_field_hospitals: "Hidden Field Hospitals"
blr_soviet_collapse_hidden_field_hospitals_desc: "Small hospitals move into forest belts where wounded units can disappear from Soviet reconnaissance."
blr_soviet_collapse_partisan_memory_cells: "Partisan Memory Cells"
blr_soviet_collapse_partisan_memory_cells_desc: "Old partisan memory is organized into defense cells without pretending the current war is the last one."
blr_soviet_collapse_forest_signal_posts: "Forest Signal Posts"
blr_soviet_collapse_forest_signal_posts_desc: "Signal posts link small detachments through couriers, field telephones, and guarded radio relays."
blr_soviet_collapse_timber_road_denial: "Timber Road Denial"
blr_soviet_collapse_timber_road_denial_desc: "Timber roads are prepared for demolition, ambush, and controlled reopening after each Soviet probe."
blr_soviet_collapse_village_shelter_compacts: "Village Shelter Compacts"
blr_soviet_collapse_village_shelter_compacts_desc: "Village compacts trade food and shelter for discipline from troops moving through civilian ground."
blr_soviet_collapse_anti_raider_patrol_belts: "Anti-Raider Patrol Belts"
blr_soviet_collapse_anti_raider_patrol_belts_desc: "Patrol belts stop loyalist raiders, deserter bands, and private militias from using the forests as cover."
blr_soviet_collapse_deep_reserve_clearings: "Deep Reserve Clearings"
blr_soviet_collapse_deep_reserve_clearings_desc: "Reserve clearings hide ammunition, medical stores, and field kitchens beyond the first line."
blr_soviet_collapse_forest_front_staff: "Forest Front Staff"
blr_soviet_collapse_forest_front_staff_desc: "The staff learns to command a front that looks like scattered woods and blocked roads on Soviet maps."
blr_soviet_collapse_green_depth_of_the_republic: "Green Depth of the Republic"
blr_soviet_collapse_green_depth_of_the_republic_desc: "The forests become a national defense system rather than a place to retreat."
blr_soviet_collapse_western_gate_offices: "Western Gate Offices"
blr_soviet_collapse_western_gate_offices_desc: "Border and rail offices define who may pass west, who may return, and which papers survive the collapse."
blr_soviet_collapse_polish_border_notifications: "Polish Border Notifications"
blr_soviet_collapse_polish_border_notifications_desc: "Warsaw receives careful notices that Belarus controls transit without offering itself as a client corridor."
blr_soviet_collapse_lithuanian_link_protocols: "Lithuanian Link Protocols"
blr_soviet_collapse_lithuanian_link_protocols_desc: "Protocols with Lithuanian contacts keep northern routes open while avoiding a fight over influence."
blr_soviet_collapse_ukrainian_southern_windows: "Ukrainian Southern Windows"
blr_soviet_collapse_ukrainian_southern_windows_desc: "Southern windows coordinate with Ukraine so Soviet pressure cannot isolate each republic separately."
blr_soviet_collapse_refugee_train_statutes: "Refugee Train Statutes"
blr_soviet_collapse_refugee_train_statutes_desc: "Refugee trains receive legal status, guard rules, and destination offices before panic wrecks the corridor."
blr_soviet_collapse_customs_under_fire: "Customs Under Fire"
blr_soviet_collapse_customs_under_fire_desc: "Emergency customs offices tax, inspect, and protect goods moving through a state at war."
blr_soviet_collapse_neutral_passage_board: "Neutral Passage Board"
blr_soviet_collapse_neutral_passage_board_desc: "A passage board arbitrates between League needs, foreign pressure, and Belarusian fear of becoming a road."
blr_soviet_collapse_corridor_tolls_for_defense: "Corridor Tolls for Defense"
blr_soviet_collapse_corridor_tolls_for_defense_desc: "Transit fees fund guards, repairs, and depots without openly selling sovereignty."
blr_soviet_collapse_deny_soviet_right_of_way: "Deny Soviet Right of Way"
blr_soviet_collapse_deny_soviet_right_of_way_desc: "Moscow is denied legal passage unless it accepts that Belarus is not an internal district."
blr_soviet_collapse_league_western_gate: "League Western Gate"
blr_soviet_collapse_league_western_gate_desc: "The Free Republics League treats Belarus as the western gate that makes aid possible."
blr_soviet_collapse_corridors_decide: "The Corridors Decide"
blr_soviet_collapse_corridors_decide_desc: "Belarus becomes powerful because armies, refugees, and patrons must pass through rules it controls."
blr_soviet_collapse_corridor_dynamic_rewards_tt: "Corridor rewards scale from owned states, rail authority, corridor authority, Soviet foreign appetite, and Soviet depot vulnerability."
blr_soviet_collapse_supreme_soviet_records: "Supreme Soviet Records"
blr_soviet_collapse_supreme_soviet_records_desc: "Legislative records are gathered to prove the emergency government is not merely a committee with rifles."
blr_soviet_collapse_restore_the_statute_books: "Restore the Statute Books"
blr_soviet_collapse_restore_the_statute_books_desc: "Statute books are reissued with Belarusian authority over courts, taxes, and mobilization."
blr_soviet_collapse_judges_under_guard: "Judges under Guard"
blr_soviet_collapse_judges_under_guard_desc: "Judges receive protection and scrutiny so legal restoration does not become loyalist sabotage."
blr_soviet_collapse_municipal_oath_forms: "Municipal Oath Forms"
blr_soviet_collapse_municipal_oath_forms_desc: "Municipal officials sign clear oaths that separate service to local citizens from obedience to Moscow."
blr_soviet_collapse_language_of_the_decrees: "Language of the Decrees"
blr_soviet_collapse_language_of_the_decrees_desc: "Emergency decrees define which language commands courts, rails, police, and schools."
blr_soviet_collapse_amnesty_for_confused_officials: "Amnesty for Confused Officials"
blr_soviet_collapse_amnesty_for_confused_officials_desc: "Officials who hesitated are offered amnesty if they hand over files and accept the republic."
blr_soviet_collapse_provisional_rights_code: "Provisional Rights Code"
blr_soviet_collapse_provisional_rights_code_desc: "A rights code promises lawful arrests, property limits, and minority protection during the crisis."
blr_soviet_collapse_election_files_preserved: "Election Files Preserved"
blr_soviet_collapse_election_files_preserved_desc: "Election files are protected for the day emergency authority must ask citizens what should replace it."
blr_soviet_collapse_constitutional_law_congress: "Constitutional Law Congress"
blr_soviet_collapse_constitutional_law_congress_desc: "Lawyers and deputies draft the state that should exist after the rail crisis and forest war."
blr_soviet_collapse_recognized_in_law: "Recognized in Law"
blr_soviet_collapse_recognized_in_law_desc: "Foreign observers receive legal packets that make non-recognition look like a political choice."
blr_soviet_collapse_civic_restoration_state: "Civic Restoration State"
blr_soviet_collapse_civic_restoration_state_desc: "Belarus claims its statehood through restored law, not merely through survival."
blr_soviet_collapse_workers_councils_without_center: "Workers Councils Without Center"
blr_soviet_collapse_workers_councils_without_center_desc: "Factory and rail workers argue that councils can defend socialism without obeying a failing capital."
blr_soviet_collapse_red_rail_committees: "Red Rail Committees"
blr_soviet_collapse_red_rail_committees_desc: "Rail committees keep socialist discipline over movement while rejecting Soviet ministry control."
blr_soviet_collapse_factory_food_guarantees: "Factory Food Guarantees"
blr_soviet_collapse_factory_food_guarantees_desc: "Food guarantees keep workers at their posts and prevent Moscow from recruiting hunger."
blr_soviet_collapse_unionists_not_centralists: "Unionists Not Centralists"
blr_soviet_collapse_unionists_not_centralists_desc: "Belarusian socialists distinguish union ideals from the central orders that broke faith with them."
blr_soviet_collapse_collective_farm_security: "Collective Farm Security"
blr_soviet_collapse_collective_farm_security_desc: "Collective farms receive guards and local bargaining power against requisition raids."
blr_soviet_collapse_socialist_press_rooms: "Socialist Press Rooms"
blr_soviet_collapse_socialist_press_rooms_desc: "Press rooms broadcast a red Belarusian line to soldiers who fear nationalist replacement."
blr_soviet_collapse_militia_political_schools: "Militia Political Schools"
blr_soviet_collapse_militia_political_schools_desc: "Militia schools combine field discipline with arguments against both reaction and Moscow panic."
blr_soviet_collapse_workshop_control_statutes: "Workshop Control Statutes"
blr_soviet_collapse_workshop_control_statutes_desc: "Workshop control statutes protect production from absentee ministries and private seizure."
blr_soviet_collapse_red_republican_congress: "Red Republican Congress"
blr_soviet_collapse_red_republican_congress_desc: "A congress of councils defines the republic as socialist, sovereign, and unwilling to return to command from above."
blr_soviet_collapse_appeal_to_soviet_soldiers: "Appeal to Soviet Soldiers"
blr_soviet_collapse_appeal_to_soviet_soldiers_desc: "Belarus appeals to Soviet soldiers as comrades who should refuse a war to restore bureaucratic obedience."
blr_soviet_collapse_sovereign_workers_republic: "Sovereign Workers Republic"
blr_soviet_collapse_sovereign_workers_republic_desc: "The republic becomes a socialist rival to Moscow rather than an anti-socialist frontier."
blr_soviet_collapse_observer_desks_at_the_stations: "Observer Desks at the Stations"
blr_soviet_collapse_observer_desks_at_the_stations_desc: "Foreign observers are placed where they can see transit and where Belarus can watch them."
blr_soviet_collapse_polish_relief_windows: "Polish Relief Windows"
blr_soviet_collapse_polish_relief_windows_desc: "Relief windows open through Poland under strict rail paperwork and patronage limits."
blr_soviet_collapse_baltic_wire_transfers: "Baltic Wire Transfers"
blr_soviet_collapse_baltic_wire_transfers_desc: "Baltic contacts move medicine, radios, and diplomatic cables through northern wire rooms."
blr_soviet_collapse_french_medical_train: "French Medical Train"
blr_soviet_collapse_french_medical_train_desc: "A medical train offers humanitarian legitimacy while testing how much foreign presence Moscow will tolerate."
blr_soviet_collapse_british_rail_advisers: "British Rail Advisers"
blr_soviet_collapse_british_rail_advisers_desc: "Rail advisers help repair signals and timetables without receiving command over the corridor."
blr_soviet_collapse_american_credit_against_passage: "American Credit Against Passage"
blr_soviet_collapse_american_credit_against_passage_desc: "Credit talks link passage rights, repair contracts, and recognition risk."
blr_soviet_collapse_german_intelligence_screens: "German Intelligence Screens"
blr_soviet_collapse_german_intelligence_screens_desc: "German approaches are screened as both useful anti-Soviet information and dangerous patronage."
blr_soviet_collapse_transit_neutrality_declaration: "Transit Neutrality Declaration"
blr_soviet_collapse_transit_neutrality_declaration_desc: "Belarus declares that transit assistance does not make it a foreign base."
blr_soviet_collapse_patronage_ledger_minsk: "Patronage Ledger Minsk"
blr_soviet_collapse_patronage_ledger_minsk_desc: "A ledger tracks arms, advisers, loans, and concessions before foreign help becomes ownership."
blr_soviet_collapse_recognition_through_passage: "Recognition Through Passage"
blr_soviet_collapse_recognition_through_passage_desc: "Each train that crosses under Belarusian papers makes foreign governments treat the republic as real."
blr_soviet_collapse_unowned_corridor: "Unowned Corridor"
blr_soviet_collapse_unowned_corridor_desc: "Belarus accepts foreign traffic while refusing to become a road administered by its patrons."
blr_soviet_collapse_archives_before_agents: "Archives Before Agents"
blr_soviet_collapse_archives_before_agents_desc: "Security archives are secured before central loyalists, foreign officers, or private factions can rewrite them."
blr_soviet_collapse_screen_the_rail_offices: "Screen the Rail Offices"
blr_soviet_collapse_screen_the_rail_offices_desc: "Rail offices are screened for loyalist dispatchers and foreign couriers moving under emergency cover."
blr_soviet_collapse_false_orders_registry: "False Orders Registry"
blr_soviet_collapse_false_orders_registry_desc: "A registry of false orders teaches officers which seals, signals, and signatures can no longer be trusted."
blr_soviet_collapse_border_agent_interviews: "Border Agent Interviews"
blr_soviet_collapse_border_agent_interviews_desc: "Border agents are interviewed under oath and kept useful when dismissal would create blind spots."
blr_soviet_collapse_committee_infiltration_cells: "Committee Infiltration Cells"
blr_soviet_collapse_committee_infiltration_cells_desc: "Cells monitor local committees without turning every civic office into an enemy."
blr_soviet_collapse_decode_soviet_timings: "Decode Soviet Timings"
blr_soviet_collapse_decode_soviet_timings_desc: "Captured timings and rail requests reveal where Moscow expects obedience to return first."
blr_soviet_collapse_foreign_mission_limits: "Foreign Mission Limits"
blr_soviet_collapse_foreign_mission_limits_desc: "Foreign missions accept movement limits that preserve Belarusian security and reduce patronage risk."
blr_soviet_collapse_loyalist_officer_watch: "Loyalist Officer Watch"
blr_soviet_collapse_loyalist_officer_watch_desc: "Officers with Soviet sympathies are watched by assignment, supply access, and communication pattern."
blr_soviet_collapse_clean_arrest_procedures: "Clean Arrest Procedures"
blr_soviet_collapse_clean_arrest_procedures_desc: "Arrest procedures require evidence so counterintelligence does not become an excuse for factional revenge."
blr_soviet_collapse_security_under_civic_law: "Security Under Civic Law"
blr_soviet_collapse_security_under_civic_law_desc: "The security service is placed under civic law before its emergency powers harden."
blr_soviet_collapse_quiet_state_survives: "The Quiet State Survives"
blr_soviet_collapse_quiet_state_survives_desc: "Belarus survives by making every order prove itself before it moves men or trains."
blr_soviet_collapse_citizenship_under_transit: "Citizenship Under Transit"
blr_soviet_collapse_citizenship_under_transit_desc: "Citizenship rules protect people passing through and people accused of not belonging enough."
blr_soviet_collapse_schools_keep_open: "Schools Keep Open"
blr_soviet_collapse_schools_keep_open_desc: "Schools remain open where possible, teaching language, evacuation, and civic duty under emergency rule."
blr_soviet_collapse_churches_and_civic_halls: "Churches and Civic Halls"
blr_soviet_collapse_churches_and_civic_halls_desc: "Churches, halls, and local associations become places where civilians meet the state without uniforms."
blr_soviet_collapse_memory_of_partisans_and_prisons: "Memory of Partisans and Prisons"
blr_soviet_collapse_memory_of_partisans_and_prisons_desc: "Public memory of war, occupation, and repression is handled without handing it to one faction."
blr_soviet_collapse_city_council_food_boards: "City Council Food Boards"
blr_soviet_collapse_city_council_food_boards_desc: "City councils manage food boards that make legitimacy visible in queues and kitchens."
blr_soviet_collapse_refugee_citizenship_cases: "Refugee Citizenship Cases"
blr_soviet_collapse_refugee_citizenship_cases_desc: "Refugees can become residents, witnesses, or soldiers through rules rather than suspicion alone."
blr_soviet_collapse_civic_guard_statutes: "Civic Guard Statutes"
blr_soviet_collapse_civic_guard_statutes_desc: "Civic guards answer to municipal law and front needs, not to private parties."
blr_soviet_collapse_postwar_demobilization_files: "Postwar Demobilization Files"
blr_soviet_collapse_postwar_demobilization_files_desc: "Demobilization files plan how emergency guards return to civil life after the crisis."
blr_soviet_collapse_monuments_without_orders: "Monuments Without Orders"
blr_soviet_collapse_monuments_without_orders_desc: "Monuments are debated locally so public memory is not replaced by another decree from above."
blr_soviet_collapse_state_after_the_corridors: "State After the Corridors"
blr_soviet_collapse_state_after_the_corridors_desc: "Belarus plans for a future where transit power no longer defines every political question."
blr_soviet_collapse_belarusian_civic_republic: "Belarusian Civic Republic"
blr_soviet_collapse_belarusian_civic_republic_desc: "The crisis leaves a civic republic built from rails, forests, law, and restraint."
blr_soviet_collapse_marsh_staff_schools: "Marsh Staff Schools"
blr_soviet_collapse_marsh_staff_schools_desc: "Forest officers teach maps, couriers, hidden hospitals, and demolition discipline as one defensive method."
blr_soviet_collapse_partisan_courier_lines: "Partisan Courier Lines"
blr_soviet_collapse_partisan_courier_lines_desc: "Courier lines bind forest cells to Minsk so resistance does not become isolated local war."
blr_soviet_collapse_forest_depot_disguises: "Forest Depot Disguises"
blr_soviet_collapse_forest_depot_disguises_desc: "Ammunition, radios, and food stores are hidden as timber camps, clinics, and evacuee depots."
blr_soviet_collapse_village_neutrality_guarantees: "Village Neutrality Guarantees"
blr_soviet_collapse_village_neutrality_guarantees_desc: "Villages receive written guarantees against arbitrary requisition so guides and food keep flowing willingly."
blr_soviet_collapse_anti_raider_field_courts: "Anti-Raider Field Courts"
blr_soviet_collapse_anti_raider_field_courts_desc: "Field courts punish raiders and deserter bands without letting commanders settle private scores."
blr_soviet_collapse_green_depth_supply_roads: "Green Depth Supply Roads"
blr_soviet_collapse_green_depth_supply_roads_desc: "Supply roads through forest and marsh are mapped for evacuation, counterattack, and silent repair."
blr_soviet_collapse_forest_front_rotation: "Forest Front Rotation"
blr_soviet_collapse_forest_front_rotation_desc: "Detachments rotate through deep belts so local fighters do not become exhausted private armies."
blr_soviet_collapse_republic_of_the_green_depth: "Republic of the Green Depth"
blr_soviet_collapse_republic_of_the_green_depth_desc: "Belarus turns forest defense into a national doctrine that survives beyond the first Soviet offensive."
blr_soviet_collapse_corridor_inspection_service: "Corridor Inspection Service"
blr_soviet_collapse_corridor_inspection_service_desc: "Inspectors audit trains, permits, aid convoys, and troop movements before corridor power becomes smuggling."
blr_soviet_collapse_western_passage_courts: "Western Passage Courts"
blr_soviet_collapse_western_passage_courts_desc: "Passage courts settle seizures, refugee claims, and transit disputes under Belarusian law."
blr_soviet_collapse_league_ticket_offices: "League Ticket Offices"
blr_soviet_collapse_league_ticket_offices_desc: "League ticket offices give allied staff a route through Belarus without handing them command of the route."
blr_soviet_collapse_foreign_convoy_licenses: "Foreign Convoy Licenses"
blr_soviet_collapse_foreign_convoy_licenses_desc: "Foreign convoys receive licenses that bind aid to Belarusian timetables and patronage ledgers."
blr_soviet_collapse_refugee_return_timetables: "Refugee Return Timetables"
blr_soviet_collapse_refugee_return_timetables_desc: "Return timetables plan how refugees move home when the front changes rather than when panic demands it."
blr_soviet_collapse_customs_anti_corruption_board: "Customs Anti-Corruption Board"
blr_soviet_collapse_customs_anti_corruption_board_desc: "An anti-corruption board limits the officials who profit from emergency customs and foreign cargo."
blr_soviet_collapse_corridor_sovereignty_statute: "Corridor Sovereignty Statute"
blr_soviet_collapse_corridor_sovereignty_statute_desc: "The statute declares that passage rights are revocable state permissions, not foreign claims on the republic."
blr_soviet_collapse_state_that_controls_passage: "State That Controls Passage"
blr_soviet_collapse_state_that_controls_passage_desc: "Belarus defines itself as the state that decides movement, not the road others own."
blr_soviet_collapse_audit_emergency_oaths: "Audit Emergency Oaths"
blr_soviet_collapse_audit_emergency_oaths_desc: "Emergency oaths are reviewed so officials serve the republic instead of the strongest office near them."
blr_soviet_collapse_minority_petition_chambers: "Minority Petition Chambers"
blr_soviet_collapse_minority_petition_chambers_desc: "Petition chambers let minorities and border communities bring grievances before Moscow can pose as their only protector."
blr_soviet_collapse_property_claims_registry: "Property Claims Registry"
blr_soviet_collapse_property_claims_registry_desc: "A claims registry records homes, workshops, farms, and rail cargo seized during the collapse."
blr_soviet_collapse_military_detention_rules: "Military Detention Rules"
blr_soviet_collapse_military_detention_rules_desc: "Detention rules require evidence and review before wartime security erases legal restoration."
blr_soviet_collapse_constitutional_observer_benches: "Constitutional Observer Benches"
blr_soviet_collapse_constitutional_observer_benches_desc: "Observers from cities, villages, and churches sit near the constitutional process without owning it."
blr_soviet_collapse_municipal_budget_law: "Municipal Budget Law"
blr_soviet_collapse_municipal_budget_law_desc: "Municipal budgets are restored so towns can feed civilians without waiting for military requisition offices."
blr_soviet_collapse_postcrisis_election_calendar: "Postcrisis Election Calendar"
blr_soviet_collapse_postcrisis_election_calendar_desc: "A guarded election calendar ties postwar legitimacy to front safety and refugee return."
blr_soviet_collapse_law_above_the_corridor: "Law Above the Corridor"
blr_soviet_collapse_law_above_the_corridor_desc: "Belarus insists that railways, forests, and soldiers answer to law once survival permits it."
blr_soviet_collapse_archive_chain_of_custody: "Archive Chain of Custody"
blr_soviet_collapse_archive_chain_of_custody_desc: "Security archives receive chain-of-custody rules before loyalists or patrons can weaponize missing files."
blr_soviet_collapse_signal_authentication_rooms: "Signal Authentication Rooms"
blr_soviet_collapse_signal_authentication_rooms_desc: "Authentication rooms test rail, military, and ministry signals before orders move men or trains."
blr_soviet_collapse_foreign_agent_visitor_books: "Foreign Agent Visitor Books"
blr_soviet_collapse_foreign_agent_visitor_books_desc: "Visitor books track foreign officers, journalists, doctors, and couriers without closing the republic to help."
blr_soviet_collapse_loyalist_amnesty_interrogations: "Loyalist Amnesty Interrogations"
blr_soviet_collapse_loyalist_amnesty_interrogations_desc: "Amnesty interrogations trade information for monitored service instead of driving every suspect underground."
blr_soviet_collapse_committee_watch_limits: "Committee Watch Limits"
blr_soviet_collapse_committee_watch_limits_desc: "Committee surveillance receives written limits so civic offices can function without becoming security branches."
blr_soviet_collapse_counter_sabotage_rail_cells: "Counter-Sabotage Rail Cells"
blr_soviet_collapse_counter_sabotage_rail_cells_desc: "Rail cells guard bridges, switches, fuel stores, and repair crews from both Soviet agents and private militias."
blr_soviet_collapse_security_review_courts: "Security Review Courts"
blr_soviet_collapse_security_review_courts_desc: "Review courts test counterintelligence arrests against evidence before fear becomes a ministry."
blr_soviet_collapse_quiet_state_doctrine: "Quiet State Doctrine"
blr_soviet_collapse_quiet_state_doctrine_desc: "Belarus makes security a quiet doctrine of verified orders, limited files, and restrained force."
