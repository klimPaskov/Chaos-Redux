l_english:
gods_plan: "God's Plan"
anti_player_pact: "Secret Alliance"
revolution_front: "Revolutionary Front"
anti_zombie_league: "Anti-Zombie League"
holy_realm_mandala_of_nations_faction_name: "Mandala of Nations"
azl_joining_rule_human_survivors_only: "Human Survivors Only"
azl_member_rule_joint_operations: "Joint Anti-Zombie Operations"
azl_member_rule_shared_labs: "Shared Cure and Weapons Labs"
azl_manifest_global_survival_name: "Global Survival Against the Horde"
azl_manifest_global_survival_desc: "The Anti-Zombie League exists to keep the world from falling completely into zombie hands. As long as humanity still controls most of the globe, the coalition can maintain organized resistance, shared laboratories, and coordinated military planning."
faction_goal_azl_secure_cure_exchange_name: "Secure the Cure Exchange"
faction_goal_azl_secure_cure_exchange_desc: "Every member of the league must be tied into the common cure-sharing structure. Fragmented medical research only helps the hordes."
faction_goal_azl_fund_joint_labs_name: "Fund the Joint Laboratories"
faction_goal_azl_fund_joint_labs_desc: "The league's pooled investment must be pushed high enough to sustain shared laboratories, accelerated pathogen analysis, and mass-production planning for anti-zombie measures."
faction_goal_azl_field_the_cure_name: "Field the Cure"
faction_goal_azl_field_the_cure_desc: "The final objective of the Anti-Zombie League is not merely survival, but the deployment of a working cure capable of turning the tide of the outbreak."
thr_joining_rule_mandala_peace_only: "Peaceful Entrants Only"
thr_member_rule_vow_against_offensive_war: "Vow against Offensive War"
thr_member_rule_acts_of_kindness: "Acts of Kindness"
faction_manifest_thr_mandala_peace_name: "Global Peace through Refusal"
faction_manifest_thr_mandala_peace_desc: "The Mandala of Nations exists to reduce suffering without conquest. Its members shelter refugees, mediate crises, open stores, and bind themselves against offensive war."
faction_goal_thr_open_refuge_corridors_name: "Open Refuge Corridors"
faction_goal_thr_open_refuge_corridors_desc: "The faction must open protected routes for civilians, exiles, and relief officials. Completing this act of kindness lowers global chaos."
faction_goal_thr_white_flag_congress_name: "Hold the White-Flag Congress"
faction_goal_thr_white_flag_congress_desc: "The Realm must gather the faction under white flags while it is at peace and record mediation as a shared duty. Completing this act of kindness lowers global chaos."
faction_goal_thr_open_granaries_name: "Open the Granaries"
faction_goal_thr_open_granaries_desc: "The faction must release food stores and road labor for wider relief. Completing this act of kindness lowers global chaos."
