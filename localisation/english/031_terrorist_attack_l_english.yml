l_english:
chaosx.nr31.1.t: "Terrorists"

chaosx.nr31.2.t: "Terrorist attacks!"
chaosx.nr31.2.d: "A wave of violent terrorist attacks has swept through our nation, targeting civilian populations, government institutions, and security forces with indiscriminate brutality. The attacks have instilled fear and uncertainty among citizens, disrupting daily life and prompting heightened security measures. As authorities work to apprehend the perpetrators and prevent further bloodshed, our nation remains resolute in the face of this grave threat to our security and stability."
chaosx.nr31.2.a: "Oh no!"

chaosx.news.36.t: "Violent Terrorist Attacks"
chaosx.news.36.d: "A spate of violent terrorist attacks is wreaking havoc across [From.GetName], leaving authorities struggling to respond effectively. The relentless assaults, ranging from bombings to shootings, have instilled widespread fear and uncertainty among citizens. Despite efforts by security forces, the government is finding it increasingly difficult to contain the escalating violence, prompting urgent calls for action to restore peace and security."
chaosx.news.36.a: "Terrible"
