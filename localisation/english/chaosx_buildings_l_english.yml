# Building definitions
biowarfare_facility: "Biowarfare Facility"
biowarfare_facility_desc: "A specialized research facility dedicated to biological warfare research and development. Needed for special biowarfare projects (Chaos Redux)."
biowarfare_facility_plural: "Biowarfare Facilities"

cw_facility: "Chemical Warfare Facility"
cw_facility_desc: "A specialized research facility dedicated to chemical warfare research and development. Needed for special chemical warfare projects (Chaos Redux)."
cw_facility_plural: "Chemical Warfare Facilities"

concentration_camp: "Concentration Camp"
concentration_camp_desc: "A buildable camp infrastructure network used for detention, forced labor, deportation processing, and internal repression. Its responsible controller is registered by the camp system, and condemnation depends on discovery by an enemy."
concentration_camp_plural: "Concentration Camps"
extermination_camp: "Extermination Camp"
extermination_camp_desc: "A hidden state killing site and transport endpoint. It creates severe internal damage and civilian deaths, and produces major condemnation only once enemy forces uncover the evidence."
extermination_camp_plural: "Extermination Camps"
gulag_labor_camp_network: "Gulag Labor Camp Network"
gulag_labor_camp_network_desc: "A forced labor and repression network tied to state security organs. It causes population loss and resistance pressure, while foreign reaction depends on discovered evidence."
gulag_labor_camp_network_plural: "Gulag Labor Camp Networks"

