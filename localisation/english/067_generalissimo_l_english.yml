l_english:
chaosx.nr67.1.t: "Generalissimo"

chaosx.nr67.2.t: "Generalissimo [?generalissimo.GetName]"
chaosx.nr67.2.d: "Our unit leader has ascended to the prestigious rank of Generalissimo, becoming the supreme commander of all military forces. This elevation in rank signifies unparalleled expertise and leadership, with the Generalissimo's abilities surpassing all others in the military hierarchy. With unrivaled strategic prowess and command authority, [?generalissimo.GetName] is poised to lead our nation's armed forces to victory on all fronts. As the pinnacle of military leadership, the Generalissimo's appointment instills confidence and unity among our troops, ensuring unparalleled effectiveness in defense and combat operations."
chaosx.nr67.2.a: "Glorious day!"

chaosx.news.59.t: "Generalissimo [FROM.GetName] of [?global.generalissimo_country.GetName]"
chaosx.news.59.d: "A country's military leader, known as the Generalissimo, has asserted himself as the greatest general in history. Through a series of public addresses and media campaigns, the Generalissimo touts his tactical brilliance, strategic acumen, and unmatched record of victories on the battlefield. Despite skepticism from some quarters, the Generalissimo's claims resonate with many within the country, who view him as a symbol of strength and authority."
chaosx.news.59.a: "He is"
