independence_wave_border_commission_category: "Border Commission"
independence_wave_border_commission_category_desc: "Recover core territory through surveys, claims, arbitration, protected transfers, observer freezes, or ultimatums. At high chaos, a league-backed government can press adjacent claims outside its own cores, but those overreaches give the old host a path to warnings, talks, and war goals.\n\nClaim ambition opens stronger claims and coercive actions. Open disputes count unresolved border files. Peaceful resolutions support final settlement achievements."
independence_wave_border_commission_gui_header: "Border Commission"
independence_wave_border_commission_gui_values: "Claim ambition: §Y[?independence_wave_claim_ambition|0]§!  Open disputes: §Y[?independence_wave_open_border_dispute_count|0]§!\nPeaceful resolutions: §Y[?chaosx_iw_peaceful_border_resolution_count|0]§!  Foreign attention: §Y[?independence_wave_foreign_attention|0]§!"
independence_wave_sealed_dossier_category: "Sealed Dossier"
independence_wave_sealed_dossier_category_desc: "Use this category for strange releases that ordinary diplomacy cannot explain. Archive audits lower occult pressure, dead-census work raises manpower and danger, unmarked congresses reveal the impossible route, and containment missions succeed or fail based on occult pressure.\n\nOccult pressure: §Y[?independence_wave_occult_pressure|0]§!\nRadicalization: §Y[?independence_wave_radicalization|0]§!\nForeign attention: §Y[?independence_wave_foreign_attention|0]§!"
independence_wave_archive_state_package_tt: "Archive-State releases turn impossible statehood into a file problem: proof, seals, and offices become the first line of control."
independence_wave_necromantic_custodianship_package_tt: "Necromantic Custodianships count the dead as an administrative constituency, trading fear and foreign attention for bodies that still answer the register."

independence_wave_recognize_the_loss: "Recognize the Loss"
independence_wave_recognize_the_loss_desc: "A formal note accepts that the first wave has already happened and instructs ministries to salvage law, trade, and archives from the rupture."
independence_wave_recognize_the_loss_requirements_tt: "The Independence Dossier Board is active, the release wave has not been recognized, and the host can keep a functioning ministry."
independence_wave_recognize_the_loss_effect_tt: "The host records the wave, lowers anger, gains stability, loses a little war support, and receives the petition report."
independence_wave_invite_observers: "Invite Foreign Observers"
independence_wave_invite_observers_desc: "Observers make suppression harder and embarrassment more likely, but they can also keep the aftermath from becoming a private war."
independence_wave_invite_observers_requirements_tt: "The Independence Dossier Board is active and observers have not already been invited."
independence_wave_invite_observers_effect_tt: "Foreign observers enter the dossier crisis, lowering host anger and raising foreign attention."
independence_wave_open_dossier_talks: "Open Dossier Talks"
independence_wave_open_dossier_talks_desc: "Ministers call the first dossier representatives into public talks, lowering the temperature while making the crisis harder to hide."
independence_wave_open_dossier_talks_requirements_tt: "The Independence Dossier Board is active and no talks have been opened for this wave."
independence_wave_open_dossier_talks_effect_tt: "The host opens public talks, easing anger and raising foreign attention around the dossier board."
independence_wave_evacuate_host_archives: "Evacuate Host Archives"
independence_wave_evacuate_host_archives_desc: "Capital staff move census books, ministry seals, maps, and tax ledgers out of contested offices before the dossier crisis turns them into trophies."
independence_wave_evacuate_host_archives_requirements_tt: "The Independence Dossier Board is active, the archives have not been evacuated, and the host can spend command power on the transfer."
independence_wave_evacuate_host_archives_cost_tt: "£command_power §Y10§!"
independence_wave_evacuate_host_archives_effect_tt: "Archive escorts spend command power, recover political leverage, and reduce host anger."
independence_wave_host_target_root_requirements_tt: "The Independence Dossier Board is active for this host."
independence_wave_offer_local_autonomy: "Offer Local Autonomy to [FROM.GetName]"
independence_wave_offer_local_autonomy_desc: "The old capital offers a public autonomy formula for [FROM.GetName], accepting a limited political concession to keep the dossier crisis from becoming a war plan."
independence_wave_offer_local_autonomy_requirements_tt: "[FROM.GetName] must be an independent Independence Wave release from this host and must not already have received a local autonomy offer."
independence_wave_offer_local_autonomy_tt: "[FROM.GetName] receives lower pressure and radicalization, while the host lowers anger at a small stability cost."
independence_wave_arrest_committee_couriers: "Arrest Committee Couriers in [FROM.GetName]"
independence_wave_arrest_committee_couriers_desc: "Security offices target the messengers, pay clerks, and liaison rooms that keep [FROM.GetName]'s committee connected to sympathetic officials."
independence_wave_arrest_committee_couriers_requirements_tt: "[FROM.GetName] must be an independent Independence Wave release from this host, without observer-protected elections or prior courier arrests."
independence_wave_arrest_committee_couriers_tt: "[FROM.GetName] loses legitimacy but gains radicalization and foreign attention."
independence_wave_arrest_committee_couriers_cost_requirements_tt: "Requires command power for security detachments."
independence_wave_arrest_committee_couriers_cost_tt: "£command_power §Y25§!"
independence_wave_arrest_committee_couriers_cost_tt_blocked: "£command_power §R25§!"
independence_wave_arrest_committee_couriers_cost_tt_tooltip: "£command_power §Y25§!"
independence_wave_arm_loyalist_councils: "Arm Loyalist Councils in [FROM.GetName]"
independence_wave_arm_loyalist_councils_desc: "Rifle crates and emergency orders move to councils still loyal to the old capital, creating an obstacle the new committee cannot ignore."
independence_wave_arm_loyalist_councils_requirements_tt: "[FROM.GetName] must be an independent Independence Wave release from this host, without armed loyalist councils already in the field."
independence_wave_arm_loyalist_councils_tt: "[FROM.GetName] receives loyalist pressure, higher pressure, lower legitimacy, and more foreign attention."
independence_wave_arm_loyalist_councils_cost_requirements_tt: "Requires command power and infantry equipment for loyalist crates."
independence_wave_arm_loyalist_councils_cost_tt: "£command_power §Y20§!  £infantry_equipment_text_icon §Y250§!"
independence_wave_arm_loyalist_councils_cost_tt_blocked: "£command_power §R20§!  £infantry_equipment_text_icon §R250§!"
independence_wave_arm_loyalist_councils_cost_tt_tooltip: "£command_power §Y20§!  £infantry_equipment_text_icon §Y250§!"
independence_wave_warn_greedy_release: "Threaten [FROM.GetName] Over Border Overreach"
independence_wave_warn_greedy_release_desc: "The old capital sends a public warning to [FROM.GetName]: core recovery can be argued, but league-backed expansion outside its own cores can still become a reclamation war."
independence_wave_warn_greedy_release_requirements_tt: "[FROM.GetName] must be an independent Independence Wave release from this host that has pushed a league-backed border claim beyond its own cores and has not already been warned."
independence_wave_warn_greedy_release_tt: "[FROM.GetName] is warned. The host lowers domestic anger, while [FROM.GetName] gains radicalization."
independence_wave_negotiate_greedy_release: "Open Border Restraint Talks with [FROM.GetName]"
independence_wave_negotiate_greedy_release_desc: "Negotiators offer recognition language, boundary timetables, and public restraint terms before the dispute becomes a war claim."
independence_wave_negotiate_greedy_release_requirements_tt: "[FROM.GetName] must have been warned over border overreach and must not already have completed restraint talks."
independence_wave_negotiate_greedy_release_tt: "Talks lower [FROM.GetName]'s claim ambition and ease host anger. If [FROM.GetName] remains committed to expansion, the old capital can prepare a reclamation war goal."
independence_wave_authorize_parent_reclamation: "Authorize Reclamation Plans Against [FROM.GetName]"
independence_wave_authorize_parent_reclamation_desc: "The general staff receives authority to prepare a direct reclamation war against [FROM.GetName] after warnings and talks fail to restrain its border claims."
independence_wave_authorize_parent_reclamation_requirements_tt: "[FROM.GetName] must remain an overreaching Independence Wave release from this host, negotiations must have failed or the release must still press a dangerous claim, and this host must be able to declare war."
independence_wave_authorize_parent_reclamation_tt: "Creates an annexation war goal against [FROM.GetName]. [FROM.GetName] gains radicalization."
independence_wave_hold_capital_ministry: "Hold the Capital Ministry"
independence_wave_hold_capital_ministry_desc: "Clerks, guards, and emergency ministers must keep the host's protected administration functioning while dossiers and rumors spread."
independence_wave_hold_capital_ministry_activation_tt: "The Independence Dossier Board is active and the capital ministry has not already been secured or lost."
independence_wave_hold_capital_ministry_failure_requirements_tt: "The host no longer controls a functioning capital ministry."
independence_wave_hold_capital_ministry_failure_effect_tt: "Failure: the capital ministry is marked as failed, stability falls, host anger rises, and the host loses capital-survival achievement proof."
independence_wave_hold_capital_ministry_success_effect_tt: "Success: the host keeps capital-survival proof, gains stability, lowers host anger, and records that the capital still answers."
independence_wave_open_sealed_archive_audit: "Open the Sealed Archive Audit"
independence_wave_open_sealed_archive_audit_desc: "The committee gathers the pages that clerks refuse to file: erased offices, impossible seals, and citizen lists that do not match the living census."
independence_wave_open_sealed_archive_audit_requirements_tt: "This state must be an independent Independence Wave release with a strange package signal or enough occult pressure."
independence_wave_conduct_quiet_dead_census: "Conduct the Quiet Dead Census"
independence_wave_conduct_quiet_dead_census_desc: "Registrars count the people who answer from empty rolls. The numbers help the ministry, but every witness knows the state has stopped being ordinary."
independence_wave_conduct_quiet_dead_census_requirements_tt: "The sealed archive audit must be open and the quiet census must not already be complete."
independence_wave_convene_unmarked_congress: "Convene the Unmarked Congress"
independence_wave_convene_unmarked_congress_desc: "Delegates without public titles assemble under blank seals and declare that the dossier is not a mistake but a new rule of statehood."
independence_wave_convene_unmarked_congress_requirements_tt: "The sealed archive audit must be open, occult pressure must be high, and the strange file must not be contained."
independence_wave_seal_impossible_registry: "Seal the Impossible Registry"
independence_wave_seal_impossible_registry_desc: "A closed bureau begins a containment review before the most dangerous registers can become public doctrine."
independence_wave_seal_impossible_registry_requirements_tt: "The sealed archive audit must be open, occult pressure must remain below the reveal gate, and no containment review can already be active or failed."
independence_wave_seal_impossible_registry_review_tt: "A containment review begins. Keep occult pressure below the reveal gate until the review closes."
independence_wave_hold_containment_review: "Containment Review"
independence_wave_hold_containment_review_desc: "The sealed bureau must keep the impossible registry below the reveal threshold until the review closes."
independence_wave_hold_containment_review_failure_requirements_tt: "Fails only if the containment review can no longer keep the impossible registry sealed."
independence_wave_hold_containment_review_failure_tt: "The containment review fails and the strange file becomes harder to hide."
independence_wave_hold_containment_review_success_tt: "The impossible registry is contained and the Sealed Dossier closes."
independence_wave_request_recognition: "Request Recognition"
independence_wave_request_recognition_desc: "The committee sends its first diplomatic file abroad, asking other governments to treat the new state as more than an accident of panic."
independence_wave_request_recognition_requirements_tt: "The committee is an active Independence Wave release, has not requested recognition, and can keep a functioning cabinet."
independence_wave_request_recognition_effect_tt: "The committee files its recognition request, gains legitimacy, and receives political support."
independence_wave_form_local_defense_brigades: "Form Local Defense Brigades"
independence_wave_form_local_defense_brigades_desc: "Militia lists, defecting officers, and depot guards are organized before loyalists or patrons can seize the chain of command."
independence_wave_form_local_defense_brigades_requirements_tt: "The committee must be an active Independence Wave release, have available manpower, and must not already have formed local defense brigades."
independence_wave_form_local_defense_brigades_cost_requirements_tt: "Requires manpower for the first brigade register."
independence_wave_form_local_defense_brigades_cost_tt: "£manpower_texticon §Y20,000§!"
independence_wave_form_local_defense_brigades_cost_tt_blocked: "£manpower_texticon §R20,000§!"
independence_wave_form_local_defense_brigades_cost_tt_tooltip: "£manpower_texticon §Y20,000§!"
independence_wave_form_local_defense_brigades_manpower_tt: "Commits 20,000 available manpower to the first defense brigade register."
independence_wave_form_local_defense_brigades_effect_tt: "The committee spends manpower, forms local defense brigades, receives emergency rifles, and strengthens its militia register."
independence_wave_seize_depot_inventory: "Seize the Depot Inventory"
independence_wave_seize_depot_inventory_desc: "The committee counts rifles, trucks, and stores left behind by the host. Taking them strengthens survival and hardens the dispute."
independence_wave_seize_depot_inventory_requirements_tt: "The committee is an active Independence Wave release and has not already counted the depot inventory."
independence_wave_seize_depot_inventory_effect_tt: "The committee seizes rifles and stores, increasing militia strength and radicalization."
independence_wave_convene_asante_stool_court: "Convene the Golden Stool Court"
independence_wave_convene_asante_stool_court_desc: "Asante court clerks, oath witnesses, and guard captains turn the first proclamation into a royal-council file with claims beyond the first office."
independence_wave_convene_asante_stool_court_requirements_tt: "Asante must be an Independence Wave African story release and must not have convened the Golden Stool Court."
independence_wave_convene_asante_stool_court_effect_tt: "Asante gains legitimacy, local cohesion, and border ambitions toward Dahomey, Togo, and Upper Volta."
independence_wave_open_kanem_bornu_caravan_court: "Open the Caravan Court"
independence_wave_open_kanem_bornu_caravan_court_desc: "Lake records, caravan guards, and border clerks are assembled into a court that can argue for routes as territory."
independence_wave_open_kanem_bornu_caravan_court_requirements_tt: "Kanem-Bornu must be an Independence Wave African story release and must not have opened the Caravan Court."
independence_wave_open_kanem_bornu_caravan_court_effect_tt: "Kanem-Bornu gains legitimacy, militia strength, and claims around Nigeria, Chad, and Upper Volta."
independence_wave_sign_acacia_frontier_pact: "Sign the Acacia Frontier Pact"
independence_wave_sign_acacia_frontier_pact_desc: "Darfuri delegates bind district guards, caravan witnesses, and council clerks into a frontier pact for the unfinished Darfur file."
independence_wave_sign_acacia_frontier_pact_requirements_tt: "Darfur must be an Independence Wave African story release and must not have signed the Acacia Frontier Pact."
independence_wave_sign_acacia_frontier_pact_effect_tt: "Darfur gains legitimacy, militia strength, local cohesion, and a claim on North Darfur."
independence_wave_raise_lion_crown: "Raise the Lion Crown"
independence_wave_raise_lion_crown_desc: "Zulu regimental delegates place the war mask and royal petitions before the council, turning the strange crown into a public state claim."
independence_wave_raise_lion_crown_requirements_tt: "Zulu must be an Independence Wave African story release and must not have raised the Lion Crown."
independence_wave_raise_lion_crown_effect_tt: "Zulu gains legitimacy, militia strength, and claims toward South Africa and Rhodesia."
independence_wave_seat_the_gorilla_chair: "Seat the Gorilla Chair"
independence_wave_seat_the_gorilla_chair_desc: "The Lion Crown court accepts an impossible presiding monarch: a uniformed gorilla whose seal is treated as a sovereign answer to the wave."
independence_wave_seat_the_gorilla_chair_requirements_tt: "Zulu must have raised the Lion Crown and must not have seated the Gorilla Chair."
independence_wave_seat_the_gorilla_chair_effect_tt: "The Gorilla Chair becomes country leader, raising legitimacy and militia strength while making the state harder for diplomats to explain."
independence_wave_call_african_dossier_congress: "Call the African Dossier Congress"
independence_wave_call_african_dossier_congress_desc: "The new African dossier states exchange claims, survival rules, and strange-court precedents before patrons can isolate them one by one."
independence_wave_call_african_dossier_congress_requirements_tt: "Requires an African story release that has completed its first country story decision and has not already called the congress."
independence_wave_call_african_dossier_congress_effect_tt: "Opens the New States Congress, raises coalition cohesion, and attracts foreign attention."
independence_wave_send_delegates_to_congress: "Send Delegates to Congress"
independence_wave_send_delegates_to_congress_desc: "Delegates carry border maps, equipment requests, recognition notes, and old grievances to the first congress of the new states."
independence_wave_send_delegates_to_congress_requirements_tt: "The New States Congress is open and this government has not already sent delegates."
independence_wave_send_delegates_to_congress_effect_tt: "Delegates join the Congress, increasing coalition cohesion and domestic stability."
independence_wave_draft_anti_puppet_clause: "Draft an Anti-Puppet Clause"
independence_wave_draft_anti_puppet_clause_desc: "The congress records that emergency recognition cannot become foreign ownership. The clause costs bargaining room, but it protects the new state from its own sponsors."
independence_wave_draft_anti_puppet_clause_requirements_tt: "The New States Congress must be open, the clause must not already be adopted, and this government needs a civic mandate, patron-cabinet pressure, or a prepared compact petition."
independence_wave_draft_anti_puppet_clause_effect_tt: "The Congress adopts an anti-puppet clause, lowering patron leverage while spending legitimacy and raising coalition cohesion."
independence_wave_sign_mutual_guarantee: "Sign Mutual Guarantees with [FROM.GetName]"
independence_wave_sign_mutual_guarantee_desc: "Delegates exchange guarantees with [FROM.GetName], turning congress attendance into a public promise of political independence and territorial integrity."
independence_wave_congress_target_root_requirements_tt: "Requires an independent Independence Wave government with active Congress delegates."
independence_wave_sign_mutual_guarantee_target_requirements_tt: "Target must be an independent Independence Wave delegate state that is not already guaranteed and is not at war with this government."
independence_wave_sign_mutual_guarantee_tt: "Both governments guarantee each other, and the Congress records the guarantee network."
independence_wave_recognize_impossible_delegate: "Recognize the Impossible Delegate from [FROM.GetName]"
independence_wave_recognize_impossible_delegate_desc: "The Congress accepts [FROM.GetName]'s strange file as a state paper instead of a clerical error, binding another new government to answer its seal."
independence_wave_recognize_impossible_delegate_target_requirements_tt: "Target must be an independent Independence Wave delegate state with a revealed or contained strange dossier that has not already received impossible-state recognition."
independence_wave_recognize_impossible_delegate_tt: "[FROM.GetName] gains legitimacy, foreign attention, and proof that another Independence Wave government recognizes its impossible dossier."
independence_wave_bind_strange_cooperation: "Bind Strange Cooperation with [FROM.GetName]"
independence_wave_bind_strange_cooperation_desc: "The Congress records a closed protocol between two governments whose files no longer fit public law. [FROM.GetName] is asked to answer the unmarked ministry directly."
independence_wave_bind_strange_cooperation_root_requirements_tt: "Requires an independent Independence Wave delegate government with the anti-mankind doctrine publicly locked in."
independence_wave_bind_strange_cooperation_target_requirements_tt: "Target must be an independent Independence Wave delegate state with a revealed, contained, or route-locked strange dossier and no existing strange cooperation link."
independence_wave_bind_strange_cooperation_tt: "Both states record a strange cooperation link. The anti-mankind doctrine becomes visible to the wider crisis system."
independence_wave_send_congress_volunteer_cadre: "Send a Volunteer Cadre to [FROM.GetName]"
independence_wave_send_congress_volunteer_cadre_desc: "Veteran organizers, rifle crates, and command staff move under Congress papers to help [FROM.GetName] hold its first ministries."
independence_wave_send_congress_volunteer_cadre_target_requirements_tt: "Target must be an independent Independence Wave delegate state that still needs wartime, militia, or ministry support and has not already received a Congress volunteer cadre."
independence_wave_send_congress_volunteer_cadre_tt: "[FROM.GetName] receives manpower, rifles, and militia organization. Both governments record the Congress corridor."
independence_wave_send_congress_volunteer_cadre_cost_requirements_tt: "Requires command power, manpower, and infantry equipment for the volunteer cadre."
independence_wave_send_congress_volunteer_cadre_cost_tt: "£command_power §Y20§!  £manpower_texticon §Y12,000§!  £infantry_equipment_text_icon §Y250§!"
independence_wave_open_congress_arms_pool: "Open a Shared Arms Pool"
independence_wave_open_congress_arms_pool_desc: "Rifles, support stores, depot clerks, and liaison officers are assigned to a congress pool so the next crisis is answered as a common shortage."
independence_wave_open_congress_arms_pool_requirements_tt: "Requires New States Congress delegates, no existing shared arms pool, and enough infantry and support equipment for guarded reserve crates."
independence_wave_open_congress_arms_pool_cost_requirements_tt: "Requires infantry and support equipment for the guarded reserve."
independence_wave_open_congress_arms_pool_effect_tt: "The Congress opens a shared arms pool, spends reserve equipment, and raises militia strength, cohesion, and legitimacy."
independence_wave_open_congress_arms_pool_cost_tt: "£infantry_equipment_text_icon §Y400§!  £support_equipment_text_icon §Y60§!"
independence_wave_certify_final_settlement: "Certify the Final Settlement"
independence_wave_certify_final_settlement_desc: "The Congress closes the active ledgers only after the League has survived as a real bloc, host survival has been proven, borders have been settled by paper, and the anti-puppet charter still holds."
independence_wave_certify_final_settlement_requirements_tt: "Requires an independent Independence Wave League founder with an integrated compact, a recognized secretariat, an anti-puppet clause, mass-wave host survival proof, five mutual guarantees, three peaceful border resolutions, no dossier ultimatum, and no current war."
independence_wave_certify_final_settlement_tt: "The New States Congress records a final settlement: the charter holds, the host-survival rule stands, and no active border or patron dispute remains in this ledger."
independence_wave_certify_final_settlement_cost_requirements_tt: "Requires command power for final settlement clerks."
independence_wave_certify_final_settlement_cost_tt: "£command_power §Y40§!"
independence_wave_certify_final_settlement_cost_tt_blocked: "£command_power §R40§!"
independence_wave_certify_final_settlement_cost_tt_tooltip: "£command_power §Y40§!"
independence_wave_accept_patron_advisers: "Accept Patron Advisers"
independence_wave_accept_patron_advisers_desc: "Foreign officers and technical clerks can stiffen the provisional army, but every office they enter gives the patron another claim on the cabinet."
independence_wave_balance_rival_patrons: "Balance Rival Patrons"
independence_wave_balance_rival_patrons_desc: "The government plays competing missions against each other, turning one embassy's demand into another embassy's restraint."
independence_wave_expose_foreign_broker: "Expose a Foreign Broker"
independence_wave_expose_foreign_broker_desc: "The ledger names the broker, publishes the contract trail, and forces sponsors to defend their influence in public."
independence_wave_reject_dependency_clauses: "Reject Dependency Clauses"
independence_wave_reject_dependency_clauses_desc: "The cabinet strikes out clauses that would make recognition, loans, or advisers a path to foreign ownership."
independence_wave_request_arms_corridor: "Request an Arms Corridor"
independence_wave_request_arms_corridor_desc: "The state asks a patron to open a route for rifles and support equipment. Survival improves, but the debt is written in the same ink."
independence_wave_convert_loans_to_treaty_debt: "Convert Loans to Treaty Debt"
independence_wave_convert_loans_to_treaty_debt_desc: "The cabinet turns private emergency loans into public treaty obligations, lowering direct patron grip while admitting the state still needs outside recognition."
independence_wave_major_recognize_committee: "Recognize [FROM.GetName]"
independence_wave_major_recognize_committee_desc: "Diplomatic clerks prepare a recognition note for [FROM.GetName], turning the dossier state into a government that foreign offices must answer."
independence_wave_major_patronage_root_requirements_tt: "Requires an independent outside power with regional weight and at least one independent Independence Wave government to target."
independence_wave_major_recognize_committee_target_requirements_tt: "Target must be an independent Independence Wave government that has not already received this recognition pledge."
independence_wave_major_recognize_committee_tt: "[FROM.GetName] gains legitimacy, foreign attention, and recognized Independence Wave status."
independence_wave_major_supply_rifles: "Supply Rifles to [FROM.GetName]"
independence_wave_major_supply_rifles_desc: "Rifles and support crates move through protected ports and border warehouses. [FROM.GetName] survives more easily, but the paper trail belongs to us."
independence_wave_major_supply_rifles_target_requirements_tt: "Target must be an independent Independence Wave government that has not already received this rifle shipment. The patron must have enough rifles and support equipment."
independence_wave_major_supply_rifles_tt: "[FROM.GetName] receives infantry and support equipment, militia organization, patron leverage, and foreign attention."
independence_wave_major_supply_rifles_cost_requirements_tt: "Requires infantry and support equipment."
independence_wave_major_supply_rifles_cost_tt: "£infantry_equipment_text_icon §Y500§!  £support_equipment_text_icon §Y40§!"
independence_wave_major_offer_military_mission: "Offer a Military Mission to [FROM.GetName]"
independence_wave_major_offer_military_mission_desc: "Officers, translators, wireless staff, and depot advisers are assigned to [FROM.GetName] before a rival patron writes the drill books."
independence_wave_major_offer_military_mission_target_requirements_tt: "Target must be an independent Independence Wave government that has not already received this mission. The patron must have army experience and command power for the staff."
independence_wave_major_offer_military_mission_tt: "[FROM.GetName] gains militia strength, legitimacy, patron leverage, and foreign attention."
independence_wave_major_offer_military_mission_cost_requirements_tt: "Requires army experience and command power."
independence_wave_major_offer_military_mission_cost_tt: "£army_experience §Y20§!  £command_power §Y25§!"
independence_wave_major_demand_cabinet_seats: "Demand Cabinet Seats in [FROM.GetName]"
independence_wave_major_demand_cabinet_seats_desc: "Recognition and aid become a direct demand for ministries, liaison desks, and vetoes inside [FROM.GetName]'s provisional cabinet."
independence_wave_major_demand_cabinet_seats_target_requirements_tt: "Target must be an independent Independence Wave government with enough existing patron leverage and no prior cabinet-seat demand from this channel."
independence_wave_major_demand_cabinet_seats_tt: "[FROM.GetName] accepts deeper patron leverage, loses legitimacy, and draws foreign attention."
independence_wave_major_sabotage_rival_patron: "Sabotage Rival Patrons in [FROM.GetName]"
independence_wave_major_sabotage_rival_patron_desc: "Press leaks, broker files, and consular pressure disrupt rival missions already circling [FROM.GetName]."
independence_wave_major_sabotage_rival_patron_target_requirements_tt: "Target must be an independent Independence Wave government under patron pressure and not already hit by this rival-patron operation."
independence_wave_major_sabotage_rival_patron_tt: "[FROM.GetName] loses patron leverage but attracts more foreign attention."
independence_wave_major_sabotage_rival_patron_cost_requirements_tt: "Requires command power."
independence_wave_major_sabotage_rival_patron_cost_tt: "£command_power §Y25§!"
independence_wave_accept_patron_advisers_requirements_tt: "Requires the Patron Ledger, no active Patron Ledger cooldown, army experience to brief liaison officers, and a patron-cabinet route, active war, or weak militia register."
independence_wave_balance_rival_patrons_requirements_tt: "Requires patron leverage pressure, no active Patron Ledger cooldown, enough coalition cohesion to spend on rival missions, and a balanced-sponsor, civic, national, or high-foreign-attention mandate."
independence_wave_expose_foreign_broker_requirements_tt: "Requires dangerous patron leverage, no active Patron Ledger cooldown, command power to secure the files, and a civic, revolutionary, national, or anti-puppet route."
independence_wave_reject_dependency_clauses_requirements_tt: "Requires patron leverage pressure, no active Patron Ledger cooldown, legitimacy to risk a public refusal, and anti-puppet proof, civic mandate, or stronger legitimacy."
independence_wave_request_arms_corridor_requirements_tt: "Requires the Patron Ledger, no active Patron Ledger cooldown, infantry and support equipment to guard the corridor, and active war, a patron-cabinet route, or a weak militia register."
independence_wave_convert_loans_to_treaty_debt_requirements_tt: "Requires dangerous patron leverage, no active Patron Ledger cooldown, coalition cohesion to absorb the public debt vote, and a patron-cabinet or port-ledger route."
independence_wave_accept_patron_advisers_cost_requirements_tt: "Requires army experience for the liaison staff."
independence_wave_accept_patron_advisers_cost_tt: "£army_experience §Y10§!"
independence_wave_accept_patron_advisers_effect_tt: "Advisers strengthen the militia register, raise patron leverage, attract foreign attention, and start the Patron Ledger cooldown."
independence_wave_balance_rival_patrons_cost_requirements_tt: "Requires coalition cohesion for rival-sponsor talks."
independence_wave_balance_rival_patrons_cost_tt: "§Y5§! Coalition Cohesion"
independence_wave_balance_rival_patrons_effect_tt: "Rival missions are balanced against each other, spending coalition cohesion while lowering patron leverage and raising foreign attention."
independence_wave_expose_foreign_broker_cost_requirements_tt: "Requires command power to secure broker files."
independence_wave_expose_foreign_broker_cost_tt: "£command_power §Y25§!"
independence_wave_expose_foreign_broker_effect_tt: "Broker files go public, reducing patron leverage, raising legitimacy, attracting foreign attention, and starting the Patron Ledger cooldown."
independence_wave_reject_dependency_clauses_cost_requirements_tt: "Requires legitimacy for a public refusal."
independence_wave_reject_dependency_clauses_cost_tt: "§Y6§! Legitimacy"
independence_wave_reject_dependency_clauses_effect_tt: "Dependency clauses are rejected, spending legitimacy while lowering patron leverage and raising coalition cohesion."
independence_wave_request_arms_corridor_cost_requirements_tt: "Requires infantry and support equipment to secure the corridor."
independence_wave_request_arms_corridor_cost_tt: "£infantry_equipment_text_icon §Y350§!  £support_equipment_text_icon §Y45§!"
independence_wave_request_arms_corridor_effect_tt: "The corridor spends guard equipment, delivers a larger arms shipment, raises militia strength, increases patron leverage, and attracts foreign attention."
independence_wave_convert_loans_to_treaty_debt_cost_requirements_tt: "Requires coalition cohesion for the public debt vote."
independence_wave_convert_loans_to_treaty_debt_cost_tt: "§Y6§! Coalition Cohesion"
independence_wave_convert_loans_to_treaty_debt_effect_tt: "Private emergency loans become treaty debt, spending coalition cohesion while reducing patron leverage and pressure."

independence_wave_provisional_committee: "Provisional Committee"
independence_wave_provisional_committee_desc: "The state has been born faster than its institutions. Committees, militia officers, clerks, and foreign contacts share authority until a durable government can be built."
independence_wave_civic_mandate_spirit: "Civic Mandate"
independence_wave_civic_mandate_spirit_desc: "Observers, ballot clerks, jurists, and committee delegates are trying to turn the breakaway into a recognized civic government before officers or patrons claim the mandate."
independence_wave_officer_mandate_spirit: "Officer Mandate"
independence_wave_officer_mandate_spirit_desc: "The provisional state gives its surviving officer corps emergency authority over depots, barracks, and streets until the first crisis is contained."
independence_wave_national_directorate_spirit: "National Directorate"
independence_wave_national_directorate_spirit_desc: "The breakaway treats the dossier as an unfinished claim. Border offices, veterans, and public committees press the government to demand more than survival."
independence_wave_revolutionary_committee_spirit: "Revolutionary Committee"
independence_wave_revolutionary_committee_spirit_desc: "Workshop delegates, militia registrars, and radical organizers bind the new state to armed social defense. Their committees can mobilize quickly, but they govern under constant strain."
independence_wave_patron_cabinet_spirit: "Patron Cabinet"
independence_wave_patron_cabinet_spirit_desc: "Foreign advisers, lenders, and military missions have places in the provisional cabinet. Their support keeps the state alive while narrowing its freedom."
independence_wave_protectorate_mandate_spirit: "Protectorate Mandate"
independence_wave_protectorate_mandate_spirit_desc: "Treaty clerks, foreign observers, guarantee brokers, and provisional ministers keep outside protection public enough that it can be contested."
independence_wave_oil_protectorate_spirit: "Oil Protectorate Board"
independence_wave_oil_protectorate_spirit_desc: "Field engineers, customs clerks, concession auditors, and guard detachments keep oil protection visible enough that the state can bargain over it."
independence_wave_canal_authority_spirit: "Canal Authority Board"
independence_wave_canal_authority_spirit_desc: "Transit clerks, lock engineers, pilots, guards, and observer missions keep the canal file public enough that the state can bargain over passage."
independence_wave_municipal_authority_spirit: "Municipal Authority Board"
independence_wave_municipal_authority_spirit_desc: "City clerks, service boards, workshop deputies, and guard offices keep the inland charter public enough that the state can bargain as a city government."
independence_wave_regional_compact_preparation_spirit: "Regional Compact Preparation"
independence_wave_regional_compact_preparation_spirit_desc: "The government is gathering signatures, boundary files, and congress votes for a larger settlement among the new states."
independence_wave_regional_compact_spirit: "Regional Compact"
independence_wave_regional_compact_spirit_desc: "The state has proclaimed a compact identity through congress votes, map proof, and integration ministries. It is more than the first provisional dossier."
independence_wave_new_states_compact_faction: "New States Compact"

independence_wave_liberation_provisional_tree: "Liberation Provisional Tree"
independence_wave_liberation_provisional_tree_desc: "A provisional state-building tree for countries released by the Independence Wave."

independence_wave_count_the_dossiers: "Count the Dossiers"
independence_wave_count_the_dossiers_desc: "The committee opens the files left by the wave: host orders, border notes, town petitions, depot lists, and the first messages from abroad."
independence_wave_provisional_council: "Seat the Provisional Council"
independence_wave_provisional_council_desc: "Clerks, officers, jurists, and local delegates are given a table before rumor and private militias decide who speaks for the country."
independence_wave_barracks_count: "The Barracks Count"
independence_wave_barracks_count_desc: "Every rifle, deserter, guard post, and surviving staff officer is counted before the army becomes a rumor instead of an institution."
independence_wave_emergency_budget: "Emergency Budget"
independence_wave_emergency_budget_desc: "Taxes, requisitions, salaries, ration books, and factory promises are put into one ledger so the new state can pay people before it commands them."
independence_wave_recognition_desk: "Open the Recognition Desk"
independence_wave_recognition_desk_desc: "The committee sends formal notes to neighbors, great powers, and other new governments, asking them to acknowledge the facts on the map."
independence_wave_observer_charter: "Observer Charter"
independence_wave_observer_charter_desc: "Foreign observers and public election rules become the shield of the new government. The state will survive by making every suppression costly to witness."
independence_wave_officer_mandate: "Officer Mandate"
independence_wave_officer_mandate_desc: "The officers argue that there is no republic without streets held, depots guarded, and barracks obeyed. Emergency authority is handed to the uniformed council."
independence_wave_national_directory: "National Directory"
independence_wave_national_directory_desc: "The first border is treated as an emergency compromise. The directory prepares claims, marches, and public language for a larger national settlement."
independence_wave_revolutionary_committee: "Revolutionary Committee"
independence_wave_revolutionary_committee_desc: "Workshop delegates and armed organizers claim that independence means little if the old police, bosses, and patrons keep their power. The state chooses a radical committee mandate."
independence_wave_sponsored_cabinet: "Sponsored Cabinet"
independence_wave_sponsored_cabinet_desc: "A patron mission offers money, advisers, rifles, and recognition. The cabinet accepts the bargain and begins measuring the price."
independence_wave_repair_the_rail_yard: "Repair the Rail Yard"
independence_wave_repair_the_rail_yard_desc: "The rail yard becomes the first proof that the new administration can move people, coal, tools, and orders without the host ministry."
independence_wave_convert_municipal_workshops: "Convert Municipal Workshops"
independence_wave_convert_municipal_workshops_desc: "Municipal repair shops and depot sheds are turned toward rifles, uniforms, spares, and whatever the state needs to remain armed."
independence_wave_depot_audit: "Depot Audit"
independence_wave_depot_audit_desc: "The provisional army audits what was seized, lost, hidden, and promised. The depot ledger becomes a military plan."
independence_wave_summon_emergency_session: "Summon an Emergency Session"
independence_wave_summon_emergency_session_desc: "The provisional cabinet calls every surviving clerk, militia delegate, court officer, and municipal witness back into session before the crisis writes its own government."
independence_wave_form_street_defense_committees: "Form Street Defense Committees"
independence_wave_form_street_defense_committees_desc: "Barracks lists become neighborhood watch rolls, depot crates, and emergency patrol orders so the capital can be defended without surrendering the state to one faction."
independence_wave_reopen_cabinet_authority: "Reopen Cabinet Authority"
independence_wave_reopen_cabinet_authority_desc: "The emergency session restores a public chain of command, names who can sign orders, and sends recognition papers before patrons or rivals claim the empty desks."
independence_wave_worker_militia_register: "Worker Militia Register"
independence_wave_worker_militia_register_desc: "Factory committees, depot guards, and neighborhood patrols are enrolled before rival officers or loyalists can split the armed movement."
independence_wave_commune_supply_cells: "Commune Supply Cells"
independence_wave_commune_supply_cells_desc: "Supply cells move food, tools, uniforms, and rifle parts through municipal workshops so the revolutionary state can fight without selling itself to a patron."
independence_wave_revolutionary_volunteer_office: "Revolutionary Volunteer Office"
independence_wave_revolutionary_volunteer_office_desc: "The committee opens a liaison office for sympathetic volunteers, neighboring breakaways, and congress delegates willing to treat the revolution as a common defense."
independence_wave_armed_independence_committee: "Armed Independence Committee"
independence_wave_armed_independence_committee_desc: "The revolutionary route becomes a public doctrine of armed independence: no host restoration, no patron cabinet, and no private militia outside the committee register."
independence_wave_reopen_the_port_ledger: "Reopen the Port Ledger"
independence_wave_reopen_the_port_ledger_desc: "Customs clerks and foreign brokers return to the waterfront. Every cargo manifest may become aid, leverage, or evidence."
independence_wave_observer_protected_elections: "Observer-Protected Elections"
independence_wave_observer_protected_elections_desc: "The government invites witnesses to the first vote and turns legitimacy into a public defense against host raids and foreign puppetry."
independence_wave_file_for_arbitration: "File for Arbitration"
independence_wave_file_for_arbitration_desc: "Claims are put before commissions and congress tables rather than shouted into mobilization orders. The state chooses paper before war."
independence_wave_civic_republic: "Civic Republic"
independence_wave_civic_republic_desc: "The provisional state declares itself a constitutional republic with a public mandate, restrained claims, and a place among other small governments."
independence_wave_secure_the_capital_guard: "Secure the Capital Guard"
independence_wave_secure_the_capital_guard_desc: "A capital guard is formed from reliable officers, depot companies, and municipal patrols to keep the provisional ministries open."
independence_wave_military_supply_board: "Military Supply Board"
independence_wave_military_supply_board_desc: "The army receives a supply board so ammunition, boots, food, and orders reach units before the next border alarm."
independence_wave_emergency_state: "Emergency State"
independence_wave_emergency_state_desc: "The officer mandate hardens into emergency rule. Survival comes first, and civilian promises wait behind guarded doors."
independence_wave_border_office: "Border Office"
independence_wave_border_office_desc: "Maps, parish records, old claims, and public grievances are gathered by a new office that exists to ask why the first border should be final."
independence_wave_dossier_war_plans: "Dossier War Plans"
independence_wave_dossier_war_plans_desc: "The directory translates claims into operational folders. Arbitration remains possible, but the army now knows where the dispute begins."
independence_wave_claimant_state: "Claimant State"
independence_wave_claimant_state_desc: "The government declares that the wave created a state, not the whole nation. Its future will be measured against the borders it still demands."
independence_wave_invite_military_mission: "Invite a Military Mission"
independence_wave_invite_military_mission_desc: "Foreign officers arrive with crates, technical notes, and quiet expectations. Their training mission gives the army discipline and the patron influence."
independence_wave_balance_the_sponsors: "Balance the Sponsors"
independence_wave_balance_the_sponsors_desc: "The cabinet plays one patron against another, seeking arms and recognition without letting a single embassy own the government."
independence_wave_write_the_cabinet_contract: "Write the Cabinet Contract"
independence_wave_write_the_cabinet_contract_desc: "The cabinet records the patron bargain in law: credit, arms, advisers, port access, and the limits the state hopes it can later escape."
independence_wave_expose_broker_files: "Expose Broker Files"
independence_wave_expose_broker_files_desc: "The cabinet opens broker ledgers, liaison notes, and loan memoranda so foreign influence can be challenged in public rather than absorbed in private."
independence_wave_audit_dependency_clauses: "Audit Dependency Clauses"
independence_wave_audit_dependency_clauses_desc: "Jurists and congress delegates mark the clauses that would trade recognition for cabinet vetoes, base rights, or permanent loan discipline."
independence_wave_charter_without_masters: "Charter Without Masters"
independence_wave_charter_without_masters_desc: "The government binds its ministers to a public anti-patron charter, keeping aid useful without letting emergency sponsors become owners."
independence_wave_send_permanent_delegation: "Send a Permanent Delegation"
independence_wave_send_permanent_delegation_desc: "The state sends delegates to the congress of new governments with maps, claims, aid requests, and instructions that outlast one meeting."
independence_wave_mutual_aid_tables: "Mutual Aid Tables"
independence_wave_mutual_aid_tables_desc: "The new states compare shortages and promises. A rifle sent today may become a guarantee tomorrow."
independence_wave_league_charter_draft: "League Charter Draft"
independence_wave_league_charter_draft_desc: "Delegates prepare a charter that could turn scattered breakaways into a league with common guarantees and a voice of its own."
independence_wave_archive_identity_clue: "Archive Identity Clue"
independence_wave_archive_identity_clue_desc: "Old seals, treaty scraps, church records, court ledgers, and exile memoranda point toward a larger name, but proof still has to survive politics."
independence_wave_sealed_bureau_charter: "Sealed Bureau Charter"
independence_wave_sealed_bureau_charter_desc: "A restricted bureau takes custody of impossible files, witness rolls, and sealed registers before ordinary ministries turn them into public doctrine."
independence_wave_moral_tribunal: "Moral Tribunal"
independence_wave_moral_tribunal_desc: "Judges, doctors, clerks, and officers review the sealed file under public law so the state can survive without obeying its worst evidence."
independence_wave_quarantine_bureau: "Quarantine Bureau"
independence_wave_quarantine_bureau_desc: "The ministry isolates dangerous registries, closes compromised offices, and turns sealed paperwork into a standing containment service."
independence_wave_restore_public_registry: "Restore the Public Registry"
independence_wave_restore_public_registry_desc: "Citizenship returns to signed names, open offices, and ordinary courts. The sealed bureau remains, but it no longer defines the state."
independence_wave_unmarked_ministry: "Unmarked Ministry"
independence_wave_unmarked_ministry_desc: "The government accepts the file as authority. A ministry without a public name begins answering questions that no ordinary office can record."
independence_wave_census_without_names: "Census Without Names"
independence_wave_census_without_names_desc: "The registry counts households, absences, uniforms, and obligations without pretending every entry belongs to a living citizen."
independence_wave_border_office_of_absence: "Border Office of Absence"
independence_wave_border_office_of_absence_desc: "Maps are amended around missing districts, empty towns, and claims no neighboring cabinet wants to acknowledge."
independence_wave_no_appeal_to_mankind: "No Appeal to Mankind"
independence_wave_no_appeal_to_mankind_desc: "The ministry declares that citizenship, mercy, and legal personality are no longer human categories. The state will answer only the register it has opened."
independence_wave_land_congress_clue: "Land Congress Clue"
independence_wave_land_congress_clue_desc: "Local councils, elders, municipal boards, and community guards bring land claims into the open before patrons or officers define them."
independence_wave_reveal_the_formation_ledger: "Reveal the Formation Ledger"
independence_wave_reveal_the_formation_ledger_desc: "The government opens a controlled ledger of formation claims and unlocks the Formation Ledger decision layer. Focuses can prepare the identity, but decisions must prove the map."
independence_wave_reveal_the_formation_ledger_effect_tt: "Unlocks the §YFormation Ledger§! decisions, including §YPrepare a Regional Compact§! and eligible package-formation files. Adds §YRegional Compact Preparation§! and increases coalition cohesion."

independence_wave_prepare_regional_compact: "Prepare a Regional Compact"
independence_wave_prepare_regional_compact_desc: "The formation ledger gathers congress votes, boundary memoranda, and proof that the state can hold more than a fragile dossier identity."
independence_wave_prepare_regional_compact_requirements_tt: "The Formation Ledger is open, no compact petition is pending, and coalition cohesion is strong enough."
independence_wave_invite_compact_delegate: "Invite [FROM.GetName] to the Compact"
independence_wave_invite_compact_delegate_desc: "A delegation asks [FROM.GetName] to sign the compact papers as a founding member instead of remaining an isolated dossier state."
independence_wave_invite_compact_delegate_tt: "The target joins the compact member register and strengthens the founder's coalition count."
independence_wave_arbitrate_member_dispute: "Arbitrate [FROM.GetName] Dispute"
independence_wave_arbitrate_member_dispute_desc: "Compact jurists and congress delegates settle a member dispute before rival claims break the charter."
independence_wave_arbitrate_member_dispute_root_requirements_tt: "Requires an Independence Wave compact founder with a prepared petition and no failed charter."
independence_wave_arbitrate_member_dispute_target_requirements_tt: "Target must be another Independence Wave compact member without an active arbitration cooldown."
independence_wave_arbitrate_member_dispute_effect_tt: "[FROM.GetName] receives arbitration papers and the compact records another resolved member dispute."
independence_wave_compact_charter_window: "Hold the Compact Charter Window"
independence_wave_compact_charter_window_desc: "The founder has a narrow window to gather signatures, anti-puppet guarantees, and enough legitimacy for a durable compact charter."
independence_wave_compact_charter_window_timeout_tt: "This mission resolves when the charter window closes."
independence_wave_proclaim_regional_compact: "Proclaim the Regional Compact"
independence_wave_proclaim_regional_compact_desc: "With enough territory controlled and enough congress support recorded, the government proclaims a compact identity and begins integration."
independence_wave_proclaim_regional_compact_requirements_tt: "The state is independent, has secured the charter, controls enough territory, and has enough member support to proclaim the compact."
independence_wave_integrate_compact_ministries: "Integrate Compact Ministries"
independence_wave_integrate_compact_ministries_desc: "The compact must keep its ministries free and its map intact long enough for the formation to become more than a proclamation."
independence_wave_integrate_compact_ministries_failure_tt: "Fails if the compact becomes a subject, loses too much controlled territory, or falls below its member-support floor."
independence_wave_integrate_compact_ministries_failure_effect_tt: "Failure: the Regional Compact is discredited and the founder must recover the charter before trying again."
independence_wave_integrate_compact_ministries_success_effect_tt: "Success: the compact ministries are integrated, the formation is recorded, and the state can pursue secretariat recognition."
independence_wave_recognize_compact_secretariat: "Recognize the Compact Secretariat"
independence_wave_recognize_compact_secretariat_desc: "A permanent secretariat gives the compact a registry, clerks, and a public address that member governments can recognize."
independence_wave_recognize_compact_secretariat_requirements_tt: "Requires an integrated Independence Wave compact with no recognized secretariat."
independence_wave_recognize_compact_secretariat_effect_tt: "The compact secretariat is recognized and the formation ledger records a durable institution."
independence_wave_recover_discredited_compact: "Recover the Discredited Compact"
independence_wave_recover_discredited_compact_desc: "The founder reopens the charter books after a failed integration, seeking signatures and discipline before the compact becomes a warning."
independence_wave_recover_discredited_compact_requirements_tt: "Requires a discredited Independence Wave compact that has not already opened a recovery effort."
independence_wave_recover_discredited_compact_effect_tt: "The compact reopens its charter books and restores enough cohesion to try again."
independence_wave_assemble_junction_committee: "Assemble the Junction Committee"
independence_wave_assemble_junction_committee_desc: "Dispatchers, depot clerks, and militia escorts turn the release-state rail hub into a public authority rather than a captured yard."
independence_wave_secure_bridge_guard: "Secure the Bridge Guard"
independence_wave_secure_bridge_guard_desc: "The committee posts guards at bridges, sheds, and timetable offices so the corridor can keep moving under its own orders."
independence_wave_proclaim_timetable_authority: "Proclaim the Timetable Authority"
independence_wave_proclaim_timetable_authority_desc: "The railway state declares that the corridor, its schedules, and its guarded depots are a sovereign administration."
independence_wave_proclaim_timetable_authority_requirements_tt: "A railway package must control its rail hub, assemble the junction committee, secure the bridge guard, remain independent, and hold enough legitimacy and militia strength."
independence_wave_integrate_corridor_timetables: "Integrate Corridor Timetables"
independence_wave_integrate_corridor_timetables_desc: "The Timetable Authority must remain independent and keep control of its rail hub long enough for dispatchers, guards, and ministries to obey one schedule."
independence_wave_integrate_corridor_timetables_failure_tt: "Fails if the Timetable Authority becomes a subject or no longer controls a rail hub."
independence_wave_integrate_corridor_timetables_failure_effect_tt: "Failure: the Timetable Authority is discredited and the corridor route loses its integration proof."
independence_wave_integrate_corridor_timetables_success_effect_tt: "Success: the corridor timetable is integrated, cohesion rises, and the railway authority keeps its formation proof."

independence_wave_file_border_survey: "File a Border Survey"
independence_wave_file_border_survey_desc: "Surveyors, clerks, and militia escorts record the districts the new state can plausibly contest without touching the host's protected capital."
independence_wave_file_border_survey_requirements_tt: "The Border Commission must be open and no border survey has been filed."
independence_wave_file_border_survey_effect_tt: "Files a border survey and raises claim ambition."
independence_wave_petition_border_parish: "Petition [FROM.GetName]"
independence_wave_petition_border_parish_desc: "The commission files a parish claim over [FROM.GetName], creating a public claim before the district can be arbitrated, transferred, or forced into the new state."
independence_wave_border_commission_target_root_requirements_tt: "This release must have an open Border Commission, a filed border survey, and no active commission cooldown."
independence_wave_petition_border_parish_target_requirements_tt: "The target must be a non-capital core state not owned by this country, or an adjacent non-core state backed by the league at high chaos. It must not already be claimed, protected for host survival, or above the open-dispute limit."
independence_wave_petition_border_parish_effect_tt: "Adds a public claim, opens a border dispute, and starts a commission cooldown. Non-core overreach gives the old host a response path."
independence_wave_recover_surveyed_core: "Recover Surveyed District in [FROM.GetName]"
independence_wave_recover_surveyed_core_desc: "The provisional state asks the commission to enforce the survey file over [FROM.GetName], turning a cramped first border into a supervised transfer."
independence_wave_recover_surveyed_core_root_requirements_tt: "Requires an independent limited-territory Independence Wave release with a filed or emergency border survey and no active commission cooldown."
independence_wave_recover_surveyed_core_target_requirements_tt: "The target must be a non-capital core state not owned by this country, not protected for host survival, and held by an owner that can survive the transfer."
independence_wave_recover_surveyed_core_effect_tt: "Transfers the surveyed core state, records a peaceful border resolution, raises legitimacy, lowers claim ambition, and starts a commission cooldown."
independence_wave_request_league_arbitration: "Request Arbitration for [FROM.GetName]"
independence_wave_request_league_arbitration_desc: "The dispute over [FROM.GetName] is sent to congress tables and observer files before soldiers turn the claim into a frontier incident."
independence_wave_request_league_arbitration_target_requirements_tt: "Requires a valid contested core or publicly claimed border state and a civic, arbitration, or Congress route. Public claims outside this country's cores require high chaos and league backing."
independence_wave_request_league_arbitration_effect_tt: "Transfers the contested state through arbitration, counts a peaceful border resolution, lowers claim ambition, and raises coalition cohesion. Non-core overreach gives the old host a response path."
independence_wave_offer_protected_transfer: "Offer Protected Transfer for [FROM.GetName]"
independence_wave_offer_protected_transfer_desc: "The government offers guarantees, compensation papers, and recognition terms for [FROM.GetName], seeking a negotiated transfer rather than a seizure."
independence_wave_offer_protected_transfer_target_requirements_tt: "Requires a valid contested core or publicly claimed border state, enough legitimacy, a patron or anti-puppet route, and a vulnerable owner that can survive the transfer. Public claims outside this country's cores require high chaos and league backing."
independence_wave_offer_protected_transfer_effect_tt: "Transfers the contested state under protected terms, spends legitimacy and patron leverage, records a peaceful resolution, and starts a commission cooldown. Non-core overreach gives the old host a response path."
independence_wave_issue_dossier_ultimatum: "Issue a Dossier Ultimatum for [FROM.GetName]"
independence_wave_issue_dossier_ultimatum_desc: "The directory publishes its border file and demands immediate transfer. The new state takes the district into its administration and accepts the political risk of coercion."
independence_wave_issue_dossier_ultimatum_target_requirements_tt: "Requires a valid contested core or publicly claimed border state, a national or officer route, enough claim ambition, and no active commission cooldown. Public claims outside this country's cores require high chaos and league backing."
independence_wave_issue_dossier_ultimatum_cost_requirements_tt: "Requires command power."
independence_wave_issue_dossier_ultimatum_cost_tt: "£command_power §Y30§!"
independence_wave_issue_dossier_ultimatum_cost_tt_blocked: "£command_power §R30§!"
independence_wave_issue_dossier_ultimatum_cost_tt_tooltip: "£command_power §Y30§!"
independence_wave_issue_dossier_ultimatum_effect_tt: "Transfers the contested state by ultimatum, adds a core, spends command power, costs stability, raises claim ambition, and starts a commission cooldown. Non-core overreach gives the old host a response path."
independence_wave_freeze_claim_under_observers: "Freeze [FROM.GetName] Under Observers"
independence_wave_freeze_claim_under_observers_desc: "Observers freeze the dispute over [FROM.GetName] before either side can use the border commission as a pretext for occupation."
independence_wave_freeze_claim_under_observers_target_requirements_tt: "Requires a valid contested core state and a civic or anti-puppet route with no active commission cooldown."
independence_wave_freeze_claim_under_observers_effect_tt: "Freezes the dispute under observers, counts a peaceful border resolution, lowers claim ambition, and starts a commission cooldown."

independence_wave_volga_old_state_memory: "Volga Old-State Memory"
independence_wave_volga_old_state_memory_desc: "Archive clerks, ferry offices, scholars, and local notables treat Volga-Kama records as living proof of state authority."
independence_wave_convene_volga_archive_assembly: "Convene the Volga Archive Assembly"
independence_wave_convene_volga_archive_assembly_desc: "Archive delegates turn Kazan and Cheboksary records into a public state file, raising legitimacy without importing Soviet Collapse institutions."
independence_wave_convene_volga_archive_assembly_requirements_tt: "Old Great Bulgaria must be an Independence Wave release and the Volga archive must not already be open."
independence_wave_proclaim_volga_bulgar_assembly: "Proclaim the Volga-Bulgar Assembly"
independence_wave_proclaim_volga_bulgar_assembly_desc: "The government proclaims a Volga-Bulgar assembly after controlling Kazan and Cheboksary and proving the old name through records and legitimacy."
independence_wave_proclaim_volga_bulgar_assembly_requirements_tt: "Old Great Bulgaria must control Kazan and Cheboksary, open the Volga archive, gather the old-name council, and hold enough legitimacy and old-state memory."
independence_wave_integrate_volga_kama_ministries: "Integrate Volga-Kama Ministries"
independence_wave_integrate_volga_kama_ministries_desc: "River offices, municipal clerks, and guard registers become ministries for the Volga-Kama state rather than temporary archive committees."
independence_wave_assyrian_recognition_congress_spirit: "Assyrian Recognition Congress"
independence_wave_assyrian_recognition_congress_spirit_desc: "Community delegates, church records, municipal clerks, and guards present Assyrian recognition as a modern political case rather than an ancient border claim."
independence_wave_free_city_board_spirit: "Free City Board"
independence_wave_free_city_board_spirit_desc: "Port clerks, municipal deputies, customs officers, and dockyard managers keep the free city legible to merchants and diplomats."
independence_wave_lukiko_charter_spirit: "Lukiko Charter Records"
independence_wave_lukiko_charter_spirit_desc: "Council records, kingdom institutions, local notables, and protectorate-era files give Buganda a public legal case inside the Independence Wave."
independence_wave_sokoto_emirate_federation_spirit: "Emirate Federation File"
independence_wave_sokoto_emirate_federation_spirit_desc: "Scholars, district clerks, and emirate delegates present Sokoto as a modern federation case rooted in old authority rather than a border raid."
independence_wave_bukhara_oasis_council_spirit: "Oasis Council File"
independence_wave_bukhara_oasis_council_spirit_desc: "Madrasa records, bazaar clerks, canal offices, and municipal guards turn Bukhara's oasis authority into a public state file."
independence_wave_khiva_canal_council_spirit: "Canal Council File"
independence_wave_khiva_canal_council_spirit_desc: "Canal clerks, caravan elders, city ledgers, and guard offices turn Khiva's oasis authority into a public state file."
independence_wave_mesopotamian_river_compact_spirit: "River Compact File"
independence_wave_mesopotamian_river_compact_spirit_desc: "Mandate archives, river offices, city councils, and guard clerks turn Baghdad's river administration into a public state file."
independence_wave_barotse_floodplain_council_spirit: "Floodplain Council File"
independence_wave_barotse_floodplain_council_spirit_desc: "Litunga records, floodplain treaty maps, district clerks, and guard offices keep Barotse authority tied to public institutions."
independence_wave_dahomey_palace_council_spirit: "Palace Council File"
independence_wave_dahomey_palace_council_spirit_desc: "Palace records, coastal customs ledgers, district clerks, and guard offices turn Dahomey's old-state memory into a public state file."
independence_wave_miskito_shore_council_spirit: "Shore Council File"
independence_wave_miskito_shore_council_spirit_desc: "Shore records, coastal petitions, council clerks, and guard offices turn Miskito authority into a public state file."
independence_wave_itza_lake_council_spirit: "Lake Council File"
independence_wave_itza_lake_council_spirit_desc: "Peten records, lake petitions, council clerks, and guard offices turn Itza authority into a public state file."
independence_wave_maya_yucatan_assembly_spirit: "Yucatan Assembly File"
independence_wave_maya_yucatan_assembly_spirit_desc: "Council records, municipal petitions, peninsula clerks, and guard offices turn Maya authority into a public assembly file."
independence_wave_open_assyrian_recognition_congress: "Open the Assyrian Recognition Congress"
independence_wave_open_assyrian_recognition_congress_desc: "The congress organizes Mosul petitions, community records, and observer briefs into a case for recognition."
independence_wave_proclaim_assyrian_recognition_congress: "Proclaim the Assyrian Recognition Congress"
independence_wave_proclaim_assyrian_recognition_congress_desc: "The government proclaims a recognition congress after controlling Mosul and proving enough legitimacy for a modern Assyrian state."
independence_wave_proclaim_assyrian_recognition_congress_requirements_tt: "Assyria must control Mosul, open the recognition congress, remain independent, and hold enough legitimacy and old-state memory."
independence_wave_integrate_assyrian_recognition_congress: "Integrate the Recognition Congress"
independence_wave_integrate_assyrian_recognition_congress_desc: "The congress must keep Mosul under control while delegates turn recognition files into a working Assyrian administration."
independence_wave_integrate_assyrian_recognition_congress_failure_tt: "Fails if Assyria becomes a subject or no longer owns and controls Mosul."
independence_wave_integrate_assyrian_recognition_congress_failure_effect_tt: "Failure: the Recognition Congress is discredited, integration proof is lost, and Assyria must restore the route before trying again."
independence_wave_integrate_assyrian_recognition_congress_success_effect_tt: "Success: Assyria integrates the recognition administration and keeps formation proof for later settlement work."
independence_wave_charter_danzig_free_city_board: "Charter the Free City Board"
independence_wave_charter_danzig_free_city_board_desc: "The city records customs, dockyard, municipal, and observer terms before seeking broader recognition."
independence_wave_recognize_danzig_free_city: "Recognize the Free City Charter"
independence_wave_recognize_danzig_free_city_desc: "The free city turns its board charter into a recognized municipal state with public guarantees and a stable port administration."
independence_wave_recognize_danzig_free_city_requirements_tt: "Danzig must control the city, charter the Free City Board, remain independent, and hold enough legitimacy and foreign attention."
independence_wave_integrate_danzig_free_city_charter: "Integrate the Free City Charter"
independence_wave_integrate_danzig_free_city_charter_desc: "The Free City Board must keep Danzig independent and in control while customs, docks, and municipal courts become daily administration."
