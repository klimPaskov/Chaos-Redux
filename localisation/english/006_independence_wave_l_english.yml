independence_wave_host_aftermath_category: "Independence Dossier Board"
independence_wave_host_aftermath_category_desc: "Respond to the release wave through recognition, observers, talks, archives, autonomy, arrests, or loyalist councils.\n\nHost anger is the pressure for a harsher response. Foreign attention measures how visible the crisis has become to outside powers. Both values decide which settlement, crackdown, and intervention choices remain credible."
independence_wave_committee_survival_category: "Committee Survival"
independence_wave_committee_survival_category_desc: "Keep the new government alive through recognition, brigades, depot seizures, and country-story routes.\n\nLegitimacy is public authority. Militia strength is the armed register behind the committee. These values open recognition, formation, border, and survival decisions."
independence_wave_new_states_congress_category: "New States Congress"
independence_wave_new_states_congress_category_desc: "Build a shared survival network through delegates, guarantees, volunteers, arms pools, anti-puppet terms, and final settlement.\n\nCoalition cohesion is the Congress trust needed for guarantees, volunteers, arms pools, compact work, and final settlement. Patron leverage is foreign control risk: aid raises it, while broker exposure and anti-puppet work reduce it."
independence_wave_patron_ledger_category: "Patron Ledger"
independence_wave_patron_ledger_category_desc: "Manage foreign influence before useful aid becomes control.\n\nPatron leverage is the pressure patrons can use over the cabinet. Higher leverage opens stronger aid and anti-patron responses, but also makes dependence dangerous. Legitimacy, militia strength, and foreign attention decide whether the state can resist, bargain, or accept help."
independence_wave_patronage_recognition_category: "Patronage and Recognition"
independence_wave_patronage_recognition_category_desc: "Influence Independence Wave governments through recognition, supply, military missions, cabinet pressure, or sabotage against rival patrons. Equipment, army experience, and command power carry much of the burden; political power is only the diplomatic opening."
independence_wave_formation_ledger_category: "Formation Ledger"
independence_wave_formation_ledger_category_desc: "Turn a release dossier into a larger state claim through records, petitions, proclamations, and integration missions.\n\nClaim ambition measures how far the government is trying to push beyond its first release. It opens border pressure and larger claims, while arbitration and settlement bring it down. Legitimacy and coalition cohesion decide whether proclamations can become durable institutions."
independence_wave_dossier_board_gui_header: "Dossier Board"
independence_wave_dossier_board_gui_values: "Releases: §Y[?global.independence_wave_actual_release_count|0]§!\nHost anger (hard response): §Y[?independence_wave_host_anger|0]§!  Attention (outside action): §Y[?independence_wave_foreign_attention|0]§!"
independence_wave_congress_board_gui_header: "Congress Ledger"
independence_wave_congress_board_gui_values: "Cohesion (trust): §Y[?independence_wave_coalition_cohesion|0]§!  Patron leverage (foreign grip): §Y[?independence_wave_patron_leverage|0]§!\nMembers: §Y[?global.chaosx_iw_league_member_count|0]§!  Mutual guarantees: §Y[?global.chaosx_iw_mutual_guarantee_count|0]§!"
independence_wave_patron_ledger_gui_header: "Patron Ledger"
independence_wave_patron_ledger_gui_values: "Leverage (control risk): §Y[?independence_wave_patron_leverage|0]§!  Attention (outside action): §Y[?independence_wave_foreign_attention|0]§!\nLegitimacy (authority): §Y[?independence_wave_legitimacy|0]§!  Militia (survival): §Y[?independence_wave_militia_strength|0]§!"
independence_wave_formation_ledger_gui_header: "Formation Ledger"
independence_wave_formation_ledger_gui_values: "File: §Y[This.GetIndependenceWavePackageLabel]§!  Claim ambition (larger claims): §Y[?independence_wave_claim_ambition|0]§!\nLegitimacy (authority): §Y[?independence_wave_legitimacy|0]§!  Cohesion (trust): §Y[?independence_wave_coalition_cohesion|0]§!"
