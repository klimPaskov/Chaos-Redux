l_english:
chaosx.nr6.1.t: "Independence Wave"
chaosx.nr6.2.t: "The Dossiers Arrive"
chaosx.nr6.2.d: "The wave is already a fact on the map. New ministries unlock borrowed offices, guarded couriers carry seals across fresh borders, and host clerks compare the release ledger against the states still under their protection. [?global.independence_wave_actual_release_count|0] governments have crossed from petition to proclamation."
chaosx.nr6.2.a: "The files are no longer theoretical."
chaosx.nr6.3.t: "Petitions Become State Papers"
chaosx.nr6.3.d: "The old capital recognizes the dossier wave as a political fact. Petition books, municipal claims, and provisional seals move from police files to ministry desks, where officials try to turn a rupture into a survivable settlement."
chaosx.nr6.3.a: "Recognition has a paper trail."
chaosx.nr6.4.t: "Observers Enter the File"
chaosx.nr6.4.d: "Foreign observers and commission clerks enter the rooms where the new borders are being argued. Their reports do not settle the crisis, but they make every arrest, transfer, and promise harder to hide."
chaosx.nr6.4.a: "Every dossier has witnesses."
chaosx.nr6.5.t: "Assemblies Under Guard"
chaosx.nr6.5.d: "Security detachments move against the networks that kept the breakaway committees alive. Couriers vanish into holding rooms, loyalist councils receive crates and orders, and the next dossier will remember which ministries chose force first."
chaosx.nr6.5.a: "Suppression writes its own evidence."
chaosx.nr6.6.t: "Committee Rooms Stay Lit"
chaosx.nr6.6.d: "The new state's offices have stopped looking temporary. Committee minutes, seal registers, payroll lists, and guard rosters are being copied into proper ledgers while delegates argue over which emergency orders should become law."
chaosx.nr6.6.a: "A government learns to file itself."
chaosx.nr6.7.t: "Negotiators Cross the Hall"
chaosx.nr6.7.d: "Delegates move between borrowed rooms with border notes, guarantee drafts, and sealed promises. None of the signatures settle the crisis alone, but every bargain makes the new governments harder to treat as isolated petitions."
chaosx.nr6.7.a: "Small states learn the grammar of treaties."
chaosx.nr6.8.t: "The League Takes Minutes"
chaosx.nr6.8.d: "The congress has produced more than speeches. Secretariat clerks count members, guarantees, arbitration files, and common procedures while the first compact offices begin answering letters in the name of the league."
chaosx.nr6.8.a: "The charter has a desk."
chaosx.nr6.9.t: "Borders Enter Commission"
chaosx.nr6.9.d: "Surveyors and arbitration clerks begin sorting the frontier into claims, protected districts, observer freezes, and disputed files. The commission does not make borders peaceful, but it makes every demand legible before rifles decide it."
chaosx.nr6.9.a: "The map receives another witness."
chaosx.nr6.10.t: "Brokers Named in Public"
chaosx.nr6.10.d: "The patron files are no longer private. Advisers, intermediaries, arms corridors, and dependency clauses are being named in committee rooms, forcing foreign sponsors to bargain under the same lamps as the states they hoped to manage."
chaosx.nr6.10.a: "Influence leaves a receipt."
chaosx.nr6.11.t: "An Old Name Gets a Seal"
chaosx.nr6.11.d: "Archive tables, treaty fragments, and old titles have crossed into administration. The claim is no longer only memory or scholarship; it has a council, a seal, and clerks prepared to answer the world in the older name."
chaosx.nr6.11.a: "The past signs in fresh ink."
chaosx.nr6.12.t: "Land Councils Become Ministries"
chaosx.nr6.12.d: "Local assemblies and council records are being translated into state work: guard rolls, land files, treaty reviews, and district registers. The new authority speaks from communities that were expected to remain subjects of someone else's archive."
chaosx.nr6.12.a: "The village file becomes a ministry."
chaosx.nr6.13.t: "The Host Still Answers"
chaosx.nr6.13.d: "The wave has taken territory, offices, and pride, but the host has not disappeared. A protected seat continues to stamp orders, hold capital files, and insist that the state survives even as the release ledger grows around it."
chaosx.nr6.13.a: "The remaining seal still matters."
chaosx.nr6.14.t: "A Formation Loses Its Proof"
chaosx.nr6.14.d: "The ledger marks a failed integration: a charter discredited, a congress interrupted, or a formation unable to keep the conditions that made it credible. The state remains, but its larger claim returns to the unfinished files."
chaosx.nr6.14.a: "Not every file becomes a country."
chaosx.nr6.15.t: "The Impossible File Opens"
chaosx.nr6.15.d: "The strange dossier can no longer be treated as a clerical error. Recognition notes, containment reviews, and unmarked congress papers now describe an authority that functions inside the forms of statehood while refusing to fit them."
chaosx.nr6.15.a: "No manual has this heading."

chaosx.news.6.t: "Independence Wave"
chaosx.news.6.d: "A sudden wave of independence declarations has broken across weak ministries, distant garrisons, and contested border offices. [?global.independence_wave_actual_release_count|0] new governments have appeared after overnight committee votes and guarded proclamations.\n\nConfirmed releases: [This.GetIndependenceWaveReleasedCountryList]\n\nHost capitals and foreign chancelleries decide whether to accept the new facts or contest them."
chaosx.news.6.a: "The dossiers are already on the desks."

