soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command: "Confirm the Emergency Chain of Command"
soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command_desc: "Opening objective: Place loyal divisions across Moscow, Arkhangelsk, Leningrad, and Pskov while preserving central command authority."
soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command_req_tt: "§YRequirements:§! keep 80,000 free manpower and 10 army experience available, place more than 6 loyal divisions across Moscow, Arkhangelsk, Leningrad, and Pskov, and keep §YCommand Obedience§! above 48."
soviet_collapse_hold_northern_signal_offices_tt: "Place more than 6 divisions across Moscow, Arkhangelsk, Leningrad, and Pskov to hold the Northern Signal Offices."
soviet_collapse_seal_first_circular_courier_belt_tt: "Place more than 3 divisions across Moscow, Leningrad, and Pskov to hold the First Circular Courier Belt."
soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command_success_tt: "§GSuccess:§! commits command staff and emergency manpower, raises §YCommand Obedience§!, and slightly raises §CMoscow Authority§!."
soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command_partial_tt: "§YPartial success:§! The core objective held, but one listed condition was missing. Only the matching pressure category improves."
soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command_failure_tt: "§RFailure:§! officers begin waiting for local orders, raising §YCommand Obedience§! loss."
soviet_collapse_soviet_mission_002_seal_the_first_circular: "Seal the First Circular"
soviet_collapse_soviet_mission_002_seal_the_first_circular_desc: "Opening objective: Keep Moscow's circular office functioning before republican party offices can cite a broken chain of authority."
soviet_collapse_soviet_mission_002_seal_the_first_circular_req_tt: "§YRequirements:§! keep Moscow under Soviet control, preserve 45% stability, reserve 10 command power, place more than 3 divisions across Moscow, Leningrad, and Pskov, and keep §CMoscow Authority§! above 45."
soviet_collapse_soviet_mission_002_seal_the_first_circular_success_tt: "§GSuccess:§! spends command reserves on the circular office, lowers early spread pressure, and makes later legal missions cheaper."
soviet_collapse_soviet_mission_002_seal_the_first_circular_partial_tt: "§YPartial success:§! The core objective held, but one listed condition was missing. Only the matching pressure category improves."
soviet_collapse_soviet_mission_002_seal_the_first_circular_failure_tt: "§RFailure:§! undecided capitals learn that Moscow cannot make its own circulars obeyed."
soviet_collapse_soviet_mission_003_guard_the_peoples_commissariats: "Guard the People's Commissariats"
soviet_collapse_soviet_mission_003_guard_the_peoples_commissariats_desc: "Opening objective: Hold Moscow and the Capital Ministry Belt in Moscow and Arkhangelsk."
soviet_collapse_soviet_mission_003_guard_the_peoples_commissariats_req_tt: "§YRequirements:§! keep Moscow under Soviet control, keep 80,000 free manpower available, place more than 4 divisions across Moscow and Arkhangelsk, and keep §CMoscow Authority§! above 45."
soviet_collapse_guard_capital_ministry_belt_tt: "Place more than 4 divisions across Moscow and Arkhangelsk to guard the Capital Ministry Belt."
soviet_collapse_hold_crisis_desk_admin_hub_tt: "Hold one Crisis Desk admin hub: Moscow, Smolensk, Minsk, Baku, Tashkent, or Alma-Ata."
