l_english:
chaosx.nr5.1.t: "Soviet Union Collapse"
soviet_collapse_focus_shortcut_political: "Political Branch"
soviet_collapse_focus_shortcut_industry: "Industry Branch"
soviet_collapse_focus_shortcut_expansion: "Expansion Branch"
chaosx.nr5.2.t: "No Orders from Moscow"
chaosx.nr5.2.d: "Reports reach Moscow in the same hour. Republican ministries reject transfer orders, local commanders delay rail movements, border guards receive two chains of command, and supply depots stop answering central accounting. The first declarations are not only speeches. They come with soldiers, radio stations, ministries, and crowded squares.\n\nThe public line chosen here will decide whether wavering republics see Moscow as a state that can still negotiate, a state that can still command, or a prison whose guards are distracted."
chaosx.nr5.2.a: "Declare the Union indivisible"
chaosx.nr5.2.b: "Offer a new autonomy settlement"
chaosx.nr5.2.c: "Isolate the separatists"
chaosx.nr5.2.e: "Restore party discipline quietly"
chaosx.nr5.3.t: "The Race for Obedience"
chaosx.nr5.3.d: "The first breakaways survive the opening confusion. Officers who waited for clarification now ask whose seal matters. Ministries send contradictory orders, and the republic capitals learn that hesitation in Moscow gives them time to write their own instructions.\n\nThe center still has tools, but every tool teaches a lesson. Force can restore fear. Talks can preserve legitimacy. Sealing the depots can deny arms while proving that the union no longer trusts its own garrisons."
chaosx.nr5.3.a: "Send loyalist officers"
chaosx.nr5.3.b: "Call an emergency union congress"
chaosx.nr5.3.c: "Seal the depots first"
chaosx.nr5.5.t: "The Second Seal Breaks"
chaosx.nr5.5.d: "The crisis no longer belongs to the first declarations. New republic committees watch the first wave and decide that Moscow can be refused. Some wait for foreign recognition. Others require only proof that soldiers can be fed under another flag.\n\nRail manifests, military district ledgers, and party archives disagree on which government owns the next depot."
chaosx.nr5.5.a: "The center loses another ledger"
chaosx.nr5.6.t: "War for the Union"
chaosx.nr5.6.d: "The emergency papers reach the point where a word must become an order. Moscow can name the crisis rebellion and send the army into the republics, or it can accept talks under conditions that every loyalist will read as weakness.\n\nThe breakaways wait for the first shot because the first shot will tell the undecided republics what the union has become."
chaosx.nr5.6.a: "Begin the union war"
chaosx.nr5.6.b: "Open emergency settlement talks"
chaosx.nr5.7.t: "The Former Union"
chaosx.nr5.7.d: "The first emergency has passed into a new political map. Some republics stand behind their own guards. Some ministries still answer Moscow but only after asking local commanders what they will obey. Foreign observers stop asking whether the declarations are real and start asking whether the center can make them unreal again."
chaosx.nr5.7.a: "Draw the new ledgers"
chaosx.nr5.8.t: "Old Flags at the Roadblocks"
chaosx.nr5.8.d: "The latest field reports do not describe ordinary republican guards. Old names pass between village posts, black banners appear beside emergency seals, and armed committees claim that Moscow was only the last capital to misunderstand them.\n\nThe republic capitals deny losing control. Moscow calls the men bandits. The patrols at the roadblocks answer with older words."
chaosx.nr5.8.a: "History has found a uniform"
chaosx.nr5.9.t: "Timetables Under Guard"
chaosx.nr5.9.d: "Railway committees begin posting orders under their own seals. Fuel trains wait for city delegates, armored cars sit beside station platforms, and front commanders discover that a timetable can be a constitution when every army depends on the same line.\n\nThe League calls it coordination. Moscow calls it theft. The station guards call it sovereignty."
chaosx.nr5.9.a: "The rail line answers itself"
chaosx.nr5.10.t: "Circulars Returned Unopened"
chaosx.nr5.10.d: "The emergency seal reached ministries and republican offices, but the replies do not match the order. Some committees ask for a second signature. Others send legal memoranda instead of obedience. The delay gives every wavering capital proof that Moscow still has to argue for commands it once issued as routine."
chaosx.nr5.10.a: "Authority has to be delivered twice."
chaosx.nr5.11.t: "The Districts Wait"
chaosx.nr5.11.d: "Military districts report readiness in careful language while actual columns remain near barracks, junctions, and familiar towns. Officers ask whether the next order will be confirmed by Moscow, a republican ministry, or a local committee with fuel and bread. The missing movement becomes its own message."
chaosx.nr5.11.a: "Orders delayed are orders contested."
chaosx.nr5.12.t: "The Ledger Does Not Balance"
chaosx.nr5.12.d: "Rail offices sent figures, not trains. Locomotives wait under local guard, fuel manifests arrive without seals, and depot clerks write beside empty columns where Moscow expected cargo. Each unconfirmed timetable gives the breakaways time to make their own accounting."
chaosx.nr5.12.a: "A timetable can refuse."
chaosx.nr5.13.t: "Depots Answer Locally"
chaosx.nr5.13.d: "The central inventory has gaps that cannot be explained by paperwork. Storehouses report local protection, ammunition is counted by emergency committees, and convoy officers are told to wait for republican countersignatures. Moscow still names the depots, but naming no longer opens the doors."
chaosx.nr5.13.a: "The stores have learned new seals."
chaosx.nr5.14.t: "Foreign Offices Stay Open"
chaosx.nr5.14.d: "The attempt to close the crisis to outside missions has produced more visitors, not fewer. Observers ask for access, border officers report new couriers, and friendly capitals describe intervention as caution rather than pressure. Every open desk teaches the breakaways that the world is still listening."
chaosx.nr5.14.a: "Access becomes influence."
chaosx.nr5.15.t: "The Crisis Desk Overflows"
chaosx.nr5.15.d: "The emergency offices have more reports than clerks, more signatures than authority, and more maps than reliable routes. Ministry orders cross each other in corridors while field commands ask which failure should be answered first. The center remains active, but the backlog has become visible."
chaosx.nr5.15.a: "A desk can become a front."
chaosx.nr5.16.t: "The Treaty Room Empties"
chaosx.nr5.16.d: "Delegates leave the room with different versions of what was promised. Some say autonomy remains possible. Others say Moscow used negotiation to buy time. The unsigned papers move faster than the signed ones, carried by rumors, liaison offices, and republic committees that no longer wait for a final draft."
chaosx.nr5.16.a: "Unsigned promises travel fastest."
chaosx.nr5.130.t: "A Ministry Returns the Order"
chaosx.nr5.130.d: "The latest declaration begins as office procedure. A republican ministry refuses to stamp Moscow's circular, then sends its own emergency instruction to district committees, radio rooms, and local garrisons. By evening the seal has changed hands, and another capital speaks as a government."
chaosx.nr5.130.a: "The circular comes back unanswered."
chaosx.nr5.131.t: "The Rail Office Changes Seal"
chaosx.nr5.131.d: "Dispatchers stop treating the central timetable as final. Trains wait for republican countersignatures, junction guards turn ministry messengers away, and depot clerks accept the new rail seal because it is the only one that moves fuel. A rail office has become a border post."
chaosx.nr5.131.a: "The timetable answers locally."
chaosx.nr5.132.t: "Border Guards Accept Local Command"
chaosx.nr5.132.d: "The report reaches Moscow through two channels and neither agrees on rank. Border posts have taken orders from a republican emergency committee, raised local colors beside Soviet signs, and told the district staff that crossings will remain guarded under the new authority."
chaosx.nr5.132.a: "The frontier has chosen a voice."
chaosx.nr5.133.t: "A Party Committee Declares Sovereignty"
chaosx.nr5.133.d: "The declaration is written in familiar party language, but the conclusion is no longer obedient. A local committee claims emergency sovereignty until the union can prove its own chain of command, and the garrisons around it accept the formula as permission to wait for republican orders."
chaosx.nr5.133.a: "The party stamp no longer points to Moscow."
chaosx.nr5.134.t: "Liaison Offices Hurry the Declaration"
chaosx.nr5.134.d: "Foreign couriers, observers, and press contacts do not write the declaration, but they change its hour. Republican delegates who wanted more time now believe delay will cost recognition, aid, and a voice at the next conference. A government is announced before Moscow can close the route."
chaosx.nr5.134.a: "Outside attention becomes a deadline."
chaosx.nr5.135.t: "Depot Commanders Swear Locally"
chaosx.nr5.135.d: "Ammunition ledgers, fuel stores, and guard rosters arrive with republican signatures. Depot commanders argue that they are protecting the stores from disorder, but their first protected convoy moves under local authority. The new republic begins with rifles already counted."
chaosx.nr5.135.a: "The depot ledger changes hands."
chaosx.nr5.136.t: "Old Movements Force the Question"
chaosx.nr5.136.d: "Irregular committees, old underground names, and returning banners appear faster than the republican administration can deny them. Local officials choose declaration over being overtaken by the roadblocks outside their own offices. Moscow receives a new government because the alternative was something older."
chaosx.nr5.136.a: "The old road reaches the capital."
chaosx.nr5.137.t: "A League Envoy Finds a Signature"
chaosx.nr5.137.d: "League envoys arrive with rail schedules, medical train promises, and a draft for defensive coordination. A wavering republican committee signs because isolation looks more dangerous than open defiance. The declaration names sovereignty, but the first attached page is a common-front timetable."
chaosx.nr5.137.a: "Coordination becomes recognition."

soviet_collapse_indivisible_tt: "Moscow gains authority and obedience, but §RArmed Breakaway Momentum§! also rises because compromise looks less possible."
soviet_collapse_autonomy_tt: "Republic confidence drops, but Moscow gives up authority and accepts looser union negotiations."
soviet_collapse_isolate_tt: "Moscow attempts to contain the first breakaways through rail, fuel, and communications pressure."
soviet_collapse_discipline_tt: "§YCommand Obedience§! improves and §8Depot Vulnerability§! falls."
soviet_collapse_loyalist_officers_tt: "§YCommand Obedience§! rises and the loyalist officer corps spirit is added."
soviet_collapse_union_congress_tt: "Republic confidence falls, but Moscow's authority also weakens."
soviet_collapse_seal_depots_tt: "§8Depot Vulnerability§! and §BLeague Cohesion§! are reduced."
soviet_collapse_second_seal_tt: "Another breakaway may appear, and the Free Republics' League may form if enough republics survive."
soviet_collapse_union_war_tt: "Moscow declares war on breakaway republics it can legally attack."
soviet_collapse_emergency_settlement_tt: "Moscow tries to settle the crisis without a general union war."
soviet_collapse_final_state_tt: "The crisis records its current settlement, restoration, or hollow-ministry outcome."

soviet_collapse_soviet_category: "Soviet Union Crisis"
soviet_collapse_soviet_category_desc: "Moscow answers the union crisis from this board.\n\n§OUNION CRISIS THREAT [?soviet_collapse_total_collapse_threat|1]§!\n§gPrimary collapse meter. It rises from chaos, failed objectives, breakaways, captured depots, foreign intervention, garrison defections, rail disruption, old movements, League victories, lost capitals, failed reclamation, and high-threat secessions. It falls when Moscow restores authority, obedience, rail control, depot security, credible settlements, and lost republic territory. Defeating a stronger breakaway cuts deeper into the crisis than overrunning an isolated weak republic.§!\n\n§CMoscow Authority [?soviet_collapse_moscow_authority|1]§!\n§gShows whether ministries, party offices, and republican administrators still accept central orders.§!\n\n§YCommand Obedience [?soviet_collapse_military_obedience|1]§!\n§gShows whether army, security, navy, rail, and depot commands still comply with Moscow.§!\n\n§RArmed Breakaway Momentum [?soviet_collapse_republic_confidence|1]§!\n§gShows whether republics believe independence can be defended by force.§!\n\n§8Depot Vulnerability [?soviet_collapse_depot_vulnerability|1]§!\n§gShows how exposed rail stores, arsenals, supply hubs, and garrison stockpiles are.§!\n\n§TForeign Penetration [?soviet_collapse_foreign_appetite|1]§!\n§gShows recognition pressure, advisers, intelligence work, aid corridors, and sponsor leverage.§!\n\n§BLeague Cohesion [?soviet_collapse_league_cohesion|1]§!\n§gShows how far breakaway republics can coordinate common defense and diplomacy.§!\n\n§GOld Movement Resurgence [?soviet_collapse_old_movement_pressure|1]§!\n§gShows older parties, undergrounds, militias, and high-chaos claimants returning to public power.§!"
soviet_collapse_moscow_republic_category: "Soviet Republic Negotiations"
soviet_collapse_moscow_republic_category_desc: "Moscow handles one breakaway republic at a time from this desk. Use §YShow Decisions§! on a republic to open its treaty, administration, ultimatum, and military options, then hide it when the desk is no longer needed.\n\n§CMoscow Authority [?soviet_collapse_moscow_authority|1]§!\n§gShows whether ministries, party offices, and republican administrators still accept central orders.§!\n\n§RArmed Breakaway Momentum [?soviet_collapse_republic_confidence|1]§!\n§gShows whether republics believe independence can be defended by force.§!\n\n§TForeign Penetration [?soviet_collapse_foreign_appetite|1]§!\n§gShows recognition pressure, advisers, intelligence work, aid corridors, and sponsor leverage.§!"
soviet_collapse_breakaway_category: "Breakaway Emergency"
soviet_collapse_breakaway_category_desc: "Breakaway republics coordinate defense, arm local committees, request recognition, and call other republics into the crisis.\n\n§OUnion Crisis Threat [?SOV.soviet_collapse_total_collapse_threat|1]§!\n§gMoscow's main collapse meter. High threat opens wider League and emergency options.§!\n\n§BLeague Coordination [?soviet_collapse_league_support_strength|0]§!\n§gShared defense, compact liaisons, common-front standards, and inter-republic staff work.§!\n\n§YRecognition Progress [?soviet_collapse_recognition_progress|0]§!\n§gRecognition requests, observer votes, foreign contacts, and League diplomacy.§!\n\n§8Depot Control [?soviet_collapse_depot_control|0]§!\n§gDepots, rail stores, oilfield boards, and guarded stockpiles answering the republic.§!\n\n§GIndependence Resilience [?soviet_collapse_independence_resilience|0]§!\n§gDomestic staying power from institutions, volunteers, defended routes, and local administration.§!\n\n§OLocal Authority Pressure [?soviet_collapse_local_authority_pressure|0]§!\n§gLocal committees and compact mandates pushing past Moscow's seal.§!\n\n§YLeague Formation Cost £pol_power [?soviet_collapse_league_found_pp_cost|0]  £command_power [?soviet_collapse_league_found_cp_cost|0]§!\n§gRegional leagues need [?soviet_collapse_league_member_gate|0] eligible local republics and a real crisis window: war, recognition, Union Crisis Threat, breakaway momentum, foreign penetration, or failed Soviet objectives.§!"
soviet_collapse_ukraine_bread_state_category: "Bread State Emergency"
soviet_collapse_ukraine_bread_state_category_desc: "Ukraine's Bread State route turns food accounting into coercive authority and wartime supply.\n\n§YGrain Authority [?soviet_collapse_ukraine_grain_authority|0]§!\n§gRation offices, granary ledgers, guarded harvest plans, and black-soil committees commanding the republic.§!\n\n§RBread State Coercion [?soviet_collapse_ukraine_bread_state_coercion|0]§!\n§gForced movement, requisition checks, military grain orders, and bread-line lockdowns.§!\n\n§gThese values feed the wider depot, resilience, League, and old-movement pressures.§!"
soviet_collapse_foreign_patron_category: "Soviet Collapse Intervention"
soviet_collapse_foreign_patron_category_desc: "Foreign patrons, breakaway republics, and collapse-born splinters handle intervention objectives here.\n\n§OUnion Crisis Threat [?SOV.soviet_collapse_total_collapse_threat|1]§!\n§gMoscow's main collapse meter. Higher threat makes intervention more plausible and harder to contain.§!\n\n§TForeign Penetration [?SOV.soviet_collapse_foreign_appetite|1]§!\n§gRecognition pressure, advisers, intelligence work, aid corridors, volunteer channels, and sponsor leverage.§!\n\n§YInfluence Contest§!\n§gEvery supported republic tracks each sponsor on a 0-100 scale. Use Show Decisions on a breakaway to inspect your current leverage and the republic's total foreign leverage.§!\n\n§RClient-State Pressure§!\n§gPuppeting requires overwhelming sponsor influence, high foreign leverage inside the republic, weak local resilience, and a prior dependency chain. A single aid package is not enough.§!\n\n§gInfrastructure, trade, and logistics commitments reserve industry at home. Recognition, press, advisers, volunteers, armaments, and political clauses use their own resource costs instead.§!"
soviet_collapse_regional_faction_category: "Collapse Faction Congresses"
soviet_collapse_regional_faction_category_desc: "Breakaway republics and collapse-born splinters can form regional blocs, recruit aligned members, coordinate shared goals, and manage internal tension.\n\n§BRegional Cohesion [?soviet_collapse_regional_faction_cohesion|0]§!\n§gShows whether the bloc can act as more than a conference table.§!\n\n§RInternal Tension [?soviet_collapse_regional_faction_tension|0]§!\n§gRises when member priorities, borders, and patrons pull against each other.§!\n\n§gRecognition work, depot control, and independence resilience decide whether shared goals become binding programs or another paper front.§!"
soviet_collapse_ukrainian_league_category: "Ukrainian League Council"
soviet_collapse_ukrainian_league_category_desc: "Kyiv uses its League rooms, grain boards, arsenals, port missions, anti-client charter, and external border mandates to bind member republics into practical programs.\n\n§BLeague Coordination [?soviet_collapse_league_support_strength|0]§!\n§gShared staff work, member obligations, depot promises, common defense programs, and border arbitration.§!\n\n§YGrain Authority [?soviet_collapse_ukraine_grain_authority|0]§!\n§gGrain boards, quotas, ration relief, and port missions backing the League's supply promises.§!\n\n§RBread State Coercion [?soviet_collapse_ukraine_bread_state_coercion|0]§!\n§gForced quotas and command grain orders that make the League stronger but harsher.§!"
