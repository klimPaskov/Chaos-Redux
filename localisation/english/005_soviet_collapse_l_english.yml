soviet_collapse_foreign_patron_category_desc: "Foreign patrons, breakaway republics, and collapse-born splinters handle intervention objectives here: recognition, arms routes, volunteers, advisers, intelligence, border pressure, sabotage, patronage, support missions, and republican operational deadlines."
