soviet_collapse_foreign_influence_contest_desc: "\n\n§YYour influence:§! [ROOT.GetSovietCollapseRootInfluenceForFrom]/100\n§gYour country's current leverage over the selected breakaway. It rises when you invest directly, and unused leverage decays as the republic builds its own army and institutions.§!\n\n§TTotal foreign leverage:§! [FROM.GetSovietCollapseTotalInfluenceColored]/100\n§gAll outside influence inside this republic. This can reach 100 even when your own share is lower, because rival sponsors are counted too.§!\n\n§GIndependence resilience:§! [FROM.GetSovietCollapseIndependenceResilienceColored]/100\n§gDomestic capacity to refuse a puppet arrangement: institutions, units, depots, League links, and defended routes.§!\n\n§RPatronage risk:§! [FROM.GetSovietCollapsePatronageRiskColored]/100\n§gHow close emergency aid is to becoming dependency politics. High risk opens stronger patronage moves, but also makes anti-puppet and League balancing more important.§!"
