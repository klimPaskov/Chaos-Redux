soviet_collapse_focus_dynamic_manpower_small_tt: "Gain manpower scaled by owned states and Soviet §RArmed Breakaway Momentum§!."
soviet_collapse_focus_dynamic_manpower_medium_tt: "Gain a larger manpower package scaled by owned states and Soviet §RArmed Breakaway Momentum§!."
soviet_collapse_focus_dynamic_equipment_small_tt: "Gain infantry equipment scaled by owned states and Soviet §8Depot Vulnerability§!."
soviet_collapse_focus_dynamic_equipment_medium_tt: "Gain a larger infantry equipment package scaled by owned states and Soviet §8Depot Vulnerability§!."
soviet_collapse_focus_dynamic_army_xp_small_tt: "Gain army experience scaled by owned states and Soviet §YCommand Obedience§!."
soviet_collapse_focus_dynamic_army_xp_medium_tt: "Gain a larger army experience package scaled by owned states and Soviet §YCommand Obedience§!."
soviet_collapse_apply_focus_legal_recognition_tt: "Strengthens republican institutions, recognition progress, and civilian recovery; Moscow's breakaway pressure rises if the Union Crisis is active."
soviet_collapse_apply_focus_military_consolidation_tt: "Improves army readiness and state command. Deeper military routes deploy mobile formations and war plans at command milestones."
soviet_collapse_apply_focus_depot_and_supply_control_tt: "Secures depot authority and recovery. Deeper depot routes build rail, supply, industry, and war-plan capacity at logistics milestones."
soviet_collapse_apply_focus_rail_authority_reward_tt: "Expands rail authority with infrastructure, a railway link, and a supply hub in a core state while strengthening depot control."
soviet_collapse_build_pra_corridor_network_tt: "Repairs rail and infrastructure across controlled core stations, adds a supply hub to the corridor, and raises rolling-stock control."
soviet_collapse_apply_focus_mobile_columns_reward_tt: "Raises mobile republican columns with command support, army experience, and a stronger depot-military administration."
soviet_collapse_custom_splinter_signature_mobile_column_tt: "A mobile republican column is deployed at the capital with matching emergency manpower and equipment."
soviet_collapse_apply_focus_socialist_sovereignty_tt: "Builds a socialist republican administration with stability, recognition, civilian recovery, and pressure on Moscow's authority."
soviet_collapse_apply_focus_league_preparation_tt: "Builds League coordination, unlocks unit-deployment tools, and improves defensive preparations; Soviet League pressure rises if Moscow is still contesting the crisis."
soviet_collapse_apply_focus_diplomatic_plan_tt: "Turns recognition work, foreign contacts, and League liaison into one diplomatic program that unlocks republican deployment tools and raises crisis pressure on Moscow."
soviet_collapse_apply_focus_republican_compact_plan_tt: "Builds a compact government around legal recognition, League coordination, resilience, and republican deployment authority."
soviet_collapse_apply_focus_security_supply_plan_tt: "Unifies military consolidation with depot control, giving equipment, mobile columns, industrial logistics, and stronger pressure on Soviet command."
soviet_collapse_apply_focus_foreign_recognition_plan_tt: "Combines recognition work with foreign liaison, civilian recovery, and a clearer international case against Moscow."
soviet_collapse_apply_focus_foreign_league_plan_tt: "Links foreign channels to League coordination, unlocking deployment tools while raising outside and inter-republic pressure on Moscow."
soviet_collapse_apply_focus_league_security_plan_tt: "Turns League planning into a shared military staff, unlocking deployment tools, mobile formations, and stronger pressure on Soviet command."
soviet_collapse_apply_focus_lawful_supply_plan_tt: "Places depot control under republican law, pairing recognition with resilient institutions and a usable supply reserve."
soviet_collapse_apply_focus_foreign_supply_plan_tt: "Builds foreign supply channels through ports, rail ledgers, and liaison offices while strengthening depot control."
soviet_collapse_apply_focus_chaos_legitimacy_plan_tt: "Gives a high-chaos successor legal cover for local authority, manpower, controlled claimed cores, and neighbor expansion plans."
soviet_collapse_apply_focus_chaos_assault_plan_tt: "Creates a high-chaos assault program with manpower, weapons, mobile columns, controlled claimed cores, and immediate pressure against Moscow. Successors outside League command may turn nearby breakaway disputes or outer border corridors into direct wars."
soviet_collapse_spawn_custom_splinter_assault_columns_tt: "Raises assault columns and raider formations with matching manpower, weapons, and support equipment."
soviet_collapse_apply_custom_splinter_expansion_claims_tt: "Converts controlled territory into immediate cores, prepares claims and war plans, and pushes the successor toward open expansion."
soviet_collapse_apply_cfr_city_network_surge_tt: "Turns the construction directorate into a city-building state: every controlled core receives industry and infrastructure, a supply hub is added to the network, and the civilian factory reserve expands."
soviet_collapse_apply_cfr_builder_state_buildout_tt: "Turns construction authority into a permanent state program: the directorate expands its civilian factory reserve, improves controlled core worksites, strengthens League support, and keeps the factory-city belt available for later decisions."
soviet_collapse_apply_cfr_builder_state_expansion_doctrine_tt: "Uses construction as an expansion doctrine: border works become claims, neighboring breakaways receive war plans, and controlled claim states are absorbed into the builder state."
soviet_collapse_apply_cfr_focus_plan_is_law_tt: "Turns the planner directorate into a construction code state: construction mandates rise, every controlled core is rebuilt with industry and infrastructure, a supply hub is added, and the factory-city decision chain becomes stronger."
soviet_collapse_apply_ogb_volga_trade_city_claims_tt: "Marks the Volga trade-city file as active: Kazan, Cheboksary, and the river trade corridor are claimed, controlled claim states are cored, and rival Volga authorities receive war plans."
soviet_collapse_dsc_claim_front_road_states_tt: "Marks the dead army's front-road corridor as claimed territory."
soviet_collapse_dsc_core_controlled_front_road_states_tt: "Immediately cores front-road states already controlled by the dead soldiers' congress."
soviet_collapse_dsc_launch_dead_army_neighbor_wars_tt: "The dead army prepares annexation wars against neighboring countries outside its faction. At its dead-army endgame or the highest chaos tier, those orders become immediate wars."
soviet_collapse_dsc_unleash_dead_army_campaign_tt: "Turns the Congress into an active dead-army campaign: front-road claims are cored where controlled, assault columns are raised, neighboring breakaways receive war orders, and the dead-army recruitment idea is consolidated."
soviet_collapse_apply_focus_league_logistics_plan_tt: "Binds League coordination to depot control, unlocking deployments and turning shared logistics into pressure on Moscow."
soviet_collapse_apply_focus_civil_military_authority_plan_tt: "Merges republican law with a loyal command structure, giving institutions, mobile formations, and a firmer claim to sovereignty."
soviet_collapse_apply_focus_foreign_security_plan_tt: "Links foreign liaison to military consolidation, giving outside backing, mobile formations, and stronger anti-Soviet pressure."
soviet_collapse_apply_focus_chaos_supply_plan_tt: "Turns chaotic depot control into manpower, weapons, factory logistics, controlled claimed cores, and neighbor expansion plans."
soviet_collapse_apply_focus_chaos_league_plan_tt: "Pushes a high-chaos successor into League politics while preserving its manpower drive, controlled claimed cores, and mandate pressure against exposed neighbors."
soviet_collapse_apply_focus_foreign_channel_tt: "Expands recognition and foreign contact channels while advancing recovery; Soviet foreign-pressure tracking rises if Moscow is still contesting the crisis."
soviet_collapse_apply_focus_high_chaos_identity_tt: "Hardens the successor state once with manpower, weapons, and command capacity, then keeps converting later route work into assault columns, claims, and aggressive war plans against Moscow, exposed neighboring breakaways, or region-specific outer corridors."
soviet_collapse_custom_focus_dynamic_support_tt: "Gain manpower and infantry equipment scaled by owned states, Soviet §8Depot Vulnerability§!, and war conditions."
soviet_collapse_apply_custom_splinter_first_guard_identity_tt: "Organizes the first guard around this successor state's defining authority, granting the matching security, manpower, equipment, or command payoff."
soviet_collapse_apply_custom_splinter_stores_identity_tt: "Secures the first usable depots and workshops, with rewards shaped by this successor state's local industry and supply base."
soviet_collapse_apply_custom_splinter_legitimacy_identity_tt: "Turns the successor's claim into practical authority, strengthening the political, military, or local-control system that fits its route."
soviet_collapse_apply_custom_splinter_rival_identity_tt: "Settles an internal rival faction and converts the victory into route-specific command, stability, support, or expansion pressure."
soviet_collapse_apply_custom_splinter_doctrine_identity_tt: "Formalizes this successor state's way of war with doctrine progress, command gains, special units, or battlefield infrastructure."
soviet_collapse_apply_custom_splinter_economy_identity_tt: "Builds the economy around this successor state's purpose, adding the appropriate factories, rail links, depots, ports, or state authority."
soviet_collapse_apply_custom_splinter_league_identity_tt: "Connects this successor to the League struggle through recognition, coordination, equipment, or route-specific defensive leverage."
soviet_collapse_apply_custom_splinter_foreign_identity_tt: "Opens outside channels that fit this successor state's position, adding support, recognition, naval access, or foreign pressure."
soviet_collapse_apply_custom_splinter_inner_faction_identity_tt: "Locks in the winning internal faction and turns its program into route-specific manpower, production, security, or political control."
soviet_collapse_apply_custom_splinter_special_arm_identity_tt: "Creates the route's special arm: mobile columns, naval detachments, archive cadres, militia guards, or other identity-specific formations."
soviet_collapse_apply_custom_splinter_supply_identity_tt: "Makes the route's logistics visible through supply hubs, railway control, depot strength, equipment, or local fortification."
soviet_collapse_apply_custom_splinter_enemy_front_identity_tt: "Opens the successor's war route: front preparation, assault formations, immediate cores on held ground, claims and war plans against nearby enemies, and stronger anti-Soviet pressure."
soviet_collapse_apply_custom_splinter_civil_rule_identity_tt: "Defines how civil rule works under this successor, raising local authority, institutions, stability, or controlled construction."
soviet_collapse_apply_custom_splinter_propaganda_identity_tt: "Turns the route's story into mobilization, recognition, manpower, and local obedience pressure."
soviet_collapse_apply_custom_splinter_settlement_identity_tt: "Sets the postwar settlement policy, preparing claims, cores, defensive bargains, or reconstruction authority where the route supports it."
soviet_collapse_apply_custom_splinter_industry_plan_identity_tt: "Commits the route to a concrete industrial plan, adding construction, arms output, rail capacity, naval yards, or resource control."
soviet_collapse_apply_custom_splinter_hidden_doctrine_identity_tt: "Unlocks the route's hidden doctrine payoff: stronger special units, assault formations, immediate cores on held ground, expansion war plans, and more aggressive crisis behavior."
soviet_collapse_apply_custom_splinter_extreme_gate_identity_tt: "Pushes the route into its extreme program, raising war pressure and enabling the successor's most dangerous expansion tools."

soviet_collapse_reclaim_breakaway_republics: "Reclaim Breakaway Republics"
soviet_collapse_reclaim_breakaway_republics_desc: "Treat the breakaway republics as armed rebellion and begin the union war where Moscow still has a legal path to attack."
soviet_collapse_reclaim_breakaway_republics_tt: "Moscow declares war on breakaway republics that can be attacked."
soviet_collapse_restore_party_control: "Restore Party Control"
soviet_collapse_restore_party_control_desc: "Replace silent local committees with loyal officials, auditors, and emergency party delegates."
soviet_collapse_restore_party_control_tt: "§CMoscow Authority§! and §YCommand Obedience§! rise. Republic confidence falls."
soviet_collapse_send_loyalist_officers: "Send Loyalist Officers"
soviet_collapse_send_loyalist_officers_desc: "Move trusted officers into districts where garrisons are waiting for a stronger chain of command."
soviet_collapse_send_loyalist_officers_tt: "§YCommand Obedience§! rises and the loyalist officer corps spirit is added."
soviet_collapse_offer_autonomy: "Offer Autonomy"
soviet_collapse_offer_autonomy_desc: "Put a looser union treaty on the table before more republics decide that only full independence can protect them."
soviet_collapse_offer_autonomy_decision_tt: "Republic confidence falls, but §CMoscow Authority§! also falls."
soviet_collapse_offer_autonomy_tt: "§RArmed Breakaway Momentum§! and §TForeign Penetration§! fall, but §CMoscow Authority§! is spent on public concessions."
soviet_collapse_cut_rebel_supply_routes: "Cut Rebel Supply Routes"
soviet_collapse_cut_rebel_supply_routes_desc: "Interrupt rail links, fuel shipments, and depot access before the breakaways can organize a stable army."
soviet_collapse_cut_rebel_supply_routes_tt: "§8Depot Vulnerability§! and §BLeague Cohesion§! fall."
soviet_collapse_show_moscow_republic_target: "Show Decisions for [FROM.GetName]"
soviet_collapse_show_moscow_republic_target_desc: "Bring this republic onto Moscow's active negotiation desk."
soviet_collapse_show_moscow_republic_target_tt: "Treaty, administration, ultimatum, and military options appear for §Y[FROM.GetName]§!."
soviet_collapse_hide_moscow_republic_target: "Hide Decisions for [FROM.GetName]"
soviet_collapse_hide_moscow_republic_target_desc: "Close this republic's active negotiation desk and return it to the compact republic list."
soviet_collapse_hide_moscow_republic_target_tt: "Moscow republic decisions are hidden for §Y[FROM.GetName]§!."
soviet_collapse_open_republic_negotiation_table: "Open a Republic Negotiation Table"
soviet_collapse_open_republic_negotiation_table_desc: "Bring a breakaway's rail officials, depot officers, court deputies, and Moscow envoys into one channel before foreign patrons own the agenda."
soviet_collapse_open_republic_negotiation_table_tt: "Moscow influence rises in the target republic. Foreign dependency risk and republic release pressure fall."
soviet_collapse_open_republic_negotiation_table_req_tt: "Requires a non-subject breakaway not at war with Moscow, and enough Moscow Authority to keep a contested channel open."
soviet_collapse_embed_loyal_republic_administrators: "Embed Loyal Republic Administrators"
soviet_collapse_embed_loyal_republic_administrators_desc: "Send auditors, ministry clerks, and district organizers into a republic where Moscow still has enough access to shape daily administration."
soviet_collapse_embed_loyal_republic_administrators_tt: "Moscow influence rises further in the target republic. Moscow Authority and Command Obedience improve while republic pressure falls."
soviet_collapse_embed_loyal_republic_administrators_req_tt: "Requires a non-subject breakaway not at war with Moscow, plus an open negotiation channel or existing Moscow leverage inside the republic."
soviet_collapse_issue_republic_military_ultimatum: "Issue a Military Ultimatum"
soviet_collapse_issue_republic_military_ultimatum_desc: "Warn a heavily armed or foreign-backed republic that its depots, rail lines, and ministries will be treated as hostile if it keeps drifting away from Moscow."
soviet_collapse_issue_republic_military_ultimatum_tt: "Moscow influence and Command Obedience rise, but Foreign Penetration also rises. This can open a punitive operation against dangerous republics."
soviet_collapse_issue_republic_military_ultimatum_req_tt: "Requires a dangerous or foreign-backed non-subject breakaway, no active war with Moscow, and Soviet pressure high enough to justify an ultimatum."
soviet_collapse_authorize_republic_punitive_operation: "Authorize a Punitive Operation"
soviet_collapse_authorize_republic_punitive_operation_desc: "Order the army to move against a republic whose foreign support, military defiance, armed independence, or League commitments have made negotiation untenable."
soviet_collapse_authorize_republic_punitive_operation_tt: "Moscow declares war on the target republic. Command Obedience rises, but republic confidence and foreign pressure worsen. A defeated regional League gives Moscow confidence to move against other League members."
soviet_collapse_authorize_republic_punitive_operation_req_tt: "Requires a valid war declaration path, no existing war goal against the republic, and ultimatum pressure or severe defiance."
soviet_collapse_arrest_separatist_leadership: "Arrest Separatist Leadership"
soviet_collapse_arrest_separatist_leadership_desc: "Use security forces to remove the visible organizers. Success depends on whether the army still obeys."
soviet_collapse_arrest_separatist_leadership_tt: "High §YCommand Obedience§! improves the outcome. Low obedience can make the arrests damage §CMoscow Authority§!."
soviet_collapse_emergency_mobilize_reserves: "Emergency Mobilization"
soviet_collapse_emergency_mobilize_reserves_desc: "After the Union is unmade, call up the last loyal reserve districts and empty central stores before the republics claim them."
soviet_collapse_emergency_mobilization_tt: "Releases the final central reserve stores, creates emergency rifle divisions and motor columns at the capital, and adds a large package of manpower, rifles, support equipment, artillery, and trucks. The mobilization heavily strains stability, war support, command capacity, §CMoscow Authority§!, and depot discipline."
soviet_collapse_declare_union_territory_recovered: "Declare the Union Territory Recovered"
soviet_collapse_declare_union_territory_recovered_desc: "Close the emergency after Moscow has regained control over every state held by the Soviet Union when the crisis began."
soviet_collapse_declare_union_territory_recovered_req_tt: "Moscow must control every original Union state marked at the start of the crisis."
soviet_collapse_declare_union_territory_recovered_tt: "The Union Crisis is marked resolved. Soviet crisis missions, breakaway boards, foreign intervention boards, terminal-collapse aftermath categories, and crisis pressure meters are disabled."
soviet_collapse_declare_union_indivisible: "Declare the Union Indivisible"
soviet_collapse_declare_union_indivisible_desc: "Announce that no republican declaration can alter the legal union."
soviet_collapse_declare_union_indivisible_tt: "§CMoscow Authority§! and obedience rise, but §RArmed Breakaway Momentum§! also rises."
soviet_collapse_isolate_separatists_tt: "§8Depot Vulnerability§!, §TForeign Penetration§!, and §BLeague Cohesion§! fall, but breakaway governments use the isolation order to rally support."
soviet_collapse_restore_party_discipline_tt: "§CMoscow Authority§! and §YCommand Obedience§! rise through quiet arbitration, while §GOld Movement Resurgence§! loses room."
