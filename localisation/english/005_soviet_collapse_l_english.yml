soviet_collapse_join_free_republics_league: "Join the Free Republics' League"
soviet_collapse_join_free_republics_league_desc: "Enter the defensive league built by the surviving breakaway republics."
soviet_collapse_join_free_republics_league_tt: "This republic joins the Free Republics' League faction."
soviet_collapse_request_foreign_recognition: "Request Foreign Recognition"
soviet_collapse_request_foreign_recognition_desc: "Ask foreign governments to treat the republic as a government rather than a mutiny."
soviet_collapse_request_foreign_recognition_tt: "Recognition progress rises. If completed, foreign volunteer support arrives."
soviet_collapse_adopt_existing_republic_crisis_mandate: "Adopt a Crisis Mandate"
soviet_collapse_adopt_existing_republic_crisis_mandate_desc: "Use existing ministries, deputies, and legal seals to turn the collapse emergency into a republican mandate instead of a replacement government."
soviet_collapse_adopt_existing_republic_crisis_mandate_tt: "Adds the legal restoration claim, improves stability, raises recognition progress, and increases republican confidence."
soviet_collapse_integrate_existing_republic_staff: "Integrate Republican Staff"
soviet_collapse_integrate_existing_republic_staff_desc: "Fold the republic's standing officers, district commands, and emergency committees into the crisis command without discarding its existing institutions."
soviet_collapse_integrate_existing_republic_staff_tt: "Adds the military defense council, army experience, command power, and dynamic emergency support. League or regional faction members also coordinate defense."
soviet_collapse_open_existing_republic_liaisons: "Open Republic Liaison Offices"
soviet_collapse_open_existing_republic_liaisons_desc: "Send accredited offices to neighboring republics, foreign missions, and League contacts while the existing government keeps its own program."
soviet_collapse_open_existing_republic_liaisons_tt: "Raises recognition progress, opens League cooperation when possible, and steers regional factions toward recognition."
soviet_collapse_existing_republic_open_volunteer_channels: "Open Existing Volunteer Channels"
soviet_collapse_existing_republic_open_volunteer_channels_desc: "Use standing ministries, veterans' rolls, border offices, and district staffs to register volunteers without replacing the republic's existing institutions."
soviet_collapse_existing_republic_open_volunteer_channels_tt: "Pays the dynamic military cost, opens a one-time volunteer package scaled by the crisis state, adds volunteer spirits, and links League or regional-faction members into the same coordination systems."
soviet_collapse_existing_republic_screen_patronage_channels: "Screen Patronage Channels"
soviet_collapse_existing_republic_screen_patronage_channels_desc: "Audit foreign liaison promises through the republic's existing ministries before private patrons turn aid routes into rival political accounts."
soviet_collapse_existing_republic_screen_patronage_channels_tt: "Pays the dynamic political cost, reduces patron rivalry and promise pressure, improves recognition progress, and lowers Soviet foreign-pressure feedback."
soviet_collapse_mobilize_defense_units: "Mobilize Defense Units"
soviet_collapse_mobilize_defense_units_desc: "Turn defense committees and defecting garrisons into a stronger emergency army."
soviet_collapse_mobilize_defense_units_tt: "Adds a military defense council and raises more emergency support."
soviet_collapse_seize_depots: "Seize Depots"
soviet_collapse_seize_depots_desc: "Take control of Soviet military stores before Moscow can audit, evacuate, or destroy them."
soviet_collapse_seize_depots_tt: "Depot control rises and Moscow's §8Depot Vulnerability§! increases."
soviet_collapse_call_other_republics_to_rise: "Call Other Republics to Rise"
soviet_collapse_call_other_republics_to_rise_desc: "Broadcast proof that refusal can survive and invite another republic to reject Moscow's orders."
soviet_collapse_call_other_republics_to_rise_tt: "Moscow may lose another republic if a valid candidate remains."
soviet_collapse_coordinate_fronts: "Coordinate Fronts"
soviet_collapse_coordinate_fronts_desc: "Share maps, radio channels, liaison officers, and reserve plans across the League."
soviet_collapse_coordinate_fronts_tt: "League cohesion rises and League members receive defensive coordination."
soviet_collapse_open_exile_volunteer_rolls: "Open Exile Volunteer Rolls"
soviet_collapse_open_exile_volunteer_rolls_desc: "Register exiles, stranded soldiers, border refugees, and return committees as volunteer manpower before rival patrons turn them into private clients."
soviet_collapse_open_exile_volunteer_rolls_tt: "Dynamic exile manpower and equipment arrive based on owned states, Soviet §TForeign Penetration§!, depot pressure, war state, and League membership."
soviet_collapse_accept_ideological_brigades: "Accept Ideological Brigades"
soviet_collapse_accept_ideological_brigades_desc: "Permit foreign parties, veterans' committees, and ideological societies to raise brigades under republican oversight."
soviet_collapse_accept_ideological_brigades_tt: "Ideological brigades bring volunteers, equipment, army experience, and recognition progress, but political stability suffers."
soviet_collapse_host_medical_missions: "Host Medical Missions"
soviet_collapse_host_medical_missions_desc: "Invite doctors, ambulances, relief committees, and hospital trains that make foreign support harder to denounce as mere arms smuggling."
soviet_collapse_host_medical_missions_tt: "Medical missions improve stability, war support, casualty handling, recognition progress, and foreign pressure."
soviet_collapse_mobilize_prisoner_volunteers: "Mobilize Prisoner Volunteers"
soviet_collapse_mobilize_prisoner_volunteers_desc: "Screen prisoners, defectors, and disciplinary companies for a chance to fight under guarded republican battalions."
soviet_collapse_mobilize_prisoner_volunteers_tt: "War-only prisoner battalions add manpower, command power, equipment, and recognition pressure, but reduce stability."
soviet_collapse_raise_high_chaos_volunteers: "Raise Aberrant Volunteer Columns"
soviet_collapse_raise_high_chaos_volunteers_desc: "Accept fighters arriving under borrowed banners, old oaths, impossible registries, and committee papers that no ministry wants to authenticate."
soviet_collapse_raise_high_chaos_volunteers_tt: "High-chaos volunteers add manpower, equipment, depot control, and recognition pressure while increasing §GOld Movement Resurgence§! and lowering stability."
soviet_collapse_send_league_volunteers: "Send League Volunteer Detachments"
soviet_collapse_send_league_volunteers_desc: "Route registered volunteers, rifles, medics, and committee officers to another Free Republics' League member whose front needs them more."
soviet_collapse_send_league_volunteers_tt: "A selected League member receives dynamic volunteer manpower, infantry equipment, recognition progress, depot control, and foreign volunteer support. The sender pays the breakaway political-power cost."
soviet_collapse_bargain_black_banner_committees: "Bargain with Black Banner Committees"
soviet_collapse_bargain_black_banner_committees_desc: "Accept an unruly defensive arrangement with the black-flag committees in the south before Moscow or local requisition parties drive them into open revolt."
soviet_collapse_bargain_black_banner_committees_tt: "Ukraine gains Black Banner Defense Committees, irregular manpower, equipment, and army experience. §RArmed Breakaway Momentum§! and §GOld Movement Resurgence§! rise, while §BLeague Cohesion§! suffers if the League exists."
soviet_collapse_contain_black_banner_committees: "Contain the Black Banner Committees"
soviet_collapse_contain_black_banner_committees_desc: "Send republican officers, mediators, and security detachments to bring the black-flag committees back under national command."
soviet_collapse_contain_black_banner_committees_tt: "Ukraine removes the Black Banner Defense Committees if present, gains stability, reduces §RArmed Breakaway Momentum§!, and gives Moscow a small authority recovery."

soviet_collapse_recognize_breakaway_government: "Recognize a Breakaway Government"
soviet_collapse_recognize_breakaway_government_desc: "Name one surviving republic as a government with offices, envoys, and legal standing rather than an internal Soviet mutiny."
soviet_collapse_recognize_breakaway_government_tt: "A breakaway republic gains recognition progress. Industrial and border patrons provide stronger recognition pressure."
soviet_collapse_fund_ideological_liaison_offices: "Fund Ideological Liaison Offices"
soviet_collapse_fund_ideological_liaison_offices_desc: "Place party foundations, friendly newspapers, student circles, and advisory desks around one breakaway government before Moscow can define its politics alone."
soviet_collapse_fund_ideological_liaison_offices_tt: "A breakaway republic gains patron-aligned ideology popularity and recognition progress. Industrial patrons spread stronger ideological support."
soviet_collapse_ship_border_armaments: "Ship Border Armaments"
soviet_collapse_ship_border_armaments_desc: "Move rifles, uniforms, ammunition, and radio sets through border committees and private warehouses before Moscow can close the routes."
soviet_collapse_ship_border_armaments_tt: "A breakaway republic receives infantry equipment and depot control. Industrial and border patrons send larger packages."
soviet_collapse_dispatch_military_advisers: "Dispatch Military Advisers"
soviet_collapse_dispatch_military_advisers_desc: "Send officers under deniable missions to turn republican headquarters into commands that can survive Soviet pressure."
soviet_collapse_dispatch_military_advisers_tt: "A breakaway republic gains army experience, command power, recognition progress, and a military defense council."
soviet_collapse_open_republican_intelligence_channel: "Open Republican Intelligence Channels"
soviet_collapse_open_republican_intelligence_channel_desc: "Share depot ledgers, rail movements, courier routes, and intercepted orders with one breakaway government."
soviet_collapse_open_republican_intelligence_channel_tt: "A breakaway republic gains depot control while Moscow loses authority and faces higher foreign pressure."
soviet_collapse_sponsor_volunteer_corps: "Sponsor a Volunteer Corps"
soviet_collapse_sponsor_volunteer_corps_desc: "Let volunteers, veterans, and deniable instructors cross into the collapse under committee or private banners."
soviet_collapse_sponsor_volunteer_corps_tt: "A breakaway republic receives manpower, infantry equipment, foreign volunteers, and recognition progress."
soviet_collapse_negotiate_republican_trade_mission: "Negotiate a Republican Trade Mission"
soviet_collapse_negotiate_republican_trade_mission_desc: "Use trade offices, grain contracts, port agents, and banking channels to keep one republic's emergency government solvent."
soviet_collapse_negotiate_republican_trade_mission_tt: "A breakaway republic gains political power, stability, and recognition progress. League members also strengthen League cohesion."
soviet_collapse_patronage_contain_risk_tt: "Spend additional political power to contain the exposure and reduce Soviet foreign-pressure growth."
soviet_collapse_patronage_escalate_risk_tt: "Turn exposure into an open commitment. A breakaway receives additional recognition and depot control, but Soviet foreign pressure rises."
soviet_collapse_patron_specific_commitment_tt: "The patron formalizes a distinct channel with the supported republic, adding recognition, depot control, political backing, and competing-promise pressure."
chaosx.nr5.20.t: "Recognition Draws a Soviet Protest"
chaosx.nr5.20.d: "Moscow has answered the recognition mission with a formal protest, leaked cables, and threats against the republic receiving the envoys. The move has already stiffened breakaway morale, but the crisis can still be treated as a legal dispute rather than an open contest for the Soviet borderlands."
chaosx.nr5.20.a: "Keep the mission deniable."
chaosx.nr5.20.b: "Treat the protest as recognition of the facts."
chaosx.nr5.21.t: "Arms Convoy Exposed"
chaosx.nr5.21.d: "A border convoy carrying rifles, uniforms, radios, and field stores has been named by Soviet broadcasts and friendly journalists alike. Committees along the route deny official direction, but the republic receiving the crates is already counting them as proof that it has patrons beyond the old union."
chaosx.nr5.21.a: "Close the route and change the papers."
chaosx.nr5.21.b: "Send the next convoy under brighter flags."
chaosx.nr5.22.t: "Advisers Identified"
chaosx.nr5.22.d: "Officers attached to a republican headquarters have been identified by name, rank, and former command. The embarrassment can be contained as retirements, observers, and private contracts, or it can become the beginning of a declared training mission inside the collapse."
chaosx.nr5.22.a: "Recall the names, not the mission."
chaosx.nr5.22.b: "Let the mission stop pretending."
chaosx.nr5.23.t: "Intelligence Channel Burned"
chaosx.nr5.23.d: "Courier routes and coded exchanges with one breakaway government have been compromised. Moscow knows some of what was shared; the republic knows that the channel existed because someone considered it worth risking. The next decision is whether the channel closes quietly or hardens into a wider liaison office."
chaosx.nr5.23.a: "Burn the channel cleanly."
chaosx.nr5.23.b: "Replace secrecy with liaison."
chaosx.nr5.24.t: "Volunteer Scandal"
chaosx.nr5.24.d: "Volunteers crossing into the Soviet collapse have become a public scandal. Their committees claim private conscience; Soviet statements call them interventionists; breakaway recruiters call them the first visible proof that the republic is not alone."
chaosx.nr5.24.a: "Thin the rolls and deny coordination."
chaosx.nr5.24.b: "Let the volunteers become a corps."
chaosx.nr5.25.t: "Trade Mission Dependencies"
chaosx.nr5.25.d: "The republican trade mission has brought contracts, credit, and emergency supplies, but the documents also expose how dependent the breakaway governments have become on outside routes. The relationship can be folded back into commercial language or turned into a public guarantee of continued access."
chaosx.nr5.25.a: "Keep the ledgers commercial."
chaosx.nr5.25.b: "Guarantee the offices openly."
chaosx.nr5.26.t: "Liaison Offices Named"
chaosx.nr5.26.d: "Ideological liaison offices around one breakaway government have been named in Soviet statements, hostile papers, and local rumors. The supported republic has gained organizers, slogans, and outside legal advice, but every desk also invites Moscow to call the crisis a foreign attempt to rewrite the collapse's politics."
chaosx.nr5.26.a: "Keep the offices civic."
chaosx.nr5.26.b: "Make the affiliation public."
chaosx.nr5.50.t: "German Staff Rooms Demand Ledgers"
chaosx.nr5.50.d: "German officers and industrial agents want the republican channel written in inventories, rail priorities, and staff maps. Their help strengthens stores and planning, but it also teaches the supported government that Berlin's promises arrive with accounting columns attached."
chaosx.nr5.50.a: "Put the ledgers under seal."
chaosx.nr5.51.t: "British Envoys Ask for a Charter"
chaosx.nr5.51.d: "British representatives press the republic to make its requests sound like law rather than rebellion. Recognition language, League contacts, and parliamentary formulas arrive together, making the channel useful but increasingly hard to separate from other foreign promises."
chaosx.nr5.51.a: "Draft the charter language."
chaosx.nr5.52.t: "Japanese Liaison Follows the Rails"
chaosx.nr5.52.d: "Japanese officers care less for declarations than for depots, railway reach, and the eastern shape of the collapse. Their channel moves through logistics first and diplomacy second, giving the republic harder stores while drawing attention to who else is measuring the same corridors."
chaosx.nr5.52.a: "Keep the route marked."
chaosx.nr5.53.t: "French Missions Bring Doctors and Claims"
chaosx.nr5.53.d: "French delegates arrive with medical tables, legal memoranda, and public sympathy campaigns. The support steadies the republic's ministries, but every humanitarian office also becomes another place where competing patrons leave promises."
chaosx.nr5.53.a: "Let the missions file papers."
chaosx.nr5.54.t: "American Credits Need a Name"
chaosx.nr5.54.d: "American bankers, journalists, relief committees, and envoys ask what name should appear on contracts. The republic needs the credit and the public attention, while Washington wants proof that aid will not vanish into a border war without receipts."
chaosx.nr5.54.a: "Name the offices carefully."
chaosx.nr5.55.t: "Turkish Officers Count the Passes"
chaosx.nr5.55.d: "Turkish missions tie their help to passes, ports, Turkic committees, and the defensive line south of the collapse. Command rooms welcome the channel, but every border promise complicates the republic's relations with other patrons."
chaosx.nr5.55.a: "Mark the passes for liaison."
chaosx.nr5.56.t: "Persian Routes Price Their Silence"
chaosx.nr5.56.d: "Persian agents can move fuel, couriers, and quiet recognition through routes Moscow cannot easily close. The price is not always written as money: it is influence over which roads stay open and which republics receive priority."
chaosx.nr5.56.a: "Keep the southern road open."
chaosx.nr5.57.t: "Polish Committees Open the Border Rolls"
chaosx.nr5.57.d: "Polish border committees know how many exiles, rifles, and letters can cross before the old empire notices. Their help brings men and urgency, but Warsaw's guarantees compete with every other western promise made to the same republic."
chaosx.nr5.57.a: "Register the border rolls."
chaosx.nr5.58.t: "Romanian Warehouses Face the Dniester"
chaosx.nr5.58.d: "Romanian officers and merchants treat the collapse as a river problem: who controls the stores, crossings, and papers near the Dniester. Their aid strengthens local depots while giving Bucharest a claim on the republic's southern calculations."
chaosx.nr5.58.a: "Open the warehouses by number."
chaosx.nr5.59.t: "Finnish Observers Write Winter Notes"
chaosx.nr5.59.d: "Finnish observers read the Soviet collapse through patrol routes, reserve habits, and the memory of fighting a larger neighbor. Their advice improves fieldcraft, but it also makes the supported republic part of a northern argument over how far Moscow can be pushed."
chaosx.nr5.59.a: "Send the notes to the staff."
chaosx.nr5.60.t: "Foreign Promises Collide"
chaosx.nr5.60.d: "The republic's offices have accepted too many outside promises to pretend they do not touch one another. Envoys want priority, staff missions want maps, committees want public thanks, and every patron insists its channel is the one that kept the republic alive."
chaosx.nr5.60.a: "Balance every promise against the next."
chaosx.nr5.60.b: "Make the patrons bid for priority."
chaosx.nr5.60.c: "Remind them this is our republic."
soviet_collapse_patron_rivalry_balance_promises_tt: "Reduce patron rivalry pressure and stabilize the republic by forcing every foreign channel through a common ledger."
soviet_collapse_patron_rivalry_auction_promises_tt: "Gain recognition and depot control by playing patrons against each other, but increase rivalry and Soviet foreign pressure."
soviet_collapse_patron_rivalry_assert_neutrality_tt: "Cut back foreign promises, reduce rivalry pressure, improve stability, and reduce Soviet foreign-pressure growth."
chaosx.nr5.61.t: "German and British Promises Meet"
chaosx.nr5.61.d: "German staff ledgers and British charter language now cover the same republican offices. One channel asks for military accounting, the other for legal order, and both insist that their promises should define how the republic survives."
chaosx.nr5.62.t: "American Credits Cross Japanese Rail Maps"
chaosx.nr5.62.d: "American credit offices and Japanese rail missions have reached the same depots. The republic can turn the overlap into a joint board, bid the channels against each other, or militarize the routes before Moscow understands how many hands are moving supplies."
chaosx.nr5.63.t: "Turkish and Persian Routes Compete"
chaosx.nr5.63.d: "Turkish officers count passes and ports while Persian couriers price the roads beyond them. Their promises are useful together, but each southern route carries a different expectation about who decides priority."
chaosx.nr5.64.t: "Polish Rolls Meet Romanian Warehouses"
chaosx.nr5.64.d: "Polish border committees and Romanian Dniester warehouses are supporting the same republic through different ledgers. Volunteers, crossings, and stores can be coordinated, sold dear, or pushed directly into the front."
chaosx.nr5.65.t: "French Missions Meet American Credit"
chaosx.nr5.65.d: "French legal and medical missions now overlap with American press offices and credit guarantees. The republic can make the humanitarian channel disciplined, profitable, or openly logistical."
chaosx.nr5.pair.a: "Force both channels through one board."
chaosx.nr5.pair.b: "Make them bid for access."
chaosx.nr5.pair.c: "Turn the overlap into front-line logistics."
soviet_collapse_patron_pair_joint_board_tt: "Reduce patron rivalry, gain recognition progress, stabilize the republic, strengthen League pressure if the republic belongs to the Free Republics' League, and make later patron promises pass through the joint board."
soviet_collapse_patron_pair_auction_access_tt: "Gain recognition, depot control, political power, and the patron pair's themed channel consequence by auctioning access, while making later patron promises richer but more rivalrous."
soviet_collapse_patron_pair_militarize_channel_tt: "Gain manpower, infantry equipment, army experience, foreign volunteer support, and the patron pair's themed channel consequence, while making later patron promises feed front-line logistics."
chaosx.nr5.66.t: "German and Polish Rolls Divide the Camps"
chaosx.nr5.66.d: "German staff officers and Polish border committees are registering the same exiles, veterans, railway guards, and return columns. Each promise brings useful men, but every duplicated name teaches the republic that volunteer aid can become a patronage fight before the volunteers ever reach the line."
chaosx.nr5.67.t: "British Papers Meet French Medical Lists"
chaosx.nr5.67.d: "British charter offices want legal volunteer rolls while French missions count surgeons, ambulance drivers, and relief guards. The republic can merge the ledgers, sell priority to the loudest mission, or take the lists into national service before either patron owns them."
chaosx.nr5.68.t: "American and Japanese Recruiters Share a Rail Camp"
chaosx.nr5.68.d: "American credit committees and Japanese rail liaisons have reached the same volunteer camp. One side promises public backing, the other promises movement and stores, and both expect the republic to remember which channel made the camp possible."
chaosx.nr5.69.t: "Southern Routes Count the Same Volunteers"
chaosx.nr5.69.d: "Turkish officers and Persian couriers are moving volunteers through overlapping passes, ports, and quiet roads. The routes are useful together, but the republic must decide whether the men belong to a joint roll, an auctioned corridor, or its own command."
chaosx.nr5.70.t: "Dniester Rolls Need One Ledger"
chaosx.nr5.70.d: "Polish committees count volunteers by border crossing while Romanian warehouses count them by rifles issued near the Dniester. The republic can coordinate the rolls, make both patrons bid for precedence, or absorb the detachments into its own emergency army."
chaosx.nr5.volunteer_pair.a: "Combine the rolls under one board."
chaosx.nr5.volunteer_pair.b: "Make the patrons bid for volunteers."
chaosx.nr5.volunteer_pair.c: "Nationalize the rolls."
soviet_collapse_patron_volunteer_joint_rolls_tt: "Convert competing volunteer ledgers into a coordinated manpower and equipment package, reduce patron rivalry, gain recognition progress, and fold later foreign volunteer pools into the joint board."
soviet_collapse_patron_volunteer_auction_rolls_tt: "Extract a larger volunteer package, more recognition, and the volunteer pair's themed channel consequence by auctioning priority, while making later foreign volunteer pools raise bids and Soviet attention."
soviet_collapse_patron_volunteer_nationalize_rolls_tt: "Absorb the contested rolls into national command, gaining manpower, stability, war support, and the volunteer pair's themed channel consequence while making later foreign volunteer pools easier to discipline."

soviet_collapse_found_baltic_restoration_pact: "Found the Baltic Restoration Pact"
soviet_collapse_found_baltic_restoration_pact_desc: "Bind the Baltic emergency governments around restored law, ports, wire rooms, and joint defense against any Soviet reconquest."
soviet_collapse_found_baltic_restoration_pact_tt: "Creates the Baltic Restoration Pact, recruits eligible Baltic breakaways, and starts regional cohesion and tension tracking."
soviet_collapse_found_caucasus_defense_compact: "Found the Caucasus Defense Compact"
soviet_collapse_found_caucasus_defense_compact_desc: "Unite the Caucasus republics around mountain roads, pass guards, pipelines, and a defensive command that no single valley can sustain alone."
soviet_collapse_found_caucasus_defense_compact_tt: "Creates the Caucasus Defense Compact and recruits eligible Caucasus breakaways."
soviet_collapse_found_steppe_federation: "Found the Steppe Federation"
soviet_collapse_found_steppe_federation_desc: "Turn steppe ministries, oasis routes, rail yards, and garrison congresses into a federation that can bargain with Moscow and foreign patrons."
soviet_collapse_found_steppe_federation_tt: "Creates the Steppe Federation and recruits eligible Central Asian or Basmachi-aligned breakaways."
soviet_collapse_found_black_international: "Found the Black International"
soviet_collapse_found_black_international_desc: "Give black-flag committees, sailor councils, and anti-capital movements a shared external congress without asking them to become ordinary states."
soviet_collapse_found_black_international_tt: "Creates the Black International and recruits eligible anarchist, black-banner, and councilist breakaways."
soviet_collapse_found_free_soviet_congress: "Found the Free Soviet Congress"
soviet_collapse_found_free_soviet_congress_desc: "Gather soviets, defense committees, red resistance authorities, and socialist republics that reject Moscow's emergency chain of command."
soviet_collapse_found_free_soviet_congress_tt: "Creates the Free Soviet Congress and recruits eligible socialist or Soviet-breakaway governments."
soviet_collapse_found_eastern_buffer_coalition: "Found the Eastern Buffer Coalition"
soviet_collapse_found_eastern_buffer_coalition_desc: "Link western breakaways into a buffer line where foreign missions, border depots, and defensive staff work under one coalition."
soviet_collapse_found_eastern_buffer_coalition_tt: "Creates the Eastern Buffer Coalition and recruits eligible western breakaways."
soviet_collapse_found_dead_international: "Found the Dead International"
soviet_collapse_found_dead_international_desc: "Bind resurrection authorities, memory cults, cosmic red bureaucrats, and revenant commands into a congress that treats death records as citizenship."
soviet_collapse_found_dead_international_tt: "Creates the Dead International and recruits eligible high-chaos death, cosmic, or revenant splinters."
soviet_collapse_found_iron_production_bloc: "Found the Iron Production Bloc"
soviet_collapse_found_iron_production_bloc_desc: "Unite factory states, rail authorities, defense committees, and industrial republics around output, steel, timetables, and armed production."
soviet_collapse_found_iron_production_bloc_tt: "Creates the Iron Production Bloc and recruits eligible industrial, railway, and production-state breakaways."
soviet_collapse_invite_regional_partners: "Invite Aligned Collapse Governments"
soviet_collapse_invite_regional_partners_desc: "Send envoys, timetables, guarantees, and supply promises to governments that fit this bloc's founding rule."
soviet_collapse_invite_regional_partners_tt: "Eligible aligned breakaways join this regional faction. The faction gains members but internal tension rises."
soviet_collapse_coordinate_regional_faction: "Coordinate Faction Goals"
soviet_collapse_coordinate_regional_faction_desc: "Set shared front priorities, depot rules, recognition language, and emergency transport goals across the bloc."
soviet_collapse_coordinate_regional_faction_tt: "Regional cohesion rises, members renew their faction commitments, and the bloc strengthens pressure on Moscow."
soviet_collapse_set_regional_defense_goal: "Adopt a Defensive Goal"
soviet_collapse_set_regional_defense_goal_desc: "Order the bloc to place border staff work, reserve plans, and mutual-defense rules above patron competition and capital prestige."
soviet_collapse_set_regional_defense_goal_tt: "Sets the bloc's active goal to defense. Members gain commitment and war support, cohesion rises, tension falls, and Moscow faces stronger League pressure."
soviet_collapse_set_regional_recognition_goal: "Adopt a Recognition Goal"
soviet_collapse_set_regional_recognition_goal_desc: "Turn the bloc's congress, press offices, and envoys toward one shared recognition language that foreign missions can repeat."
soviet_collapse_set_regional_recognition_goal_tt: "Sets the bloc's active goal to recognition. Members gain dynamic recognition progress based on owned states, cohesion rises, and Soviet foreign pressure grows."
soviet_collapse_set_regional_logistics_goal: "Adopt a Logistics Goal"
soviet_collapse_set_regional_logistics_goal_desc: "Pool timetables, depots, repair crews, and guarded stores so each member receives support according to its territory and faction commitment."
soviet_collapse_set_regional_logistics_goal_tt: "Sets the bloc's active goal to logistics. Members receive dynamic manpower, infantry equipment, and depot control based on owned states and faction commitment."
soviet_collapse_reduce_regional_faction_tension: "Settle Faction Tensions"
soviet_collapse_reduce_regional_faction_tension_desc: "Broker disputes over patronage, ideology, depot shares, command precedence, and which capital speaks for the bloc."
soviet_collapse_reduce_regional_faction_tension_tt: "Internal faction tension falls and the leading government gains stability."
soviet_collapse_withdraw_from_regional_faction: "Withdraw from the Regional Bloc"
soviet_collapse_withdraw_from_regional_faction_desc: "Pull out of the shared command, return liaison papers, and accept the diplomatic cost of leaving the bloc's emergency rules."
soviet_collapse_withdraw_from_regional_faction_tt: "This country leaves its regional faction, loses faction commitments, and cannot immediately found or rejoin another regional bloc. The faction leader's internal tension rises dynamically from the departing member's size and commitment."
soviet_collapse_regional_charter_joint_staff: "Write a binding staff charter."
soviet_collapse_regional_charter_local_autonomy: "Leave each capital room to breathe."
soviet_collapse_regional_charter_patron_channels: "Open the outer rooms to patrons."
soviet_collapse_regional_charter_joint_staff_tt: "Regional cohesion and recognition progress rise, but central coordination increases internal tension."
soviet_collapse_regional_charter_local_autonomy_tt: "Regional tension falls and the leading government gains stability."
soviet_collapse_regional_charter_patron_channels_tt: "Recognition progress and depot control rise, but internal tension and Soviet foreign pressure increase."
soviet_collapse_regional_invite_bargain_tt: "The newly invited partners sign side guarantees, increasing cohesion, recognition progress, and internal tension. The bloc's identity, founding charter, and active shared goal add their own consequences."
soviet_collapse_regional_coordinate_joint_command_tt: "The faction consolidates military and diplomatic priorities, increasing cohesion and pressure on Moscow. The bloc's identity, founding charter, and active shared goal add their own consequences."
soviet_collapse_regional_settle_dispute_tt: "The faction leader spends concessions to lower internal tension and stabilize its government. The bloc's identity, founding charter, and active shared goal add their own consequences."
chaosx.nr5.30.t: "The Baltic Restoration Pact Convenes"
chaosx.nr5.30.d: "Delegates from the Baltic emergency governments meet over port timetables, coast-watch reports, court seals, and the question of who commands the first shared defense orders. The pact exists, but its first charter will decide whether it behaves like a disciplined front, a loose restoration league, or a corridor for foreign guarantees."
chaosx.nr5.31.t: "The Caucasus Compact Meets in the Passes"
chaosx.nr5.31.d: "Mountain roads, pipeline guards, border detachments, and city councils now answer to a shared defensive compact. Every delegate agrees that no republic can hold the passes alone; none agree how much authority should leave their own capital."
chaosx.nr5.32.t: "The Steppe Federation Counts the Rails"
chaosx.nr5.32.d: "Rail ministries, oasis councils, garrison committees, and steppe governments gather to turn distance into leverage. The federation can become a single bargaining table, a loose exchange of escorts and grain, or a route system watched closely by outside patrons."
chaosx.nr5.33.t: "The Black International Opens Its Congress"
chaosx.nr5.33.d: "Black-flag sailors, commune delegates, insurgent committees, and stateless councils have accepted a shared congress without accepting an ordinary state. The first argument is whether coordination can exist without command."
chaosx.nr5.34.t: "The Free Soviet Congress Claims the Word"
chaosx.nr5.34.d: "Soviets, defense committees, and socialist republics outside Moscow assemble under one congress and insist that the name still belongs to councils rather than ministries. Their problem is turning that claim into orders anyone will obey."
chaosx.nr5.35.t: "The Eastern Buffer Coalition Draws Its Line"
chaosx.nr5.35.d: "Western breakaways map border depots, road junctions, and foreign liaison offices into a single buffer line. The coalition can harden command, preserve local sovereignty, or invite patrons deeper into the frontier."
chaosx.nr5.36.t: "The Dead International Opens Its Registers"
chaosx.nr5.36.d: "Resurrection offices, revenant fleets, memory cults, and cosmic red bureaucrats assemble ledgers where names move uneasily between casualty lists and citizenship rolls. Even in this congress, someone must decide whether the dead are members, soldiers, or patrons."
chaosx.nr5.37.t: "The Iron Production Bloc Sets Quotas"
chaosx.nr5.37.d: "Factory states, rail authorities, arsenal committees, and industrial republics begin assigning output, steel priority, transport windows, and armed production quotas. The bloc's power is obvious; its command language is not."
chaosx.nr5.38.t: "New Partners Demand Guarantees"
chaosx.nr5.38.d: "The latest aligned governments have entered the faction carrying border maps, supply claims, old grievances, and promises they expect the founder to honor. Their signatures strengthen the bloc, but every side letter becomes another internal obligation."
chaosx.nr5.38.a: "Put the guarantees into the record."
chaosx.nr5.39.t: "Faction Goals Are Put to a Vote"
chaosx.nr5.39.d: "Member delegations arrive with incompatible priorities: recognition first, depots first, foreign missions first, front lines first. The coordination session can still produce a common program if the leader is willing to bind the faction to shared staff work."
chaosx.nr5.39.a: "Bind the staff tables together."
chaosx.nr5.40.t: "The Bloc Settles Its Grievances"
chaosx.nr5.40.d: "Disputes over patron routes, command precedence, ideology, and depot shares reach the mediation table. No capital leaves fully satisfied, but the faction can keep its arguments inside the room instead of letting them become separate crises."
chaosx.nr5.40.a: "Make the concessions hold."
chaosx.nr5.41.t: "The Bloc Writes a Common Program"
chaosx.nr5.41.d: "The faction has enough cohesion to write goals that sound like more than an emergency list. Delegates can finally attach recognition language, depot priorities, and staff schedules to the same program instead of carrying separate promises home."
chaosx.nr5.41.a: "Bind the program to every capital."
chaosx.nr5.42.t: "Patron Disputes Reach the Faction Table"
chaosx.nr5.42.d: "Foreign routes, committee guarantees, depot contracts, and ideological promises are pulling the bloc in different directions. The argument is no longer about whether patrons are useful; it is about whether patronage can remain inside faction discipline."
chaosx.nr5.42.a: "Mediate the patron ledgers."
chaosx.nr5.43.t: "War Quotas Are Enforced"
chaosx.nr5.43.d: "A faction at war with Moscow cannot survive on declarations. The staff tables turn member commitments into manpower calls, rifle requests, depot claims, and transport orders that every capital can contest only after the front is supplied."
chaosx.nr5.43.a: "Put the quotas on the rail schedule."
chaosx.nr5.44.t: "A Signature Is Withdrawn"
chaosx.nr5.44.d: "The delegation has left the faction chamber with its seals, maps, and side letters. Former partners will count the missing territory and the abandoned commitments; foreign missions will count whether this government can still speak as more than one wounded republic."
chaosx.nr5.44.a: "File the departure papers."
soviet_collapse_regional_faction_bind_common_program_tt: "Regional cohesion and recognition progress rise, League-facing pressure on Moscow increases if the Soviet crisis remains active, and the bloc's identity, founding charter, and active shared goal add their own consequences."
soviet_collapse_regional_faction_mediate_patron_dispute_tt: "Regional tension falls, the leader gains stability, Soviet foreign-pressure growth is reduced, and the bloc's identity, founding charter, and active shared goal add their own consequences."
soviet_collapse_regional_faction_enforce_war_quotas_tt: "The faction leader gains dynamic manpower and infantry equipment based on owned states, plus depot control, but internal tension rises. The bloc's identity, founding charter, and active shared goal add their own consequences."
soviet_collapse_regional_faction_withdrawal_aftermath_tt: "Recognition progress falls and Moscow-facing §BLeague Cohesion§! pressure rises based on the stored withdrawal shock. The former bloc identity adds its own recognition, depot, §TForeign Penetration§!, §BLeague Cohesion§!, or §GOld Movement Resurgence§! consequence before the withdrawal markers are cleared."

soviet_collapse_union_crisis: "Union Crisis"
soviet_collapse_union_crisis_desc: "The Soviet state is losing obedience across ministries, garrisons, depots, rail offices, and republic capitals."
soviet_collapse_emergency_union_authority: "Emergency Union Authority"
soviet_collapse_emergency_union_authority_desc: "Moscow has placed loyal security, military, and party officials over the crisis response."
soviet_collapse_new_union_negotiations: "New Union Negotiations"
soviet_collapse_new_union_negotiations_desc: "The center admits that the old chain of command cannot simply be restored by decree."
soviet_collapse_union_restored: "Union Restored"
soviet_collapse_union_restored_desc: "The first rupture has been contained enough for Moscow to claim that the union still exists."
soviet_collapse_hollow_ministries: "Hollow Ministries"
soviet_collapse_hollow_ministries_desc: "The ministries still issue orders, but too many offices first ask whether anyone outside Moscow will obey."
soviet_collapse_loyalist_officer_corps: "Loyalist Officer Corps"
soviet_collapse_loyalist_officer_corps_desc: "Trusted officers have been moved into the districts where hesitation would be fatal."
soviet_collapse_emergency_mobilization: "Emergency Mobilization"
soviet_collapse_emergency_mobilization_desc: "Local committees turn reservists, volunteers, and defecting garrisons into an emergency defense force."
soviet_collapse_popular_defense_committees: "Popular Defense Committees"
soviet_collapse_popular_defense_committees_desc: "Neighborhood, factory, and village committees guard the new authorities while regular command structures are improvised."
soviet_collapse_captured_soviet_depots: "Captured Soviet Depots"
soviet_collapse_captured_soviet_depots_desc: "Military stores once counted in Moscow's ledgers now answer to republican officials."
soviet_collapse_defensive_coordination: "Defensive Coordination"
soviet_collapse_defensive_coordination_desc: "The breakaways coordinate reserves, rail priorities, and front-line communications against Moscow."
soviet_collapse_foreign_volunteers: "Foreign Volunteers"
soviet_collapse_foreign_volunteers_desc: "Foreign governments avoid clear promises, but volunteers, advisers, and unofficial shipments cross the border."
soviet_collapse_legal_restoration_claim: "Legal Restoration Claim"
soviet_collapse_legal_restoration_claim_desc: "This government frames independence as restored law rather than rebellion."
soviet_collapse_socialist_sovereignty: "Socialist Sovereignty"
soviet_collapse_socialist_sovereignty_desc: "The republic claims socialism can survive without Moscow's command."
soviet_collapse_military_defense_council: "Military Defense Council"
soviet_collapse_military_defense_council_desc: "Military commanders, local officials, and committee delegates coordinate the emergency defense."
soviet_collapse_old_underground_networks: "Old Underground Networks"
soviet_collapse_old_underground_networks_desc: "Old names, village guards, sailors' slogans, and civil-war memories give local fighters a language that neither Moscow nor the republic capitals fully control."
soviet_collapse_black_banner_defense_committees: "Black Banner Defense Committees"
soviet_collapse_black_banner_defense_committees_desc: "Southern defense committees fly black flags, guard villages, raid supply roads, and refuse to treat either Moscow or the republican ministries as masters."
soviet_collapse_red_resistance_without_moscow: "Red Resistance without Moscow"
soviet_collapse_red_resistance_without_moscow_desc: "Workers, soldiers, and party offices still claim Soviet legitimacy, but they no longer trust the capital to speak for it."
soviet_collapse_local_committee_wars: "Local Committee Wars"
soviet_collapse_local_committee_wars_desc: "Rail offices, city committees, district guards, and improvised councils have become authorities that the republic government must bargain with before issuing orders."
soviet_collapse_railway_sovereignty: "Railway Sovereignty"
soviet_collapse_railway_sovereignty_desc: "The rail line has become a government in miniature: whoever controls the timetable controls fuel, soldiers, food, and recognition."
soviet_collapse_flags_return_incorrectly: "Flags Return Incorrectly"
soviet_collapse_flags_return_incorrectly_desc: "Old banners and new committees borrow each other's language until outsiders cannot tell whether a force is nationalist, socialist, localist, or simply armed."
soviet_collapse_hybrid_authorities: "Hybrid Authorities"
soviet_collapse_hybrid_authorities_desc: "The collapse has produced authorities that use republican seals, Soviet commands, local councils, and old symbols in the same proclamation."
soviet_collapse_regional_faction_commitments: "Regional Faction Commitments"
soviet_collapse_regional_faction_commitments_desc: "This government has accepted shared front rules, depot priorities, recognition language, and internal bargaining duties inside a collapse-born faction."
soviet_collapse_exile_volunteer_rolls: "Exile Volunteer Rolls"
soviet_collapse_exile_volunteer_rolls_desc: "Exiles, refugees, and stranded soldiers are being turned into registered volunteer formations instead of loose border bands."
soviet_collapse_ideological_brigades: "Ideological Brigades"
soviet_collapse_ideological_brigades_desc: "Foreign party militants and sympathizers fight under republican papers, bringing zeal and political complications in equal measure."
soviet_collapse_medical_missions: "Medical Missions"
soviet_collapse_medical_missions_desc: "Ambulance columns, relief committees, hospital trains, and foreign doctors bind the republic to outside attention as much as outside aid."
soviet_collapse_prisoner_volunteer_battalions: "Prisoner Volunteer Battalions"
soviet_collapse_prisoner_volunteer_battalions_desc: "Prisoners, defectors, and men under sentence are offered guarded service in place of cells, exile, or Soviet recapture."
soviet_collapse_high_chaos_volunteers: "Aberrant Volunteer Columns"
soviet_collapse_high_chaos_volunteers_desc: "Volunteer columns arrive with papers that contradict one another, banners that should not be flying, and names copied from the wrong ledgers."

soviet_collapse_ukraine_focus_tree: "Ukraine Collapse"
soviet_collapse_ukraine_focus_tree_desc: "Ukraine's emergency government must turn grain, depots, ministries, officers, and foreign missions into a republic that can survive Moscow's answer."
ukr_soviet_collapse_emergency_rada: "Emergency Rada in Kyiv"
ukr_soviet_collapse_emergency_rada_desc: "Deputies, officers, radio staff, and ministry clerks gather in Kyiv before Moscow can make the emergency look like a local misunderstanding."
ukr_soviet_collapse_guard_the_telegraph_house: "Guard the Telegraph House"
ukr_soviet_collapse_guard_the_telegraph_house_desc: "The first order of statehood is keeping the wires alive long enough for the declaration to sound official."
ukr_soviet_collapse_seal_the_grain_ledgers: "Seal the Grain Ledgers"
ukr_soviet_collapse_seal_the_grain_ledgers_desc: "Food records, storage books, rail assignments, and requisition files decide whether Ukraine can bargain or merely hunger."
ukr_soviet_collapse_count_the_depot_keys: "Count the Depot Keys"
ukr_soviet_collapse_count_the_depot_keys_desc: "Every armory door has a key, a guard, and a ledger. Kyiv must learn which of them answer locally."
ukr_soviet_collapse_first_republican_line: "The First Republican Line"
ukr_soviet_collapse_first_republican_line_desc: "Reservists, defectors, and ministry guards are gathered into the first line that can hold roads while the government takes shape."
ukr_soviet_collapse_question_of_statehood: "The Question of Statehood"
ukr_soviet_collapse_question_of_statehood_desc: "The emergency authority must decide whether it speaks as a restored republic, a socialist state, a military directory, an old regime, a village federation, or a patron-backed office."
ukr_soviet_collapse_war_without_a_declaration: "War Without a Declaration"
ukr_soviet_collapse_war_without_a_declaration_desc: "Moscow's pressure has crossed from papers into force. Kyiv answers before the front receives a formal name."
ukr_soviet_collapse_bread_before_banners: "Bread Before Banners"
ukr_soviet_collapse_bread_before_banners_desc: "The republic can argue over flags only if the grain trains keep moving and villages believe the ledgers will feed them."
ukr_soviet_collapse_moscows_officers_in_our_barracks: "Moscow's Officers in Our Barracks"
ukr_soviet_collapse_moscows_officers_in_our_barracks_desc: "Some officers wait for orders from Moscow, some wait for Kyiv, and some wait to see which side can still supply them."
ukr_soviet_collapse_republic_that_can_fight: "A Republic That Can Fight"
ukr_soviet_collapse_republic_that_can_fight_desc: "The emergency government links depots, barracks, and ministries into a command structure strong enough to survive the first test."
ukr_soviet_collapse_open_the_liaison_offices: "Open the Liaison Offices"
ukr_soviet_collapse_open_the_liaison_offices_desc: "Foreign missions may avoid recognition, but observers and clerks can still give the republic names, routes, and witnesses."
ukr_soviet_collapse_convene_the_central_rada: "Convene the Central Rada"
ukr_soviet_collapse_convene_the_central_rada_desc: "Kyiv claims legality through deputies, courts, and ministries rather than through emergency command alone."
ukr_soviet_collapse_socialist_republic_without_moscow: "A Socialist Republic Without Moscow"
ukr_soviet_collapse_socialist_republic_without_moscow_desc: "Factory committees and local soviets argue that socialism survives only when Moscow's emergency machine no longer speaks for it."
ukr_soviet_collapse_military_directory: "The Military Directory"
ukr_soviet_collapse_military_directory_desc: "Officers and emergency officials put survival before party, parliament, and village bargaining."
ukr_soviet_collapse_hetmanate_file: "The Hetmanate File"
ukr_soviet_collapse_hetmanate_file_desc: "Old conservative circles, estate papers, church contacts, and foreign memories offer a different language for authority."
ukr_soviet_collapse_black_banner_compact: "The Black Banner Compact"
ukr_soviet_collapse_black_banner_compact_desc: "Southern villages and black-flag committees agree to fight Moscow without promising obedience to Kyiv."
ukr_soviet_collapse_foreign_provisional_authority: "Foreign Provisional Authority"
ukr_soviet_collapse_foreign_provisional_authority_desc: "Outside sponsors offer aid through offices that can keep Ukraine alive while pressing their own signatures into its papers."
ukr_soviet_collapse_elections_under_shellfire: "Elections Under Shellfire"
ukr_soviet_collapse_elections_under_shellfire_desc: "Ballot boxes and front reports move together, proving that emergency law has not swallowed the republic."
ukr_soviet_collapse_peasant_socialist_congress: "The Peasant Socialist Congress"
ukr_soviet_collapse_peasant_socialist_congress_desc: "Rural delegates and workers' committees define a left republic that rejects both requisition panic and Moscow's command."
ukr_soviet_collapse_workers_congress_in_kharkiv: "Workers' Congress in Kharkiv"
ukr_soviet_collapse_workers_congress_in_kharkiv_desc: "Industrial delegates meet in Kharkiv to claim a workers' mandate against Moscow's party chain."
ukr_soviet_collapse_village_soviets_without_requisition: "Village Soviets Without Requisition"
ukr_soviet_collapse_village_soviets_without_requisition_desc: "Village soviets keep local authority while rejecting the grain seizures that made Moscow's name poisonous."
ukr_soviet_collapse_the_party_card_question: "The Party Card Question"
ukr_soviet_collapse_the_party_card_question_desc: "The republic decides whether old party cards are evidence, credentials, or a danger to the new socialist state."
ukr_soviet_collapse_purge_moscow_loyalists: "Purge Moscow Loyalists"
ukr_soviet_collapse_purge_moscow_loyalists_desc: "Cadres who still wait for Moscow's orders are removed before they can turn the councils into another transmission belt."
ukr_soviet_collapse_re_register_the_party: "Re-register the Party"
ukr_soviet_collapse_re_register_the_party_desc: "Local socialists keep the useful machinery of party work, but every member must register under Ukrainian authority."
ukr_soviet_collapse_factory_soviets_arm_themselves: "Factory Soviets Arm Themselves"
ukr_soviet_collapse_factory_soviets_arm_themselves_desc: "Factory councils organize armed worker battalions around the workshops that still repair rifles and keep machines running."
ukr_soviet_collapse_no_moscow_no_landlords: "No Moscow, No Landlords"
ukr_soviet_collapse_no_moscow_no_landlords_desc: "The village line promises that neither Moscow's collectors nor returning landlords will rule the grain districts."
ukr_soviet_collapse_left_league_delegation: "Left League Delegation"
ukr_soviet_collapse_left_league_delegation_desc: "Ukraine sends socialist delegates to the League tables so cooperation cannot become a conservative pact over workers' heads."
ukr_soviet_collapse_the_ukrainian_commune_debate: "The Ukrainian Commune Debate"
ukr_soviet_collapse_the_ukrainian_commune_debate_desc: "Kyiv debates whether the black-flag communes are partners, rivals, or a second revolution inside the republic."
ukr_soviet_collapse_a_red_republic_of_our_own: "A Red Republic of Our Own"
ukr_soviet_collapse_a_red_republic_of_our_own_desc: "The socialist republic claims its own mandate, its own League voice, and its own answer to Moscow's monopoly."
ukr_soviet_collapse_officers_above_parties: "Officers Above Parties"
ukr_soviet_collapse_officers_above_parties_desc: "The Directory gives commanders room to issue orders before civilian ministries can argue them into delay."
ukr_soviet_collapse_field_headquarters_takes_precedence: "The Field Headquarters Takes Precedence"
ukr_soviet_collapse_field_headquarters_takes_precedence_desc: "Field headquarters receive priority over slow committees when threatened districts need orders before minutes."
ukr_soviet_collapse_mobilization_by_district: "Mobilization by District"
ukr_soviet_collapse_mobilization_by_district_desc: "Military districts raise men, rifles, and transport through local rolls tied to the republican staff."
ukr_soviet_collapse_officer_patronage_lists: "Officer Patronage Lists"
ukr_soviet_collapse_officer_patronage_lists_desc: "The Directory maps every officer's patrons, debts, and loyalties before giving them a command."
ukr_soviet_collapse_military_courts_at_the_depots: "Military Courts at the Depots"
ukr_soviet_collapse_military_courts_at_the_depots_desc: "Depot theft, sabotage, and panic requisition go before military courts while the army guards the stockpiles."
ukr_soviet_collapse_general_staff_war_college: "General Staff War College"
ukr_soviet_collapse_general_staff_war_college_desc: "A wartime college turns surviving staff officers into a professional school for the army's next campaigns."
ukr_soviet_collapse_the_commander_or_the_cabinet: "The Commander or the Cabinet"
ukr_soviet_collapse_the_commander_or_the_cabinet_desc: "The Directory decides whether emergency command stands above the cabinet or shares the burden of government."
ukr_soviet_collapse_army_supremacy: "Army Supremacy"
ukr_soviet_collapse_army_supremacy_desc: "The army takes the first voice in state decisions, gaining speed while making civilian legitimacy harder to defend."
ukr_soviet_collapse_mixed_emergency_cabinet: "Mixed Emergency Cabinet"
ukr_soviet_collapse_mixed_emergency_cabinet_desc: "Commanders and ministers govern together, keeping the Directory disciplined without cutting every civilian channel."
ukr_soviet_collapse_war_plans_beyond_the_border: "War Plans Beyond the Border"
ukr_soviet_collapse_war_plans_beyond_the_border_desc: "The staff drafts operations beyond the emergency line for the day survival no longer means waiting in place."
ukr_soviet_collapse_the_directory_state: "The Directory State"
ukr_soviet_collapse_the_directory_state_desc: "The emergency directory becomes a state form, built around discipline, staff authority, and victory by order."
ukr_soviet_collapse_old_families_return_quietly: "The Old Families Return Quietly"
ukr_soviet_collapse_old_families_return_quietly_desc: "Conservative names reappear in credit offices, parish networks, and diplomatic rooms without announcing a crown."
ukr_soviet_collapse_estate_credit_offices: "Estate Credit Offices"
ukr_soviet_collapse_estate_credit_offices_desc: "Conservative financiers turn old estate ledgers into credit offices for grain, transport, and foreign guarantees."
ukr_soviet_collapse_the_crown_without_a_crown: "The Crown Without a Crown"
ukr_soviet_collapse_the_crown_without_a_crown_desc: "The Hetmanate circle decides whether its restored authority remains a symbol or takes executive power."
ukr_soviet_collapse_symbolic_hetmanate: "Symbolic Hetmanate"
ukr_soviet_collapse_symbolic_hetmanate_desc: "The Hetmanate becomes a conservative symbol wrapped around ministries and laws that still need civilian consent."
ukr_soviet_collapse_executive_hetmanate: "Executive Hetmanate"
ukr_soviet_collapse_executive_hetmanate_desc: "Executive power gathers around the Hetmanate office, promising order while sharpening rural suspicion."
ukr_soviet_collapse_conservative_officer_circles: "Conservative Officer Circles"
ukr_soviet_collapse_conservative_officer_circles_desc: "Monarchist, exile, and conservative officers receive quiet rooms where they can be useful without seizing the state."
ukr_soviet_collapse_the_church_and_the_grain: "The Church and the Grain"
ukr_soviet_collapse_the_church_and_the_grain_desc: "Parish networks and estate brokers mediate food policy before the villages decide the old names have returned."
ukr_soviet_collapse_foreign_courts_notice_kyiv: "Foreign Courts Notice Kyiv"
ukr_soviet_collapse_foreign_courts_notice_kyiv_desc: "Foreign courts and conservative salons begin treating Kyiv as a government with memory, credit, and manners they recognize."
ukr_soviet_collapse_the_second_hetmanate: "The Second Hetmanate"
ukr_soviet_collapse_the_second_hetmanate_desc: "The conservative restoration becomes a second Hetmanate, claiming order through estates, officers, clergy, and foreign recognition."
ukr_soviet_collapse_no_masters_in_the_villages: "No Masters in the Villages"
ukr_soviet_collapse_no_masters_in_the_villages_desc: "Village guards accept ammunition and coordination, but they refuse to become another ministry's property."
ukr_soviet_collapse_sponsors_cabinet_list: "The Sponsor's Cabinet List"
ukr_soviet_collapse_sponsors_cabinet_list_desc: "Foreign advisers bring crates, credits, and suggested names for the offices that should receive them."
ukr_soviet_collapse_constitution_before_victory: "A Constitution Before Victory"
ukr_soviet_collapse_constitution_before_victory_desc: "Civilian institutions are written while the war remains unresolved, so the republic has laws before it has peace."
ukr_soviet_collapse_emergency_law_until_victory: "Emergency Law Until Victory"
ukr_soviet_collapse_emergency_law_until_victory_desc: "The state concentrates authority until Moscow is beaten back and the front can no longer overrule every ministry."
ukr_soviet_collapse_free_soil_compromise: "The Free Soil Compromise"
ukr_soviet_collapse_free_soil_compromise_desc: "Kyiv and the village committees search for a pact that keeps the south in the war without turning it into an ordinary province."
ukr_soviet_collapse_coalition_of_three_ministries: "Coalition of Three Ministries"
ukr_soviet_collapse_coalition_of_three_ministries_desc: "The interior, food, and war ministries accept a cabinet bargain so civilian authority can survive the emergency."
ukr_soviet_collapse_rural_deputy_bloc: "The Rural Deputy Bloc"
ukr_soviet_collapse_rural_deputy_bloc_desc: "Village deputies turn grain concessions into parliamentary strength, keeping rural guards inside the republic's laws."
ukr_soviet_collapse_minority_autonomy_statutes: "Minority Autonomy Statutes"
ukr_soviet_collapse_minority_autonomy_statutes_desc: "Autonomy statutes give border communities and minorities a legal place in the republic before outside patrons speak for them."
ukr_soviet_collapse_emergency_court_of_kyiv: "The Emergency Court of Kyiv"
ukr_soviet_collapse_emergency_court_of_kyiv_desc: "Collaborators, requisition abuses, and emergency arrests pass through a court instead of disappearing into army files."
ukr_soviet_collapse_parliament_votes_on_the_front: "Parliament Votes on the Front"
ukr_soviet_collapse_parliament_votes_on_the_front_desc: "Deputies approve front powers in public, giving the army authority without letting the staff become the state."
ukr_soviet_collapse_provincial_governors_or_elected_radas: "Provincial Governors or Elected Radas"
ukr_soviet_collapse_provincial_governors_or_elected_radas_desc: "Kyiv decides whether the provinces need appointed hands or elected radas to keep the emergency government legitimate."
ukr_soviet_collapse_elected_radas: "Elected Radas"
ukr_soviet_collapse_elected_radas_desc: "Regional radas gain wartime authority, making the republic slower but harder to denounce as another command state."
ukr_soviet_collapse_appointed_governors: "Appointed Governors"
ukr_soviet_collapse_appointed_governors_desc: "Provincial governors answer directly to Kyiv, moving grain, files, and police orders faster while testing local patience."
ukr_soviet_collapse_republic_of_laws: "The Republic of Laws"
ukr_soviet_collapse_republic_of_laws_desc: "Courts, radas, ministries, and front votes define a state that claims legitimacy before victory is certain."
ukr_soviet_collapse_civilian_command_over_the_army: "Civilian Command Over the Army"
ukr_soviet_collapse_civilian_command_over_the_army_desc: "The army remains a national instrument under civilian law, not a second government with uniforms."
ukr_soviet_collapse_republican_general_staff: "Republican General Staff"
ukr_soviet_collapse_republican_general_staff_desc: "Commanders who stayed with Kyiv form a staff able to coordinate depots, fronts, and local formations."
ukr_soviet_collapse_territorial_rifle_battalions: "Territorial Rifle Battalions"
ukr_soviet_collapse_territorial_rifle_battalions_desc: "Local reservists and defecting garrisons are organized into battalions tied to their roads, towns, and depots."
ukr_soviet_collapse_defecting_soviet_formations: "Defecting Soviet Formations"
ukr_soviet_collapse_defecting_soviet_formations_desc: "Soviet units whose orders no longer arrive cleanly can become Ukrainian corps if their officers are watched closely enough."
ukr_soviet_collapse_dnipro_line: "The Dnipro Line"
ukr_soviet_collapse_dnipro_line_desc: "River crossings, engineers, and local batteries turn the Dnipro into a defensive argument Moscow must answer with force."
ukr_soviet_collapse_black_sea_defense_staff: "Black Sea Defense Staff"
ukr_soviet_collapse_black_sea_defense_staff_desc: "Port officers, naval clerks, and coastal guards coordinate the southern flank before outside powers do it for them."
ukr_soviet_collapse_depot_motor_columns: "Depot Motor Columns"
ukr_soviet_collapse_depot_motor_columns_desc: "Fuel, trucks, and seized ledgers move rifle crates from guarded depots to formations that can still march."
ukr_soviet_collapse_league_training_cadres: "League Training Cadres"
ukr_soviet_collapse_league_training_cadres_desc: "Republican officers exchange drills and reserve tables with other breakaways once the League has a real reason to exist."
ukr_soviet_collapse_foreign_advisers_in_plain_coats: "Foreign Advisers in Plain Coats"
ukr_soviet_collapse_foreign_advisers_in_plain_coats_desc: "Advisers arrive without flags, offering methods and maps while keeping their patrons one room away from command."
ukr_soviet_collapse_officer_loyalty_board: "The Officer Loyalty Board"
ukr_soviet_collapse_officer_loyalty_board_desc: "The republic checks commissions, family ties, depot signatures, and front behavior before trusting defecting officers with units."
ukr_soviet_collapse_mobile_steppe_lessons: "Mobile Steppe Lessons"
ukr_soviet_collapse_mobile_steppe_lessons_desc: "Southern allies teach Kyiv how distance, rail breaks, horses, trucks, and empty ground can become a doctrine."
ukr_soviet_collapse_arsenal_cities: "The Arsenal Cities"
ukr_soviet_collapse_arsenal_cities_desc: "Industrial cities bind workshop guards, depot ledgers, and front requests into a weapons network."
ukr_soviet_collapse_no_panic_retreats: "No Panic Retreats"
ukr_soviet_collapse_no_panic_retreats_desc: "The staff orders last-line defense even where civilian confidence pays the price."
ukr_soviet_collapse_army_of_the_republic: "Army of the Republic"
ukr_soviet_collapse_army_of_the_republic_desc: "Emergency battalions, depot columns, and staff offices become a regular army with a national chain of command."
ukr_soviet_collapse_keep_the_bread_moving: "Keep the Bread Moving"
ukr_soviet_collapse_keep_the_bread_moving_desc: "Food trains, village guards, and ministry ledgers become the economic spine of the emergency state."
ukr_soviet_collapse_village_granary_guards: "Village Granary Guards"
ukr_soviet_collapse_village_granary_guards_desc: "Local guards protect stores from requisition panic, looting, and officers who think every sack belongs to the front."
ukr_soviet_collapse_donbas_emergency_board: "Donbas Emergency Board"
ukr_soviet_collapse_donbas_emergency_board_desc: "Coal, workshops, and worker committees receive emergency authority to keep the war economy from breaking apart."
ukr_soviet_collapse_dnieper_workshops: "Dnieper Workshops"
ukr_soviet_collapse_dnieper_workshops_desc: "Repair floors and river factories turn damaged weapons, spare parts, and depot scraps into usable equipment."
ukr_soviet_collapse_republican_foreign_office: "Republican Foreign Office"
ukr_soviet_collapse_republican_foreign_office_desc: "Recognition, observers, sponsors, and League contacts pass through a single office before they can define the republic."
ukr_soviet_collapse_neutral_observers: "Neutral Observers"
ukr_soviet_collapse_neutral_observers_desc: "Ukraine invites witnesses who can confirm its survival without making every foreign note a military pact."
ukr_soviet_collapse_prepare_league_liaison_rooms: "Prepare League Liaison Rooms"
ukr_soviet_collapse_prepare_league_liaison_rooms_desc: "Shared codes, maps, and officers are prepared so the League can form only when the crisis demands more than sympathy."
ukr_soviet_collapse_general_staff_chooses_a_frontier: "The General Staff Chooses a Frontier"
ukr_soviet_collapse_general_staff_chooses_a_frontier_desc: "The army chooses whether Ukraine survives by deep operations, federated militia defense, League doctrine, or Black Sea planning."
ukr_soviet_collapse_republican_deep_battle: "Republican Deep Battle"
ukr_soviet_collapse_republican_deep_battle_desc: "The staff turns Soviet operational habits against Moscow while binding breakthroughs to Ukrainian command."
ukr_soviet_collapse_militia_federalization: "Militia Federalization"
ukr_soviet_collapse_militia_federalization_desc: "Local defense committees keep their names and officers while accepting common signals, depots, and front priorities."
ukr_soviet_collapse_black_sea_port_ledgers: "Black Sea Port Ledgers"
ukr_soviet_collapse_black_sea_port_ledgers_desc: "Port ledgers record customs, evacuation berths, coastal guards, and foreign contacts before outside powers can own the route."
ukr_soviet_collapse_grain_loan: "The Grain Loan"
ukr_soviet_collapse_grain_loan_desc: "Ukraine trades measured food access for arms and witnesses without letting the bargain become an open sale of sovereignty."
ukr_soviet_collapse_coal_for_rifles: "Coal for Rifles"
ukr_soviet_collapse_coal_for_rifles_desc: "Coal offices and depot columns exchange fuel, metal, and guarded transport for rifles that can reach the front."
ukr_soviet_collapse_railway_quartermasters: "Railway Quartermasters"
ukr_soviet_collapse_railway_quartermasters_desc: "Rail clerks and repair foremen turn the Dnieper workshop network into a supply service the army can read."
ukr_soviet_collapse_factories_under_local_guard: "Factories Under Local Guard"
ukr_soviet_collapse_factories_under_local_guard_desc: "Factory guards keep production alive without handing every workshop to either panic requisition or party committees."
ukr_soviet_collapse_price_of_requisition: "The Price of Requisition"
ukr_soviet_collapse_price_of_requisition_desc: "Village stores can feed the war only if Kyiv admits how quickly emergency collection becomes political damage."
ukr_soviet_collapse_peasant_bargain: "Peasant Bargain"
ukr_soviet_collapse_peasant_bargain_desc: "The government offers security, local accounting, and restraint so villages keep sending food without feeling conquered."
ukr_soviet_collapse_industrial_mobilization_council: "Industrial Mobilization Council"
ukr_soviet_collapse_industrial_mobilization_council_desc: "Grain guards, coal offices, workshops, and depot clerks meet under one mobilization council."
ukr_soviet_collapse_arms_before_exports: "Arms Before Exports"
ukr_soviet_collapse_arms_before_exports_desc: "Factories answer the army first, accepting slower recognition in exchange for more reliable rifles and repairs."
ukr_soviet_collapse_bread_for_recognition: "Bread for Recognition"
ukr_soviet_collapse_bread_for_recognition_desc: "Ukraine uses food access, ports, and audited ledgers to make foreign offices acknowledge the republic's survival."
ukr_soviet_collapse_arsenal_of_the_league: "The Arsenal of the League"
ukr_soviet_collapse_arsenal_of_the_league_desc: "Shared signals and Ukrainian industry let the breakaways treat equipment as a common defensive problem."
ukr_soviet_collapse_economic_sovereignty: "Economic Sovereignty"
ukr_soviet_collapse_economic_sovereignty_desc: "The emergency economy becomes a national settlement instead of a pile of temporary boards."
ukr_soviet_collapse_league_signal_codes: "League Signal Codes"
ukr_soviet_collapse_league_signal_codes_desc: "Codes, maps, and front reports are standardized with other breakaways before anyone declares a permanent alliance."
ukr_soviet_collapse_bloc_only_if_moscow_attacks: "A Bloc Only If Moscow Attacks"
ukr_soviet_collapse_bloc_only_if_moscow_attacks_desc: "Kyiv prepares a defensive bloc that activates under real pressure rather than from ambition alone."
ukr_soviet_collapse_immediate_league_congress: "Immediate League Congress"
ukr_soviet_collapse_immediate_league_congress_desc: "The crisis is severe enough for Kyiv to summon a League congress before Moscow can divide the republics."
ukr_soviet_collapse_german_liaison_question: "German Liaison Question"
ukr_soviet_collapse_german_liaison_question_desc: "German staff channels can move arms and maps quickly, but every shipment teaches Kyiv how much a patron expects in return."
ukr_soviet_collapse_british_caution: "British Caution"
ukr_soviet_collapse_british_caution_desc: "British observers prefer papers, ports, and plausible deniability, giving Ukraine witnesses before promises."
ukr_soviet_collapse_polish_border_talks: "Polish Border Talks"
ukr_soviet_collapse_polish_border_talks_desc: "Kyiv opens talks on relief routes and borders before suspicion along the western line becomes its own front."
ukr_soviet_collapse_romanian_port_route: "Romanian Port Route"
ukr_soviet_collapse_romanian_port_route_desc: "Romanian crossings and Black Sea stores offer a southern corridor, provided Ukraine keeps the paperwork in its own hands."
ukr_soviet_collapse_recognition_before_war: "Recognition Before War"
ukr_soviet_collapse_recognition_before_war_desc: "Ukraine asks foreign offices to record the republic's survival before open war forces every answer into military language."
ukr_soviet_collapse_advisers_without_flags: "Advisers Without Flags"
ukr_soviet_collapse_advisers_without_flags_desc: "Trainers and staff officers arrive as private men, useful enough to train reserves and quiet enough to deny."
ukr_soviet_collapse_equipment_corridor_authority: "Equipment Corridor Authority"
ukr_soviet_collapse_equipment_corridor_authority_desc: "The republic puts foreign shipments, port ledgers, depot guards, and staff routes under one authority."
ukr_soviet_collapse_league_founding_charter: "League Founding Charter"
ukr_soviet_collapse_league_founding_charter_desc: "The breakaways sign a defensive charter only after the crisis proves that shared tables are not enough."
ukr_soviet_collapse_league_of_equals: "A League of Equals"
ukr_soviet_collapse_league_of_equals_desc: "Kyiv binds itself to equal votes and shared rules so smaller republics do not see the League as another center."
ukr_soviet_collapse_kyiv_leads_the_front: "Kyiv Leads the Front"
ukr_soviet_collapse_kyiv_leads_the_front_desc: "Ukraine accepts the burden of front leadership, gaining coordination while making the League watch its largest member carefully."
ukr_soviet_collapse_beyond_the_defensive_line: "Beyond the Defensive Line"
ukr_soviet_collapse_beyond_the_defensive_line_desc: "The army, ministries, and depot boards prepare policy for a war that cannot be won by waiting behind emergency lines."
ukr_soviet_collapse_black_sea_rim: "The Black Sea Rim"
ukr_soviet_collapse_black_sea_rim_desc: "Ports, river mouths, coastal stores, and foreign corridors become one southern question under Ukrainian accounting."
ukr_soviet_collapse_western_border_question: "The Western Border Question"
ukr_soviet_collapse_western_border_question_desc: "Kyiv handles the western line through witnesses, maps, and careful security policy before suspicion becomes another war."
ukr_soviet_collapse_romanian_grain_and_river_bargain: "Romanian Grain and River Bargain"
ukr_soviet_collapse_romanian_grain_and_river_bargain_desc: "Grain, river routes, and guarded crossings give Ukraine a southern bargain that keeps foreign aid tied to Ukrainian ledgers."
ukr_soviet_collapse_balkan_supply_diplomacy: "Balkan Supply Diplomacy"
ukr_soviet_collapse_balkan_supply_diplomacy_desc: "Balkan routes carry rifles, fuel, and observers only where Kyiv can keep the paperwork and command chain visible."
ukr_soviet_collapse_anatolian_grain_mission: "Anatolian Grain Mission"
ukr_soviet_collapse_anatolian_grain_mission_desc: "Food missions across the Black Sea buy time, witnesses, and quiet access without turning the coast into a foreign office."
ukr_soviet_collapse_carpathian_security_belt: "Carpathian Security Belt"
ukr_soviet_collapse_carpathian_security_belt_desc: "The western hills and passes receive a security policy that joins border talks to field command."
ukr_soviet_collapse_protectorate_debate: "The Protectorate Debate"
ukr_soviet_collapse_protectorate_debate_desc: "Foreign guarantees, League mandates, and Ukrainian sovereignty are argued before emergency survival becomes permanent dependency."
ukr_soviet_collapse_league_mandated_security_zones: "League Mandated Security Zones"
ukr_soviet_collapse_league_mandated_security_zones_desc: "Kyiv frames security zones as a League duty, forcing shared rules around front lines, corridors, and guarded stores."
ukr_soviet_collapse_direct_national_claims: "Direct National Claims"
ukr_soviet_collapse_direct_national_claims_desc: "The republic answers Moscow with its own national claims, accepting political strain for a sharper war policy."
ukr_soviet_collapse_black_sea_hegemony: "Black Sea Hegemony"
ukr_soviet_collapse_black_sea_hegemony_desc: "Ukraine treats the Black Sea rim as the southern key to survival, supply, and recognition."
ukr_soviet_collapse_breadbasket_empire: "Breadbasket Empire"
ukr_soviet_collapse_breadbasket_empire_desc: "Grain authority becomes state power, feeding armies and diplomacy while making the republic harder and less patient."
ukr_soviet_collapse_granary_of_free_republics: "Granary of Free Republics"
ukr_soviet_collapse_granary_of_free_republics_desc: "Ukraine binds its food stores to the League, turning grain into a shared defensive promise rather than a private empire."
ukr_soviet_collapse_border_states_accept_kyiv: "Border States Accept Kyiv"
ukr_soviet_collapse_border_states_accept_kyiv_desc: "Border republics and observers accept Ukrainian coordination where Kyiv proves it can lead without swallowing them."
ukr_soviet_collapse_no_foreign_master: "No Foreign Master"
ukr_soviet_collapse_no_foreign_master_desc: "The republic takes aid and witnesses, but its offices answer to Kyiv before any protector, sponsor, or mission."
ukr_soviet_collapse_great_steppe_and_sea_plan: "Great Steppe and Sea Plan"
ukr_soviet_collapse_great_steppe_and_sea_plan_desc: "Ukraine links League defense, southern corridors, grain policy, and field command into a single crisis plan."
ukr_soviet_collapse_audit_the_sponsor_crates: "Audit the Sponsor Crates"
ukr_soviet_collapse_audit_the_sponsor_crates_desc: "Foreign shipments are opened under Ukrainian ledgers before advisers can turn aid into ownership."
ukr_soviet_collapse_refuse_the_political_advisers: "Refuse the Political Advisers"
ukr_soviet_collapse_refuse_the_political_advisers_desc: "The republic keeps the equipment and closes the doors where foreign political officers expected to sit."
ukr_soviet_collapse_let_the_advisers_write_memos: "Let the Advisers Write Memos"
ukr_soviet_collapse_let_the_advisers_write_memos_desc: "Foreign advisers receive desks and memos, speeding aid while giving sponsors a sharper view of the state."
ukr_soviet_collapse_league_arbitration_board: "League Arbitration Board"
ukr_soviet_collapse_league_arbitration_board_desc: "The League opens an arbitration board so disputes between republics pass through signatures before they reach rifles."
ukr_soviet_collapse_shared_depot_ledger: "Shared Depot Ledger"
ukr_soviet_collapse_shared_depot_ledger_desc: "League members record common stores, shortages, and transfers in one ledger that Kyiv can defend and audit."
ukr_soviet_collapse_republics_joint_staff: "Republics' Joint Staff"
ukr_soviet_collapse_republics_joint_staff_desc: "Officers from the republics meet as a joint staff for defensive plans that no single capital can manage alone."
ukr_soviet_collapse_the_border_mandate_vote: "The Border Mandate Vote"
ukr_soviet_collapse_the_border_mandate_vote_desc: "Kyiv asks the League to vote before security zones become new borders with Ukrainian soldiers behind them."
ukr_soviet_collapse_black_sea_customs_union: "Black Sea Customs Union"
ukr_soviet_collapse_black_sea_customs_union_desc: "Ports, customs houses, and grain offices become a Black Sea economic line that reaches beyond the old union."
ukr_soviet_collapse_ports_need_soldiers: "Ports Need Soldiers"
ukr_soviet_collapse_ports_need_soldiers_desc: "Customs officers cannot hold a harbor alone, so port guards and naval infantry take their places beside the ledgers."
ukr_soviet_collapse_the_western_question_cannot_wait: "The Western Question Cannot Wait"
ukr_soviet_collapse_the_western_question_cannot_wait_desc: "The western border is pushed onto the agenda before emergency maps harden into another country's facts."
ukr_soviet_collapse_the_bread_line_becomes_a_border: "The Bread Line Becomes a Border"
ukr_soviet_collapse_the_bread_line_becomes_a_border_desc: "Food control turns into frontier policy, making every ration line a claim the world will remember."
ukr_soviet_collapse_endgame_kyiv_writes_the_settlement: "Endgame: Kyiv Writes the Settlement"
ukr_soviet_collapse_endgame_kyiv_writes_the_settlement_desc: "Kyiv prepares the final settlement according to the state it built during the collapse."
ukr_soviet_collapse_endgame_a_ukraine_outside_the_old_map: "Endgame: A Ukraine Outside the Old Map"
ukr_soviet_collapse_endgame_a_ukraine_outside_the_old_map_desc: "Ukraine completes an outside-Soviet ambition without reducing the republic to a simple conquest machine."
ukr_soviet_collapse_bread_state_whispers: "The Bread State Whispers"
ukr_soviet_collapse_bread_state_whispers_desc: "Extreme crisis turns grain into the central language of authority, obedience, and survival before anyone dares name the system."
ukr_soviet_collapse_black_soil_oath: "The Black Soil Oath"
ukr_soviet_collapse_black_soil_oath_desc: "Village committees and black-flag envoys swear that the soil will feed defenders before it feeds another distant state."
ukr_soviet_collapse_harvest_by_decree: "Harvest by Decree"
ukr_soviet_collapse_harvest_by_decree_desc: "Food offices order the harvest through ledgers, guards, and emergency quotas while the republic pays the civilian price."
ukr_soviet_collapse_dead_fields_living_columns: "Dead Fields, Living Columns"
ukr_soviet_collapse_dead_fields_living_columns_desc: "Losses, empty farms, and hungry columns become manpower policy under a state that can no longer separate mourning from mobilization."
ukr_soviet_collapse_grain_census_of_everyone: "The Grain Census of Everyone"
ukr_soviet_collapse_grain_census_of_everyone_desc: "Officials record every village, ration, missing train, and military request until food distribution becomes political control."
ukr_soviet_collapse_no_one_leaves_the_bread_line: "No One Leaves the Bread Line"
ukr_soviet_collapse_no_one_leaves_the_bread_line_desc: "The emergency grain order ties movement, service, and loyalty to the ration line while the war eats through ordinary consent."
ukr_soviet_collapse_last_harvest_plan: "The Last Harvest Plan"
ukr_soviet_collapse_last_harvest_plan_desc: "Food offices, military columns, and guarded factories accept one plan for the final campaign of ration power."
ukr_soviet_collapse_black_banner_takes_the_villages: "The Black Banner Takes the Villages"
ukr_soviet_collapse_black_banner_takes_the_villages_desc: "Southern committees take the grain question into their own hands, forcing Kyiv to bargain with the Free Territory or fight it."
ukr_soviet_collapse_kyiv_or_huliaipole: "Kyiv or Huliaipole"
ukr_soviet_collapse_kyiv_or_huliaipole_desc: "The republic chooses whether the villages answer to the capital, to Huliaipole, or to a fragile bargain between them."
ukr_soviet_collapse_the_double_republic: "The Double Republic"
ukr_soviet_collapse_the_double_republic_desc: "Kyiv and the Free Territory share a strained republic whose center is weak but whose villages defend themselves fiercely."
ukr_soviet_collapse_the_commune_war: "The Commune War"
ukr_soviet_collapse_the_commune_war_desc: "Compromise fails, and the war for Ukraine includes villages that refuse both Moscow and the capital."
ukr_soviet_collapse_when_the_fields_refuse_the_state: "When the Fields Refuse the State"
ukr_soviet_collapse_when_the_fields_refuse_the_state_desc: "The countryside becomes a political actor of its own, and every future settlement must answer the fields as much as the ministries."

soviet_collapse_breakaway_focus_tree: "Breakaway Emergency"
soviet_collapse_breakaway_focus_tree_desc: "Emergency crisis focuses for republics that break from Moscow during the Soviet collapse."
soviet_collapse_assemble_emergency_government: "Assemble the Emergency Government"
soviet_collapse_assemble_emergency_government_desc: "The republic must make ministries, guards, radio rooms, and committees obey one emergency authority before Moscow's orders reach them again."
soviet_collapse_guard_the_radio_stations: "Guard the Radio Stations"
soviet_collapse_guard_the_radio_stations_desc: "Broadcast towers and telephone exchanges decide whether the declaration sounds like a government or a rumor."
soviet_collapse_secure_ministry_ledgers: "Secure Ministry Ledgers"
soviet_collapse_secure_ministry_ledgers_desc: "Officials copy seals, payrolls, rail assignments, and ration books before loyalists can remove the paper trail of statehood."
soviet_collapse_factory_defense_committees: "Factory Defense Committees"
soviet_collapse_factory_defense_committees_desc: "Factory guards, workshop councils, and volunteer foremen turn industrial districts into armed rear areas."
soviet_collapse_audit_local_depots: "Audit Local Depots"
soviet_collapse_audit_local_depots_desc: "The emergency government must know which rifles, trucks, shells, and uniforms are still behind doors that local guards can open."
soviet_collapse_field_emergency_battalions: "Field Emergency Battalions"
soviet_collapse_field_emergency_battalions_desc: "Reservists and defecting garrisons are organized into units that can hold roads while the regular army decides whom to obey."
soviet_collapse_claim_republican_legality: "Claim Republican Legality"
soviet_collapse_claim_republican_legality_desc: "The republic frames its emergency authority as law restored against a center that has lost the right to command."
soviet_collapse_commit_to_socialist_sovereignty: "Commit to Socialist Sovereignty"
soviet_collapse_commit_to_socialist_sovereignty_desc: "The government argues that socialism can survive only if local soviets and republic institutions are protected from Moscow's emergency machine."
soviet_collapse_republican_general_staff: "Republican General Staff"
soviet_collapse_republican_general_staff_desc: "Commanders who stayed are gathered into a staff that can issue plans, assign reserves, and bargain with local committees."
soviet_collapse_request_external_missions: "Request External Missions"
soviet_collapse_request_external_missions_desc: "Foreign offices may avoid recognition, but observers, journalists, and unofficial missions can make the republic harder to erase."
soviet_collapse_open_volunteer_channels: "Open Volunteer Channels"
soviet_collapse_open_volunteer_channels_desc: "Border committees and liaison offices move volunteers and unofficial supplies before formal recognition can catch up."
soviet_collapse_convene_league_liaisons: "Convene League Liaisons"
soviet_collapse_convene_league_liaisons_desc: "The breakaways exchange officers, codes, and timetables so each republic does not fight Moscow alone."
soviet_collapse_common_front_timetables: "Common Front Timetables"
soviet_collapse_common_front_timetables_desc: "League members coordinate rail movements, reserves, evacuation plans, and front reports through shared timetables."
soviet_collapse_survive_the_first_orders: "Survive the First Orders"
soviet_collapse_survive_the_first_orders_desc: "The first orders from Moscow have arrived. The republic survives by proving that obedience can fail and a government can still stand."
soviet_collapse_ukrainian_grain_and_rails: "Ukrainian Grain and Rails"
soviet_collapse_ukrainian_grain_and_rails_desc: "Ukraine's emergency government ties food stores, rail yards, and recruiting offices into one survival network."
soviet_collapse_belarusian_forest_corridors: "Belarusian Forest Corridors"
soviet_collapse_belarusian_forest_corridors_desc: "Forest roads, marsh approaches, and local guides give Belarusian defenders depth against a direct Soviet push."
soviet_collapse_baltic_wire_rooms: "Baltic Wire Rooms"
soviet_collapse_baltic_wire_rooms_desc: "Baltic telephone rooms, civic committees, and foreign contacts keep the declaration visible outside Soviet censorship."
soviet_collapse_caucasus_pass_guards: "Caucasus Pass Guards"
soviet_collapse_caucasus_pass_guards_desc: "Mountain roads and pass guards turn the Caucasus republics into hard positions for any army trying to restore the old chain of command."
soviet_collapse_steppe_supply_congress: "Steppe Supply Congress"
soviet_collapse_steppe_supply_congress_desc: "Central Asian ministries and rail offices meet to decide how grain, fuel, horses, trucks, and guards move across the steppe."
soviet_collapse_black_sea_dniester_line: "Black Sea and Dniester Line"
soviet_collapse_black_sea_dniester_line_desc: "Ports, river crossings, and border districts are organized into a southern defensive line before Moscow can divide them."
soviet_collapse_huliaipole_black_flag: "The Black Flag at Huliaipole"
soviet_collapse_huliaipole_black_flag_desc: "Reports from the southern villages speak of black flags, elected guards, requisition parties turned back at rifle-point, and committees that answer neither Kyiv nor Moscow."
soviet_collapse_no_masters_in_kyiv_or_moscow: "No Masters in Kyiv or Moscow"
soviet_collapse_no_masters_in_kyiv_or_moscow_desc: "Ukraine can keep the black-flag districts in the war only by admitting that their defense committees will not become ordinary ministries."

chaosx.news.5.t: "Soviet Republics Reject Moscow"
chaosx.news.5.d: "Several Soviet republics have rejected direct orders from Moscow and formed emergency authorities around local ministries, garrisons, rail offices, and supply depots. Soviet officials call the declarations illegal, but foreign observers are already debating whether the center can restore obedience before the rupture spreads."
chaosx.news.5.a: "The map waits for new ink."
chaosx.news.5002.t: "Free Republics' League Forms"
chaosx.news.5002.d: "The surviving breakaway republics have formed a defensive League against Moscow. The coalition is unstable and hurried, but shared rail plans, front-line liaison officers, and a common fear of reconquest have given the first declarations a wider shield."
chaosx.news.5002.a: "A union against the Union."
chaosx.news.5003.t: "Second Soviet Seal Breaks"
chaosx.news.5003.d: "Another layer of Soviet authority has failed. More offices now answer local instructions first, and military stores once counted in central ledgers are being guarded by republican forces or silent district commanders."
chaosx.news.5003.a: "The ledgers disagree."
chaosx.news.5004.t: "War for the Union"
chaosx.news.5004.d: "Moscow has moved from emergency language to military action against the breakaway republics. Whether the offensive restores the union or teaches more republics to fear it will be decided on rail lines, depots, and city approaches across the former Soviet space."
chaosx.news.5004.a: "Orders become artillery."

super_event.14.t: "The Union Unmade"
super_event.14.d: "Foreign observers no longer describe the crisis as a handful of republics refusing orders. Ministries, military districts, railway authorities, and emergency governments are now negotiating around Moscow as much as with it.\n\nThe Soviet center may still reconquer the former union, accept a reduced state, or fall further into competing authorities. What has changed is simpler: obedience is no longer assumed."
super_event.14.a: "No orders return."
super_event.14.q: "The state is a relation of men dominating men. \n §Y-Max Weber, Politics as a Vocation-§!"
super_event.15.t: "The Black Banner Returns"
super_event.15.d: "The southern black-banner movement no longer looks like a local militia bargaining for space between Moscow and Kyiv. Its columns raid depots, reject patrons, and denounce every emergency committee that tries to become a new capital.\n\nForeign observers still argue over whether this is an anarchist revival, peasant war, or collapse-born insurgency. The fighters are less ambiguous: no state is allowed to inherit the Union."
super_event.15.a: "No masters. No capitals."
super_event.15.q: "To be governed is to be watched. \n §Y-Pierre-Joseph Proudhon-§!"
super_event.16.t: "The Dead Are Citizens"
super_event.16.d: "The first reports called it fraud: casualty ledgers rewritten, burial details armed, grave registers used as ration cards. Then trains arrived with guards who answered to funeral commissars, and the disputed lists began issuing orders.\n\nThe world has not agreed on what has happened. Cult panic, resurrection politics, forged mobilization, and contamination all have their advocates. The new state only asks whether the dead have been counted."
super_event.16.a: "No discharge is recorded."
super_event.16.q: "The dead know not any thing. \n §Y-Ecclesiastes 9:5-§!"
super_event.17.t: "The World as One Factory"
super_event.17.d: "In the Urals, factories stopped waiting for ministries and began treating production as law. Furnaces judge committees, armored trains carry quota decrees, and workers' battalions march under foremen who speak like priests.\n\nPolitics has not disappeared. It has been recast as maintenance, discipline, and output. The Iron Liturgy now exports that lesson beyond the yards that made it."
super_event.17.a: "Output is law."
super_event.17.q: "The machine does not free the labourer from work. \n §Y-Karl Marx, Capital-§!"
super_event.18.t: "Every Port a Council"
super_event.18.d: "The sailor councils have survived long enough to become more than a mutiny. Ports answer one another before they answer capitals. Convoys carry delegates as often as ammunition, and old naval signals announce assemblies instead of orders.\n\nMoscow calls it treason. Republics call it dangerous. The sailors call it the revolution refusing another chain of command."
super_event.18.a: "The signal is repeated."
super_event.18.q: "All power to the soviets and not to parties. \n §Y-Kronstadt slogan-§!"
super_event.19.t: "A Map Larger than the Union"
super_event.19.d: "Ukraine began the collapse by defending ministries, depots, rail junctions, and ports that Moscow could no longer command. Kyiv now claims something larger: the right to set security corridors beyond Soviet inheritance and to make the Black Sea approaches answer to a republic born from disobedience.\n\nForeign missions call the program stabilization in public and hegemony in private. The League watches its own ally with unease, because independence has become statecraft, and statecraft has begun redrawing maps."
super_event.19.a: "The borders answer."
super_event.19.q: "Who rules East Europe commands the Heartland; \n §Y-Halford J. Mackinder, Democratic Ideals and Reality-§!"
super_event.20.t: "The Steppe Beyond History"
super_event.20.d: "Kazakhstan's emergency government no longer looks like a distant survivor of the Soviet rupture. Rail congresses, mobile commands, oil boards, and steppe councils have learned to turn distance into administration, and foreign envoys now cross the plains to bargain with a power they once called a buffer.\n\nThe claim is not that history has ended. It is that the eastern collapse has opened a horizon too wide for Moscow's old maps."
super_event.20.a: "The horizon answers."
super_event.20.q: "These assuredly are invincible and impossible to approach. \n §Y-Herodotus, The Histories-§!"
super_event.21.t: "The Corridors Decide"
super_event.21.d: "Belarus no longer appears as a small republic waiting between armies. Its rail boards, customs posts, refugee statutes, and western-gate offices decide which soldiers, patrons, and governments can move across the broken Union.\n\nMoscow still speaks of borders. The League speaks of routes. Foreign missions speak of access. In Belarus, all three have learned that sovereignty can be measured in timetables."
super_event.21.a: "The timetable is authority."
super_event.21.q: "War is a mere continuation of policy by other means. \n §Y-Carl von Clausewitz, On War-§!"
super_event.22.t: "The Bread State"
super_event.22.d: "Ukraine's emergency government has stopped treating grain as a commodity and bread as a promise. Silo guards, ration ministries, port elevators, and rail convoys now form a state within the state: one that can feed cities, starve enemies, and frighten every patron that came looking for a republic.\n\nMoscow calls it requisition under another flag. Foreign missions call it necessity when the doors are open and coercion when they close. Kyiv calls it survival."
super_event.22.a: "The card decides."
super_event.22.q: "Man shall not live by bread alone. \n §Y-Deuteronomy 8:3-§!"
super_event.23.t: "The League of Equal Republics"
super_event.23.d: "The Free Republics' League has crossed the line between emergency staff table and political order. Its members still distrust one another, still bargain over rifles and recognition, and still fear that Kyiv may grow too large for its own charter.\n\nYet the front has held long enough for a different language to survive: no capital above the others, no republic asked to disappear into another center, and no return to Moscow's ledgers without consent."
super_event.23.a: "No capital above the others."
super_event.23.q: "Each state retains its sovereignty, freedom and independence. \n §Y-Articles of Confederation-§!"
super_event.24.t: "The Steppe Federation"
super_event.24.d: "The eastern republics have stopped treating distance as a weakness. Rail ministries, oasis councils, garrison committees, and steppe governments now bargain through one federation, counting locomotives, wells, depots, escorts, and foreign promises as parts of the same frontier.\n\nMoscow expected buffers. Patrons expected routes. The federation offers both less and more: a continental bargaining table that can move men, grain, oil, and suspicion farther than any one capital can command."
super_event.24.a: "The rails count the votes."
super_event.24.q: "that combination and union of wills of arms and of resources, \n §Y-The Federalist No. 5-§!"
super_event.25.t: "The Baltic Restoration Pact"
super_event.25.d: "The Baltic emergency governments have turned court seals, coast-watch rooms, forest guards, and port timetables into a pact that says the old annexation cannot be allowed to become normal again. The pact is small on the map and severe in its language: restoration first, coordination second, foreign guarantees only where they do not replace the republics themselves.\n\nMoscow calls it a frontier arrangement. The delegates call it a line that was never lawfully erased."
super_event.25.a: "The line is restored."
super_event.25.q: "Remove not the ancient landmark, which thy fathers have set. \n §Y-Proverbs 22:28-§!"
super_event.26.t: "The Caucasus Defense Compact"
super_event.26.d: "The Caucasus republics have turned mountain passes, oil roads, customs houses, and border detachments into a defensive compact that no single capital can hold alone. Its language is practical and severe: keep the roads open, keep Moscow out, and make every patron bargain with the mountains together.\n\nForeign missions see pipelines and passages. The compact sees ridgelines, councils, and valleys that cannot afford to be conquered one by one."
super_event.26.a: "The passes close ranks."
super_event.26.q: "As the mountains are round about Jerusalem, so the LORD is round about his people. \n §Y-Psalm 125:2-§!"
super_event.27.t: "The Eastern Buffer Coalition"
super_event.27.d: "The western republics have drawn a line from border posts, rail junctions, customs rooms, and volunteer corridors. It is not a single state and not yet a settled alliance, but it is enough to make every road west of Moscow pass through a common staff table.\n\nPatrons call it containment. Moscow calls it encirclement. The coalition calls it the price of not being conquered one republic at a time."
super_event.27.a: "The line holds if the desks hold."
super_event.27.q: "Safety from external danger is the most powerful director of national conduct. \n §Y-The Federalist No. 8-§!"
soviet_collapse_custom_foundation: "Secure the First Claim"
soviet_collapse_custom_foundation_desc: "Emergency committees settle the first offices, seals, transmitters, and public orders of the splinter state."
soviet_collapse_custom_guard: "Muster the First Guard"
soviet_collapse_custom_guard_desc: "The armed core of the regime is pulled from loyal detachments, local volunteers, and whoever still obeys the new command."
soviet_collapse_custom_depots: "Seize the Local Stores"
soviet_collapse_custom_depots_desc: "Warehouses, rail sidings, fuel lots, and abandoned Soviet stockpiles become the material base of independence."
soviet_collapse_custom_legitimacy: "Define the Legal Claim"
soviet_collapse_custom_legitimacy_desc: "The splinter government writes a public case for authority that foreign observers and frightened locals can understand."
soviet_collapse_custom_doctrine: "Write the Crisis Doctrine"
soviet_collapse_custom_doctrine_desc: "Commanders turn emergency improvisation into a doctrine suited to the splinter state's terrain, ideology, and enemies."
soviet_collapse_custom_crisis_economy: "Order the Crisis Economy"
soviet_collapse_custom_crisis_economy_desc: "Factories, workshops, farms, depots, and transport offices are pulled into a single emergency economy."
soviet_collapse_custom_league_line: "Set the League Line"
soviet_collapse_custom_league_line_desc: "The republic decides whether the Free Republics League is a shield, a bargaining table, or a rival claim to sovereignty."
soviet_collapse_custom_special_arm: "Raise the Signature Arm"
soviet_collapse_custom_special_arm_desc: "The regime builds the military arm that best fits its own identity rather than another generic emergency battalion."
soviet_collapse_custom_supply_network: "Map the Supply Network"
soviet_collapse_custom_supply_network_desc: "A durable map of routes, depots, workshops, and guarded corridors gives the splinter state staying power."
soviet_collapse_custom_foreign_screen: "Open the Foreign Screen"
soviet_collapse_custom_foreign_screen_desc: "Foreign attention is filtered into useful recognition, missions, and volunteers without giving outsiders full control."
soviet_collapse_custom_internal_settlement: "Settle the Internal Question"
soviet_collapse_custom_internal_settlement_desc: "Councils, committees, officers, cults, clerks, and militias accept a settlement that lets the state act as one body."
soviet_collapse_custom_radical_turn: "Take the Radical Turn"
soviet_collapse_custom_radical_turn_desc: "The splinter state stops pretending its survival can remain conventional."
soviet_collapse_custom_extreme_gate: "Open the Extreme Route"
soviet_collapse_custom_extreme_gate_desc: "The crisis grants permission to attempt the path that only this splinter state would dare to name."
soviet_collapse_custom_extreme_path: "Commit the Extreme Path"
soviet_collapse_custom_extreme_path_desc: "The regime binds itself to its signature solution and reshapes the wider collapse around it."
soviet_collapse_custom_endgame: "Lock the Endgame Direction"
soviet_collapse_custom_endgame_desc: "The splinter state chooses how it will survive the Soviet collapse after the first emergency has passed."
soviet_collapse_objective_category: "Union Crisis Objectives"
soviet_collapse_objective_category_desc: "Timed crisis objectives turn the collapse meter into concrete tasks. They complete automatically when their map, support, equipment, route, and political conditions are met. The board activates at most §Y[?soviet_collapse_soviet_objective_active_cap|0]§! Soviet objectives at once; current active objectives: §Y[?soviet_collapse_soviet_objectives_active|0]§!, queued eligible objectives: §Y[?soviet_collapse_soviet_objectives_queued|0]§!. Completing or failing one objective refreshes the queue and brings in the next eligible task. Completing an objective moves named pressure components in the direction shown by the tooltip. Missing a deadline creates a visible report and pushes the crisis through depots, foreign corridors, southern cascades, old movements, or factory-state panic."
soviet_collapse_secure_western_military_districts: "Secure the Western Military Districts"
soviet_collapse_secure_western_military_districts_desc: "Moscow orders loyal formations into the western approaches before declarations become battlefield facts. This is not a political purchase: divisions must physically hold the district line."
soviet_collapse_secure_western_military_districts_req_tt: "Place enough Soviet divisions in the Kyiv, Minsk, Vilnius, Riga, or Harju staging states and keep at least one western approach under Soviet control."
soviet_collapse_secure_western_military_districts_success_tt: "§YCommand Obedience§! improves.§!\n§8Depot Vulnerability§! and §TForeign Penetration§! fall.§!\n§RArmed Breakaway Momentum§! loses credibility in the west.§!"
soviet_collapse_secure_western_military_districts_failure_tt: "§RArmed Breakaway Momentum§! rises.§!\n§8Depot Vulnerability§! and §TForeign Penetration§! increase.§!\n§RWestern commanders learn that Moscow could not move troops before the deadline.§!"
soviet_collapse_reopen_minsk_kyiv_rail_ledger: "Reopen the Minsk-Kyiv Rail Ledger"
soviet_collapse_reopen_minsk_kyiv_rail_ledger_desc: "Railway accounting is treated as command authority. Moscow must restore supply-node capacity and hold either end of the western ledger before depot clerks start stamping local seals."
soviet_collapse_reopen_minsk_kyiv_rail_ledger_req_tt: "Maintain enough supply-node capacity and control either Minsk or Kyiv."
soviet_collapse_reopen_minsk_kyiv_rail_ledger_success_tt: "§8Depot Vulnerability§! falls.§!\n§YCommand Obedience§! improves as rail manifests reach Moscow again.§!"
soviet_collapse_reopen_minsk_kyiv_rail_ledger_failure_tt: "§RDepot seizure pressure rises.§!\n§GOld Movement Resurgence§! and §BLeague Cohesion§! increase around unclaimed rail corridors.§!"
soviet_collapse_hold_southern_gate: "Hold the Southern Gate"
soviet_collapse_hold_southern_gate_desc: "The southern crisis is contained through railway hubs and mountain approaches, not speeches. Moscow must garrison the Central Asian corridor before one republic's break becomes a cascade."
soviet_collapse_hold_southern_gate_req_tt: "Place enough Soviet divisions around Tashkent, Ashkhabad, Alma-Ata, and Bukhara while no southern republic has broken away."
soviet_collapse_hold_southern_gate_success_tt: "§YCommand Obedience§! improves in the south.§!\n§TForeign Penetration§! and §GOld Movement Resurgence§! fall.§!\n§GKazakhstan is less likely to become an isolated early domino.§!"
soviet_collapse_hold_southern_gate_failure_tt: "§RSouthern cascade pressure rises.§!\n§RForeign patrons and old movements gain space around Central Asia.§!\n§RIf valid southern republics remain, the cascade is checked immediately.§!"
soviet_collapse_hold_capital_until_world_reads_telegram: "Hold the Capital Until the World Reads the Telegram"
soviet_collapse_hold_capital_until_world_reads_telegram_desc: "The declaration must survive long enough to be repeated abroad. The republic must keep its capital and enough divisions alive through the first deadline."
soviet_collapse_hold_capital_until_world_reads_telegram_req_tt: "Control the capital and keep a field force large enough to make the declaration credible."
soviet_collapse_hold_capital_until_world_reads_telegram_success_tt: "§RArmed Breakaway Momentum§! and §TForeign Penetration§! rise.§!\n§YRecognition progress and depot control improve for this republic.§!"
soviet_collapse_hold_capital_until_world_reads_telegram_failure_tt: "§CMoscow Authority§! rises and §RArmed Breakaway Momentum§! falls.§!\n§RThis republic loses recognition progress.§!"
soviet_collapse_secure_first_depot: "Secure the First Depot"
soviet_collapse_secure_first_depot_desc: "A republic that cannot hold weapons cannot hold a declaration. The defense committees must seize and guard a depot before Moscow restores the central ledger."
soviet_collapse_secure_first_depot_req_tt: "Maintain enough divisions and either be at war with Moscow or already have strong depot control."
soviet_collapse_secure_first_depot_success_tt: "§YThis republic gains depot control and emergency infantry equipment.§!\n§8Depot Vulnerability§! rises for Moscow, and the depot mutation track is marked.§!"
soviet_collapse_secure_first_depot_failure_tt: "§CMoscow Authority§! rises and §RArmed Breakaway Momentum§! falls.§!\n§RThis republic loses depot control.§!"
soviet_collapse_open_recognition_corridor_objective: "Open the Recognition Corridor"
soviet_collapse_open_recognition_corridor_objective_desc: "Recognition needs a corridor: liaison offices, League cover, or a foreign patron route. The republic must keep that channel alive before aid becomes only rumor."
soviet_collapse_open_recognition_corridor_objective_req_tt: "Reach meaningful recognition progress, keep a liaison, League, or patron route open, and reserve support points for the corridor.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_medium_req|0]§! required."
soviet_collapse_open_recognition_corridor_objective_success_tt: "§YThis republic spends support points and gains recognition progress.§!\n§TForeign Penetration§! and §BLeague Cohesion§! rise as the corridor becomes real.§!\n§RHeavy support spending can raise §TForeign Penetration§!, §RArmed Breakaway Momentum§!, and §YCommand Obedience§! loss.§!"
soviet_collapse_open_recognition_corridor_objective_failure_tt: "§TForeign Penetration§! falls for now.§!\n§RThis republic loses recognition progress and may seek harsher patrons later.§!"
soviet_collapse_keep_league_from_becoming_a_prison: "Keep the League from Becoming a Prison"
soviet_collapse_keep_league_from_becoming_a_prison_desc: "The Free Republics' League must prove that common defense is not a new jail with another stamp. Member governments need enough field strength, domestic stability, and League cohesion to keep the calendar from becoming patron rule."
soviet_collapse_keep_league_from_becoming_a_prison_req_tt: "Keep enough divisions under arms, maintain domestic stability, keep League cohesion above the crisis floor, and reserve a small support-point bloc.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_light_req|0]§! required."
soviet_collapse_keep_league_from_becoming_a_prison_success_tt: "§YThis republic spends a small support-point bloc and gains recognition progress.§!\n§TForeign Penetration§! falls as the League solves its own calendar.§!\n§BLeague Cohesion§! rises, making breakaway coordination harder for Moscow to dissolve.§!"
soviet_collapse_keep_league_from_becoming_a_prison_failure_tt: "§TForeign Penetration§! and §RArmed Breakaway Momentum§! rise as patrons find openings inside the League.§!\n§RThis republic loses recognition progress and §BLeague Cohesion§! falls.§!"
soviet_collapse_open_eastern_liaison_route_objective: "Open the Eastern Liaison Route"
soviet_collapse_open_eastern_liaison_route_objective_desc: "A border patron must prove that it can do more than make promises. Prior liaison, aid, adviser, intelligence, volunteer, or trade actions must create accepted trust before divisions and equipment can be committed to a corridor."
soviet_collapse_open_eastern_liaison_route_objective_req_tt: "Complete enough targeted intervention actions first: §Y[?soviet_collapse_patron_operation_count|0]§! / §R[?soviet_collapse_foreign_operation_threshold|0]§! sponsor operations required. A breakaway target must have accepted aid, must not have rejected the sponsor, and must have at least §R[?soviet_collapse_foreign_route_acceptance_threshold|0]§! Republic Trust. Also keep enough divisions ready and hold enough infantry equipment for the first route shipment."
soviet_collapse_open_eastern_liaison_route_objective_success_tt: "§TForeign Penetration§! and §8Depot Vulnerability§! rise.§!\n§YInfantry equipment is spent on the route.§!"
soviet_collapse_open_eastern_liaison_route_objective_failure_tt: "§CMoscow Authority§! rises and §TForeign Penetration§! falls.§!\n§RThe failed patron route becomes a propaganda victory for Moscow.§!"
soviet_collapse_recognition_without_a_war_objective: "Recognition Without a War"
soviet_collapse_recognition_without_a_war_objective_desc: "London, Washington, or Paris can try to make recognition credible without turning the crisis into a direct war. Observer, liaison, aid, and committee actions must build accepted trust before recognition becomes more than a statement."
soviet_collapse_recognition_without_a_war_objective_req_tt: "Complete enough targeted intervention actions first: §Y[?soviet_collapse_patron_operation_count|0]§! / §R[?soviet_collapse_foreign_recognition_operation_threshold|0]§! sponsor operations required. A breakaway target must have accepted aid, at least §R[?soviet_collapse_foreign_route_acceptance_threshold|0]§! Republic Trust, and recognition progress above the corridor threshold. Also have a major civilian economy and remain out of direct war with Moscow."
soviet_collapse_recognition_without_a_war_objective_success_tt: "§TForeign Penetration§! rises through legal recognition channels.§!\n§GOld Movement Resurgence§! falls because regular diplomacy crowds out stranger patrons.§!"
soviet_collapse_recognition_without_a_war_objective_failure_tt: "§TForeign Penetration§! and §GOld Movement Resurgence§! rise.§!\n§RBreakaways may seek harsher patrons after the delay.§!"
soviet_collapse_fulfill_construction_quota: "Fulfill the Construction Quota"
soviet_collapse_fulfill_construction_quota_desc: "The Civilian Factory of Russia proves legitimacy by building. It must sustain enough civilian industry and stability before workers decide the construction state is another failed office."
soviet_collapse_fulfill_construction_quota_req_tt: "Hold enough civilian factories and keep worker stability above the crisis floor."
soviet_collapse_fulfill_construction_quota_success_tt: "§GOld Movement Resurgence§! falls in industrial areas.§!\n§YConstruction Mandates become a stronger state claim.§!"
soviet_collapse_fulfill_construction_quota_failure_tt: "§RWorker unrest rises and the factory-state mutation pressure grows.§!"
soviet_collapse_arm_the_corridor: "Arm the Corridor"
soviet_collapse_arm_the_corridor_desc: "The Military Factory of Russia must prove that output can defend a line. The arsenal state stockpiles rifles and guards the production zone before rivals capture its order books."
soviet_collapse_arm_the_corridor_req_tt: "Control enough military factories and hold enough infantry equipment for the corridor armament order."
soviet_collapse_arm_the_corridor_success_tt: "§YInfantry equipment is spent to arm the corridor.§!\n§8Depot Vulnerability§! rises across the wider collapse as the arsenal state becomes credible.§!"
soviet_collapse_arm_the_corridor_failure_tt: "§RDepot panic, worker unrest, and arsenal-state radicalization increase.§!"
soviet_collapse_gather_volga_assemblies: "Gather the Volga Assemblies"
soviet_collapse_gather_volga_assemblies_desc: "Old Great Bulgaria must prove that a dead name can call living towns together. Assemblies, river guards, and recognition channels must hold before neighbors treat it as a curiosity."
soviet_collapse_gather_volga_assemblies_req_tt: "Place enough divisions around Kazan and the Volga German corridor and build recognition progress before the assembly deadline."
soviet_collapse_gather_volga_assemblies_success_tt: "§YOld Great Bulgaria gains recognition progress and stability.§!\n§GOld Movement Resurgence§! rises because the ancient claim has become politically real.§!"
soviet_collapse_gather_volga_assemblies_failure_tt: "§ROld Great Bulgaria loses stability.§!\n§RForeign and old-movement pressure rise around the failed assembly.§!"
soviet_collapse_guard_capital_dispatches: "Guard the Capital Dispatches"
soviet_collapse_guard_capital_dispatches_desc: "Moscow must prove that ministries still receive answers. The capital, nearby staging districts, and basic stability must hold until the deadline."
soviet_collapse_guard_capital_dispatches_req_tt: "Control Moscow, place enough loyal divisions around Moscow, Smolensk, and Gomel, and keep stability above the crisis floor."
soviet_collapse_guard_capital_dispatches_success_tt: "§CMoscow Authority§! and §YCommand Obedience§! rise.§!\n§RArmed Breakaway Momentum§! falls as ministry orders receive replies.§!"
soviet_collapse_guard_capital_dispatches_failure_tt: "§CMoscow Authority§! falls.§!\n§TForeign Penetration§! and §RArmed Breakaway Momentum§! rise as silent ministries become evidence against the center.§!"
soviet_collapse_secure_western_depot_belt: "Secure the Western Depot Belt"
soviet_collapse_secure_western_depot_belt_desc: "Western depots decide whether declarations become armies. Moscow must post guards and keep supply accounting alive before the stores choose local seals."
soviet_collapse_secure_western_depot_belt_req_tt: "Station enough divisions around Kyiv, Minsk, Kharkov, and Dnipropetrovsk while maintaining supply-node capacity."
soviet_collapse_secure_western_depot_belt_success_tt: "§8Depot Vulnerability§! and rail pressure fall.§!\n§YThe western depot belt remains under central accounting.§!"
soviet_collapse_secure_western_depot_belt_failure_tt: "§8Depot Vulnerability§! and League pressure rise.§!\n§RBreakaways and old movements find weapons in the missing ledger.§!"
soviet_collapse_freeze_caucasus_passes: "Freeze the Caucasus Passes"
soviet_collapse_freeze_caucasus_passes_desc: "The Caucasus cannot be managed from a speech. Mountain roads, oil routes, and border approaches need loyal troops before compact politics harden."
soviet_collapse_freeze_caucasus_passes_req_tt: "Place enough divisions in Georgia, Armenia, Azerbaijan, and Dagestan before the Caucasus compact route exists."
soviet_collapse_freeze_caucasus_passes_success_tt: "§TForeign Penetration§! and command strain fall in the Caucasus.§!\n§YMountain-pass pressure is contained for now.§!"
soviet_collapse_freeze_caucasus_passes_failure_tt: "§TForeign Penetration§! and §GOld Movement Resurgence§! rise.§!\n§RThe Caucasus gains room for compacts, liaisons, and mountain authorities.§!"
soviet_collapse_protect_ural_arsenal_belt: "Protect the Ural Arsenal Belt"
soviet_collapse_protect_ural_arsenal_belt_desc: "The Urals are not only factories; they are proof that central production still obeys. Moscow must guard the belt before arsenal states become credible."
soviet_collapse_protect_ural_arsenal_belt_req_tt: "Station enough divisions in the Ural industrial belt and retain a meaningful military factory base."
soviet_collapse_protect_ural_arsenal_belt_success_tt: "§YCommand Obedience§! and §TForeign Penetration§! improve around the arsenal belt.§!"
soviet_collapse_protect_ural_arsenal_belt_failure_tt: "§RFactory State Expansion Pressure and §GOld Movement Resurgence§! rise in the Urals.§!"
soviet_collapse_treaty_must_have_signatures: "The Treaty Must Have Signatures"
soviet_collapse_treaty_must_have_signatures_desc: "Autonomy cannot remain a rumor. Moscow must reserve Union support and secure signatures before republics learn that talks are only delay."
soviet_collapse_treaty_must_have_signatures_req_tt: "Reserve enough Union support points for negotiation, keep stability above the crisis floor, and keep League cohesion below the war threshold.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_medium_req|0]§! required."
soviet_collapse_treaty_must_have_signatures_success_tt: "§CMoscow Authority§! rises and §RArmed Breakaway Momentum§! falls.§!\n§YNegotiation remains a credible way to contain the crisis.§!\n§YUnion support points are spent.§!"
soviet_collapse_treaty_must_have_signatures_failure_tt: "§RRecognition windows open for breakaways.§!\n§TForeign Penetration§! rises as unsigned promises lose value.§!"
soviet_collapse_field_first_republican_line: "Field the First Republican Line"
soviet_collapse_field_first_republican_line_desc: "A declaration needs a line of soldiers. The republic must arm and organize regular formations before Moscow's first recovery campaign."
soviet_collapse_field_first_republican_line_req_tt: "Keep enough divisions, infantry equipment, support equipment, and domestic stability to form a credible first line.\nSupport equipment required: §R[?soviet_collapse_objective_support_equipment_req|0]§!."
soviet_collapse_field_first_republican_line_success_tt: "§RArmed Breakaway Momentum§! rises.§!\n§YThe republic spends support equipment and gains manpower and emergency infantry equipment.§!"
soviet_collapse_field_first_republican_line_failure_tt: "§CMoscow Authority§! rises locally.§!\n§RThe republic loses recognition progress and stability from mobilization failure.§!"
soviet_collapse_create_local_defense_committees: "Create Local Defense Committees"
soviet_collapse_create_local_defense_committees_desc: "Committees turn crowds, watch posts, and local offices into a defense system. They must remain republican, not a foreign client's militia."
soviet_collapse_create_local_defense_committees_req_tt: "Keep stability, maintain a minimum field force, avoid subject status, and reserve local support points.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_light_req|0]§! required."
soviet_collapse_create_local_defense_committees_success_tt: "§RArmed Breakaway Momentum§! rises.§!\n§YLocal support points are spent; committees provide manpower and emergency weapons.§!"
soviet_collapse_create_local_defense_committees_failure_tt: "§RLocal support falls and mobilization quality drops.§!\n§CMoscow Authority§! recovers locally.§!"
soviet_collapse_repair_local_rail_seal: "Repair the Local Rail Seal"
soviet_collapse_repair_local_rail_seal_desc: "The republic's trains need their own accounting seal before supply shortages turn into a political defeat."
soviet_collapse_repair_local_rail_seal_req_tt: "Maintain enough supply-node capacity and a basic field force."
soviet_collapse_repair_local_rail_seal_success_tt: "§YRecognition progress and depot control improve.§!\n§GLocal rail pressure falls under republican accounting.§!"
soviet_collapse_repair_local_rail_seal_failure_tt: "§8Depot Vulnerability§! and League pressure rise.§!\n§RThe rail shortage becomes a crisis report.§!"
soviet_collapse_stop_old_banners_rising: "Stop the Old Banners Rising"
soviet_collapse_stop_old_banners_rising_desc: "Normal republics must keep old militias, local ghosts, and depot raiders from becoming alternative governments."
soviet_collapse_stop_old_banners_rising_req_tt: "Keep stability, guard enough depots, and field enough divisions to contain irregular organizers."
soviet_collapse_stop_old_banners_rising_success_tt: "§GOld Movement Resurgence§! falls.§!\n§YThe republic proves it can contain its own hinterland.§!"
soviet_collapse_stop_old_banners_rising_failure_tt: "§GOld Movement Resurgence§! rises.§!\n§RAncient, anarchist, or regional claimants gain political room.§!"
soviet_collapse_defend_kyiv_without_barracks: "Defend Kyiv Without Becoming a Barracks"
soviet_collapse_defend_kyiv_without_barracks_desc: "Ukraine must defend Kyiv without letting military rule become the only visible government."
soviet_collapse_defend_kyiv_without_barracks_req_tt: "Control Kyiv, station enough divisions around Kyiv and the eastern line, and keep stability above the crisis floor."
soviet_collapse_defend_kyiv_without_barracks_success_tt: "§RArmed Breakaway Momentum§! rises.§!\n§YKyiv gains organized manpower and weapons without losing civilian legitimacy.§!"
soviet_collapse_defend_kyiv_without_barracks_failure_tt: "§RThe military route gains leverage and democratic credibility weakens.§!\n§CMoscow Authority§! recovers locally.§!"
soviet_collapse_hold_dnipro_line: "Hold the Dnipro Line"
soviet_collapse_hold_dnipro_line_desc: "Ukraine's river defense is a supply and legitimacy test, not only a trench line."
soviet_collapse_hold_dnipro_line_req_tt: "Place enough divisions on the Kyiv-Dnipropetrovsk-Odessa line and maintain supply-node capacity."
soviet_collapse_hold_dnipro_line_success_tt: "§TForeign Penetration§! pressure falls against the line.§!\n§YUkraine keeps a defensible route for later mobilization.§!"
soviet_collapse_hold_dnipro_line_failure_tt: "§RSoviet breakthrough pressure and old rural pressure rise.§!"
soviet_collapse_guard_grain_offices: "Guard the Grain Offices"
soviet_collapse_guard_grain_offices_desc: "The grain offices must stay administrative, not become a coercive emergency state by accident."
soviet_collapse_guard_grain_offices_req_tt: "Control Odessa, keep stability, and hold enough civilian factory capacity to manage food logistics."
soviet_collapse_guard_grain_offices_success_tt: "§GOld Movement Resurgence§! falls around the food system.§!\n§YUkraine keeps the grain economy under regular authority.§!"
soviet_collapse_guard_grain_offices_failure_tt: "§RFactory pressure, rural anger, and dark bread-state pressure rise.§!"
soviet_collapse_keep_forest_roads_open: "Keep the Forest Roads Open"
soviet_collapse_keep_forest_roads_open_desc: "Belarus survives through forest roads, rail approaches, and quiet logistics. The capital must not become an isolated symbol."
soviet_collapse_keep_forest_roads_open_req_tt: "Control Minsk, hold enough divisions around Minsk, Gomel, and Smolensk, and keep supply access."
soviet_collapse_keep_forest_roads_open_success_tt: "§YBelarus gains rail and recognition progress.§!\n§GDepot and rail pressure fall along the forest approaches.§!"
soviet_collapse_keep_forest_roads_open_failure_tt: "§RPartisan, railway, and Soviet approach pressure rise.§!"
soviet_collapse_guard_minsk_ledger: "Guard the Minsk Ledger"
soviet_collapse_guard_minsk_ledger_desc: "Belarus must keep rail accounting under republican authority before Moscow reopens the corridor ledger."
soviet_collapse_guard_minsk_ledger_req_tt: "Control Minsk, keep meaningful depot control, and maintain enough divisions."
soviet_collapse_guard_minsk_ledger_success_tt: "§YDepot control improves and emergency equipment is secured.§!\n§8Depot Vulnerability§! rises for Moscow.§!"
soviet_collapse_guard_minsk_ledger_failure_tt: "§CMoscow Authority§! recovers locally.§!\n§ROld rail-splinter pressure rises from the failed ledger defense.§!"
soviet_collapse_first_southern_capital_holds: "The First Southern Capital Holds"
soviet_collapse_first_southern_capital_holds_desc: "A southern republic must hold its capital long enough for the cascade to become coordination rather than rumor."
soviet_collapse_first_southern_capital_holds_req_tt: "Place enough divisions around southern capitals and keep stability above the crisis floor."
soviet_collapse_first_southern_capital_holds_success_tt: "§RSouthern Cascade Pressure and breakaway confidence rise.§!\n§YThe southern republic receives emergency manpower and weapons.§!"
soviet_collapse_first_southern_capital_holds_failure_tt: "§GMoscow gains time in Central Asia.§!\n§RThe southern republic loses legitimacy and mobilization quality.§!"
soviet_collapse_mountain_passes_decide: "The Mountain Passes Decide"
soviet_collapse_mountain_passes_decide_desc: "Tajik, Kyrgyz, and Turkestan routes live or die on passes before foreign or Soviet raids arrive."
soviet_collapse_mountain_passes_decide_req_tt: "Hold enough divisions in the southern mountain and steppe approach states and keep a field force in being."
soviet_collapse_mountain_passes_decide_success_tt: "§TForeign Penetration§! pressure falls against the passes.§!\n§YMountain defense becomes a real military route.§!"
soviet_collapse_mountain_passes_decide_failure_tt: "§TForeign Penetration§! and old regional movement pressure rise in the passes.§!"
soviet_collapse_one_front_three_capitals: "One Front, Three Capitals"
soviet_collapse_one_front_three_capitals_desc: "The League must show that three member capitals can survive under a shared front, not only shared statements."
soviet_collapse_one_front_three_capitals_req_tt: "Keep at least three League member capitals controlled, field enough divisions, keep §BLeague Cohesion§! above the crisis floor, and reserve a heavy support-point bloc.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_heavy_req|0]§! required."
soviet_collapse_one_front_three_capitals_success_tt: "§BLeague Cohesion§! rises and §TForeign Penetration§! falls.§!\n§YThe League spends a heavy support-point bloc and becomes harder for Moscow or patrons to split.§!\n§RHeavy support spending can raise §TForeign Penetration§!, §RArmed Breakaway Momentum§!, and §YCommand Obedience§! loss.§!"
soviet_collapse_one_front_three_capitals_failure_tt: "§BLeague Cohesion§! falls and foreign patrons find room inside the alliance.§!"
soviet_collapse_shared_depot_accounting: "Shared Depot Accounting"
soviet_collapse_shared_depot_accounting_desc: "League members must share captured depots before smaller republics decide foreign patrons are safer than allies."
soviet_collapse_shared_depot_accounting_req_tt: "Keep §BLeague Cohesion§!, hold depot control, and retain enough infantry equipment for shared inventories."
soviet_collapse_shared_depot_accounting_success_tt: "§BLeague Cohesion§! rises.§!\n§TForeign Penetration§! falls as the League solves a logistics problem internally.§!"
soviet_collapse_shared_depot_accounting_failure_tt: "§BLeague Cohesion§! falls and §TForeign Penetration§! rises through hoarding disputes.§!"
soviet_collapse_arm_without_owning: "Arm Without Owning"
soviet_collapse_arm_without_owning_desc: "A patron can help a republic without making it look owned. That restraint is a mission with a deadline."
soviet_collapse_arm_without_owning_req_tt: "Hold enough infantry equipment, have civilian capacity, and avoid direct war with Moscow."
soviet_collapse_arm_without_owning_success_tt: "§TForeign Penetration§! rises through aid, but §GOld Movement Resurgence§! falls as regular channels crowd out stranger patrons.§!"
soviet_collapse_arm_without_owning_failure_tt: "§GOld Movement Resurgence§! rises as failed aid pushes republics toward harsher sponsors.§!"
soviet_collapse_relief_before_recognition: "Relief Before Recognition"
soviet_collapse_relief_before_recognition_desc: "Democratic patrons can send relief and observers before formal recognition makes the crisis a great-power confrontation."
soviet_collapse_relief_before_recognition_req_tt: "Have a large civilian economy, avoid direct war with Moscow, and keep domestic stability."
soviet_collapse_relief_before_recognition_success_tt: "§TForeign Penetration§! rises through legal relief channels.§!\n§GOld Movement Resurgence§! falls as humanitarian routes stabilize regular republics.§!"
soviet_collapse_relief_before_recognition_failure_tt: "§GOld Movement Resurgence§! rises as relief routes are captured, politicized, or delayed.§!"
soviet_collapse_worker_housing_deadline: "The Workers Need Housing"
soviet_collapse_worker_housing_deadline_desc: "The Civilian Factory of Russia must build housing and infrastructure before construction sovereignty becomes another ration queue."
soviet_collapse_worker_housing_deadline_req_tt: "Hold enough civilian factories, supply access, and worker stability."
soviet_collapse_worker_housing_deadline_success_tt: "§GOld Movement Resurgence§! falls in construction cities.§!\n§YThe reconstruction state gains recognition progress.§!"
soviet_collapse_worker_housing_deadline_failure_tt: "§RFactory State Expansion Pressure rises through strikes, unrest, and coercive construction politics.§!"
soviet_collapse_production_quota_ultimatum: "The Production Quota Ultimatum"
soviet_collapse_production_quota_ultimatum_desc: "The Military Factory of Russia must meet the quota before the arsenal state radicalizes around failure."
soviet_collapse_production_quota_ultimatum_req_tt: "Control enough military factories, keep infantry equipment in stock, and maintain war support."
soviet_collapse_production_quota_ultimatum_success_tt: "§YThe arsenal state gains recognition progress through production discipline.§!"
soviet_collapse_production_quota_ultimatum_failure_tt: "§RDepot panic and machine-state radicalization rise from the missed quota.§!"
soviet_collapse_restore_volga_trade_road: "Restore the Volga Trade Road"
soviet_collapse_restore_volga_trade_road_desc: "Old Great Bulgaria must turn assemblies into movement: river crossings, customs houses, and trade seals."
soviet_collapse_restore_volga_trade_road_req_tt: "Control Kazan, keep supply-node access, and hold recognition progress."
soviet_collapse_restore_volga_trade_road_success_tt: "§YOld Great Bulgaria gains stability and recognition progress.§!\n§GOld Movement Resurgence§! rises because the Volga road becomes real.§!"
soviet_collapse_restore_volga_trade_road_failure_tt: "§GOld Movement Resurgence§! falls as the road remains a rumor.§!\n§ROld Great Bulgaria loses stability.§!"
soviet_collapse_train_does_not_stop: "The Train Does Not Stop"
soviet_collapse_train_does_not_stop_desc: "The Pale Railway Authority must hold a rail chain and prove that neither Moscow nor the League owns the timetable."
soviet_collapse_train_does_not_stop_req_tt: "Place enough railway guards across the Minsk-Gomel-Smolensk-Leningrad chain and maintain supply-node capacity."
soviet_collapse_train_does_not_stop_success_tt: "§YRail sovereignty gains depot and recognition progress.§!\n§GOld Movement Resurgence§! rises around the railway state.§!"
soviet_collapse_train_does_not_stop_failure_tt: "§RThe railway authority loses route identity and depot control falls.§!"
soviet_collapse_furnace_oath: "Furnace Oath"
soviet_collapse_furnace_oath_desc: "The Iron Liturgy must bind factories, equipment, and guards into a sovereign machine rite before workers or rivals break the claim."
soviet_collapse_furnace_oath_req_tt: "Control military factories, keep infantry equipment in stock, and maintain war support."
soviet_collapse_furnace_oath_success_tt: "§YThe machine-state route gains recognition progress.§!"
soviet_collapse_furnace_oath_failure_tt: "§RFactory State Expansion Pressure and depot panic rise from the failed oath.§!"
soviet_collapse_lost_fleet_answers: "The Lost Fleet Answers"
soviet_collapse_lost_fleet_answers_desc: "A naval splinter must hold a port signal and armed detachments before the fleet remains only a report."
soviet_collapse_lost_fleet_answers_req_tt: "Place enough port guards around Leningrad, Murmansk, or Vladivostok and keep a basic field force."
soviet_collapse_lost_fleet_answers_success_tt: "§YThe naval splinter gains legitimacy and recognition progress.§!\n§GOld Movement Resurgence§! rises around the port signal.§!"
soviet_collapse_lost_fleet_answers_failure_tt: "§GOld Movement Resurgence§! falls as the signal dies into rumor.§!"
soviet_collapse_black_banner_congress: "The Black Banner Congress"
soviet_collapse_black_banner_congress_desc: "The anarchist route must gather armed rural centers without becoming a normal state or a patron's tool."
soviet_collapse_black_banner_congress_req_tt: "Keep enough divisions, depot control, and independence from subject status."
soviet_collapse_black_banner_congress_success_tt: "§GOld Movement Resurgence§! rises because the Black Banner has a congress, not only raids.§!"
soviet_collapse_black_banner_congress_failure_tt: "§GThe movement fractures into local militia reports instead of a durable route.§!"
soviet_collapse_restore_union_ledger: "Restore the Union Ledger"
soviet_collapse_restore_union_ledger_desc: "Moscow can close the crisis only when authority and depot accounting fall back below emergency levels."
soviet_collapse_restore_union_ledger_req_tt: "Keep §CMoscow Authority§! above the recovery threshold, §8Depot Vulnerability§! below the danger threshold, and stability above the crisis floor."
soviet_collapse_restore_union_ledger_success_tt: "§CMoscow Authority§! rises while §RArmed Breakaway Momentum§! and §GOld Movement Resurgence§! fall.§!"
soviet_collapse_restore_union_ledger_failure_tt: "§RThe cleanup fails: §CMoscow Authority§! falls and old movements keep recurring space.§!"
soviet_collapse_ratify_league_settlement: "Ratify the League Settlement"
soviet_collapse_ratify_league_settlement_desc: "A surviving League must become a settlement before its emergency front decays into patron blocs and border disputes."
soviet_collapse_ratify_league_settlement_req_tt: "Keep §BLeague Cohesion§! high, remain independent, maintain stability, and reserve support points for ratification.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_medium_req|0]§! required."
soviet_collapse_ratify_league_settlement_success_tt: "§BLeague Cohesion§! rises and §TForeign Penetration§! falls.§!\n§YSupport points are spent as the emergency coalition becomes a durable settlement route.§!"
soviet_collapse_ratify_league_settlement_failure_tt: "§BLeague Cohesion§! falls and foreign patrons gain openings in the settlement process.§!"
soviet_collapse_no_foreign_master: "No Foreign Master"
soviet_collapse_no_foreign_master_desc: "A republic can survive aid and still prove that recognition did not turn into ownership."
soviet_collapse_no_foreign_master_req_tt: "Remain independent, keep §TForeign Penetration§! below the war threshold, hold recognition progress, and reserve support points for a republican-led channel.\nSupport points: §Y[?soviet_collapse_objective_support_points|0]§! / §R[?soviet_collapse_objective_support_medium_req|0]§! required."
soviet_collapse_no_foreign_master_success_tt: "§YSupport points are spent and recognition progress rises through independent legitimacy.§!\n§TForeign Penetration§! remains a visible risk rather than a hidden shortcut.§!"
soviet_collapse_no_foreign_master_failure_tt: "§RRecognition stalls and old or harsher patrons gain political room.§!"
soviet_collapse_southern_settlement: "The Southern Settlement"
soviet_collapse_southern_settlement_desc: "Central Asia cannot be left as isolated Kazakhstan plus loose border crises. The south needs a shared settlement before the western crisis ends."
soviet_collapse_southern_settlement_req_tt: "Have either §CMoscow Authority§! or §BLeague Cohesion§! above the settlement threshold, avoid an isolated Kazakhstan penalty, and keep enough divisions available."
soviet_collapse_southern_settlement_success_tt: "§GSouthern Cascade Pressure and §GOld Movement Resurgence§! fall.§!\n§YThe southern crisis receives a settlement route instead of dangling pressure.§!"
soviet_collapse_southern_settlement_failure_tt: "§RSouthern Cascade Pressure and §GOld Movement Resurgence§! remain after the main settlement.§!"
chaosx.nr5.71.t: "Western Districts Answer"
chaosx.nr5.71.d: "The western military district reports arrive with unit stamps, fuel ledgers, and rail routing numbers attached. Moscow has not solved the breakaway crisis, but it has proved that some orders still become physical positions before the republics can rewrite the line."
chaosx.nr5.71.a: "The order reached the ground."
chaosx.nr5.72.t: "The Western Districts Waited"
chaosx.nr5.72.d: "The deadline passes with too many units still outside the assigned districts. Local officers learn which orders can be ignored, foreign desks learn where the line is thin, and depot clerks begin asking whether Moscow's seal still moves trains."
chaosx.nr5.72.a: "The maps arrive late."
chaosx.nr5.73.t: "Manifests Return to Moscow"
chaosx.nr5.73.d: "The Minsk-Kyiv ledger reopens under armed guard. Some entries are missing, some freight was rerouted, and some station chiefs answer carefully, but the railway has again admitted that Moscow's accounting exists."
chaosx.nr5.73.a: "Count the cars."
chaosx.nr5.74.t: "Trains with Local Seals"
chaosx.nr5.74.d: "The rail deadline fails. Freight arrives with local seals, old stamps, or no destination code at all. Depots along the corridor learn that a missing manifest is a political opportunity."
chaosx.nr5.74.a: "The timetable chose a side."
chaosx.nr5.75.t: "The Southern Gate Holds"
chaosx.nr5.75.d: "Garrisons report from the southern rail and mountain approaches before the crisis can turn one republic's hesitation into a chain reaction. Foreign missions still watch the border, but the first answer they see is a guarded junction."
chaosx.nr5.75.a: "Keep the gates counted."
chaosx.nr5.76.t: "The Southern Gate Opens"
chaosx.nr5.76.d: "The southern deadline passes without enough loyal formations in place. Border rumors travel faster than orders, old regional names return to village meetings, and every southern republic asks whether it should move before Kazakhstan or after it."
chaosx.nr5.76.a: "The cascade has a road."
chaosx.nr5.77.t: "The Telegram Is Printed Abroad"
chaosx.nr5.77.d: "The republic holds its capital long enough for foreign papers, embassies, and exile committees to change vocabulary. The word rebel does not vanish, but it must now compete with government."
chaosx.nr5.77.a: "The declaration has survived the first reading."
chaosx.nr5.78.t: "A Declaration in Exile"
chaosx.nr5.78.d: "The deadline passes without a credible capital defense. The declaration still exists in speeches, seals, and desperate messages, but foreign observers mark it as a government without a guarded room."
chaosx.nr5.78.a: "The telegram has no office."
chaosx.nr5.79.t: "The First Depot Opens"
chaosx.nr5.79.d: "The depot guards accept the republic's order before Moscow can restore the old ledger. Rifles, crates, and fuel books turn the declaration into an army problem."
chaosx.nr5.79.a: "The locks answer locally."
chaosx.nr5.80.t: "The Depot Remains Closed"
chaosx.nr5.80.d: "The first depot objective fails. The committees argue, the guards wait, and Moscow's officers learn that this republic cannot yet turn emergency legitimacy into stored ammunition."
chaosx.nr5.80.a: "A flag without a storehouse."
chaosx.nr5.81.t: "The Corridor Is Recognized"
chaosx.nr5.81.d: "The liaison route holds long enough to be treated as more than a rumor. Couriers, observers, and cautious patrons begin using the corridor as if the republic's border can be found on a map."
chaosx.nr5.81.a: "The route has witnesses."
chaosx.nr5.82.t: "The Corridor Closes Quietly"
chaosx.nr5.82.d: "The recognition corridor misses its deadline. Patrons deny promises, liaison offices reduce their hours, and the republic discovers that foreign attention can disappear without a defeat."
chaosx.nr5.82.a: "A corridor can fail without a battle."
chaosx.nr5.83.t: "The Eastern Route Opens"
chaosx.nr5.83.d: "A foreign patron commits troops, stores, and risk to an eastern liaison route. Moscow's diplomats call it interference. The breakaways call it proof that the map is no longer closed."
chaosx.nr5.83.a: "The border is no longer quiet."
chaosx.nr5.84.t: "The Eastern Route Fails"
chaosx.nr5.84.d: "The promised liaison route fails before the first shipment can become policy. Moscow records the failure loudly, and undecided committees ask whether foreign guarantees are only another kind of rumor."
chaosx.nr5.84.a: "The route was only ink."
chaosx.nr5.85.t: "Recognition Without War"
chaosx.nr5.85.d: "The recognition campaign succeeds without direct war. Observers, credits, and carefully worded notices give the breakaways a legal corridor while avoiding an immediate great-power battlefield."
chaosx.nr5.85.a: "The stamp avoids the gun."
chaosx.nr5.86.t: "Recognition Delayed"
chaosx.nr5.86.d: "The recognition campaign fails to meet its own deadline. The delay does not calm the crisis. It teaches republics that moderate patrons hesitate and that harder sponsors may answer faster."
chaosx.nr5.86.a: "Someone else will answer."
chaosx.nr5.87.t: "The Quota Is Poured"
chaosx.nr5.87.d: "The Civilian Factory of Russia meets the construction deadline. Housing ledgers, cement queues, and unfinished sites become evidence that the state can build faster than its rivals can govern."
chaosx.nr5.87.a: "The concrete votes."
chaosx.nr5.88.t: "The Quota Cracks"
chaosx.nr5.88.d: "The construction quota fails. Workers blame the board, rivals blame the entire idea of a factory state, and the unfinished sites become arguments for harsher discipline."
chaosx.nr5.88.a: "The forms cannot hold the roof."
chaosx.nr5.89.t: "The Corridor Is Armed"
chaosx.nr5.89.d: "The Military Factory of Russia meets its armament deadline. Rifles leave the halls under factory guard, and the arsenal state proves that production orders can become frontier power."
chaosx.nr5.89.a: "Output has crossed the gate."
chaosx.nr5.90.t: "The Arsenal Misses the Order"
chaosx.nr5.90.d: "The Military Factory misses the corridor order. Stockpiles are counted again, guards argue with workers, and rivals begin looking at the arsenal as a depot waiting to be taken."
chaosx.nr5.90.a: "The order book is not a rifle."
chaosx.nr5.91.t: "The Volga Assemblies Gather"
chaosx.nr5.91.d: "Old Great Bulgaria gathers enough councils, river guards, and public witnesses to make the Volga assembly more than theater. The ancient name has not solved modern administration, but it has forced neighbors to answer it."
chaosx.nr5.91.a: "The old name has a room."
chaosx.nr5.92.t: "The Volga Assembly Fails"
chaosx.nr5.92.d: "The assembly deadline passes with too few guards, too little recognition, and too many neighboring doubts. The restoration survives, but the Volga learns how easily an ancient claim can become a bargaining token."
chaosx.nr5.92.a: "A throne without benches."
chaosx.nr5.93.t: "The League Keeps Its Calendar"
chaosx.nr5.93.d: "The Free Republics' League meets on time, argues in public, and still issues a common timetable. Foreign patrons find fewer empty rooms to occupy, while Moscow learns that breakaway coordination can survive its own members."
chaosx.nr5.93.a: "The calendar remains republican."
chaosx.nr5.94.t: "The League Misses Its Own Meeting"
chaosx.nr5.94.d: "The League deadline passes with delegations late, guards reassigned, and patrons waiting in the hall. The organization still exists, but every missed signature gives outsiders a larger place at the table."
chaosx.nr5.94.a: "A common front can become a corridor."
