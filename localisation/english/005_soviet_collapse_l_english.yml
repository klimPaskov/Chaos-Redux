soviet_collapse_join_free_republics_league: "Join the Free Republics' League"
soviet_collapse_join_free_republics_league_desc: "Enter the defensive league built by the surviving breakaway republics."
soviet_collapse_join_free_republics_league_tt: "This republic joins the Free Republics' League faction."
soviet_collapse_request_foreign_recognition: "Request Foreign Recognition"
soviet_collapse_request_foreign_recognition_desc: "Ask foreign governments to treat the republic as a government rather than a mutiny."
soviet_collapse_request_foreign_recognition_req_tt: "£stability_texticon 30%; §YRecognition Progress§! below 100; war with Moscow or visible deterioration in Moscow's control; Soviet crisis pressure below preterminal guardrails."
soviet_collapse_request_foreign_recognition_tt: "Recognition progress rises. If completed, foreign volunteer support arrives."
soviet_collapse_adopt_existing_republic_crisis_mandate: "Adopt a Crisis Mandate"
soviet_collapse_adopt_existing_republic_crisis_mandate_desc: "Use existing ministries, deputies, and legal seals to turn the collapse emergency into a republican mandate instead of a replacement government."
soviet_collapse_adopt_existing_republic_crisis_mandate_tt: "Improves stability, raises recognition progress, strengthens republican institutions, and increases republican confidence."
soviet_collapse_integrate_existing_republic_staff: "Integrate Republican Staff"
soviet_collapse_integrate_existing_republic_staff_desc: "Fold the republic's standing officers, district commands, and emergency committees into the crisis command without discarding its existing institutions."
soviet_collapse_integrate_existing_republic_staff_tt: "Adds army experience, command power, defensive works, and dynamic emergency support. League or regional faction members also strengthen coordination."
soviet_collapse_open_existing_republic_liaisons: "Open Republic Liaison Offices"
soviet_collapse_open_existing_republic_liaisons_desc: "Send accredited offices to neighboring republics, foreign missions, and League contacts while the existing government keeps its own program."
soviet_collapse_open_existing_republic_liaisons_tt: "Raises recognition progress, opens League cooperation when possible, and steers regional factions toward recognition."
soviet_collapse_existing_republic_open_volunteer_channels: "Open Existing Volunteer Channels"
soviet_collapse_existing_republic_open_volunteer_channels_desc: "Use standing ministries, veterans' rolls, border offices, and district staffs to register volunteers without replacing the republic's existing institutions."
soviet_collapse_existing_republic_open_volunteer_channels_tt: "Pays the dynamic military cost, opens a one-time volunteer package scaled by the crisis state, and links League or regional-faction members into the same coordination systems."
soviet_collapse_existing_republic_screen_patronage_channels: "Screen Patronage Channels"
soviet_collapse_existing_republic_screen_patronage_channels_desc: "Audit foreign liaison promises through the republic's existing ministries before private patrons turn aid routes into rival political accounts."
soviet_collapse_existing_republic_screen_patronage_channels_tt: "Pays the dynamic political cost, reduces patron rivalry and promise pressure, improves recognition progress, and lowers Soviet foreign-pressure feedback."
soviet_collapse_mobilize_defense_units: "Mobilize Defense Units"
soviet_collapse_mobilize_defense_units_desc: "Turn defense committees and defecting garrisons into a stronger emergency army."
soviet_collapse_mobilize_defense_units_req_tt: "£stability_texticon 35% floor; £pol_power 35; £command_power 20; room for emergency institutions to absorb new units; active pressure from war, a collapsing Moscow position, or a high union crisis."
soviet_collapse_mobilize_defense_units_tt: "Spends local stability, political power, and command power to raise emergency units and strengthen republican institutions. Internal compact routes may open separate militia, road, and common-front actions."
soviet_collapse_seize_depots: "Seize Depots"
soviet_collapse_seize_depots_desc: "Take control of Soviet military stores before Moscow can audit, evacuate, or destroy them."
soviet_collapse_seize_depots_req_tt: "£army_experience 18  £command_power 15; §8Depot Control§! below its cap; war with Moscow or Soviet §8Depot Vulnerability§! at the exposed-depot gate; Soviet crisis pressure below the preterminal guardrail."
soviet_collapse_seize_depots_tt: "Depot control rises and Moscow's §8Depot Vulnerability§! increases. Northern, Yakut, Volga-Ural, and depot-defense compacts can turn this into separate rail, fuel, and resource boards."
soviet_collapse_call_other_republics_to_rise: "Call Other Republics to Rise"
soviet_collapse_call_other_republics_to_rise_desc: "Broadcast proof that refusal can survive and invite another republic to reject Moscow's orders."
soviet_collapse_call_other_republics_to_rise_tt: "Moscow may lose another republic if a valid candidate remains."
soviet_collapse_coordinate_fronts: "Coordinate Fronts"
soviet_collapse_coordinate_fronts_desc: "Share maps, radio channels, liaison officers, and reserve plans across the League."
soviet_collapse_coordinate_fronts_req_tt: "£GFX_fuel_texticon 3000  £support_equipment_text_icon 60; §BLeague Coordination§! below its cap; faction membership or an announced Free Republics' League; Soviet crisis pressure below the preterminal guardrail."
soviet_collapse_coordinate_fronts_tt: "League cohesion rises and League members strengthen their shared coordination. Black Sea, Free Republics, neighbor-oath, and common-front compacts can open their own liaison actions."
soviet_collapse_launch_high_chaos_offensive: "Launch Republican Offensive"
soviet_collapse_launch_high_chaos_offensive_desc: "Commit fuel, support equipment, and emergency field staffs to turn the crisis into an open war before Moscow can freeze the front."
soviet_collapse_launch_high_chaos_offensive_req_tt: "Requires high chaos or severe Union Crisis Threat, no active war with Moscow, a legal war declaration path, fuel, command power, support equipment, and either field forces or a functioning republican command."
soviet_collapse_launch_high_chaos_offensive_tt: "The republic declares war on Moscow, raises emergency guard units, and sharply increases Soviet breakaway pressure."
soviet_collapse_compact_northern_rail_timber_board: "Convene the Rail and Timber Board"
soviet_collapse_compact_northern_rail_timber_board_desc: "Put northern railmen, timber offices, mine guards, and Arctic convoy clerks under a republican board before Moscow can split their ledgers apart."
soviet_collapse_compact_northern_rail_timber_board_req_tt: "£army_experience 18  £command_power 15; requires the Northern Republic Accord or Yakut Arctic Resource Compact and an unused northern rail payoff."
soviet_collapse_compact_northern_rail_timber_board_tt: "Spends army experience and command power to strengthen depot control, institutions, resilience, and rail equipment. Moscow's depot vulnerability rises."
soviet_collapse_compact_volga_ural_oilfield_security: "Guard the Volga-Ural Oilfields"
soviet_collapse_compact_volga_ural_oilfield_security_desc: "Use workshop committees, fuel officers, and depot clauses to keep the Volga-Ural route moving under republican guard."
soviet_collapse_compact_volga_ural_oilfield_security_req_tt: "£GFX_fuel_texticon 3000  £support_equipment_text_icon 60; requires the Volga-Ural Compact or Depot Mutual Defense Clauses and an unused oilfield payoff."
soviet_collapse_compact_volga_ural_oilfield_security_tt: "Spends fuel and support equipment, then returns secured fuel stores, support equipment, depot control, and resilience. Moscow's depot vulnerability rises."
soviet_collapse_compact_black_sea_observer_vote: "Seat the Black Sea Observers"
soviet_collapse_compact_black_sea_observer_vote_desc: "Give observer delegations a formal vote in liaison rooms so port access, customs notes, and neighbor oaths become recognized policy."
soviet_collapse_compact_black_sea_observer_vote_req_tt: "£stability_texticon 1%; requires Black Sea Compact Observers or Neighbor Oaths and an unused Black Sea observer payoff."
soviet_collapse_compact_black_sea_observer_vote_tt: "Spends stability to raise recognition progress, liaison reach, and League support. Soviet foreign pressure rises."
soviet_collapse_compact_tuvan_border_road_pact: "Approve the Tuvan Border-Road Pact"
soviet_collapse_compact_tuvan_border_road_pact_desc: "Fund border-road columns, steppe patrol lists, and relay posts that let the compact defend open country without waiting for Moscow's orders."
soviet_collapse_compact_tuvan_border_road_pact_req_tt: "£stability_texticon 35% floor  £pol_power 35  £command_power 20; requires the Tuvan Steppe Compact and an unused Tuvan road payoff."
soviet_collapse_compact_tuvan_border_road_pact_tt: "Spends political power and command power to gain manpower, infantry equipment, resilience, and war support."
soviet_collapse_compact_common_front_volunteer_standards: "Issue Common-Front Volunteer Standards"
soviet_collapse_compact_common_front_volunteer_standards_desc: "Turn the Free Republics wire, common-front committees, and volunteer standards into a single registration order."
soviet_collapse_compact_common_front_volunteer_standards_req_tt: "£stability_texticon 35% floor  £pol_power 35  £command_power 20; requires Republic Volunteer Standards, Many Republics Common Front, or Free Republics Wire and an unused common-front payoff."
soviet_collapse_compact_common_front_volunteer_standards_tt: "Spends political power and command power to gain manpower, support equipment, League support, liaison reach, and resilience. League pressure on Moscow rises."
soviet_collapse_open_exile_volunteer_rolls: "Open Exile Volunteer Rolls"
soviet_collapse_open_exile_volunteer_rolls_desc: "Register exiles, stranded soldiers, border refugees, and return committees as volunteer manpower before rival patrons turn them into private clients."
soviet_collapse_open_exile_volunteer_rolls_tt: "Dynamic exile manpower and equipment arrive based on owned states, Soviet §TForeign Penetration§!, depot pressure, war state, and League membership."
soviet_collapse_accept_ideological_brigades: "Accept Ideological Brigades"
soviet_collapse_accept_ideological_brigades_desc: "Permit foreign parties, veterans' committees, and ideological societies to raise brigades under republican oversight."
soviet_collapse_accept_ideological_brigades_tt: "Ideological brigades bring volunteers, equipment, army experience, and recognition progress, but political stability suffers."
soviet_collapse_host_medical_missions: "Host Medical Missions"
soviet_collapse_host_medical_missions_desc: "Invite doctors, ambulances, relief committees, and hospital trains that make foreign support harder to denounce as mere arms smuggling."
soviet_collapse_host_medical_missions_tt: "Medical missions improve stability, war support, casualty handling, recognition progress, and foreign pressure."
soviet_collapse_mobilize_prisoner_volunteers: "Mobilize Prisoner Volunteers"
soviet_collapse_mobilize_prisoner_volunteers_desc: "Screen prisoners, defectors, and disciplinary companies for a chance to fight under guarded republican battalions."
soviet_collapse_mobilize_prisoner_volunteers_tt: "War-only prisoner battalions add manpower, command power, equipment, and recognition pressure, but reduce stability."
soviet_collapse_raise_high_chaos_volunteers: "Raise Aberrant Volunteer Columns"
soviet_collapse_raise_high_chaos_volunteers_desc: "Accept fighters arriving under borrowed banners, old oaths, disputed registries, and committee papers that no ministry wants to authenticate."
soviet_collapse_raise_high_chaos_volunteers_tt: "High-chaos volunteers add manpower, equipment, depot control, and recognition pressure while increasing §GOld Movement Resurgence§! and lowering stability."
soviet_collapse_send_league_volunteers: "Send League Volunteer Detachments"
soviet_collapse_send_league_volunteers_desc: "Route registered volunteers, rifles, medics, and committee officers to another Free Republics' League member whose front can use them more."
soviet_collapse_send_league_volunteers_tt: "A selected League member receives dynamic volunteer manpower, infantry equipment, recognition progress, depot control, and foreign volunteer support. The sender pays the breakaway political-power cost."
soviet_collapse_bargain_black_banner_committees: "Bargain with Black Banner Committees"
soviet_collapse_bargain_black_banner_committees_desc: "Accept an unruly defensive arrangement with the black-flag committees in the south before Moscow or local requisition parties drive them into open revolt."
soviet_collapse_bargain_black_banner_committees_tt: "Ukraine gains Black Banner Defense Committees, irregular manpower, equipment, and army experience. §RArmed Breakaway Momentum§! and §GOld Movement Resurgence§! rise, while §BLeague Cohesion§! suffers if the League exists."
soviet_collapse_contain_black_banner_committees: "Contain the Black Banner Committees"
soviet_collapse_contain_black_banner_committees_desc: "Send republican officers, mediators, and security detachments to bring the black-flag committees back under national command."
soviet_collapse_contain_black_banner_committees_tt: "Ukraine removes the Black Banner Defense Committees if present, gains stability, reduces §RArmed Breakaway Momentum§!, and gives Moscow a small authority recovery."

soviet_collapse_open_republic_aid_menu: "Show Decisions for [FROM.GetName]"
soviet_collapse_open_republic_aid_menu_desc: "Select this republic as the current foreign-intervention desk. Its aid, pressure, treaty, and client-state decisions appear below this entry."
soviet_collapse_open_republic_aid_menu_tt: "Foreign intervention decisions appear for §Y[FROM.GetName]§!."
soviet_collapse_close_republic_aid_menu: "Hide Decisions for [FROM.GetName]"
soviet_collapse_close_republic_aid_menu_desc: "Close this republic's foreign-intervention desk and return it to the compact breakaway list."
soviet_collapse_close_republic_aid_menu_tt: "Foreign intervention decisions are hidden for §Y[FROM.GetName]§!."
soviet_collapse_recognize_breakaway_government: "Recognize a Breakaway Government"
soviet_collapse_recognize_breakaway_government_desc: "Name one surviving republic as a government with offices, envoys, and legal standing rather than an internal Soviet mutiny.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_recognize_breakaway_government_tt: "A breakaway republic gains recognition progress. Industrial and border patrons provide stronger recognition pressure."
soviet_collapse_fund_ideological_liaison_offices: "Fund Ideological Liaison Offices"
soviet_collapse_fund_ideological_liaison_offices_desc: "Place party foundations, friendly newspapers, student circles, and advisory desks around one breakaway government before Moscow can define its politics alone.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_fund_ideological_liaison_offices_tt: "A breakaway republic gains patron-aligned ideology popularity and recognition progress. Industrial patrons spread stronger ideological support."
soviet_collapse_ship_border_armaments: "Ship Border Armaments"
soviet_collapse_ship_border_armaments_desc: "Move rifles, uniforms, ammunition, and radio sets through border committees and private warehouses before Moscow can close the routes.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_ship_border_armaments_tt: "A breakaway republic receives infantry equipment and depot control. Industrial and border patrons send larger packages."
soviet_collapse_dispatch_military_advisers: "Dispatch Military Advisers"
soviet_collapse_dispatch_military_advisers_desc: "Send officers under deniable missions to turn republican headquarters into commands that can survive Soviet pressure.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_dispatch_military_advisers_tt: "A breakaway republic gains army experience, command power, recognition progress, and stronger foreign support."
soviet_collapse_open_republican_intelligence_channel: "Open Republican Intelligence Channels"
soviet_collapse_open_republican_intelligence_channel_desc: "Share depot ledgers, rail movements, courier routes, and intercepted orders with one breakaway government.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_open_republican_intelligence_channel_tt: "A breakaway republic gains depot control while Moscow loses authority and faces higher foreign pressure."
soviet_collapse_sponsor_volunteer_corps: "Sponsor a Volunteer Corps"
soviet_collapse_sponsor_volunteer_corps_desc: "Let volunteers, veterans, and deniable instructors cross into the collapse under committee or private banners.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_sponsor_volunteer_corps_tt: "A breakaway republic receives an emergency field brigade assembled from sponsor-funded volunteers and rifles, stronger foreign support, and recognition progress. The target cannot absorb another foreign volunteer corps immediately."
soviet_collapse_negotiate_republican_trade_mission: "Negotiate a Republican Trade Mission"
soviet_collapse_negotiate_republican_trade_mission_desc: "Use trade offices, grain contracts, port agents, and banking channels to keep one republic's emergency government solvent.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_negotiate_republican_trade_mission_tt: "A breakaway republic gains political power, stability, and recognition progress. League members also strengthen League cohesion."
soviet_collapse_fund_civilian_construction_mission: "Fund Civilian Construction Mission"
soviet_collapse_fund_civilian_construction_mission_desc: "Send credits, engineers, fuel, and shipping to keep one republic's ministries, rail offices, and workshops functioning.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_fund_civilian_construction_mission_tt: "A breakaway republic gains civilian factories from the sponsor's economy, capped at five, plus infrastructure, industrial influence, logistics influence, and patronage risk. The sponsor carries a temporary consumer-goods burden, and the target cannot absorb another major foreign construction mission immediately."
soviet_collapse_fund_military_construction_mission: "Fund Military Construction Mission"
soviet_collapse_fund_military_construction_mission_desc: "Tie foreign staff work and material to fortification crews, air-defense sites, and emergency armaments workshops.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_fund_military_construction_mission_tt: "A breakaway republic gains military factories from the sponsor's economy, capped at five, plus anti-air, arms influence, industrial influence, logistics influence, and patronage risk. The sponsor carries a temporary consumer-goods burden, and the target cannot absorb another major foreign construction mission immediately."
soviet_collapse_sponsor_press_and_radio_network: "Sponsor Press and Radio Network"
soviet_collapse_sponsor_press_and_radio_network_desc: "Back newspapers, radio rooms, student desks, and party-friendly correspondents before Moscow's version of the crisis hardens.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_sponsor_press_and_radio_network_tt: "A breakaway republic gains ideological influence, recognition influence, and sponsor-aligned popularity."
soviet_collapse_secure_republican_aid_corridor: "Secure a Republican Aid Corridor"
soviet_collapse_secure_republican_aid_corridor_desc: "Commit fuel, rail stock, ships, and liaison officers to a route that later missions can use.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_secure_republican_aid_corridor_tt: "A breakaway republic opens an aid corridor, receives trains, and gains logistics, arms, and patronage influence."
soviet_collapse_build_republics_league_conference: "Build a Republics' League Conference"
soviet_collapse_build_republics_league_conference_desc: "Host delegates, observers, and military staff so one republic can balance patrons through a broader conference.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_build_republics_league_conference_tt: "A breakaway republic gains recognition, independence resilience, and League cohesion while Moscow faces stronger foreign and League pressure."
soviet_collapse_route_aid_through_league_logistics: "Route Aid Through League Logistics"
soviet_collapse_route_aid_through_league_logistics_desc: "Send aid through the Republics' League logistics council so supplies reach a member republic without making one sponsor its owner.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_route_aid_through_league_logistics_tt: "A League member receives distributed equipment, logistics influence, independence resilience, and League cohesion while patronage risk falls."
soviet_collapse_demand_anti_puppet_clause: "Demand an Anti-Puppet Clause"
soviet_collapse_demand_anti_puppet_clause_desc: "Attach guarantees to aid papers so foreign offices cannot turn emergency help into ownership.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_demand_anti_puppet_clause_tt: "A breakaway republic gains independence resilience and lowers patronage risk."
soviet_collapse_offer_new_union_treaty: "Offer a New Union Treaty"
soviet_collapse_offer_new_union_treaty_desc: "Put rail boards, depot ledgers, court guarantees, and emergency ministries into one treaty before the republic drifts fully into foreign hands."
soviet_collapse_offer_new_union_treaty_tt: "Moscow influence rises in the target republic, patronage risk falls, and the republic enters New Union negotiations."
soviet_collapse_offer_new_union_treaty_req_tt: "Requires a non-subject breakaway not at war with Moscow, manageable resilience and patronage risk, enough Moscow Authority, and Union Crisis Threat below the treaty ceiling."
soviet_collapse_open_republic_negotiation_table_target_desc: "Open a direct table with the selected breakaway. This is a pressure-relief channel, not a full reintegration treaty."
soviet_collapse_embed_loyal_republic_administrators_target_desc: "Use an existing channel to place loyal administrative staff inside the selected republic's emergency offices."
soviet_collapse_issue_republic_military_ultimatum_target_desc: "Warn the selected republic that foreign dependency or military defiance can become a direct Soviet campaign."
soviet_collapse_authorize_republic_punitive_operation_target_desc: "Begin a direct campaign against the selected republic."
soviet_collapse_offer_federal_reintegration_compact: "Offer a Federal Reintegration Compact"
soviet_collapse_offer_federal_reintegration_compact_desc: "Turn a treaty channel into a federated compact while the crisis is still low enough for deputies and officers to accept Moscow's terms."
soviet_collapse_offer_federal_reintegration_compact_tt: "A weak, unprotected republic becomes a federated Soviet subject if Moscow has dominant influence."
soviet_collapse_offer_federal_reintegration_compact_req_tt: "Requires New Union treaty eligibility, dominant Moscow influence, an open treaty track, a weak unprotected republic, and Union Crisis Threat below the compact ceiling."
soviet_collapse_offer_protection_treaty: "Offer Protection Treaty"
soviet_collapse_offer_protection_treaty_desc: "Wrap a vulnerable republic in formal guarantees, observer desks, and fuel-backed staff channels.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_offer_protection_treaty_tt: "The target gains recognition influence and patronage risk, opening the dependency chain."
soviet_collapse_demand_adviser_privileges: "Demand Adviser Privileges"
soviet_collapse_demand_adviser_privileges_desc: "Turn protection papers into command access, staff privileges, and foreign-supervised military offices.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_demand_adviser_privileges_tt: "The target grants adviser privileges, raising volunteer influence and patronage risk."
soviet_collapse_install_client_cabinet: "Install Client Cabinet"
soviet_collapse_install_client_cabinet_desc: "Use the treaty offices, adviser mission, and local weakness to place a dependency cabinet under foreign protection.$soviet_collapse_foreign_influence_contest_desc$"
soviet_collapse_install_client_cabinet_tt: "A weak, unprotected republic becomes this sponsor's puppet only if dependency pressure, dominant influence, and the republic's current strength all allow it."
soviet_collapse_patronage_contain_risk_tt: "Spend additional political power to contain the exposure and reduce Soviet foreign-pressure growth."
soviet_collapse_patronage_escalate_risk_tt: "Turn exposure into an open commitment. A breakaway receives additional recognition and depot control, but Soviet foreign pressure rises."
soviet_collapse_patron_specific_commitment_tt: "The patron formalizes a distinct channel with the supported republic, adding recognition, depot control, political backing, and competing-promise pressure."
chaosx.nr5.20.t: "Recognition Draws a Soviet Protest"
chaosx.nr5.20.d: "Moscow has answered the recognition mission with a formal protest, leaked cables, and threats against the republic receiving the envoys. The move has already stiffened breakaway morale, but the crisis can still be treated as a legal dispute rather than an open contest for the Soviet borderlands."
chaosx.nr5.20.a: "Keep the mission deniable."
chaosx.nr5.20.b: "Treat the protest as recognition of the facts."
chaosx.nr5.21.t: "Arms Convoy Exposed"
chaosx.nr5.21.d: "A border convoy carrying rifles, uniforms, radios, and field stores has been named by Soviet broadcasts and friendly journalists alike. Committees along the route deny official direction, but the republic receiving the crates is already counting them as proof that it has patrons beyond the old union."
chaosx.nr5.21.a: "Close the route and change the papers."
chaosx.nr5.21.b: "Send the next convoy under brighter flags."
chaosx.nr5.22.t: "Advisers Identified"
chaosx.nr5.22.d: "Officers attached to a republican headquarters have been identified by name, rank, and former command. The embarrassment can be contained as retirements, observers, and private contracts, or it can become the beginning of a declared training mission inside the collapse."
chaosx.nr5.22.a: "Recall the names, not the mission."
chaosx.nr5.22.b: "Let the mission stop pretending."
chaosx.nr5.23.t: "Intelligence Channel Burned"
chaosx.nr5.23.d: "Courier routes and coded exchanges with one breakaway government have been compromised. Moscow knows some of what was shared; the republic knows that the channel existed because someone considered it worth risking. The next decision is whether the channel closes quietly or hardens into a wider liaison office."
chaosx.nr5.23.a: "Burn the channel cleanly."
chaosx.nr5.23.b: "Replace secrecy with liaison."
chaosx.nr5.24.t: "Volunteer Scandal"
chaosx.nr5.24.d: "Volunteers crossing into the Soviet collapse have become a public scandal. Their committees claim private conscience; Soviet statements call them interventionists; breakaway recruiters call them the first visible proof that the republic is not alone."
chaosx.nr5.24.a: "Thin the rolls and deny coordination."
chaosx.nr5.24.b: "Let the volunteers become a corps."
chaosx.nr5.25.t: "Trade Mission Dependencies"
chaosx.nr5.25.d: "The republican trade mission has brought contracts, credit, and emergency supplies, but the documents also expose how dependent the breakaway governments have become on outside routes. The relationship can be folded back into commercial language or turned into a public guarantee of continued access."
chaosx.nr5.25.a: "Keep the ledgers commercial."
chaosx.nr5.25.b: "Guarantee the offices openly."
chaosx.nr5.26.t: "Liaison Offices Named"
chaosx.nr5.26.d: "Ideological liaison offices around one breakaway government have been named in Soviet statements, hostile papers, and local rumors. The supported republic has gained organizers, slogans, and outside legal advice, but every desk also invites Moscow to call the crisis a foreign attempt to rewrite the collapse's politics."
chaosx.nr5.26.a: "Keep the offices civic."
chaosx.nr5.26.b: "Make the affiliation public."
chaosx.nr5.50.t: "German Staff Rooms Demand Ledgers"
chaosx.nr5.50.d: "German officers and industrial agents want the republican channel written in inventories, rail priorities, and staff maps. Their help strengthens stores and planning, but it also teaches the supported government that Berlin's promises arrive with accounting columns attached."
chaosx.nr5.50.a: "Put the ledgers under seal."
chaosx.nr5.51.t: "British Envoys Ask for a Charter"
chaosx.nr5.51.d: "British representatives press the republic to make its requests sound like law rather than rebellion. Recognition language, League contacts, and parliamentary formulas arrive together, making the channel useful but increasingly hard to separate from other foreign promises."
chaosx.nr5.51.a: "Draft the charter language."
chaosx.nr5.52.t: "Japanese Liaison Follows the Rails"
chaosx.nr5.52.d: "Japanese officers care less for declarations than for depots, railway reach, and the eastern shape of the collapse. Their channel moves through logistics first and diplomacy second, giving the republic harder stores while drawing attention to who else is measuring the same corridors."
chaosx.nr5.52.a: "Keep the route marked."
chaosx.nr5.53.t: "French Missions Bring Doctors and Claims"
chaosx.nr5.53.d: "French delegates arrive with medical tables, legal memoranda, and public sympathy campaigns. The support steadies the republic's ministries, but every humanitarian office also becomes another place where competing patrons leave promises."
chaosx.nr5.53.a: "Let the missions file papers."
chaosx.nr5.54.t: "American Credits Require a Name"
chaosx.nr5.54.d: "American bankers, journalists, relief committees, and envoys ask what name should appear on contracts. The republic wants the credit and the public attention, while Washington wants proof that aid will not vanish into a border war without receipts."
chaosx.nr5.54.a: "Name the offices carefully."
chaosx.nr5.55.t: "Turkish Officers Count the Passes"
chaosx.nr5.55.d: "Turkish missions tie their help to passes, ports, Turkic committees, and the defensive line south of the collapse. Command rooms welcome the channel, but every border promise complicates the republic's relations with other patrons."
chaosx.nr5.55.a: "Mark the passes for liaison."
chaosx.nr5.56.t: "Persian Routes Price Their Silence"
chaosx.nr5.56.d: "Persian agents can move fuel, couriers, and quiet recognition through routes Moscow cannot easily close. The price is not always written as money: it is influence over which roads stay open and which republics receive priority."
chaosx.nr5.56.a: "Keep the southern road open."
chaosx.nr5.57.t: "Polish Committees Open the Border Rolls"
chaosx.nr5.57.d: "Polish border committees know how many exiles, rifles, and letters can cross before the old empire notices. Their help brings men and urgency, but Warsaw's guarantees compete with every other western promise made to the same republic."
chaosx.nr5.57.a: "Register the border rolls."
chaosx.nr5.58.t: "Romanian Warehouses Face the Dniester"
chaosx.nr5.58.d: "Romanian officers and merchants treat the collapse as a river problem: who controls the stores, crossings, and papers near the Dniester. Their aid strengthens local depots while giving Bucharest a claim on the republic's southern calculations."
chaosx.nr5.58.a: "Open the warehouses by number."
chaosx.nr5.59.t: "Finnish Observers Write Winter Notes"
chaosx.nr5.59.d: "Finnish observers read the Soviet collapse through patrol routes, reserve habits, and the memory of fighting a larger neighbor. Their advice improves fieldcraft, but it also makes the supported republic part of a northern argument over how far Moscow can be pushed."
chaosx.nr5.59.a: "Send the notes to the staff."
chaosx.nr5.60.t: "Foreign Promises Collide"
chaosx.nr5.60.d: "The republic's offices have accepted too many outside promises to pretend they do not touch one another. Envoys want priority, staff missions want maps, committees want public thanks, and every patron insists its channel is the one that kept the republic alive."
chaosx.nr5.60.a: "Balance every promise against the next."
chaosx.nr5.60.b: "Make the patrons bid for priority."
chaosx.nr5.60.c: "Remind them this is our republic."
soviet_collapse_patron_rivalry_balance_promises_tt: "Reduce patron rivalry pressure and stabilize the republic by forcing every foreign channel through a common ledger."
soviet_collapse_patron_rivalry_auction_promises_tt: "Gain recognition and depot control by playing patrons against each other, but increase rivalry and Soviet foreign pressure."
soviet_collapse_patron_rivalry_assert_neutrality_tt: "Cut back foreign promises, reduce rivalry pressure, improve stability, and reduce Soviet foreign-pressure growth."
chaosx.nr5.61.t: "German and British Promises Meet"
chaosx.nr5.61.d: "German staff ledgers and British charter language now cover the same republican offices. One channel asks for military accounting, the other for legal order, and both insist that their promises should define how the republic survives."
chaosx.nr5.62.t: "American Credits Cross Japanese Rail Maps"
chaosx.nr5.62.d: "American credit offices and Japanese rail missions have reached the same depots. The republic can turn the overlap into a joint board, bid the channels against each other, or militarize the routes before Moscow understands how many hands are moving supplies."
chaosx.nr5.63.t: "Turkish and Persian Routes Compete"
chaosx.nr5.63.d: "Turkish officers count passes and ports while Persian couriers price the roads beyond them. Their promises are useful together, but each southern route carries a different expectation about who decides priority."
chaosx.nr5.64.t: "Polish Rolls Meet Romanian Warehouses"
chaosx.nr5.64.d: "Polish border committees and Romanian Dniester warehouses are supporting the same republic through different ledgers. Volunteers, crossings, and stores can be coordinated, sold dear, or pushed directly into the front."
chaosx.nr5.65.t: "French Missions Meet American Credit"
chaosx.nr5.65.d: "French legal and medical missions now overlap with American press offices and credit guarantees. The republic can make the humanitarian channel disciplined, profitable, or openly logistical."
chaosx.nr5.pair.a: "Force both channels through one board."
chaosx.nr5.pair.b: "Make them bid for access."
chaosx.nr5.pair.c: "Turn the overlap into front-line logistics."
soviet_collapse_patron_pair_joint_board_tt: "Reduce patron rivalry, gain recognition progress, stabilize the republic, strengthen League pressure if the republic belongs to the Free Republics' League, and make later patron promises pass through the joint board."
soviet_collapse_patron_pair_auction_access_tt: "Gain recognition, depot control, political power, and the patron pair's themed channel consequence by auctioning access, while making later patron promises richer but more rivalrous."
soviet_collapse_patron_pair_militarize_channel_tt: "Gain manpower, infantry equipment, army experience, foreign volunteer support, and the patron pair's themed channel consequence, while making later patron promises feed front-line logistics."
chaosx.nr5.66.t: "German and Polish Rolls Divide the Camps"
chaosx.nr5.66.d: "German staff officers and Polish border committees are registering the same exiles, veterans, railway guards, and return columns. Each promise brings useful men, but every duplicated name teaches the republic that volunteer aid can become a patronage fight before the volunteers ever reach the line."
chaosx.nr5.67.t: "British Papers Meet French Medical Lists"
chaosx.nr5.67.d: "British charter offices want legal volunteer rolls while French missions count surgeons, ambulance drivers, and relief guards. The republic can merge the ledgers, sell priority to the loudest mission, or take the lists into national service before either patron owns them."
chaosx.nr5.68.t: "American and Japanese Recruiters Share a Rail Camp"
chaosx.nr5.68.d: "American credit committees and Japanese rail liaisons have reached the same volunteer camp. One side promises public backing, the other promises movement and stores, and both expect the republic to remember which channel made the camp possible."
chaosx.nr5.69.t: "Southern Routes Count the Same Volunteers"
chaosx.nr5.69.d: "Turkish officers and Persian couriers are moving volunteers through overlapping passes, ports, and quiet roads. The routes are useful together, but the republic must decide whether the men belong to a joint roll, an auctioned corridor, or its own command."
chaosx.nr5.70.t: "Dniester Rolls Require One Ledger"
chaosx.nr5.70.d: "Polish committees count volunteers by border crossing while Romanian warehouses count them by rifles issued near the Dniester. The republic can coordinate the rolls, make both patrons bid for precedence, or absorb the detachments into its own emergency army."
chaosx.nr5.volunteer_pair.a: "Combine the rolls under one board."
chaosx.nr5.volunteer_pair.b: "Make the patrons bid for volunteers."
chaosx.nr5.volunteer_pair.c: "Nationalize the rolls."
soviet_collapse_patron_volunteer_joint_rolls_tt: "Convert competing volunteer ledgers into a coordinated manpower and equipment package, reduce patron rivalry, gain recognition progress, and fold later foreign volunteer pools into the joint board."
soviet_collapse_patron_volunteer_auction_rolls_tt: "Extract a larger volunteer package, more recognition, and the volunteer pair's themed channel consequence by auctioning priority, while making later foreign volunteer pools raise bids and Soviet attention."
soviet_collapse_patron_volunteer_nationalize_rolls_tt: "Absorb the contested rolls into national command, gaining manpower, stability, war support, and the volunteer pair's themed channel consequence while making later foreign volunteer pools easier to discipline."

