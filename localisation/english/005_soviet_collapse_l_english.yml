soviet_collapse_soviet_mission_001_confirm_the_emergency_chain_of_command_success_tt: "§GSuccess:§! raises §YCommand Obedience§! and slightly raises §CMoscow Authority§!. The effect scales with chaos tier, current crisis strength, Soviet condition, and active pressure components."
