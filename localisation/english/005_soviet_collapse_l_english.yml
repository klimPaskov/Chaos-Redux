soviet_collapse_soviet_category: "Soviet Union Crisis"
soviet_collapse_soviet_category_desc: "§H§OOVERALL UNION CRISIS THREAT: [?soviet_collapse_total_collapse_threat|0]/100§!§!\n§LStarts from a low dynamic baseline in calm conditions. It rises from higher chaos, low stability or war support, failed objectives, uncontained breakaways, captured depots, foreign intervention, garrison defections, rail disruption, old-movement resurgence, League victories, lost capitals, failed reclamation attempts, and high-threat subject secessions. It falls when Moscow restores authority, obedience, rail control, depot security, and credible settlements.§!\n\n§CMoscow Authority: [?soviet_collapse_moscow_authority|0]§!\n§LThe center's administrative grip. It rises from guarded capitals, party control, settlements, and successful reclamation logistics; it falls from low stability, lost capitals, uncontained breakaways, failed objectives, high-threat puppet independence, and overextended crisis responses.§!\n\n§RArmed Breakaway Momentum: [?soviet_collapse_republic_confidence|0]§!\n§LHow convinced republics are that Moscow can be refused. It rises from breakaway survival, captured depots, successful republican objectives, League victories, garrison defections, puppet independence, and failed Soviet deadlines; it falls when Moscow controls capitals, rail hubs, depots, and credible settlement channels.§!\n\n§YCommand Obedience: [?soviet_collapse_military_obedience|0]§!\n§LHow reliably officers follow Moscow. It rises from loyalist officers, guarded districts, and restored rail ledgers; it falls from low war support, depot seizures, strained emergency aid channels, subject defections, and failed reclamation or border-control attempts.§!\n\n§8Depot Vulnerability: [?soviet_collapse_depot_vulnerability|0]§!\n§LHow exposed arsenals and supply ledgers are to local seizure. It rises from rail disruption, captured depots, armed routes, and factory-state pressure; it falls when Moscow guards depot belts, restores supply ledgers, and cuts rebel supply routes.§!\n\n§TForeign Penetration: [?soviet_collapse_foreign_appetite|0]§!\n§LHow willing outside patrons are to intervene. It rises from recognition, arms routes, advisers, intelligence channels, volunteers, overextended aid channels, foreign access, and exposed Soviet puppet networks; it falls when diplomacy stalls, borders are contained, and republics solve support problems internally.§!\n\n§BLeague Cohesion: [?soviet_collapse_league_cohesion|0]§!\n§LHow coordinated the breakaways are. It rises from League victories, shared fronts, depot accounting, and member capitals holding; it falls when Moscow splits calendars, blocks rail links, or exposes patron dependence.§!\n\n§GOld Movement Resurgence: [?soviet_collapse_evolution_weirdness|0]§!\n§LOld movements, returned banners, historical distortions, and abnormal splinter states. It rises from high chaos, failed rail control, ancient claims, Black Banner organization, and factory-state panic; it falls when regular governments contain hinterlands and recognized diplomacy crowds out irregular routes.§!\n\n§RBreakaways: [?soviet_collapse_breakaway_count|0]§!\n§LThe number of republics, former puppets, or collapse-born states outside Moscow's authority. More breakaways increase threat and unlock later crisis stages.§!\n\nMoscow can spend equipment, manpower, fuel, trains, stability, experience, and operational readiness to restore obedience, bargain with republics, cut supplies, mobilize loyalists, or begin reconquest."
soviet_collapse_breakaway_category: "Breakaway Emergency"
soviet_collapse_breakaway_category_desc: "Breakaway republics can coordinate defense, arm local committees, request recognition, and call other republics into the crisis."
