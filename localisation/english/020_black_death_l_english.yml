chaosx.news.21.t: "Black Death"
chaosx.news.21.d: "A new outbreak of the bubonic plague, the disease that caused the \"Black Death\" in the Middle Ages, has been massively reported throughout [GetBlackDeathContinent], sparking concerns of a potential pandemic." 
chaosx.news.21.a: "Oh no..."
