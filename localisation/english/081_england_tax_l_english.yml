l_english:
chaosx.nr81.1.t: "British taxes"

chaosx.nr81.2.t: "Impose taxes"
chaosx.nr81.2.d: "To bolster our nation's economic strength, we have enacted a policy to impose taxes on every country, ensuring that we reap the benefits of global wealth. This initiative aims to secure additional revenue streams and maximize our prosperity by capitalizing on the economic activities of other nations."
chaosx.nr81.2.a: "Squeeze them dry!"

chaosx.nr81.3.t: "British impose tax on us!"
chaosx.nr81.3.d: "Britain's imposition of taxes presents our nation with a daunting dilemma: resist and risk war, or acquiesce and risk economic dependence."
chaosx.nr81.3.a: "Nothing we can do..."
chaosx.nr81.3.b: "Deny"














chaosx.nr81.4.t: "[FROM.GetName] has refused our taxes!"
chaosx.nr81.4.d: "Should we declare war?"
chaosx.nr81.4.a: "War!"
chaosx.nr81.4.b: "Let them be"















chaosx.nr81.5.t: "[FROM.GetName] accepts our taxes!"
chaosx.nr81.5.d: ""
chaosx.nr81.5.a: "Hurray!"

chaosx.news.71.t: "British impose taxes"
chaosx.news.71.d: "A wave of outrage sweeps across the globe as Britain announces the imposition of taxes on every country worldwide. The unprecedented move, aimed at bolstering Britain's coffers and asserting its economic dominance, sparks condemnation from governments and citizens alike. Critics decry the unilateral action as a blatant disregard for international sovereignty and fairness, with many nations scrambling to resist the imposed levies."
chaosx.news.71.a: "The British do not expect happiness"
