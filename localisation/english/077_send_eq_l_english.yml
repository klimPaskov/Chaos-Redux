l_english:
chaosx.nr77.1.t: "Major sends equipment to a minor"

chaosx.nr77.2.t: "Send equipment to [?global.chosen_minor.GetName]"
chaosx.nr77.2.d: "Which of our surplus military equipment should be sent to [?global.chosen_minor.GetName]?"
chaosx.nr77.2.a: "Infantry Equipment"
chaosx.nr77.2.b: "Supply Equipment"
chaosx.nr77.2.c: "Planes"
chaosx.nr77.2.e: "Tanks and Mechanized Equipment"
chaosx.nr77.2.f: "Advanced Military Equipment"

chaosx.nr77.3.t: "Send equipment to a minor"
chaosx.nr77.3.d: "Our nation faces a crucial choice in determining which minor country will receive our surplus military equipment. This decision carries weighty implications for regional dynamics and diplomatic relations. Careful consideration must be given to factors such as the recipient's military capability and alignment with our strategic interests. The chosen recipient will play a significant role in shaping regional stability and security."
chaosx.nr77.3.a: "[?global.random_minor_1.GetName]"
chaosx.nr77.3.b: "[?global.random_minor_2.GetName]"
chaosx.nr77.3.c: "[?global.random_minor_3.GetName]"

chaosx.nr77.4.t: "[FROM.GetName] sends military equipment"
chaosx.nr77.4.d: "We have received [GetChosenEquipment] from [FROM.GetName]!"
chaosx.nr77.4.a: "Thanks!"

chaosx.news.67.t: "Equipment sent to [?global.chosen_minor.GetName]"
chaosx.news.67.d: "[FROM.FROM.GetName] has sent [GetChosenEquipment] to [?global.chosen_minor.GetName], heightening concerns of potential conflict. The delivery of armaments comes as a show of support for [?global.chosen_minor.GetName], which has found itself increasingly isolated and threatened by regional adversaries. As the military buildup unfolds, neighboring countries closely monitor the situation, wary of the potential for further destabilization and escalation."
chaosx.news.67.a: "I believe that everything happens for a reason"
