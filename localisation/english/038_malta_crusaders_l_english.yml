chaosx.nr38.1.t: "Malta Crusaders"

chaosx.nr38.2.t: "Malta's Invasion"
chaosx.nr38.2.d: "The news of Malta's declaration of independence! While we acknowledge the Maltese people's desire for self-governance, it signifies the conclusion of a significant chapter in our colonial history. Following a decisive referendum, Malta's transition prompts us to reassess diplomatic relations and strategic interests in the Mediterranean."
chaosx.nr38.2.a: "Oh God..."

chaosx.news.43.t: "Malta Crusaders"
chaosx.news.43.d: "Malta has declared independence and embarked on a series of crusades in the \"Holy Lands\". Rapid military advancements have seen Maltese forces seize key cities including Athens, Constantinople, and Jerusalem."
chaosx.news.43.a: "Beginning of an era..."
