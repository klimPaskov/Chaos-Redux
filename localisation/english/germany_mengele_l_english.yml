super_event.12.t: "The Angel of Death Leaves the Camp"
super_event.12.q: "All hope abandon, ye who enter in! \n §Y-Dante Alighieri, Inferno III-§!"
super_event.12.a: "The camp signs its own orders."
super_event.12.d: "The Auschwitz laboratories have broken from Berlin and seized biological warfare facilities under Josef Mengele's command. What was presented as a restricted camp file has become an armed directorate with its own chain of command, research authority, and prisoners to spend.\n\nBerlin may still claim the paperwork, but the camp no longer waits for permission."
