number_reclaimed_heartland_administrations_desc: "Convert controlled German and Polish heartland districts into directly numbered clone administrations."
activate_continental_assault_protocols: "Activate Continental Assault Protocols"
activate_continental_assault_protocols_desc: "Spend command reserves on a concentrated offensive cycle for the next continental campaign."
establish_numbered_borderland_commands: "Establish Numbered Borderland Commands"
establish_numbered_borderland_commands_desc: "Integrate conquered continental borderlands into Directorate command districts and fortify their industrial corridors."
condition_clone_batches: "Condition Clone Batches"
condition_clone_batches_desc: "Commit staff time to another conditioning cycle for field formations."
select_genius_embryos: "Select Genius Embryos"
select_genius_embryos_desc: "Route selected clone lines into accelerated research and design work."
biowarfare_trial_series: "Biowarfare Trial Series"
biowarfare_trial_series_desc: "Use controlled trial work to push biowarfare breakthrough progress and delivery research."
harden_clone_immunity: "Harden Clone Immunity"
harden_clone_immunity_desc: "Improve clone survivability in contaminated field conditions and harsh operational environments."
dispatch_biomedical_aid_mission: "Dispatch Biomedical Aid Mission"
dispatch_biomedical_aid_mission_desc: "Offer a foreign government deniable medical-industrial aid, biological defense support, and emergency replacement planning. If accepted, the mission creates the first hidden cloning facility marker inside that country."
deepen_foreign_tank_network: "Deepen Foreign Tank Network"
deepen_foreign_tank_network_desc: "Expand an existing foreign mission with additional hidden tank rooms, recruitment files, staff channels, and supply routes."
compile_activation_ledger: "Compile Activation Ledger"
compile_activation_ledger_desc: "Reconcile foreign facility reports, industrial estimates, and military ranking data for the final activation plan."

MCL_directorate_of_replication: "Directorate of Replication"
MCL_directorate_of_replication_desc: "The artificial army requires a state apparatus built around replication records, laboratory discipline, and war production."
MCL_secure_the_growth_vats: "Secure the Growth Vats"
MCL_secure_the_growth_vats_desc: "The first priority is to guard the growth lines and keep replacement manpower flowing."
MCL_war_laboratory_state: "War Laboratory State"
MCL_war_laboratory_state_desc: "Research authority, military command, and state administration are folded into one laboratory regime."
MCL_silesian_biological_axis: "Silesian Biological Axis"
MCL_silesian_biological_axis_desc: "Expand the first biological warfare facility network around the occupied industrial corridor."
MCL_auschwitz_lab_grid: "Auschwitz Lab Grid"
MCL_auschwitz_lab_grid_desc: "Link the old laboratory infrastructure into a wider grid of sealed project sites."
MCL_mobile_pathogen_sections: "Mobile Pathogen Sections"
MCL_mobile_pathogen_sections_desc: "Attach mobile delivery teams to the army so laboratory work can move with the front."
MCL_specimen_acquisition_board: "Specimen Acquisition Board"
MCL_specimen_acquisition_board_desc: "Create a sealed board for acquiring, classifying, and routing unusual biological material into Directorate project channels."
MCL_deniable_trials_office: "Deniable Trials Office"
MCL_deniable_trials_office_desc: "Organize the front offices and controlled test sites needed to move hidden biological projects toward research authorization."
MCL_containment_breach_exercises: "Containment Breach Exercises"
MCL_containment_breach_exercises_desc: "Run the Directorate through controlled breach drills so unusual agents can be handled without stopping the wider project chain."
MCL_restricted_project_council: "Restricted Project Council"
MCL_restricted_project_council_desc: "Centralize extreme biomedical files under a council that can authorize hidden special projects without naming them in ordinary records."
MCL_pathogen_handling_cadre: "Pathogen Handling Cadre"
MCL_pathogen_handling_cadre_desc: "Train dedicated cadres to handle dangerous agents without slowing the wider project chain."
MCL_unnatural_payload_authority: "Unnatural Payload Authority"
MCL_unnatural_payload_authority_desc: "Give the Directorate authority to open research access for rare biological payloads that ordinary project boards cannot request."
MCL_black_archive_release: "Black Archive Release"
MCL_black_archive_release_desc: "Open the sealed archive and make every hidden Directorate special project available for formal research."
MCL_clone_muster_rolls: "Clone Muster Rolls"
MCL_clone_muster_rolls_desc: "Catalog the first organized waves of clone formations and issue their equipment."
MCL_accelerated_barracks: "Accelerated Barracks"
MCL_accelerated_barracks_desc: "Convert barracks, training yards, and assembly plants into a single accelerated military pipeline."
MCL_expand_clone_vats: "Expand Clone Vats"
MCL_expand_clone_vats_desc: "Increase growth-vat capacity and unlock repeatable expansion orders."
MCL_batch_accounting_offices: "Batch Accounting Offices"
MCL_batch_accounting_offices_desc: "Standardize clone batch records, equipment claims, and command paperwork so deployment orders consume less command reserve."
MCL_stabilized_growth_series: "Stabilized Growth Series"
MCL_stabilized_growth_series_desc: "Improve clone conditioning enough to make repeated battlefield cycles more reliable."
MCL_conditioned_battle_memory: "Conditioned Battle Memory"
MCL_conditioned_battle_memory_desc: "Use repeated simulation and command imprinting to improve infantry performance."
MCL_assault_clone_series: "Assault Clone Series"
MCL_assault_clone_series_desc: "Authorize a heavier assault-pattern line that can be deployed as dedicated clone assault divisions."
MCL_clone_officer_cadres: "Clone Officer Cadres"
MCL_clone_officer_cadres_desc: "Raise officers from controlled lines rather than relying on ordinary staff schools."
MCL_guard_clone_series: "Guard Clone Series"
MCL_guard_clone_series_desc: "Reserve the most stable lines for guard-pattern formations with stronger conditioning and larger division structures."
MCL_deployment_ledger_automation: "Deployment Ledger Automation"
MCL_deployment_ledger_automation_desc: "Automate the deployment ledgers so clone wave orders are cheaper and the Directorate can draw on all authorized clone patterns."
MCL_genius_cohorts: "Genius Cohorts"
MCL_genius_cohorts_desc: "Assign selected clone lines to research bureaus and strategic laboratories."
MCL_research_twins: "Research Twins"
MCL_research_twins_desc: "Pair replicated intellects across facilities so separate teams can solve the same project from different angles."
MCL_perfected_muscle_memory: "Perfected Muscle Memory"
MCL_perfected_muscle_memory_desc: "Drive clone formations through final assault-pattern conditioning."
MCL_replacement_pipeline: "Replacement Pipeline"
MCL_replacement_pipeline_desc: "Create a reliable chain for replacements, equipment records, and reintegration into field armies."
MCL_numbered_legions: "Numbered Legions"
MCL_numbered_legions_desc: "Organize the clone army into numbered legions with a permanent reinforcement reserve."
MCL_command_purity_oath: "Command Purity Oath"
MCL_command_purity_oath_desc: "Bind the officer corps to the Directorate through ritual command procedure and political surveillance."
MCL_slave_logistics_grid: "Forced Logistics Grid"
MCL_slave_logistics_grid_desc: "Build the infrastructure and armaments grid needed to keep the artificial army supplied."
MCL_requisition_continental_stockpiles: "Requisition Continental Stockpiles"
MCL_requisition_continental_stockpiles_desc: "Strip nearby depots and factories for infantry equipment, support materiel, and staff reserves."
MCL_biological_war_ministry: "Biological War Ministry"
MCL_biological_war_ministry_desc: "Place biowarfare trials, clone logistics, and military research under one ministry."
MCL_occupation_experiment_zones: "Occupation Experiment Zones"
MCL_occupation_experiment_zones_desc: "Turn occupied territory into controlled logistics and testing zones for the Directorate."
MCL_aryan_variant_board: "Aryan Variant Board"
MCL_aryan_variant_board_desc: "Create a formal board for the Directorate's preferred variant program and its battlefield claims."
MCL_perfect_aryan_regency: "Perfect Aryan Regency"
MCL_perfect_aryan_regency_desc: "Elevate selected formations as the regime's model army and give them priority in command planning."
MCL_doctrine_of_the_replicated_state: "Doctrine of the Replicated State"
MCL_doctrine_of_the_replicated_state_desc: "Write a doctrine for a state whose army, industry, and science are all designed for replication."
MCL_the_numbered_future: "The Numbered Future"
MCL_the_numbered_future_desc: "The clone army becomes more than a crisis force. It becomes the state's intended future."
MCL_reclamation_war_cabinet: "Reclamation War Cabinet"
MCL_reclamation_war_cabinet_desc: "Create a dedicated cabinet for the recovery of the German and Polish heartland, with claims, mobilization orders, and target files issued at once."
MCL_number_the_old_heartland: "Number the Old Heartland"
MCL_number_the_old_heartland_desc: "Fold every reclaimed German and Polish core district into the numbered state and make the heartland administratively indivisible."
MCL_continental_dominance_protocol: "Continental Dominance Protocol"
MCL_continental_dominance_protocol_desc: "With the heartland secured, prepare the clone army for west, east, and south command drives."
MCL_rhine_specimen_corridor: "Rhine Specimen Corridor"
MCL_rhine_specimen_corridor_desc: "Map the western borderlands, laboratories, ports, and industrial districts for immediate seizure."
MCL_channel_replacement_ports: "Channel Replacement Ports"
MCL_channel_replacement_ports_desc: "Turn the western corridor into a replacement port network and prepare the Channel approaches for clone command."
MCL_eastern_laboratory_march: "Eastern Laboratory March"
MCL_eastern_laboratory_march_desc: "Direct the clone army eastward through vast laboratory occupation zones and numbered field commands."
MCL_moscow_numbering_office: "Moscow Numbering Office"
MCL_moscow_numbering_office_desc: "Prepare an eastern command office capable of reducing the largest continental enemy into numbered districts."
MCL_danubian_replacement_zone: "Danubian Replacement Zone"
MCL_danubian_replacement_zone_desc: "Bring the Danubian route under replacement planning and prepare the southern corridor for direct command."
MCL_mediterranean_growth_axis: "Mediterranean Growth Axis"
MCL_mediterranean_growth_axis_desc: "Extend growth-vat logistics and clone formations toward the Mediterranean approaches."
MCL_continental_command_spine: "Continental Command Spine"
MCL_continental_command_spine_desc: "Join the western, eastern, and southern campaigns into one continental command spine."
MCL_assert_world_dominance: "Assert World Dominance"
MCL_assert_world_dominance_desc: "The numbered state has outgrown regional war. Issue final great-power target files and prepare permanent military dominance."
MCL_foreign_aid_fronts: "Foreign Aid Fronts"
MCL_foreign_aid_fronts_desc: "Send sealed scientific missions abroad as emergency medical industry, biological defense support, and military modernization aid."
MCL_embassy_science_cells: "Embassy Science Cells"
MCL_embassy_science_cells_desc: "Attach Directorate staff to consulates, trade missions, and relief offices so foreign laboratories can be watched without public ownership."
MCL_hidden_tank_consortia: "Hidden Tank Consortia"
MCL_hidden_tank_consortia_desc: "Turn the aid missions into deeper foreign tank networks with restricted inspection, private security, and replacement files."
MCL_directorate_project_registry: "Directorate Project Registry"
MCL_directorate_project_registry_desc: "Move every extreme biomedical and biowarfare file into a reusable central registry so new project categories can be absorbed as the mod expands."
MCL_global_replacement_maps: "Global Replacement Maps"
MCL_global_replacement_maps_desc: "Convert the foreign network into a military activation map: which ministries can be bypassed, which laboratories can be seized, and which armies can be replaced."
MCL_the_numbered_world: "The Numbered World"
MCL_the_numbered_world_desc: "Activate the hidden foreign network, raise clone client regimes from sealed laboratories, and begin the final Directorate world order."

