l_english:
germany_mengele.1.t: "The Auschwitz Research Proposal"
germany_mengele.1.d: "A file from SS medical and biological offices has reached the Reich Chancellery. It asks for broader authority at Auschwitz: sealed records, requisitioned material, and protection from ordinary ministerial review. The proposal is written as wartime administration. Its promises are practical. Its omissions are deliberate."
germany_mengele.1.a: "Authorize the Auschwitz Experiments."
germany_mengele.1.b: "Restrict the file to camp administration."
germany_mengele.1.c: "Shut the proposal down."
germany_mengele.3.t: "Auschwitz Program Cleanup"
germany_mengele.4.t: "Himmler's Transport Office"
germany_mengele.4.d: "Himmler has narrowed the racial bureaucracy into a chain that can move Jewish deportation files without ordinary ministry review. The language remains administrative: lists, trains, allocations, and security exemptions. Everyone in the room understands what the paperwork is built to feed."
germany_mengele.4.a: "The offices will coordinate."
germany_mengele.5.t: "The SS Archive Expands"
germany_mengele.5.d: "SS clerks extend the Jewish registers, prisoner cards, and transport summaries into a sealed archive. The work is presented as security accounting, but the categories being preserved are the categories being selected for camps."
germany_mengele.5.a: "Seal the archive."
germany_mengele.6.t: "Eastern Registers Classified"
germany_mengele.6.d: "Occupation officers and SS administrators classify the eastern files before army staff can contest them. Jewish communities, ghettos, labor drafts, and camp transfers are folded into a single restricted channel."
germany_mengele.6.a: "Move the files outside normal review."
germany_mengele.10.t: "Reports Without Names"
germany_mengele.10.d: "The first biological reports from Auschwitz arrive ahead of schedule. The technical appendices are useful, but personnel names, prisoner categories, and transfer records have been removed from the file before it reached Berlin."
germany_mengele.10.a: "Use the results."
germany_mengele.10.b: "Demand complete records."
germany_mengele.10.c: "Place army doctors in review."
germany_mengele.10.closed: "The file is already closed."
germany_mengele.11.t: "The Twin Registers"
germany_mengele.11.d: "A supplemental register refers to twins, hereditary comparisons, and survival tables in language that no ministry clerk will defend aloud. The SS insists the work is an ordinary extension of biological research."
germany_mengele.11.a: "Continue the work."
germany_mengele.11.b: "Send military doctors."
germany_mengele.11.c: "Seal the registers under SS authority."
germany_mengele.12.t: "A Laboratory Without Berlin"
germany_mengele.12.d: "Shipments, staff, and rail priority orders now move through Auschwitz without normal ministerial signatures. Someone has learned how to make the laboratory system act first and report later."
germany_mengele.12.a: "Ignore it during the war."
germany_mengele.12.b: "Investigate the chain of command."
germany_mengele.12.c: "Reward the results."
germany_mengele.13.t: "The Children Do Not Answer to Guards"
germany_mengele.13.d: "A field report describes young experimental subjects who obey laboratory staff before SS guards and military officers. The account is uncertain, censored, and passed between desks with no signature attached."
germany_mengele.13.a: "End the laboratory authority."
germany_mengele.13.b: "Hide the report."
germany_mengele.13.c: "Purge the medical offices."
germany_mengele.14.t: "Warnings from Auschwitz"
germany_mengele.14.d: "The oversight office warns that Auschwitz is no longer behaving like a camp administration. Its laboratory staff answer to a private hierarchy, and Berlin receives only selected results."
germany_mengele.14.a: "Acknowledge the warning."
germany_mengele.14.b: "The war comes first."
germany_mengele.14.c: "Close the offices."
germany_mengele.15.t: "Auschwitz Program Expiry"
germany_mengele.16.t: "Auschwitz Program Closure"
germany_mengele.17.t: "A Demand for New Laboratories"
germany_mengele.17.d: "The Auschwitz offices submit a sealed demand for additional biological facilities. The request names rail links, prisoner transfers, and special-project access as one administrative package. Refusal would weaken the network. Acceptance would let the laboratories bypass ordinary review."
germany_mengele.17.a: "Grant the facilities."
germany_mengele.17.b: "Refuse the demand."
germany_mengele.18.t: "Foreign Experimental Transports"
germany_mengele.18.d: "A cooperating administration has accepted German terms for transferring prisoners and civilians from a foreign-controlled region into the Auschwitz laboratory chain. The public benefit is written as military and administrative support. The cost is moved by rail under sealed papers."
germany_mengele.18.a: "Record the transfer."
germany_mengele.19.t: "Indian Subject Registers"
germany_mengele.19.d: "German offices attach Indian population records to the experimental transport system. The memorandum avoids names where possible, but the categories are precise enough for the laboratories and broad enough for the cooperating authorities to deny responsibility."
germany_mengele.19.a: "The registers are accepted."
germany_mengele.20.t: "Mengele Coup Monitor"
germany_mengele.21.t: "The Angel of Death Leaves the Camp"
germany_mengele.21.d: "Trains are being rerouted. Guards have been replaced or ignored. Laboratory detachments claim direct authority from Josef Mengele, and units formed around damaged, conditioned experimental subjects have begun moving under sealed orders. Berlin learns too late that the Auschwitz system has become a private army."
germany_mengele.21.a: "The file becomes a front."
germany_mengele.22.t: "The Laboratories Mobilize"
germany_mengele.22.d: "Enemy troops have reached a biological facility or an Auschwitz-linked site while the laboratory network still answers to its own command chain. Mengele's offices claim emergency authority, raise their experimental formations, and move to fight the invader before Berlin can restore control."
germany_mengele.22.a: "The emergency becomes a revolt."
germany_mengele.23.t: "The Cloning Memorandum"
germany_mengele.23.d: "Mengele's office submits a sealed memorandum describing accelerated replication, controlled maturation, and replacement manpower as one laboratory program. The language is still framed as biomedical war production, but the proposal asks for special-project authority rather than another camp file."
germany_mengele.23.a: "Authorize the cloning project."
germany_mengele.24.t: "The Replication Chain Acts"
germany_mengele.24.d: "The cloning project is complete, and the Auschwitz laboratories no longer need to ask for personnel. Growth ledgers, military rosters, and sealed facility outputs have converged under Mengele's command. The project that Berlin authorized has given its author an army."
germany_mengele.24.a: "The laboratories revolt."
germany_mengele.30.t: "The Laboratory State"
germany_mengele.30.d: "The loyalist government still holds Berlin, the ministries, and most of the regular forces. The breakaway Directorate holds Auschwitz, the biological facilities it can seize, and the threat of what those laboratories have made."
germany_mengele.30.a: "Crush the laboratory state."
germany_mengele.30.b: "Reclaim what can be used."
germany_mengele.30.c: "Arrange a temporary truce against the Soviets."
germany_mengele.31.t: "The Auschwitz Directorate"
germany_mengele.31.d: "Josef Mengele has been proclaimed the authority of a sealed laboratory state. Its documents speak of continuation, selection, and biological command. Its soldiers move under orders that no normal staff officer can read."
germany_mengele.31.a: "The Directorate will take Berlin."
germany_mengele.32.t: "Loyalist Monitor"
germany_mengele.33.t: "The Directorate Enters Berlin"
germany_mengele.33.d: "The loyalist state collapses as Directorate forces take Berlin. Ministries, archives, and biological offices are absorbed into a government built around Auschwitz authority and the racial myth it claims to prove."
germany_mengele.33.a: "Germany is transformed."
germany_mengele.34.t: "The Laboratories Fall"
germany_mengele.34.d: "The breakaway laboratories have been destroyed or overrun. The state recovers its facilities, but the paper trail remains, and every captured file is another indictment."
germany_mengele.34.a: "Seal the remnants."
germany_mengele.35.t: "Temporary Truce Expires"
germany_mengele.36.t: "Directorate Monitor"
germany_mengele.37.t: "The Perfect Aryan Directorate"
germany_mengele.37.d: "The regime's manufactured racial claim has returned to the laboratory chain as command doctrine. The formations built around it no longer present themselves as Mengele's subjects. Their officers speak as if they are the proof and he is only the file clerk who opened the door."
germany_mengele.37.a: "The claim consumes its author."
germany_mengele.38.t: "Emergency Directorate War Monitor"
germany_mengele.40.t: "The Tibet File Reopened"
germany_mengele.40.d: "Ahnenerbe patrons, anthropologists, botanists, propagandists, and intelligence officers have reopened the old Tibet file. Each office claims a different purpose. Together they ask for a mission that can be sold as science and used as racial myth."
germany_mengele.40.a: "Fund a scientific cover mission."
germany_mengele.40.b: "Send a covert SS mission."
germany_mengele.40.c: "Approach the Holy Realm."
germany_mengele.40.old_files: "Rework the old files first."
germany_mengele.40.e: "Do not send the mission."
germany_mengele.41.t: "Transit Papers"
germany_mengele.41.d: "The expedition needs permits, escorts, travel explanations, and maps that do not say what Berlin wants from the journey."
germany_mengele.41.a: "Keep the papers ordinary."
germany_mengele.41.b: "Use intelligence channels."
germany_mengele.42.t: "Scientific Cover"
germany_mengele.42.d: "Specimen crates and notebooks make the expedition look conventional. Behind the cover, SS offices press for measurements, symbols, and language that can be forced into a political thesis."
germany_mengele.42.a: "Maintain the cover."
germany_mengele.42.b: "Prioritize SS collection orders."
germany_mengele.42.c: "Open contact with the Holy Realm."
germany_mengele.43.t: "Mountain Interpreters"
germany_mengele.43.d: "Guides and interpreters can keep the mission moving, but every question about signs, descent, and holy authority risks revealing the true purpose of the file."
germany_mengele.43.a: "Listen to the interpreters."
germany_mengele.43.b: "Push the questions harder."
germany_mengele.44.t: "The Symbol Problem"
germany_mengele.44.d: "The material from Tibet does not form the clean proof Berlin wanted. The expedition can return with ambiguity, manufacture certainty, or seek stranger confirmation through the Holy Realm."
germany_mengele.44.a: "Report the ambiguity."
germany_mengele.44.b: "Fabricate a positive result."
germany_mengele.44.c: "Press the Holy Realm contact."
germany_mengele.46.t: "Expedition Outcome"
germany_mengele.47.t: "The Tibet Dossier"
germany_mengele.47.d: "The expedition returns with a dossier that can be read several ways. The regime must decide whether to bury it, distort it, or turn it into a public claim."
germany_mengele.47.no_result: "File the mission as inconclusive."
germany_mengele.47.ambiguous: "Keep the ambiguity inside the archives."
germany_mengele.47.ambiguous_claim: "Turn ambiguity into a regime claim."
germany_mengele.47.fabricated: "Publish the fabricated result."
germany_mengele.47.fabricated_bury: "Bury the fabrication."
germany_mengele.47.holy: "Use the Holy Realm contact as proof."
germany_mengele.47.holy_seal: "Seal the Holy Realm material."
germany_mengele.47.scandal: "Absorb the scandal."
germany_mengele.47.lost: "Record the mission as lost."
germany_mengele.tibet.closed: "The mission file is closed."
germany_mengele.90.t: "Foreign Reaction Router"
germany_mengele.91.t: "The Auschwitz Fracture"
germany_mengele.91.d: "Reports from German territory describe a fascist laboratory state centered on Auschwitz and biological warfare facilities. Whatever Berlin says, this is no ordinary civil war."
germany_mengele.91.a: "Condemn them."
germany_mengele.92.t: "Reports from Auschwitz"
germany_mengele.92.d: "Diplomatic channels confirm that a breakaway SS laboratory apparatus has seized territory from Germany. The scale of the crimes and the biological facilities involved make neutrality harder to justify."
germany_mengele.92.a: "The file goes to every capital."
germany_mengele.93.t: "A War No Ally Wants Named"
germany_mengele.93.d: "Germany's fascist allies receive the same reports as everyone else: Auschwitz offices, biological laboratories, and a state within the state. The alliance papers do not make it easier to answer."
germany_mengele.93.a: "Distance the embassy."
germany_mengele.94.t: "The Angelic Directorate"
germany_mengele.94.d: "Berlin has fallen to the Auschwitz Directorate. The new state claims that its laboratories have proven the racial myth that produced them, and it moves immediately to control every biological program it can reach."
germany_mengele.94.a: "A cold state takes form."
germany_mengele.95.t: "Foreign Expedition at the Passes"
germany_mengele.95.d: "A German expedition has arrived with notebooks, instruments, guarded questions, and a theory already written before the journey began."
germany_mengele.95.a: "Observe them."
germany_mengele.95.b: "Reject the mission."
germany_mengele.96.t: "Rumors from Occupied Poland"
germany_mengele.96.d: "Neutral embassies report denials, missing trains, and claims that a camp doctor commands armed formations near biological facilities. None of it is safe to print as certainty."
germany_mengele.96.a: "Keep the channel open."
germany_mengele.120.t: "The Sealed Aid Mission"
germany_mengele.120.d: "A Directorate-linked scientific delegation offers emergency medical industry support, biological defense advice, and military replacement planning. The papers are unusually generous and unusually sealed. They promise laboratories, technicians, and aid convoys at no direct cost, provided local authorities accept private security, restricted inspection rules, and a staff channel back to the Directorate."
germany_mengele.120.a: "Accept the mission under emergency authority."
germany_mengele.120.b: "Refuse the sealed staff."
germany_mengele.121.t: "Second Laboratory Annex"
germany_mengele.121.d: "The Directorate asks for a deeper annex inside the existing aid mission: additional tank rooms, screened recruitment files, special medical exemptions, and a convoy schedule beyond normal ministry control. The proposal still calls itself assistance. The staff now behave as if they are building something that will outlast the government that invited them."
germany_mengele.121.a: "Let the annex proceed."
germany_mengele.121.b: "End the expansion."

germany_final_solution_category: "The Final Solution"
germany_final_solution_category_desc: "The regime's racial bureaucracy, SS archives, Ahnenerbe patronage, and sealed records are being centralized into a system that can support the Auschwitz program or the Tibet expedition."
germany_tibet_expedition_category: "Tibet Expedition"
germany_tibet_expedition_category_desc: "Ahnenerbe and SS offices can prepare and send a mission to Tibet. Its outcome may become an internal archive, a public racial-origin claim, a scandal, or a point of contact with the Holy Realm."
germany_mengele_response_category: "Laboratory State Response"
germany_mengele_response_category_desc: "The state must decide how to respond to the breakaway Auschwitz Directorate and what to do with the surviving research apparatus."
centralize_race_offices: "Centralize Race Offices"
centralize_race_offices_desc: "Move racial-policy files into a narrower chain of command, increasing coordination while giving SS offices more leverage."
expand_ss_archive: "Expand the SS Archive"
expand_ss_archive_desc: "Increase SS control over sealed prisoner, genealogy, and research records."
classify_eastern_records: "Classify Eastern Records"
classify_eastern_records_desc: "Remove eastern occupation and camp records from ordinary ministerial access."
protect_ahnenerbe_budget: "Protect Ahnenerbe Budget"
protect_ahnenerbe_budget_desc: "Shield Ahnenerbe patronage from budget review and prepare the institutional case for a Tibet mission."
search_ancestral_traces: "Search Ancestral Traces"
search_ancestral_traces_desc: "Collect racial-historical notes, travel records, and older expedition files for a possible public claim."
silence_dissenting_file: "Silence a Dissenting File"
silence_dissenting_file_desc: "Suppress an internal report that contradicts the racial-origin thesis."
import_subjects_from_japanese_china: "Import Subjects from Japanese China"
import_subjects_from_japanese_china_desc: "Offer Japan or a Japanese-aligned administration material support in exchange for prisoners and civilians from occupied Chinese regions. Germany gains experimental subjects, autonomy rises inside the Auschwitz system, and the source state loses population."
import_subjects_from_india: "Import Subjects from India"
import_subjects_from_india_desc: "Use allied or occupied Indian administration channels to transfer population into the Auschwitz experimental chain. The cooperating controller receives support while Germany deepens its hidden atrocity record."
import_subjects_from_africa: "Import Subjects from African Holdings"
import_subjects_from_africa_desc: "Draw prisoners and civilians from allied or occupied African states into German experimental transport. The local controller receives immediate support, while responsibility remains attached to German records."
close_auschwitz_program: "Close the Auschwitz Program"
close_auschwitz_program_desc: "End the laboratory authority and remove the national spirit before the system can grow further."
military_review_of_auschwitz: "Military Review of Auschwitz"
military_review_of_auschwitz_desc: "Send military doctors and staff officers to restrain the Auschwitz laboratory chain."
purge_ss_medical_offices: "Purge SS Medical Offices"
purge_ss_medical_offices_desc: "Break the SS medical hierarchy, close the program, and block the coup path."
prepare_tibet_mission: "Prepare the Tibet Mission"
prepare_tibet_mission_desc: "Reopen the expedition file and choose whether the mission travels as science, covert SS work, or a Holy Realm contact."
crush_the_laboratory_state: "Crush the Laboratory State"
crush_the_laboratory_state_desc: "Commit loyalist command resources to destroying the Auschwitz Directorate."
reclaim_laboratory_results: "Reclaim Laboratory Results"
reclaim_laboratory_results_desc: "Keep usable results from captured files at the cost of further condemnation."
temporary_truce_against_soviets: "Temporary Truce Against the Soviets"
temporary_truce_against_soviets_desc: "If the front is collapsing, tolerate the Directorate temporarily so both German factions face the Soviet Union."

germany_auschwitz_experiments: "Auschwitz Experiments"
germany_auschwitz_experiments_desc: "SS medical offices have wider authority at Auschwitz. The reports promise biological discoveries and wartime applications, but the program is secretive by design."
germany_auschwitz_experiments_restricted: "Restricted Auschwitz Administration"
germany_auschwitz_experiments_restricted_desc: "The Auschwitz file has been limited to ordinary camp administration. Some research channels remain, but Berlin keeps formal control."
germany_mengele_laboratory_state: "Laboratory State"
germany_mengele_laboratory_state_desc: "The Directorate is organized around sealed laboratories, coerced manpower systems, and biological warfare facilities."
germany_mengele_cloning_manpower: "Cloning Manpower"
germany_mengele_cloning_manpower_desc: "The Directorate reports impossible manpower figures from conditioning, medical processing, coerced labor, and experimental claims."
germany_mengele_emergency_crackdown: "Emergency Crackdown"
germany_mengele_emergency_crackdown_desc: "Loyalist Germany has given the army emergency authority to isolate and destroy the laboratory-state front."
germany_mengele_reclaimed_results: "Reclaimed Laboratory Results"
germany_mengele_reclaimed_results_desc: "Captured documents have been routed back into state research channels. The benefits are real, and so is the political cost."
germany_mengele_temporary_truce: "Temporary Laboratory Truce"
germany_mengele_temporary_truce_desc: "The loyalist state tolerates the Directorate while the Soviet front takes priority. Every ministry understands what that means."
germany_mengele_victory_state: "Angelic Directorate"
germany_mengele_victory_state_desc: "The Auschwitz Directorate has seized the state and folded every biological program into its own authority."
germany_mengele_perfect_aryan_formations: "Perfect Aryan Formations"
germany_mengele_perfect_aryan_formations_desc: "The Directorate's propaganda treats selected experimental formations as proof of its racial myth. The claim improves command priority and battlefield cohesion while deepening the instability of the state that relies on it."
mengele_clone_army_scenario_state: "Artificial Army Crisis"
mengele_clone_army_scenario_state_desc: "The clone army is organized as an immediate war machine: obedient formations, accelerated manpower replacement, and aggressive staff doctrine built around expansion by force."
mengele_clone_directorate: "Directorate of Replication"
mengele_clone_directorate_desc: "The state is organized around laboratory command, classified replication records, and a bureaucracy that treats every strategic question as a problem of controlled production."
mengele_clone_vat_network: "Growth Vat Network"
mengele_clone_vat_network_desc: "Accelerated growth lines and conditioning stations provide replacement manpower at a pace ordinary administration cannot explain."
mengele_clone_biowarfare_directorate: "Biowarfare Directorate"
mengele_clone_biowarfare_directorate_desc: "Dedicated facilities, sealed project boards, and weapon testing teams have been placed under a single biological warfare authority."
mengele_clone_conditioning_protocols: "Conditioning Protocols"
mengele_clone_conditioning_protocols_desc: "Clone formations are drilled through repeated command stimuli, narrowing individual judgment while improving battlefield cohesion."
mengele_clone_officer_cadres: "Clone Officer Cadres"
mengele_clone_officer_cadres_desc: "Selected commanders are raised inside the same controlled system as the rank and file, producing staff officers whose doctrine and instinct are nearly identical."
mengele_clone_genius_cohorts: "Genius Cohorts"
mengele_clone_genius_cohorts_desc: "Selected lines are routed into laboratories and design bureaus, where accelerated education produces unsettlingly efficient research teams."
mengele_clone_perfected_muscle_memory: "Perfected Muscle Memory"
mengele_clone_perfected_muscle_memory_desc: "Repeated combat conditioning gives clone units an unnatural rhythm in close assault, defense, and breakthrough operations."
mengele_clone_replacement_pipeline: "Replacement Pipeline"
mengele_clone_replacement_pipeline_desc: "The Directorate can restore losses through a managed flow of new bodies, equipment files, and battlefield-ready conditioning."
mengele_clone_future_state: "The Numbered Future"
mengele_clone_future_state_desc: "The regime has stopped presenting the clone army as an emergency. It is now the model for the state that follows."
mengele_clone_reclamation_authority: "Reclamation Authority"
mengele_clone_reclamation_authority_desc: "Dedicated boards are numbering the old German and Polish heartland, marking ownership files, labor corridors, rail grids, and replacement depots for direct Directorate rule."
mengele_clone_continental_dominance: "Continental Dominance Protocol"
mengele_clone_continental_dominance_desc: "The heartland has been folded into one military plan. Every border is treated as a staging line for the next replacement offensive."
mengele_clone_western_command: "Western Specimen Command"
mengele_clone_western_command_desc: "Western industry, ports, and laboratories are being mapped for seizure by clone formations and Directorate security staff."
mengele_clone_eastern_command: "Eastern Laboratory Command"
mengele_clone_eastern_command_desc: "Eastern occupation corridors are assigned to military laboratories, numbered formations, and replacement staffs trained for immense land campaigns."
mengele_clone_southern_command: "Southern Growth Command"
mengele_clone_southern_command_desc: "Danubian and Mediterranean routes are being prepared for growth-vat logistics, forced transfers, and field replacement depots."
mengele_clone_continental_command_spine: "Continental Command Spine"
mengele_clone_continental_command_spine_desc: "Western, eastern, and southern commands now answer to one operational spine, allowing clone armies to move as a single continental machine."
mengele_clone_world_dominance_protocols: "World Dominance Protocols"
mengele_clone_world_dominance_protocols_desc: "The Directorate is no longer planning for regional survival. It is preparing permanent military rule over every remaining great power."
mengele_clone_conditioned_batch: "Conditioned Clone Batch"
mengele_clone_conditioned_batch_desc: "A selected batch of clone formations has been pushed through an intensive battlefield obedience program."
mengele_clone_genius_selection: "Genius Selection"
mengele_clone_genius_selection_desc: "A temporary concentration of selected clone intellects is accelerating research work across the Directorate."
mengele_clone_immunity_campaign: "Clone Immunity Campaign"
mengele_clone_immunity_campaign_desc: "Medical teams are hardening clone formations against exposure, fatigue, and controlled pathogen environments."
mengele_clone_continental_assault_protocols: "Continental Assault Protocols"
mengele_clone_continental_assault_protocols_desc: "Command staffs are burning through command reserves to synchronize a short, violent campaign wave across the clone army."
mengele_clone_foreign_science_front: "Foreign Science Front"
mengele_clone_foreign_science_front_desc: "The Directorate maintains deniable missions abroad under the language of emergency medical industry and military modernization."
mengele_clone_foreign_tank_consortia: "Foreign Tank Consortia"
mengele_clone_foreign_tank_consortia_desc: "Hidden growth tanks, sealed technical teams, and private supply channels are being attached to foreign aid networks."
mengele_clone_global_replacement_maps: "Global Replacement Maps"
mengele_clone_global_replacement_maps_desc: "The Directorate is compiling foreign sites, logistics corridors, and military replacement routes into a single activation map."
mengele_clone_world_order_state: "Centralized Replication Command"
mengele_clone_world_order_state_desc: "The hidden foreign network has activated. The Directorate commands mass clone production, forced loyalty systems, sealed biomedical logistics, and foreign replacement pipelines as one military structure."
mengele_clone_client_state: "Clone Client Regime"
mengele_clone_client_state_desc: "This breakaway administration is held together by Directorate staff, hidden cloning facilities, indoctrinated cadres, and replacement formations raised from sealed laboratories."
mengele_cloning_facility_manpower: "Facility Cloning Output"
mengele_cloning_facility_manpower_desc: "Completed cloning project infrastructure is converting controlled biowarfare facilities into a direct weekly replacement-manpower pipeline."
sp_mengele_cloning: "Cloning"
sp_mengele_cloning_desc: "A sealed biomedical special project for accelerated replication, controlled maturation, and military replacement manpower. Completion converts each controlled biowarfare facility into a weekly manpower source; if Germany completes it while Mengele's program still has state backing, the laboratories can revolt."
sp_mengele_cloning_completed_tt: "Adds §Y10,000 weekly manpower per controlled biowarfare facility§! through a dynamic modifier. If the German program is still active, Mengele's laboratories will revolt."

mengele_clone_army_category: "Clone Directorate"
mengele_clone_army_category_desc: "Direct the clone army's growth vats, conditioning programs, biowarfare facilities, and laboratory research priorities."
expand_growth_vats: "Expand Growth Vats"
expand_growth_vats_desc: "Convert available laboratory capacity into additional clone growth lines and replacement manpower."
raise_clone_infantry_wave: "Raise Clone Infantry Wave"
raise_clone_infantry_wave_desc: "Open another controlled batch and deploy it as field-ready clone infantry."
raise_clone_assault_wave: "Raise Clone Assault Wave"
raise_clone_assault_wave_desc: "Deploy heavier assault-pattern clone infantry with deeper conditioning and more complete field equipment."
raise_clone_guard_wave: "Raise Clone Guard Wave"
