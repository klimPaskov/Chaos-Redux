l_english:
chaosx.nr70.1.t: "The Gods of Africa"

chaosx.nr70.1.d: "The gods of Africa have issued a demand for tribute from our nation to prevent chaos from engulfing the world."
chaosx.nr70.1.a: "What if we don't?"

chaosx.nr70.2.t: "The Gods of Africa"
chaosx.nr70.2.d: "The gods of Africa have issued a second demand: the sacrifice of our military forces to demonstrate our commitment to their divine will."
chaosx.nr70.2.a: "This is obviously a fraud!"

chaosx.nr70.3.t: "The Gods of Africa"
chaosx.nr70.3.d: "The gods of Africa have issued a third demand: the disbandment of all our military divisions. This ultimatum challenges the very foundation of our nation's security and defense, compelling us to confront the prospect of relinquishing our armed forces in service to divine decree."
chaosx.nr70.3.a: "They want WHAT?"

chaosx.nr70.4.t: "The Gods of Africa"
chaosx.nr70.4.d: "The gods of Africa have issued the final demand: the sacrifice of a significant portion of our population as tribute. This horrifying ultimatum plunges our nation into turmoil, as we grapple with the prospect of sacrificing our own people to appease ancient deities."
chaosx.nr70.4.a: "These are dark times..."

chaosx.nr70.5.t: "Demands fulfilled"
chaosx.nr70.5.d: "Our nation has fulfilled the demands of the African gods, thereby averting the catastrophic specter of destruction and chaos that threatened to engulf the world. Through unwavering obedience and solemn tribute, we have upheld our duty to preserve harmony and balance in the universe."
chaosx.nr70.5.a: "Finally!"

chaosx.nr70.6.t: "§RGods of Africa warn us!§!"
chaosx.nr70.6.d: "Something catastrophic will happen unless we do what they say §RNOW§!! They say that the Moon will fall from the orbit and collide with the Earth! We have just §R5 days left§!, we must take action now!"
chaosx.nr70.6.a: "For the sake of humanity!"
chaosx.nr70.6.b: "I DON'T CARE ABOUT HUMANITY! LEAVE ME ALONE!"

chaosx.nr70.7.t: "We keep on failing the demands!"
chaosx.nr70.7.d: "The Gods of Africa have warned us that if we don't submit to their demands NOW, something very, VERY bad will happen..."
chaosx.nr70.7.a: "This is NOT a JOKE!"

chaosx.nr70.8.t: "We have failed a demand!"
chaosx.nr70.8.d: "The Gods of Africa have predicted something catastrophic..."
chaosx.nr70.8.a: "We are all going to die!"

chaosx.news.62.t: "§RThe Moon has collided with our Earth!§!"
chaosx.news.62.d: "The Gods of Africa have unleashed their wrath upon the world, triggering catastrophic natural disasters of unprecedented scale. [FROM.GetName] is told to have been the reason of this devastation. From devastating storms to volcanic eruptions and seismic upheavals, the continent experiences a series of cataclysmic events that reverberate across the globe. As cities crumble, coastlines vanish, and communities are torn apart, humanity finds itself facing an existential crisis of unimaginable proportions."
chaosx.news.62.a: "This is the end"
