l_english:
soviet_collapse_kazakhstan_focus_tree: "Kazakhstan Collapse"
soviet_collapse_kazakhstan_focus_tree_desc: "A runtime Soviet Collapse focus tree for an event-created Kazakhstan."
kaz_soviet_collapse_steppe_mandate_dynamic_rewards_tt: "Steppe mandate rewards scale from owned states, accumulated myth authority, foreign attention, Soviet depot vulnerability, and Soviet weirdness."
kaz_soviet_collapse_resource_state_dynamic_rewards_tt: "Resource-state rewards scale from owned states, resource authority, recognition progress, foreign attention, and Soviet depot vulnerability."
kaz_soviet_collapse_foreign_vector_dynamic_rewards_tt: "Foreign-vector rewards scale from owned states, liaison reach, resource contracts, technical cadres, recognition progress, and Soviet foreign appetite."
kaz_soviet_collapse_alma_ata_emergency_congress: "Alma-Ata Emergency Congress"
kaz_soviet_collapse_alma_ata_emergency_congress_desc: "Delegates, officers, engineers, and district messengers gather in Alma-Ata to decide whether the steppe can still answer as one country."
kaz_soviet_collapse_the_southern_wires_are_cut: "The Southern Wires Are Cut"
kaz_soviet_collapse_the_southern_wires_are_cut_desc: "Telegraph and rail reports from the south arrive late, broken, or not at all, forcing Kazakhstan to treat Central Asia as an active front of the crisis."
kaz_soviet_collapse_steppe_district_inventories: "Steppe District Inventories"
kaz_soviet_collapse_steppe_district_inventories_desc: "District clerks count depots, horses, trucks, fuel, and rail links before distance turns missing records into lost authority."
kaz_soviet_collapse_guard_the_resource_towns: "Guard the Resource Towns"
kaz_soviet_collapse_guard_the_resource_towns_desc: "Mineheads, oil offices, rail towns, and worker settlements receive guards before outside patrons or Soviet remnants can claim the republic's wealth."
kaz_soviet_collapse_the_congress_chooses_a_past: "The Congress Chooses a Past"
kaz_soviet_collapse_the_congress_chooses_a_past_desc: "The emergency congress debates which memory can hold the state together: old autonomy, socialist congresses, resource authority, or southern federation."
kaz_soviet_collapse_the_south_asks_for_guarantees: "The South Asks for Guarantees"
kaz_soviet_collapse_the_south_asks_for_guarantees_desc: "Southern delegations ask whether Kazakhstan will protect routes, borders, and councils without turning help into command."
kaz_soviet_collapse_a_state_across_distances: "A State Across Distances"
kaz_soviet_collapse_a_state_across_distances_desc: "Kazakhstan accepts that survival depends on governing from rail junctions, aul councils, mine towns, and mobile staffs at the same time."
kaz_soviet_collapse_alash_memory_restored: "Alash Memory Restored"
kaz_soviet_collapse_alash_memory_restored_desc: "Alash memory returns as a living legal claim for autonomy, schools, courts, and republican rights."
kaz_soviet_collapse_socialist_steppe_republic: "Socialist Steppe Republic"
kaz_soviet_collapse_socialist_steppe_republic_desc: "Local soviets and worker councils declare that socialism on the steppe can survive without obeying a collapsing center."
kaz_soviet_collapse_resource_defense_directorate: "Resource Defense Directorate"
kaz_soviet_collapse_resource_defense_directorate_desc: "Engineers, mine guards, and military clerks form a directorate to keep coal, oil, rail, and metal under republican command."
kaz_soviet_collapse_turkestan_federation_mandate: "Turkestan Federation Mandate"
kaz_soviet_collapse_turkestan_federation_mandate_desc: "Kazakhstan seeks a mandate to bind steppe and oasis republics through guarantees, route security, and equal councils."
kaz_soviet_collapse_the_alash_courts: "The Alash Courts"
kaz_soviet_collapse_the_alash_courts_desc: "Courts, teachers, and legal committees turn restored memory into procedures that officials and soldiers can obey."
kaz_soviet_collapse_aul_councils_and_red_teachers: "Aul Councils and Red Teachers"
kaz_soviet_collapse_aul_councils_and_red_teachers_desc: "Rural councils and socialist teachers carry the republic into districts no ministry can reach by decree alone."
kaz_soviet_collapse_engineers_hold_the_state: "Engineers Hold the State"
kaz_soviet_collapse_engineers_hold_the_state_desc: "Engineers and technical cadres keep mines, wells, depots, and rail offices operating as the skeleton of emergency government."
kaz_soviet_collapse_oasis_and_steppe_congress: "Oasis and Steppe Congress"
kaz_soviet_collapse_oasis_and_steppe_congress_desc: "Delegates from oasis cities and steppe districts draft rules for cooperation before fear turns routes into borders."
kaz_soviet_collapse_no_single_capital_can_hold_the_steppe: "No Single Capital Can Hold the Steppe"
kaz_soviet_collapse_no_single_capital_can_hold_the_steppe_desc: "The republic accepts a decentralized model of congresses, resource towns, mobile staffs, and southern councils because no capital can command the steppe alone."
kaz_soviet_collapse_karaganda_emergency_board: "Karaganda Emergency Board"
kaz_soviet_collapse_karaganda_emergency_board_desc: "Karaganda's mine offices and worker guards become an emergency board for coal, labor, rail schedules, and state survival."
kaz_soviet_collapse_oil_field_protection_orders: "Oil Field Protection Orders"
kaz_soviet_collapse_oil_field_protection_orders_desc: "Oil fields receive guards, ledgers, and transport orders before foreign missions or Soviet remnants can bargain over them."
kaz_soviet_collapse_rail_to_the_mines: "Rail to the Mines"
kaz_soviet_collapse_rail_to_the_mines_desc: "Rail links to mines are treated as state arteries, with trains, guards, and dispatchers assigned to resource corridors."
kaz_soviet_collapse_factories_around_the_pitheads: "Factories Around the Pitheads"
kaz_soviet_collapse_factories_around_the_pitheads_desc: "Workshops and emergency factories gather around the pitheads so coal, metal, and repairs can feed each other."
kaz_soviet_collapse_coal_for_rifles_oil_for_trucks: "Coal for Rifles, Oil for Trucks"
kaz_soviet_collapse_coal_for_rifles_oil_for_trucks_desc: "Resource boards convert coal, oil, and rail priority into rifles, support stores, and mobile columns."
kaz_soviet_collapse_resource_concessions_debate: "Resource Concessions Debate"
kaz_soviet_collapse_resource_concessions_debate_desc: "The congress debates whether foreign engineers, League pooling, or domestic control can protect the republic without selling it."
kaz_soviet_collapse_domestic_resource_state: "Domestic Resource State"
kaz_soviet_collapse_domestic_resource_state_desc: "Mines, wells, and rail contracts are kept under Kazakh law even when that slows foreign aid."
kaz_soviet_collapse_league_resource_pool: "League Resource Pool"
kaz_soviet_collapse_league_resource_pool_desc: "Kazakhstan offers controlled resource pooling to friendly republics so shared defense does not become extraction by another name."
kaz_soviet_collapse_foreign_technical_missions: "Foreign Technical Missions"
kaz_soviet_collapse_foreign_technical_missions_desc: "Foreign engineers and advisers enter under escort, contract review, and clear limits on authority."
kaz_soviet_collapse_the_steppe_arsenal: "The Steppe Arsenal"
kaz_soviet_collapse_the_steppe_arsenal_desc: "Resource towns, workshops, and guarded rail lines become an arsenal built for a country that fights across distance."
kaz_soviet_collapse_mobile_steppe_staff: "Mobile Steppe Staff"
kaz_soviet_collapse_mobile_steppe_staff_desc: "The general staff learns to move with the war, carrying maps, radios, and authority across rail gaps and long roads."
kaz_soviet_collapse_aul_horse_registers: "Aul Horse Registers"
kaz_soviet_collapse_aul_horse_registers_desc: "Aul committees register horses, riders, guides, and local supply so mobile defense begins with known people."
kaz_soviet_collapse_truck_columns_from_depots: "Truck Columns from Depots"
kaz_soviet_collapse_truck_columns_from_depots_desc: "Depot inventories become truck columns that can move rifles, food, and orders faster than the rail map allows."
kaz_soviet_collapse_southern_pass_guards: "Southern Pass Guards"
kaz_soviet_collapse_southern_pass_guards_desc: "Border guards and local guides watch the southern passes where friendly routes, refugees, and hostile probes all cross."
kaz_soviet_collapse_officers_of_the_steppe_district: "Officers of the Steppe District"
kaz_soviet_collapse_officers_of_the_steppe_district_desc: "Defecting and local officers are folded into a steppe command that answers to the republic rather than abandoned Soviet channels."
kaz_soviet_collapse_the_wide_defense_doctrine: "The Wide Defense Doctrine"
kaz_soviet_collapse_the_wide_defense_doctrine_desc: "Defense plans use distance, fallback lines, mobile reserves, and rail junctions as a system instead of waiting for a single front."
kaz_soviet_collapse_the_border_is_a_road: "The Border Is a Road"
kaz_soviet_collapse_the_border_is_a_road_desc: "The southern border is treated as a moving road of convoys, patrols, envoys, and warnings rather than a line on a map."
kaz_soviet_collapse_league_cavalry_school: "League Cavalry School"
kaz_soviet_collapse_league_cavalry_school_desc: "Mounted reserves train under shared rules so League partners can trust cavalry that moves between jurisdictions."
kaz_soviet_collapse_mechanized_resource_guards: "Mechanized Resource Guards"
kaz_soviet_collapse_mechanized_resource_guards_desc: "Resource guards receive trucks, repair teams, and military discipline to protect mines and wells without becoming private armies."
kaz_soviet_collapse_the_army_that_crosses_distance: "The Army That Crosses Distance"
kaz_soviet_collapse_the_army_that_crosses_distance_desc: "Kazakhstan's emergency forces become an army built for roads, rail, steppe, mines, borders, and distances that break ordinary command."
kaz_soviet_collapse_restore_alash_names: "Restore Alash Names"
kaz_soviet_collapse_restore_alash_names_desc: "Old Alash names return as legal memory, not museum decoration, giving the steppe crisis a republican vocabulary."
kaz_soviet_collapse_semey_legal_circle: "Semey Legal Circle"
kaz_soviet_collapse_semey_legal_circle_desc: "Jurists and teachers in Semey assemble laws, seals, and civic claims that predate Soviet command."
kaz_soviet_collapse_akhmet_baitursynuly_schools: "Baitursynuly School Boards"
kaz_soviet_collapse_akhmet_baitursynuly_schools_desc: "School boards protect language, textbooks, and teachers as instruments of state survival."
kaz_soviet_collapse_local_notable_compacts: "Local Notable Compacts"
kaz_soviet_collapse_local_notable_compacts_desc: "Local notables are bound to the emergency government through taxes, guards, and promises of regional voice."
kaz_soviet_collapse_steppe_land_statutes: "Steppe Land Statutes"
kaz_soviet_collapse_steppe_land_statutes_desc: "Land statutes limit requisitions and protect pasture routes before statehood becomes another seizure."
kaz_soviet_collapse_civic_militia_charter: "Civic Militia Charter"
kaz_soviet_collapse_civic_militia_charter_desc: "Militias receive civic charters so armed local authority does not fracture into clan command."
kaz_soviet_collapse_minority_rights_of_the_steppe: "Minority Rights of the Steppe"
kaz_soviet_collapse_minority_rights_of_the_steppe_desc: "Minority guarantees are issued before Moscow or foreign patrons can claim to protect the vulnerable."
kaz_soviet_collapse_alash_press_rooms: "Alash Press Rooms"
kaz_soviet_collapse_alash_press_rooms_desc: "Press rooms explain the republic through autonomy, law, and memory rather than panic."
kaz_soviet_collapse_constitutional_kurultai: "Constitutional Kurultai"
kaz_soviet_collapse_constitutional_kurultai_desc: "A constitutional kurultai turns restoration language into institutions that can survive war."
kaz_soviet_collapse_republic_of_the_steppe_law: "Republic of the Steppe Law"
kaz_soviet_collapse_republic_of_the_steppe_law_desc: "Steppe law becomes a modern state claim tied to courts, schools, and local compacts."
kaz_soviet_collapse_alash_republican_mandate: "Alash Republican Mandate"
kaz_soviet_collapse_alash_republican_mandate_desc: "Kazakhstan claims continuity with a republican tradition Moscow failed to erase."
kaz_soviet_collapse_soviets_of_the_steppe: "Soviets of the Steppe"
kaz_soviet_collapse_soviets_of_the_steppe_desc: "Local soviets claim socialist authority across distance without accepting direct command from Moscow."
kaz_soviet_collapse_mining_workers_councils: "Mining Workers Councils"
kaz_soviet_collapse_mining_workers_councils_desc: "Mining workers councils secure pits, rail heads, and food stores under republican socialist law."
kaz_soviet_collapse_collective_farm_bargains: "Collective Farm Bargains"
kaz_soviet_collapse_collective_farm_bargains_desc: "Collective farms receive protection from panic requisitions in exchange for grain and horses."
kaz_soviet_collapse_red_nomad_committees: "Red Nomad Committees"
kaz_soviet_collapse_red_nomad_committees_desc: "Mobile committees carry socialist authority to districts that no capital can govern from a desk."
kaz_soviet_collapse_socialist_language_schools: "Socialist Language Schools"
kaz_soviet_collapse_socialist_language_schools_desc: "Schools tie socialist citizenship to local language and technical training."
kaz_soviet_collapse_unionists_of_distance: "Unionists of Distance"
kaz_soviet_collapse_unionists_of_distance_desc: "Unionist cadres are kept inside the republic if they accept that distance requires sovereignty."
kaz_soviet_collapse_workers_militia_of_karaganda: "Workers Militia of Karaganda"
kaz_soviet_collapse_workers_militia_of_karaganda_desc: "Industrial militias defend mines and rail depots as political organs as well as military units."
kaz_soviet_collapse_planned_economy_without_center: "Planned Economy Without Center"
kaz_soviet_collapse_planned_economy_without_center_desc: "Planning boards keep socialist allocation while refusing Soviet ministries that no longer deliver."
kaz_soviet_collapse_red_steppe_manifesto: "Red Steppe Manifesto"
kaz_soviet_collapse_red_steppe_manifesto_desc: "The manifesto calls for a red republic built around distance, labor, and local congresses."
kaz_soviet_collapse_appeal_to_asian_soviets: "Appeal to Asian Soviets"
kaz_soviet_collapse_appeal_to_asian_soviets_desc: "Kazakhstan appeals to Central Asian soviets that fear both Moscow restoration and nationalist exclusion."
kaz_soviet_collapse_sovereign_steppe_socialism: "Sovereign Steppe Socialism"
kaz_soviet_collapse_sovereign_steppe_socialism_desc: "A socialist Kazakhstan becomes a rival center for the eastern collapse."
kaz_soviet_collapse_call_the_steppe_congress: "Call the Steppe Congress"
kaz_soviet_collapse_call_the_steppe_congress_desc: "Kazakhstan calls nearby republics and local authorities to discuss survival across distance."
kaz_soviet_collapse_uzbek_supply_delegates: "Uzbek Supply Delegates"
kaz_soviet_collapse_uzbek_supply_delegates_desc: "Uzbek delegates negotiate grain, cotton, rail protection, and border calm."
kaz_soviet_collapse_kyrgyz_mountain_liaisons: "Kyrgyz Mountain Liaisons"
kaz_soviet_collapse_kyrgyz_mountain_liaisons_desc: "Kyrgyz liaisons coordinate mountain routes, horse supply, and frontier warning posts."
kaz_soviet_collapse_tajik_pass_agreements: "Tajik Pass Agreements"
kaz_soviet_collapse_tajik_pass_agreements_desc: "Pass agreements keep southern routes open without pretending every border dispute is settled."
kaz_soviet_collapse_turkmen_fuel_contacts: "Turkmen Fuel Contacts"
kaz_soviet_collapse_turkmen_fuel_contacts_desc: "Fuel contacts search for southern energy lifelines outside Soviet accounting."
kaz_soviet_collapse_common_steppe_passports: "Common Steppe Passports"
kaz_soviet_collapse_common_steppe_passports_desc: "Passports and transit papers let soldiers, refugees, and traders cross federation territory under known rules."
kaz_soviet_collapse_federation_arbitration_tents: "Federation Arbitration Tents"
kaz_soviet_collapse_federation_arbitration_tents_desc: "Arbitration tents settle local disputes before Moscow can turn them into counterrevolutionary evidence."
kaz_soviet_collapse_steppe_defense_council: "Steppe Defense Council"
kaz_soviet_collapse_steppe_defense_council_desc: "A defense council coordinates mobile reserves, rail guards, and border warnings."
kaz_soviet_collapse_no_center_clause: "No Center Clause"
kaz_soviet_collapse_no_center_clause_desc: "The federation writes a no-center clause to prevent Astana or Almaty from becoming another Moscow."
kaz_soviet_collapse_continental_supply_map: "Continental Supply Map"
kaz_soviet_collapse_continental_supply_map_desc: "Supply maps stretch from Caspian routes to eastern rail yards, showing the federation as a continental system."
kaz_soviet_collapse_steppe_federation_proclaimed: "Steppe Federation Proclaimed"
kaz_soviet_collapse_steppe_federation_proclaimed_desc: "The federation becomes a political answer to collapse, not merely a defensive pact."
kaz_soviet_collapse_karaganda_coal_accounting: "Karaganda Coal Accounting"
kaz_soviet_collapse_karaganda_coal_accounting_desc: "Coal accounts reveal which mines can heat cities, move trains, and keep arsenals working."
kaz_soviet_collapse_emergency_oil_boards: "Emergency Oil Boards"
kaz_soviet_collapse_emergency_oil_boards_desc: "Oil boards secure wells, refineries, and transport offices before outside patrons bargain for them."
kaz_soviet_collapse_copper_and_chrome_ledgers: "Copper and Chrome Ledgers"
kaz_soviet_collapse_copper_and_chrome_ledgers_desc: "Metal ledgers make strategic minerals part of the republic budget and defense plan."
kaz_soviet_collapse_guard_the_mine_heads: "Guard the Mine Heads"
kaz_soviet_collapse_guard_the_mine_heads_desc: "Mine heads receive guards, ration priority, and sabotage watches."
kaz_soviet_collapse_industrial_settlement_compacts: "Industrial Settlement Compacts"
kaz_soviet_collapse_industrial_settlement_compacts_desc: "Industrial settlements trade labor peace for food, medicine, and republican protection."
kaz_soviet_collapse_rail_to_the_fields: "Rail to the Fields"
kaz_soviet_collapse_rail_to_the_fields_desc: "Rail planning ties mines, grain districts, and military depots into a single survival economy."
kaz_soviet_collapse_foreign_concession_screens: "Foreign Concession Screens"
kaz_soviet_collapse_foreign_concession_screens_desc: "Concession offers are screened for hidden patronage, intelligence access, and postwar traps."
kaz_soviet_collapse_technical_cadre_registry: "Technical Cadre Registry"
kaz_soviet_collapse_technical_cadre_registry_desc: "Engineers, geologists, drillers, and rail mechanics are registered before they flee or get recruited abroad."
kaz_soviet_collapse_resource_for_recognition: "Resources for Recognition"
kaz_soviet_collapse_resource_for_recognition_desc: "Resource deliveries become diplomatic proof that Kazakhstan is a government with things the world needs."
kaz_soviet_collapse_state_mineral_reserve: "State Mineral Reserve"
kaz_soviet_collapse_state_mineral_reserve_desc: "A mineral reserve funds the emergency without selling the republic in pieces."
kaz_soviet_collapse_resource_sovereignty: "Resource Sovereignty"
kaz_soviet_collapse_resource_sovereignty_desc: "Kazakhstan turns mines, wells, and rail contracts into permanent state power."
kaz_soviet_collapse_open_eastern_liaison_yurts: "Open Eastern Liaison Yurts"
kaz_soviet_collapse_open_eastern_liaison_yurts_desc: "Mobile liaison offices receive foreign missions where permanent embassies would signal too much."
kaz_soviet_collapse_turkish_language_channels: "Turkish Language Channels"
kaz_soviet_collapse_turkish_language_channels_desc: "Turkish channels offer cultural sympathy, advisers, and the risk of ideological patronage."
kaz_soviet_collapse_iranian_caspian_notes: "Iranian Caspian Notes"
kaz_soviet_collapse_iranian_caspian_notes_desc: "Iranian notes probe trade, refugees, and Caspian access without forcing a public alignment."
kaz_soviet_collapse_japanese_far_east_approaches: "Japanese Far East Approaches"
kaz_soviet_collapse_japanese_far_east_approaches_desc: "Japanese approaches are treated as leverage against Moscow and as a danger to eastern sovereignty."
kaz_soviet_collapse_british_mining_observers: "British Mining Observers"
kaz_soviet_collapse_british_mining_observers_desc: "Mining observers bring technical advice while testing how much resource access they expect."
kaz_soviet_collapse_american_credit_against_minerals: "American Credit Against Minerals"
kaz_soviet_collapse_american_credit_against_minerals_desc: "American credit talks tie loans, minerals, and recognition into one uncomfortable ledger."
kaz_soviet_collapse_german_anti_soviet_screens: "German Anti-Soviet Screens"
kaz_soviet_collapse_german_anti_soviet_screens_desc: "German anti-Soviet offers are screened for military usefulness and future domination."
kaz_soviet_collapse_chinese_border_silence: "Chinese Border Silence"
kaz_soviet_collapse_chinese_border_silence_desc: "Border silence with China reduces risk while the republic decides what eastern neutrality means."
kaz_soviet_collapse_patronage_risk_council: "Patronage Risk Council"
kaz_soviet_collapse_patronage_risk_council_desc: "The council tracks advisers, arms, loans, mineral rights, and intelligence promises."
kaz_soviet_collapse_multi_vector_recognition: "Multi-Vector Recognition"
kaz_soviet_collapse_multi_vector_recognition_desc: "Kazakhstan seeks recognition from several directions so none can own the emergency."
kaz_soviet_collapse_recognized_across_distance: "Recognized Across Distance"
kaz_soviet_collapse_recognized_across_distance_desc: "Foreign powers learn to treat distance as Kazakh strength rather than emptiness."
kaz_soviet_collapse_stories_ride_ahead: "Stories Ride Ahead"
kaz_soviet_collapse_stories_ride_ahead_desc: "Strange stories travel faster than trains, shaping how districts understand the collapse."
kaz_soviet_collapse_sky_mandate_debates: "Sky Mandate Debates"
kaz_soviet_collapse_sky_mandate_debates_desc: "Congress delegates argue whether old steppe memory can guide modern emergency rule."
kaz_soviet_collapse_tengri_and_the_party_files: "Tengri and the Party Files"
kaz_soviet_collapse_tengri_and_the_party_files_desc: "Party files and sacred language collide in districts where normal authority has failed."
kaz_soviet_collapse_star_road_patrols: "Star Road Patrols"
kaz_soviet_collapse_star_road_patrols_desc: "Patrols along remote roads report lights, abandoned depots, and soldiers who follow rumors."
kaz_soviet_collapse_ancestral_courier_oaths: "Ancestral Courier Oaths"
kaz_soviet_collapse_ancestral_courier_oaths_desc: "Couriers swear old-style oaths to make messages trusted across impossible distances."
kaz_soviet_collapse_myth_without_surrendering_law: "Myth Without Surrendering Law"
kaz_soviet_collapse_myth_without_surrendering_law_desc: "The government uses steppe memory while keeping courts and ministries from becoming prophecy."
kaz_soviet_collapse_nomad_radio_tales: "Nomad Radio Tales"
kaz_soviet_collapse_nomad_radio_tales_desc: "Radio tales turn distance, horses, storms, and rail gaps into a shared national language."
kaz_soviet_collapse_guard_against_cult_officers: "Guard Against Cult Officers"
kaz_soviet_collapse_guard_against_cult_officers_desc: "Officers who mistake myth for private command are contained before they build their own armies."
kaz_soviet_collapse_the_horizon_as_border: "The Horizon as Border"
kaz_soviet_collapse_the_horizon_as_border_desc: "The horizon becomes a political image for a state too wide to be governed by fear."
kaz_soviet_collapse_steppe_beyond_history: "The Steppe Beyond History"
kaz_soviet_collapse_steppe_beyond_history_desc: "Foreign governments realize the eastern collapse has produced a power rather than a buffer."
kaz_soviet_collapse_sky_mandate_of_the_republic: "Sky Mandate of the Republic"
kaz_soviet_collapse_sky_mandate_of_the_republic_desc: "High-chaos memory is folded into state identity without letting it devour the state."
kaz_soviet_collapse_mobile_district_commands: "Mobile District Commands"
kaz_soviet_collapse_mobile_district_commands_desc: "District commands learn to move with the front across rail gaps, desert roads, and scattered settlements."
kaz_soviet_collapse_horse_and_truck_columns: "Horse and Truck Columns"
kaz_soviet_collapse_horse_and_truck_columns_desc: "Horse and truck columns give the army mobility where railways cannot carry every order."
kaz_soviet_collapse_rail_guard_brigades: "Rail Guard Brigades"
kaz_soviet_collapse_rail_guard_brigades_desc: "Rail guard brigades defend the lines that make distant fronts possible."
kaz_soviet_collapse_caspian_security_detachments: "Caspian Security Detachments"
kaz_soviet_collapse_caspian_security_detachments_desc: "Caspian detachments watch ports, oil movement, and southern approaches."
kaz_soviet_collapse_airstrips_on_the_steppe: "Airstrips on the Steppe"
kaz_soviet_collapse_airstrips_on_the_steppe_desc: "Emergency airstrips link command, reconnaissance, and medical evacuation across vast distances."
kaz_soviet_collapse_frontier_warning_posts: "Frontier Warning Posts"
kaz_soviet_collapse_frontier_warning_posts_desc: "Warning posts track Soviet columns, raiders, foreign probes, and federation disputes."
kaz_soviet_collapse_armored_reserve_at_the_junctions: "Armored Reserve at the Junctions"
kaz_soviet_collapse_armored_reserve_at_the_junctions_desc: "Armored reserves wait near junctions where one timely train can decide a front."
kaz_soviet_collapse_military_settlement_support: "Military Settlement Support"
kaz_soviet_collapse_military_settlement_support_desc: "Settlements hosting troops receive food, medicine, and legal protection to prevent military occupation from rotting legitimacy."
kaz_soviet_collapse_doctrine_of_distance: "Doctrine of Distance"
kaz_soviet_collapse_doctrine_of_distance_desc: "The general staff treats distance as defense, supply problem, and political fact at once."
kaz_soviet_collapse_continental_mobile_staff: "Continental Mobile Staff"
kaz_soviet_collapse_continental_mobile_staff_desc: "A mobile staff plans campaigns across a theater wider than most governments can read."
kaz_soviet_collapse_army_of_the_open_horizon: "Army of the Open Horizon"
kaz_soviet_collapse_army_of_the_open_horizon_desc: "Kazakhstan fields an army designed for rail, steppe, mine, and border wars."
kaz_soviet_collapse_settlement_food_boards: "Settlement Food Boards"
kaz_soviet_collapse_settlement_food_boards_desc: "Food boards keep remote settlements loyal by proving the republic can deliver more than decrees."
kaz_soviet_collapse_new_capital_argument: "New Capital Argument"
kaz_soviet_collapse_new_capital_argument_desc: "Officials debate whether emergency geography demands a capital that can survive the crisis."
kaz_soviet_collapse_rail_town_charters: "Rail Town Charters"
kaz_soviet_collapse_rail_town_charters_desc: "Rail towns receive charters that tie local autonomy to national supply obligations."
kaz_soviet_collapse_clinic_and_school_caravans: "Clinic and School Caravans"
kaz_soviet_collapse_clinic_and_school_caravans_desc: "Mobile clinics and schools carry state services across places too distant for normal offices."
kaz_soviet_collapse_industrial_housing_compacts: "Industrial Housing Compacts"
kaz_soviet_collapse_industrial_housing_compacts_desc: "Housing compacts keep mine and oil workers from seeing independence as another extraction regime."
kaz_soviet_collapse_pasture_and_factory_bargains: "Pasture and Factory Bargains"
kaz_soviet_collapse_pasture_and_factory_bargains_desc: "Pasture and factory needs are bargained together so one economy does not starve the other."
kaz_soviet_collapse_scientific_steppe_surveys: "Scientific Steppe Surveys"
kaz_soviet_collapse_scientific_steppe_surveys_desc: "Survey teams map water, minerals, roads, and settlements for a state planning beyond the emergency."
kaz_soviet_collapse_federation_market_rules: "Federation Market Rules"
kaz_soviet_collapse_federation_market_rules_desc: "Market rules allow nearby republics to trade without recreating Soviet command allocation."
kaz_soviet_collapse_postwar_settlement_fund: "Postwar Settlement Fund"
kaz_soviet_collapse_postwar_settlement_fund_desc: "A fund prepares demobilization, housing, and settlement repair before victory creates abandoned armed men."
kaz_soviet_collapse_capital_of_distance: "Capital of Distance"
kaz_soviet_collapse_capital_of_distance_desc: "The capital learns to govern distance instead of pretending the steppe is empty space."
kaz_soviet_collapse_continental_republic_settled: "Continental Republic Settled"
kaz_soviet_collapse_continental_republic_settled_desc: "Kazakhstan emerges as a continental republic of resources, routes, settlements, and guarded autonomy."
kaz_soviet_collapse_council_rotation_rules: "Council Rotation Rules"
kaz_soviet_collapse_council_rotation_rules_desc: "The federation formalizes rotating council seats so no capital turns emergency coordination into command."
kaz_soviet_collapse_trans_steppe_customs_courts: "Trans-Steppe Customs Courts"
kaz_soviet_collapse_trans_steppe_customs_courts_desc: "Customs courts settle disputed tariffs, wagons, and convoy fees before local officials close the routes."
kaz_soviet_collapse_shared_rail_timetables: "Shared Rail Timetables"
kaz_soviet_collapse_shared_rail_timetables_desc: "Shared timetables give member republics predictable military, refugee, and grain movement across the steppe."
kaz_soviet_collapse_border_militia_arbitration: "Border Militia Arbitration"
kaz_soviet_collapse_border_militia_arbitration_desc: "Militia disputes are pulled before arbitration boards before patrol incidents become border wars."
kaz_soviet_collapse_caspian_to_mountain_convoys: "Caspian-to-Mountain Convoys"
kaz_soviet_collapse_caspian_to_mountain_convoys_desc: "Convoy rules connect Caspian supply, steppe railheads, and mountain routes into one federal logistics habit."
kaz_soviet_collapse_federation_language_services: "Federation Language Services"
kaz_soviet_collapse_federation_language_services_desc: "Interpreters, clerks, and school offices keep federation law intelligible across languages and districts."
kaz_soviet_collapse_equal_republic_veto_statute: "Equal-Republic Veto Statute"
kaz_soviet_collapse_equal_republic_veto_statute_desc: "A veto statute protects smaller partners from discovering that federation only renamed domination."
kaz_soviet_collapse_federation_beyond_emergency: "Federation Beyond Emergency"
kaz_soviet_collapse_federation_beyond_emergency_desc: "The Steppe Federation becomes a durable compact for routes, customs, defense, and sovereignty."
kaz_soviet_collapse_strategic_reserve_surveys: "Strategic Reserve Surveys"
kaz_soviet_collapse_strategic_reserve_surveys_desc: "Survey teams recheck deposits, wells, stores, and rail access so reserves are counted by the republic first."
kaz_soviet_collapse_sovereign_concession_courts: "Sovereign Concession Courts"
kaz_soviet_collapse_sovereign_concession_courts_desc: "Concession courts review foreign contracts under Kazakh law rather than under emergency pressure."
kaz_soviet_collapse_mine_militia_academies: "Mine Militia Academies"
kaz_soviet_collapse_mine_militia_academies_desc: "Mine guards are trained as disciplined militia instead of private security for whoever holds a shaft."
kaz_soviet_collapse_rail_mineral_priority_board: "Rail Mineral Priority Board"
kaz_soviet_collapse_rail_mineral_priority_board_desc: "A priority board decides which ores, coal trains, and fuel movements serve survival before profit."
kaz_soviet_collapse_worker_safety_inspectorates: "Worker Safety Inspectorates"
kaz_soviet_collapse_worker_safety_inspectorates_desc: "Inspectorates keep extraction from becoming another forced-labor regime in republican colors."
kaz_soviet_collapse_resource_bank_accounts: "Resource Bank Accounts"
kaz_soviet_collapse_resource_bank_accounts_desc: "Resource revenue is moved into audited accounts that can fund the state without selling its future."
kaz_soviet_collapse_steppe_refinery_program: "Steppe Refinery Program"
kaz_soviet_collapse_steppe_refinery_program_desc: "Refinery planning turns wells and contracts into domestic fuel security."
kaz_soviet_collapse_wealth_beneath_the_republic: "Wealth Beneath the Republic"
kaz_soviet_collapse_wealth_beneath_the_republic_desc: "Kazakhstan treats minerals as a public foundation for sovereignty, defense, and postwar settlement."
kaz_soviet_collapse_consular_triangulation_desks: "Consular Triangulation Desks"
kaz_soviet_collapse_consular_triangulation_desks_desc: "Consular desks compare promises from every direction before any patron can define the republic alone."
kaz_soviet_collapse_loan_treaty_review_rooms: "Loan Treaty Review Rooms"
kaz_soviet_collapse_loan_treaty_review_rooms_desc: "Loan and treaty rooms put foreign credit through legal review before it binds future governments."
kaz_soviet_collapse_border_mission_etiquette: "Border Mission Etiquette"
kaz_soviet_collapse_border_mission_etiquette_desc: "Foreign missions receive border rules, escort limits, and reporting protocols before they become local powers."
kaz_soviet_collapse_observer_rotation_caps: "Observer Rotation Caps"
kaz_soviet_collapse_observer_rotation_caps_desc: "Observer rotations are capped so no advisory mission settles in as an informal occupation."
kaz_soviet_collapse_mineral_credit_arbitration: "Mineral Credit Arbitration"
kaz_soviet_collapse_mineral_credit_arbitration_desc: "Arbitrators separate legitimate mineral-backed credit from predatory emergency concessions."
kaz_soviet_collapse_intelligence_liaison_firebreaks: "Intelligence Liaison Firebreaks"
kaz_soviet_collapse_intelligence_liaison_firebreaks_desc: "Firebreaks let foreign intelligence share warnings without entering police files or army command."
kaz_soviet_collapse_exile_passport_protocols: "Exile Passport Protocols"
kaz_soviet_collapse_exile_passport_protocols_desc: "Passport protocols manage refugees, diplomats, and exiles without surrendering border authority."
kaz_soviet_collapse_sovereign_multi_vector_doctrine: "Sovereign Multi-Vector Doctrine"
kaz_soviet_collapse_sovereign_multi_vector_doctrine_desc: "Multi-vector diplomacy becomes a state doctrine: many doors open, none holding the keys."
kaz_soviet_collapse_long_range_staff_colleges: "Long-Range Staff Colleges"
kaz_soviet_collapse_long_range_staff_colleges_desc: "Staff colleges train officers to plan for rail gaps, huge distances, and several fronts at once."
kaz_soviet_collapse_desert_winter_logistics: "Desert-Winter Logistics"
kaz_soviet_collapse_desert_winter_logistics_desc: "Logistics schools prepare the army for heat, cold, sparse depots, and routes that vanish into weather."
kaz_soviet_collapse_rail_junction_armor_schools: "Rail Junction Armor Schools"
kaz_soviet_collapse_rail_junction_armor_schools_desc: "Armor schools teach mobile reserves to fight for junctions, sidings, and unloading yards."
kaz_soviet_collapse_caspian_air_warning_net: "Caspian Air Warning Net"
kaz_soviet_collapse_caspian_air_warning_net_desc: "An air warning net links Caspian approaches, oil movement, and distant command posts."
kaz_soviet_collapse_frontier_signal_companies: "Frontier Signal Companies"
kaz_soviet_collapse_frontier_signal_companies_desc: "Signal companies keep scattered posts from mistaking silence for peace."
kaz_soviet_collapse_settlement_reserve_cadres: "Settlement Reserve Cadres"
kaz_soviet_collapse_settlement_reserve_cadres_desc: "Reserve cadres tie military training to settlements that must survive mobilization and demobilization alike."
kaz_soviet_collapse_army_depots_under_law: "Army Depots Under Law"
kaz_soviet_collapse_army_depots_under_law_desc: "Army depots are placed under audit and military law before local commanders turn supply into authority."
kaz_soviet_collapse_continental_defense_doctrine: "Continental Defense Doctrine"
kaz_soviet_collapse_continental_defense_doctrine_desc: "Kazakhstan writes a defense doctrine for a republic whose frontier is a continent-wide problem."
