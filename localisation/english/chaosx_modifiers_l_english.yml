l_english:
communism_control_level_1: "Communist Agitation Zone"
communism_control_level_1_desc: "Local communist cells are spreading strikes, propaganda, and intimidation. Loyal authorities can still recover the state through regular intervention."
communism_control_level_2: "Communist Insurgent Stronghold"
communism_control_level_2_desc: "Organized communist militias and revolutionary committees are disrupting industry, logistics, manpower, and local administration."
communism_control_level_3: "Communist Lockdown"
communism_control_level_3_desc: "The state has effectively fallen under communist parallel authority. Normal local intervention can no longer clear it, and the area has become a demilitarized revolutionary lockdown zone."
communism_post_crackdown_scars: "Post-Crackdown Scars"
communism_post_crackdown_scars_desc: "Security operations have restored authority, but arrests, raids, and disrupted workplaces have left temporary economic and local-order damage."
communism_worker_ritual_fear: "Worker Ritual Fear"
communism_worker_ritual_fear_desc: "Strange revolutionary ceremonies and oath gatherings are intimidating loyal workers, slowing production, and weakening local order."
communism_emergency_disruption: "Emergency Anti-Communist Disruption"
communism_emergency_disruption_desc: "Nationwide emergency powers are disrupting production, mobilization, and civilian administration."
zombie_hostile: "Zombie Hostility"
anthrax_contaminated_state: "Anthrax Contamination"
anthrax_contaminated_state_desc: "This state has been contaminated with anthrax spores, severely affecting population and production."
quarantined_contaminated_state: "Quarantined Contaminated State"
quarantined_contaminated_state_desc: "This state is under strict quarantine to contain biological contamination, reducing its spread but impacting production."
bioweapon_user: "Used Biological Weapons"
bioweapon_user_desc: "This nation has used biological weapons, which is condemned by the international community."
bioweapon_repeat_offender: "Repeated Bioweapon Use"
bioweapon_repeat_offender_desc: "This nation has repeatedly used biological weapons despite international condemnation, marking them as a rogue state."
bioweapon_victim_sympathy: "Bioweapon Attack Victim"
bioweapon_victim_sympathy_desc: "This nation was the victim of a biological weapon attack, gaining international sympathy."
chemical_warfare_condemnation_low: "Chemical Warfare Condemned"
chemical_warfare_condemnation_low_desc: "This nation has used chemical warfare, drawing condemnation from democratic governments."
chemical_warfare_condemnation_med: "Severe Chemical Warfare Condemnation"
chemical_warfare_condemnation_med_desc: "This nation has repeatedly used chemical warfare and is facing severe democratic diplomatic backlash."
chemical_warfare_condemnation_high: "Chemical Warfare Rogue State"
chemical_warfare_condemnation_high_desc: "This nation is viewed as a rogue chemical warfare actor and is increasingly isolated by democratic powers."
air_cleanliness_treaty_member_respect: "Air Cleanliness Treaty Cooperation"
air_cleanliness_treaty_member_respect_desc: "Both countries comply with the Air Cleanliness Treaty and maintain strict limits on unconventional warfare."
air_cleanliness_treaty_violator: "Air Cleanliness Treaty Violator"
air_cleanliness_treaty_violator_desc: "This nation violated the Air Cleanliness Treaty by using unconventional weapons and is treated as a pariah actor."
strategic_bioweapon_user: "Used Strategic Bioweapons"
strategic_bioweapon_user_desc: "This nation has used strategic biological weapons, committing crimes against humanity and triggering international outrage."
strategic_bioweapon_repeat_offender: "Repeat Strategic Bioweapon Use"
strategic_bioweapon_repeat_offender_desc: "This nation has repeatedly used strategic biological weapons, marking them as a genocidal rogue state that must be stopped at all costs."
strategic_bioweapon_victim_sympathy: "Strategic Bioweapon Attack Victim"
strategic_bioweapon_victim_sympathy_desc: "This nation was the victim of a strategic biological weapon attack, gaining overwhelming international sympathy and support against such crimes against humanity."
field_hospital_contamination_defense: "Field Hospital Defense"
field_hospital_contamination_defense_desc: "Mobile field hospitals are providing medical care to reduce contamination effects in this state."
quarantine_containment_measures: "Quarantine Protocols"
quarantine_containment_measures_desc: "Strict quarantine measures are in place to contain biological contamination, but at the cost of reduced economic activity."
zombie_decontaminated_state: "Anti-Zombie Decontamination"
zombie_decontaminated_state_desc: "This state has been saturated with anti-zombie decontaminants. Zombie occupation here yields far less manpower and local operational freedom while the cure remains active."
nuclear_fallout_state: "Radioactive Fallout"
nuclear_fallout_state_desc: "This state is suffering long-term radioactive fallout after a nuclear strike. Civilian losses continue to mount while the contamination remains active."

# Plague Contamination
plague_contaminated_state: "Plague Contamination"
plague_contaminated_state_desc: "This state has been contaminated with plague bacteria, causing devastating long-term effects on population and production."

# Tularemia Contamination
tularemia_contaminated_state: "Tularemia Contamination"
tularemia_contaminated_state_desc: "This state has been contaminated with tularemia bacteria, causing tactical military disruption and temporary production issues."

# Smallpox Contamination
smallpox_contaminated_state: "Smallpox Epidemic"
smallpox_contaminated_state_desc: "This state is experiencing a devastating smallpox epidemic, causing catastrophic population loss and economic collapse. Only comprehensive vaccination programs can end this crisis."
