l_english:
soviet_collapse_baltic_focus_tree: "Baltic Collapse"
soviet_collapse_baltic_focus_tree_desc: "A runtime Soviet Collapse focus tree for event-created Lithuania, Latvia, and Estonia."
soviet_collapse_caucasus_focus_tree: "Caucasus Collapse"
soviet_collapse_caucasus_focus_tree_desc: "A runtime Soviet Collapse focus tree for event-created Georgia, Azerbaijan, and Armenia."
soviet_collapse_central_asia_focus_tree: "Central Asian Collapse"
soviet_collapse_central_asia_focus_tree_desc: "A runtime Soviet Collapse focus tree for event-created Uzbekistan, Kyrgyzstan, and Tajikistan."
soviet_collapse_moldova_focus_tree: "Moldova Collapse"
soviet_collapse_moldova_focus_tree_desc: "A runtime Soviet Collapse focus tree for an event-created Moldova."
baltic_soviet_collapse_restore_legal_continuity: "Restore Legal Continuity"
baltic_soviet_collapse_restore_legal_continuity_desc: "Emergency jurists gather pre-Soviet records, municipal files, and republican statutes into a single claim of legal survival."
baltic_soviet_collapse_wire_rooms: "Baltic Wire Rooms"
baltic_soviet_collapse_wire_rooms_desc: "Telegraph rooms, radio relays, and courier desks keep the Baltic governments speaking while Soviet channels fracture."
baltic_soviet_collapse_forest_belts: "Forest Belts"
baltic_soviet_collapse_forest_belts_desc: "The interior forests become guarded depth, sheltering reserves and slowing any loyalist drive toward the capitals."
baltic_soviet_collapse_port_customs: "Port Customs"
baltic_soviet_collapse_port_customs_desc: "Harbor offices inspect cargo, tax relief shipments, and turn sea access into a guarded state resource."
baltic_soviet_collapse_observer_missions: "Observer Missions"
baltic_soviet_collapse_observer_missions_desc: "Foreign observers are invited to see that the crisis governments control offices, ports, and mobilization orders."
baltic_soviet_collapse_home_guard_staff: "Home Guard Staff"
baltic_soviet_collapse_home_guard_staff_desc: "Local defense leagues and reserve officers are folded into a staff system before isolated guards become private armies."
baltic_soviet_collapse_restoration_pact: "Restoration Pact"
baltic_soviet_collapse_restoration_pact_desc: "The Baltic republics turn shared restoration claims into a pact that can coordinate diplomacy and defense."
baltic_soviet_collapse_recognition_dossiers: "Recognition Dossiers"
baltic_soviet_collapse_recognition_dossiers_desc: "Legal teams bind port records, occupation files, casualty rolls, and municipal votes into dossiers foreign missions can verify."
baltic_soviet_collapse_sovereign_baltic_front: "Sovereign Baltic Front"
baltic_soviet_collapse_sovereign_baltic_front_desc: "Ports, forests, and legal offices form a front whose purpose is recognized statehood, not temporary rebellion."
baltic_soviet_collapse_restore_the_state_seal: "Restore the State Seal"
baltic_soviet_collapse_restore_the_state_seal_desc: "The emergency government brings out the state seal, prewar statutes, and municipal records to show that the republic has not begun from nothing."
baltic_soviet_collapse_guard_the_archives: "Guard the Archives"
baltic_soviet_collapse_guard_the_archives_desc: "Archive rooms, parish files, court books, and occupation records are placed under guard before the legal claim can be stolen or burned."
baltic_soviet_collapse_call_the_prewar_deputies: "Call the Prewar Deputies"
baltic_soviet_collapse_call_the_prewar_deputies_desc: "Surviving deputies and municipal leaders are summoned to give the restored state a civilian voice."
baltic_soviet_collapse_emergency_border_guard: "Emergency Border Guard"
baltic_soviet_collapse_emergency_border_guard_desc: "Border police, railway guards, and local volunteers form the first screen against a Soviet return."
baltic_soviet_collapse_the_legal_state_or_the_front_state: "The Legal State or the Front State"
baltic_soviet_collapse_the_legal_state_or_the_front_state_desc: "The republic chooses whether law, borders, Baltic solidarity, or foreign protection will lead the emergency."
baltic_soviet_collapse_legal_continuity_government: "Legal Continuity Government"
baltic_soviet_collapse_legal_continuity_government_desc: "The cabinet grounds every order in legal continuity and makes recognition the center of survival."
baltic_soviet_collapse_military_border_government: "Military Border Government"
baltic_soviet_collapse_military_border_government_desc: "Commanders take wider emergency powers so the border can hold while civilian institutions stay under pressure."
baltic_soviet_collapse_baltic_league_first: "Baltic League First"
baltic_soviet_collapse_baltic_league_first_desc: "The republic treats Baltic coordination as the first shield, binding its fate to the other restored states."
baltic_soviet_collapse_foreign_protection_council: "Foreign Protection Council"
baltic_soviet_collapse_foreign_protection_council_desc: "Foreign missions are invited to protect the republic's survival, but every promise carries a price."
baltic_soviet_collapse_scandinavian_listening_mission: "Scandinavian Listening Mission"
baltic_soviet_collapse_scandinavian_listening_mission_desc: "Northern contacts hear the republic's case through careful radio rooms, consular notes, and guarded witnesses."
baltic_soviet_collapse_british_naval_observers: "British Naval Observers"
baltic_soviet_collapse_british_naval_observers_desc: "Naval observers inspect the ports, the customs books, and the coast guard without receiving command over them."
baltic_soviet_collapse_german_border_pressure: "German Border Pressure"
baltic_soviet_collapse_german_border_pressure_desc: "Pressure from the southwest is acknowledged, watched, and turned into a warning that no protector owns the border."
baltic_soviet_collapse_baltic_recognition_dossier: "Baltic Recognition Dossier"
baltic_soviet_collapse_baltic_recognition_dossier_desc: "The republic binds legal records, witness statements, port controls, and casualty rolls into a dossier foreign missions can verify."
baltic_soviet_collapse_baltic_defense_compact: "Baltic Defense Compact"
baltic_soviet_collapse_baltic_defense_compact_desc: "The Baltic governments prepare a compact for shared defense without forming a wider League before the crisis demands it."
baltic_soviet_collapse_ports_before_patronage: "Ports Before Patronage"
baltic_soviet_collapse_ports_before_patronage_desc: "Port access remains under local law, even when foreign aid and naval observers crowd the harbor offices."
baltic_soviet_collapse_sponsor_fleet_rights: "Sponsor Fleet Rights"
baltic_soviet_collapse_sponsor_fleet_rights_desc: "The government trades limited fleet rights for aid while trying to keep every agreement inside Baltic law."
baltic_soviet_collapse_coastal_defense_batteries: "Coastal Defense Batteries"
baltic_soviet_collapse_coastal_defense_batteries_desc: "Coast guards and artillery crews prepare the ports to survive blockade, landing attempts, and panic."
baltic_soviet_collapse_forest_and_marsh_lines: "Forest and Marsh Lines"
baltic_soviet_collapse_forest_and_marsh_lines_desc: "Forests, marshes, and local guides become depth behind the border guard."
baltic_soviet_collapse_volunteer_rifle_societies: "Volunteer Rifle Societies"
baltic_soviet_collapse_volunteer_rifle_societies_desc: "Civilian rifle societies and defense leagues turn patriotic meetings into trained local companies."
baltic_soviet_collapse_rail_to_the_ports: "Rail to the Ports"
baltic_soviet_collapse_rail_to_the_ports_desc: "Rail dispatchers and harbor clerks keep the routes to the ports open for supplies, refugees, and observers."
baltic_soviet_collapse_the_port_economy: "The Port Economy"
baltic_soviet_collapse_the_port_economy_desc: "Customs offices and guarded warehouses turn sea access into fuel, tools, and pay for the emergency state."
baltic_soviet_collapse_no_retreat_from_the_capital: "No Retreat from the Capital"
baltic_soviet_collapse_no_retreat_from_the_capital_desc: "The capital prepares last roads, reserve posts, and public orders for a defense that cannot look temporary."
baltic_soviet_collapse_a_baltic_army_not_three_militias: "A Baltic Army, Not Three Militias"
baltic_soviet_collapse_a_baltic_army_not_three_militias_desc: "The compact turns separate militias into a coordinated Baltic force with shared commands and reserve tables."
baltic_soviet_collapse_the_baltic_question_resolved: "The Baltic Question Resolved"
baltic_soviet_collapse_the_baltic_question_resolved_desc: "The republic defines its place in the crisis: restored state, border government, compact member, neutral port, or protected ally."
baltic_soviet_collapse_radio_appeals_to_the_north: "Radio Appeals to the North"
baltic_soviet_collapse_radio_appeals_to_the_north_desc: "Radio rooms and exile contacts send the Baltic case northward before Moscow can close the airwaves."
baltic_soviet_collapse_university_volunteer_lists: "University Volunteer Lists"
baltic_soviet_collapse_university_volunteer_lists_desc: "Students, lecturers, and reservists are listed for signals, medical, officer, and rifle units under tight manpower limits."
baltic_soviet_collapse_a_port_without_a_master: "A Port Without a Master"
baltic_soviet_collapse_a_port_without_a_master_desc: "The harbor remains open to aid but closed to foreign ownership."
baltic_soviet_collapse_the_baltic_customs_desk: "The Baltic Customs Desk"
baltic_soviet_collapse_the_baltic_customs_desk_desc: "Customs clerks fund the emergency through controlled trade, inspections, and legal port fees."
baltic_soviet_collapse_the_legal_front_abroad: "The Legal Front Abroad"
baltic_soviet_collapse_the_legal_front_abroad_desc: "Diplomats, jurists, and exile committees argue the restoration case beyond the reach of Soviet censors."
baltic_soviet_collapse_the_border_front_at_home: "The Border Front at Home"
baltic_soviet_collapse_the_border_front_at_home_desc: "The border government fortifies crossings, signals, and local posts before the crisis reaches the capital."
baltic_soviet_collapse_pan_baltic_war_room: "Pan-Baltic War Room"
baltic_soviet_collapse_pan_baltic_war_room_desc: "Shared maps, signals, and reserve ledgers let the Baltic compact plan as one defensive space."
baltic_soviet_collapse_tallinn_riga_vilnius_rotation: "Tallinn, Riga, Vilnius Rotation"
baltic_soviet_collapse_tallinn_riga_vilnius_rotation_desc: "The compact rotates its chair and staff desks so no capital can turn solidarity into command."
baltic_soviet_collapse_foreign_advisers_under_baltic_law: "Foreign Advisers Under Baltic Law"
baltic_soviet_collapse_foreign_advisers_under_baltic_law_desc: "Advisers may train, inspect, and recommend, but they work under Baltic statutes and local officers."
baltic_soviet_collapse_the_second_restoration: "The Second Restoration"
baltic_soviet_collapse_the_second_restoration_desc: "The restored state proves it can survive war, diplomacy, and panic without surrendering its legal claim."
baltic_soviet_collapse_baltic_shield_doctrine: "Baltic Shield Doctrine"
baltic_soviet_collapse_baltic_shield_doctrine_desc: "The compact builds a defensive doctrine around ports, forests, borders, and shared reserves."
baltic_soviet_collapse_singing_barricades_early: "The Singing Barricades Early"
baltic_soviet_collapse_singing_barricades_early_desc: "Songs, crowds, radios, and guarded streets turn civic courage into a high-chaos defense of the restored state."
caucasus_soviet_collapse_mountain_councils: "Mountain Councils"
caucasus_soviet_collapse_mountain_councils_desc: "Emergency councils bind valleys, cities, and local authorities before the collapse turns every route into its own command."
caucasus_soviet_collapse_pass_guards: "Pass Guards"
caucasus_soviet_collapse_pass_guards_desc: "Mountain passes receive guards, signal posts, and supply caches to stop loyalist columns from deciding the region piecemeal."
caucasus_soviet_collapse_oil_route_offices: "Oil Route Offices"
caucasus_soviet_collapse_oil_route_offices_desc: "Transport offices claim the oil roads and railheads before Moscow, local militias, or foreign patrons can seize the paperwork."
caucasus_soviet_collapse_border_arbitration: "Border Arbitration"
caucasus_soviet_collapse_border_arbitration_desc: "Arbitration boards quiet local border disputes so the crisis government can fight Moscow instead of every neighbor."
caucasus_soviet_collapse_foreign_missions: "Foreign Missions"
caucasus_soviet_collapse_foreign_missions_desc: "Turkish, Persian, and European contacts are handled through official desks rather than ad hoc patron bargains."
caucasus_soviet_collapse_mountain_brigades: "Mountain Brigades"
caucasus_soviet_collapse_mountain_brigades_desc: "Local guards and defecting soldiers form brigades trained for roads, passes, and broken communications."
caucasus_soviet_collapse_defense_compact: "Defense Compact"
caucasus_soviet_collapse_defense_compact_desc: "The Caucasus governments bind their pass guards and route offices into a compact built for survival under pressure."
caucasus_soviet_collapse_oilfield_security_compacts: "Oilfield Security Compacts"
caucasus_soviet_collapse_oilfield_security_compacts_desc: "Oilfield guards, mountain brigades, and route offices write common security compacts before patrons or local commanders can divide the wells."
caucasus_soviet_collapse_sovereign_mountains: "Sovereign Mountains"
caucasus_soviet_collapse_sovereign_mountains_desc: "The mountains become a political system of councils, defended routes, and recognized governments."
caucasus_soviet_collapse_convene_mountain_and_city_councils: "Convene the Mountain and City Councils"
caucasus_soviet_collapse_convene_mountain_and_city_councils_desc: "City ministers, mountain elders, officers, and workers' delegates meet before the region splits into private commands."
caucasus_soviet_collapse_hold_the_passes: "Hold the Passes"
caucasus_soviet_collapse_hold_the_passes_desc: "Pass guards, signal posts, and roadblocks turn the mountains into a shield against any column sent from the center."
caucasus_soviet_collapse_protect_the_oil_and_ports: "Protect the Oil and Ports"
caucasus_soviet_collapse_protect_the_oil_and_ports_desc: "Oil offices, harbor desks, and railheads are guarded before their value invites foreign patrons or local seizures."
caucasus_soviet_collapse_the_border_faiths_and_nations: "The Border Faiths and Nations"
caucasus_soviet_collapse_the_border_faiths_and_nations_desc: "Religious, national, and local councils are balanced so Moscow cannot return through an internal dispute."
caucasus_soviet_collapse_caucasus_route_fork: "Caucasus Route Fork"
caucasus_soviet_collapse_caucasus_route_fork_desc: "The emergency authority chooses whether mountains, oil, national restoration, or foreign border guarantees lead the crisis state."
caucasus_soviet_collapse_mountain_federal_compact: "Mountain Federal Compact"
caucasus_soviet_collapse_mountain_federal_compact_desc: "The republics and communities bind themselves through shared autonomy and defense of the passes."
caucasus_soviet_collapse_oil_emergency_directorate: "Oil Emergency Directorate"
caucasus_soviet_collapse_oil_emergency_directorate_desc: "Engineers, guards, and ministry clerks create a directorate to keep fuel moving without handing the state to the wells."
caucasus_soviet_collapse_national_restoration_councils: "National Restoration Councils"
caucasus_soviet_collapse_national_restoration_councils_desc: "National councils claim legitimacy in the valleys and capitals while keeping the emergency coalition intact."
caucasus_soviet_collapse_foreign_border_guarantees: "Foreign Border Guarantees"
caucasus_soviet_collapse_foreign_border_guarantees_desc: "Border guarantees are negotiated with outside powers, but every guarantee threatens to become a claim."
caucasus_soviet_collapse_council_of_passes: "Council of Passes"
caucasus_soviet_collapse_council_of_passes_desc: "The mountain compact gives each pass a voice, a guard roster, and a route into the common defense."
caucasus_soviet_collapse_pipeline_guard_corps: "Pipeline Guard Corps"
caucasus_soviet_collapse_pipeline_guard_corps_desc: "Pipeline guards and depot units protect fuel lines from loyalists, patrons, and local commanders."
caucasus_soviet_collapse_capital_claims_the_valleys: "The Capital Claims the Valleys"
caucasus_soviet_collapse_capital_claims_the_valleys_desc: "The national government sends courts, guards, and supply officers into the valleys before the capital becomes only a city."
caucasus_soviet_collapse_sponsor_consulates: "Sponsor Consulates"
caucasus_soviet_collapse_sponsor_consulates_desc: "Foreign consulates are handled through official desks so aid and guarantees stay visible to the government."
caucasus_soviet_collapse_caucasus_defense_compact: "Caucasus Defense Compact"
caucasus_soviet_collapse_caucasus_defense_compact_desc: "The region prepares a compact that can coordinate pass guards, oil routes, and border offices under real crisis pressure."
caucasus_soviet_collapse_mountain_artillery_schools: "Mountain Artillery Schools"
caucasus_soviet_collapse_mountain_artillery_schools_desc: "Artillery crews and mountain officers train for roads, ridges, and broken signals rather than parade fields."
caucasus_soviet_collapse_black_sea_or_caspian_routes: "Black Sea or Caspian Routes"
caucasus_soviet_collapse_black_sea_or_caspian_routes_desc: "Sea routes, ports, and inland rail links are catalogued so supplies can move without becoming patron property."
caucasus_soviet_collapse_oil_for_recognition: "Oil for Recognition"
caucasus_soviet_collapse_oil_for_recognition_desc: "Oil access is offered as a bargaining tool for recognition, equipment, and border guarantees."
caucasus_soviet_collapse_no_one_owns_the_passes_alone: "No One Owns the Passes Alone"
caucasus_soviet_collapse_no_one_owns_the_passes_alone_desc: "The compact declares that every pass is defended by locals but belongs to the shared survival of the mountains."
caucasus_soviet_collapse_the_border_war_cabinet: "The Border War Cabinet"
caucasus_soviet_collapse_the_border_war_cabinet_desc: "A wartime cabinet gathers officers, route offices, and border councils when threats reach the roads."
caucasus_soviet_collapse_ancient_thrones_in_the_mountains: "Ancient Thrones in the Mountains"
caucasus_soviet_collapse_ancient_thrones_in_the_mountains_desc: "Old dynastic symbols and mountain legends return as the crisis makes forgotten claims politically useful again."
caucasus_soviet_collapse_the_caucasus_stands: "The Caucasus Stands"
caucasus_soviet_collapse_the_caucasus_stands_desc: "The emergency state survives through defended passes, guarded oil, and councils that refuse to be separated."
caucasus_soviet_collapse_tbilisi_baku_yerevan_talks: "Tbilisi, Baku, Yerevan Talks"
caucasus_soviet_collapse_tbilisi_baku_yerevan_talks_desc: "The compact balances its capitals through talks, rotating desks, and shared crisis maps."
caucasus_soviet_collapse_the_oil_cannot_be_the_government: "The Oil Cannot Be the Government"
caucasus_soviet_collapse_the_oil_cannot_be_the_government_desc: "The directorate admits that fuel can defend the state but cannot be allowed to become the state."
caucasus_soviet_collapse_civilian_oversight_of_oil: "Civilian Oversight of Oil"
caucasus_soviet_collapse_civilian_oversight_of_oil_desc: "Civilian inspectors and assembly committees keep the oil directorate under public law."
caucasus_soviet_collapse_oil_state_command: "Oil State Command"
caucasus_soviet_collapse_oil_state_command_desc: "The directorate takes command powers over routes, guards, and output to keep the wells working through the emergency."
caucasus_soviet_collapse_mountain_autonomy_statutes: "Mountain Autonomy Statutes"
caucasus_soviet_collapse_mountain_autonomy_statutes_desc: "Autonomy statutes give local communities a stake in the compact before separatism becomes a second front."
caucasus_soviet_collapse_border_treaty_with_turkey: "Border Treaty with Turkey"
caucasus_soviet_collapse_border_treaty_with_turkey_desc: "A border treaty seeks trade and security while keeping foreign guarantees from swallowing the frontier."
caucasus_soviet_collapse_iranian_corridor_talks: "Iranian Corridor Talks"
caucasus_soviet_collapse_iranian_corridor_talks_desc: "Southern corridor talks pursue relief, security, and trade under strict republican supervision."
caucasus_soviet_collapse_caspian_watch: "Caspian Watch"
caucasus_soviet_collapse_caspian_watch_desc: "Coast guards, port clerks, and route officers watch the Caspian approaches for aid, raids, and foreign pressure."
caucasus_soviet_collapse_the_passes_vote: "The Passes Vote"
caucasus_soviet_collapse_the_passes_vote_desc: "Pass communities vote on the compact's emergency statutes, turning mountain defense into political consent."
caucasus_soviet_collapse_ancient_caucasus_crowns: "Ancient Caucasus Crowns"
caucasus_soviet_collapse_ancient_caucasus_crowns_desc: "The old symbols become banners for a strange restoration politics that the emergency government can barely contain."
caucasus_soviet_collapse_the_compact_holds_the_ridge: "The Compact Holds the Ridge"
caucasus_soviet_collapse_the_compact_holds_the_ridge_desc: "The mountain compact holds its ridges, routes, and councils long enough to become a durable order."
caucasus_soviet_collapse_oil_without_masters: "Oil Without Masters"
caucasus_soviet_collapse_oil_without_masters_desc: "The oil routes remain guarded and useful without becoming the property of Moscow, patrons, or emergency directors."
central_asia_soviet_collapse_supply_congress: "Supply Congress"
central_asia_soviet_collapse_supply_congress_desc: "Delegates gather to decide grain, cotton, rail capacity, fuel, and emergency guards across a region too large for one ministry."
central_asia_soviet_collapse_rail_and_irrigation_boards: "Rail and Irrigation Boards"
central_asia_soviet_collapse_rail_and_irrigation_boards_desc: "Rail dispatch and irrigation offices are protected together because food and movement decide which authority survives."
central_asia_soviet_collapse_caravan_border_offices: "Caravan Border Offices"
central_asia_soviet_collapse_caravan_border_offices_desc: "Border offices register caravans, refugees, and armed detachments moving through the southern approaches."
central_asia_soviet_collapse_basmachi_amnesty_rolls: "Basmachi Amnesty Rolls"
central_asia_soviet_collapse_basmachi_amnesty_rolls_desc: "Old insurgent names are reviewed under amnesty rules, turning dangerous memories into supervised local defense."
central_asia_soviet_collapse_foreign_balance_desks: "Foreign Balance Desks"
central_asia_soviet_collapse_foreign_balance_desks_desc: "Foreign contacts are balanced through official desks so no single patron owns the republic's crisis."
central_asia_soviet_collapse_steppe_defense_council: "Steppe Defense Council"
central_asia_soviet_collapse_steppe_defense_council_desc: "A defense council coordinates rail guards, horse routes, depot battalions, and pass warnings across long distances."
central_asia_soviet_collapse_steppe_federation: "Steppe Federation"
central_asia_soviet_collapse_steppe_federation_desc: "The inland republics turn supply talks and defense councils into a federation against both Soviet restoration and patron capture."
central_asia_soviet_collapse_turkestan_school_boards: "Turkestan School Boards"
central_asia_soviet_collapse_turkestan_school_boards_desc: "School boards and civic offices turn emergency congress politics into a modern administrative claim that can survive beyond the first revolt."
central_asia_soviet_collapse_inland_republics_compact: "Inland Republics Compact"
central_asia_soviet_collapse_inland_republics_compact_desc: "The compact gives the inland republics a shared political language for distance, borders, and survival."
central_asia_soviet_collapse_southern_emergency_majlis: "Southern Emergency Majlis"
central_asia_soviet_collapse_southern_emergency_majlis_desc: "Delegates, rail offices, border guards, and local councils meet to keep the southern republics from being decided elsewhere."
central_asia_soviet_collapse_guard_the_oasis_and_passes: "Guard the Oasis and Passes"
central_asia_soviet_collapse_guard_the_oasis_and_passes_desc: "Oasis towns, mountain passes, and desert approaches receive guards drawn from local networks."
central_asia_soviet_collapse_irrigation_and_bread_councils: "Irrigation and Bread Councils"
central_asia_soviet_collapse_irrigation_and_bread_councils_desc: "Water offices and bread councils protect food, harvests, and local support before the crisis empties the canals."
central_asia_soviet_collapse_the_border_caravans: "The Border Caravans"
central_asia_soviet_collapse_the_border_caravans_desc: "Caravans, border offices, and desert routes become the republic's first contact with aid, smuggling, and foreign pressure."
central_asia_soviet_collapse_southern_route_fork: "Southern Route Fork"
central_asia_soviet_collapse_southern_route_fork_desc: "The republic chooses whether local councils, a Turkestan road, border commanders, or foreign patrons will guide the emergency."
central_asia_soviet_collapse_local_republic_council: "Local Republic Council"
central_asia_soviet_collapse_local_republic_council_desc: "The majlis builds an ordinary republican state from local offices rather than waiting for a distant capital."
central_asia_soviet_collapse_turkestan_federation_road: "Turkestan Federation Road"
central_asia_soviet_collapse_turkestan_federation_road_desc: "Southern delegates prepare a federal road that can include neighbors without making Kazakhstan the automatic center."
central_asia_soviet_collapse_military_border_authority: "Military Border Authority"
central_asia_soviet_collapse_military_border_authority_desc: "Border commanders receive emergency authority to hold roads, passes, and railheads under threat."
central_asia_soviet_collapse_foreign_border_patronage: "Foreign Border Patronage"
central_asia_soviet_collapse_foreign_border_patronage_desc: "Foreign patrons are invited through border offices, but the republic keeps each promise visible and limited."
central_asia_soviet_collapse_majlis_elections: "Majlis Elections"
central_asia_soviet_collapse_majlis_elections_desc: "Emergency elections give local councils a mandate broader than guards, rail clerks, and crisis committees."
central_asia_soviet_collapse_federation_delegates: "Federation Delegates"
central_asia_soviet_collapse_federation_delegates_desc: "Delegates travel between southern republics to build cohesion without swallowing local authority."
central_asia_soviet_collapse_border_commanders: "Border Commanders"
central_asia_soviet_collapse_border_commanders_desc: "Commanders along passes, deserts, and railheads are placed into a single emergency chain."
central_asia_soviet_collapse_liaison_missions_in_the_bazaar: "Liaison Missions in the Bazaar"
central_asia_soviet_collapse_liaison_missions_in_the_bazaar_desc: "Foreign contacts are handled through official bazaar missions where clerks, guards, and merchants can see the bargain."
central_asia_soviet_collapse_southern_republics_coordinate: "Southern Republics Coordinate"
central_asia_soviet_collapse_southern_republics_coordinate_desc: "The southern republics coordinate rail, food, border, and diplomatic signals before one crisis isolates the rest."
central_asia_soviet_collapse_basmachi_roads_reopen: "Basmachi Roads Reopen"
central_asia_soviet_collapse_basmachi_roads_reopen_desc: "Old insurgent routes and names reappear, forcing the state to decide whether they are allies, enemies, or a warning."
central_asia_soviet_collapse_negotiate_with_the_mountain_bands: "Negotiate with the Mountain Bands"
central_asia_soviet_collapse_negotiate_with_the_mountain_bands_desc: "The government bargains with irregular bands for guides, rifles, and autonomy under written limits."
central_asia_soviet_collapse_clear_the_mountain_bands: "Clear the Mountain Bands"
central_asia_soviet_collapse_clear_the_mountain_bands_desc: "Border troops and local guards suppress the bands before their road networks become a rival authority."
central_asia_soviet_collapse_the_oasis_arsenal: "The Oasis Arsenal"
central_asia_soviet_collapse_the_oasis_arsenal_desc: "Workshops and guarded depots turn oasis towns into modest arsenals for the emergency."
central_asia_soviet_collapse_desert_route_to_foreign_aid: "Desert Route to Foreign Aid"
central_asia_soviet_collapse_desert_route_to_foreign_aid_desc: "Aid moves through desert routes where every convoy must be guarded, counted, and politically explained."
central_asia_soviet_collapse_southern_pass_reserve: "Southern Pass Reserve"
central_asia_soviet_collapse_southern_pass_reserve_desc: "Reserve units are trained for passes, desert roads, and sudden border alarms."
central_asia_soviet_collapse_khwarazm_and_older_names: "Khwarazm and Older Names"
central_asia_soviet_collapse_khwarazm_and_older_names_desc: "Older names return to speeches and banners as high chaos gives ancient claims new force."
central_asia_soviet_collapse_the_southern_shield: "The Southern Shield"
central_asia_soviet_collapse_the_southern_shield_desc: "Coordinated councils, pass reserves, and southern routes form a shield for the inland republics."
central_asia_soviet_collapse_samarkand_letters: "Samarkand Letters"
central_asia_soviet_collapse_samarkand_letters_desc: "Writers, teachers, and local notables build a cultural case for republican legitimacy."
central_asia_soviet_collapse_the_oasis_guard: "The Oasis Guard"
central_asia_soviet_collapse_the_oasis_guard_desc: "Local infantry guard canals, depots, and food stores where the state is most visible."
central_asia_soviet_collapse_desert_scout_columns: "Desert Scout Columns"
central_asia_soviet_collapse_desert_scout_columns_desc: "Scout columns watch desert approaches and caravan routes before raiders, patrons, or loyalists can use them."
central_asia_soviet_collapse_federation_or_neighbor_pact: "Federation or Neighbor Pact"
central_asia_soviet_collapse_federation_or_neighbor_pact_desc: "The southern republics choose between a loose pact and a stronger federation."
central_asia_soviet_collapse_loose_southern_pact: "Loose Southern Pact"
central_asia_soviet_collapse_loose_southern_pact_desc: "The pact preserves local republics while sharing warnings, reserves, and foreign desks."
central_asia_soviet_collapse_federation_state: "Federation State"
central_asia_soviet_collapse_federation_state_desc: "A stronger federation centralizes defense and diplomacy for the southern republics."
central_asia_soviet_collapse_the_basmachi_amnesty_ledger: "The Basmachi Amnesty Ledger"
central_asia_soviet_collapse_the_basmachi_amnesty_ledger_desc: "The state records which bands accept terms, which routes they guard, and where autonomy begins and ends."
central_asia_soviet_collapse_foreign_border_schools: "Foreign Border Schools"
central_asia_soviet_collapse_foreign_border_schools_desc: "Advisers and teachers enter through border schools rather than direct patron command."
central_asia_soviet_collapse_the_cotton_question: "The Cotton Question"
central_asia_soviet_collapse_the_cotton_question_desc: "Cotton, grain, water, and exports become a political question that can fund the state or break local support."
central_asia_soviet_collapse_no_more_distant_capitals: "No More Distant Capitals"
central_asia_soviet_collapse_no_more_distant_capitals_desc: "The republic rejects rule by distant capitals, whether in Moscow, Alma-Ata, or a patron's embassy."
central_asia_soviet_collapse_khwarazm_restoration_debate: "Khwarazm Restoration Debate"
central_asia_soviet_collapse_khwarazm_restoration_debate_desc: "Ancient restoration claims are debated under emergency guard before they become a flag outside the state."
central_asia_soviet_collapse_the_south_survives_together: "The South Survives Together"
central_asia_soviet_collapse_the_south_survives_together_desc: "The southern republics survive as a settlement of councils, routes, guards, and shared decisions."
moldova_soviet_collapse_dniester_line: "Dniester Line"
moldova_soviet_collapse_dniester_line_desc: "Moldovan guards establish river posts and reserve plans before the Dniester becomes a route for loyalist pressure."
moldova_soviet_collapse_river_customs: "River Customs"
moldova_soviet_collapse_river_customs_desc: "Emergency customs offices inspect boats, bridges, and warehouses so trade can support the state rather than smuggling."
moldova_soviet_collapse_chisinau_ledgers: "Chisinau Ledgers"
moldova_soviet_collapse_chisinau_ledgers_desc: "Government ledgers are gathered in Chisinau to prove which taxes, offices, and mobilization orders answer to Moldova."
moldova_soviet_collapse_romanian_window: "Romanian Window"
moldova_soviet_collapse_romanian_window_desc: "Contacts west of the Prut are opened carefully, trading relief and recognition without surrendering the crisis government."
moldova_soviet_collapse_ukrainian_corridor: "Ukrainian Corridor"
moldova_soviet_collapse_ukrainian_corridor_desc: "Southern roads and rail links are coordinated with Ukraine so neither republic can be isolated from the other."
moldova_soviet_collapse_depot_battalions: "Depot Battalions"
moldova_soviet_collapse_depot_battalions_desc: "Depot guards and emergency battalions protect bridges, warehouses, and road junctions around the river line."
moldova_soviet_collapse_eastern_buffer_compact: "Eastern Buffer Compact"
moldova_soviet_collapse_eastern_buffer_compact_desc: "Moldova turns its corridor diplomacy into a compact with neighboring republics under pressure from Moscow."
moldova_soviet_collapse_neutral_transit_commission: "Neutral Transit Commission"
moldova_soviet_collapse_neutral_transit_commission_desc: "Transit officers register troops, refugees, relief wagons, and bridge permits so Moldova can bargain as a state rather than a passage."
moldova_soviet_collapse_bridge_state: "Bridge State"
moldova_soviet_collapse_bridge_state_desc: "The republic survives as a bridge with its own offices, guards, and bargaining power rather than as a road between stronger states."
