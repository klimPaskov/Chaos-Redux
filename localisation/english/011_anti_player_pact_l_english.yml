chaosx.nr11.1.t: "Anti-Player Pact"
chaosx.nr11.2.t: "Anti-[Root.GetName] Pact"
chaosx.nr11.2.d: "The secret alliance has come to light through undisclosed sources and intelligence leaks. These nations, historically unaligned or even at odds, have allegedly set aside their differences to coordinate efforts against us. The nature of their collaboration remains shrouded in secrecy, with governments providing little official information."
chaosx.nr11.2.a: "What?"
