l_english:
kaz_soviet_collapse_convene_alash_court_commissions: "Convene Alash Court Commissions"
kaz_soviet_collapse_convene_alash_court_commissions_desc: "Regional jurists, school delegates, and district messengers can turn Alash memory into courts that actually settle arrests, requisitions, and village authority."
kaz_soviet_collapse_issue_steppe_soviet_supply_plan: "Issue the Steppe Soviet Supply Plan"
kaz_soviet_collapse_issue_steppe_soviet_supply_plan_desc: "Factory committees and aul councils can bind trains, fuel, and ration ledgers into a republican plan rather than another improvised requisition list."
kaz_soviet_collapse_secure_minehead_guard_contracts: "Secure Minehead Guard Contracts"
kaz_soviet_collapse_secure_minehead_guard_contracts_desc: "The resource directorate can contract guards, engineers, and worker committees around the mineheads before patrons or Soviet remnants seize the ledgers."
kaz_soviet_collapse_audit_foreign_concession_ledgers: "Audit Foreign Concession Ledgers"
kaz_soviet_collapse_audit_foreign_concession_ledgers_desc: "Foreign engineers and patrons may enter the steppe, but Kazakhstan can force every concession through a republican ledger."
