kaz_soviet_collapse_convene_alash_court_commissions_tt: "Raises Alash legal authority, institutions, recognition, democratic organization, stability, and Kazakhstan route progress while adding measured Soviet republic pressure."
kaz_soviet_collapse_issue_steppe_soviet_supply_plan_tt: "Raises socialist planning, depot control, institutions, communist organization, war support, infrastructure, and Kazakhstan route progress while adding Soviet depot pressure."
