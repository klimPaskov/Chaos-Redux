communism_local_military_intervention_desc: "Deploy army and internal security units into this state. Cost scales with control level and how long the state has remained controlled.\n\nCurrent level: [FROM.GetCommunismStateControlLevelName]\nIntervention progress: §Y[?FROM.communist_intervention_progress|.0]§!/§Y3§!\n\nAgitation Zones can be cleared, Insurgent Strongholds need repeated pressure, and Communist Lockdowns can only be temporarily suppressed."
communism_emergency_intervention: "Emergency National Intervention"
communism_emergency_intervention_desc: "Invoke emergency powers across all communist-controlled states. Cost scales with controlled and lockdown states. The operation reduces communist support in every controlled state, can clear or reduce state control, and may trigger a custom communist uprising from controlled states."

