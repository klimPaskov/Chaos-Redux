zzz_cure_category_progress_value_local: "[?zzz_cure|.0]"
zzz_cure_category_research_mode_shared: "§CShared cure research§! is active. All member progress is pooled together."
zzz_cure_category_research_mode_local: "§CNational cure research§! is active. Only our own progress counts."
zzz_cure_category_activation_shared: "At §Y100%§!, every cure-sharing member activates the cure for §Y120 days§!."
zzz_cure_category_activation_local: "At §Y100%§!, we activate the cure for §Y360 days§!."
