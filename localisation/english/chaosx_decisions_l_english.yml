communism_emergency_intervention_cost_tooltip: "Emergency intervention costs political power, command power, manpower, infantry equipment, stability, war support, and temporary economic disruption. It also reduces communist support by §G1%§! for every controlled state before the crackdown resolves."

# Outbreak Prevention Measures
chaosx_outbreak_prevention_category: "Zombie Outbreak Prevention"
chaosx_outbreak_prevention_category_desc: "With the zombie threat spreading globally, it's crucial to implement preventive measures to protect our nation from potential outbreaks. Each measure provides protection, but the tradeoffs should remain manageable rather than crippling.\n\n§YCurrent Outbreak Risk: [GetZombieOutbreakChance]§!"
enforce_hygiene_measures: "Enforce Strict Hygiene Measures"
enforce_hygiene_measures_desc: "Implement nationwide hygiene protocols including mandatory hand washing, sanitization stations, and health inspections. This basic measure provides some protection against zombie contagion and modestly improves wider disease containment, but causes minor social disruption and costs."
restrict_migration: "Restrict Migration and Travel"
restrict_migration_desc: "Severely limit domestic and international travel, implement strict border controls, and require health certificates for all movement. This measure significantly reduces outbreak risk and slightly improves broader disease containment, but causes economic disruption and social unrest."
quarantine_protocols: "Implement Quarantine Protocols"
quarantine_protocols_desc: "Establish mandatory quarantine facilities for all travelers and suspected cases, with strict isolation procedures. This comprehensive measure provides strong protection and noticeably improves broader disease containment, but requires substantial resources and causes significant social strain."
close_borders_completely: "Close All Borders"
close_borders_completely_desc: "Completely seal our borders to all non-essential traffic, allowing only critical supplies under strict supervision. This extreme measure provides excellent protection and sharply reduces external disease exposure, but severely damages our economy and international relations."
extreme_martial_law: "Declare Extreme Martial Law"
extreme_martial_law_desc: "Implement the ultimate protective measure: complete martial law with military control of all movement, mandatory curfews, and shoot-on-sight orders for suspected infected. This provides total immunity from zombie outbreaks and the strongest general disease containment boost, but destroys our society's fabric. Requires all other measures to be in place first."
revoke_hygiene_measures: "Revoke Hygiene Measures"
revoke_hygiene_measures_desc: "Implement nationwide hygiene protocols including mandatory hand washing, sanitization stations, and health inspections. This basic measure provides some protection against zombie contagion but causes minor social disruption and costs."
revoke_migration_restrictions: "Allow Migration and Travel"
revoke_migration_restrictions_desc: "Severely limit domestic and international travel, implement strict border controls, and require health certificates for all movement. This measure significantly reduces outbreak risk but causes economic disruption and social unrest."
revoke_quarantine_protocols: "Revoke Quarantine Protocols"
revoke_quarantine_protocols_desc: "Establish mandatory quarantine facilities for all travelers and suspected cases, with strict isolation procedures. This comprehensive measure provides strong protection but requires substantial resources and causes significant social strain."
reopen_borders: "Reopen Borders"
reopen_borders_desc: "Completely seal our borders to all non-essential traffic, allowing only critical supplies under strict supervision. This extreme measure provides excellent protection but severely damages our economy and international relations."
revoke_extreme_martial_law: "Revoke Extreme Martial Law"
revoke_extreme_martial_law_desc: "Implement the ultimate protective measure: complete martial law with military control of all movement, mandatory curfews, and shoot-on-sight orders for suspected infected. This provides total immunity from zombie outbreaks but destroys our society's fabric. Requires all other measures to be in place first."

disease_enforce_hygiene_measures: "Enforce Strict Hygiene Measures"
disease_enforce_hygiene_measures_desc: "Implement nationwide hygiene protocols including mandatory hand washing, sanitization stations, and health inspections. This basic measure provides some protection against zombie contagion and modestly improves wider disease containment, but causes minor social disruption and costs."
disease_restrict_migration: "Restrict Migration and Travel"
disease_restrict_migration_desc: "Severely limit domestic and international travel, implement strict border controls, and require health certificates for all movement. This measure significantly reduces outbreak risk and slightly improves broader disease containment, but causes economic disruption and social unrest."
disease_quarantine_protocols: "Implement Quarantine Protocols"
disease_quarantine_protocols_desc: "Establish mandatory quarantine facilities for all travelers and suspected cases, with strict isolation procedures. This comprehensive measure provides strong protection and noticeably improves broader disease containment, but requires substantial resources and causes significant social strain."
disease_close_borders_completely: "Close All Borders"
disease_close_borders_completely_desc: "Completely seal our borders to all non-essential traffic, allowing only critical supplies under strict supervision. This extreme measure provides excellent protection and sharply reduces external disease exposure, but severely damages our economy and international relations."
disease_extreme_martial_law: "Declare Extreme Martial Law"
disease_extreme_martial_law_desc: "Implement the ultimate protective measure: complete martial law with military control of all movement, mandatory curfews, and shoot-on-sight orders for suspected infected. This provides total immunity from zombie outbreaks and the strongest general disease containment boost, but destroys our society's fabric. Requires all other measures to be in place first."
disease_revoke_hygiene_measures: "Revoke Hygiene Measures"
disease_revoke_hygiene_measures_desc: "Lift the nationwide hygiene emergency protocols. This removes the broader disease-containment benefit and returns social life and industry toward normal."
disease_revoke_migration_restrictions: "Allow Migration and Travel"
disease_revoke_migration_restrictions_desc: "Lift the emergency migration and travel restrictions. This reduces disruption, but also removes the extra disease-containment protection tied to reduced movement."
disease_revoke_quarantine_protocols: "Revoke Quarantine Protocols"
disease_revoke_quarantine_protocols_desc: "Stand down the national quarantine regime. This eases internal strain, but also removes the stronger disease-containment protection it provided."
disease_reopen_borders: "Reopen Borders"
disease_reopen_borders_desc: "Reopen the country's borders and return to normal movement controls. This reduces the economic burden, but also removes the external infection protection from full closure."
disease_revoke_extreme_martial_law: "Revoke Extreme Martial Law"
disease_revoke_extreme_martial_law_desc: "End the emergency military containment regime. This restores normal civic life, but also removes the strongest country-level disease-containment bonus."


# Anti-Zombie League decisions
chaosx_anti_zombie_league_category: "Anti-Zombie League"
leave_anti_zombie_league: "Leave Anti-Zombie League"
leave_anti_zombie_league_desc: "With the zombie threat diminished, some question whether the league's restrictions and resource commitments are still necessary. Leaving will remove our combat bonuses but also end our obligations to the alliance."
disband_anti_zombie_league: "Disband Anti-Zombie League"
disband_anti_zombie_league_desc: "With zombies reduced to a minimal threat, the Anti-Zombie League has served its purpose. The time has come to formally dissolve the alliance and allow member nations to return to their normal affairs."
form_anti_zombie_league: "Form the Anti Zombie League"
form_anti_zombie_league_desc: "The zombie threat has grown beyond what any single nation can handle. It's time to unite the world in a grand alliance to coordinate our efforts against the undead menace."
join_anti_zombie_league: "Join the Anti Zombie League"
join_anti_zombie_league_desc: "The zombie threat has grown beyond what any single nation can handle. It's time to unite the world in a grand alliance to coordinate our efforts against the undead menace."
invest_in_league_research: "Invest in League Research"
invest_in_league_research_desc: "Dedicate additional resources to the Anti Zombie League's research programs. This will impose temporary penalties on our research and production as resources are diverted, but will strengthen the League's overall combat effectiveness against zombies. Major powers contribute 3 investment points while minor powers contribute 1 point. Every 10 points increases the League's combat bonus by 5%, starting from 15% and capping at 100%. Our current investment is §G[?global.azl_global_investment|.0G]§! points."

# Air Cleanliness Treaty Decisions
air_cleanliness_treaty_category: "Air Cleanliness Treaty"
air_cleanliness_treaty_category_desc: "Treaty members coordinate international decontamination to lower atmospheric contamination and reduce global collapse pressure."
air_cleanliness_global_cleaning_day: "Organize Global Cleaning Day"
air_cleanliness_global_cleaning_day_desc: "Coordinate all treaty members for a synchronized cleanup operation. This has a long global cooldown but delivers a strong immediate contamination reduction."
air_cleanliness_joint_decontamination_program: "Launch Joint Decontamination Program"
air_cleanliness_joint_decontamination_program_desc: "Fund shared decontamination logistics and filtration retrofits. This can be repeated and provides steady contamination reduction over time."

# Japan Chemical Campaign Decisions
japan_chemical_campaign_category: "China Theater Chemical Campaign"
japan_chemical_campaign_category_desc: "The Imperial Army can execute targeted cylinder operations against Chinese core regions in Asia. Select the prepared chemical agent, then launch a state attack that spends command power, consumes cylinders, and contaminates the area. Using these decisions might increase international condemnation."
japan_chemical_campaign_cycle_agent: "Selected agent: [GetJapanChemicalCampaignSelectedAgentName]"
japan_chemical_campaign_cycle_agent_desc: "Rotate the prepared chemical agent for the next targeted attack. Switching agents is free."
japan_chemical_campaign_attack: "Chemical attack in [FROM.GetName]"
japan_chemical_campaign_attack_desc: "Execute a targeted cylinder release in the selected enemy Chinese core state. This spends command power, consumes the selected cylinder stockpile, applies state contamination, and increases international condemnation."
japan_chemical_campaign_attack_cost: "£command_power  §Y20§!"
japan_chemical_campaign_attack_cost_blocked: "£command_power  §R20§!"
japan_chemical_campaign_attack_stockpile_tt: "Requires at least §Y120§! units of the currently selected chemical cylinder."
japan_chemical_campaign.agent.chlorine: "Chlorine gas"
japan_chemical_campaign.agent.phosgene: "Phosgene gas"
japan_chemical_campaign.agent.mustard: "Mustard gas"
japan_chemical_campaign.agent.lewisite: "Lewisite"

# Disease Containment Decisions
chaosx_disease_containment_category: "Disease Containment Effort"
chaosx_disease_containment_category_desc: "Biological outbreaks in our territory or neighboring countries threaten national security. We must contain ongoing contamination and control cross-border disease spread."
deploy_field_hospitals: "Deploy Field Hospitals"
deploy_field_hospitals_desc: "Deploy mobile field hospitals to contaminated areas to provide immediate medical care and reduce the effects of biological contamination by §G20%§!. Requires Field Hospital technology and support equipment. For each level of Field Hospital technology, the effectiveness increases by §G10%§!."
deploy_field_hospitals_cost: "£command_power  §Y10§! £support_equipment_text_icon  §Y100§!"
deploy_field_hospitals_cost_blocked: "§YField Hospital§! required"
quarantine_measures: "Implement Quarantine Measures"
quarantine_measures_desc: "Implement strict quarantine protocols in contaminated areas. This will reduce the spread of biological agents and decrease the effects by §G20%§! but will negatively impact production and resources in the affected state."
close_border_to_infected_neighbor: "Close Border: [FROM.GetNameDef]"
close_border_to_infected_neighbor_desc: "Seal the border with §Y[FROM.GetNameDef]§! while its outbreak is active. This blocks market access, blocks volunteer deployment to them, and lowers the chance of disease crossing into our territory, but does not eliminate the risk."
reopen_border_to_infected_neighbor: "Reopen Border: [FROM.GetNameDef]"
reopen_border_to_infected_neighbor_desc: "Reopen our border with §Y[FROM.GetNameDef]§! and restore market and volunteer interaction immediately."
bio_border_closure_usage_desc: "Border closed for disease containment"

# Antibiotics Production Decisions
anthrax_antibiotics_mass_production: "Anthrax Antibiotics Mass Production"
anthrax_antibiotics_mass_production_desc: "Begin mass production of anthrax antibiotics. This requires significant civilian industrial capacity and will increase our consumer goods burden, but provides substantial protection against biological attacks. The effectiveness scales with our civilian factory count - each factory provides §G1%§! additional contamination resistance (maximum 30%)."
develop_anthrax_antibiotics_retroactively: "Emergency Anthrax Antibiotics Program"
develop_anthrax_antibiotics_retroactively_desc: "Since we did not develop antibiotics during our bioweapon research, we must now create an emergency antibiotics program from scratch. This requires extensive research and development but will ultimately allow us to begin mass production for contamination defense."
revoke_anthrax_antibiotics_mass_production: "Revoke Anthrax Antibiotics Mass Production"
revoke_anthrax_antibiotics_mass_production_desc: "Shut down our anthrax antibiotics mass production program to free up civilian industrial capacity. This will eliminate the consumer goods burden but also remove protection against anthrax contamination."

plague_antibiotics_mass_production: "Plague Antibiotics Mass Production"
plague_antibiotics_mass_production_desc: "Begin mass production of plague antibiotics. This requires significant civilian industrial capacity and will increase our consumer goods burden substantially, but provides crucial protection against the devastating plague bioweapon. The effectiveness scales with our civilian factory count - each factory provides §G1%§! additional contamination resistance (maximum 25%)."
develop_plague_antibiotics_retroactively: "Emergency Plague Antibiotics Program"
develop_plague_antibiotics_retroactively_desc: "Since we did not develop antibiotics during our plague bioweapon research, we must now create an emergency antibiotics program from scratch. This requires extensive research and development but will ultimately allow us to begin mass production for contamination defense."
revoke_plague_antibiotics_mass_production: "Revoke Plague Antibiotics Mass Production"
revoke_plague_antibiotics_mass_production_desc: "Shut down our plague antibiotics mass production program to free up civilian industrial capacity. This will eliminate the substantial consumer goods burden but also remove protection against plague contamination."

tularemia_antibiotics_mass_production: "Tularemia Antibiotics Mass Production"
tularemia_antibiotics_mass_production_desc: "Begin mass production of tularemia antibiotics. This requires moderate civilian industrial capacity and will increase our consumer goods burden modestly, but provides excellent protection against tularemia bioweapons. The effectiveness scales with our civilian factory count - each factory provides §G1.5%§! additional contamination resistance (maximum 40%)."
develop_tularemia_antibiotics_retroactively: "Emergency Tularemia Antibiotics Program"
develop_tularemia_antibiotics_retroactively_desc: "Since we did not develop antibiotics during our tularemia bioweapon research, we must now create an emergency antibiotics program from scratch. This requires moderate research and development time and will ultimately allow us to begin mass production for contamination defense."
revoke_tularemia_antibiotics_mass_production: "Revoke Tularemia Antibiotics Mass Production"
revoke_tularemia_antibiotics_mass_production_desc: "Shut down our tularemia antibiotics mass production program to free up civilian industrial capacity. This will eliminate the consumer goods burden but also remove protection against tularemia contamination."

# Smallpox Vaccination Decisions
smallpox_vaccination_mass_program: "National Smallpox Vaccination Program"
smallpox_vaccination_mass_program_desc: "Begin an unprecedented national vaccination program against smallpox. This strategic defensive measure requires massive civilian industrial capacity and will severely increase our consumer goods burden, but provides crucial protection against the ultimate biological weapon. The effectiveness scales with our civilian factory count - each factory provides §G0.75%§! additional vaccination coverage (maximum 35%). This is the only defense against permanent smallpox epidemics."
revoke_smallpox_vaccination_mass_program: "Revoke National Vaccination Program"
revoke_smallpox_vaccination_mass_program_desc: "Shut down our national smallpox vaccination program to free up civilian industrial capacity. This will eliminate the massive consumer goods burden but also remove protection against smallpox epidemics, leaving our population completely vulnerable to this strategic bioweapon."

# Camps and Genocide Crisis
genocide_crisis_category: "Camps and Genocide"
genocide_crisis_category_desc: "Manage camp infrastructure, internal security policy, forced labor logistics, detention networks, transport priorities, record custody, and wartime administrative measures."
imperial_occupation_crisis: "Imperial Occupation Crisis"
imperial_occupation_crisis_desc: "Japan can expand forced labor networks, anti-partisan terror, and prisoner experimentation in occupied Chinese and Manchurian regions. Biowarfare-linked actions connect to the existing contamination system."
gulag_and_mass_repression_system: "Gulag and Mass Repression"
gulag_and_mass_repression_system_desc: "The Soviet security state can expand gulag networks, deport suspected opposition groups, and use food confiscation against disloyal regions. Discovery creates the same condemnation path as other camp evidence."
genocide_foreign_response_category: "Atrocity Response"
genocide_foreign_response_category_desc: "Foreign states can publicize testimony, impose sanctions, support resistance networks, and prepare tribunal records once camp evidence has been discovered."

genocide_show_hidden_decisions: "Show Camp Administration Decisions"
genocide_show_hidden_decisions_desc: "Reveal camp administration, detention network, internal security, and wartime administrative decisions in the decision list."
genocide_hide_hidden_decisions: "Hide Camp Administration Decisions"
genocide_hide_hidden_decisions_desc: "Hide camp administration, detention network, internal security, and wartime administrative decisions so the decision list stays focused on ordinary administration."
genocide_expand_camp_network: "Expand Camp Network in [FROM.GetName]"
genocide_expand_camp_network_desc: "Create a hidden concentration camp site in [FROM.GetName]. The state stores this country as the responsible regime, registers hidden deaths through the Chaos Meter, and becomes discoverable if enemy forces take control."
genocide_build_extermination_camp: "Build Extermination Camp in [FROM.GetName]"
genocide_build_extermination_camp_desc: "Create an extermination site in [FROM.GetName]. This sharply escalates deaths, resistance pressure, and later condemnation if the site is discovered."
genocide_intensify_deportations: "Intensify Deportations"
genocide_intensify_deportations_desc: "Increase deportation sweeps feeding the camp system. This raises escalation, visibility, resistance pressure, and hidden deaths."
genocide_hide_evidence_from_foreign_observers: "Hide Evidence from Foreign Observers"
genocide_hide_evidence_from_foreign_observers_desc: "Reduce visible traces through record control, restricted inspections, and diplomatic denial. This slows exposure but does not erase state responsibility."
genocide_suppress_internal_reports: "Suppress Internal Reports"
genocide_suppress_internal_reports_desc: "Seal internal death counts, transfer files, and military objections before they become testimony."
genocide_redirect_trains_and_supplies: "Redirect Trains and Supplies"
genocide_redirect_trains_and_supplies_desc: "Give the camp system rail priority and extract more forced labor output from an active camp state, damaging the wider war economy."
genocide_deal_with_resistance_sabotage: "Crush Camp Sabotage"
genocide_deal_with_resistance_sabotage_desc: "Use security forces against resistance cells targeting the camp system. This restores control at the cost of deaths, resistance pressure, and additional hidden atrocity records."
genocide_handle_refugee_waves: "Handle Refugee Waves"
genocide_handle_refugee_waves_desc: "Push border offices and occupation authorities to contain refugee movement created by camp rumors and forced transfers."
genocide_manage_military_objections: "Manage Military Objections"
genocide_manage_military_objections_desc: "Silence staff officers objecting to rail diversions, guard detachments, and paperwork that could become evidence."
genocide_destroy_camp_evidence: "Destroy Camp Evidence in [FROM.GetName]"
genocide_destroy_camp_evidence_desc: "Attempt to destroy records, infrastructure, and witnesses in [FROM.GetName] before enemy forces arrive. Success reduces later condemnation but creates additional deaths; failure makes discovery worse."
genocide_dismantle_extermination_camp: "Dismantle Extermination Camp in [FROM.GetName]"
genocide_dismantle_extermination_camp_desc: "Spend time and political capital dismantling extermination infrastructure in [FROM.GetName]. The action reduces future discoverable evidence and active killing capacity, but surviving records and state responsibility remain."
genocide_cover_up_liberated_camps: "Contest Liberated Camp Records"
genocide_cover_up_liberated_camps_desc: "Use embassies, surviving archives, and friendly newspapers to dispute discovered records after a camp site has been liberated."

japan_expand_forced_labor_camps: "Expand Forced Labor Camps in [FROM.GetName]"
japan_expand_forced_labor_camps_desc: "Expand Japanese forced labor infrastructure in [FROM.GetName], tying the site to the same discovery and condemnation system as other camp networks."
japan_conduct_anti_partisan_reprisals: "Conduct Anti-Partisan Reprisals in [FROM.GetName]"
japan_conduct_anti_partisan_reprisals_desc: "Use occupation forces for reprisals in [FROM.GetName]. The action creates hidden deaths and leaves discoverable evidence even when no formal camp building exists."
japan_transfer_prisoners_to_experimental_facilities: "Transfer Prisoners to Experimental Facilities"
japan_transfer_prisoners_to_experimental_facilities_desc: "Move prisoners from [FROM.GetName] into experimental chains connected to Japan's biological warfare capacity. The action creates deaths and can trigger a local contamination outbreak."
japan_destroy_occupation_records: "Destroy Occupation Records in [FROM.GetName]"
japan_destroy_occupation_records_desc: "Attempt to destroy occupation atrocity records and camp evidence in [FROM.GetName] before the state is lost."

sov_expand_gulag_network: "Expand Gulag Network in [FROM.GetName]"
sov_expand_gulag_network_desc: "Create or expand a gulag labor camp network in [FROM.GetName], adding hidden deaths, resistance pressure, and discoverable state evidence."
sov_deport_suspected_opposition_groups: "Deport Suspected Opposition Groups"
sov_deport_suspected_opposition_groups_desc: "Use security organs to deport suspected opposition groups from [FROM.GetName] into the camp system."
sov_confiscate_food_from_disloyal_regions: "Confiscate Food from Disloyal Regions"
sov_confiscate_food_from_disloyal_regions_desc: "Strip supplies from [FROM.GetName] in the name of political control, creating famine pressure and discoverable repression evidence."
sov_destroy_gulag_records: "Destroy Gulag Records in [FROM.GetName]"
sov_destroy_gulag_records_desc: "Attempt to destroy gulag records and infrastructure in [FROM.GetName] before hostile forces uncover them."

genocide_publicize_survivor_testimony: "Publicize Survivor Testimony Against [FROM.GetNameDef]"
genocide_publicize_survivor_testimony_desc: "Publish survivor testimony and recovered evidence from [FROM.GetNameDef]'s camp system, increasing diplomatic pressure and war support."
genocide_enact_sanctions: "Enact Sanctions Against [FROM.GetNameDef]"
genocide_enact_sanctions_desc: "Apply sanctions once discovered evidence against [FROM.GetNameDef] is severe enough for public action."
genocide_support_resistance_networks: "Support Resistance Networks in [FROM.GetNameDef]"
genocide_support_resistance_networks_desc: "Support resistance groups targeting [FROM.GetNameDef]'s camp infrastructure and occupation records."
genocide_prepare_tribunal_records: "Prepare Tribunal Records Against [FROM.GetNameDef]"
genocide_prepare_tribunal_records_desc: "Organize survivor statements, captured documents, and diplomatic files for a future tribunal against [FROM.GetNameDef]."
