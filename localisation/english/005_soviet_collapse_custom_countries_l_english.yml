CFR: "Civilian Factory of Russia"
CFR_DEF: "the Civilian Factory of Russia"
CFR_ADJ: "Construction Directorate"
CFR_democratic: "Civilian Works Republic"
CFR_democratic_DEF: "the Civilian Works Republic"
CFR_democratic_ADJ: "Civilian Works"
CFR_communism: "All-Russian Reconstruction Trust"
CFR_communism_DEF: "the All-Russian Reconstruction Trust"
CFR_communism_ADJ: "Reconstruction Trust"
CFR_fascism: "The City Without Citizens"
CFR_fascism_DEF: "the City Without Citizens"
CFR_fascism_ADJ: "Site Directorate"
CFR_neutrality: "Russian Construction Directorate"
CFR_neutrality_DEF: "the Russian Construction Directorate"
CFR_neutrality_ADJ: "Construction Directorate"
CFR_leader_desc: "The Construction Board is not a person but a state office that outlived the ministries. It rules through cement allocations, housing registers, bridge permits, ration cards, and contracts that decide which cities remain habitable."
MFR: "Military Factory of Russia"
MFR_DEF: "the Military Factory of Russia"
MFR_ADJ: "Arsenal Directorate"
MFR_democratic: "Arsenal Accountability Republic"
MFR_democratic_DEF: "the Arsenal Accountability Republic"
MFR_democratic_ADJ: "Arsenal Republic"
MFR_communism: "Workers' Arsenal Directorate"
MFR_communism_DEF: "the Workers' Arsenal Directorate"
MFR_communism_ADJ: "Workers' Arsenal"
MFR_fascism: "The State as One Arms Order"
MFR_fascism_DEF: "the State as One Arms Order"
MFR_fascism_ADJ: "Arms Order"
MFR_neutrality: "Russian Arsenal Board"
MFR_neutrality_DEF: "the Russian Arsenal Board"
MFR_neutrality_ADJ: "Arsenal Board"
MFR_leader_desc: "The Arsenal Board treats sovereignty as a production order. Factory guards, machine-tool offices, depot clerks, and ammunition inspectors decide who receives shells and who is left outside the gate."
soviet_collapse_reconstruction_state: "The Reconstruction State"
soviet_collapse_reconstruction_state_desc: "Construction mandates turn cement, engineers, rail access, housing ration cards, and foreign contracts into authority."
soviet_collapse_arsenal_state: "The Arsenal State"
soviet_collapse_arsenal_state_desc: "Arsenal quotas turn metal, machine tools, skilled labor, ammunition stockpiles, and military demand into sovereignty."
soviet_collapse_returned_names: "The Returned Names"
soviet_collapse_returned_names_desc: "High-chaos restoration pressure turns museum cabinets, old banners, river claims, mountain passes, and trade-route memories into political weapons."
chaosx_sovcollapse_decision_blocked_no_cement_stock: "The cement, engineers, rail access, or political authority are not ready for another emergency construction wave."
chaosx_sovcollapse_decision_blocked_no_cement_stock_blocked: "Cement  Engineers  Rail access  Political authority"
chaosx_sovcollapse_decision_blocked_no_cement_stock_tooltip: "Construction decisions use factory authority to keep emergency works supplied."
chaosx_sovcollapse_decision_blocked_no_arms_mandate: "The arsenal board refuses to release this production order without a stronger security mandate."
chaosx_sovcollapse_decision_blocked_no_arms_mandate_blocked: "Security mandate"
chaosx_sovcollapse_decision_blocked_no_arms_mandate_tooltip: "Arsenal decisions require political cover before the board releases arms production."
chaosx_sovcollapse_decision_blocked_no_volga_legitimacy: "The river notables, scholars, and ferry offices have not granted enough legitimacy for another Volga claim."
chaosx_sovcollapse_decision_blocked_no_volga_legitimacy_blocked: "Volga legitimacy"
chaosx_sovcollapse_decision_blocked_no_volga_legitimacy_tooltip: "Volga claim decisions require public legitimacy from river offices and local notables."
chaosx_sovcollapse_decision_blocked_returned_names: "The claim cannot move without political authority, archivists, and enough public space to argue the old name safely."
chaosx_sovcollapse_decision_blocked_returned_names_blocked: "Political authority  Archivists  Public space"
chaosx_sovcollapse_decision_blocked_returned_names_tooltip: "Returned-name decisions require administrative backing before old claims can be asserted."
chaosx_sovcollapse_decision_blocked_custom_splinter_low_blocked: "Stable public order  Reserve support equipment"
chaosx_sovcollapse_decision_blocked_custom_splinter_medium_blocked: "£pol_power 35  £command_power 20  £army_experience 5"
chaosx_sovcollapse_decision_blocked_target_not_breakaway: "This republic is no longer in a state where this action makes sense."
chaosx_sovcollapse_decision_blocked_sponsor_overreach: "Further sponsorship would make the republic look like a foreign client."
chaosx_sovcollapse_decision_unavailable_factory_cooldown: "The boards are still processing the previous mandate."
chaosx_sovcollapse_decision_unavailable_target_invalid: "The selected target is no longer valid."
soviet_collapse_kronstadt_council: "Kronstadt Council"
soviet_collapse_kronstadt_council_desc: "The Kronstadt Free Soviet uses sailor assemblies, fortress stores, port councils, and guarded signals to keep the naval revolt alive."
soviet_collapse_free_territory: "Free Territory"
soviet_collapse_free_territory_desc: "The Free Territory uses black-flag communes, depot raids, village councils, and temporary bargains to survive between Moscow, Kyiv, and every new ministry."
soviet_collapse_black_banner_host: "Black Banner Host"
soviet_collapse_black_banner_host_desc: "The Black Banner Host uses mobile columns, commune war councils, seized stores, and anti-state campaigns to keep the southern revolt moving."
soviet_collapse_basmachi_confederation: "Basmachi Confederation"
soviet_collapse_basmachi_confederation_desc: "The Basmachi Confederation uses oasis fighters, caravan routes, border depots, and mountain passes to turn failed supply control into a southern revolt."
soviet_collapse_turkestan_national_council: "Turkestan National Council"
soviet_collapse_turkestan_national_council_desc: "The Turkestan National Council uses city offices, school boards, guarded rails, and oasis bargains to build a civic Central Asian authority."
soviet_collapse_alash_restoration_authority: "Alash Restoration Authority"
soviet_collapse_alash_restoration_authority_desc: "The Alash Restoration Authority uses congress law, mobile guards, schools, archives, and rail stations to organize the Kazakh steppe outside Moscow's cadence."
soviet_collapse_union_defense_committee: "Union Defense Committee"
soviet_collapse_union_defense_committee_desc: "The Union Defense Committee uses failed loyalist districts, emergency staffs, red guards, and purged command seals to continue the Union without trusting Moscow."
soviet_collapse_security_directorate_zone: "Security Directorate Zone"
soviet_collapse_security_directorate_zone_desc: "The Security Directorate Zone uses archives, internal troops, custody chains, guarded files, and sealed offices to turn state memory into state power."
soviet_collapse_green_army_congress: "Green Army Congress"
soviet_collapse_green_army_congress_desc: "The Green Army Congress uses village delegates, forest columns, hidden grain stores, and anti-requisition patrols to turn rural survival into armed authority."
soviet_collapse_don_host_emergency_circle: "Don Host Emergency Circle"
soviet_collapse_don_host_emergency_circle_desc: "The Don Host Emergency Circle uses stanitsa delegates, river guards, old officer channels, and protected grain convoys to hold the southern approaches."
soviet_collapse_kuban_host_provisional_council: "Kuban Host Provisional Council"
soviet_collapse_kuban_host_provisional_council_desc: "The Kuban Host Provisional Council uses crossing guards, stanitsa committees, harvest ledgers, and mountain approaches to deny unapproved passage."
soviet_collapse_far_eastern_republic_revival: "Far Eastern Republic Revival"
soviet_collapse_far_eastern_republic_revival_desc: "The Far Eastern Republic Revival uses port offices, rail guards, liaison rooms, and Pacific trade ledgers to keep distant armies from spending the eastern line."
soviet_collapse_siberian_zemstvo_authority: "Siberian Zemstvo Authority"
soviet_collapse_siberian_zemstvo_authority_desc: "The Siberian Zemstvo Authority uses city offices, regional assemblies, rail depots, and city guards to keep Siberian stores under local law."
soviet_collapse_ural_workers_directorate: "Ural Workers' Directorate"
soviet_collapse_ural_workers_directorate_desc: "The Ural Workers' Directorate uses factory committees, steel rationing, protected engineers, and worker battalions to keep the arsenals under committee authority."
soviet_collapse_mountain_republic_of_the_caucasus: "Mountain Republic of the Caucasus"
soviet_collapse_mountain_republic_of_the_caucasus_desc: "The Mountain Republic of the Caucasus uses pass guards, village councils, elder assemblies, and lowland-depot raids to keep the high roads outside Moscow command."
soviet_collapse_idel_ural_league: "Idel-Ural League"
soviet_collapse_idel_ural_league_desc: "The Idel-Ural League uses Volga crossings, Ufa committees, workshop guards, and rail blockades to turn autonomy claims into a corridor authority."
soviet_collapse_birobidzhan_autonomous_commune: "Birobidzhan Autonomous Commune"
soviet_collapse_birobidzhan_autonomous_commune_desc: "The Birobidzhan Autonomous Commune uses settlement defenses, archive stores, refugee committees, and humanitarian routes to protect the Amur settlements."
krs_consolidate_claim_tt: "Uses reserve support equipment to stabilize Kronstadt and raise recognition."
krs_mobilize_signature_forces_tt: "Strains public order and field staff to raise sailor guards with manpower, rifles, and support stores."
krs_push_extreme_route_tt: "Strains public order and field staff, commits the sailor councils to the port-council endgame, and fires the Every Port a Council super-event."
fth_consolidate_claim_tt: "Uses reserve support equipment to stabilize the Free Territory and raise recognition."
fth_mobilize_signature_forces_tt: "Strains public order and field staff to arm free-soviet guards with manpower, rifles, and support stores."
fth_push_extreme_route_tt: "Strains public order and field staff, commits the Free Territory to the Black International route, and fires the Black Banner Returns super-event."
bbh_consolidate_claim_tt: "Uses reserve support equipment to bind the commune war councils and raise recognition."
bbh_mobilize_signature_forces_tt: "Strains public order and field staff to arm black columns with manpower, rifles, and support stores."
bbh_push_extreme_route_tt: "Strains public order and field staff, commits the Host to permanent anti-state war, and fires the Black Banner Returns super-event."
bsc_consolidate_claim_tt: "Uses reserve support equipment to bind oasis councils and raise recognition."
bsc_mobilize_signature_forces_tt: "Strains public order and field staff to arm pass guards, cavalry screens, and road columns."
bsc_push_extreme_route_tt: "Strains public order and field staff, commits the confederation to the road beyond the steppe, and announces the Steppe Federation to every watching capital."
tnc_consolidate_claim_tt: "Uses reserve support equipment to stabilize the council offices and raise recognition."
tnc_mobilize_signature_forces_tt: "Strains public order and field staff to arm railway guards and civic defense detachments."
tnc_push_extreme_route_tt: "Strains public order and field staff, commits the council to a New Turkestan route, and announces the Steppe Federation to every watching capital."
ala_consolidate_claim_tt: "Uses reserve support equipment to strengthen the congress mandate and raise recognition."
ala_mobilize_signature_forces_tt: "Strains public order and field staff to arm cavalry guards and rail-station detachments."
ala_push_extreme_route_tt: "Strains public order and field staff, commits the authority to the national modernization mandate, and announces the Steppe Federation to every watching capital."
udc_consolidate_claim_tt: "Uses reserve support equipment to bind emergency staffs and raise recognition."
udc_mobilize_signature_forces_tt: "Strains public order and field staff to arm loyalist guards and crisis command detachments."
udc_push_extreme_route_tt: "Strains public order and field staff, commits the committee to the Purified Union Command, and fires the Union Unmade super-event."
sdz_consolidate_claim_tt: "Uses reserve support equipment to bind archive offices and raise recognition."
sdz_mobilize_signature_forces_tt: "Strains public order and field staff to arm internal troops and document-control detachments."
sdz_push_extreme_route_tt: "Strains public order and field staff, commits the directorate to the World in One Archive, and locks its endgame."
gac_consolidate_claim_tt: "Uses reserve support equipment to bind village delegates and raise recognition."
gac_mobilize_signature_forces_tt: "Strains public order and field staff to arm forest columns and village guards."
gac_push_extreme_route_tt: "Strains public order and field staff, commits the congress to Land and Bread Against the World, and locks its endgame."
dhc_consolidate_claim_tt: "Uses reserve support equipment to bind host-circle offices and raise recognition."
dhc_mobilize_signature_forces_tt: "Strains public order and field staff to arm stanitsa guards and mobile rider detachments."
dhc_push_extreme_route_tt: "Strains public order and field staff, commits the circle to Southern Host Command, and locks its endgame."
khc_consolidate_claim_tt: "Uses reserve support equipment to bind crossing offices and raise recognition."
khc_mobilize_signature_forces_tt: "Strains public order and field staff to arm Kuban patrols and crossing guards."
khc_push_extreme_route_tt: "Strains public order and field staff, commits the council to Kuban Line Command, and locks its endgame."
fev_consolidate_claim_tt: "Uses reserve support equipment to bind port offices and raise recognition."
fev_mobilize_signature_forces_tt: "Strains public order and field staff to arm railway guards and dock detachments."
fev_push_extreme_route_tt: "Strains public order and field staff, commits the republic to Far Eastern Line Command, and locks its endgame."
sza_consolidate_claim_tt: "Uses reserve support equipment to bind zemstvo offices and raise recognition."
sza_mobilize_signature_forces_tt: "Strains public order and field staff to arm city guards and rail detachments."
sza_push_extreme_route_tt: "Strains public order and field staff, commits the authority to Siberian Depth Command, and locks its endgame."
uwd_consolidate_claim_tt: "Uses reserve support equipment to bind factory committees and raise recognition."
uwd_mobilize_signature_forces_tt: "Strains public order and field staff to arm worker battalions and plant guards."
uwd_push_extreme_route_tt: "Strains public order and field staff, commits the Directorate to Arsenal Autonomy, and locks its endgame."
mrc_consolidate_claim_tt: "Uses reserve support equipment to bind elder councils and raise recognition."
mrc_mobilize_signature_forces_tt: "Strains public order and field staff to arm pass guards and highland militia."
mrc_push_extreme_route_tt: "Strains public order and field staff, commits the republic to the Mountain Republic Mandate, and locks its endgame."
iul_consolidate_claim_tt: "Uses reserve support equipment to bind federal corridor offices and raise recognition."
iul_mobilize_signature_forces_tt: "Strains public order and field staff to arm river guards, workshop militias, and rail detachments."
iul_push_extreme_route_tt: "Strains public order and field staff, commits the League to Federal Corridor Authority, and locks its endgame."
bac_consolidate_claim_tt: "Uses reserve support equipment to bind settlement committees and raise recognition."
bac_mobilize_signature_forces_tt: "Strains public order and field staff to arm settlement militia and convoy guards."
bac_push_extreme_route_tt: "Strains public order and field staff, commits the commune to the Autonomous Commune Mandate, and locks its endgame."
cfr_construction_mandates: "Construction Mandates"
cfr_construction_mandates_desc: "The directorate converts cement allocations, engineers, rail access, contracts, and housing offices into factories, infrastructure, and dependency networks."
cfr_housing_ration_boards: "Housing Ration Boards"
cfr_housing_ration_boards_desc: "Housing papers and ration cards bind workers to sites that increasingly resemble ministries."
mfr_arsenal_quotas: "Arsenal Quotas"
mfr_arsenal_quotas_desc: "Machine tools, metal stocks, ammunition ledgers, and factory guards are counted as the state's mandate to exist."
mfr_factory_guard_state: "Factory Guard State"
mfr_factory_guard_state_desc: "Factory guards decide who enters the gates, who receives arms, and which orders still matter."
soviet_collapse_returned_names_pressure: "Returned Names Pressure"
soviet_collapse_returned_names_pressure_desc: "Local committees argue that old names are not folklore but emergency claims against the present authorities."
soviet_collapse_archivist_claim_council: "Archivist Claim Council"
soviet_collapse_archivist_claim_council_desc: "Archivists, teachers, notables, and party defectors decide which fragments of the old map can be used without breaking the state apart."
soviet_collapse_old_banner_mobilization: "Old Banner Mobilization"
soviet_collapse_old_banner_mobilization_desc: "A commissioned banner turns restoration talk into enlistment, patrols, and guarded public ceremonies."
cfr_survey_unfinished_sites: "Survey the Unfinished Sites"
cfr_survey_unfinished_sites_desc: "Engineers and clerks inspect abandoned foundations, cranes, depots, and railheads before local committees can privatize them."
cfr_survey_unfinished_sites_tt: "Gains §YConstruction Mandates§!, improves one controlled state, and organizes the construction boards into a recognized authority."
cfr_issue_reconstruction_contracts: "Issue Reconstruction Contracts"
cfr_issue_reconstruction_contracts_desc: "Contracts bind materials, workers, and nearby authorities into a reconstruction network that answers to the board."
cfr_issue_reconstruction_contracts_tt: "Spends §YConstruction Mandates§! to add civilian construction capacity and raise foreign interest in the collapse economy."
mfr_audit_arsenal_orders: "Audit Arsenal Orders"
mfr_audit_arsenal_orders_desc: "The arsenal board matches depot ledgers against orders from ministries that may no longer exist."
mfr_audit_arsenal_orders_tt: "Gains §YArsenal Quotas§!, army experience, and the first durable arsenal-state authority."
mfr_convert_depots_to_arms_lines: "Convert Depots to Arms Lines"
mfr_convert_depots_to_arms_lines_desc: "Captured stores and repair shops are folded into production lines guarded by the arsenal state."
mfr_convert_depots_to_arms_lines_tt: "Spends §YArsenal Quotas§! to add military production, equipment, and Soviet depot vulnerability."
soviet_collapse_open_museum_cabinets: "Open the Museum Cabinets"
soviet_collapse_open_museum_cabinets_desc: "Local officials release maps, seals, photographs, and disputed records into the public argument over sovereignty."
soviet_collapse_recruit_archivists: "Recruit the Archivists"
soviet_collapse_recruit_archivists_desc: "Archivists and teachers are given offices, guards, and ration access so they can translate memory into usable claims."
soviet_collapse_commission_old_banner: "Commission the Old Banner"
soviet_collapse_commission_old_banner_desc: "The committees approve a banner that is openly symbolic, politically useful, and dangerous enough to need guards."
soviet_collapse_argue_khazar_toll_claim: "Argue the Khazar Toll Claim"
soviet_collapse_argue_khazar_toll_claim_desc: "Lower Volga and Caspian-route activists claim that toll roads, river mouths, and steppe approaches should answer to a revived transit authority."
soviet_collapse_argue_sogdian_city_claim: "Argue the Sogdian City Claim"
soviet_collapse_argue_sogdian_city_claim_desc: "City scholars and merchants in the southern crisis frame Samarkand, Bukhara, and Khujand memory as a league of trade and survival."
soviet_collapse_argue_khwarazmian_oasis_claim: "Argue the Khwarazmian Oasis Claim"
soviet_collapse_argue_khwarazmian_oasis_claim_desc: "Oasis committees along the Amu Darya use Khiva and Khwarazmian memory to demand river security and desert authority."
soviet_collapse_argue_alan_pass_claim: "Argue the Alan Pass Claim"
soviet_collapse_argue_alan_pass_claim_desc: "Mountain organizers revive Alan and pass-defense language to bind border roads, valleys, and highland councils."
soviet_collapse_reject_antiquarians: "Reject the Antiquarians"
soviet_collapse_reject_antiquarians_desc: "The government contains the restoration clubs before their banners become a rival authority."
chaosx.nr5_factory_ancient.1.t: "The Civilian Factory of Russia"
chaosx.nr5_factory_ancient.1.d: "Construction boards in the Russian interior have stopped asking Moscow which sites matter. Their clerks issue ration cards, bridge permits, cement allocations, and housing orders under one seal: the state that rebuilds is the state that rules."
chaosx.nr5_factory_ancient.1.a: "The cranes answer to no ministry."
chaosx.nr5_factory_ancient.2.t: "The Military Factory of Russia"
chaosx.nr5_factory_ancient.2.d: "Arsenal towns and factory guards have declared that production orders outlived the government that signed them. Ammunition, machine tools, skilled labor, and depot gates now answer to an Arsenal Board."
chaosx.nr5_factory_ancient.2.a: "Output has become law."
CFR_soviet_collapse_focus_tree: "Construction Directorate"
CFR_soviet_collapse_focus_tree_desc: "The Construction Directorate tree follows construction mandates, housing control, reconstruction contracts, coercive worksites, and the struggle between a civic builder state and the city without citizens."
CFR_count_the_cranes: "Count the Cranes"
CFR_count_the_cranes_desc: "The board counts cranes, depots, hoists, trucks, and unfinished foundations as the first census of its authority."
CFR_the_trust_office_takes_the_seal: "The Trust Office Takes the Seal"
CFR_the_trust_office_takes_the_seal_desc: "The old construction trust office claims the seal of government because it still has paper, fuel stamps, and people who answer its calls."
CFR_ration_cards_for_workers: "Ration Cards for Workers"
CFR_ration_cards_for_workers_desc: "Workers who can prove their site assignment receive housing papers and food cards before anyone asks which ministry still exists."
CFR_emergency_cement_accounts: "Emergency Cement Accounts"
CFR_emergency_cement_accounts_desc: "Every bag of cement enters an emergency account, where the board can turn scarcity into obedience."
CFR_the_unfinished_city_speaks: "The Unfinished City Speaks"
CFR_the_unfinished_city_speaks_desc: "The half-built city becomes a political voice, demanding roads, shelter, cranes, and a government that can pour concrete."
CFR_elect_the_site_committees: "Elect the Site Committees"
CFR_elect_the_site_committees_desc: "Foremen, hostel delegates, engineers, and ration clerks elect site committees to keep the directorate answerable to the people it houses."
CFR_publish_the_planners_charter: "Publish the Planners' Charter"
CFR_publish_the_planners_charter_desc: "The planners write a charter that makes the construction schedule the constitution of the surviving state."
CFR_invite_the_foreign_contract_board: "Invite the Foreign Contract Board"
CFR_invite_the_foreign_contract_board_desc: "Foreign firms and engineers may enter the reconstruction only through a board that can price their access."
CFR_the_concrete_committee: "The Concrete Committee"
CFR_the_concrete_committee_desc: "A hard committee argues that cement, discipline, and locked dormitory gates are more reliable than elections or charters."
CFR_minutes_from_every_workshop: "Minutes from Every Workshop"
CFR_minutes_from_every_workshop_desc: "Every workshop records votes, absences, tool shortages, and safety complaints so the committees can govern from the ground upward."
CFR_the_engineers_overrule_the_party: "The Engineers Overrule the Party"
CFR_the_engineers_overrule_the_party_desc: "Engineers claim authority over slogans by proving that bridges and boilers do not respond to speeches."
CFR_contracts_before_ideology: "Contracts Before Ideology"
CFR_contracts_before_ideology_desc: "The contract board measures every ally by delivered steel, loan terms, and machines that arrive before winter."
CFR_housing_as_discipline: "Housing as Discipline"
CFR_housing_as_discipline_desc: "The committee treats housing papers as a leash, rewarding obedient workers and isolating the rest."
CFR_the_board_becomes_the_cabinet: "The Board Becomes the Cabinet"
CFR_the_board_becomes_the_cabinet_desc: "The board stops pretending to advise a missing government and takes responsibility for every permit, ration, and work order."
CFR_cities_first: "Cities First"
CFR_cities_first_desc: "The directorate prioritizes apartment blocks, hospitals, schools, and utilities so cities remain political facts."
CFR_rails_first: "Rails First"
CFR_rails_first_desc: "Railheads, bridges, sidings, and repair yards take priority because a state that cannot move cement cannot govern."
CFR_factories_first: "Factories First"
CFR_factories_first_desc: "Civilian industry becomes the proof of sovereignty, with empty ministries stripped for tools and offices."
CFR_contracts_first: "Contracts First"
CFR_contracts_first_desc: "The board chooses debt, permits, and reconstruction contracts as the fastest way to pull nearby authorities into its orbit."
CFR_apartment_blocks_for_loyalty: "Apartment Blocks for Loyalty"
CFR_apartment_blocks_for_loyalty_desc: "Loyal workers receive apartments first, making every stairwell a political reward."
CFR_repair_the_bridges_before_the_flags: "Repair the Bridges Before the Flags"
CFR_repair_the_bridges_before_the_flags_desc: "The board repairs crossings before arguing symbols, because a usable bridge can make a border obey."
CFR_machine_tools_from_empty_ministries: "Machine Tools from Empty Ministries"
CFR_machine_tools_from_empty_ministries_desc: "Empty ministries are stripped for lathes, generators, files, and anything else that can feed a working factory."
CFR_build_their_parliament_own_their_debt: "Build Their Parliament, Own Their Debt"
CFR_build_their_parliament_own_their_debt_desc: "Dependent republics receive civic buildings and roads, then discover that the repayment schedule is another kind of treaty."
CFR_the_concrete_price_index: "The Concrete Price Index"
CFR_the_concrete_price_index_desc: "A public concrete index turns scarcity into policy and lets the board decide which districts can afford survival."
CFR_a_factory_where_the_school_was: "A Factory Where the School Was"
CFR_a_factory_where_the_school_was_desc: "The board converts abandoned public buildings into workshops, promising classrooms after the furnaces run again."
CFR_the_first_new_district: "The First New District"
CFR_the_first_new_district_desc: "A finished district gives the directorate its first visible answer to collapse: walls, heat, jobs, and an address."
CFR_construction_battalions: "Construction Battalions"
CFR_construction_battalions_desc: "Work crews are organized into battalions that can repair roads, raise shelters, and defend the tools they carry."
CFR_fortify_the_worksite_gates: "Fortify the Worksite Gates"
CFR_fortify_the_worksite_gates_desc: "The gates become checkpoints where guards protect depots, ration cards, and the skilled workers inside."
CFR_blueprints_for_field_shelters: "Blueprints for Field Shelters"
CFR_blueprints_for_field_shelters_desc: "Engineers standardize field shelters so battalions can build protection wherever the front finds them."
CFR_the_crane_as_watchtower: "The Crane as Watchtower"
CFR_the_crane_as_watchtower_desc: "Cranes overlook the worksite, the road, and the crowd, turning construction equipment into a security system."
CFR_sappers_of_the_builder_state: "Sappers of the Builder State"
CFR_sappers_of_the_builder_state_desc: "Construction battalions learn demolition, bridging, and emergency field works under the same schedule that builds apartments."
CFR_german_concrete_offers: "German Concrete Offers"
CFR_german_concrete_offers_desc: "German suppliers offer cement, engineers, and blueprints in exchange for access to the directorate's rebuilding market."
CFR_british_reconstruction_credit: "British Reconstruction Credit"
CFR_british_reconstruction_credit_desc: "British credit offices promise order in the accounts, provided the board accepts their terms."
CFR_american_machine_tool_mission: "American Machine Tool Mission"
CFR_american_machine_tool_mission_desc: "American machine-tool advisers arrive with parts lists, safety manuals, and a quiet interest in every factory ledger."
CFR_contracts_with_the_league: "Contracts with the League"
CFR_contracts_with_the_league_desc: "The directorate sells reconstruction services to the League as proof that it is useful before it is recognized."
CFR_build_the_border_bend_the_border: "Build the Border, Bend the Border"
CFR_build_the_border_bend_the_border_desc: "Road crews, customs sheds, and bridge permits make borders easier to move than armies can admit."
CFR_the_debt_map: "The Debt Map"
CFR_the_debt_map_desc: "Every contract is plotted on a debt map that shows which republics owe the directorate money, roads, and silence."
CFR_the_city_without_citizens: "The City Without Citizens"
CFR_the_city_without_citizens_desc: "The committee imagines a city made of dormitories, work orders, ration cards, and no politics outside the schedule."
CFR_concrete_courts: "Concrete Courts"
CFR_concrete_courts_desc: "Site courts judge theft, absence, sabotage, and dissent through the language of lost materials and delayed pours."
CFR_seal_the_dormitories: "Seal the Dormitories"
CFR_seal_the_dormitories_desc: "Dormitory gates close around workers whose papers now matter more than their consent."
CFR_no_empty_lots_no_empty_lives: "No Empty Lots, No Empty Lives"
CFR_no_empty_lots_no_empty_lives_desc: "The committee assigns every lot and every worker a purpose, leaving no place outside the plan."
CFR_the_concrete_republic: "The Concrete Republic"
CFR_the_concrete_republic_desc: "The coercive route hardens into a republic where citizenship is measured in assigned labor and completed pours."
CFR_the_state_that_builds: "The State That Builds"
CFR_the_state_that_builds_desc: "The directorate claims that the state able to build roads, flats, and factories has already earned the right to rule."
CFR_reconstruction_protectorates: "Reconstruction Protectorates"
CFR_reconstruction_protectorates_desc: "Neighboring authorities accept construction aid, then find the board's permits embedded in their budgets and streets."
CFR_a_civilian_factory_in_every_capital: "A Civilian Factory in Every Capital"
CFR_a_civilian_factory_in_every_capital_desc: "The directorate offers every partner a factory and asks only that the contracts remain under its seal."
CFR_buy_peace_with_concrete: "Buy Peace with Concrete"
CFR_buy_peace_with_concrete_desc: "The board spends cement on quiet districts, repaired utilities, and the promise that tomorrow will have walls."
CFR_the_builder_state_marches_east: "The Builder State Marches East"
CFR_the_builder_state_marches_east_desc: "Work columns, survey teams, and guarded depots move east with maps that treat every ruin as a future permit."
CFR_factories_as_embassies: "Factories as Embassies"
CFR_factories_as_embassies_desc: "A factory abroad speaks more clearly than a diplomat, especially when its payroll depends on the directorate."
CFR_the_workers_keep_the_keys: "The Workers Keep the Keys"
CFR_the_workers_keep_the_keys_desc: "Site committees keep control of gates, storage rooms, and election rolls so reconstruction does not become another owner."
CFR_the_plan_is_the_law: "The Plan Is the Law"
CFR_the_plan_is_the_law_desc: "The planner directorate turns the schedule into law, making every deviation a political question."
CFR_the_foreigners_hold_the_mortgage: "The Foreigners Hold the Mortgage"
CFR_the_foreigners_hold_the_mortgage_desc: "Foreign contracts bring machinery and credit, but the repayment papers sit beside the board's seal."
CFR_pour_the_final_foundation: "Pour the Final Foundation"
CFR_pour_the_final_foundation_desc: "The directorate pours a final foundation for its order: a state built from permits, labor, concrete, and debt."
CFR_nothing_but_foundations: "Nothing But Foundations"
CFR_nothing_but_foundations_desc: "The board looks across the country and sees not ruins, villages, or arguments, but foundations waiting for orders."
CFR_sites_become_government: "Sites Become Government"
CFR_sites_become_government_desc: "The directorate declares that the sites, offices, rail stores, and housing registers are the only administration still able to keep cities alive."
CFR_cement_allocation_boards: "Cement Allocation Boards"
CFR_cement_allocation_boards_desc: "Cement allocation becomes a sovereign act, deciding which districts are repaired and which petitioners wait outside the gate."
CFR_housing_ration_cards: "Housing Ration Cards"
CFR_housing_ration_cards_desc: "Housing offices and ration cards turn shelter into a political instrument."
CFR_reconstruction_contract_state: "Reconstruction Contract State"
CFR_reconstruction_contract_state_desc: "The board offers contracts instead of ideology, binding neighbors through roads, factories, and repairs."
CFR_city_without_citizens: "The City Without Citizens"
CFR_city_without_citizens_desc: "A darker route treats residents as labor attached to sites, not citizens attached to a state."
CFR_foreign_engineer_desks: "Foreign Engineer Desks"
CFR_foreign_engineer_desks_desc: "Foreign engineers and loan offices are screened through the board before they can own the reconstruction."
CFR_client_factory_permits: "Client Factory Permits"
CFR_client_factory_permits_desc: "Permits turn allied or dependent authorities into construction clients."
CFR_forced_labor_barracks: "Forced Labor Barracks"
CFR_forced_labor_barracks_desc: "Coercive barracks increase output while poisoning the directorate's legitimacy."
CFR_union_of_construction_cities: "Union of Construction Cities"
CFR_union_of_construction_cities_desc: "The construction cities coordinate permits, engineers, ration cards, and rail stores as one state."
CFR_concrete_republic: "The Concrete Republic"
CFR_concrete_republic_desc: "The board claims that reconstruction, not succession, is the foundation of sovereignty."
MFR_soviet_collapse_focus_tree: "Arsenal Board"
MFR_soviet_collapse_focus_tree_desc: "The Arsenal Board tree follows arsenal quotas, factory guards, worker delegates, arms merchants, unsafe production, proxy shipments, and the state as one arms order."
MFR_orders_outlive_ministries: "Orders Outlive Ministries"
MFR_orders_outlive_ministries_desc: "The Arsenal Board treats signed production orders as more real than the ministers who signed them."
MFR_machine_tool_seizures: "Machine Tool Seizures"
MFR_machine_tool_seizures_desc: "Machine tools are counted, guarded, and seized before rival committees can dismantle the arsenal."
MFR_factory_guard_oaths: "Factory Guard Oaths"
MFR_factory_guard_oaths_desc: "Factory guards swear to defend production rather than a capital."
MFR_arm_all_clients: "Arm All Clients"
MFR_arm_all_clients_desc: "The arsenal can survive by selling weapons to every authority that pays and promises access."
MFR_no_shell_without_obedience: "No Shell Without Obedience"
MFR_no_shell_without_obedience_desc: "The board withholds ammunition unless clients accept arsenal discipline."
MFR_unsafe_production_surge: "Unsafe Production Surge"
MFR_unsafe_production_surge_desc: "The factories run harder than their workers, rails, and safety rules can bear."
MFR_arsenal_ration_law: "Arsenal Ration Law"
MFR_arsenal_ration_law_desc: "Ration law is rewritten around metal, ammunition, and factory shifts."
MFR_export_serials_without_names: "Export Serials Without Names"
MFR_export_serials_without_names_desc: "Serial numbers travel farther than flags, allowing the board to arm clients without admitting every bargain."
MFR_factory_war_cabinet: "Factory War Cabinet"
MFR_factory_war_cabinet_desc: "Production managers and guard commanders form a war cabinet around the arsenal."
MFR_state_as_one_arms_order: "The State as One Arms Order"
MFR_state_as_one_arms_order_desc: "The board declares that the state is a single arms order: quota, guard, factory, and front."
CFR_map_the_unfinished_cities: "Map the Unfinished Cities"
CFR_map_the_unfinished_cities_desc: "Surveyors turn abandoned sites, depots, crane yards, and half-built districts into a map of future authority."
CFR_bridge_permit_ministries: "Bridge Permit Ministries"
CFR_bridge_permit_ministries_desc: "Bridge offices and permit desks become ministries because every road, crossing, and repair crew needs a signature."
CFR_worker_hostel_registers: "Worker Hostel Registers"
CFR_worker_hostel_registers_desc: "The housing rolls bind workers to sites through shelter, rations, and access to surviving rail stores."
CFR_concrete_committee: "The Concrete Committee"
CFR_concrete_committee_desc: "Municipal boards and engineers claim that reconstruction can be governed without a party capital."
CFR_housing_courts: "Housing Courts"
CFR_housing_courts_desc: "Disputes over flats, barracks, ration cards, and worksite residence are moved into courts loyal to the board."
CFR_emergency_cement_imports: "Emergency Cement Imports"
CFR_emergency_cement_imports_desc: "Foreign brokers, local quarries, and surviving rail offices are pressed into the cement supply system."
CFR_engineers_without_flags: "Engineers Without Flags"
CFR_engineers_without_flags_desc: "The directorate hires engineers first and asks about their flags only after the bridges stand."
CFR_rebuild_for_the_league: "Rebuild for the League"
CFR_rebuild_for_the_league_desc: "The Free Republics' League receives repair crews and bridge contracts in exchange for formal space for the board."
CFR_contract_dependency_web: "Contract Dependency Web"
CFR_contract_dependency_web_desc: "Every signed repair order gives the directorate leverage over another hungry city or frightened republic."
CFR_labor_passport_state: "Labor Passport State"
CFR_labor_passport_state_desc: "Workers move only by paper, site assignment, and guard permission as the dark construction route hardens."
CFR_silent_site_guards: "Silent Site Guards"
CFR_silent_site_guards_desc: "The board raises guards that protect cranes, cement stores, and locked worker hostels without public speeches."
CFR_municipal_board_elections: "Municipal Board Elections"
CFR_municipal_board_elections_desc: "City boards are allowed to elect delegates, so long as the ballots do not interrupt reconstruction."
CFR_reconstruction_credit_unions: "Reconstruction Credit Unions"
CFR_reconstruction_credit_unions_desc: "Credit offices bind construction cities together through loans, ration guarantees, and future factory permits."
CFR_the_builder_state: "The Builder State"
CFR_the_builder_state_desc: "The directorate defines sovereignty as the ability to rebuild cities without waiting for Moscow."
CFR_the_city_without_citizens_deepens: "The City Without Citizens Deepens"
CFR_the_city_without_citizens_deepens_desc: "Residents become worksite dependents, counted by assignment and output instead of civic rights."
CFR_no_ruins_without_receipts: "No Ruins Without Receipts"
CFR_no_ruins_without_receipts_desc: "Every ruin receives a number, a claimant, a material ledger, and a future obligation to the board."
CFR_client_city_charters: "Client City Charters"
CFR_client_city_charters_desc: "Dependent cities accept charters that trade autonomy for cement, bridge crews, and ration stability."
CFR_civilian_hegemony_project: "Civilian Hegemony Project"
CFR_civilian_hegemony_project_desc: "The board expands by making civilian reconstruction more useful than any rival flag."
CFR_housing_before_flags: "Housing Before Flags"
CFR_housing_before_flags_desc: "The directorate promises shelter before ideology and uses that promise to quiet political rivals."
CFR_the_permit_state: "The Permit State"
CFR_the_permit_state_desc: "Nothing moves, builds, sells, or feeds a worksite without the directorate's permit."
CFR_city_as_machine: "The City as Machine"
CFR_city_as_machine_desc: "The darkest planners treat the whole city as one production engine fed by labor, concrete, and obedience."
CFR_rebuild_russia_without_moscow: "Rebuild Russia Without Moscow"
CFR_rebuild_russia_without_moscow_desc: "The directorate no longer presents itself as an emergency office, but as a Russian state built from worksites."
CFR_every_region_a_worksite: "Every Region a Worksite"
CFR_every_region_a_worksite_desc: "The final construction program turns regional survival into a network of sites, contracts, and controlled supply."
MFR_arsenal_board_meets: "The Arsenal Board Meets"
MFR_arsenal_board_meets_desc: "Depot clerks, factory guards, officers, and machine-tool managers form the first government of the arsenal."
MFR_who_owns_the_rifle: "Who Owns the Rifle?"
MFR_who_owns_the_rifle_desc: "The board must decide whether arms belong to officers, workers, merchants, or the quota itself."
MFR_officers_chair_the_board: "Officers Chair the Board"
MFR_officers_chair_the_board_desc: "Military order dominates the arsenal, strengthening guard discipline while narrowing civilian authority."
MFR_armorers_elect_delegates: "Armorers Elect Delegates"
MFR_armorers_elect_delegates_desc: "Shop-floor armorers force the board to recognize worker delegates and slower, safer production politics."
MFR_merchants_of_ammunition: "The Merchants of Ammunition"
MFR_merchants_of_ammunition_desc: "The arsenal survives by treating every faction as a buyer and every shell as leverage."
MFR_eternal_arsenal: "The Eternal Arsenal"
MFR_eternal_arsenal_desc: "High-chaos managers declare that production must continue even after the state, worker, and buyer are exhausted."
MFR_military_accounting_courts: "Military Accounting Courts"
MFR_military_accounting_courts_desc: "Every missing rifle, hidden shell, and diverted machine tool becomes a military case."
MFR_shop_floor_committees: "Shop Floor Committees"
MFR_shop_floor_committees_desc: "Factory workers are given a voice in quotas before sabotage and flight become easier than work."
MFR_every_buyer_has_a_flag: "Every Buyer Has a Flag"
MFR_every_buyer_has_a_flag_desc: "The arsenal records clients by flag, route, depot, and the price they pay for another shipment."
MFR_quota_above_life: "Quota Above Life"
MFR_quota_above_life_desc: "The eternal route raises output by treating casualties, accidents, and exhaustion as accounting entries."
MFR_rifles_before_speeches: "Rifles Before Speeches"
MFR_rifles_before_speeches_desc: "The arsenal proves itself with infantry weapons before it wastes time explaining its ideology."
MFR_artillery_from_broken_foundries: "Artillery from Broken Foundries"
MFR_artillery_from_broken_foundries_desc: "Foundry crews turn damaged furnaces and salvaged steel into artillery batches."
MFR_repair_the_tank_lines: "Repair the Tank Lines"
MFR_repair_the_tank_lines_desc: "Armored production returns through repairs, substitutes, and guarded machine-tool halls."
MFR_aircraft_parts_in_secret_workshops: "Aircraft Parts in Secret Workshops"
MFR_aircraft_parts_in_secret_workshops_desc: "Small workshops and evacuation stores build aircraft components for clients who do not ask too many questions."
MFR_shells_without_sleep: "Shells Without Sleep"
MFR_shells_without_sleep_desc: "Night shifts push shell output beyond safe limits and make the arsenal harder to stop."
MFR_standardize_the_rifle_line: "Standardize the Rifle Line"
MFR_standardize_the_rifle_line_desc: "Rifle production is simplified so shipments can be promised, counted, and replaced."
MFR_battery_cities: "The Battery Cities"
MFR_battery_cities_desc: "Factory cities organize around artillery batteries, guards, and fortified production districts."
MFR_plate_steel_rationing: "Plate Steel Rationing"
MFR_plate_steel_rationing_desc: "Steel allocation becomes the arsenal's real constitution."
MFR_engines_from_evacuation_stores: "Engines from Evacuation Stores"
MFR_engines_from_evacuation_stores_desc: "Hidden stores and evacuated parts make the air workshops useful enough for foreign attention."
MFR_red_warning_lamps: "Red Warning Lamps"
MFR_red_warning_lamps_desc: "The lamps stay red through the night while crews learn that danger no longer stops the quota."
MFR_arms_for_recognition: "Arms for Recognition"
MFR_arms_for_recognition_desc: "The board trades shipments for recognition, access, and promises that clients will remember the arsenal."
MFR_rifles_for_the_league: "Rifles for the League"
MFR_rifles_for_the_league_desc: "League republics receive rifles, but every crate carries an arsenal claim."
MFR_rifles_against_the_league: "Rifles Against the League"
MFR_rifles_against_the_league_desc: "The arsenal arms the League's enemies when profit and leverage matter more than stability."
MFR_german_orders: "German Orders"
MFR_german_orders_desc: "German buyers and intermediaries test whether the arsenal can be useful without becoming a client."
MFR_no_serial_numbers: "No Serial Numbers"
MFR_no_serial_numbers_desc: "Unmarked weapons let the board arm clients, deny responsibility, and make every frontier more dangerous."
MFR_factory_guard_columns: "Factory Guard Columns"
MFR_factory_guard_columns_desc: "Guard detachments move beyond gates to secure routes, depots, and threatened workers."
MFR_armored_train_workshops: "Armored Train Workshops"
MFR_armored_train_workshops_desc: "Rail shops rebuild armored cars and trains for a state that thinks in production corridors."
MFR_workers_must_not_flee: "The Workers Must Not Flee"
MFR_workers_must_not_flee_desc: "The dark route locks labor to the arsenal and calls flight another form of sabotage."
MFR_civilian_factory_rivalry: "The Civilian Factory Rivalry"
MFR_civilian_factory_rivalry_desc: "The arsenal decides whether the builders are partners, clients, or rivals wasting steel."
MFR_contracts_with_builders: "Contracts with the Builders"
MFR_contracts_with_builders_desc: "The arsenal trades machine tools and protection for construction access and shared influence."
MFR_builders_waste_steel: "The Builders Waste Steel"
MFR_builders_waste_steel_desc: "The arsenal condemns civilian reconstruction as theft from military necessity."
MFR_the_arsenal_state: "The Arsenal State"
MFR_the_arsenal_state_desc: "The board defines the state as guard, machine hall, quota, and delivery order."
MFR_a_rifle_in_every_treaty: "A Rifle in Every Treaty"
MFR_a_rifle_in_every_treaty_desc: "Every diplomatic bargain includes arms, spare parts, or future production obligations."
MFR_output_is_victory: "Output Is Victory"
MFR_output_is_victory_desc: "The eternal route declares that victory is measured by output even if politics collapses around it."
MFR_workers_own_the_arsenal: "The Workers Own the Arsenal"
MFR_workers_own_the_arsenal_desc: "Worker delegates turn the arsenal into a guarded republic rather than a military market."
MFR_every_order_a_rifle: "Every Order a Rifle"
MFR_every_order_a_rifle_desc: "The arsenal reaches its final doctrine: every command, treaty, debt, and threat must become a weapon."
MFR_japanese_purchase_mission: "Japanese Purchase Mission"
MFR_japanese_purchase_mission_desc: "Eastern buyers seek engines, rifles, and rail access while the board measures how much influence each crate carries."
MFR_british_inspection_team: "British Inspection Team"
MFR_british_inspection_team_desc: "Foreign inspectors turn safer contracts and cautious recognition into another production ledger."
MFR_arsenal_protectorate_offer: "The Arsenal Protectorate Offer"
MFR_arsenal_protectorate_offer_desc: "Small republics are offered defense, rifles, and machine tools in exchange for accepting the arsenal's weight."
MFR_gates_sirens_rifles: "Gates, Sirens, Rifles"
MFR_gates_sirens_rifles_desc: "Factory alarms become mustering calls as gate guards, depot crews, and rifle columns defend every production district."
MFR_foundry_line_holds: "The Foundry Line Holds"
MFR_foundry_line_holds_desc: "The foundries are treated as a front line, with guards and workers holding furnaces like trenches."
MFR_iron_liturgy_watches: "The Iron Liturgy Watches"
MFR_iron_liturgy_watches_desc: "Rumors of sacred iron and machine rites make the board decide how much faith can be allowed near the furnaces."
MFR_unite_russian_factories: "Unite the Russian Factories"
MFR_unite_russian_factories_desc: "The board reaches toward rival factory states, offering contracts, pressure, or domination under one industrial command."
MFR_every_border_needs_guns: "Every Border Needs Guns"
MFR_every_border_needs_guns_desc: "Borders are redrawn as firing lines and every frontier receives rifles before diplomats arrive."
MFR_war_market_never_sleeps: "The War Market Never Sleeps"
MFR_war_market_never_sleeps_desc: "Clients, enemies, and desperate neighbors keep the arsenal open through every hour of the crisis."
MFR_arm_the_new_russia: "Arm the New Russia"
MFR_arm_the_new_russia_desc: "The officer route binds army, factory, and state into a disciplined industrial war order."
MFR_no_peace_without_orders: "No Peace Without Orders"
MFR_no_peace_without_orders_desc: "The eternal route refuses any settlement that leaves machines idle and contracts unfilled."
MFR_eternal_arsenal_marches: "The Eternal Arsenal Marches"
MFR_eternal_arsenal_marches_desc: "The arsenal carries its production order beyond the gates, seeking every depot, railhead, and factory that can feed the machine."
MFR_production_war_room: "The Production War Room"
MFR_production_war_room_desc: "Production routes, quotas, guards, and clients are coordinated from one room where maps and ledgers share the same table."

soviet_collapse_arctic_naval_directorate: "Arctic Naval Directorate"
soviet_collapse_arctic_naval_directorate_desc: "The northern ports organize convoy offices, fuel ledgers, naval infantry, and neutrality statutes while the Soviet chain of command fails."
ard_consolidate_claim_tt: "Uses reserve support equipment to stabilize this authority and raise recognition."
ard_mobilize_signature_forces_tt: "Raises forces suited to this splinter and draws equipment from emergency stores."
ard_push_extreme_route_tt: "Commits this authority to its most dangerous high-chaos doctrine."
soviet_collapse_northern_lights_commune: "Northern Lights Commune"
soviet_collapse_northern_lights_commune_desc: "Polar communes, laboratories, weather stations, and Ice Watch patrols turn survival planning into northern sovereignty."
nlc_consolidate_claim_tt: "Uses reserve support equipment to stabilize this authority and raise recognition."
nlc_mobilize_signature_forces_tt: "Raises forces suited to this splinter and draws equipment from emergency stores."
nlc_push_extreme_route_tt: "Commits this authority to its most dangerous high-chaos doctrine."
