bsc_push_extreme_route_desc: "Commit the authority to its hardline route, drawing strength from high-chaos pressure and forcing its claim into the wider collapse."
BSC_birth: "Secure the Claim"
BSC_birth_desc: "Basmachi Confederation turns oasis congresses, caravan roads, and mountain fighters into a functioning emergency authority. The first choice is whether the claim remains local self-defense or becomes a government others must answer."
BSC_first_guard: "Raise the First Guard"
BSC_first_guard_desc: "The first guard draws from cavalry screens, pass guards, and raiding columns. It gives the confederation enough field power to survive the first Soviet counter-order instead of dying as a rumor."
BSC_stores: "Take the Stores"
BSC_stores_desc: "Depots, food stores, radio rooms, and transport yards are seized before rivals can inventory them. This shifts the playstyle toward prepared defense and opportunistic expansion."
BSC_legitimacy: "Define Legitimacy"
BSC_legitimacy_desc: "The regime defines who may speak in its name and which law survived the Union. Stability rises, but the answer narrows later political routes."
BSC_rival: "Name the Rival"
BSC_rival_desc: "The enemy is named as Moscow requisitions, hostile republic ministries, and border garrisons. The focus clarifies war priorities and decides whether nearby breakaways are partners, obstacles, or future fronts."
BSC_doctrine: "Write the Doctrine"
BSC_doctrine_desc: "Commanders turn the founding claim into battlefield doctrine. The army becomes better organized around the confederation's signature way of war."
BSC_economy: "Make the Economy Obey"
BSC_economy_desc: "Workshops, farms, offices, and requisition boards are forced into one crisis economy. Industry improves at the cost of making the regime harder to unwind."
BSC_league: "Bargain with the League"
BSC_league_desc: "Envoys test whether the Free Republics' League is shield, rival, or marketplace. The bargain can build defensive coordination without surrendering caravan autonomy."
BSC_foreign: "Screen Foreign Envoys"
BSC_foreign_desc: "Foreign missions are screened for weapons, recognition, spies, and traps. The route rewards outside access while increasing the risk of dependency."
BSC_diplomatic_plan: "Recognition by Road"
BSC_diplomatic_plan_desc: "League envoys, neutral observers, and caravan notables are forced to treat the confederation as an authority with borders, not only a revolt with rifles."
BSC_inner_faction: "Settle the Inner Faction"
BSC_inner_faction_desc: "The internal balance among tribal elders, clergy, smugglers, and desert commanders is settled for now. One faction gains the right to define the next stage of the state."
BSC_special_arm: "Arm the Special Branch"
BSC_special_arm_desc: "Cavalry screens, pass guards, and raiding columns give the confederation a mobile defense suited to deserts, mountain roads, and sudden strikes against isolated depots."
BSC_caravan_officer_schools: "Caravan Officer Schools"
BSC_caravan_officer_schools_desc: "Pass guards and raiding captains are drilled into a command school that can teach movement, signals, and discipline without becoming a Soviet staff college."
BSC_supply: "Control the Routes"
BSC_supply_desc: "Routes, bridges, rails, rivers, and passes become political territory. The confederation can hold out longer and project power through logistics rather than raw manpower."
BSC_enemy_front: "Prepare the Enemy Front"
BSC_enemy_front_desc: "Plans are drawn for the most likely enemy front. The focus links the internal crisis to concrete offensive or defensive preparation."
BSC_war_plan: "Caravan War Plan"
BSC_war_plan_desc: "Campaign plans treat wells, passes, caravan roads, airstrips, and hidden stores as the true front line of the revolt."
BSC_civil_rule: "Rule the Civilians"
BSC_civil_rule_desc: "Civilian administration is formalized under emergency conditions. The state becomes more stable, but its committees and offices gain interests of their own."
BSC_oasis_mediation: "Oasis Mediation"
BSC_oasis_mediation_desc: "Local elders, clergy, caravan brokers, and fighters settle water, grazing, and tax claims before every private grievance becomes a new front."
BSC_caravan_water_guarantees: "Caravan and Water Guarantees"
BSC_caravan_water_guarantees_desc: "Guarantees for towns, wells, caravan routes, and minority communities make the confederation harder to dismiss as a passing band."
BSC_propaganda: "Speak to the Former Union"
BSC_propaganda_desc: "Broadcasts and manifestos speak to the former Union. This helps spread sympathizers, volunteers, and fear beyond the starting states."
BSC_settlement: "Choose a Settlement"
BSC_settlement_desc: "A moderate settlement route defines what victory looks like short of total transformation. It is the path for survival, recognition, and durable borders."
BSC_radical_turn: "The Radical Turn"
BSC_radical_turn_desc: "The radical wing argues that survival proves the old rules are dead. Its victory opens the route toward the confederation's most dangerous politics."
BSC_industry_plan: "Permanent Arsenal"
BSC_industry_plan_desc: "A permanent arsenal is built around the road and oasis economy. Production becomes a long-term identity rather than a temporary emergency."
BSC_hidden_doctrine: "The Sealed Doctrine"
BSC_hidden_doctrine_desc: "The sealed doctrine admits what the public program cannot. The state prepares a hardline route that only survives under collapse conditions."
BSC_extreme_gate: "Survive into the Endgame"
BSC_extreme_gate_desc: "The regime survives long enough to attempt a maximal program. High chaos turns the founding claim into a program for the whole former Union."
BSC_extreme_path: "The Road Beyond the Steppe"
BSC_extreme_path_desc: "The extreme path tries to carry the revolt beyond the steppe and redraw Central Asia by oath and road. It is powerful, destabilizing, and meant for campaigns where normal settlement has already failed."
BSC_endgame: "Confederation of Roads and Wells"
BSC_endgame_desc: "The confederation binds oasis councils, pass guards, caravan routes, and recognition channels into a state that can survive beyond the first revolt."
UDC: "Union Defense Committee"
UDC_DEF: "the Union Defense Committee"
