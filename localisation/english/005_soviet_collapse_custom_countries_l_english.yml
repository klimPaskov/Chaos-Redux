GAC: "Green Army Congress"
GAC_DEF: "the Green Army Congress"
GAC_ADJ: "Green Army"
GAC_leader_desc: "Peasant Congress Council governs through village delegates, forest guards, harvest ledgers, and emergency rural assemblies that refuse to feed another capital's war."
chaosx.nr5_custom.13.t: "Green Army Congress Declares Authority"
chaosx.nr5_custom.13.d: "Reports from the former union now identify the Green Army Congress as more than scattered peasant guards. Its public claim centers on hidden grain stores, village self-defense, anti-conscription patrols, and harvest truces forced on every army that wants food. Moscow, breakaway republics, and foreign observers disagree over whether it is a government, a rural strike, or a war against requisition itself."
chaosx.nr5_custom.13.a: "The villages answer in arms."
GAC_soviet_collapse_focus_tree: "Green Army Congress Focus Tree"
GAC_soviet_collapse_focus_tree_desc: "The Green Army Congress tree follows rural survival, requisition trauma, anti-conscription anger, local food politics, forest warfare, and a late peasant-war route against every state that treats villages as stores."
gac_village_congress: "Village Congress Authority"
gac_village_congress_desc: "Village delegates, forest guards, elders, and storehouse committees claim that no capital may requisition food or sons without local consent."
gac_internal_factions: "Peasant and SR Blocs"
gac_internal_factions_desc: "Non-party village elders, Socialist Revolutionary organizers, armed guards, smugglers, and anti-conscription committees share the congress uneasily."
gac_land_and_bread_against_the_world: "Land and Bread Against the World"
gac_land_and_bread_against_the_world_desc: "The congress turns harvest defense into a war against urban requisition states, spreading peasant revolt wherever armies demand food first and law afterward."
gac_consolidate_claim: "Consolidate the Congress"
gac_consolidate_claim_desc: "Bind village delegates, guard captains, and harvest offices into a firmer rural authority shaped by stability, recognition, and crisis pressure."
gac_mobilize_signature_forces: "Mobilize Forest Columns"
gac_mobilize_signature_forces_desc: "Raise irregular forest columns from village guards, hidden stores, depot access, and wartime pressure."
gac_push_extreme_route: "Declare Land and Bread"
gac_push_extreme_route_desc: "Commit the congress to its hardline route, turning local harvest defense into a peasant war against every requisition state."
gac_hide_grain_stores: "Hide Grain Stores"
gac_hide_grain_stores_desc: "Move grain away from state ledgers, feed village guards first, and make every outside requisition order chase false inventories."
gac_cut_requisition_routes: "Cut Requisition Routes"
gac_cut_requisition_routes_desc: "Break roads, rail sidings, and collection routes used by Moscow or rival republics to move food out of the countryside."
gac_ambush_conscription_parties: "Ambush Conscription Parties"
gac_ambush_conscription_parties_desc: "Strike recruiting parties before they can remove sons from the villages and turn rural anger into organized field strength."
gac_bargain_harvest_for_autonomy: "Bargain Harvest for Autonomy"
gac_bargain_harvest_for_autonomy_desc: "Trade food passage and local calm for written recognition, autonomy promises, and League protection."
gac_protect_village_elders: "Protect Village Elders"
gac_protect_village_elders_desc: "Guard the people who can still make rural law legible: elders, storekeepers, local teachers, and congress delegates."
gac_disperse_before_major_offensive: "Disperse Before a Major Offensive"
gac_disperse_before_major_offensive_desc: "Scatter columns before stronger armies arrive, preserve stores, and force the next enemy to fight roads, forests, and empty barns."
GAC_birth: "Village Congresses Meet"
GAC_birth_desc: "The Green Army Congress forms from rural districts that refuse to feed another capital's war. Its first task is to become more than scattered self-defense committees."
GAC_first_guard: "Raise the Village Guards"
GAC_first_guard_desc: "Village guards organize patrols, hunting rifles, and road watches into a force that can stop requisition teams before the regular armies arrive."
GAC_stores: "Hide the Grain Stores"
GAC_stores_desc: "Storehouse ledgers are split, grain is moved, and false inventories are left for outsiders. Food becomes the congress's first arsenal."
GAC_legitimacy: "Mandate of the Peasant Congress"
GAC_legitimacy_desc: "Delegates define who may speak for the villages, what taxes can be collected, and when a son may be called away from home."
GAC_rival: "Name Every Requisition State"
GAC_rival_desc: "The congress names its enemy as every government that treats rural districts as a warehouse. Moscow is first, but not necessarily last."
GAC_doctrine: "Forest War Doctrine"
GAC_doctrine_desc: "The guards codify ambushes, dispersal, hidden routes, and supply disruption into doctrine suited for fields and forests instead of capitals."
GAC_economy: "Village Tax Limits"
GAC_economy_desc: "Local tax limits protect harvests from army finance offices and make the congress answerable to villages rather than ministries."
GAC_league: "Bargain with Free Republics"
GAC_league_desc: "The congress tests whether the League can protect rural autonomy or whether republics merely want a cleaner way to buy food."
GAC_foreign: "Sell Passage Carefully"
GAC_foreign_desc: "Foreign missions and neighboring governments may buy passage or supplies, but every bargain is screened for dependency and spies."
GAC_inner_faction: "Settle Village and SR Blocs"
GAC_inner_faction_desc: "Village elders, Socialist Revolutionary organizers, smugglers, and guard captains settle who directs the next phase of the congress."
GAC_special_arm: "Arm the Forest Columns"
GAC_special_arm_desc: "Forest columns receive captured rifles, radio runners, and local guides so the congress can fight through terrain rather than hold parade lines."
GAC_supply: "Cut Requisition Routes"
GAC_supply_desc: "Roads, sidings, and collection routes are cut where they serve outsiders. Supply becomes a weapon against every army marching through the countryside."
GAC_enemy_front: "Ambush Conscription Parties"
GAC_enemy_front_desc: "Conscription parties are ambushed before they can empty villages, turning anti-draft anger into a military system."
GAC_civil_rule: "Protect the Elders"
GAC_civil_rule_desc: "Elders, storekeepers, teachers, and congress delegates receive armed protection so village law survives the war around it."
GAC_propaganda: "Land and Bread Broadcasts"
GAC_propaganda_desc: "Broadcasts tell the former union that villages will feed families and guards before capitals, ministries, and ideological armies."
GAC_settlement: "Harvest Truce Statutes"
GAC_settlement_desc: "A moderate route writes harvest truces, tax limits, and local autonomy into law, turning temporary self-defense into a durable rural settlement."
GAC_radical_turn: "No Sons for Another Capital"
GAC_radical_turn_desc: "The radical wing argues that any state demanding sons and grain is the same enemy. Taking this focus opens the road beyond local defense."
GAC_war_plan: "Campaign of Field Roads"
GAC_war_plan_desc: "The congress prepares campaigns around field roads, barns, forest tracks, and moving stores instead of conventional urban fronts."
GAC_industry_plan: "Hidden Mills and Smithies"
GAC_industry_plan_desc: "Small mills, smithies, and hidden workshops keep the guards supplied without exposing the villages to easy seizure."
GAC_diplomatic_plan: "Food for Recognition"
GAC_diplomatic_plan_desc: "The congress bargains food, passage, and calm for recognition while resisting every patron that mistakes trade for command."
GAC_hidden_doctrine: "The Sealed Harvest Ledgers"
GAC_hidden_doctrine_desc: "The sealed ledgers record which towns can be starved, which roads can be cut, and which armies can be bought off long enough to survive."
GAC_extreme_gate: "Survive the Great Requisition"
GAC_extreme_gate_desc: "When the congress survives a great requisition campaign, village self-defense becomes proof that the old order can be beaten everywhere."
GAC_extreme_path: "Land and Bread Against the World"
GAC_extreme_path_desc: "The extreme path exports peasant revolt against every capital, city, and ministry that demands grain before autonomy."
GAC_endgame: "A Federation of Villages"
GAC_endgame_desc: "The endgame direction binds protected villages into a rural federation that can settle, bargain, or keep fighting without a capital above it."
GAC_democratic: "Green Army Congress"
GAC_democratic_DEF: "the Green Army Congress"
GAC_democratic_ADJ: "Green Army"
GAC_communism: "Peasant Congress Commune"
GAC_communism_DEF: "the Peasant Congress Commune"
GAC_communism_ADJ: "Peasant Congress"
GAC_fascism: "Green Rural Command"
GAC_fascism_DEF: "the Green Rural Command"
GAC_fascism_ADJ: "Green Rural"
GAC_neutrality: "Green Army Congress"
GAC_neutrality_DEF: "the Green Army Congress"
GAC_neutrality_ADJ: "Green Army"
DHC: "Don Host Emergency Circle"
DHC_DEF: "the Don Host Emergency Circle"
DHC_ADJ: "Don Host"
DHC_leader_desc: "The Host Emergency Circle governs through stanitsa delegates, old officer networks, river guards, and emergency assemblies that claim to defend the Don from requisition, reconquest, and revolutionary chaos."
chaosx.nr5_custom.14.t: "Don Host Emergency Circle Forms"
chaosx.nr5_custom.14.d: "Reports from the southern approaches now identify the Don Host Emergency Circle as more than scattered Cossack guards. Its public claim centers on village order, stanitsa defense, protected grain convoys, old officer channels, and refusal to let Moscow or any other army treat the Don as a passageway. Moscow calls it a reactionary ghost; neighboring republics measure whether it is a shield, a rival, or a new southern problem."
chaosx.nr5_custom.14.a: "The circle answers with riders."
DHC_soviet_collapse_focus_tree: "Don Host Emergency Circle Focus Tree"
DHC_soviet_collapse_focus_tree_desc: "The Don Host Emergency Circle tree follows southern host autonomy, stanitsa guards, protected grain convoys, officer networks, reluctant diplomacy, and a late host-command route that tries to make the Don a power between Moscow and the breakaway republics."
dhc_host_circle_authority: "Host Circle Authority"
dhc_host_circle_authority_desc: "Stanitsa delegates, village guards, river watchers, and old host notables claim emergency authority over the Don while larger states fight over the roads around it."
dhc_internal_factions: "Officers, Elders, and Riders"
dhc_internal_factions_desc: "Old officers, conservative elders, mobile guard captains, anti-requisition committees, and opportunists share the circle uneasily."
dhc_southern_host_command: "Southern Host Command"
dhc_southern_host_command_desc: "The circle turns local order into a command claim over the southern approaches, treating every army that crosses the Don without consent as an occupier."
dhc_consolidate_claim: "Consolidate the Host Circle"
dhc_consolidate_claim_desc: "Bind stanitsa delegates, guard captains, and old officer networks into a firmer emergency authority shaped by stability, recognition, and crisis pressure."
dhc_mobilize_signature_forces: "Mobilize Stanitsa Guards"
dhc_mobilize_signature_forces_desc: "Raise mobile guards from local riders, village watches, depot access, and wartime pressure."
dhc_push_extreme_route: "Declare Southern Host Command"
dhc_push_extreme_route_desc: "Commit the circle to its hardline route, turning local defense into a southern command claim against every outside army."
dhc_convene_host_circle: "Convene the Host Circle"
dhc_convene_host_circle_desc: "Bring stanitsa delegates, elders, guard captains, and surviving officer networks into one emergency assembly."
dhc_raise_stanitsa_guards: "Raise Stanitsa Guards"
dhc_raise_stanitsa_guards_desc: "Muster village guards and mounted patrols to defend the roads, river crossings, and grain convoys that keep the circle alive."
dhc_reopen_old_officer_networks: "Reopen Old Officer Networks"
dhc_reopen_old_officer_networks_desc: "Restore channels among old officers and local veterans without surrendering the host to a restoration clique."
dhc_protect_grain_convoys: "Protect Grain Convoys"
dhc_protect_grain_convoys_desc: "Escort grain convoys under host guard so neither Moscow nor neighboring governments can seize the Don's stores without negotiation."
dhc_bargain_with_southern_republics: "Bargain with Southern Republics"
dhc_bargain_with_southern_republics_desc: "Trade passage, grain, and a quiet southern front for recognition and guarantees from nearby republics."
dhc_court_foreign_arms_without_surrendering_command: "Court Foreign Arms, Keep Command"
dhc_court_foreign_arms_without_surrendering_command_desc: "Screen foreign envoys and arms offers so outside patrons can supply the host without directing it."
DHC_birth: "The Host Circle Convenes"
DHC_birth_desc: "The Don Host Emergency Circle forms from stanitsa delegates, village guards, and old officer networks that refuse to let the southern approaches become another capital's road."
DHC_first_guard: "Raise the Stanitsa Guards"
DHC_first_guard_desc: "Local riders, road watches, and river guards become the first organized force that can stop requisition teams and reconquest columns."
DHC_stores: "Guard the Grain Convoys"
DHC_stores_desc: "Grain convoys move under host escort, with false schedules and guarded sidings keeping food away from whichever army arrives first."
DHC_legitimacy: "Mandate of the Circle"
DHC_legitimacy_desc: "Delegates define what authority the circle can claim, which taxes can be collected, and which officers answer to local assemblies."
DHC_rival: "Name the Outside Armies"
DHC_rival_desc: "The circle names its enemies as every force that treats the Don as a road, warehouse, or recruiting ground."
DHC_doctrine: "Mobile Host Doctrine"
DHC_doctrine_desc: "The guards codify river defense, mounted patrols, depot raids, and sudden dispersal into a doctrine suited for the southern approaches."
DHC_economy: "Stanitsa Supply Ledgers"
DHC_economy_desc: "Local supply ledgers keep grain, horses, fuel, and rifles under host control instead of handing the region to army accountants."
DHC_league: "A Southern Buffer in the League"
DHC_league_desc: "The circle tests whether the League can respect host autonomy or merely wants a southern screen against Moscow."
DHC_foreign: "Screen the Foreign Envoys"
DHC_foreign_desc: "Foreign arms and observers can be useful, but every envoy is screened before aid becomes command."
DHC_inner_faction: "Balance Elders and Officers"
DHC_inner_faction_desc: "Stanitsa elders, old officers, young riders, and anti-requisition committees settle who directs the next phase of the circle."
DHC_special_arm: "Reopen Officer Networks"
DHC_special_arm_desc: "Old officer channels and veterans' lists give the guards more discipline without restoring a state the villages no longer trust."
DHC_supply: "Secure the Southern Crossings"
DHC_supply_desc: "River bridges, rail sidings, and road crossings are guarded so outsiders cannot use the Don as a free military corridor."
DHC_enemy_front: "Hold the Lower Front"
DHC_enemy_front_desc: "The circle prepares a mobile lower front that can break columns, withdraw before heavy assaults, and return through local terrain."
DHC_civil_rule: "Protect Stanitsa Law"
DHC_civil_rule_desc: "Local courts, elders, teachers, and convoy offices receive armed protection so civil order survives the armies around it."
DHC_propaganda: "Songs of the Host"
DHC_propaganda_desc: "Broadcasts present the circle as order without Moscow, autonomy without chaos, and a southern shield against every requisition column."
DHC_settlement: "Southern Autonomy Statutes"
DHC_settlement_desc: "A moderate route writes host autonomy, convoy rules, and local command limits into law."
DHC_radical_turn: "No Road for Reconquest"
DHC_radical_turn_desc: "The radical wing argues that every outside army is the same threat if it crosses the Don without host consent."
DHC_war_plan: "Riders on the River Roads"
DHC_war_plan_desc: "Campaign planning centers on river roads, mobile guards, false retreats, depot raids, and fast concentration around threatened crossings."
DHC_industry_plan: "Repair Shops of the Don"
DHC_industry_plan_desc: "Small repair shops, mills, stables, and hidden workshops keep the guards supplied without depending on distant factories."
DHC_diplomatic_plan: "Passage for Recognition"
DHC_diplomatic_plan_desc: "The circle bargains controlled passage and grain convoys for recognition while resisting patrons that expect command."
DHC_hidden_doctrine: "The Sealed Host Rolls"
DHC_hidden_doctrine_desc: "Sealed rolls record riders, officers, stores, and safe routes that can be activated before any outside staff understands the region."
DHC_extreme_gate: "Survive the Southern Requisition"
DHC_extreme_gate_desc: "When the circle survives a major requisition or reconquest drive, emergency autonomy hardens into a broader southern claim."
DHC_extreme_path: "Southern Host Command"
DHC_extreme_path_desc: "The extreme path turns the Don from a defensive circle into a command that dictates who may move through the southern approaches."
DHC_endgame: "A Host Between Capitals"
DHC_endgame_desc: "The endgame direction binds stanitsas, convoys, and officer networks into a host order strong enough to bargain with every capital and obey none."
DHC_democratic: "Don Host Emergency Circle"
DHC_democratic_DEF: "the Don Host Emergency Circle"
DHC_democratic_ADJ: "Don Host"
