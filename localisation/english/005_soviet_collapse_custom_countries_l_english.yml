l_english:
soviet_collapse_custom_splinter_decisions: "Collapse Splinter Authority"
soviet_collapse_custom_splinter_decisions_desc: "This authority exists because Moscow, the republics, or the rail and security chains failed to keep one command structure intact."
chaosx.events_log.evolution.type.soviet_collapse_high_chaos: "Soviet Collapse: High-Chaos Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title: "High-Chaos Breakaways"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body: "The collapse stops producing only republics, committees, and old political memories. Factory boards, sailor councils, regional host circles, border authorities, security zones, and local defensive congresses begin treating the former union as territory to administer rather than a state to restore."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.black_banner_host_surges: "Black Banner Host Surges"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.kronstadt_sailors_assembly: "Kronstadt Sailors' Assembly Votes"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.black_banner_host_surges: "The Black Banner Host surges through southern depots and railway towns, declaring every ministry, protectorate, and standing army another prison to be broken."
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.kronstadt_sailors_assembly: "Sailor assemblies around Kronstadt turn fortress democracy, Baltic signals, and port councils into a Free Soviet claim that rejects both party command and ordinary breakaway ministries."
FTH: "Free Territory of Huliaipole"
FTH_DEF: "the Free Territory of Huliaipole"
FTH_ADJ: "Free Territory"
FTH_leader_desc: "Council of Free Soviets governs through a crisis body born from the Soviet Collapse, claiming emergency legitimacy while ordinary command collapses around it."
chaosx.nr5_custom.1.t: "Free Territory of Huliaipole Declares Authority"
chaosx.nr5_custom.1.d: "Reports from the former union now identify Free Territory of Huliaipole as more than a local disturbance. Its public claim centers on black flags, free soviets, village autonomy, depot raiding, no masters in Kyiv or Moscow. Moscow, breakaway republics, and foreign observers disagree over whether it is a government, a mutiny, an emergency committee, or a revived argument over who may inherit the old state."
chaosx.nr5_custom.1.a: "Another seal breaks."
FTH_soviet_collapse_focus_tree: "Free Territory Focus Tree"
FTH_soviet_collapse_focus_tree_desc: "The Free Territory tree turns local self-defense, black-flag communes, depot raids, League bargaining, and anti-capital radicalism into a playable collapse authority."
fth_free_territory_communes: "Armed Free Communes"
fth_free_territory_communes_desc: "The authority derives its first legitimacy from black flags, free soviets, village autonomy, depot raiding, no masters in Kyiv or Moscow. It is dangerous because it does not fit cleanly into republic independence or Moscow loyalty."
fth_internal_factions: "Unsettled Internal Factions"
fth_internal_factions_desc: "Officers, committees, radicals, administrators, believers, and local guards disagree over what the new authority is meant to become."
fth_world_without_capitals: "A World Without Capitals"
fth_world_without_capitals_desc: "The movement turns survival into a late political ambition that can no longer be contained as a local Soviet crisis."
fth_consolidate_claim: "Consolidate Claim"
fth_consolidate_claim_desc: "Bind local councils, guards, and foreign contacts into a firmer claim shaped by stability, recognition, and crisis pressure."
fth_mobilize_signature_forces: "Mobilize Signature Forces"
fth_mobilize_signature_forces_desc: "Raise signature forces from local control, depot access, and wartime pressure, with stronger returns while fighting Moscow."
fth_push_extreme_route: "Push Extreme Route"
fth_push_extreme_route_desc: "Commit the authority to its hardline route, drawing strength from high-chaos pressure and forcing its claim into the wider collapse."
FTH_birth: "Secure the Claim"
FTH_birth_desc: "Free Territory of Huliaipole turns black-flag communes in southern Ukraine into a functioning emergency authority. The first choice is whether the claim remains local self-defense or becomes a government others must answer."
FTH_first_guard: "Raise the First Guard"
FTH_first_guard_desc: "The first guard draws from tachanka detachments and depot-raiding columns. It gives the tag enough field power to survive the first Soviet counter-order instead of dying as a rumor."
FTH_stores: "Take the Stores"
FTH_stores_desc: "Depots, food stores, radio rooms, and transport yards are seized before rivals can inventory them. This shifts the playstyle toward prepared defense and opportunistic expansion."
FTH_legitimacy: "Define Legitimacy"
FTH_legitimacy_desc: "The regime defines who may speak in its name and which law survived the Union. Stability rises, but the answer narrows later political routes."
FTH_rival: "Name the Rival"
FTH_rival_desc: "The enemy is named as Kyiv, Moscow, and every officer who mistakes villages for supply depots. The focus clarifies war priorities and decides whether nearby breakaways are partners, obstacles, or future fronts."
FTH_doctrine: "Write the Doctrine"
FTH_doctrine_desc: "Commanders turn the founding claim into battlefield doctrine. The army becomes better organized around the tag's signature way of war."
FTH_economy: "Make the Economy Obey"
FTH_economy_desc: "Workshops, farms, offices, and requisition boards are forced into one crisis economy. Industry improves at the cost of making the regime harder to unwind."
FTH_league: "Bargain with the League"
FTH_league_desc: "Envoys test whether the Free Republics' League is shield, rival, or marketplace. The choice can build defensive coordination without surrendering the tag's identity."
FTH_foreign: "Screen Foreign Envoys"
FTH_foreign_desc: "Foreign missions are screened for weapons, recognition, spies, and traps. The route rewards outside access while increasing the risk of dependency."
FTH_inner_faction: "Settle the Inner Faction"
FTH_inner_faction_desc: "The internal balance among village assemblies, railway raiders, and old anarchist cells is settled for now. One faction gains the right to define the next stage of the state."
FTH_special_arm: "Arm the Special Branch"
FTH_special_arm_desc: "The regime arms tachanka detachments and depot-raiding columns as its signature branch. This is the military route for players who want the tag to fight like itself, not like a generic republic."
FTH_supply: "Control the Routes"
FTH_supply_desc: "Routes, bridges, rails, rivers, and passes become political territory. The tag can hold out longer and project power through logistics rather than raw manpower."
FTH_enemy_front: "Prepare the Enemy Front"
FTH_enemy_front_desc: "Plans are drawn for the most likely enemy front. The focus links the internal crisis to concrete offensive or defensive preparation."
FTH_civil_rule: "Rule the Civilians"
FTH_civil_rule_desc: "Civilian administration is formalized under emergency conditions. The state becomes more stable, but its committees and offices gain interests of their own."
FTH_propaganda: "Speak to the Former Union"
FTH_propaganda_desc: "Broadcasts and manifestos speak to the former Union. This helps spread sympathizers, volunteers, and fear beyond the starting states."
FTH_settlement: "Choose a Settlement"
FTH_settlement_desc: "A moderate settlement route defines what victory looks like short of total transformation. It is the path for survival, recognition, and durable borders."
FTH_radical_turn: "The Radical Turn"
FTH_radical_turn_desc: "The radical wing argues that survival proves the old rules are dead. Taking this focus opens the route toward the tag's most dangerous politics."
FTH_war_plan: "Campaign Beyond the Birthplace"
FTH_war_plan_desc: "War plans move beyond the birthplace. Claims, volunteers, and command structures prepare the country for a wider campaign."
FTH_industry_plan: "Permanent Arsenal"
FTH_industry_plan_desc: "A permanent arsenal is built around the tag's political economy. Production becomes a long-term identity rather than a temporary emergency."
FTH_diplomatic_plan: "A Seat or a Threat"
FTH_diplomatic_plan_desc: "Diplomacy decides whether the tag seeks a seat, a protector, a league, or a threat posture. The answer shapes late-game friends and enemies."
FTH_free_rail_communes: "Free Rail Communes"
FTH_free_rail_communes_desc: "Railway crews, village stores, and workshop delegates are tied into free communes that can move rifles, food, and repairs without a ministry timetable."
FTH_tachanka_front: "Tachanka Front"
FTH_tachanka_front_desc: "Mobile columns, horse teams, and armed workshops prepare a loose front that can strike before regular armies pin the free territory in place."
FTH_roaming_embassies: "Roaming Embassies"
FTH_roaming_embassies_desc: "Envoys travel with guards, translators, and black-banner guarantees, seeking recognition without allowing foreign missions to build a new capital over the communes."
FTH_hidden_doctrine: "The Sealed Doctrine"
FTH_hidden_doctrine_desc: "The sealed doctrine admits what the public program cannot. The state prepares a hardline route that only survives under collapse conditions."
FTH_extreme_gate: "Survive into the Endgame"
FTH_extreme_gate_desc: "The regime survives long enough to attempt a maximal program. High chaos turns the founding claim into a program for the whole former Union."
FTH_extreme_path: "A World Without Capitals"
FTH_extreme_path_desc: "The extreme path tries to export anti-state revolution until every capital becomes a negotiating camp. It is powerful, destabilizing, and meant for campaigns where normal settlement has already failed."
FTH_endgame: "Endgame Direction"
FTH_endgame_desc: "The endgame direction commits the state to survival, expansion, or transformation. This locks the late-game identity of Free Territory of Huliaipole."
BBH: "Black Banner Host"
BBH_DEF: "the Black Banner Host"
BBH_ADJ: "Black Banner"
BBH_democratic: "Free Commune Host"
BBH_democratic_DEF: "the Free Commune Host"
BBH_democratic_ADJ: "Free Commune"
BBH_communism: "Black Free Soviets"
BBH_communism_DEF: "the Black Free Soviets"
BBH_communism_ADJ: "Black Free Soviet"
BBH_fascism: "Black Banner War Host"
BBH_fascism_DEF: "the Black Banner War Host"
BBH_fascism_ADJ: "Black Banner"
BBH_neutrality: "Black Banner Host"
BBH_neutrality_DEF: "the Black Banner Host"
BBH_neutrality_ADJ: "Black Banner"
BBH_leader_desc: "The Black Banner War Council speaks for mobile columns, commune assemblies, depot raiders, and militants who treat every new state as another prison built from the collapse."
chaosx.nr5_custom.24.t: "The Black Banner Host Rises"
chaosx.nr5_custom.24.d: "Black-flag columns in southern Ukraine have broken from ordinary Free Territory politics and declared the Black Banner Host. Their war councils reject Moscow, Kyiv, republican ministries, foreign protectorates, and standing armies alike, promising to turn the collapse into a prison break for every commune willing to take up arms."
chaosx.nr5_custom.24.a: "No capital is safe from the black flag."
BBH_soviet_collapse_focus_tree: "Black Banner Host Focus Tree"
BBH_soviet_collapse_focus_tree_desc: "The Black Banner Host tree turns raiding columns, commune war councils, depot seizure, temporary alliances, and permanent black war into a playable high-chaos authority."
bbh_black_column_militias: "Black Column Militias"
bbh_black_column_militias_desc: "Fast raiding columns, motor detachments, and armed commune guards survive by taking state depots before ministries can count them."
bbh_commune_war_councils: "Commune War Councils"
bbh_commune_war_councils_desc: "Village assemblies, black-banner militants, railway raiders, and depot delegates govern through armed councils that keep the host moving."
bbh_world_without_prisons: "A World Without Prisons"
bbh_world_without_prisons_desc: "The Host treats every capital, ministry, protectorate, and standing army as a prison wall to be broken by commune war."
bbh_consolidate_claim: "Consolidate the War Councils"
bbh_consolidate_claim_desc: "Spend political and command authority to bind the mobile columns and commune assemblies into a Black Banner Host."
bbh_mobilize_signature_forces: "Mobilize Black Columns"
bbh_mobilize_signature_forces_desc: "Spend political and command authority to arm the tachanka columns, depot raiders, and commune guards."
bbh_push_extreme_route: "Declare Permanent Black War"
bbh_push_extreme_route_desc: "Spend political and command authority to commit the Host to a world without capitals, ministries, or protectorates."
bbh_raid_state_depots: "Raid State Depots"
bbh_raid_state_depots_desc: "Strike the state depots before Moscow, Kyiv, or any new ministry can turn them into a chain of command."
bbh_cut_republic_railways: "Cut Republican Railways"
bbh_cut_republic_railways_desc: "Break the railway timetables that let republics, directorates, and armies impose order across the steppe."
bbh_arm_tachanka_columns: "Arm Tachanka Columns"
bbh_arm_tachanka_columns_desc: "Give the Host's mobile columns enough rifles, machine guns, and captured trucks to outrun regular command."
bbh_break_ministry_registries: "Break Ministry Registries"
bbh_break_ministry_registries_desc: "Burn registry rooms, draft files, tax ledgers, and emergency decrees before another state can use them."
bbh_force_commune_levies: "Force Commune Levies"
bbh_force_commune_levies_desc: "Compel the communes to send fighters, carts, food, and guides for the next campaign against the state."
bbh_denounce_all_protectorates: "Denounce All Protectorates"
bbh_denounce_all_protectorates_desc: "Reject every foreign guarantee, League compromise, and ministry bargain as another prison wearing a different flag."
BBH_birth: "Raise the Black Banner Host"
BBH_birth_desc: "Black-flag columns and commune war councils turn southern Ukraine into a high-chaos authority that rejects every new state built from the collapse."
BBH_first_guard: "Muster the Black Columns"
BBH_first_guard_desc: "Tachanka detachments, depot raiders, and motorized columns give the Host enough field power to survive the first counter-order."
BBH_stores: "Raid the State Depots"
BBH_stores_desc: "Depots, food stores, radio rooms, and transport yards are taken before any ministry can inventory them."
BBH_legitimacy: "Declare Every Ministry a Prison"
BBH_legitimacy_desc: "The Host defines legitimacy by rejecting capital law, republican files, and foreign guarantees as chains on the communes."
BBH_rival: "Name the New Jailers"
BBH_rival_desc: "Moscow, Kyiv, protectorates, staff officers, and emergency committees are named as jailers before they can pretend to be liberators."
BBH_doctrine: "Tachanka War Without Fronts"
BBH_doctrine_desc: "War councils turn raiding, sabotage, and mobile columns into a doctrine that avoids fighting like a regular state."
BBH_economy: "Commune Workshops Under Arms"
BBH_economy_desc: "Workshops, farms, and captured depots are forced into a war economy that can move faster than ministries."
BBH_league: "Temporary League Bargains"
BBH_league_desc: "The Host treats every League contact as a temporary bargain, useful only while it keeps the communes alive."
BBH_foreign: "Refuse Foreign Protectors"
BBH_foreign_desc: "Foreign missions are screened as potential arms channels and rejected as future protectorates."
BBH_inner_faction: "Settle the War Councils"
BBH_inner_faction_desc: "Militants, railway raiders, village assemblies, and old anarchist cells settle who can order the next campaign."
BBH_special_arm: "Arm the Mobile Columns"
BBH_special_arm_desc: "Captured rifles, trucks, horses, and machine guns go to the columns that keep the Host from becoming a fixed target."
BBH_supply: "Live from Captured Stores"
BBH_supply_desc: "The Host survives through depots seized from states, armies, and ministries that thought supplies meant command."
BBH_enemy_front: "War on Moscow and Kyiv"
BBH_enemy_front_desc: "Plans are drawn for campaigns against both the old center and the new republican offices trying to replace it."
BBH_civil_rule: "Commune Law by Assembly"
BBH_civil_rule_desc: "Civil authority is handed to armed assemblies that recognize no capital above the commune."
BBH_propaganda: "No Masters in Any Capital"
BBH_propaganda_desc: "Broadcasts and manifestos call on deserters, villages, and railway crews to break every capital's claim."
BBH_settlement: "Free Territory or Wider War"
BBH_settlement_desc: "A settlement route asks whether the Host can preserve the free territory without turning every neighbor into a front."
BBH_radical_turn: "Permanent Black War"
BBH_radical_turn_desc: "The radical wing argues that survival means exporting the prison break until no state can reform."
BBH_war_plan: "Break the Railway States"
BBH_war_plan_desc: "The Host targets railway authorities, border commands, and depot governments that can rebuild state power."
BBH_industry_plan: "Portable Arsenals"
BBH_industry_plan_desc: "Workshops, field repairs, and captured stores become arsenals that can move with the columns."
BBH_diplomatic_plan: "All Alliances Are Temporary"
BBH_diplomatic_plan_desc: "Diplomacy becomes a chain of temporary bargains that end before they become protectorates."
BBH_hidden_doctrine: "Burn the State Registers"
BBH_hidden_doctrine_desc: "Secret orders prepare registry destruction, depot seizure, and administrative sabotage as the Host's final language."
BBH_extreme_gate: "When the Map Becomes the Prison"
BBH_extreme_gate_desc: "The Host prepares for a collapse so deep that every surviving border looks like another cell wall."
BBH_extreme_path: "A World Without Prisons"
BBH_extreme_path_desc: "The extreme path tries to dissolve every state into armed communes, temporary bargains, and permanent war against capitals."
BBH_endgame: "Endgame Direction"
BBH_endgame_desc: "The Host chooses whether the black banner marks a territory, a front, or a war against the idea of states."

