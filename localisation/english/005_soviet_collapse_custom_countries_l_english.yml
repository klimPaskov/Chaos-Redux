GAC_DEF: "the Green Army Congress"
GAC_ADJ: "Green Army"
GAC_leader_desc: "Peasant Congress Council governs through village delegates, forest guards, harvest ledgers, and emergency rural assemblies that refuse to feed another capital's war."
chaosx.nr5_custom.13.t: "Green Army Congress Declares Authority"
chaosx.nr5_custom.13.d: "Reports from the former union now identify the Green Army Congress as more than scattered peasant guards. Its public claim centers on hidden grain stores, village self-defense, anti-conscription patrols, and harvest truces forced on every army that wants food. Moscow, breakaway republics, and foreign observers disagree over whether it is a government, a rural strike, or a war against requisition itself."
chaosx.nr5_custom.13.a: "The villages answer in arms."
GAC_soviet_collapse_focus_tree: "Green Army Congress Focus Tree"
GAC_soviet_collapse_focus_tree_desc: "The Green Army Congress tree follows rural survival, requisition trauma, anti-conscription anger, local food politics, forest warfare, and a late peasant-war route against every state that treats villages as stores."
gac_village_congress: "Village Congress Authority"
gac_village_congress_desc: "Village delegates, forest guards, elders, and storehouse committees claim that no capital may requisition food or sons without local consent."
gac_internal_factions: "Peasant and SR Blocs"
gac_internal_factions_desc: "Non-party village elders, Socialist Revolutionary organizers, armed guards, smugglers, and anti-conscription committees share the congress uneasily."
gac_land_and_bread_against_the_world: "Land and Bread Against the World"
gac_land_and_bread_against_the_world_desc: "The congress turns harvest defense into a war against urban requisition states, spreading peasant revolt wherever armies demand food first and law afterward."
gac_consolidate_claim: "Consolidate the Congress"
gac_consolidate_claim_desc: "Bind village delegates, guard captains, and harvest offices into a firmer rural authority shaped by stability, recognition, and crisis pressure."
gac_mobilize_signature_forces: "Mobilize Forest Columns"
gac_mobilize_signature_forces_desc: "Raise irregular forest columns from village guards, hidden stores, depot access, and wartime pressure."
gac_push_extreme_route: "Declare Land and Bread"
gac_push_extreme_route_desc: "Commit the congress to its hardline route, turning local harvest defense into a peasant war against every requisition state."
gac_hide_grain_stores: "Hide Grain Stores"
gac_hide_grain_stores_desc: "Move grain away from state ledgers, feed village guards first, and make every outside requisition order chase false inventories."
gac_cut_requisition_routes: "Cut Requisition Routes"
gac_cut_requisition_routes_desc: "Break roads, rail sidings, and collection routes used by Moscow or rival republics to move food out of the countryside."
gac_ambush_conscription_parties: "Ambush Conscription Parties"
gac_ambush_conscription_parties_desc: "Strike recruiting parties before they can remove sons from the villages and turn rural anger into organized field strength."
gac_bargain_harvest_for_autonomy: "Bargain Harvest for Autonomy"
gac_bargain_harvest_for_autonomy_desc: "Trade food passage and local calm for written recognition, autonomy promises, and League protection."
gac_protect_village_elders: "Protect Village Elders"
gac_protect_village_elders_desc: "Guard the people who can still make rural law legible: elders, storekeepers, local teachers, and congress delegates."
gac_disperse_before_major_offensive: "Disperse Before a Major Offensive"
gac_disperse_before_major_offensive_desc: "Scatter columns before stronger armies arrive, preserve stores, and force the next enemy to fight roads, forests, and empty barns."
GAC_birth: "Village Congresses Meet"
GAC_birth_desc: "The Green Army Congress forms from rural districts that refuse to feed another capital's war. Its first task is to become more than scattered self-defense committees."
GAC_first_guard: "Raise the Village Guards"
GAC_first_guard_desc: "Village guards organize patrols, hunting rifles, and road watches into a force that can stop requisition teams before the regular armies arrive."
GAC_stores: "Hide the Grain Stores"
GAC_stores_desc: "Storehouse ledgers are split, grain is moved, and false inventories are left for outsiders. Food becomes the congress's first arsenal."
GAC_legitimacy: "Mandate of the Peasant Congress"
GAC_legitimacy_desc: "Delegates define who may speak for the villages, what taxes can be collected, and when a son may be called away from home."
GAC_rival: "Name Every Requisition State"
GAC_rival_desc: "The congress names its enemy as every government that treats rural districts as a warehouse. Moscow is first, but not necessarily last."
GAC_doctrine: "Forest War Doctrine"
GAC_doctrine_desc: "The guards codify ambushes, dispersal, hidden routes, and supply disruption into doctrine suited for fields and forests instead of capitals."
GAC_economy: "Village Tax Limits"
GAC_economy_desc: "Local tax limits protect harvests from army finance offices and make the congress answerable to villages rather than ministries."
GAC_league: "Bargain with Free Republics"
GAC_league_desc: "The congress tests whether the League can protect rural autonomy or whether republics merely want a cleaner way to buy food."
GAC_foreign: "Sell Passage Carefully"
GAC_foreign_desc: "Foreign missions and neighboring governments may buy passage or supplies, but every bargain is screened for dependency and spies."
GAC_inner_faction: "Settle Village and SR Blocs"
GAC_inner_faction_desc: "Village elders, Socialist Revolutionary organizers, smugglers, and guard captains settle who directs the next phase of the congress."
GAC_special_arm: "Arm the Forest Columns"
GAC_special_arm_desc: "Forest columns receive captured rifles, radio runners, and local guides so the congress can fight through terrain rather than hold parade lines."
GAC_forest_column_school: "Forest Column School"
GAC_forest_column_school_desc: "Guides, hunters, deserters, and village guards teach the congress how to move through woods, fields, sidings, and barns without becoming a regular army."
GAC_supply: "Cut Requisition Routes"
GAC_supply_desc: "Roads, sidings, and collection routes are cut where they serve outsiders. Supply becomes a weapon against every army marching through the countryside."
GAC_enemy_front: "Ambush Conscription Parties"
GAC_enemy_front_desc: "Conscription parties are ambushed before they can empty villages, turning anti-draft anger into a military system."
GAC_war_plan: "Campaign of Field Roads"
GAC_war_plan_desc: "The congress prepares campaigns around field roads, barns, forest tracks, moving stores, hidden airstrips, and anti-air posts instead of conventional urban fronts."
GAC_civil_rule: "Protect the Elders"
GAC_civil_rule_desc: "Elders, storekeepers, teachers, and congress delegates receive armed protection so village law survives the war around it."
GAC_village_mediation: "Village Mediation Tables"
GAC_village_mediation_desc: "Elders, guard captains, storekeepers, and SR organizers settle village disputes before harvest defense turns into private bandit rule."
GAC_harvest_truce_guarantees: "Harvest Truce Guarantees"
GAC_harvest_truce_guarantees_desc: "Written guarantees turn food passage, anti-requisition limits, local guard rights, and League promises into a truce that outside armies can recognize."
GAC_propaganda: "Land and Bread Broadcasts"
GAC_propaganda_desc: "Broadcasts tell the former union that villages will feed families and guards before capitals, ministries, and ideological armies."
GAC_settlement: "Harvest Truce Statutes"
GAC_settlement_desc: "A moderate route writes harvest truces, tax limits, and local autonomy into law, turning temporary self-defense into a durable rural settlement."
GAC_radical_turn: "No Sons for Another Capital"
GAC_radical_turn_desc: "The radical wing argues that any state demanding sons and grain is the same enemy. Its victory opens the road beyond local defense."
GAC_industry_plan: "Hidden Mills and Smithies"
GAC_industry_plan_desc: "Small mills, smithies, and hidden workshops keep the guards supplied without exposing the villages to easy seizure."
GAC_diplomatic_plan: "Food for Recognition"
GAC_diplomatic_plan_desc: "The congress bargains food, passage, and calm for recognition while resisting every patron, republic, or League delegate that mistakes trade for command."
GAC_hidden_doctrine: "The Sealed Harvest Ledgers"
GAC_hidden_doctrine_desc: "The sealed ledgers record which towns can be starved, which roads can be cut, and which armies can be bought off long enough to survive."
GAC_extreme_gate: "Survive the Great Requisition"
GAC_extreme_gate_desc: "When the congress survives a great requisition campaign, village self-defense becomes proof that the old order can be beaten everywhere."
GAC_extreme_path: "Land and Bread Against the World"
GAC_extreme_path_desc: "The extreme path exports peasant revolt against every capital, city, and ministry that demands grain before autonomy."
GAC_endgame: "A Federation of Villages"
GAC_endgame_desc: "Protected elders, forest columns, hidden stores, harvest truces, and food-recognition channels bind the villages into a rural federation that can outlast capitals."
GAC_democratic: "Green Army Congress"
GAC_democratic_DEF: "the Green Army Congress"
GAC_democratic_ADJ: "Green Army"
GAC_communism: "Peasant Congress Commune"
GAC_communism_DEF: "the Peasant Congress Commune"
GAC_communism_ADJ: "Peasant Congress"
GAC_fascism: "Green Rural Command"
GAC_fascism_DEF: "the Green Rural Command"
GAC_fascism_ADJ: "Green Rural"
GAC_neutrality: "Green Army Congress"
GAC_neutrality_DEF: "the Green Army Congress"
GAC_neutrality_ADJ: "Green Army"
DHC: "Don Host Emergency Circle"
DHC_DEF: "the Don Host Emergency Circle"
DHC_ADJ: "Don Host"
DHC_leader_desc: "The Host Emergency Circle governs through stanitsa delegates, old officer networks, river guards, and emergency assemblies that claim to defend the Don from requisition, reconquest, and revolutionary chaos."
chaosx.nr5_custom.14.t: "Don Host Emergency Circle Forms"
chaosx.nr5_custom.14.d: "Reports from the southern approaches now identify the Don Host Emergency Circle as more than scattered Cossack guards. Its public claim centers on village order, stanitsa defense, protected grain convoys, old officer channels, and refusal to let Moscow or any other army treat the Don as a passageway. Moscow calls it a reactionary ghost; neighboring republics measure whether it is a shield, a rival, or a new southern problem."
chaosx.nr5_custom.14.a: "The circle answers with riders."
DHC_soviet_collapse_focus_tree: "Don Host Emergency Circle Focus Tree"
DHC_soviet_collapse_focus_tree_desc: "The Don Host Emergency Circle tree follows southern host autonomy, stanitsa guards, protected grain convoys, officer networks, reluctant diplomacy, and a late host-command route that tries to make the Don a power between Moscow and the breakaway republics."
dhc_host_circle_authority: "Host Circle Authority"
dhc_host_circle_authority_desc: "Stanitsa delegates, village guards, river watchers, and old host notables claim emergency authority over the Don while larger states fight over the roads around it."
dhc_internal_factions: "Officers, Elders, and Riders"
dhc_internal_factions_desc: "Old officers, conservative elders, mobile guard captains, anti-requisition committees, and opportunists share the circle uneasily."
dhc_southern_host_command: "Southern Host Command"
dhc_southern_host_command_desc: "The circle turns local order into a command claim over the southern approaches, treating every army that crosses the Don without consent as an occupier."
dhc_consolidate_claim: "Consolidate the Host Circle"
dhc_consolidate_claim_desc: "Bind stanitsa delegates, guard captains, and old officer networks into a firmer emergency authority shaped by stability, recognition, and crisis pressure."
dhc_mobilize_signature_forces: "Mobilize Stanitsa Guards"
dhc_mobilize_signature_forces_desc: "Raise mobile guards from local riders, village watches, depot access, and wartime pressure."
dhc_push_extreme_route: "Declare Southern Host Command"
dhc_push_extreme_route_desc: "Commit the circle to its hardline route, turning local defense into a southern command claim against every outside army."
dhc_convene_host_circle: "Convene the Host Circle"
dhc_convene_host_circle_desc: "Bring stanitsa delegates, elders, guard captains, and surviving officer networks into one emergency assembly."
dhc_raise_stanitsa_guards: "Raise Stanitsa Guards"
dhc_raise_stanitsa_guards_desc: "Muster village guards and mounted patrols to defend the roads, river crossings, and grain convoys that keep the circle alive."
dhc_reopen_old_officer_networks: "Reopen Old Officer Networks"
dhc_reopen_old_officer_networks_desc: "Restore channels among old officers and local veterans without surrendering the host to a restoration clique."
dhc_protect_grain_convoys: "Protect Grain Convoys"
dhc_protect_grain_convoys_desc: "Escort grain convoys under host guard so neither Moscow nor neighboring governments can seize the Don's stores without negotiation."
dhc_bargain_with_southern_republics: "Bargain with Southern Republics"
dhc_bargain_with_southern_republics_desc: "Trade passage, grain, and a quiet southern front for recognition and guarantees from nearby republics."
dhc_court_foreign_arms_without_surrendering_command: "Court Foreign Arms, Keep Command"
dhc_court_foreign_arms_without_surrendering_command_desc: "Screen foreign envoys and arms offers so outside patrons can supply the host without directing it."
DHC_birth: "The Host Circle Convenes"
DHC_birth_desc: "The Don Host Emergency Circle forms from stanitsa delegates, village guards, and old officer networks that refuse to let the southern approaches become another capital's road."
DHC_first_guard: "Raise the Stanitsa Guards"
DHC_first_guard_desc: "Local riders, road watches, and river guards become the first organized force that can stop requisition teams and reconquest columns."
DHC_stores: "Guard the Grain Convoys"
DHC_stores_desc: "Grain convoys move under host escort, with false schedules and guarded sidings keeping food away from whichever army arrives first."
DHC_legitimacy: "Mandate of the Circle"
DHC_legitimacy_desc: "Delegates define what authority the circle can claim, which taxes can be collected, and which officers answer to local assemblies."
DHC_rival: "Name the Outside Armies"
DHC_rival_desc: "The circle names its enemies as every force that treats the Don as a road, warehouse, or recruiting ground."
DHC_doctrine: "Mobile Host Doctrine"
DHC_doctrine_desc: "The guards codify river defense, mounted patrols, depot raids, and sudden dispersal into a doctrine suited for the southern approaches."
DHC_economy: "Stanitsa Supply Ledgers"
DHC_economy_desc: "Local supply ledgers keep grain, horses, fuel, and rifles under host control instead of handing the region to army accountants."
DHC_league: "A Southern Buffer in the League"
DHC_league_desc: "The circle tests whether the League can respect host autonomy or merely wants a southern screen against Moscow."
DHC_foreign: "Screen the Foreign Envoys"
DHC_foreign_desc: "Foreign arms and observers can be useful, but every envoy is screened before aid becomes command."
DHC_inner_faction: "Balance Elders and Officers"
DHC_inner_faction_desc: "Stanitsa elders, old officers, young riders, and anti-requisition committees settle who directs the next phase of the circle."
DHC_special_arm: "Reopen Officer Networks"
DHC_special_arm_desc: "Old officer channels and veterans' lists give the guards more discipline without restoring a state the villages no longer trust."
DHC_river_patrol_school: "River Patrol School"
DHC_river_patrol_school_desc: "Veterans, ferrymen, scouts, and stanitsa riders teach the guards how to screen bridges, hide along river roads, and strike before columns can cross."
DHC_supply: "Secure the Southern Crossings"
DHC_supply_desc: "River bridges, rail sidings, and road crossings are guarded so outsiders cannot use the Don as a free military corridor."
DHC_enemy_front: "Hold the Lower Front"
DHC_enemy_front_desc: "The circle prepares a mobile lower front that can break columns, withdraw before heavy assaults, and return through local terrain."
DHC_war_plan: "Riders on the River Roads"
DHC_war_plan_desc: "Campaign planning centers on river roads, mobile guards, false retreats, depot raids, fortified crossings, and anti-air posts around threatened approaches."
DHC_civil_rule: "Protect Stanitsa Law"
DHC_civil_rule_desc: "Local courts, elders, teachers, and convoy offices receive armed protection so civil order survives the armies around it."
DHC_stanitsa_mediation: "Stanitsa Mediation Tables"
DHC_stanitsa_mediation_desc: "Elders, convoy offices, officers, and riders settle local disputes before guard autonomy becomes private command."
DHC_convoy_autonomy_guarantees: "Convoy Autonomy Guarantees"
DHC_convoy_autonomy_guarantees_desc: "Written guarantees bind grain passage, local courts, river crossings, and League promises into an autonomy settlement other powers can recognize."
DHC_propaganda: "Songs of the Host"
DHC_propaganda_desc: "Broadcasts present the circle as order without Moscow, autonomy without chaos, and a southern shield against every requisition column."
DHC_settlement: "Southern Autonomy Statutes"
DHC_settlement_desc: "A moderate route writes host autonomy, convoy rules, and local command limits into law."
DHC_radical_turn: "No Road for Reconquest"
DHC_radical_turn_desc: "The radical wing argues that every outside army is the same threat if it crosses the Don without host consent."
DHC_industry_plan: "Repair Shops of the Don"
DHC_industry_plan_desc: "Small repair shops, mills, stables, and hidden workshops keep the guards supplied without depending on distant factories."
DHC_diplomatic_plan: "Passage for Recognition"
DHC_diplomatic_plan_desc: "The circle bargains controlled passage and grain convoys for recognition while resisting patrons, republics, or League delegates that expect command."
DHC_novocherkassk_field_staff: "Novocherkassk Field Staff"
DHC_novocherkassk_field_staff_desc: "Novocherkassk veterans and dispatch officers turn loose guard captains into a staff that can track roads, crossings, and emergency muster rolls."
DHC_host_court_registers: "Host Court Registers"
DHC_host_court_registers_desc: "Local courts record property seizures, convoy rights, and guard obligations so the circle can claim law rather than simple armed refusal."
DHC_stanitsa_oath_boards: "Stanitsa Oath Boards"
DHC_stanitsa_oath_boards_desc: "Oath boards bind riders, convoy offices, and village councils to host authority while making each stanitsa answer for its own guards."
DHC_don_river_customs: "Don River Customs"
DHC_don_river_customs_desc: "River toll houses and ferry offices give the circle a practical revenue system and a way to decide which columns may cross."
DHC_cavalry_remount_yards: "Cavalry Remount Yards"
DHC_cavalry_remount_yards_desc: "Remount yards, veterinary sheds, and guarded repair shops keep patrols in the field without waiting for a distant quartermaster."
DHC_grain_convoy_escorts: "Grain Convoy Escorts"
DHC_grain_convoy_escorts_desc: "Convoy escorts pair local riders with repair crews, making food traffic harder to seize and easier to redirect before armies arrive."
DHC_southern_crossing_batteries: "Southern Crossing Batteries"
DHC_southern_crossing_batteries_desc: "Fortified crossings, field guns, and air-watch posts turn the Don's bridges into negotiated gates rather than open roads."
DHC_rostov_workshop_contracts: "Rostov Workshop Contracts"
DHC_rostov_workshop_contracts_desc: "The circle signs guarded contracts with Rostov workshops and millwrights to repair rifles, carts, engines, and river equipment."
DHC_steppe_watch_posts: "Steppe Watch Posts"
DHC_steppe_watch_posts_desc: "Scouts and signal posts watch the open approaches, warning stanitsas before requisition columns or rival cavalry reach the roads."
DHC_winter_road_columns: "Winter Road Columns"
DHC_winter_road_columns_desc: "Winter columns stock rail sidings, ferry points, and road depots before mud or frost can isolate the host from its stores."
DHC_manych_rear_area: "Manych Rear Area"
DHC_manych_rear_area_desc: "The Manych rear area becomes a guarded reserve belt of depots, field kitchens, fallback roads, and improvised supply nodes."
DHC_kuban_letters: "Letters to the Kuban"
DHC_kuban_letters_desc: "Envoys exchange careful letters with Kuban and southern delegates, seeking passage bargains without letting another host dictate Don command."
DHC_volunteer_host_schools: "Volunteer Host Schools"
DHC_volunteer_host_schools_desc: "Volunteer schools train riders, scouts, convoy guards, and bridge parties to fight under host orders instead of private loyalties."
DHC_river_port_tolls: "River Port Tolls"
DHC_river_port_tolls_desc: "Port tolls and manifests finance local workshops while proving that the Don controls its own ferries, warehouses, and grain traffic."
DHC_league_passage_bargain: "League Passage Bargain"
DHC_league_passage_bargain_desc: "League observers receive a narrow passage bargain: respect host courts and convoy rules, and the southern approaches remain open."
DHC_hardline_against_commissars: "Hardline Against Commissars"
DHC_hardline_against_commissars_desc: "The hardline wing treats commissars, requisition detachments, and outside military governors as the same threat to host autonomy."
DHC_host_staff_map: "The Host Staff Map"
DHC_host_staff_map_desc: "A single staff map records roads, depots, bridges, river watches, and fallback stanitsas so the host can move as one command."
DHC_stanitsa_autonomy_statute: "Stanitsa Autonomy Statute"
DHC_stanitsa_autonomy_statute_desc: "The autonomy statute defines what each stanitsa owes the circle, what the circle owes each village, and where commanders must stop."
DHC_river_and_steppe_compact: "River and Steppe Compact"
DHC_river_and_steppe_compact_desc: "The compact joins river tolls, League passage, convoy law, and stanitsa autonomy into a settlement other powers can recognize."
DHC_don_endurance: "The Don Endures"
DHC_don_endurance_desc: "With roads stocked, courts recognized, bridges guarded, and the staff map sealed, the circle can survive as a southern power in its own right."
DHC_hidden_doctrine: "The Sealed Host Rolls"
DHC_hidden_doctrine_desc: "Sealed rolls record riders, officers, stores, and safe routes that can be activated before any outside staff understands the region."
DHC_extreme_gate: "Survive the Southern Requisition"
DHC_extreme_gate_desc: "When the circle survives a major requisition or reconquest drive, emergency autonomy hardens into a broader southern claim."
DHC_extreme_path: "Southern Host Command"
DHC_extreme_path_desc: "The extreme path turns the Don from a defensive circle into a command that dictates who may move through the southern approaches."
DHC_endgame: "A Host Between Capitals"
DHC_endgame_desc: "Protected stanitsas, river patrols, convoy guarantees, sealed host rolls, and recognition channels bind the Don into a host order strong enough to bargain with every capital and obey none."
DHC_democratic: "Don Host Emergency Circle"
DHC_democratic_DEF: "the Don Host Emergency Circle"
DHC_democratic_ADJ: "Don Host"
DHC_communism: "Don Guard Commune"
DHC_communism_DEF: "the Don Guard Commune"
DHC_communism_ADJ: "Don Guard"
DHC_fascism: "Don Host Command"
DHC_fascism_DEF: "the Don Host Command"
DHC_fascism_ADJ: "Don Host"
DHC_neutrality: "Don Host Emergency Circle"
DHC_neutrality_DEF: "the Don Host Emergency Circle"
DHC_neutrality_ADJ: "Don Host"
KHC: "Kuban Host Provisional Council"
KHC_DEF: "the Kuban Host Provisional Council"
KHC_ADJ: "Kuban Host"
KHC_leader_desc: "The Kuban Provisional Council governs through stanitsa committees, crossing guards, grain offices, and cautious envoys that claim the Kuban is neither Moscow's road nor any foreign army's corridor."
chaosx.nr5_custom.15.t: "Kuban Host Provisional Council Holds the Crossings"
chaosx.nr5_custom.15.d: "Reports from the Kuban now identify the Kuban Host Provisional Council as a regional authority built around stanitsa committees, guarded crossings, grain ledgers, and mountain approaches. Its public claim is narrow but dangerous: no army may use the Kuban as a passageway for reconquest, foreign intervention, or southern encirclement. Moscow fears a chain reaction across the southern frontier, Ukraine weighs partnership against rivalry, and the Caucasus watches whether the council becomes a shield or a new border problem."
chaosx.nr5_custom.15.a: "The crossings answer to Kuban guards."
KHC_soviet_collapse_focus_tree: "Kuban Host Provisional Council Focus Tree"
KHC_soviet_collapse_focus_tree_desc: "The Kuban Host Provisional Council tree follows crossing control, stanitsa committees, grain retention, Ukrainian diplomacy, screened foreign envoys, mountain defense, and a late Kuban Line route that turns passage denial into regional command."
khc_crossing_council_authority: "Crossing Council Authority"
khc_crossing_council_authority_desc: "Stanitsa committees, bridge guards, grain offices, and local delegates claim emergency authority over the Kuban crossings while larger armies search for southern roads."
khc_stanitsa_committee_rivalries: "Stanitsa Committee Rivalries"
khc_stanitsa_committee_rivalries_desc: "Cossack elders, agrarian committees, guard captains, Ukrainian liaisons, and cautious diplomats share the council uneasily."
khc_kuban_line_command: "Kuban Line Command"
khc_kuban_line_command_desc: "The council turns crossing control into a command claim over the Kuban line, treating every army that enters without consent as an occupier."
khc_consolidate_claim: "Consolidate the Kuban Council"
khc_consolidate_claim_desc: "Bind crossing guards, stanitsa committees, and grain offices into a firmer provisional authority shaped by stability, recognition, and crisis pressure."
khc_mobilize_signature_forces: "Mobilize Kuban Patrols"
khc_mobilize_signature_forces_desc: "Raise mobile rural formations from crossing guards, stanitsa watches, depot access, and wartime pressure."
khc_push_extreme_route: "Declare Kuban Line Command"
khc_push_extreme_route_desc: "Commit the council to its hardline route, turning passage denial into a southern command claim against every outside army."
khc_secure_kuban_crossings: "Secure the Kuban Crossings"
khc_secure_kuban_crossings_desc: "Guard bridges, roads, river crossings, and rail approaches so no outside army can move through the Kuban without permission."
khc_arm_stanitsa_committees: "Arm Stanitsa Committees"
khc_arm_stanitsa_committees_desc: "Issue rifles, radios, and local command authority to stanitsa committees that can defend the countryside before regular armies arrive."
khc_negotiate_with_ukraine: "Negotiate with Ukraine"
khc_negotiate_with_ukraine_desc: "Open careful talks with Ukraine over grain, road access, border calm, and guarantees without becoming a southern appendage."
khc_keep_the_grain_at_home: "Keep the Grain at Home"
khc_keep_the_grain_at_home_desc: "Keep Kuban grain under local ledgers and feed local guards first, forcing every outside partner to bargain instead of requisition."
khc_screen_foreign_envoys: "Screen Foreign Envoys"
khc_screen_foreign_envoys_desc: "Review foreign observers, arms offers, and diplomatic missions before aid becomes leverage over the council."
khc_defend_mountain_approaches: "Defend the Mountain Approaches"
khc_defend_mountain_approaches_desc: "Prepare guards, scouts, and supply posts along the routes toward the Caucasus before the southern frontier becomes a corridor."
KHC_birth: "The Provisional Council Meets"
KHC_birth_desc: "The Kuban Host Provisional Council forms from stanitsa committees, crossing guards, and grain offices that refuse to let the region become another army's passageway."
KHC_first_guard: "Arm the Stanitsa Committees"
KHC_first_guard_desc: "Local committees receive rifles, radios, and guard authority so the countryside can stop requisition teams and columns before formal armies arrive."
KHC_stores: "Keep the Grain at Home"
KHC_stores_desc: "Kuban grain stays under local ledgers, with guarded stores and false schedules preventing sudden seizure by Moscow, neighbors, or foreign missions."
KHC_legitimacy: "Mandate of the Crossings"
KHC_legitimacy_desc: "Delegates define who controls bridges, rails, roads, and grain offices, turning local emergency claims into provisional law."
KHC_rival: "No Passage for Reconquest"
KHC_rival_desc: "The council names its enemy as every force that treats the Kuban as a road to reconquer the south or encircle another republic."
KHC_doctrine: "River and Steppe Defense"
KHC_doctrine_desc: "Crossing guards codify river defense, mobile rural patrols, steppe screens, and rapid withdrawal into doctrine suited to the Kuban line."
KHC_economy: "Kuban Harvest Ledgers"
KHC_economy_desc: "Harvest ledgers keep grain, mills, repair shops, and transport under local control instead of surrendering them to outside army accountants."
KHC_league: "A Southern Barrier in the League"
KHC_league_desc: "The council tests whether the League can respect Kuban passage control or merely wants a southern barrier against Moscow."
KHC_foreign: "Screen the Foreign Envoys"
KHC_foreign_desc: "Foreign arms, observers, and trade offers can help the council, but every envoy is screened before aid becomes direction."
KHC_inner_faction: "Balance Cossacks and Councils"
KHC_inner_faction_desc: "Cossack elders, agrarian committees, guard captains, and diplomatic liaisons settle who directs the council's next phase."
KHC_special_arm: "Mounted Crossing Patrols"
KHC_special_arm_desc: "Mounted patrols and mobile rural detachments receive captured rifles, local guides, and crossing maps for fast defense."
KHC_crossing_patrol_school: "Crossing Patrol School"
KHC_crossing_patrol_school_desc: "Scouts, ferry guards, riders, and local guides teach the patrols how to screen rivers, close false roads, and strike before columns reach the passes."
KHC_supply: "Secure the Kuban Crossings"
KHC_supply_desc: "Bridges, ferries, rail sidings, and road junctions are guarded so outsiders cannot turn the Kuban into an open military corridor."
KHC_enemy_front: "Defend the Mountain Approaches"
KHC_enemy_front_desc: "The council prepares scouts, posts, and mobile screens along the approaches to the Caucasus before larger armies reach the passes."
KHC_war_plan: "Steppe-River War Plan"
KHC_war_plan_desc: "Campaign planning centers on rivers, steppe roads, false passages, depot denial, fortified crossings, and anti-air posts around threatened approaches."
KHC_civil_rule: "Local Statutes of the Kuban"
KHC_civil_rule_desc: "Local statutes protect courts, teachers, mills, grain offices, and committee delegates so civil order survives the armies around it."
KHC_stanitsa_mediation: "Stanitsa Mediation Tables"
KHC_stanitsa_mediation_desc: "Cossack elders, agrarian committees, crossing guards, and diplomatic liaisons settle local disputes before passage control becomes private command."
KHC_grain_passage_guarantees: "Grain Passage Guarantees"
KHC_grain_passage_guarantees_desc: "Written guarantees bind grain passage, crossing rights, local courts, mountain approaches, and League promises into a settlement other powers can recognize."
KHC_propaganda: "The Kuban Is No Corridor"
KHC_propaganda_desc: "Broadcasts present the council as a barrier against reconquest, foreign passage, and every army that wants roads without consent."
KHC_settlement: "Agrarian Autonomy Charter"
KHC_settlement_desc: "A moderate route writes grain rules, local guard limits, and passage authority into an autonomy charter."
KHC_radical_turn: "Every Crossing Under Council"
KHC_radical_turn_desc: "The radical wing argues that any unapproved crossing is an invasion, whether the column claims to be Soviet, republican, or foreign."
KHC_industry_plan: "Mills and Repair Yards"
KHC_industry_plan_desc: "Mills, repair yards, stables, and hidden workshops keep the patrols supplied without depending on distant factories."
KHC_diplomatic_plan: "Talks with Ukraine"
KHC_diplomatic_plan_desc: "The council bargains with Ukraine, League delegates, and screened patrons over grain, road access, recognition, and frontier calm while guarding against dependency."
KHC_ekaterinodar_field_staff: "Ekaterinodar Field Staff"
KHC_ekaterinodar_field_staff_desc: "Veterans, crossing officers, and dispatch clerks build a field staff that can coordinate stanitsa patrols from the old Kuban capital."
KHC_crossing_court_registers: "Crossing Court Registers"
KHC_crossing_court_registers_desc: "Crossing courts record seizures, grain claims, ferry rights, and guard obligations so passage control rests on law rather than private armed tolls."
KHC_stanitsa_oath_boards: "Stanitsa Oath Boards"
KHC_stanitsa_oath_boards_desc: "Oath boards bind committees, bridge guards, and grain offices to the provisional council while making each stanitsa answer for its own patrols."
KHC_kuban_river_customs: "Kuban River Customs"
KHC_kuban_river_customs_desc: "Customs offices and ferry ledgers give the council revenue, border memory, and a way to decide which traffic may enter the crossings."
KHC_cavalry_remount_yards: "Cavalry Remount Yards"
KHC_cavalry_remount_yards_desc: "Remount yards, veterinary sheds, and guarded repair shops keep patrols mobile across the steppe roads and river crossings."
KHC_grain_corridor_escorts: "Grain Corridor Escorts"
KHC_grain_corridor_escorts_desc: "Escorted grain corridors keep local stores moving under council papers instead of surrendering them to Moscow, Ukraine, or foreign columns."
KHC_mountain_crossing_batteries: "Mountain Crossing Batteries"
KHC_mountain_crossing_batteries_desc: "Field guns, anti-air posts, and fortified exits watch the mountain approaches before the Kuban becomes a back door into the Caucasus."
KHC_krasnodar_workshop_contracts: "Krasnodar Workshop Contracts"
KHC_krasnodar_workshop_contracts_desc: "Guarded workshop contracts repair rifles, carts, engines, and crossing equipment for the patrols that hold the corridor."
KHC_steppe_watch_posts: "Steppe Watch Posts"
KHC_steppe_watch_posts_desc: "Signal posts and scouts watch open approaches so raiders, requisition teams, and rival cavalry cannot appear at the crossings unannounced."
KHC_winter_corridor_columns: "Winter Corridor Columns"
KHC_winter_corridor_columns_desc: "Winter columns stock road depots, rail sidings, and ferry points before weather or armies cut the council apart."
KHC_laba_rear_area: "Laba Rear Area"
KHC_laba_rear_area_desc: "The Laba rear area becomes a reserve belt of fallback roads, field kitchens, ammunition points, and guarded supply nodes."
KHC_ukrainian_letters: "Letters to Ukraine"
KHC_ukrainian_letters_desc: "Careful letters to Ukraine seek grain, border calm, and passage understandings without making the Kuban a southern dependency."
KHC_volunteer_line_schools: "Volunteer Line Schools"
KHC_volunteer_line_schools_desc: "Volunteer schools train crossing guards, scouts, bridge parties, and rural patrols to fight under council orders instead of private loyalties."
KHC_river_port_tolls: "River Port Tolls"
KHC_river_port_tolls_desc: "Port tolls and corridor manifests finance workshops while proving that the council controls its own ferries, warehouses, and road gates."
KHC_league_corridor_bargain: "League Corridor Bargain"
KHC_league_corridor_bargain_desc: "League observers receive a narrow corridor bargain: respect council courts and grain rules, and the southern roads remain open."
KHC_hardline_against_requisition: "Hardline Against Requisition"
KHC_hardline_against_requisition_desc: "The hardline wing treats requisition teams, foreign military governors, and uninvited republican staffs as the same threat to Kuban control."
KHC_line_staff_map: "The Line Staff Map"
KHC_line_staff_map_desc: "A single staff map records crossings, depots, bridges, mountain exits, and fallback stanitsas so the Kuban line can move as one command."
KHC_stanitsa_autonomy_statute: "Stanitsa Autonomy Statute"
KHC_stanitsa_autonomy_statute_desc: "The autonomy statute defines what each stanitsa owes the council, what the council owes each village, and where commanders must stop."
KHC_steppe_and_mountain_compact: "Steppe and Mountain Compact"
KHC_steppe_and_mountain_compact_desc: "The compact joins river tolls, grain corridors, League passage, and stanitsa law into a southern settlement other powers can recognize."
KHC_kuban_endurance: "The Kuban Holds"
KHC_kuban_endurance_desc: "With crossings guarded, roads stocked, courts recognized, and the staff map sealed, the council can survive as a southern power in its own right."
KHC_hidden_doctrine: "The Sealed Crossing Maps"
KHC_hidden_doctrine_desc: "Sealed maps record bridges, ferries, hidden roads, depots, and mountain approaches that can be closed before outside staffs understand the region."
KHC_extreme_gate: "Survive the Southern Passage Crisis"
KHC_extreme_gate_desc: "When the council survives a major passage or requisition crisis, provisional crossing control hardens into a broader southern claim."
KHC_extreme_path: "Kuban Line Command"
KHC_extreme_path_desc: "The extreme path turns the Kuban from a defensive council into a command that dictates who may move between steppe, river, and mountain."
KHC_endgame: "Between Steppe and Mountains"
KHC_endgame_desc: "Protected stanitsas, crossing patrols, grain guarantees, sealed maps, and recognition channels bind the Kuban into an order strong enough to bargain with every neighbor and obey none."
KHC_democratic: "Kuban Host Provisional Council"
KHC_democratic_DEF: "the Kuban Host Provisional Council"
KHC_democratic_ADJ: "Kuban Host"
KHC_communism: "Kuban Guard Commune"
KHC_communism_DEF: "the Kuban Guard Commune"
KHC_communism_ADJ: "Kuban Guard"
KHC_fascism: "Kuban Host Command"
KHC_fascism_DEF: "the Kuban Host Command"
KHC_fascism_ADJ: "Kuban Host"
KHC_neutrality: "Kuban Host Provisional Council"
KHC_neutrality_DEF: "the Kuban Host Provisional Council"
KHC_neutrality_ADJ: "Kuban Host"
FEV: "Far Eastern Republic Revival"
FEV_DEF: "the Far Eastern Republic Revival"
FEV_ADJ: "Far Eastern"
FEV_leader_desc: "The Far Eastern Buffer Committee governs from port offices, rail guards, local officers, and cautious liaison rooms that claim the Pacific edge can survive only by keeping war away from the tracks and docks."
chaosx.nr5_custom.16.t: "Far Eastern Republic Revival Guards the Pacific Line"
chaosx.nr5_custom.16.d: "Reports from Vladivostok and Khabarovsk now identify a Far Eastern buffer authority claiming emergency control over ports, rail stations, docks, and liaison offices. Its committee denies being a Japanese puppet, but Japanese officers, Chinese observers, local rail guards, and Moscow's remaining agents all crowd the same frontier. The new republic says the Far East will keep food, trade, and rail movement alive while the western union war decides its own fate."
chaosx.nr5_custom.16.a: "The Pacific line answers to its own committee."
FEV_soviet_collapse_focus_tree: "Far Eastern Republic Revival Focus Tree"
FEV_soviet_collapse_focus_tree_desc: "The Far Eastern Republic Revival tree follows buffer authority, railway guards, port access, Japanese liaison pressure, Vladivostok docks, strict neutrality, and a late Far Eastern Line Command route that turns distance into regional sovereignty."
fev_buffer_committee_authority: "Buffer Committee Authority"
fev_buffer_committee_authority_desc: "Port officials, rail delegates, local officers, and emergency committees claim authority over the Far Eastern line while Moscow, Japan, and neighboring powers test the frontier."
fev_liaison_office_tensions: "Liaison Office Tensions"
fev_liaison_office_tensions_desc: "Japanese officers, Chinese observers, League envoys, railway unions, and local commanders crowd the same rooms without agreeing who the buffer actually serves."
fev_far_eastern_line_command: "Far Eastern Line Command"
fev_far_eastern_line_command_desc: "The republic turns rail and port defense into a command claim across the Pacific frontier, treating every unapproved military mission as a threat to the line."
fev_consolidate_claim: "Consolidate the Buffer Committee"
fev_consolidate_claim_desc: "Bind port offices, railway guards, and local officer councils into a firmer provisional authority shaped by stability, recognition, and crisis pressure."
fev_mobilize_signature_forces: "Mobilize Railway Guards"
fev_mobilize_signature_forces_desc: "Raise railway and dock detachments from local guards, depot access, and wartime pressure."
fev_push_extreme_route: "Declare Far Eastern Line Command"
fev_push_extreme_route_desc: "Commit the republic to its hardline route, turning distance and rail control into a Pacific frontier command claim."
fev_secure_trans_siberian_line: "Secure the Trans-Siberian Line"
fev_secure_trans_siberian_line_desc: "Guard bridges, sidings, depots, repair shops, and switchyards so neither Moscow nor foreign staffs can sever the eastern lifeline."
fev_form_buffer_government: "Form a Buffer Government"
fev_form_buffer_government_desc: "Write emergency statutes that present the republic as a temporary buffer authority rather than a puppet or another western belligerent."
fev_negotiate_japanese_liaison_officers: "Negotiate Japanese Liaison Officers"
fev_negotiate_japanese_liaison_officers_desc: "Receive Japanese officers under strict rules, extracting information and deterrence without surrendering command over the ports and railways."
fev_protect_vladivostok_docks: "Protect Vladivostok's Docks"
fev_protect_vladivostok_docks_desc: "Guard warehouses, piers, fuel stores, and naval approaches so the Pacific port remains open to trade and closed to seizure."
fev_recruit_railway_guards: "Recruit Railway Guards"
fev_recruit_railway_guards_desc: "Enroll rail workers, station guards, and local veterans into mobile detachments that can defend trains before regular armies arrive."
fev_declare_neutrality_in_western_union_war: "Declare Neutrality in the Western Union War"
fev_declare_neutrality_in_western_union_war_desc: "Announce that Far Eastern trains and ports will not be spent on a western war unless the republic itself is attacked."
FEV_birth: "The Buffer Committee Meets"
FEV_birth_desc: "The Far Eastern Buffer Committee forms from port officials, rail guards, local officers, and emergency delegates who refuse to let distant capitals decide the Pacific line."
FEV_first_guard: "Raise Railway Guards"
FEV_first_guard_desc: "Rail workers, station guards, and local veterans receive rifles and command papers so the eastern line can defend itself before larger armies arrive."
FEV_stores: "Keep the Ports Open"
FEV_stores_desc: "Food stores, warehouses, fuel tanks, and dock ledgers stay under local control so trade continues despite the crisis around Moscow."
FEV_khabarovsk_assembly_records: "Khabarovsk Assembly Records"
FEV_khabarovsk_assembly_records_desc: "Khabarovsk clerks recover statutes, rail mandates, and committee records so the buffer can claim law beyond emergency guard orders."
FEV_legitimacy: "Mandate from the Eastern Rails"
FEV_legitimacy_desc: "Delegates define who controls trains, ports, repair shops, and liaison offices, turning emergency management into provisional law."
FEV_rival: "No Orders from Distant Moscow"
FEV_rival_desc: "The committee names its enemy as every staff that treats the Far East as a reserve to be spent from thousands of kilometers away."
FEV_amur_field_staff: "Amur Field Staff"
FEV_amur_field_staff_desc: "Local officers compile river posts, rail timetables, and station guard rosters into a field staff that can act before distant commands answer."
FEV_ussuri_rail_court: "Ussuri Rail Court"
FEV_ussuri_rail_court_desc: "A rail court on the Ussuri line judges transit claims, seizure orders, and depot rights before liaison officers can turn the railway into patronage."
FEV_doctrine: "Port and Rail Defense"
FEV_doctrine_desc: "Railway guards codify port security, junction defense, armored train screens, and withdrawal by timetable into doctrine suited to the Pacific frontier."
FEV_economy: "Pacific Trade Ledgers"
FEV_economy_desc: "Trade ledgers keep docks, customs houses, warehouses, and repair shops working without surrendering them to outside army accountants."
FEV_league: "A Distant Seat in the League"
FEV_league_desc: "The republic tests whether the League can protect a Pacific buffer or merely use its name on maps too far from its armies."
FEV_foreign: "Screen Japanese Liaison Officers"
FEV_foreign_desc: "Japanese offers, Chinese messages, League notes, and foreign trade guarantees are screened before assistance becomes command."
FEV_inner_faction: "Balance Officers and Rail Workers"
FEV_inner_faction_desc: "Port officials, railway unions, local officers, and liaison committees settle who directs the buffer authority's next phase."
FEV_special_arm: "Recruit Railway Guards"
FEV_special_arm_desc: "Station guards and mobile railway detachments receive captured rifles, local maps, and emergency signals for line defense."
FEV_supply: "Secure the Trans-Siberian Line"
FEV_supply_desc: "Sidings, depots, bridges, and repair points are guarded so outsiders cannot turn the eastern railway into an open military corridor."
FEV_enemy_front: "Guard the Pacific Approaches"
FEV_enemy_front_desc: "The committee prepares scouts, coastal watches, and rail screens before foreign armies or Soviet columns reach the approaches."
FEV_civil_rule: "Buffer Government Statutes"
FEV_civil_rule_desc: "Emergency statutes protect port courts, customs offices, schools, rail councils, and local delegates while armies gather nearby."
FEV_customs_house_ledger: "Customs House Ledger"
FEV_customs_house_ledger_desc: "Customs ledgers let the committee pay guards, buy coal, and ration fuel without accepting every foreign credit note as command authority."
FEV_railway_militia_charter: "Railway Militia Charter"
FEV_railway_militia_charter_desc: "The charter binds station guards, dock patrols, veterans, and rail workers into a recognized militia with common signals and orders."
FEV_propaganda: "The Far East Keeps Moving"
FEV_propaganda_desc: "Broadcasts present the republic as a working buffer that keeps trains, food, and ports moving while others fight over Moscow's silence."
FEV_free_port_merchants: "Free Port Merchants"
FEV_free_port_merchants_desc: "Merchants accept committee permits because guarded docks and predictable tariffs are safer than choosing a foreign master too quickly."
FEV_trans_siberian_dispatch_board: "Trans-Siberian Dispatch Board"
FEV_trans_siberian_dispatch_board_desc: "Dispatchers, guards, and repair crews centralize train schedules so coal, food, rifles, and refugees move under Far Eastern orders."
FEV_settlement: "Strict Neutrality Charter"
FEV_settlement_desc: "A moderate route writes neutrality, port access, rail defense, and liaison limits into a charter that keeps the republic out of western wars."
FEV_radical_turn: "No Western War on Eastern Rails"
FEV_radical_turn_desc: "The radical wing argues that no western staff, Soviet or republican, may spend Far Eastern trains without the committee's consent."
FEV_harbor_fortress_line: "Harbor Fortress Line"
FEV_harbor_fortress_line_desc: "Harbor approaches, rail junctions, and anti-air posts are prepared so Vladivostok can stay open without becoming easy prey."
FEV_nikolsk_workshop_contracts: "Nikolsk Workshop Contracts"
FEV_nikolsk_workshop_contracts_desc: "Nikolsk workshops accept guarded contracts for rifles, tools, spare parts, and rail repairs in exchange for coal priority and port access."
FEV_sikhote_alin_watch_posts: "Sikhote-Alin Watch Posts"
FEV_sikhote_alin_watch_posts_desc: "Watch posts along the Sikhote-Alin approaches give the committee warning before border columns or foreign missions reach the rail line."
FEV_war_plan: "Port-Rail War Plan"
FEV_war_plan_desc: "Campaign planning centers on port denial, junction defense, false timetables, depot evacuation, and fast concentration around threatened stations."
FEV_industry_plan: "Dockyards and Repair Shops"
FEV_industry_plan_desc: "Dockyards, machine shops, warehouses, and rail workshops keep the guards supplied without depending on distant factories."
FEV_diplomatic_plan: "Talks with Siberian Authorities"
FEV_diplomatic_plan_desc: "The committee bargains with Siberian authorities over rail transit, trade, recognition, and frontier calm while guarding against dependency."
FEV_winter_rail_columns: "Winter Rail Columns"
FEV_winter_rail_columns_desc: "Registered winter columns link rail guards, trucks, horses, and local guides into emergency routes that still move when the main line freezes or burns."
FEV_vladivostok_harbor_board: "Vladivostok Harbor Board"
FEV_vladivostok_harbor_board_desc: "Dock engineers, customs officers, and railway accountants bind Vladivostok's harbor works to the republic's guarded timetable."
FEV_razdolnoye_rear_area: "Razdolnoye Rear Area"
FEV_razdolnoye_rear_area_desc: "Reserve posts around Razdolnoye give the port a defended rear area where supplies and guards can regroup before the coast is cut off."
FEV_siberian_factory_letters: "Siberian Factory Letters"
FEV_siberian_factory_letters_desc: "Letters from Siberian workshops turn spare parts, rail access, and recognition into contracts rather than another claim on the line."
FEV_amur_buffer_posts: "Amur Buffer Posts"
FEV_amur_buffer_posts_desc: "Forward posts along the Amur approaches receive field stores, local signals, and fixed defenses before the frontier becomes another disputed corridor."
FEV_amur_river_ports: "Amur River Ports"
FEV_amur_river_ports_desc: "River ports on the Amur receive guarded warehouses, local boards, and repair crews so the buffer has more than one lifeline."
FEV_pacific_observer_missions: "Pacific Observer Missions"
FEV_pacific_observer_missions_desc: "Foreign observers, Siberian delegates, and League couriers are allowed into controlled rooms where recognition can grow without handing them command."
FEV_sakhalin_ferry_protocols: "Sakhalin Ferry Protocols"
FEV_sakhalin_ferry_protocols_desc: "Ferry protocols keep coal, refugees, observers, and port messages moving without letting any one patron dictate the Pacific crossing."
FEV_pacific_city_compact: "Pacific City Compact"
FEV_pacific_city_compact_desc: "The committee proposes a compact of ports, rail towns, river posts, and liaison rooms that can cooperate without surrendering local command."
FEV_hidden_doctrine: "The Sealed Eastern Timetables"
FEV_hidden_doctrine_desc: "Sealed timetables record hidden sidings, bridge guards, dock stores, and emergency routes that can be closed before outside staffs understand the line."
FEV_extreme_gate: "Survive the Liaison Crisis"
FEV_extreme_gate_desc: "When the committee survives a major liaison or port crisis, provisional buffer control hardens into a broader Pacific claim."
FEV_no_foreign_command_on_the_line: "No Foreign Command on the Line"
FEV_no_foreign_command_on_the_line_desc: "Hardliners forbid foreign command over the rails, docks, ferries, and river posts, making every liaison room answer to Far Eastern law."
FEV_far_eastern_staff_map: "Far Eastern Staff Map"
FEV_far_eastern_staff_map_desc: "A sealed staff map names fallback depots, dock stores, bridge guards, winter columns, and port signals only the committee can activate."
FEV_extreme_path: "Far Eastern Line Command"
FEV_extreme_path_desc: "The extreme path turns the republic from a defensive buffer into a command that dictates who may move between port, rail, and frontier."
FEV_authority_from_the_harbor: "Authority from the Harbor"
FEV_authority_from_the_harbor_desc: "The moderate committee proves sovereignty through working docks, paid guards, city compacts, and contracts that neighbors must respect."
FEV_pacific_between_empires: "Pacific Between Empires"
FEV_pacific_between_empires_desc: "From Siberian letters to ferry protocols, the republic claims a place between western collapse and Pacific patrons without becoming either."
FEV_endgame: "A Buffer Beyond Moscow"
FEV_endgame_desc: "The endgame direction binds ports, railways, liaison rooms, and local guards into a Far Eastern order strong enough to bargain with every neighbor and obey none."
FEV_democratic: "Far Eastern Republic Revival"
FEV_democratic_DEF: "the Far Eastern Republic Revival"
FEV_democratic_ADJ: "Far Eastern"
FEV_communism: "Far Eastern Rail Commune"
FEV_communism_DEF: "the Far Eastern Rail Commune"
FEV_communism_ADJ: "Far Eastern"
FEV_fascism: "Far Eastern Line Command"
FEV_fascism_DEF: "the Far Eastern Line Command"
FEV_fascism_ADJ: "Far Eastern"
FEV_neutrality: "Far Eastern Republic Revival"
FEV_neutrality_DEF: "the Far Eastern Republic Revival"
FEV_neutrality_ADJ: "Far Eastern"
SZA: "Siberian Zemstvo Authority"
SZA_DEF: "the Siberian Zemstvo Authority"
SZA_ADJ: "Siberian Zemstvo"
SZA_leader_desc: "The Siberian Regional Assembly governs through city offices, zemstvo committees, depot clerks, rail guards, and local officers who claim Siberia will not be requisitioned for a state that may no longer exist."
chaosx.nr5_custom.17.t: "Siberian Zemstvo Authority Convenes the Cities"
chaosx.nr5_custom.17.d: "Reports from Omsk, Tomsk, and Irkutsk now identify a Siberian Zemstvo Authority speaking in the language of temporary administration, rail protection, depot law, and city guards. Its assembly claims it will keep order across the Siberian depth until Moscow proves it can govern again. Moscow calls the paperwork treason, foreign observers see a corridor that might survive the union war, and local officers ask whether the committee can pay them before the next requisition order arrives."
chaosx.nr5_custom.17.a: "The Siberian cities sign their own orders."
SZA_soviet_collapse_focus_tree: "Siberian Zemstvo Authority Focus Tree"
SZA_soviet_collapse_focus_tree_desc: "The Siberian Zemstvo Authority tree follows regional assembly law, Trans-Siberian depot control, city guards, Ural and Far Eastern bargaining, temporary neutrality, refusal of western requisitions, and a late Siberian Depth Command route."
sza_zemstvo_authority: "Zemstvo Authority"
sza_zemstvo_authority_desc: "City offices, regional assemblies, rail committees, and depot clerks claim temporary legal authority across Siberia while larger governments fight over whether the union still exists."
sza_city_guard_compromises: "City Guard Compromises"
sza_city_guard_compromises_desc: "Local officers, railway guards, factory committees, merchants, and zemstvo delegates share authority uneasily because no single faction can defend the Siberian cities alone."
sza_siberian_depth_command: "Siberian Depth Command"
sza_siberian_depth_command_desc: "The authority turns administrative depth into a command claim, using distance, rail depots, and city guards to deny every outside requisition without consent."
sza_consolidate_claim: "Consolidate the Zemstvo Authority"
sza_consolidate_claim_desc: "Bind city offices, rail committees, and local officer councils into a firmer provisional authority shaped by stability, recognition, and crisis pressure."
sza_mobilize_signature_forces: "Mobilize City Guards"
sza_mobilize_signature_forces_desc: "Raise city and rail detachments from local guards, depot access, and wartime pressure."
sza_push_extreme_route: "Declare Siberian Depth Command"
sza_push_extreme_route_desc: "Commit the authority to its hardline route, turning distance and rail control into a regional command claim."
sza_convene_regional_assembly: "Convene the Regional Assembly"
sza_convene_regional_assembly_desc: "Gather city delegates, rail clerks, legal committees, and local officers into a temporary assembly that can issue orders in Siberia's name."
sza_secure_trans_siberian_depots: "Secure the Trans-Siberian Depots"
sza_secure_trans_siberian_depots_desc: "Guard rail depots, switchyards, repair shops, and grain stores so the eastern line cannot be stripped by distant army staffs."
sza_recruit_city_guards: "Recruit City Guards"
sza_recruit_city_guards_desc: "Enroll police, rail workers, veterans, and factory guards into city detachments that can hold stations before regular armies arrive."
sza_bargain_with_ural_and_far_eastern_authorities: "Bargain with Ural and Far Eastern Authorities"
sza_bargain_with_ural_and_far_eastern_authorities_desc: "Open careful talks with industrial committees and Pacific buffers over transit, recognition, supply, and neutrality without surrendering Siberian law."
sza_declare_temporary_neutrality: "Declare Temporary Neutrality"
sza_declare_temporary_neutrality_desc: "Announce that Siberian cities will keep order and rail transit without spending men and grain on a western war unless the authority itself is attacked."
sza_refuse_western_requisition_orders: "Refuse Western Requisition Orders"
sza_refuse_western_requisition_orders_desc: "Reject orders that strip Siberian depots for distant fronts, forcing Moscow, republics, and foreign missions to bargain with the assembly."
SZA_birth: "The Regional Assembly Meets"
SZA_birth_desc: "The Siberian Regional Assembly forms from city offices, rail committees, depot clerks, and local officers who refuse to send Siberia's stores west on uncertain orders."
SZA_first_guard: "Raise City Guards"
SZA_first_guard_desc: "Police, rail workers, factory guards, and veterans receive rifles and command papers so Siberian cities can protect stations and warehouses."
SZA_stores: "Keep the Depots Accounted"
SZA_stores_desc: "Grain, coal, repair tools, and arms stores remain under local ledgers until the assembly knows who can legitimately requisition them."
SZA_tomsk_city_duma_records: "Tomsk City Duma Records"
SZA_tomsk_city_duma_records_desc: "Tomsk clerks recover municipal statutes, court seals, and pre-collapse tax lists so the assembly can claim authority through paper as well as guards."
SZA_legitimacy: "Mandate of the Zemstvos"
SZA_legitimacy_desc: "Delegates define who controls city offices, rail stations, depots, and court records, turning emergency administration into provisional law."
SZA_rival: "No Requisitions for a Broken State"
SZA_rival_desc: "The authority names its enemy as every staff that treats Siberia as a warehouse to be emptied before the cities can defend themselves."
SZA_omsk_field_staff: "Omsk Field Staff"
SZA_omsk_field_staff_desc: "Omsk officers compile local rosters, station maps, and guard orders into a field staff that can move without waiting for Moscow's line to clear."
SZA_novosibirsk_rail_court: "Novosibirsk Rail Court"
SZA_novosibirsk_rail_court_desc: "A rail court in Novosibirsk adjudicates transit, seizure claims, and depot orders before a distant staff can turn every switchyard into spoils."
SZA_doctrine: "Depth and Rail Defense"
SZA_doctrine_desc: "City guards codify station defense, rail denial, depot evacuation, and withdrawal by distance into doctrine suited to Siberian geography."
SZA_economy: "Siberian City Ledgers"
SZA_economy_desc: "City ledgers keep workshops, markets, depots, and rail repairs working without surrendering them to outside army accountants."
SZA_league: "A Legal Seat in the League"
SZA_league_desc: "The authority tests whether the League can respect Siberian legal autonomy or merely wants another corridor against Moscow."
SZA_foreign: "Screen Corridor Missions"
SZA_foreign_desc: "Foreign offers, railway observers, and trade guarantees are screened before a corridor becomes a leash around the assembly."
SZA_inner_faction: "Balance Officers and Zemstvos"
SZA_inner_faction_desc: "Local officers, city delegates, railway unions, and depot clerks settle who directs the authority's next phase."
SZA_special_arm: "Recruit City Guards"
SZA_special_arm_desc: "Station guards and city detachments receive captured rifles, local maps, and emergency signals for depot defense."
SZA_supply: "Secure the Trans-Siberian Depots"
SZA_supply_desc: "Depots, sidings, repair shops, and storehouses are guarded so outsiders cannot turn Siberia into an open requisition corridor."
SZA_enemy_front: "Guard the Western Approaches"
SZA_enemy_front_desc: "The assembly prepares scouts, rail screens, and city posts before Soviet columns, breakaway armies, or foreign missions reach the line."
SZA_civil_rule: "Temporary Zemstvo Statutes"
SZA_civil_rule_desc: "Emergency statutes protect city courts, schools, market offices, rail councils, and local delegates while armies gather nearby."
SZA_zemstvo_tax_books: "Zemstvo Tax Books"
SZA_zemstvo_tax_books_desc: "Local tax books let the assembly pay guards, buy coal, and keep markets open without accepting requisition notes from every passing army."
SZA_city_militia_charter: "City Militia Charter"
SZA_city_militia_charter_desc: "The charter binds police detachments, station guards, veterans, and workshop patrols into city militias with recognized signals and command rolls."
SZA_propaganda: "Siberia Will Not Be Emptied"
SZA_propaganda_desc: "Broadcasts present the authority as a legal shield against requisitions, evacuation orders, and every army that wants stores without consent."
SZA_merchants_without_masters: "Merchants Without Masters"
SZA_merchants_without_masters_desc: "Siberian merchants accept assembly permits because the authority offers guarded roads, predictable accounts, and fewer masters than the old ministries."
SZA_trans_siberian_dispatch_board: "Trans-Siberian Dispatch Board"
SZA_trans_siberian_dispatch_board_desc: "Dispatchers, guards, and repair crews centralize train schedules so food, rifles, coal, and wounded men move under Siberian orders."
SZA_settlement: "Temporary Neutrality Charter"
SZA_settlement_desc: "A moderate route writes neutrality, depot law, rail defense, and liaison limits into a charter that keeps Siberian men out of western wars."
SZA_radical_turn: "Every Depot Under Assembly Law"
SZA_radical_turn_desc: "The radical wing argues that any unapproved requisition is an invasion, whether the paper bears a Soviet, republican, or foreign seal."
SZA_station_fortress_line: "Station Fortress Line"
SZA_station_fortress_line_desc: "Key stations receive barricades, signal shelters, anti-air posts, and reserve rooms so a rail junction can hold long enough for help to arrive."
SZA_kuznetsk_workshop_contracts: "Kuznetsk Workshop Contracts"
SZA_kuznetsk_workshop_contracts_desc: "Kuznetsk workshops accept guarded contracts for rifles, tools, and spare parts in exchange for assembly protection and coal priority."
SZA_angara_timber_levies: "Angara Timber Levies"
SZA_angara_timber_levies_desc: "Timber levies along the Angara repair bridges, warm barracks, and keep river traffic moving without emptying the villages."
SZA_war_plan: "Depth Defense Plan"
SZA_war_plan_desc: "Campaign planning centers on distance, rail denial, false ledgers, depot evacuation, and fast concentration around threatened cities."
SZA_industry_plan: "Workshops of the Siberian Cities"
SZA_industry_plan_desc: "Workshops, repair yards, machine shops, and guarded warehouses keep the city guards supplied without depending on distant factories."
SZA_diplomatic_plan: "Talks Across the Rails"
SZA_diplomatic_plan_desc: "The assembly bargains with Ural, Kazakh, and Far Eastern authorities over rail transit, trade, recognition, and frontier calm."
SZA_winter_column_registers: "Winter Column Registers"
SZA_winter_column_registers_desc: "Registered winter columns link guards, horses, trucks, and village guides into emergency routes that still function when the main line freezes or burns."
SZA_tomsk_omsk_switchyards: "Tomsk-Omsk Switchyards"
SZA_tomsk_omsk_switchyards_desc: "Switchyard guards, repair crews, and depot clerks keep the Tomsk-Omsk line supplied so the authority can move trains before outsiders can requisition them."
SZA_baikal_rear_area: "Baikal Rear Area"
SZA_baikal_rear_area_desc: "Baikal posts, reserve depots, and defended sidings give the authority a rear area beyond the first wave of seizure orders."
SZA_ural_factory_letters: "Ural Factory Letters"
SZA_ural_factory_letters_desc: "Letters from Ural factory committees turn spare parts, rail access, and mutual recognition into contracts rather than occupation demands."
SZA_irkutsk_depth_stores: "Irkutsk Depth Stores"
SZA_irkutsk_depth_stores_desc: "Irkutsk warehouses and guarded sidings hold rifles, support gear, and reserve posts beyond the first line of seizure orders."
SZA_yenisei_river_ports: "Yenisei River Ports"
SZA_yenisei_river_ports_desc: "River ports on the Yenisei receive local boards, guarded warehouses, and repair crews so the federation has more than one lifeline."
SZA_yenisei_city_federation: "Yenisei City Federation"
SZA_yenisei_city_federation_desc: "City delegates along the Yenisei bind courts, markets, depots, and rail offices into a federation that speaks for Siberia before any patron can speak over it."
SZA_far_eastern_transit_protocols: "Far Eastern Transit Protocols"
SZA_far_eastern_transit_protocols_desc: "Transit protocols with Far Eastern authorities keep observers, coal, refugees, and trains moving without allowing a Pacific patron to own the line."
SZA_league_of_distant_cities: "League of Distant Cities"
SZA_league_of_distant_cities_desc: "The authority proposes a loose league of Siberian cities, depots, and rail boards that can cooperate without surrendering local law."
SZA_hidden_doctrine: "The Sealed Depot Ledgers"
SZA_hidden_doctrine_desc: "Sealed ledgers record hidden stores, sidings, bridge guards, and emergency routes that can be closed before outside staffs understand the line."
SZA_extreme_gate: "Survive the Requisition Crisis"
SZA_extreme_gate_desc: "When the assembly survives a major requisition or city-guard crisis, provisional legal authority hardens into a broader Siberian claim."
SZA_no_requisition_west_of_the_urals: "No Requisition West of the Urals"
SZA_no_requisition_west_of_the_urals_desc: "The hardliners forbid westbound requisition without assembly approval, turning every train manifest into a test of Siberian sovereignty."
SZA_siberian_staff_map: "Siberian Staff Map"
SZA_siberian_staff_map_desc: "A sealed staff map names fallback depots, signal rooms, bridge guards, and winter columns that only the authority can activate."
SZA_extreme_path: "Siberian Depth Command"
SZA_extreme_path_desc: "The extreme path turns the authority from a defensive assembly into a command that dictates who may move between city, depot, and rail frontier."
SZA_authority_from_the_railhead: "Authority from the Railhead"
SZA_authority_from_the_railhead_desc: "The moderate assembly proves its sovereignty through working railheads, paid guards, city delegates, and contracts that outsiders must respect."
SZA_siberia_between_oceans: "Siberia Between Oceans"
SZA_siberia_between_oceans_desc: "From Ural letters to Pacific protocols, the authority claims a place between western collapse and eastern patrons without becoming either."
SZA_endgame: "A State Beyond the Urals"
SZA_endgame_desc: "The endgame direction binds city offices, rail depots, legal committees, and local guards into a Siberian order strong enough to bargain with every neighbor and obey none."
SZA_democratic: "Siberian Zemstvo Authority"
SZA_democratic_DEF: "the Siberian Zemstvo Authority"
SZA_democratic_ADJ: "Siberian Zemstvo"
SZA_communism: "Siberian City Soviet Authority"
SZA_communism_DEF: "the Siberian City Soviet Authority"
SZA_communism_ADJ: "Siberian Soviet"
SZA_fascism: "Siberian Depth Command"
SZA_fascism_DEF: "the Siberian Depth Command"
SZA_fascism_ADJ: "Siberian Command"
SZA_neutrality: "Siberian Zemstvo Authority"
SZA_neutrality_DEF: "the Siberian Zemstvo Authority"
SZA_neutrality_ADJ: "Siberian Zemstvo"
TNC: "Turkestan National Council"
TNC_DEF: "the Turkestan National Council"
TNC_ADJ: "Turkestani"
TNC_leader_desc: "Turkestan Civic Council governs through a crisis body of reformers, railway officials, school boards, and oasis notables born from the Soviet Collapse."
chaosx.nr5_custom.18.t: "Turkestan National Council Forms"
chaosx.nr5_custom.18.d: "Reports from Central Asia now identify the Turkestan National Council as more than a committee. Its public claim centers on city offices, school boards, guarded rails, oasis negotiations, autonomy charters, and recognition channels. Moscow calls it separatist, traditional insurgents question its authority, and foreign observers find it easier to read than the older war bands."
chaosx.nr5_custom.18.a: "Another office becomes a state."
TNC_soviet_collapse_focus_tree: "Turkestan Focus Tree"
TNC_soviet_collapse_focus_tree_desc: "The Turkestan tree builds a civic Central Asian authority through guarded railways, school boards, autonomy charters, oasis bargains, foreign recognition, and a dangerous New Turkestan route."
tnc_city_council_authority: "City Council Authority"
tnc_city_council_authority_desc: "The council derives its first legitimacy from city offices, school boards, guarded rails, and autonomy circles. It is dangerous because it can speak the language of administration while Moscow is losing the ability to govern."
tnc_oasis_bureau_rivalries: "Oasis Bureau Rivalries"
tnc_oasis_bureau_rivalries_desc: "Reformers, oasis notables, railway officers, school boards, and local guards disagree over how much authority the council should claim."
tnc_new_turkestan: "A New Turkestan"
tnc_new_turkestan_desc: "The council turns survival into a late political ambition that reaches beyond emergency autonomy and toward a wider Central Asian order."
tnc_consolidate_claim: "Consolidate Claim"
tnc_consolidate_claim_desc: "Bind local councils, guards, and foreign contacts into a firmer claim shaped by stability, recognition, and crisis pressure."
tnc_mobilize_signature_forces: "Mobilize Signature Forces"
tnc_mobilize_signature_forces_desc: "Raise signature forces from local control, depot access, and wartime pressure, with stronger returns while fighting Moscow."
tnc_push_extreme_route: "Push Extreme Route"
tnc_push_extreme_route_desc: "Commit the authority to its hardline route, drawing strength from high-chaos pressure and forcing its claim into the wider collapse."
tnc_secure_tashkent_offices: "Secure Tashkent Offices"
tnc_secure_tashkent_offices_desc: "Turn the old administrative offices into a working council network, improving stability and recognition while weakening Moscow's claim to normal authority."
tnc_recruit_railway_guards: "Recruit Railway Guards"
tnc_recruit_railway_guards_desc: "Arm station police, depot watchmen, and rail workers so the council can defend the lines that make its authority real."
tnc_negotiate_with_oasis_leaders: "Negotiate with Oasis Leaders"
tnc_negotiate_with_oasis_leaders_desc: "Bring oasis notables and rural committees into the council without letting them dissolve the civic program."
tnc_publish_autonomy_charter: "Publish the Autonomy Charter"
tnc_publish_autonomy_charter_desc: "Declare a legal autonomy program that foreign observers can recognize and Moscow cannot easily dismiss as banditry."
tnc_request_recognition_from_muslim_and_neutral_states: "Request Muslim and Neutral Recognition"
tnc_request_recognition_from_muslim_and_neutral_states_desc: "Seek recognition from Muslim and neutral governments without trading the council into another power's dependency."
tnc_form_central_asian_defense_council: "Form a Central Asian Defense Council"
tnc_form_central_asian_defense_council_desc: "Coordinate Central Asian defense through a civic council structure that can reinforce the Steppe Federation route if conditions allow."
TNC_birth: "Secure the Civic Claim"
TNC_birth_desc: "Turkestan National Council turns city offices, school boards, rail desks, and autonomy circles into a functioning emergency authority. The first choice is whether the council remains a negotiation body or becomes a government others must answer."
TNC_first_guard: "Raise the Railway Guard"
TNC_first_guard_desc: "The first guard draws from station police, depot clerks, and former local units. It gives the council enough field power to survive the first Soviet counter-order instead of collapsing into minutes."
TNC_stores: "Inventory the City Stores"
TNC_stores_desc: "Depots, food stores, radio rooms, and transport yards are inventoried before rivals can seize them. This shifts the playstyle toward prepared defense and administrative survival."
TNC_legitimacy: "Publish the Autonomy Charter"
TNC_legitimacy_desc: "The council defines who may speak for Turkestan and which law survived the Union. Stability rises, but the answer narrows later political routes."
TNC_rival: "Name the Rival"
TNC_rival_desc: "The enemy is named as Moscow requisitions, rival insurgent columns, and border garrisons. The focus clarifies war priorities and decides whether nearby breakaways are partners, obstacles, or future fronts."
TNC_doctrine: "Write the Civic Doctrine"
TNC_doctrine_desc: "Commanders turn the founding charter into battlefield doctrine. The army becomes better organized around guarded rails, defended towns, and limited offensives."
TNC_economy: "Make the Offices Work"
TNC_economy_desc: "Workshops, farms, schools, and requisition boards are forced into one crisis economy. Industry improves at the cost of making the regime harder to unwind."
TNC_league: "Bargain with the League"
TNC_league_desc: "Envoys test whether the Free Republics' League is shield, rival, or marketplace. The choice can build defensive coordination without surrendering the council's identity."
TNC_foreign: "Screen Foreign Envoys"
TNC_foreign_desc: "Foreign missions are screened for weapons, recognition, spies, and traps. The route rewards outside access while increasing the risk of dependency."
TNC_diplomatic_plan: "Recognition Through the Charter"
TNC_diplomatic_plan_desc: "The council uses autonomy statutes, school boards, railway guarantees, and League rooms to make outside powers answer its letters as state papers."
TNC_inner_faction: "Balance the Oasis Bureaus"
TNC_inner_faction_desc: "The internal balance among city reformers, oasis notables, railway officers, and school boards is settled for now. One faction gains the right to define the next stage of the state."
TNC_special_arm: "Arm the Railway Guards"
TNC_special_arm_desc: "Railway guards, depot watchmen, and city-defense detachments protect Tashkent's junctions, oasis stores, and council offices from both Soviet columns and rival road armies."
TNC_railway_officer_schools: "Railway Officer Schools"
TNC_railway_officer_schools_desc: "Railway guards and city detachments learn station defense, timetable deception, depot signals, and field command under one civic program."
TNC_supply: "Control the Oasis Routes"
TNC_supply_desc: "Routes, bridges, rails, canals, and passes become political territory. The council can hold out longer and project power through logistics rather than raw manpower."
TNC_enemy_front: "Prepare the Steppe Front"
TNC_enemy_front_desc: "Plans are drawn for the most likely enemy front. The focus links the internal crisis to concrete offensive or defensive preparation."
TNC_war_plan: "City-Rail Campaign Plan"
TNC_war_plan_desc: "Campaign plans treat offices, railway stations, canal crossings, airstrips, and reserve depots as the true front line of the council."
TNC_civil_rule: "Rule Through School Boards"
TNC_civil_rule_desc: "Civilian administration is formalized under emergency conditions. The state becomes more stable, but its committees and offices gain interests of their own."
TNC_city_oasis_bargain: "City-Oasis Bargain"
TNC_city_oasis_bargain_desc: "City reformers, oasis notables, railway officers, and school boards settle a governing bargain before rival authorities can split the council."
TNC_autonomy_guarantees: "Autonomy Guarantees"
TNC_autonomy_guarantees_desc: "Guarantees for oasis communities, rail workers, schools, and border towns make the council's autonomy claim readable to neighbors and patrons."
TNC_propaganda: "Speak to the Former Union"
TNC_propaganda_desc: "Broadcasts and manifestos speak to the former Union. This helps spread sympathizers, volunteers, and fear beyond the starting states."
TNC_settlement: "Choose a Settlement"
TNC_settlement_desc: "A moderate settlement route defines what victory looks like short of total transformation. It is the path for survival, recognition, and durable borders."
TNC_radical_turn: "The Radical Turn"
TNC_radical_turn_desc: "The radical wing argues that survival proves the old rules are dead. Its victory opens the route toward the council's most dangerous politics."
TNC_industry_plan: "Permanent City Arsenal"
TNC_industry_plan_desc: "A permanent arsenal is built around the council's political economy. Production becomes a long-term identity rather than a temporary emergency."
TNC_hidden_doctrine: "The Sealed Charter"
TNC_hidden_doctrine_desc: "The sealed charter admits what the public program cannot. The state prepares a hardline route that only survives under collapse conditions."
TNC_extreme_gate: "Survive into the Endgame"
TNC_extreme_gate_desc: "The regime survives long enough to attempt a maximal program. High chaos turns the founding claim into a program for the whole former Union."
TNC_extreme_path: "A New Turkestan"
TNC_extreme_path_desc: "The extreme path tries to turn city councils, oasis notables, and railway guards into the skeleton of a vast Central Asian order. It is powerful, destabilizing, and meant for campaigns where normal settlement has already failed."
TNC_endgame: "A Council That Outlasts Moscow"
TNC_endgame_desc: "The council binds city offices, oasis bargains, railway guards, autonomy law, and recognition channels into an authority that can survive the collapse."
TNC_democratic: "Turkestan Autonomy Council"
TNC_democratic_DEF: "the Turkestan Autonomy Council"
TNC_democratic_ADJ: "Turkestani"
TNC_communism: "Turkestan Revolutionary Council"
TNC_communism_DEF: "the Turkestan Revolutionary Council"
TNC_communism_ADJ: "Turkestani"
TNC_fascism: "Turkestan National Directorate"
TNC_fascism_DEF: "the Turkestan National Directorate"
TNC_fascism_ADJ: "Turkestani"
TNC_neutrality: "Turkestan National Council"
TNC_neutrality_DEF: "the Turkestan National Council"
TNC_neutrality_ADJ: "Turkestani"
ALA: "Alash Restoration Authority"
ALA_DEF: "the Alash Restoration Authority"
ALA_ADJ: "Alash"
ALA_leader_desc: "Alash Restoration Council governs through a crisis body of teachers, jurists, railway officials, local notables, and mobile guards born from the Soviet Collapse."
chaosx.nr5_custom.19.t: "Alash Restoration Authority Forms"
chaosx.nr5_custom.19.d: "Reports from the Kazakh steppe now describe an Alash Restoration Authority claiming schools, archives, rail stations, and local congresses as the basis of national administration. Moscow calls it an educated separatist network, Basmachi and Turkestan forces test its promises, and foreign observers note that it speaks like a government rather than a camp."
chaosx.nr5_custom.19.a: "The steppe writes another mandate."
ALA_soviet_collapse_focus_tree: "Alash Focus Tree"
ALA_soviet_collapse_focus_tree_desc: "The Alash tree builds a Kazakh steppe authority through congress law, schools, archives, rail stations, mobile guards, foreign recognition, and a dangerous national modernization route."
ala_restoration_council: "Restoration Council"
ala_restoration_council_desc: "The authority derives its first legitimacy from teachers, jurists, local notables, rail officials, and congress delegates who claim the steppe needs national administration rather than Moscow cadres or military chaos."
ala_steppe_congress_rivalries: "Steppe Congress Rivalries"
ala_steppe_congress_rivalries_desc: "Intellectuals, mobile guards, local notables, school boards, and rail officials disagree over how much authority the restoration council should claim."
ala_national_modernization: "National Modernization Mandate"
ala_national_modernization_desc: "The authority turns survival into a late political ambition that forces schools, rails, cavalry guards, and statutes into a wider steppe modernization project."
ala_consolidate_claim: "Consolidate Claim"
ala_consolidate_claim_desc: "Alash authority action shaped by congress law, mobile defense, recognition, rail control, and Soviet crisis pressure."
ala_mobilize_signature_forces: "Mobilize Signature Forces"
ala_mobilize_signature_forces_desc: "Alash authority action shaped by congress law, mobile defense, recognition, rail control, and Soviet crisis pressure."
ala_push_extreme_route: "Push Extreme Route"
ala_push_extreme_route_desc: "Alash authority action shaped by congress law, mobile defense, recognition, rail control, and Soviet crisis pressure."
ala_convene_steppe_congress: "Convene the Steppe Congress"
ala_convene_steppe_congress_desc: "Delegates from the steppe districts gather under Alash statutes, turning scattered autonomy committees into a visible authority."
ala_recruit_local_cavalry_guards: "Recruit Local Cavalry Guards"
ala_recruit_local_cavalry_guards_desc: "Local mounted detachments become the first guard of the restored authority, suited to long lines and thin depots."
ala_protect_schools_and_archives: "Protect Schools and Archives"
ala_protect_schools_and_archives_desc: "Schools, presses, and archives are placed under guard so the authority can claim continuity beyond emergency rule."
ala_negotiate_with_turkestan_councils: "Negotiate with Turkestan Councils"
ala_negotiate_with_turkestan_councils_desc: "The Turkestan councils are approached as partners and rivals, with rail access and recognition traded carefully."
ala_secure_rail_stations: "Secure Rail Stations"
ala_secure_rail_stations_desc: "Station committees and cavalry guards lock down the rail stops that decide whether the steppe can stay supplied."
ala_refuse_moscow_appointed_cadres: "Refuse Moscow-Appointed Cadres"
ala_refuse_moscow_appointed_cadres_desc: "The congress rejects Moscow's appointed cadres and binds local offices to the restoration mandate."
ALA_birth: "Restore the Steppe Authority"
ALA_birth_desc: "The restoration council claims the steppe in the name of Alash memory, local law, and the survival of Kazakh autonomy."
ALA_first_guard: "Raise the Cavalry Guards"
ALA_first_guard_desc: "Mounted guards give the new authority a force able to answer raids and requisition columns across long distances."
ALA_stores: "Audit the Steppe Stores"
ALA_stores_desc: "The council inventories depots, grain stores, and transport animals before rival committees can empty them."
ALA_legitimacy: "Publish the Alash Mandate"
ALA_legitimacy_desc: "A printed mandate ties the emergency government to Alash precedent and local congress law."
ALA_rival: "Name the Rival Cadres"
ALA_rival_desc: "Moscow-appointed cadres and opportunist military committees are named before they can claim the steppe in silence."
ALA_doctrine: "Write Mobile Defense Doctrine"
ALA_doctrine_desc: "Defense plans favor mounted patrols, mobile screens, and withdrawal routes over static lines the authority cannot hold."
ALA_economy: "Schools, Rails, and Ledgers"
ALA_economy_desc: "Teachers, railway accountants, and surviving administrators are folded into one civilian ledger."
ALA_league: "Bargain with the League"
ALA_league_desc: "The authority seeks League guarantees without surrendering its congress mandate to distant republican capitals."
ALA_foreign: "Screen Distant Envoys"
ALA_foreign_desc: "Foreign envoys are screened through the council so arms and recognition do not become a new dependency."
ALA_diplomatic_plan: "Recognition Across Distance"
ALA_diplomatic_plan_desc: "Recognition work turns congress minutes, school records, and rail guarantees into a case for sovereignty."
ALA_inner_faction: "Balance the Congress Factions"
ALA_inner_faction_desc: "Jurists, officers, teachers, and village delegates are forced into a workable congress majority."
ALA_special_arm: "Arm the Local Cavalry"
ALA_special_arm_desc: "The cavalry guards receive the rifles, mounts, and field signals needed to serve as a real arm of state."
ALA_alash_officer_schools: "Alash Officer Schools"
ALA_alash_officer_schools_desc: "Veterans and teachers turn the guards into a school system for mobile defense, not a private militia."
ALA_supply: "Guard the Rail Stations"
ALA_supply_desc: "Rail stations are guarded as political offices and military depots, not just transport points."
ALA_enemy_front: "Prepare the Steppe Front"
ALA_enemy_front_desc: "The council prepares a flexible front against Moscow columns, bandit raids, and rival steppe commands."
ALA_war_plan: "Campaign Across the Steppe"
ALA_war_plan_desc: "Campaign plans treat rail stations, wells, airstrips, and mobile reserves as the true front line of the steppe."
ALA_civil_rule: "Protect Schools and Archives"
ALA_civil_rule_desc: "The restored authority protects schools and archives as proof that the congress is more than a military committee."
ALA_aksakal_mediation: "Aksakal Mediation"
ALA_aksakal_mediation_desc: "Village elders and congress jurists settle local claims before rival commanders can turn every grievance into a front."
ALA_minority_steppe_guarantees: "Minority Steppe Guarantees"
ALA_minority_steppe_guarantees_desc: "Guarantees for non-Kazakh towns, railway workers, and border communities make the authority harder to dismiss as a narrow restoration."
ALA_propaganda: "Print the Steppe Program"
ALA_propaganda_desc: "Pamphlets and proclamations present Alash restoration as law, education, and self-rule rather than revolt alone."
ALA_settlement: "Choose an Autonomy Settlement"
ALA_settlement_desc: "Autonomy terms are drafted for neighbors and foreign observers before Moscow can define the authority as a mutiny."
ALA_radical_turn: "The Radical Modernizers"
ALA_radical_turn_desc: "A younger congress faction demands faster modernization, stricter cadre purges, and a harder border posture."
ALA_industry_plan: "Permanent Steppe Workshops"
ALA_industry_plan_desc: "Permanent workshops give the authority enough repair capacity to keep cavalry, trucks, and rail guards moving."
ALA_hidden_doctrine: "The Sealed Statutes"
ALA_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary congress bargaining cannot hold the steppe together."
ALA_extreme_gate: "Survive into the Endgame"
ALA_extreme_gate_desc: "The authority crosses from restoration into a total modernization mandate, binding law, school, rail, and guard into one project."
ALA_extreme_path: "National Modernization Mandate"
ALA_extreme_path_desc: "Modernizers recast the restoration as a national program that tolerates no Moscow cadre and no passive district."
ALA_endgame: "Endgame Direction"
ALA_endgame_desc: "The steppe authority aims to leave the collapse with schools guarded, rail stations held, and autonomy recognized."
ALA_democratic: "Alash Autonomy Council"
ALA_democratic_DEF: "the Alash Autonomy Council"
ALA_democratic_ADJ: "Alash"
ALA_communism: "Steppe Congress Republic"
ALA_communism_DEF: "the Steppe Congress Republic"
ALA_communism_ADJ: "Steppe Congress"
ALA_fascism: "Alash National Directorate"
ALA_fascism_DEF: "the Alash National Directorate"
ALA_fascism_ADJ: "Alash"
ALA_neutrality: "Alash Restoration Authority"
ALA_neutrality_DEF: "the Alash Restoration Authority"
ALA_neutrality_ADJ: "Alash"
MRC: "Mountain Republic of the Caucasus"
MRC_DEF: "the Mountain Republic of the Caucasus"
MRC_ADJ: "Mountain Republic"
MRC_leader_desc: "The Mountain Republic Council governs through elders, pass guards, and emergency village delegates, claiming that the highland districts can survive only if Moscow's border troops and lowland depots no longer decide their fate."
chaosx.nr5_custom.20.t: "Mountain Republic of the Caucasus Holds the Passes"
chaosx.nr5_custom.20.d: "Reports from the North Caucasus describe a mountain council that has seized the passes, summoned village elders, and rejected Moscow's border detachments. Lowland depots are raided for supplies, Georgian and Azerbaijani contacts are screened through the council, and every road into the highlands is treated as a political frontier."
chaosx.nr5_custom.20.a: "The high roads answer to another council."
MRC_soviet_collapse_focus_tree: "Mountain Republic Focus Tree"
MRC_soviet_collapse_focus_tree_desc: "The Mountain Republic tree turns pass control, elder councils, lowland-depot raids, village autonomy, and Caucasus bargaining into a playable collapse authority."
mrc_mountain_council: "Mountain Council"
mrc_mountain_council_desc: "The authority rests on a mountain council that balances elders, pass guards, village delegates, and emergency officers across the North Caucasus highlands."
mrc_pass_confederation_rivalries: "Pass Confederation Rivalries"
mrc_pass_confederation_rivalries_desc: "Villages, clans, officers, border guards, and lowland contacts all want a different republic, making unity as difficult as the roads themselves."
mrc_mountain_republic_mandate: "Mountain Republic Mandate"
mrc_mountain_republic_mandate_desc: "The council turns survival into a mandate for a lasting mountain republic that controls the passes, protects village autonomy, and bargains with neighboring Caucasus states from a position of armed independence."
mrc_consolidate_claim: "Consolidate Claim"
mrc_consolidate_claim_desc: "Mountain Republic action shaped by elder councils, pass control, village autonomy, recognition, and Soviet crisis pressure."
mrc_mobilize_signature_forces: "Mobilize Signature Forces"
mrc_mobilize_signature_forces_desc: "Mountain Republic action shaped by pass guards, irregular recruits, defensive terrain, and Soviet crisis pressure."
mrc_push_extreme_route: "Push Extreme Route"
mrc_push_extreme_route_desc: "Mountain Republic action shaped by the council's mandate to turn emergency pass control into a lasting highland state."
mrc_close_the_passes: "Close the Passes"
mrc_close_the_passes_desc: "Pass guards close the mountain roads to Moscow columns and rival requisition parties until the council decides who may enter."
mrc_summon_mountain_elders: "Summon Mountain Elders"
mrc_summon_mountain_elders_desc: "Village elders are summoned to bind highland disputes into one emergency council."
mrc_raid_lowland_depots: "Raid Lowland Depots"
mrc_raid_lowland_depots_desc: "Irregular columns descend on exposed lowland depots before Moscow or rival republics can empty them."
mrc_negotiate_with_georgia_or_azerbaijan: "Negotiate with Georgia or Azerbaijan"
mrc_negotiate_with_georgia_or_azerbaijan_desc: "The council screens talks with Georgia and Azerbaijan, trading road security and recognition without surrendering the passes."
mrc_protect_village_autonomy: "Protect Village Autonomy"
mrc_protect_village_autonomy_desc: "The Mountain Republic protects village autonomy so the council can claim legitimacy beyond military necessity."
mrc_reject_moscow_border_troops: "Reject Moscow Border Troops"
mrc_reject_moscow_border_troops_desc: "Moscow's border troops are rejected as another force trying to decide the highlands from outside."
MRC_vladikavkaz_assembly_records: "Vladikavkaz Assembly Records"
MRC_vladikavkaz_assembly_records_desc: "Assembly records from Vladikavkaz give the council a legal memory older than the emergency telegrams from Moscow."
MRC_terek_field_staff: "Terek Field Staff"
MRC_terek_field_staff_desc: "Defecting officers and pass scouts are organized into a field staff that can coordinate valleys without overruling the villages."
MRC_pass_court_registers: "Pass Court Registers"
MRC_pass_court_registers_desc: "Court registers, depot lists, and road ledgers are copied before rival authorities can erase who controls the highland routes."
MRC_teip_mediation_rolls: "Teip Mediation Rolls"
MRC_teip_mediation_rolls_desc: "Clan and village disputes are written into mediation rolls so the council can bargain before local rivalries turn into armed splits."
MRC_aul_militia_charter: "Aul Militia Charter"
MRC_aul_militia_charter_desc: "Village militia charters tie recruits to local defense duties while giving the council a common command language."
MRC_mountain_market_pledges: "Mountain Market Pledges"
MRC_mountain_market_pledges_desc: "Market pledges bind food, repair work, and pack animals to the republic without letting requisition officers ruin local trust."
MRC_caucasus_pack_train_board: "Caucasus Pack Train Board"
MRC_caucasus_pack_train_board_desc: "The pack train board keeps mules, rails, and improvised depots moving between valleys that no single ministry can command."
MRC_pass_fortress_line: "Pass Fortress Line"
MRC_pass_fortress_line_desc: "The strongest passes receive forts, warning posts, and anti-air crews before Moscow can test the road gates."
MRC_grozny_workshop_bargain: "Grozny Workshop Bargain"
MRC_grozny_workshop_bargain_desc: "Workshop crews accept council protection in exchange for rifles, repairs, and the machinery needed to keep columns supplied."
MRC_sunzha_valley_watch_posts: "Sunzha Valley Watch Posts"
MRC_sunzha_valley_watch_posts_desc: "Watch posts along the Sunzha routes warn the highlands of border troops, lowland raids, and foreign agents."
MRC_winter_pass_columns: "Winter Pass Columns"
MRC_winter_pass_columns_desc: "The winter columns prepare to fight when snow closes the obvious roads and only local guides know the remaining paths."
MRC_argun_rear_area: "Argun Rear Area"
MRC_argun_rear_area_desc: "The Argun rear area becomes a guarded reserve of stores, shelters, and fallback works for a long mountain campaign."
MRC_tiflis_letters: "Tiflis Letters"
MRC_tiflis_letters_desc: "Letters sent through Tiflis seek Caucasus recognition while warning neighbors that the high roads will not become anyone's corridor."
MRC_dagestan_road_guarantees: "Dagestan Road Guarantees"
MRC_dagestan_road_guarantees_desc: "Road guarantees offer trade and safe passage to Dagestan districts that respect the council's border and village law."
MRC_black_sea_transit_protocols: "Black Sea Transit Protocols"
MRC_black_sea_transit_protocols_desc: "Transit protocols with Black Sea contacts create a cautious foreign channel without handing the passes to a patron."
MRC_league_of_passes: "League of Passes"
MRC_league_of_passes_desc: "The council proposes a league office built around pass defense, shared warnings, and a refusal to let one republic dominate the mountains."
MRC_no_border_troops_without_council: "No Border Troops Without Council"
MRC_no_border_troops_without_council_desc: "The hard pass faction declares that no border troop may enter the highlands without council sanction."
MRC_mountain_staff_map: "Mountain Staff Map"
MRC_mountain_staff_map_desc: "A sealed staff map turns village routes, depots, and fallback valleys into a command plan for the republic's harshest hour."
MRC_birth: "Raise the Mountain Council"
MRC_birth_desc: "The Mountain Republic forms around elder councils, pass guards, and village delegates who refuse to let Moscow command the high roads."
MRC_first_guard: "Muster the Pass Guards"
MRC_first_guard_desc: "Pass guards become the first armed proof that the mountain roads answer to the new council."
MRC_stores: "Count the Highland Stores"
MRC_stores_desc: "The council inventories hidden stores, mule routes, rifle caches, and lowland depot access before winter and war expose every shortage."
MRC_legitimacy: "Issue the Highland Mandate"
MRC_legitimacy_desc: "A public mandate frames the emergency council as a mountain republic rather than another temporary defense committee."
MRC_rival: "Name the Lowland Claimants"
MRC_rival_desc: "Lowland commanders, Moscow border officers, and rival republic agents are named before they can claim authority over the passes."
MRC_doctrine: "Write Mountain Defense Doctrine"
MRC_doctrine_desc: "Defense planning favors passes, ambush routes, village scouts, and withdrawal paths that fit the terrain."
MRC_economy: "Roads, Flocks, and Workshops"
MRC_economy_desc: "Road crews, village workshops, herds, and captured depots are folded into one highland supply ledger."
MRC_league: "Bargain with the League"
MRC_league_desc: "League guarantees are useful only if they respect village autonomy and the council's control of the passes."
MRC_foreign: "Screen Caucasus Envoys"
MRC_foreign_desc: "Envoys from Georgia, Azerbaijan, and distant patrons are screened through the council so recognition does not become a new dependency."
MRC_inner_faction: "Balance the Elder Councils"
MRC_inner_faction_desc: "Elders, village guards, irregular officers, and town delegates are forced into one workable highland majority."
MRC_special_arm: "Arm the Mountain Columns"
MRC_special_arm_desc: "Irregular columns receive the rifles, scouts, and signals needed to fight across roads that favor local knowledge."
MRC_supply: "Hold the Pass Depots"
MRC_supply_desc: "Pass depots are guarded as the lifeline between highland autonomy and lowland pressure."
MRC_enemy_front: "Prepare the Border-Troop Front"
MRC_enemy_front_desc: "The council prepares to meet Moscow border troops, lowland reprisals, and rival columns before they reach the villages."
MRC_civil_rule: "Protect Village Autonomy"
MRC_civil_rule_desc: "Village autonomy is protected as the civic foundation that keeps the mountain republic from becoming only a guard command."
MRC_propaganda: "Print the Highland Program"
MRC_propaganda_desc: "Proclamations present the Mountain Republic as local law, pass defense, and survival through self-rule."
MRC_settlement: "Draft a Caucasus Settlement"
MRC_settlement_desc: "Settlement terms define how Georgia, Azerbaijan, and neighboring republics may deal with the council without claiming the highlands."
MRC_radical_turn: "The Hard Pass Faction"
MRC_radical_turn_desc: "A hard pass faction demands stricter road closures, harsher depot raids, and no concessions to Moscow border officers."
MRC_war_plan: "Campaign Through the Passes"
MRC_war_plan_desc: "Campaign plans treat roads, ridges, depots, and village scouts as the true front line."
MRC_industry_plan: "Permanent Highland Workshops"
MRC_industry_plan_desc: "Permanent workshops give the council enough repair capacity to keep rifles, trucks, and mountain columns moving."
MRC_diplomatic_plan: "Recognition from the High Roads"
MRC_diplomatic_plan_desc: "Recognition work turns pass security, village law, and Caucasus bargaining into a case for sovereignty."
MRC_hidden_doctrine: "The Sealed Pass Statutes"
MRC_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary elder bargaining cannot hold the roads together."
MRC_extreme_gate: "Survive into the Endgame"
MRC_extreme_gate_desc: "The Mountain Republic crosses from emergency defense into a total mandate over every pass, village, and border road."
MRC_extreme_path: "Mountain Republic Mandate"
MRC_extreme_path_desc: "The hard pass faction recasts survival as a republic-wide mandate that accepts no Moscow border troop and no passive village."
MRC_endgame: "Endgame Direction"
MRC_endgame_desc: "The Mountain Republic aims to leave the collapse with the passes held, village autonomy protected, and Caucasus recognition secured."
MRC_democratic: "Mountain Republic Council"
MRC_democratic_DEF: "the Mountain Republic Council"
MRC_democratic_ADJ: "Mountain Republic"
MRC_communism: "Caucasus Highland Soviet"
MRC_communism_DEF: "the Caucasus Highland Soviet"
MRC_communism_ADJ: "Highland Soviet"
MRC_fascism: "Caucasus Pass Directorate"
MRC_fascism_DEF: "the Caucasus Pass Directorate"
MRC_fascism_ADJ: "Pass Directorate"
MRC_neutrality: "Mountain Republic of the Caucasus"
MRC_neutrality_DEF: "the Mountain Republic of the Caucasus"
MRC_neutrality_ADJ: "Mountain Republic"
UWD: "Ural Workers' Directorate"
UWD_DEF: "the Ural Workers' Directorate"
UWD_ADJ: "Ural Workers"
UWD_leader_desc: "The Factory Directorate rules through factory committees, protected engineers, worker battalions, and emergency production quotas, claiming that the Ural arsenals must keep running while Moscow and the breakaway republics fight over the union's wreckage."
chaosx.nr5_custom.21.t: "Ural Workers' Directorate Seizes the Arsenals"
chaosx.nr5_custom.21.d: "Factory committees across the Ural industrial belt have placed arms plants, rail depots, and steel allocations under the authority of a workers' directorate. Moscow still needs the region's production, but the Directorate will not release every shipment while its autonomy remains unrecognized."
chaosx.nr5_custom.21.a: "The furnaces answer to their committees."
UWD_soviet_collapse_focus_tree: "Ural Workers' Directorate Focus Tree"
UWD_soviet_collapse_focus_tree_desc: "The Ural Workers' Directorate tree turns factory committees, steel rationing, worker battalions, protected engineers, and arsenal autonomy into a playable collapse authority."
uwd_factory_committee_guard: "Factory Committee Guard"
uwd_factory_committee_guard_desc: "Factory committees guard the workshops, arms plants, rail sidings, and steel stores that keep the Ural industrial belt alive."
uwd_manager_officer_rivalries: "Manager-Officer Rivalries"
uwd_manager_officer_rivalries_desc: "Engineers, plant managers, Red Army officers, party officials, and shop-floor committees all agree that the arsenals must keep working, but not on who commands them."
uwd_arsenal_autonomy_directorate: "Arsenal Autonomy Directorate"
uwd_arsenal_autonomy_directorate_desc: "The Directorate recasts emergency factory control as a sovereign mandate over the Ural arsenals, their shipments, and the worker battalions that defend them."
uwd_consolidate_claim: "Consolidate Claim"
uwd_consolidate_claim_desc: "Ural Workers action shaped by factory committees, arsenal autonomy, steel rationing, recognition, and Soviet crisis pressure."
uwd_mobilize_signature_forces: "Mobilize Signature Forces"
uwd_mobilize_signature_forces_desc: "Ural Workers action shaped by worker battalions, guarded factories, local defense stores, and Soviet crisis pressure."
uwd_push_extreme_route: "Push Extreme Route"
uwd_push_extreme_route_desc: "Ural Workers action shaped by the Directorate's mandate to turn emergency factory control into arsenal sovereignty."
uwd_put_factories_under_committee_guard: "Put Factories under Committee Guard"
uwd_put_factories_under_committee_guard_desc: "Factory committees take armed responsibility for workshops, rail sidings, and armaments plants before outside authorities can seize them."
uwd_ration_steel_for_local_defense: "Ration Steel for Local Defense"
uwd_ration_steel_for_local_defense_desc: "Steel allocations are reserved for local defenses, armored trains, repair shops, and the battalions that protect the arsenals."
uwd_bargain_with_moscow_for_autonomy: "Bargain with Moscow for Autonomy"
uwd_bargain_with_moscow_for_autonomy_desc: "The Directorate offers continued shipments to Moscow in exchange for practical autonomy over factory security and production priorities."
uwd_arm_worker_battalions: "Arm Worker Battalions"
uwd_arm_worker_battalions_desc: "Worker battalions receive rifles, machine tools, repair crews, and command links to defend the industrial belt from requisition columns."
uwd_protect_engineers_from_purges: "Protect Engineers from Purges"
uwd_protect_engineers_from_purges_desc: "Engineers and skilled foremen are placed under committee protection so production survives party investigations, officer vendettas, and panic arrests."
uwd_cut_shipments_until_recognition_arrives: "Cut Shipments until Recognition Arrives"
uwd_cut_shipments_until_recognition_arrives_desc: "Outbound arms shipments are cut to force Moscow, neighboring republics, and foreign observers to treat the Directorate as more than a depot."
UWD_sverdlovsk_factory_records: "Sverdlovsk Factory Records"
UWD_sverdlovsk_factory_records_desc: "Factory records from Sverdlovsk give the Directorate a legal memory of output, contracts, and worker authority before outsiders can rewrite the books."
UWD_perm_field_staff: "Perm Field Staff"
UWD_perm_field_staff_desc: "Workshop guards, rail police, and defecting officers are organized into a staff that can defend plants without silencing the committees."
UWD_tagil_machine_tool_ledger: "Tagil Machine-Tool Ledger"
UWD_tagil_machine_tool_ledger_desc: "Machine tools, repair benches, rail spares, and guarded workshops are copied into a ledger that keeps production from vanishing into requisition columns."
UWD_factory_militia_charter: "Factory Militia Charter"
UWD_factory_militia_charter_desc: "Worker battalions receive a common charter that ties plant defense, rail-yard patrols, and committee orders into one militia system."
UWD_magnitogorsk_steel_quota: "Magnitogorsk Steel Quota"
UWD_magnitogorsk_steel_quota_desc: "Magnitogorsk quotas reserve steel for the Directorate's factories, rail repairs, and local defenses before outside buyers reach the yard gates."
UWD_rail_yard_repair_trust: "Rail-Yard Repair Trust"
UWD_rail_yard_repair_trust_desc: "Rail-yard crews receive committee protection and a shared repair trust to keep trains, depots, and supply nodes moving."
UWD_blast_furnace_guard_posts: "Blast Furnace Guard Posts"
UWD_blast_furnace_guard_posts_desc: "Guard posts, barricades, and airwatch crews protect the furnace districts from requisition columns and bombing raids."
UWD_chelyabinsk_airwatch_yards: "Chelyabinsk Airwatch Yards"
UWD_chelyabinsk_airwatch_yards_desc: "Chelyabinsk yard crews build airwatch stations and emergency landing strips so the arsenal belt can see danger before it reaches the workshops."
UWD_workers_canteen_compact: "Workers' Canteen Compact"
UWD_workers_canteen_compact_desc: "Canteen boards, shift councils, and plant guards agree on rations and dispute rules that keep factory authority from breaking at the meal line."
UWD_kama_foundry_contracts: "Kama Foundry Contracts"
UWD_kama_foundry_contracts_desc: "Kama foundry contracts trade committee guarantees for rifles, machine parts, and the machinery needed to keep the arsenal belt armed."
UWD_trans_ural_dispatch_board: "Trans-Ural Dispatch Board"
UWD_trans_ural_dispatch_board_desc: "The dispatch board coordinates rail yards, guarded stores, and foundry quotas across the Ural line."
UWD_volga_steel_letters: "Volga Steel Letters"
UWD_volga_steel_letters_desc: "Letters to Volga and Siberian authorities present the Directorate as a supplier that must be recognized before its shipments can be counted on."
UWD_league_arsenal_bargain: "League Arsenal Bargain"
UWD_league_arsenal_bargain_desc: "The Directorate offers controlled shipments to League partners in exchange for recognition, anti-puppet guarantees, and respect for committee command."
UWD_rail_belt_armored_patrols: "Rail-Belt Armored Patrols"
UWD_rail_belt_armored_patrols_desc: "Armored patrols move along the rail belt, guarding depots, sidings, and factory gates against every force that sees the Urals as a warehouse."
UWD_kurgan_rear_area: "Kurgan Rear Area"
UWD_kurgan_rear_area_desc: "Kurgan becomes a rear area of guarded stores, repair shelters, and fallback depots for a long industrial war."
UWD_no_shipments_without_council: "No Shipments Without Council"
UWD_no_shipments_without_council_desc: "The hard furnace faction declares that no arms shipment leaves the Urals without committee approval."
UWD_committee_staff_map: "Committee Staff Map"
UWD_committee_staff_map_desc: "A sealed staff map turns workshops, rail yards, depots, and fallback plants into a command plan for the Directorate's harshest hour."
UWD_arsenal_federation_terms: "Arsenal Federation Terms"
UWD_arsenal_federation_terms_desc: "Federation terms define how nearby republics may buy, guard, and receive Ural output without commanding the factories."
UWD_industrial_neutrality_statute: "Industrial Neutrality Statute"
UWD_industrial_neutrality_statute_desc: "A neutrality statute promises controlled production and guarded transit while refusing to make the arsenal belt a puppet supply district."
UWD_ural_factory_endurance: "Ural Factory Endurance"
UWD_ural_factory_endurance_desc: "Endurance plans bind foundries, depots, canteens, airwatch crews, and worker battalions into an industrial authority built to survive the collapse."
UWD_birth: "Raise the Factory Directorate"
UWD_birth_desc: "Factory committees in the Urals form a Directorate to keep the arsenals running while every outside authority demands their output."
UWD_first_guard: "Muster the Workshop Guards"
UWD_first_guard_desc: "Workshop guards become the first armed shield around the plants, depots, and rail yards."
UWD_stores: "Count the Steel Stores"
UWD_stores_desc: "The Directorate inventories steel, coal, machine tools, rifles, repair parts, and rolling stock before the next requisition order empties them."
UWD_legitimacy: "Issue the Arsenal Mandate"
UWD_legitimacy_desc: "A public mandate frames factory control as a duty to preserve industry rather than a temporary mutiny."
UWD_rival: "Name the Requisition Committees"
UWD_rival_desc: "Moscow envoys, breakaway quartermasters, plant bosses, and party inspectors are named before they can claim the Ural arsenals."
UWD_doctrine: "Write Industrial Defense Doctrine"
UWD_doctrine_desc: "Defense doctrine treats workshops, rail chokepoints, armored trains, and guarded depots as the real line of battle."
UWD_economy: "Furnaces, Rails, and Canteens"
UWD_economy_desc: "Furnaces, rail shops, canteens, and arms lines are folded into one emergency industrial ledger."
UWD_league: "Bargain with the League"
UWD_league_desc: "League contacts are useful only if they understand that the arsenals will not become another foreign warehouse."
UWD_foreign: "Screen Industrial Envoys"
UWD_foreign_desc: "Envoys seeking steel, rifles, or recognition are screened through the Directorate before they reach plant committees."
UWD_inner_faction: "Balance Managers and Committees"
UWD_inner_faction_desc: "Managers, engineers, worker delegates, officers, and party men are forced into one uneasy production majority."
UWD_special_arm: "Arm the Worker Battalions"
UWD_special_arm_desc: "Worker battalions receive the weapons, repair crews, and plant maps needed to defend the industrial belt."
UWD_security_school: "Factory Security School"
UWD_security_school_desc: "Workshop guards, rail police, engineers, and veteran machinists teach the battalions how to seal yards, screen requisition columns, and keep arms lines running under fire."
UWD_supply: "Hold the Rail Depots"
UWD_supply_desc: "Rail depots are guarded as the hinge between factory autonomy and the wider collapse."
UWD_enemy_front: "Prepare the Requisition Front"
UWD_enemy_front_desc: "The Directorate prepares for Moscow columns, breakaway seizures, and desperate commanders who see the Urals only as supply."
UWD_civil_rule: "Protect Committee Authority"
UWD_civil_rule_desc: "Committee authority is protected so the Directorate remains a civic production regime rather than only a guard command."
UWD_shift_council_mediation: "Shift Council Mediation"
UWD_shift_council_mediation_desc: "Shift councils, engineers, canteen boards, and guard captains settle plant disputes before production discipline turns into private command."
UWD_output_guarantees: "Output Guarantee Statutes"
UWD_output_guarantees_desc: "Written guarantees bind rifle output, rail schedules, engineer protections, worker rations, and League promises into an industrial settlement other powers can trust."
UWD_propaganda: "Print the Workers' Program"
UWD_propaganda_desc: "Proclamations present the Ural Workers' Directorate as production discipline, committee law, and survival through factory autonomy."
UWD_settlement: "Draft an Arsenal Settlement"
UWD_settlement_desc: "Settlement terms define how Moscow and neighboring republics may receive shipments without claiming command over the plants."
UWD_radical_turn: "The Hard Furnace Faction"
UWD_radical_turn_desc: "A hard furnace faction demands stricter shipment cuts, deeper committee control, and no concessions to outside requisition boards."
UWD_war_plan: "Campaign along the Rail Belt"
UWD_war_plan_desc: "Campaign plans treat rail yards, arms factories, depots, and steel works as one defended front."
UWD_industry_plan: "Permanent Arsenal Councils"
UWD_industry_plan_desc: "Permanent arsenal councils give committees, engineers, and guard commanders enough structure to keep production alive."
UWD_diplomatic_plan: "Recognition through Production"
UWD_diplomatic_plan_desc: "Recognition work turns industrial output, guarded depots, and controlled shipments into a case for autonomy."
UWD_hidden_doctrine: "The Sealed Factory Statutes"
UWD_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary committee bargaining cannot protect the arsenals."
UWD_extreme_gate: "Survive into the Endgame"
UWD_extreme_gate_desc: "The Ural Workers' Directorate crosses from factory defense into a total mandate over every furnace, rail depot, and arms shipment."
UWD_extreme_path: "Arsenal Autonomy Mandate"
UWD_extreme_path_desc: "The hard furnace faction recasts survival as a directorate-wide mandate that accepts no requisition column and no passive factory."
UWD_endgame: "Endgame Direction"
UWD_endgame_desc: "Guarded plants, security schools, output guarantees, sealed statutes, and recognition channels bind the Ural arsenal belt into an authority no outside requisition board can command."
