FEV: "Far Eastern Republic Revival"
FEV_DEF: "the Far Eastern Republic Revival"
FEV_ADJ: "Far Eastern"
FEV_leader_desc: "The Far Eastern Buffer Committee governs from port offices, rail guards, local officers, and cautious liaison rooms that claim the Pacific edge can survive only by keeping war away from the tracks and docks."
chaosx.nr5_custom.16.t: "Far Eastern Republic Revival Guards the Pacific Line"
chaosx.nr5_custom.16.d: "Reports from Vladivostok and Khabarovsk now identify a Far Eastern buffer authority claiming emergency control over ports, rail stations, docks, and liaison offices. Its committee denies being a Japanese puppet, but Japanese officers, Chinese observers, local rail guards, and Moscow's remaining agents all crowd the same frontier. The new republic says the Far East will keep food, trade, and rail movement alive while the western union war decides its own fate."
chaosx.nr5_custom.16.a: "The Pacific line answers to its own committee."
FEV_soviet_collapse_focus_tree: "Far Eastern Republic Revival Focus Tree"
FEV_soviet_collapse_focus_tree_desc: "The Far Eastern Republic Revival tree follows buffer authority, railway guards, port access, Japanese liaison pressure, Vladivostok docks, strict neutrality, and a late Far Eastern Line Command route that turns distance into regional sovereignty."
fev_buffer_committee_authority: "Buffer Committee Authority"
fev_buffer_committee_authority_desc: "Port officials, rail delegates, local officers, and emergency committees claim authority over the Far Eastern line while Moscow, Japan, and neighboring powers test the frontier."
fev_liaison_office_tensions: "Liaison Office Tensions"
fev_liaison_office_tensions_desc: "Japanese officers, Chinese observers, League envoys, railway unions, and local commanders crowd the same rooms without agreeing who the buffer actually serves."
fev_far_eastern_line_command: "Far Eastern Line Command"
fev_far_eastern_line_command_desc: "The republic turns rail and port defense into a command claim across the Pacific frontier, treating every unapproved military mission as a threat to the line."
fev_consolidate_claim: "Consolidate the Buffer Committee"
fev_consolidate_claim_desc: "Bind port offices, railway guards, and local officer councils into a firmer provisional authority shaped by stability, recognition, and crisis pressure."
fev_mobilize_signature_forces: "Mobilize Railway Guards"
fev_mobilize_signature_forces_desc: "Raise railway and dock detachments from local guards, depot access, and wartime pressure."
fev_push_extreme_route: "Declare Far Eastern Line Command"
fev_push_extreme_route_desc: "Commit the republic to its hardline route, turning distance and rail control into a Pacific frontier command claim."
fev_secure_trans_siberian_line: "Secure the Trans-Siberian Line"
fev_secure_trans_siberian_line_desc: "Guard bridges, sidings, depots, repair shops, and switchyards so neither Moscow nor foreign staffs can sever the eastern lifeline."
fev_form_buffer_government: "Form a Buffer Government"
fev_form_buffer_government_desc: "Write emergency statutes that present the republic as a temporary buffer authority rather than a puppet or another western belligerent."
fev_negotiate_japanese_liaison_officers: "Negotiate Japanese Liaison Officers"
fev_negotiate_japanese_liaison_officers_desc: "Receive Japanese officers under strict rules, extracting information and deterrence without surrendering command over the ports and railways."
fev_protect_vladivostok_docks: "Protect Vladivostok's Docks"
fev_protect_vladivostok_docks_desc: "Guard warehouses, piers, fuel stores, and naval approaches so the Pacific port remains open to trade and closed to seizure."
fev_recruit_railway_guards: "Recruit Railway Guards"
fev_recruit_railway_guards_desc: "Enroll rail workers, station guards, and local veterans into mobile detachments that can defend trains before regular armies arrive."
fev_declare_neutrality_in_western_union_war: "Declare Neutrality in the Western Union War"
fev_declare_neutrality_in_western_union_war_desc: "Announce that Far Eastern trains and ports will not be spent on a western war unless the republic itself is attacked."
FEV_birth: "The Buffer Committee Meets"
FEV_birth_desc: "The Far Eastern Buffer Committee forms from port officials, rail guards, local officers, and emergency delegates who refuse to let distant capitals decide the Pacific line."
FEV_first_guard: "Raise Railway Guards"
FEV_first_guard_desc: "Rail workers, station guards, and local veterans receive rifles and command papers so the eastern line can defend itself before larger armies arrive."
FEV_stores: "Keep the Ports Open"
FEV_stores_desc: "Food stores, warehouses, fuel tanks, and dock ledgers stay under local control so trade continues despite the crisis around Moscow."
FEV_legitimacy: "Mandate from the Eastern Rails"
FEV_legitimacy_desc: "Delegates define who controls trains, ports, repair shops, and liaison offices, turning emergency management into provisional law."
FEV_rival: "No Orders from Distant Moscow"
FEV_rival_desc: "The committee names its enemy as every staff that treats the Far East as a reserve to be spent from thousands of kilometers away."
FEV_doctrine: "Port and Rail Defense"
FEV_doctrine_desc: "Railway guards codify port security, junction defense, armored train screens, and withdrawal by timetable into doctrine suited to the Pacific frontier."
FEV_economy: "Pacific Trade Ledgers"
FEV_economy_desc: "Trade ledgers keep docks, customs houses, warehouses, and repair shops working without surrendering them to outside army accountants."
FEV_league: "A Distant Seat in the League"
FEV_league_desc: "The republic tests whether the League can protect a Pacific buffer or merely use its name on maps too far from its armies."
FEV_foreign: "Screen Japanese Liaison Officers"
FEV_foreign_desc: "Japanese offers, Chinese messages, League notes, and foreign trade guarantees are screened before assistance becomes command."
FEV_inner_faction: "Balance Officers and Rail Workers"
FEV_inner_faction_desc: "Port officials, railway unions, local officers, and liaison committees settle who directs the buffer authority's next phase."
FEV_special_arm: "Recruit Railway Guards"
FEV_special_arm_desc: "Station guards and mobile railway detachments receive captured rifles, local maps, and emergency signals for line defense."
FEV_supply: "Secure the Trans-Siberian Line"
FEV_supply_desc: "Sidings, depots, bridges, and repair points are guarded so outsiders cannot turn the eastern railway into an open military corridor."
FEV_enemy_front: "Guard the Pacific Approaches"
FEV_enemy_front_desc: "The committee prepares scouts, coastal watches, and rail screens before foreign armies or Soviet columns reach the approaches."
FEV_civil_rule: "Buffer Government Statutes"
FEV_civil_rule_desc: "Emergency statutes protect port courts, customs offices, schools, rail councils, and local delegates while armies gather nearby."
FEV_propaganda: "The Far East Keeps Moving"
FEV_propaganda_desc: "Broadcasts present the republic as a working buffer that keeps trains, food, and ports moving while others fight over Moscow's silence."
FEV_settlement: "Strict Neutrality Charter"
FEV_settlement_desc: "A moderate route writes neutrality, port access, rail defense, and liaison limits into a charter that keeps the republic out of western wars."
FEV_radical_turn: "No Western War on Eastern Rails"
FEV_radical_turn_desc: "The radical wing argues that no western staff, Soviet or republican, may spend Far Eastern trains without the committee's consent."
FEV_war_plan: "Port-Rail War Plan"
FEV_war_plan_desc: "Campaign planning centers on port denial, junction defense, false timetables, depot evacuation, and fast concentration around threatened stations."
FEV_industry_plan: "Dockyards and Repair Shops"
FEV_industry_plan_desc: "Dockyards, machine shops, warehouses, and rail workshops keep the guards supplied without depending on distant factories."
FEV_diplomatic_plan: "Talks with Siberian Authorities"
FEV_diplomatic_plan_desc: "The committee bargains with Siberian authorities over rail transit, trade, recognition, and frontier calm while guarding against dependency."
FEV_vladivostok_harbor_board: "Vladivostok Harbor Board"
FEV_vladivostok_harbor_board_desc: "Dock engineers, customs officers, and railway accountants bind Vladivostok's harbor works to the republic's guarded timetable."
FEV_amur_buffer_posts: "Amur Buffer Posts"
FEV_amur_buffer_posts_desc: "Forward posts along the Amur approaches receive field stores, local signals, and fixed defenses before the frontier becomes another disputed corridor."
FEV_pacific_observer_missions: "Pacific Observer Missions"
FEV_pacific_observer_missions_desc: "Foreign observers, Siberian delegates, and League couriers are allowed into controlled rooms where recognition can grow without handing them command."
FEV_hidden_doctrine: "The Sealed Eastern Timetables"
FEV_hidden_doctrine_desc: "Sealed timetables record hidden sidings, bridge guards, dock stores, and emergency routes that can be closed before outside staffs understand the line."
FEV_extreme_gate: "Survive the Liaison Crisis"
FEV_extreme_gate_desc: "When the committee survives a major liaison or port crisis, provisional buffer control hardens into a broader Pacific claim."
FEV_extreme_path: "Far Eastern Line Command"
FEV_extreme_path_desc: "The extreme path turns the republic from a defensive buffer into a command that dictates who may move between port, rail, and frontier."
FEV_endgame: "A Buffer Beyond Moscow"
FEV_endgame_desc: "The endgame direction binds ports, railways, liaison rooms, and local guards into a Far Eastern order strong enough to bargain with every neighbor and obey none."
FEV_democratic: "Far Eastern Republic Revival"
FEV_democratic_DEF: "the Far Eastern Republic Revival"
FEV_democratic_ADJ: "Far Eastern"
FEV_communism: "Far Eastern Rail Commune"
FEV_communism_DEF: "the Far Eastern Rail Commune"
FEV_communism_ADJ: "Far Eastern"
FEV_fascism: "Far Eastern Line Command"
FEV_fascism_DEF: "the Far Eastern Line Command"
FEV_fascism_ADJ: "Far Eastern"
FEV_neutrality: "Far Eastern Republic Revival"
FEV_neutrality_DEF: "the Far Eastern Republic Revival"
FEV_neutrality_ADJ: "Far Eastern"
SZA: "Siberian Zemstvo Authority"
SZA_DEF: "the Siberian Zemstvo Authority"
SZA_ADJ: "Siberian Zemstvo"
SZA_leader_desc: "The Siberian Regional Assembly governs through city offices, zemstvo committees, depot clerks, rail guards, and local officers who claim Siberia will not be requisitioned for a state that may no longer exist."
chaosx.nr5_custom.17.t: "Siberian Zemstvo Authority Convenes the Cities"
chaosx.nr5_custom.17.d: "Reports from Omsk, Tomsk, and Irkutsk now identify a Siberian Zemstvo Authority speaking in the language of temporary administration, rail protection, depot law, and city guards. Its assembly claims it will keep order across the Siberian depth until Moscow proves it can govern again. Moscow calls the paperwork treason, foreign observers see a corridor that might survive the union war, and local officers ask whether the committee can pay them before the next requisition order arrives."
chaosx.nr5_custom.17.a: "The Siberian cities sign their own orders."
SZA_soviet_collapse_focus_tree: "Siberian Zemstvo Authority Focus Tree"
SZA_soviet_collapse_focus_tree_desc: "The Siberian Zemstvo Authority tree follows regional assembly law, Trans-Siberian depot control, city guards, Ural and Far Eastern bargaining, temporary neutrality, refusal of western requisitions, and a late Siberian Depth Command route."
sza_zemstvo_authority: "Zemstvo Authority"
sza_zemstvo_authority_desc: "City offices, regional assemblies, rail committees, and depot clerks claim temporary legal authority across Siberia while larger governments fight over whether the union still exists."
sza_city_guard_compromises: "City Guard Compromises"
sza_city_guard_compromises_desc: "Local officers, railway guards, factory committees, merchants, and zemstvo delegates share authority uneasily because no single faction can defend the Siberian cities alone."
sza_siberian_depth_command: "Siberian Depth Command"
sza_siberian_depth_command_desc: "The authority turns administrative depth into a command claim, using distance, rail depots, and city guards to deny every outside requisition without consent."
sza_consolidate_claim: "Consolidate the Zemstvo Authority"
sza_consolidate_claim_desc: "Bind city offices, rail committees, and local officer councils into a firmer provisional authority shaped by stability, recognition, and crisis pressure."
sza_mobilize_signature_forces: "Mobilize City Guards"
sza_mobilize_signature_forces_desc: "Raise city and rail detachments from local guards, depot access, and wartime pressure."
sza_push_extreme_route: "Declare Siberian Depth Command"
sza_push_extreme_route_desc: "Commit the authority to its hardline route, turning distance and rail control into a regional command claim."
sza_convene_regional_assembly: "Convene the Regional Assembly"
sza_convene_regional_assembly_desc: "Gather city delegates, rail clerks, legal committees, and local officers into a temporary assembly that can issue orders in Siberia's name."
sza_secure_trans_siberian_depots: "Secure the Trans-Siberian Depots"
sza_secure_trans_siberian_depots_desc: "Guard rail depots, switchyards, repair shops, and grain stores so the eastern line cannot be stripped by distant army staffs."
sza_recruit_city_guards: "Recruit City Guards"
sza_recruit_city_guards_desc: "Enroll police, rail workers, veterans, and factory guards into city detachments that can hold stations before regular armies arrive."
sza_bargain_with_ural_and_far_eastern_authorities: "Bargain with Ural and Far Eastern Authorities"
sza_bargain_with_ural_and_far_eastern_authorities_desc: "Open careful talks with industrial committees and Pacific buffers over transit, recognition, supply, and neutrality without surrendering Siberian law."
sza_declare_temporary_neutrality: "Declare Temporary Neutrality"
sza_declare_temporary_neutrality_desc: "Announce that Siberian cities will keep order and rail transit without spending men and grain on a western war unless the authority itself is attacked."
sza_refuse_western_requisition_orders: "Refuse Western Requisition Orders"
sza_refuse_western_requisition_orders_desc: "Reject orders that strip Siberian depots for distant fronts, forcing Moscow, republics, and foreign missions to bargain with the assembly."
SZA_birth: "The Regional Assembly Meets"
SZA_birth_desc: "The Siberian Regional Assembly forms from city offices, rail committees, depot clerks, and local officers who refuse to send Siberia's stores west on uncertain orders."
SZA_first_guard: "Raise City Guards"
SZA_first_guard_desc: "Police, rail workers, factory guards, and veterans receive rifles and command papers so Siberian cities can protect stations and warehouses."
SZA_stores: "Keep the Depots Accounted"
SZA_stores_desc: "Grain, coal, repair tools, and arms stores remain under local ledgers until the assembly knows who can legitimately requisition them."
SZA_legitimacy: "Mandate of the Zemstvos"
SZA_legitimacy_desc: "Delegates define who controls city offices, rail stations, depots, and court records, turning emergency administration into provisional law."
SZA_rival: "No Requisitions for a Broken State"
SZA_rival_desc: "The authority names its enemy as every staff that treats Siberia as a warehouse to be emptied before the cities can defend themselves."
SZA_doctrine: "Depth and Rail Defense"
SZA_doctrine_desc: "City guards codify station defense, rail denial, depot evacuation, and withdrawal by distance into doctrine suited to Siberian geography."
SZA_economy: "Siberian City Ledgers"
SZA_economy_desc: "City ledgers keep workshops, markets, depots, and rail repairs working without surrendering them to outside army accountants."
SZA_league: "A Legal Seat in the League"
SZA_league_desc: "The authority tests whether the League can respect Siberian legal autonomy or merely wants another corridor against Moscow."
SZA_foreign: "Screen Corridor Missions"
SZA_foreign_desc: "Foreign offers, railway observers, and trade guarantees are screened before a corridor becomes a leash around the assembly."
SZA_inner_faction: "Balance Officers and Zemstvos"
SZA_inner_faction_desc: "Local officers, city delegates, railway unions, and depot clerks settle who directs the authority's next phase."
SZA_special_arm: "Recruit City Guards"
SZA_special_arm_desc: "Station guards and city detachments receive captured rifles, local maps, and emergency signals for depot defense."
SZA_supply: "Secure the Trans-Siberian Depots"
SZA_supply_desc: "Depots, sidings, repair shops, and storehouses are guarded so outsiders cannot turn Siberia into an open requisition corridor."
SZA_enemy_front: "Guard the Western Approaches"
SZA_enemy_front_desc: "The assembly prepares scouts, rail screens, and city posts before Soviet columns, breakaway armies, or foreign missions reach the line."
SZA_civil_rule: "Temporary Zemstvo Statutes"
SZA_civil_rule_desc: "Emergency statutes protect city courts, schools, market offices, rail councils, and local delegates while armies gather nearby."
SZA_propaganda: "Siberia Will Not Be Emptied"
SZA_propaganda_desc: "Broadcasts present the authority as a legal shield against requisitions, evacuation orders, and every army that wants stores without consent."
SZA_settlement: "Temporary Neutrality Charter"
SZA_settlement_desc: "A moderate route writes neutrality, depot law, rail defense, and liaison limits into a charter that keeps Siberian men out of western wars."
SZA_radical_turn: "Every Depot Under Assembly Law"
SZA_radical_turn_desc: "The radical wing argues that any unapproved requisition is an invasion, whether the paper bears a Soviet, republican, or foreign seal."
SZA_war_plan: "Depth Defense Plan"
SZA_war_plan_desc: "Campaign planning centers on distance, rail denial, false ledgers, depot evacuation, and fast concentration around threatened cities."
SZA_industry_plan: "Workshops of the Siberian Cities"
SZA_industry_plan_desc: "Workshops, repair yards, machine shops, and guarded warehouses keep the city guards supplied without depending on distant factories."
SZA_diplomatic_plan: "Talks Across the Rails"
SZA_diplomatic_plan_desc: "The assembly bargains with Ural, Kazakh, and Far Eastern authorities over rail transit, trade, recognition, and frontier calm."
SZA_tomsk_omsk_switchyards: "Tomsk-Omsk Switchyards"
SZA_tomsk_omsk_switchyards_desc: "Switchyard guards, repair crews, and depot clerks keep the Tomsk-Omsk line supplied so the authority can move trains before outsiders can requisition them."
SZA_irkutsk_depth_stores: "Irkutsk Depth Stores"
SZA_irkutsk_depth_stores_desc: "Irkutsk warehouses and guarded sidings hold rifles, support gear, and reserve posts beyond the first line of seizure orders."
SZA_yenisei_city_federation: "Yenisei City Federation"
SZA_yenisei_city_federation_desc: "City delegates along the Yenisei bind courts, markets, depots, and rail offices into a federation that speaks for Siberia before any patron can speak over it."
SZA_hidden_doctrine: "The Sealed Depot Ledgers"
SZA_hidden_doctrine_desc: "Sealed ledgers record hidden stores, sidings, bridge guards, and emergency routes that can be closed before outside staffs understand the line."
SZA_extreme_gate: "Survive the Requisition Crisis"
SZA_extreme_gate_desc: "When the assembly survives a major requisition or city-guard crisis, provisional legal authority hardens into a broader Siberian claim."
SZA_extreme_path: "Siberian Depth Command"
SZA_extreme_path_desc: "The extreme path turns the authority from a defensive assembly into a command that dictates who may move between city, depot, and rail frontier."
SZA_endgame: "A State Beyond the Urals"
SZA_endgame_desc: "The endgame direction binds city offices, rail depots, legal committees, and local guards into a Siberian order strong enough to bargain with every neighbor and obey none."
SZA_democratic: "Siberian Zemstvo Authority"
SZA_democratic_DEF: "the Siberian Zemstvo Authority"
SZA_democratic_ADJ: "Siberian Zemstvo"
SZA_communism: "Siberian City Soviet Authority"
SZA_communism_DEF: "the Siberian City Soviet Authority"
SZA_communism_ADJ: "Siberian Soviet"
SZA_fascism: "Siberian Depth Command"
SZA_fascism_DEF: "the Siberian Depth Command"
SZA_fascism_ADJ: "Siberian Command"
SZA_neutrality: "Siberian Zemstvo Authority"
SZA_neutrality_DEF: "the Siberian Zemstvo Authority"
SZA_neutrality_ADJ: "Siberian Zemstvo"
TNC: "Turkestan National Council"
TNC_DEF: "the Turkestan National Council"
TNC_ADJ: "Turkestani"
TNC_leader_desc: "Turkestan Civic Council governs through a crisis body of reformers, railway officials, school boards, and oasis notables born from the Soviet Collapse."
chaosx.nr5_custom.18.t: "Turkestan National Council Forms"
chaosx.nr5_custom.18.d: "Reports from Central Asia now identify the Turkestan National Council as more than a committee. Its public claim centers on city offices, school boards, guarded rails, oasis negotiations, autonomy charters, and recognition channels. Moscow calls it separatist, traditional insurgents question its authority, and foreign observers find it easier to read than the older war bands."
chaosx.nr5_custom.18.a: "Another office becomes a state."
TNC_soviet_collapse_focus_tree: "Turkestan Focus Tree"
TNC_soviet_collapse_focus_tree_desc: "The Turkestan tree builds a civic Central Asian authority through guarded railways, school boards, autonomy charters, oasis bargains, foreign recognition, and a dangerous New Turkestan route."
tnc_city_council_authority: "City Council Authority"
tnc_city_council_authority_desc: "The council derives its first legitimacy from city offices, school boards, guarded rails, and autonomy circles. It is dangerous because it can speak the language of administration while Moscow is losing the ability to govern."
tnc_oasis_bureau_rivalries: "Oasis Bureau Rivalries"
tnc_oasis_bureau_rivalries_desc: "Reformers, oasis notables, railway officers, school boards, and local guards disagree over how much authority the council should claim."
tnc_new_turkestan: "A New Turkestan"
tnc_new_turkestan_desc: "The council turns survival into a late political ambition that reaches beyond emergency autonomy and toward a wider Central Asian order."
tnc_consolidate_claim: "Consolidate Claim"
tnc_consolidate_claim_desc: "Bind local councils, guards, and foreign contacts into a firmer claim shaped by stability, recognition, and crisis pressure."
tnc_mobilize_signature_forces: "Mobilize Signature Forces"
tnc_mobilize_signature_forces_desc: "Raise signature forces from local control, depot access, and wartime pressure, with stronger returns while fighting Moscow."
tnc_push_extreme_route: "Push Extreme Route"
tnc_push_extreme_route_desc: "Commit the authority to its hardline route, drawing strength from high-chaos pressure and forcing its claim into the wider collapse."
tnc_secure_tashkent_offices: "Secure Tashkent Offices"
tnc_secure_tashkent_offices_desc: "Turn the old administrative offices into a working council network, improving stability and recognition while weakening Moscow's claim to normal authority."
tnc_recruit_railway_guards: "Recruit Railway Guards"
tnc_recruit_railway_guards_desc: "Arm station police, depot watchmen, and rail workers so the council can defend the lines that make its authority real."
tnc_negotiate_with_oasis_leaders: "Negotiate with Oasis Leaders"
tnc_negotiate_with_oasis_leaders_desc: "Bring oasis notables and rural committees into the council without letting them dissolve the civic program."
tnc_publish_autonomy_charter: "Publish the Autonomy Charter"
tnc_publish_autonomy_charter_desc: "Declare a legal autonomy program that foreign observers can recognize and Moscow cannot easily dismiss as banditry."
tnc_request_recognition_from_muslim_and_neutral_states: "Request Muslim and Neutral Recognition"
tnc_request_recognition_from_muslim_and_neutral_states_desc: "Seek recognition from Muslim and neutral governments without trading the council into another power's dependency."
tnc_form_central_asian_defense_council: "Form a Central Asian Defense Council"
tnc_form_central_asian_defense_council_desc: "Coordinate Central Asian defense through a civic council structure that can reinforce the Steppe Federation route if conditions allow."
TNC_birth: "Secure the Civic Claim"
TNC_birth_desc: "Turkestan National Council turns city offices, school boards, rail desks, and autonomy circles into a functioning emergency authority. The first choice is whether the council remains a negotiation body or becomes a government others must answer."
TNC_first_guard: "Raise the Railway Guard"
TNC_first_guard_desc: "The first guard draws from station police, depot clerks, and former local units. It gives the council enough field power to survive the first Soviet counter-order instead of collapsing into minutes."
TNC_stores: "Inventory the City Stores"
TNC_stores_desc: "Depots, food stores, radio rooms, and transport yards are inventoried before rivals can seize them. This shifts the playstyle toward prepared defense and administrative survival."
TNC_legitimacy: "Publish the Autonomy Charter"
TNC_legitimacy_desc: "The council defines who may speak for Turkestan and which law survived the Union. Stability rises, but the answer narrows later political routes."
TNC_rival: "Name the Rival"
TNC_rival_desc: "The enemy is named as Moscow requisitions, rival insurgent columns, and border garrisons. The focus clarifies war priorities and decides whether nearby breakaways are partners, obstacles, or future fronts."
TNC_doctrine: "Write the Civic Doctrine"
TNC_doctrine_desc: "Commanders turn the founding charter into battlefield doctrine. The army becomes better organized around guarded rails, defended towns, and limited offensives."
TNC_economy: "Make the Offices Work"
TNC_economy_desc: "Workshops, farms, schools, and requisition boards are forced into one crisis economy. Industry improves at the cost of making the regime harder to unwind."
TNC_league: "Bargain with the League"
TNC_league_desc: "Envoys test whether the Free Republics' League is shield, rival, or marketplace. The choice can build defensive coordination without surrendering the council's identity."
TNC_foreign: "Screen Foreign Envoys"
TNC_foreign_desc: "Foreign missions are screened for weapons, recognition, spies, and traps. The route rewards outside access while increasing the risk of dependency."
TNC_inner_faction: "Balance the Oasis Bureaus"
TNC_inner_faction_desc: "The internal balance among city reformers, oasis notables, railway officers, and school boards is settled for now. One faction gains the right to define the next stage of the state."
TNC_special_arm: "Arm the Railway Guards"
TNC_special_arm_desc: "The regime arms railway guards, depot watchmen, and city-defense detachments as its signature branch. This is the military route for players who want the tag to fight like itself, not like a generic republic."
TNC_supply: "Control the Oasis Routes"
TNC_supply_desc: "Routes, bridges, rails, canals, and passes become political territory. The tag can hold out longer and project power through logistics rather than raw manpower."
TNC_enemy_front: "Prepare the Steppe Front"
TNC_enemy_front_desc: "Plans are drawn for the most likely enemy front. The focus links the internal crisis to concrete offensive or defensive preparation."
TNC_civil_rule: "Rule Through School Boards"
TNC_civil_rule_desc: "Civilian administration is formalized under emergency conditions. The state becomes more stable, but its committees and offices gain interests of their own."
TNC_propaganda: "Speak to the Former Union"
TNC_propaganda_desc: "Broadcasts and manifestos speak to the former Union. This helps spread sympathizers, volunteers, and fear beyond the starting states."
TNC_settlement: "Choose a Settlement"
TNC_settlement_desc: "A moderate settlement route defines what victory looks like short of total transformation. It is the path for survival, recognition, and durable borders."
TNC_radical_turn: "The Radical Turn"
TNC_radical_turn_desc: "The radical wing argues that survival proves the old rules are dead. Taking this focus opens the route toward the council's most dangerous politics."
TNC_war_plan: "Campaign Beyond the Oasis"
TNC_war_plan_desc: "War plans move beyond the birthplace. Claims, volunteers, and command structures prepare the country for a wider campaign."
TNC_industry_plan: "Permanent City Arsenal"
TNC_industry_plan_desc: "A permanent arsenal is built around the council's political economy. Production becomes a long-term identity rather than a temporary emergency."
TNC_diplomatic_plan: "A Seat or a Threat"
TNC_diplomatic_plan_desc: "Diplomacy decides whether the tag seeks a seat, a protector, a league, or a threat posture. The answer shapes late-game friends and enemies."
TNC_hidden_doctrine: "The Sealed Charter"
TNC_hidden_doctrine_desc: "The sealed charter admits what the public program cannot. The state prepares a hardline route that only survives under collapse conditions."
TNC_extreme_gate: "Survive into the Endgame"
TNC_extreme_gate_desc: "The regime survives long enough to attempt a maximal program. High chaos turns the founding claim into a program for the whole former Union."
TNC_extreme_path: "A New Turkestan"
TNC_extreme_path_desc: "The extreme path tries to turn city councils, oasis notables, and railway guards into the skeleton of a vast Central Asian order. It is powerful, destabilizing, and meant for campaigns where normal settlement has already failed."
TNC_endgame: "Endgame Direction"
TNC_endgame_desc: "The endgame direction commits the state to survival, expansion, or transformation. This locks the late-game identity of Turkestan National Council."
TNC_democratic: "Turkestan Autonomy Council"
TNC_democratic_DEF: "the Turkestan Autonomy Council"
TNC_democratic_ADJ: "Turkestani"
TNC_communism: "Turkestan Revolutionary Council"
TNC_communism_DEF: "the Turkestan Revolutionary Council"
TNC_communism_ADJ: "Turkestani"
TNC_fascism: "Turkestan National Directorate"
TNC_fascism_DEF: "the Turkestan National Directorate"
TNC_fascism_ADJ: "Turkestani"
TNC_neutrality: "Turkestan National Council"
TNC_neutrality_DEF: "the Turkestan National Council"
TNC_neutrality_ADJ: "Turkestani"
ALA: "Alash Restoration Authority"
ALA_DEF: "the Alash Restoration Authority"
ALA_ADJ: "Alash"
ALA_leader_desc: "Alash Restoration Council governs through a crisis body of teachers, jurists, railway officials, local notables, and mobile guards born from the Soviet Collapse."
chaosx.nr5_custom.19.t: "Alash Restoration Authority Forms"
chaosx.nr5_custom.19.d: "Reports from the Kazakh steppe now describe an Alash Restoration Authority claiming schools, archives, rail stations, and local congresses as the basis of national administration. Moscow calls it an educated separatist network, Basmachi and Turkestan forces test its promises, and foreign observers note that it speaks like a government rather than a camp."
chaosx.nr5_custom.19.a: "The steppe writes another mandate."
ALA_soviet_collapse_focus_tree: "Alash Focus Tree"
ALA_soviet_collapse_focus_tree_desc: "The Alash tree builds a Kazakh steppe authority through congress law, schools, archives, rail stations, mobile guards, foreign recognition, and a dangerous national modernization route."
ala_restoration_council: "Restoration Council"
ala_restoration_council_desc: "The authority derives its first legitimacy from teachers, jurists, local notables, rail officials, and congress delegates who claim the steppe needs national administration rather than Moscow cadres or military chaos."
ala_steppe_congress_rivalries: "Steppe Congress Rivalries"
ala_steppe_congress_rivalries_desc: "Intellectuals, mobile guards, local notables, school boards, and rail officials disagree over how much authority the restoration council should claim."
ala_national_modernization: "National Modernization Mandate"
ala_national_modernization_desc: "The authority turns survival into a late political ambition that forces schools, rails, cavalry guards, and statutes into a wider steppe modernization project."
ala_consolidate_claim: "Consolidate Claim"
ala_consolidate_claim_desc: "Alash authority action shaped by congress law, mobile defense, recognition, rail control, and Soviet crisis pressure."
ala_mobilize_signature_forces: "Mobilize Signature Forces"
ala_mobilize_signature_forces_desc: "Alash authority action shaped by congress law, mobile defense, recognition, rail control, and Soviet crisis pressure."
ala_push_extreme_route: "Push Extreme Route"
ala_push_extreme_route_desc: "Alash authority action shaped by congress law, mobile defense, recognition, rail control, and Soviet crisis pressure."
ala_convene_steppe_congress: "Convene the Steppe Congress"
ala_convene_steppe_congress_desc: "Delegates from the steppe districts gather under Alash statutes, turning scattered autonomy committees into a visible authority."
ala_recruit_local_cavalry_guards: "Recruit Local Cavalry Guards"
ala_recruit_local_cavalry_guards_desc: "Local mounted detachments become the first guard of the restored authority, suited to long lines and thin depots."
ala_protect_schools_and_archives: "Protect Schools and Archives"
ala_protect_schools_and_archives_desc: "Schools, presses, and archives are placed under guard so the authority can claim continuity beyond emergency rule."
ala_negotiate_with_turkestan_councils: "Negotiate with Turkestan Councils"
ala_negotiate_with_turkestan_councils_desc: "The Turkestan councils are approached as partners and rivals, with rail access and recognition traded carefully."
ala_secure_rail_stations: "Secure Rail Stations"
ala_secure_rail_stations_desc: "Station committees and cavalry guards lock down the rail stops that decide whether the steppe can stay supplied."
ala_refuse_moscow_appointed_cadres: "Refuse Moscow-Appointed Cadres"
ala_refuse_moscow_appointed_cadres_desc: "The congress rejects Moscow's appointed cadres and binds local offices to the restoration mandate."
ALA_birth: "Restore the Steppe Authority"
ALA_birth_desc: "The restoration council claims the steppe in the name of Alash memory, local law, and the survival of Kazakh autonomy."
ALA_first_guard: "Raise the Cavalry Guards"
ALA_first_guard_desc: "Mounted guards give the new authority a force able to answer raids and requisition columns across long distances."
ALA_stores: "Audit the Steppe Stores"
ALA_stores_desc: "The council inventories depots, grain stores, and transport animals before rival committees can empty them."
ALA_legitimacy: "Publish the Alash Mandate"
ALA_legitimacy_desc: "A printed mandate ties the emergency government to Alash precedent and local congress law."
ALA_rival: "Name the Rival Cadres"
ALA_rival_desc: "Moscow-appointed cadres and opportunist military committees are named before they can claim the steppe in silence."
ALA_doctrine: "Write Mobile Defense Doctrine"
ALA_doctrine_desc: "Defense plans favor mounted patrols, mobile screens, and withdrawal routes over static lines the authority cannot hold."
ALA_economy: "Schools, Rails, and Ledgers"
ALA_economy_desc: "Teachers, railway accountants, and surviving administrators are folded into one civilian ledger."
ALA_league: "Bargain with the League"
ALA_league_desc: "The authority seeks League guarantees without surrendering its congress mandate to distant republican capitals."
ALA_foreign: "Screen Distant Envoys"
ALA_foreign_desc: "Foreign envoys are screened through the council so arms and recognition do not become a new dependency."
ALA_inner_faction: "Balance the Congress Factions"
ALA_inner_faction_desc: "Jurists, officers, teachers, and village delegates are forced into a workable congress majority."
ALA_special_arm: "Arm the Local Cavalry"
ALA_special_arm_desc: "The cavalry guards receive the rifles, mounts, and field signals needed to serve as a real arm of state."
ALA_supply: "Guard the Rail Stations"
ALA_supply_desc: "Rail stations are guarded as political offices and military depots, not just transport points."
ALA_enemy_front: "Prepare the Steppe Front"
ALA_enemy_front_desc: "The council prepares a flexible front against Moscow columns, bandit raids, and rival steppe commands."
ALA_civil_rule: "Protect Schools and Archives"
ALA_civil_rule_desc: "The restored authority protects schools and archives as proof that the congress is more than a military committee."
ALA_propaganda: "Print the Steppe Program"
ALA_propaganda_desc: "Pamphlets and proclamations present Alash restoration as law, education, and self-rule rather than revolt alone."
ALA_settlement: "Choose an Autonomy Settlement"
ALA_settlement_desc: "Autonomy terms are drafted for neighbors and foreign observers before Moscow can define the authority as a mutiny."
ALA_radical_turn: "The Radical Modernizers"
ALA_radical_turn_desc: "A younger congress faction demands faster modernization, stricter cadre purges, and a harder border posture."
ALA_war_plan: "Campaign Across the Steppe"
ALA_war_plan_desc: "Campaign plans treat rail stations, wells, and mobile reserves as the true front line of the steppe."
ALA_industry_plan: "Permanent Steppe Workshops"
ALA_industry_plan_desc: "Permanent workshops give the authority enough repair capacity to keep cavalry, trucks, and rail guards moving."
ALA_diplomatic_plan: "Recognition Across Distance"
ALA_diplomatic_plan_desc: "Recognition work turns congress minutes, school records, and rail guarantees into a case for sovereignty."
ALA_hidden_doctrine: "The Sealed Statutes"
ALA_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary congress bargaining cannot hold the steppe together."
ALA_extreme_gate: "Survive into the Endgame"
ALA_extreme_gate_desc: "The authority crosses from restoration into a total modernization mandate, binding law, school, rail, and guard into one project."
ALA_extreme_path: "National Modernization Mandate"
ALA_extreme_path_desc: "Modernizers recast the restoration as a national program that tolerates no Moscow cadre and no passive district."
ALA_endgame: "Endgame Direction"
ALA_endgame_desc: "The steppe authority aims to leave the collapse with schools guarded, rail stations held, and autonomy recognized."
ALA_democratic: "Alash Autonomy Council"
ALA_democratic_DEF: "the Alash Autonomy Council"
ALA_democratic_ADJ: "Alash"
ALA_communism: "Steppe Congress Republic"
ALA_communism_DEF: "the Steppe Congress Republic"
ALA_communism_ADJ: "Steppe Congress"
ALA_fascism: "Alash National Directorate"
ALA_fascism_DEF: "the Alash National Directorate"
ALA_fascism_ADJ: "Alash"
ALA_neutrality: "Alash Restoration Authority"
ALA_neutrality_DEF: "the Alash Restoration Authority"
ALA_neutrality_ADJ: "Alash"
MRC: "Mountain Republic of the Caucasus"
MRC_DEF: "the Mountain Republic of the Caucasus"
MRC_ADJ: "Mountain Republic"
MRC_leader_desc: "The Mountain Republic Council governs through elders, pass guards, and emergency village delegates, claiming that the highland districts can survive only if Moscow's border troops and lowland depots no longer decide their fate."
chaosx.nr5_custom.20.t: "Mountain Republic of the Caucasus Holds the Passes"
chaosx.nr5_custom.20.d: "Reports from the North Caucasus describe a mountain council that has seized the passes, summoned village elders, and rejected Moscow's border detachments. Lowland depots are raided for supplies, Georgian and Azerbaijani contacts are screened through the council, and every road into the highlands is treated as a political frontier."
chaosx.nr5_custom.20.a: "The high roads answer to another council."
MRC_soviet_collapse_focus_tree: "Mountain Republic Focus Tree"
MRC_soviet_collapse_focus_tree_desc: "The Mountain Republic tree turns pass control, elder councils, lowland-depot raids, village autonomy, and Caucasus bargaining into a playable collapse authority."
mrc_mountain_council: "Mountain Council"
mrc_mountain_council_desc: "The authority rests on a mountain council that balances elders, pass guards, village delegates, and emergency officers across the North Caucasus highlands."
mrc_pass_confederation_rivalries: "Pass Confederation Rivalries"
mrc_pass_confederation_rivalries_desc: "Villages, clans, officers, border guards, and lowland contacts all want a different republic, making unity as difficult as the roads themselves."
mrc_mountain_republic_mandate: "Mountain Republic Mandate"
mrc_mountain_republic_mandate_desc: "The council turns survival into a mandate for a lasting mountain republic that controls the passes, protects village autonomy, and bargains with neighboring Caucasus states from a position of armed independence."
mrc_consolidate_claim: "Consolidate Claim"
mrc_consolidate_claim_desc: "Mountain Republic action shaped by elder councils, pass control, village autonomy, recognition, and Soviet crisis pressure."
mrc_mobilize_signature_forces: "Mobilize Signature Forces"
mrc_mobilize_signature_forces_desc: "Mountain Republic action shaped by pass guards, irregular recruits, defensive terrain, and Soviet crisis pressure."
mrc_push_extreme_route: "Push Extreme Route"
mrc_push_extreme_route_desc: "Mountain Republic action shaped by the council's mandate to turn emergency pass control into a lasting highland state."
mrc_close_the_passes: "Close the Passes"
mrc_close_the_passes_desc: "Pass guards close the mountain roads to Moscow columns and rival requisition parties until the council decides who may enter."
mrc_summon_mountain_elders: "Summon Mountain Elders"
mrc_summon_mountain_elders_desc: "Village elders are summoned to bind highland disputes into one emergency council."
mrc_raid_lowland_depots: "Raid Lowland Depots"
mrc_raid_lowland_depots_desc: "Irregular columns descend on exposed lowland depots before Moscow or rival republics can empty them."
mrc_negotiate_with_georgia_or_azerbaijan: "Negotiate with Georgia or Azerbaijan"
mrc_negotiate_with_georgia_or_azerbaijan_desc: "The council screens talks with Georgia and Azerbaijan, trading road security and recognition without surrendering the passes."
mrc_protect_village_autonomy: "Protect Village Autonomy"
mrc_protect_village_autonomy_desc: "The Mountain Republic protects village autonomy so the council can claim legitimacy beyond military necessity."
mrc_reject_moscow_border_troops: "Reject Moscow Border Troops"
mrc_reject_moscow_border_troops_desc: "Moscow's border troops are rejected as another force trying to decide the highlands from outside."
MRC_birth: "Raise the Mountain Council"
MRC_birth_desc: "The Mountain Republic forms around elder councils, pass guards, and village delegates who refuse to let Moscow command the high roads."
MRC_first_guard: "Muster the Pass Guards"
MRC_first_guard_desc: "Pass guards become the first armed proof that the mountain roads answer to the new council."
MRC_stores: "Count the Highland Stores"
MRC_stores_desc: "The council inventories hidden stores, mule routes, rifle caches, and lowland depot access before winter and war expose every shortage."
MRC_legitimacy: "Issue the Highland Mandate"
MRC_legitimacy_desc: "A public mandate frames the emergency council as a mountain republic rather than another temporary defense committee."
MRC_rival: "Name the Lowland Claimants"
MRC_rival_desc: "Lowland commanders, Moscow border officers, and rival republic agents are named before they can claim authority over the passes."
MRC_doctrine: "Write Mountain Defense Doctrine"
MRC_doctrine_desc: "Defense planning favors passes, ambush routes, village scouts, and withdrawal paths that fit the terrain."
MRC_economy: "Roads, Flocks, and Workshops"
MRC_economy_desc: "Road crews, village workshops, herds, and captured depots are folded into one highland supply ledger."
MRC_league: "Bargain with the League"
MRC_league_desc: "League guarantees are useful only if they respect village autonomy and the council's control of the passes."
MRC_foreign: "Screen Caucasus Envoys"
MRC_foreign_desc: "Envoys from Georgia, Azerbaijan, and distant patrons are screened through the council so recognition does not become a new dependency."
MRC_inner_faction: "Balance the Elder Councils"
MRC_inner_faction_desc: "Elders, village guards, irregular officers, and town delegates are forced into one workable highland majority."
MRC_special_arm: "Arm the Mountain Columns"
MRC_special_arm_desc: "Irregular columns receive the rifles, scouts, and signals needed to fight across roads that favor local knowledge."
MRC_supply: "Hold the Pass Depots"
MRC_supply_desc: "Pass depots are guarded as the lifeline between highland autonomy and lowland pressure."
MRC_enemy_front: "Prepare the Border-Troop Front"
MRC_enemy_front_desc: "The council prepares to meet Moscow border troops, lowland reprisals, and rival columns before they reach the villages."
MRC_civil_rule: "Protect Village Autonomy"
MRC_civil_rule_desc: "Village autonomy is protected as the civic foundation that keeps the mountain republic from becoming only a guard command."
MRC_propaganda: "Print the Highland Program"
MRC_propaganda_desc: "Proclamations present the Mountain Republic as local law, pass defense, and survival through self-rule."
MRC_settlement: "Draft a Caucasus Settlement"
MRC_settlement_desc: "Settlement terms define how Georgia, Azerbaijan, and neighboring republics may deal with the council without claiming the highlands."
MRC_radical_turn: "The Hard Pass Faction"
MRC_radical_turn_desc: "A hard pass faction demands stricter road closures, harsher depot raids, and no concessions to Moscow border officers."
MRC_war_plan: "Campaign Through the Passes"
MRC_war_plan_desc: "Campaign plans treat roads, ridges, depots, and village scouts as the true front line."
MRC_industry_plan: "Permanent Highland Workshops"
MRC_industry_plan_desc: "Permanent workshops give the council enough repair capacity to keep rifles, trucks, and mountain columns moving."
MRC_diplomatic_plan: "Recognition from the High Roads"
MRC_diplomatic_plan_desc: "Recognition work turns pass security, village law, and Caucasus bargaining into a case for sovereignty."
MRC_hidden_doctrine: "The Sealed Pass Statutes"
MRC_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary elder bargaining cannot hold the roads together."
MRC_extreme_gate: "Survive into the Endgame"
MRC_extreme_gate_desc: "The Mountain Republic crosses from emergency defense into a total mandate over every pass, village, and border road."
MRC_extreme_path: "Mountain Republic Mandate"
MRC_extreme_path_desc: "The hard pass faction recasts survival as a republic-wide mandate that accepts no Moscow border troop and no passive village."
MRC_endgame: "Endgame Direction"
MRC_endgame_desc: "The Mountain Republic aims to leave the collapse with the passes held, village autonomy protected, and Caucasus recognition secured."
MRC_democratic: "Mountain Republic Council"
MRC_democratic_DEF: "the Mountain Republic Council"
MRC_democratic_ADJ: "Mountain Republic"
MRC_communism: "Caucasus Highland Soviet"
MRC_communism_DEF: "the Caucasus Highland Soviet"
MRC_communism_ADJ: "Highland Soviet"
MRC_fascism: "Caucasus Pass Directorate"
MRC_fascism_DEF: "the Caucasus Pass Directorate"
MRC_fascism_ADJ: "Pass Directorate"
MRC_neutrality: "Mountain Republic of the Caucasus"
MRC_neutrality_DEF: "the Mountain Republic of the Caucasus"
MRC_neutrality_ADJ: "Mountain Republic"
UWD: "Ural Workers' Directorate"
UWD_DEF: "the Ural Workers' Directorate"
UWD_ADJ: "Ural Workers"
UWD_leader_desc: "The Factory Directorate rules through factory committees, protected engineers, worker battalions, and emergency production quotas, claiming that the Ural arsenals must keep running while Moscow and the breakaway republics fight over the union's wreckage."
chaosx.nr5_custom.21.t: "Ural Workers' Directorate Seizes the Arsenals"
chaosx.nr5_custom.21.d: "Factory committees across the Ural industrial belt have placed arms plants, rail depots, and steel allocations under the authority of a workers' directorate. Moscow still needs the region's production, but the Directorate will not release every shipment while its autonomy remains unrecognized."
chaosx.nr5_custom.21.a: "The furnaces answer to their committees."
UWD_soviet_collapse_focus_tree: "Ural Workers' Directorate Focus Tree"
UWD_soviet_collapse_focus_tree_desc: "The Ural Workers' Directorate tree turns factory committees, steel rationing, worker battalions, protected engineers, and arsenal autonomy into a playable collapse authority."
uwd_factory_committee_guard: "Factory Committee Guard"
uwd_factory_committee_guard_desc: "Factory committees guard the workshops, arms plants, rail sidings, and steel stores that keep the Ural industrial belt alive."
uwd_manager_officer_rivalries: "Manager-Officer Rivalries"
uwd_manager_officer_rivalries_desc: "Engineers, plant managers, Red Army officers, party officials, and shop-floor committees all agree that the arsenals must keep working, but not on who commands them."
uwd_arsenal_autonomy_directorate: "Arsenal Autonomy Directorate"
uwd_arsenal_autonomy_directorate_desc: "The Directorate recasts emergency factory control as a sovereign mandate over the Ural arsenals, their shipments, and the worker battalions that defend them."
uwd_consolidate_claim: "Consolidate Claim"
uwd_consolidate_claim_desc: "Ural Workers action shaped by factory committees, arsenal autonomy, steel rationing, recognition, and Soviet crisis pressure."
uwd_mobilize_signature_forces: "Mobilize Signature Forces"
uwd_mobilize_signature_forces_desc: "Ural Workers action shaped by worker battalions, guarded factories, local defense stores, and Soviet crisis pressure."
uwd_push_extreme_route: "Push Extreme Route"
uwd_push_extreme_route_desc: "Ural Workers action shaped by the Directorate's mandate to turn emergency factory control into arsenal sovereignty."
uwd_put_factories_under_committee_guard: "Put Factories under Committee Guard"
uwd_put_factories_under_committee_guard_desc: "Factory committees take armed responsibility for workshops, rail sidings, and armaments plants before outside authorities can seize them."
uwd_ration_steel_for_local_defense: "Ration Steel for Local Defense"
uwd_ration_steel_for_local_defense_desc: "Steel allocations are reserved for local defenses, armored trains, repair shops, and the battalions that protect the arsenals."
uwd_bargain_with_moscow_for_autonomy: "Bargain with Moscow for Autonomy"
uwd_bargain_with_moscow_for_autonomy_desc: "The Directorate offers continued shipments to Moscow in exchange for practical autonomy over factory security and production priorities."
uwd_arm_worker_battalions: "Arm Worker Battalions"
uwd_arm_worker_battalions_desc: "Worker battalions receive rifles, machine tools, repair crews, and command links to defend the industrial belt from requisition columns."
uwd_protect_engineers_from_purges: "Protect Engineers from Purges"
uwd_protect_engineers_from_purges_desc: "Engineers and skilled foremen are placed under committee protection so production survives party investigations, officer vendettas, and panic arrests."
uwd_cut_shipments_until_recognition_arrives: "Cut Shipments until Recognition Arrives"
uwd_cut_shipments_until_recognition_arrives_desc: "Outbound arms shipments are cut to force Moscow, neighboring republics, and foreign observers to treat the Directorate as more than a depot."
UWD_birth: "Raise the Factory Directorate"
UWD_birth_desc: "Factory committees in the Urals form a Directorate to keep the arsenals running while every outside authority demands their output."
UWD_first_guard: "Muster the Workshop Guards"
UWD_first_guard_desc: "Workshop guards become the first armed shield around the plants, depots, and rail yards."
UWD_stores: "Count the Steel Stores"
UWD_stores_desc: "The Directorate inventories steel, coal, machine tools, rifles, repair parts, and rolling stock before the next requisition order empties them."
UWD_legitimacy: "Issue the Arsenal Mandate"
UWD_legitimacy_desc: "A public mandate frames factory control as a duty to preserve industry rather than a temporary mutiny."
UWD_rival: "Name the Requisition Committees"
UWD_rival_desc: "Moscow envoys, breakaway quartermasters, plant bosses, and party inspectors are named before they can claim the Ural arsenals."
UWD_doctrine: "Write Industrial Defense Doctrine"
UWD_doctrine_desc: "Defense doctrine treats workshops, rail chokepoints, armored trains, and guarded depots as the real line of battle."
UWD_economy: "Furnaces, Rails, and Canteens"
UWD_economy_desc: "Furnaces, rail shops, canteens, and arms lines are folded into one emergency industrial ledger."
UWD_league: "Bargain with the League"
UWD_league_desc: "League contacts are useful only if they understand that the arsenals will not become another foreign warehouse."
UWD_foreign: "Screen Industrial Envoys"
UWD_foreign_desc: "Envoys seeking steel, rifles, or recognition are screened through the Directorate before they reach plant committees."
UWD_inner_faction: "Balance Managers and Committees"
UWD_inner_faction_desc: "Managers, engineers, worker delegates, officers, and party men are forced into one uneasy production majority."
UWD_special_arm: "Arm the Worker Battalions"
UWD_special_arm_desc: "Worker battalions receive the weapons, repair crews, and plant maps needed to defend the industrial belt."
UWD_supply: "Hold the Rail Depots"
UWD_supply_desc: "Rail depots are guarded as the hinge between factory autonomy and the wider collapse."
UWD_enemy_front: "Prepare the Requisition Front"
UWD_enemy_front_desc: "The Directorate prepares for Moscow columns, breakaway seizures, and desperate commanders who see the Urals only as supply."
UWD_civil_rule: "Protect Committee Authority"
UWD_civil_rule_desc: "Committee authority is protected so the Directorate remains a civic production regime rather than only a guard command."
UWD_propaganda: "Print the Workers' Program"
UWD_propaganda_desc: "Proclamations present the Ural Workers' Directorate as production discipline, committee law, and survival through factory autonomy."
UWD_settlement: "Draft an Arsenal Settlement"
UWD_settlement_desc: "Settlement terms define how Moscow and neighboring republics may receive shipments without claiming command over the plants."
UWD_radical_turn: "The Hard Furnace Faction"
UWD_radical_turn_desc: "A hard furnace faction demands stricter shipment cuts, deeper committee control, and no concessions to outside requisition boards."
UWD_war_plan: "Campaign along the Rail Belt"
UWD_war_plan_desc: "Campaign plans treat rail yards, arms factories, depots, and steel works as one defended front."
UWD_industry_plan: "Permanent Arsenal Councils"
UWD_industry_plan_desc: "Permanent arsenal councils give committees, engineers, and guard commanders enough structure to keep production alive."
UWD_diplomatic_plan: "Recognition through Production"
UWD_diplomatic_plan_desc: "Recognition work turns industrial output, guarded depots, and controlled shipments into a case for autonomy."
UWD_hidden_doctrine: "The Sealed Factory Statutes"
UWD_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary committee bargaining cannot protect the arsenals."
UWD_extreme_gate: "Survive into the Endgame"
UWD_extreme_gate_desc: "The Ural Workers' Directorate crosses from factory defense into a total mandate over every furnace, rail depot, and arms shipment."
UWD_extreme_path: "Arsenal Autonomy Mandate"
UWD_extreme_path_desc: "The hard furnace faction recasts survival as a directorate-wide mandate that accepts no requisition column and no passive factory."
UWD_endgame: "Endgame Direction"
UWD_endgame_desc: "The Ural Workers' Directorate aims to leave the collapse with the arsenals guarded, engineers protected, and autonomy recognized."
UWD_democratic: "Ural Factory Congress"
UWD_democratic_DEF: "the Ural Factory Congress"
UWD_democratic_ADJ: "Ural Factory"
UWD_communism: "Ural Workers' Directorate"
UWD_communism_DEF: "the Ural Workers' Directorate"
UWD_communism_ADJ: "Ural Workers"
