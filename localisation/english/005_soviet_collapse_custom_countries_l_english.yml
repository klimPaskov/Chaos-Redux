chaosx.nr5_custom.4.t: "Union Defense Committee Declares Authority"
chaosx.nr5_custom.4.d: "Reports from the former union now identify Union Defense Committee as more than a local disturbance. Its public claim centers on red military districts, emergency command, loyalist mutiny, union without Moscow's panic. Moscow, breakaway republics, and foreign observers disagree over whether it is a government, a mutiny, an emergency committee, or a revived argument over who may inherit the old state."
chaosx.nr5_custom.4.a: "Another seal breaks."
