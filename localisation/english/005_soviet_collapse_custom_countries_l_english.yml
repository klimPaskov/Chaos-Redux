BAC: "Birobidzhan Autonomous Commune"
BAC_DEF: "the Birobidzhan Autonomous Commune"
BAC_ADJ: "Birobidzhan"
BAC_democratic: "Birobidzhan Civic Commune"
BAC_democratic_DEF: "the Birobidzhan Civic Commune"
BAC_democratic_ADJ: "Birobidzhan"
BAC_communism: "Birobidzhan Autonomous Commune"
BAC_communism_DEF: "the Birobidzhan Autonomous Commune"
BAC_communism_ADJ: "Birobidzhan"
BAC_fascism: "Amur Border Directorate"
BAC_fascism_DEF: "the Amur Border Directorate"
BAC_fascism_ADJ: "Amur"
BAC_neutrality: "Birobidzhan Autonomous Commune"
BAC_neutrality_DEF: "the Birobidzhan Autonomous Commune"
BAC_neutrality_ADJ: "Birobidzhan"
BAC_leader_desc: "The Settlement Defense Council speaks for the Birobidzhan settlements, the refugee committees, and the archive keepers who refuse to wait for orders from Moscow or from Far Eastern officers."
chaosx.nr5_custom.22.t: "Birobidzhan Declares an Autonomous Commune"
chaosx.nr5_custom.22.d: "Settlement committees in Birobidzhan have formed an autonomous commune around food stores, archives, and a defensive militia. The council asks for relief and recognition while warning that forced relocation orders will be refused."
chaosx.nr5_custom.22.a: "The settlements will not move quietly."
BAC_soviet_collapse_focus_tree: "Birobidzhan Autonomous Commune Focus Tree"
BAC_soviet_collapse_focus_tree_desc: "The Birobidzhan Autonomous Commune tree turns settlement defense, refugee administration, humanitarian petitions, archive evacuation, and Far Eastern bargaining into a playable collapse authority."
bac_settlement_defense_committees: "Settlement Defense Committees"
bac_settlement_defense_committees_desc: "Local defense committees guard the settlements, food stores, archives, and river routes that keep Birobidzhan alive."
bac_refugee_archive_tensions: "Refugee and Archive Tensions"
bac_refugee_archive_tensions_desc: "Refugee delegates, archive keepers, local cadres, and militia officers all claim a voice in the commune, and none can be ignored safely."
bac_autonomous_commune_mandate: "Autonomous Commune Mandate"
bac_autonomous_commune_mandate_desc: "Emergency statutes place every settlement, archive, convoy, and militia guard under the authority of the commune."
bac_consolidate_claim: "Consolidate the Commune Charter"
bac_consolidate_claim_desc: "Spend political and command authority to make the Birobidzhan charter harder for outside powers to dismiss."
bac_mobilize_signature_forces: "Mobilize Settlement Militia"
bac_mobilize_signature_forces_desc: "Spend political and command authority to raise the local militia around defended settlements and evacuation routes."
bac_push_extreme_route: "Empower the Archive Mandate"
bac_push_extreme_route_desc: "Spend political and command authority to place Birobidzhan under a harsher emergency mandate."
bac_organize_settlement_defense: "Organize Settlement Defense"
bac_organize_settlement_defense_desc: "Build guard rosters, warning posts, and fallback routes for the settlements before outside forces decide their fate."
bac_petition_foreign_jewish_organizations: "Petition Foreign Jewish Organizations"
bac_petition_foreign_jewish_organizations_desc: "Send appeals abroad for relief, observers, and public attention before Birobidzhan becomes an easy footnote."
bac_evacuate_archives: "Evacuate the Archives"
bac_evacuate_archives_desc: "Move records, ledgers, and cultural collections into defended stores before they can be seized or destroyed."
bac_bargain_with_far_eastern_republic: "Bargain with the Far Eastern Republic"
bac_bargain_with_far_eastern_republic_desc: "Offer limited cooperation to Far Eastern neighbors without surrendering the commune charter."
bac_request_food_and_medicine: "Request Food and Medicine"
bac_request_food_and_medicine_desc: "Turn humanitarian appeals into practical shipments of food, medicine, and field supplies."
bac_refuse_forced_relocation_orders: "Refuse Forced Relocation Orders"
bac_refuse_forced_relocation_orders_desc: "Reject outside relocation orders and bind the militia to the defense of the settlements."
BAC_birth: "Form the Settlement Defense Council"
BAC_birth_desc: "Birobidzhan organizes a civilian defense council to keep the settlements, archives, and food stores alive while distant authorities argue over orders."
BAC_first_guard: "Muster Settlement Guards"
BAC_first_guard_desc: "Local guards take responsibility for railway stops, farms, storehouses, and river crossings before outside troops can dictate terms."
BAC_stores: "Inventory Food and Medicine"
BAC_stores_desc: "A full inventory of grain, medicine, tools, and fuel gives the commune a realistic map of what can be defended and what must be requested."
BAC_legitimacy: "Issue the Commune Charter"
BAC_legitimacy_desc: "The council publishes a charter that frames autonomy as survival rather than rebellion."
BAC_rival: "Name the Relocation Boards"
BAC_rival_desc: "Refugee delegates, local cadres, and settlement committees receive defined seats before suspicion tears the administration apart."
BAC_doctrine: "Write Defensive Militia Rules"
BAC_doctrine_desc: "Militia officers prepare rules for defense in depth, evacuation corridors, and restrained use of the limited weapons available."
BAC_economy: "River Farms and Workshops"
BAC_economy_desc: "Workshops, farms, and river supply points are bound into a modest economy built for endurance."
BAC_league: "Petition the League"
BAC_league_desc: "The commune asks foreign observers to treat Birobidzhan as a humanitarian emergency with political consequences."
BAC_foreign: "Screen Humanitarian Envoys"
BAC_foreign_desc: "Aid missions are welcomed, but their escorts, papers, and promises are checked before they enter the settlements."
BAC_inner_faction: "Balance Refugees and Cadres"
BAC_inner_faction_desc: "The council balances desperate arrivals, older settlers, and party officials who still believe Moscow will return with binding orders."
BAC_special_arm: "Arm the Local Militia"
BAC_special_arm_desc: "The best rifles and ammunition are issued to a militia meant to delay attackers long enough for evacuation and relief."
BAC_supply: "Protect the Archive Stores"
BAC_supply_desc: "Archive rooms and supply rooms receive the same guards, because the commune cannot afford to lose either memory or bread."
BAC_enemy_front: "Prepare the Border-Post Front"
BAC_enemy_front_desc: "The border posts are mapped as warning lines, not trophies, and their garrisons are ordered to report before they fight."
BAC_civil_rule: "Keep Settlement Law"
BAC_civil_rule_desc: "Civil law remains visible in the settlements so the defense regime does not become another occupation."
BAC_propaganda: "Print the Commune Bulletin"
BAC_propaganda_desc: "Small bulletins explain ration rules, evacuation routes, and the claim that Birobidzhan speaks for its own people."
BAC_settlement: "Draft the Far Eastern Bargain"
BAC_settlement_desc: "The council prepares terms for Far Eastern neighbors without surrendering the settlement charter."
BAC_radical_turn: "The Hard Archive Faction"
BAC_radical_turn_desc: "A hard faction argues that the archive, the militia, and the relief rolls must override every outside order."
BAC_war_plan: "Defend the River Settlements"
BAC_war_plan_desc: "Defense plans focus on delaying actions around the river settlements and the safe movement of civilians."
BAC_industry_plan: "Permanent Commune Workshops"
BAC_industry_plan_desc: "Temporary repair shops are reorganized as a permanent industrial base for tools, carts, rifles, and field kitchens."
BAC_diplomatic_plan: "Recognition through Relief"
BAC_diplomatic_plan_desc: "Diplomacy is tied to relief work so every shipment also proves that the commune can govern responsibly."
BAC_birobidzhan_archive_workshops: "Birobidzhan Archive Workshops"
BAC_birobidzhan_archive_workshops_desc: "Archive clerks, repair crews, and settlement guards turn the Birobidzhan workshops into a protected base for tools, relief wagons, and field kitchens."
BAC_amur_relief_posts: "Amur Relief Posts"
BAC_amur_relief_posts_desc: "Relief posts along the Amur approaches shelter civilians, watch the crossings, and keep militia detachments close enough to delay raiders."
BAC_observer_relief_conference: "Observer Relief Conference"
BAC_observer_relief_conference_desc: "Foreign observers, Far Eastern neighbors, and relief committees are shown the rolls, kitchens, and guarded routes that make recognition practical."
BAC_hidden_doctrine: "The Sealed Archive Statutes"
BAC_hidden_doctrine_desc: "Secret statutes define who can move records, issue evacuation orders, and keep the commune alive if the council is scattered."
BAC_extreme_gate: "Survive into the Endgame"
BAC_extreme_gate_desc: "Birobidzhan prepares for a collapse so deep that survival itself becomes the only constitutional principle."
BAC_extreme_path: "Autonomous Commune Mandate"
BAC_extreme_path_desc: "The commune claims emergency authority over every settlement, archive, convoy, and militia unit under its protection."
BAC_birobidzhan_council_records: "Birobidzhan Council Records"
BAC_birobidzhan_council_records_desc: "The council recopies its charters, ration ledgers, school lists, and militia rolls so no outside command can claim the commune has no civil authority."
BAC_amur_field_staff: "Amur Field Staff"
BAC_amur_field_staff_desc: "Militia officers, railway guards, and relief escorts receive a common staff map for the Amur approaches."
BAC_settlement_court_registers: "Settlement Court Registers"
BAC_settlement_court_registers_desc: "Local courts keep public registers for property, arrests, refugee status, and emergency service so settlement law remains legible under pressure."
BAC_yiddish_school_boards: "Yiddish School Boards"
BAC_yiddish_school_boards_desc: "School boards become relief offices, translation desks, and civil registries that keep the commune's cultural claim visible to observers."
BAC_amur_river_customs: "Amur River Customs"
BAC_amur_river_customs_desc: "River tolls and inspection posts give the commune a controlled way to move relief shipments without surrendering the crossings."
BAC_militia_training_yards: "Militia Training Yards"
BAC_militia_training_yards_desc: "The settlement militia drills around farms, railway stops, and evacuation roads with enough discipline to fight without consuming the whole commune."
BAC_grain_and_relief_escorts: "Grain and Relief Escorts"
BAC_grain_and_relief_escorts_desc: "Food convoys travel with guards, clerks, and medical orderlies so every sack reaches a settlement rather than a checkpoint warehouse."
BAC_border_crossing_batteries: "Border Crossing Batteries"
BAC_border_crossing_batteries_desc: "Light batteries and watch posts cover the crossings most likely to carry raiders, retreating troops, or unwanted relocation orders."
BAC_birobidzhan_workshop_contracts: "Birobidzhan Workshop Contracts"
BAC_birobidzhan_workshop_contracts_desc: "The commune signs standing contracts with workshops that can repair rifles, carts, stoves, and rail tools without waiting for distant ministries."
BAC_taiga_watch_posts: "Taiga Watch Posts"
BAC_taiga_watch_posts_desc: "Watch posts in the forests and road clearings give settlements time to hide records, move children, and call the militia before a column arrives."
BAC_winter_road_columns: "Winter Road Columns"
BAC_winter_road_columns_desc: "Winter columns stock fuel, horses, sledges, tools, and guarded drivers for the roads that remain usable after the river freezes."
BAC_obluchye_rear_area: "Obluchye Rear Area"
BAC_obluchye_rear_area_desc: "Rear-area stores near Obluchye hold medicine, ammunition, kitchen equipment, and reserve guards away from the first line of panic."
BAC_far_eastern_letters: "Far Eastern Letters"
BAC_far_eastern_letters_desc: "Letters to Far Eastern neighbors, aid committees, and railway authorities frame Birobidzhan as a partner in relief rather than a prize."
BAC_volunteer_commune_schools: "Volunteer Commune Schools"
BAC_volunteer_commune_schools_desc: "Volunteers learn guard duty, field sanitation, ration accounting, and civil procedure before receiving a rifle or a seal."
BAC_river_port_tolls: "River Port Tolls"
BAC_river_port_tolls_desc: "Modest tolls at river ports pay for guards, kitchens, translators, and repair crews while keeping relief traffic under commune inspection."
BAC_league_relief_bargain: "League Relief Bargain"
BAC_league_relief_bargain_desc: "The commune offers the League a simple bargain: recognize the relief corridor, defend it if Moscow attacks, and receive honest ledgers in return."
BAC_hardline_against_border_troops: "Hardline against Border Troops"
BAC_hardline_against_border_troops_desc: "The hard archive faction orders every border detachment to treat forced relocation columns as a direct attack on the commune."
BAC_commune_staff_map: "Commune Staff Map"
BAC_commune_staff_map_desc: "A single staff map joins militia yards, river tolls, rear-area stores, watch posts, and archive evacuation routes into one defense plan."
BAC_autonomy_statute: "Autonomy Statute"
BAC_autonomy_statute_desc: "The council writes the autonomy statute as if it must survive foreign inspection, Far Eastern bargaining, and a Soviet return."
BAC_amur_commune_endurance: "Amur Commune Endurance"
BAC_amur_commune_endurance_desc: "Birobidzhan turns records, relief, workshops, river customs, and militia routes into an authority that can survive a long collapse."
BAC_endgame: "Endgame Direction"
BAC_endgame_desc: "The council chooses how the commune will carry its charter through the final shape of the Soviet collapse."

ARD: "Arctic Naval Directorate"
ARD_DEF: "the Arctic Naval Directorate"
ARD_ADJ: "Arctic Naval"
ARD_democratic: "Arctic Port Authority"
ARD_democratic_DEF: "the Arctic Port Authority"
ARD_democratic_ADJ: "Arctic Port"
ARD_communism: "Northern Naval Soviet"
ARD_communism_DEF: "the Northern Naval Soviet"
ARD_communism_ADJ: "Northern Naval"
ARD_fascism: "Polar Fleet Command"
ARD_fascism_DEF: "the Polar Fleet Command"
ARD_fascism_ADJ: "Polar Fleet"
ARD_neutrality: "Arctic Naval Directorate"
ARD_neutrality_DEF: "the Arctic Naval Directorate"
ARD_neutrality_ADJ: "Arctic Naval"
ARD_leader_desc: "The Northern Port Directorate speaks for naval officers, port committees, convoy clerks, and shore guards who intend to keep Murmansk and Arkhangelsk open through the collapse."
chaosx.nr5_custom.23.t: "The Arctic Naval Directorate Secures the Northern Ports"
chaosx.nr5_custom.23.d: "Naval officers and port committees around Murmansk and Arkhangelsk have formed an Arctic Naval Directorate to protect fuel stores, convoy routes, and foreign radio channels. The directorate claims it is guarding the northern route from panic rather than abandoning the union, but Moscow treats every sealed harbor as another command slipping away."
chaosx.nr5_custom.23.a: "The northern route answers to itself."
ARD_soviet_collapse_focus_tree: "Arctic Naval Directorate Focus Tree"
ARD_soviet_collapse_focus_tree_desc: "The Arctic Naval Directorate tree turns port defense, convoy control, naval infantry, foreign radio contact, and port neutrality into a playable collapse authority."
ard_northern_port_directorate: "Northern Port Directorate"
ard_northern_port_directorate_desc: "Naval officers, port committees, convoy clerks, and shore guards share emergency authority over the northern ports and their stores."
ard_convoy_officer_tensions: "Convoy Officer Tensions"
ard_convoy_officer_tensions_desc: "Captains, commissars, harbor workers, and convoy clerks disagree over whether the directorate is a loyal emergency command or a quiet mutiny."
ard_port_neutrality_mandate: "Port Neutrality Mandate"
ard_port_neutrality_mandate_desc: "Emergency port statutes place harbors, fuel depots, radio rooms, convoys, and naval infantry under a neutrality regime backed by armed guards."
ard_consolidate_claim: "Consolidate the Port Charter"
ard_consolidate_claim_desc: "Spend political and command authority to bind the northern port committees and convoy offices into a recognized directorate."
ard_mobilize_signature_forces: "Mobilize Naval Infantry Guards"
ard_mobilize_signature_forces_desc: "Spend political and command authority to raise shore guards and naval infantry around the Arctic ports."
ard_push_extreme_route: "Empower Port Neutrality"
ard_push_extreme_route_desc: "Spend political and command authority to place the northern route under a harsher port neutrality mandate."
ard_seal_the_northern_ports: "Seal the Northern Ports"
ard_seal_the_northern_ports_desc: "Close the harbors to panic traffic, inventory the depots, and put every gate under a port guard roster."
ard_hold_the_arctic_convoys: "Hold the Arctic Convoys"
ard_hold_the_arctic_convoys_desc: "Keep convoy clerks, dock crews, and remaining escorts under directorate orders until foreign and local guarantees can be negotiated."
ard_form_naval_infantry_guards: "Form Naval Infantry Guards"
ard_form_naval_infantry_guards_desc: "Turn sailors, shore police, and depot guards into infantry detachments able to hold the ports against local panic or outside pressure."
ard_bargain_for_fuel_shipments: "Bargain for Fuel Shipments"
ard_bargain_for_fuel_shipments_desc: "Trade access, escort promises, and port order for the fuel shipments needed to keep the northern route alive."
ard_keep_radio_contact_with_foreign_fleets: "Keep Radio Contact with Foreign Fleets"
ard_keep_radio_contact_with_foreign_fleets_desc: "Maintain guarded radio contact with foreign fleet commands so the ports cannot be isolated or quietly seized."
ard_declare_port_neutrality: "Declare Port Neutrality"
ard_declare_port_neutrality_desc: "Announce that the Arctic ports will serve survival and convoy safety before any factional order from Moscow or the breakaways."
ARD_birth: "Form the Northern Port Directorate"
ARD_birth_desc: "Murmansk and Arkhangelsk organize a shared port command to keep harbors, depots, and convoy offices functioning while central orders collapse."
ARD_first_guard: "Muster Naval Infantry Guards"
ARD_first_guard_desc: "Sailors, shore police, and depot guards form infantry detachments around the docks and railway approaches."
ARD_stores: "Inventory Fuel and Convoys"
ARD_stores_desc: "The directorate counts fuel tanks, escort stores, medical crates, and harbor equipment before rumor turns supplies into private loot."
ARD_legitimacy: "Claim the Arctic Route"
ARD_legitimacy_desc: "The port charter frames local control as the only way to keep the Arctic route open for survival traffic."
ARD_rival: "Separate Officers and Port Committees"
ARD_rival_desc: "Command posts and civilian committees receive defined authority before suspicion breaks the ports into rival camps."
ARD_doctrine: "Write Port Defense Orders"
ARD_doctrine_desc: "Harbor defense plans set clear rules for gate control, convoy protection, radio rooms, and guarded withdrawals."
ARD_economy: "Repair the Crane Yards"
ARD_economy_desc: "Dockyard crews and railway shops repair cranes, fuel pumps, and frozen machinery needed to move cargo."
ARD_league: "Ask for League Guarantees"
ARD_league_desc: "The directorate asks foreign observers to treat the northern route as a neutral survival corridor."
ARD_foreign: "Keep Foreign Fleet Radio Contact"
ARD_foreign_desc: "Radio operators maintain guarded contact with foreign fleet commands without surrendering the ports to any patron."
ARD_inner_faction: "Balance Captains and Commissars"
ARD_inner_faction_desc: "The directorate balances naval captains, commissars, harbor workers, and clerks who all claim to speak for order."
ARD_special_arm: "Arm the Shore Parties"
ARD_special_arm_desc: "The best rifles and cold-weather stores go to shore parties assigned to the docks, depots, and road exits."
ARD_supply: "Hold the Arctic Convoys"
ARD_supply_desc: "Convoy papers, fuel schedules, and escort rosters are kept under directorate protection until the route can run again."
ARD_enemy_front: "Fortify the Kola Approaches"
ARD_enemy_front_desc: "Approach roads, railway bottlenecks, and coastal batteries receive guards before the ports are tested."
ARD_civil_rule: "Keep Civil Port Administration"
ARD_civil_rule_desc: "Civil port offices remain visible so emergency naval rule does not become an unaccountable occupation."
ARD_propaganda: "Broadcast Port Neutrality"
ARD_propaganda_desc: "Radio bulletins explain that the northern ports serve convoy safety, fuel order, and survival before factional politics."
ARD_settlement: "Bargain for Fuel Shipments"
ARD_settlement_desc: "The directorate offers guarded access and orderly berths in return for the fuel needed to keep ships and railheads moving."
ARD_radical_turn: "The Icebound Admiralty"
ARD_radical_turn_desc: "A hard faction argues that only sealed orders, naval discipline, and port neutrality can save the Arctic route."
ARD_war_plan: "Northern Sea Denial"
ARD_war_plan_desc: "Defense plans make the northern coast costly to seize, even when the directorate cannot field a large land army."
ARD_industry_plan: "Permanent Dockyard Emergency"
ARD_industry_plan_desc: "Temporary repairs become a permanent emergency dockyard regime for cranes, pumps, rail sheds, and field weapons."
ARD_diplomatic_plan: "Convoys as Recognition"
ARD_diplomatic_plan_desc: "Every protected convoy becomes a diplomatic argument that the directorate can govern what it claims."
ARD_murmansk_dockyard_sheds: "Murmansk Dockyard Sheds"
ARD_murmansk_dockyard_sheds_desc: "Repair sheds around Murmansk are guarded as a combined dockyard, railhead, and air-defense base for the Arctic route."
ARD_kola_denial_posts: "Kola Denial Posts"
ARD_kola_denial_posts_desc: "Small shore parties and field detachments turn the Kola approaches into a line of guarded roads, batteries, and fallback berths."
ARD_white_sea_observer_board: "White Sea Observer Board"
ARD_white_sea_observer_board_desc: "Foreign observers, convoy clerks, and port delegates are shown the guarded White Sea route that makes recognition more than a promise."
ARD_murmansk_port_records: "Murmansk Port Records"
ARD_murmansk_port_records_desc: "The directorate recopies harbor charters, fuel ledgers, convoy schedules, and guard rolls so outside officials cannot claim the northern ports have no civil authority."
ARD_kola_field_staff: "Kola Field Staff"
ARD_kola_field_staff_desc: "Naval infantry, railway guards, and battery officers receive a common staff map for the Kola approaches."
ARD_convoy_court_registers: "Convoy Court Registers"
ARD_convoy_court_registers_desc: "Port courts keep public registers for seizures, berths, arrests, fuel claims, and emergency passage so naval rule remains legible."
ARD_ice_watch_boards: "Ice Watch Boards"
ARD_ice_watch_boards_desc: "Ice watch boards join pilots, weather stations, harbor clerks, and patrol commanders into a practical authority over the route."
ARD_white_sea_customs: "White Sea Customs"
ARD_white_sea_customs_desc: "Customs and inspection posts give the directorate a controlled way to move cargo without surrendering the harbors."
ARD_naval_infantry_yards: "Naval Infantry Yards"
ARD_naval_infantry_yards_desc: "Sailors, shore police, and dock guards drill in protected yards before they are assigned to batteries, gates, or convoy escorts."
ARD_fuel_and_convoy_escorts: "Fuel and Convoy Escorts"
ARD_fuel_and_convoy_escorts_desc: "Fuel trains and convoy stores travel with guards, mechanics, signalmen, and clerks so the Arctic route is not stripped at the first checkpoint."
ARD_kola_battery_posts: "Kola Battery Posts"
ARD_kola_battery_posts_desc: "Coastal batteries and watch posts cover the inlets, roads, and berths most likely to carry raiders or an unwanted landing force."
ARD_murmansk_dockyard_contracts: "Murmansk Dockyard Contracts"
ARD_murmansk_dockyard_contracts_desc: "The directorate signs standing contracts with repair sheds that can fix hull plates, cranes, radios, rifles, and rail tools without waiting for distant ministries."
ARD_tundra_watch_posts: "Tundra Watch Posts"
ARD_tundra_watch_posts_desc: "Watch posts on roads, ridgelines, and frozen approaches give port guards time to seal records and call shore parties before a column arrives."
ARD_winter_convoy_columns: "Winter Convoy Columns"
ARD_winter_convoy_columns_desc: "Winter columns stock fuel, sledges, tools, signal gear, and guarded drivers for the roads and railheads that still function after the ice closes."
ARD_kandalaksha_rear_area: "Kandalaksha Rear Area"
ARD_kandalaksha_rear_area_desc: "Rear-area stores near Kandalaksha hold ammunition, medical crates, fuel pumps, and reserve guards away from the first line of panic."
ARD_foreign_fleet_letters: "Foreign Fleet Letters"
ARD_foreign_fleet_letters_desc: "Letters to foreign fleets, consulates, and convoy offices frame the directorate as a neutral route authority rather than a prize."
ARD_volunteer_port_schools: "Volunteer Port Schools"
ARD_volunteer_port_schools_desc: "Volunteers learn guard duty, fire control, harbor accounting, cold-weather signals, and civil procedure before receiving a rifle or a port seal."
ARD_white_sea_port_tolls: "White Sea Port Tolls"
ARD_white_sea_port_tolls_desc: "Modest tolls at White Sea ports pay for guards, fuel pumps, translators, and repair crews while keeping convoy traffic under directorate inspection."
ARD_league_convoy_bargain: "League Convoy Bargain"
ARD_league_convoy_bargain_desc: "The directorate offers the League a simple bargain: recognize the convoy route, defend it if Moscow attacks, and receive honest port ledgers in return."
ARD_hardline_against_fleet_commissars: "Hardline against Fleet Commissars"
ARD_hardline_against_fleet_commissars_desc: "The icebound admiralty orders every shore detachment to treat outside commissar commands as a direct attack on port neutrality."
ARD_directorate_staff_map: "Directorate Staff Map"
ARD_directorate_staff_map_desc: "A single staff map joins naval infantry yards, battery posts, customs houses, rear-area stores, and convoy routes into one defense plan."
ARD_port_neutrality_statute: "Port Neutrality Statute"
ARD_port_neutrality_statute_desc: "The directorate writes the port neutrality statute as if it must survive foreign inspection, League bargaining, and a Soviet return."
ARD_arctic_port_endurance: "Arctic Port Endurance"
ARD_arctic_port_endurance_desc: "The northern route turns records, dockyards, customs, convoy escorts, and guarded batteries into an authority that can survive a long collapse."
ARD_hidden_doctrine: "Sealed Radio Orders"
ARD_hidden_doctrine_desc: "Secret radio protocols define who can contact foreign fleets, redirect convoys, and deny a harbor in the final emergency."
ARD_extreme_gate: "When the Ice Closes"
ARD_extreme_gate_desc: "The directorate prepares for a collapse so deep that port neutrality becomes the only surviving law."
ARD_extreme_path: "Port Neutrality Mandate"
ARD_extreme_path_desc: "The ports, depots, radio rooms, convoys, and naval infantry are placed under a neutrality mandate enforced by armed guards."
ARD_endgame: "Endgame Direction"
ARD_endgame_desc: "The directorate chooses how the northern route will survive the final shape of the Soviet collapse."


chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.title.northern_lights_commune_signals: "Northern Lights Commune Signals"
chaosx.events_log.window.evolution_details.soviet_collapse_high_chaos.body.northern_lights_commune_signals: "Polar communes, naval stations, and weather laboratories answer the southern collapse by declaring that the livable future must be governed from the aurora line."
NLC: "Northern Lights Commune"
NLC_DEF: "the Northern Lights Commune"
NLC_ADJ: "Northern"
NLC_democratic: "Northern Lights Commune"
NLC_democratic_DEF: "the Northern Lights Commune"
NLC_democratic_ADJ: "Northern"
NLC_communism: "Northern Lights Commune"
NLC_communism_DEF: "the Northern Lights Commune"
NLC_communism_ADJ: "Northern"
NLC_fascism: "Polar Emergency Directorate"
NLC_fascism_DEF: "the Polar Emergency Directorate"
NLC_fascism_ADJ: "Polar"
NLC_neutrality: "Northern Lights Commune"
NLC_neutrality_DEF: "the Northern Lights Commune"
NLC_neutrality_ADJ: "Northern"
NLC_leader_desc: "The Aurora Survival Council is a compact of weather-station scientists, naval quartermasters, radio operators, and commune delegates who argue that the south has become strategically uninhabitable. Its authority rests on ration ledgers, sealed laboratories, ice patrols, and the promise that a society able to endure polar night can outlive every collapsing capital."
chaosx.nr5_custom.27.t: "The Northern Lights Commune Signals"
chaosx.nr5_custom.27.d: "Radio stations across the polar settlements repeat a calm message under the aurora: the south has lost command of the future. Naval detachments, weather laboratories, and survival communes have combined into the Northern Lights Commune, promising refuge, discipline, and a world after the capitals."
chaosx.nr5_custom.27.a: "The polar night has found a government."
NLC_soviet_collapse_focus_tree: "Northern Lights Commune"
NLC_soviet_collapse_focus_tree_desc: "The Northern Lights Commune tree follows polar survival councils through greenhouses, laboratories, sea lanes, Ice Watch patrols, weather-station diplomacy, and the World After the Capitals route."
nlc_polar_survival_commune: "Polar Survival Commune"
nlc_polar_survival_commune_desc: "Greenhouses, ration stores, ice roads, and station councils give the commune the material base to survive while southern authorities consume each other."
nlc_scientific_refuge_council: "Scientific Refuge Council"
nlc_scientific_refuge_council_desc: "Laboratories and weather stations become organs of government, turning scientific refuge into a northern political order."
nlc_world_after_capitals: "World After the Capitals"
nlc_world_after_capitals_desc: "The commune claims that governments built around old capitals have failed and that the next world must be planned from the places that endured collapse."
nlc_consolidate_claim: "Consolidate the Polar Claim"
nlc_consolidate_claim_desc: "Bind port committees, radio huts, and survival communes into one recognized northern authority."
nlc_mobilize_signature_forces: "Mobilize the Ice Watch"
nlc_mobilize_signature_forces_desc: "Turn local guards, naval ratings, and weather patrols into a defensive force suited to frozen roads and empty coasts."
nlc_push_extreme_route: "Draft the World After Capitals"
nlc_push_extreme_route_desc: "Codify the commune's extreme doctrine: the future belongs to the settlements that can survive without the old centers of power."
nlc_secure_polar_greenhouses: "Secure Polar Greenhouses"
nlc_secure_polar_greenhouses_desc: "Protect heated agriculture, seed stores, and ration depots from desperate requisition columns."
nlc_open_aurora_laboratories: "Open Aurora Laboratories"
nlc_open_aurora_laboratories_desc: "Put weather stations and research shelters under commune command before their instruments and staff are scattered."
nlc_chart_northern_sea_lanes: "Chart Northern Sea Lanes"
nlc_chart_northern_sea_lanes_desc: "Map convoy routes, ice windows, and emergency anchorages so the commune can move even when railways fail."
nlc_form_ice_watch_patrols: "Form Ice Watch Patrols"
nlc_form_ice_watch_patrols_desc: "Raise patrol detachments trained for polar night, sparse roads, and long-range station defense."
nlc_contact_league_weather_stations: "Contact League Weather Stations"
nlc_contact_league_weather_stations_desc: "Use meteorological and radio networks to negotiate with republics that still value practical survival over southern command fantasies."
nlc_declare_world_after_capitals: "Declare the World After Capitals"
nlc_declare_world_after_capitals_desc: "Announce that the commune's survival model is no longer a refuge plan but a template for a post-collapse international order."
NLC_birth: "Muster the Polar Commune"
NLC_birth_desc: "The first council gathers port committees, laboratory staffs, and survival settlements into one emergency authority."
NLC_first_guard: "Raise the First Ice Guard"
NLC_first_guard_desc: "The commune arms reliable crews who know the winter roads, frozen harbors, and silent stations."
NLC_stores: "Audit the Winter Stores"
NLC_stores_desc: "Food, coal, medicine, and instrument stores are counted before Moscow or another breakaway can seize them."
NLC_legitimacy: "Write the Aurora Charter"
NLC_legitimacy_desc: "The charter frames the commune as a lawful refuge rather than a temporary mutiny."
NLC_rival: "Name the Southern Failure"
NLC_rival_desc: "The council identifies the collapsing southern command structure as the danger the north must outlive."
NLC_doctrine: "Polar Defense Doctrine"
NLC_doctrine_desc: "Defensive planning is rebuilt around cold, distance, signal discipline, and controlled retreats."
NLC_economy: "Heated Workshop Economy"
NLC_economy_desc: "Small workshops, repair sheds, and greenhouse grids become the commune economy."
NLC_league: "Send League Weather Bulletins"
NLC_league_desc: "The commune offers reliable forecasts and polar routing to any republic willing to recognize its autonomy."
NLC_foreign: "Foreign Arctic Signals"
NLC_foreign_desc: "Distant fleets and embassies receive carefully screened transmissions from the northern stations."
NLC_inner_faction: "Balance Scientists and Quartermasters"
NLC_inner_faction_desc: "Laboratory councils and naval logisticians are forced into one governing rhythm."
NLC_special_arm: "Organize Ice Watch Companies"
NLC_special_arm_desc: "The Ice Watch becomes the commune's signature arm: small, mobile, disciplined, and hard to starve out."
NLC_ice_watch_school: "Ice Watch School"
NLC_ice_watch_school_desc: "Patrol leaders, radio operators, medics, and weather-station guards teach the Ice Watch how to close roads, mask stations, and keep columns alive in polar weather."
NLC_supply: "Northern Sea Supply Tables"
NLC_supply_desc: "Convoy tables and ice charts replace the southern requisition timetable."
NLC_enemy_front: "Hold the White Approaches"
NLC_enemy_front_desc: "The commune prepares every road, inlet, and station perimeter for a long defensive war."
NLC_civil_rule: "Station Council Courts"
NLC_civil_rule_desc: "Emergency justice moves through station councils instead of southern party offices."
NLC_station_mediation: "Station Mediation Boards"
NLC_station_mediation_desc: "Station councils, laboratory staffs, quartermasters, Ice Watch captains, and refugee delegates settle disputes before isolation turns them into private command."
NLC_winter_guarantees: "Winter Guarantee Statutes"
NLC_winter_guarantees_desc: "Written guarantees bind stores, radio schedules, convoy routes, refugee duties, and League promises into a northern order other powers can recognize."
NLC_propaganda: "Broadcast Under the Aurora"
NLC_propaganda_desc: "Radio operators turn the aurora line into a symbol of endurance and practical government."
NLC_settlement: "The Refuge Settlement"
NLC_settlement_desc: "The commune defines who may enter, how they are fed, and what duties refuge imposes."
NLC_radical_turn: "The Long Polar Mandate"
NLC_radical_turn_desc: "A quiet circle argues that survival itself gives the north the right to govern what remains."
NLC_war_plan: "Icebound War Plan"
NLC_war_plan_desc: "The general staff accepts that victory may mean outlasting stronger armies in worse weather."
NLC_industry_plan: "Workshop Survival Plan"
NLC_industry_plan_desc: "Every repair shop, generator, and fuel cache is tied to the defense economy."
NLC_diplomatic_plan: "The Northern Recognition Plan"
NLC_diplomatic_plan_desc: "Foreign contact is routed through weather, shipping, and refugee guarantees."
NLC_hidden_doctrine: "The Last Light Protocol"
NLC_hidden_doctrine_desc: "The commune drafts continuity rules for preserving command if every old capital goes dark."
NLC_extreme_gate: "Beyond the Failed Capitals"
NLC_extreme_gate_desc: "The commune opens the path from polar refuge to a doctrine of world government after collapse."
NLC_extreme_path: "Government from the Aurora Line"
NLC_extreme_path_desc: "The council commits to ruling from the margins, where endurance has replaced ideology as legitimacy."
NLC_endgame: "A World That Can Winter"
NLC_endgame_desc: "Ice Watch schools, winter guarantees, sealed protocols, guarded stores, and recognition channels turn the northern refuge into a model for every society that expects to outlive the old capitals."
NLC_aurora_council_records: "Aurora Council Records"
NLC_aurora_council_records_desc: "Radio logs, ration ledgers, laboratory rosters, and refugee rolls are filed under one council seal so the commune can prove that it governs more than a scattered refuge."
NLC_weather_station_staff: "Weather Station Staff"
NLC_weather_station_staff_desc: "Meteorologists, signal clerks, and station guards become a civil service that can read the sky, keep accounts, and speak to distant governments."
NLC_station_court_registers: "Station Court Registers"
NLC_station_court_registers_desc: "Small courts travel through radio rooms, port sheds, and settlement halls, turning emergency arbitration into a recognizable legal order."
NLC_greenhouse_boards: "Greenhouse Boards"
NLC_greenhouse_boards_desc: "Heated agriculture is put under elected boards that protect seed stores, ration work crews, and the workshops that keep the glass and pipes intact."
NLC_ice_road_customs: "Ice Road Customs"
NLC_ice_road_customs_desc: "Every winter road, convoy track, and emergency landing strip receives a customs book, making movement through the north a matter of law rather than scavenging."
NLC_ice_watch_training_yards: "Ice Watch Training Yards"
NLC_ice_watch_training_yards_desc: "Station yards train the Ice Watch in snow camouflage, relay discipline, wounded evacuation, and the quiet work of keeping isolated posts alive."
NLC_ration_and_signal_escorts: "Ration and Signal Escorts"
NLC_ration_and_signal_escorts_desc: "Escort parties guard radio batteries, medicine crates, field kitchens, and coded station mail along routes where one lost sled can silence a district."
NLC_station_battery_posts: "Station Battery Posts"
NLC_station_battery_posts_desc: "Small batteries and anti-air crews cover radio masts, greenhouse towns, port sheds, and the few road junctions that make northern defense possible."
NLC_heated_workshop_contracts: "Heated Workshop Contracts"
NLC_heated_workshop_contracts_desc: "The commune binds mechanics, generator crews, and greenhouse engineers to defense contracts that keep weapons, heaters, and convoys working through the cold."
NLC_tundra_watch_posts: "Tundra Watch Posts"
NLC_tundra_watch_posts_desc: "Far watch posts warn the commune before hostile columns, desperate refugees, or southern requisition parties reach the settled stations."
NLC_winter_road_columns: "Winter Road Columns"
NLC_winter_road_columns_desc: "Organized road columns carry guards, engineers, fuel, and spare radios between the stations without waiting for the southern timetable to recover."
NLC_apatity_rear_area: "Apatity Rear Area"
NLC_apatity_rear_area_desc: "The commune turns the Apatity approaches into a rear-area system of depots, repair shelters, signal rooms, and medical reserves."
NLC_foreign_science_letters: "Foreign Science Letters"
NLC_foreign_science_letters_desc: "The northern laboratories send weather records, polar medical notes, and shipping guarantees abroad, asking for recognition through practical use."
NLC_volunteer_station_schools: "Volunteer Station Schools"
NLC_volunteer_station_schools_desc: "Foreign volunteers and southern refugees are trained as station aides, medics, radio guards, and convoy clerks before they receive any authority."
NLC_ice_port_tolls: "Ice Port Tolls"
NLC_ice_port_tolls_desc: "Harbor committees collect tolls in fuel, tools, charts, and medical cargo, keeping foreign contact useful without surrendering the ports."
NLC_league_weather_bargain: "League Weather Bargain"
NLC_league_weather_bargain_desc: "The commune offers forecasts, convoy windows, and polar routing to the League in exchange for recognition, supplies, and a promise not to reduce the north to an outpost."
NLC_hardline_against_southern_commissars: "Hardline Against Southern Commissars"
NLC_hardline_against_southern_commissars_desc: "The radical council declares that no official who lost the capitals may command the northern stores, stations, or patrol routes."
NLC_commune_staff_map: "Commune Staff Map"
NLC_commune_staff_map_desc: "Ice Watch officers, station judges, workshop boards, and radio clerks draw one command map for the commune's dispersed settlements."
NLC_polar_neutrality_statute: "Polar Neutrality Statute"
NLC_polar_neutrality_statute_desc: "A formal neutrality statute shields the stations from sponsor ownership while keeping weather, port, and refugee guarantees open to recognized partners."
NLC_polar_commune_endurance: "Polar Commune Endurance"
NLC_polar_commune_endurance_desc: "The northern system proves it can defend its roads, feed its stations, keep its legal registers, and endure without becoming another southern capital."

IUL: "Idel-Ural League"
IUL_DEF: "the Idel-Ural League"
IUL_ADJ: "Idel-Ural"
IUL_leader_desc: "The Volga-Ural Federal Council governs through Tatar-Bashkir defense committees, rail authorities, workshop guards, and autonomy deputies, claiming that the Volga crossings and Ural approaches need a federal shield rather than another round of Moscow requisitions."
chaosx.nr5_custom.30.t: "Idel-Ural League Guards the Volga Corridor"
chaosx.nr5_custom.30.d: "Councils in Kazan, Ufa, Samara, and the Volga-Ural rail belt have declared an Idel-Ural League to defend local peoples, workshops, crossings, and railway junctions from Moscow requisitions and separatist chaos. Its proclamations speak of federal recognition, but every guarded bridge and stopped train makes the league look less like an autonomy committee and more like a corridor state."
chaosx.nr5_custom.30.a: "The Volga corridor has its own seal."
IUL_soviet_collapse_focus_tree: "Idel-Ural League Focus Tree"
IUL_soviet_collapse_focus_tree_desc: "The Idel-Ural League tree turns Volga crossings, Tatar-Bashkir defense committees, guarded workshops, Ural labor bargaining, federal recognition, and requisition-train blockades into a playable corridor authority."
iul_volga_ural_league: "Volga-Ural League"
iul_volga_ural_league_desc: "A federal league of Volga-Ural councils guards crossings, workshops, rail sidings, and local autonomy claims while the Soviet center breaks around it."
iul_tatar_bashkir_committees: "Tatar-Bashkir Defense Committees"
iul_tatar_bashkir_committees_desc: "Tatar, Bashkir, and mixed civic committees coordinate militias, river defenses, and workshop security without letting any one faction claim the league alone."
iul_federal_corridor_authority: "Federal Corridor Authority"
iul_federal_corridor_authority_desc: "The league recasts guarded crossings, rail controls, and requisition blockades as a sovereign mandate over the Volga-Ural corridor."
iul_consolidate_claim: "Consolidate Claim"
iul_consolidate_claim_desc: "Idel-Ural action shaped by Volga-Ural autonomy, guarded crossings, federal recognition, rail control, and Soviet crisis pressure."
iul_mobilize_signature_forces: "Mobilize Signature Forces"
iul_mobilize_signature_forces_desc: "Idel-Ural action shaped by river guards, defense committees, workshop militias, and Soviet crisis pressure."
iul_push_extreme_route: "Push Extreme Route"
iul_push_extreme_route_desc: "Idel-Ural action shaped by the League's mandate to turn autonomy defense into corridor sovereignty."
iul_guard_volga_crossings: "Guard the Volga Crossings"
iul_guard_volga_crossings_desc: "League guards secure bridges, ferry points, river approaches, and rail heads before Moscow requisition parties or rival separatists can sever the corridor."
iul_form_tatar_bashkir_defense_committees: "Form Tatar-Bashkir Defense Committees"
iul_form_tatar_bashkir_defense_committees_desc: "Tatar, Bashkir, and mixed civic committees organize militias that defend local autonomy without surrendering the league to one national program."
iul_secure_industrial_workshops: "Secure Industrial Workshops"
iul_secure_industrial_workshops_desc: "Workshop councils and rail guards inventory machine tools, repair shops, arms stores, and depots before outside ministries can empty them."
iul_bargain_with_ural_workers: "Bargain with Ural Workers"
iul_bargain_with_ural_workers_desc: "League envoys bargain with Ural workers and factory committees for shipments, repair crews, and a shared defense of the corridor."
iul_request_federal_recognition: "Request Federal Recognition"
iul_request_federal_recognition_desc: "The council asks republics, workers' authorities, and League diplomats to recognize Idel-Ural as a federal autonomy bloc rather than a temporary rail committee."
iul_block_moscow_requisition_trains: "Block Moscow's Requisition Trains"
iul_block_moscow_requisition_trains_desc: "Rail committees halt requisition trains until Moscow accepts that Volga-Ural workshops and crossings answer to the League."
IUL_kazan_emergency_registers: "Kazan Emergency Registers"
IUL_kazan_emergency_registers_desc: "Kazan registers record which councils, ferries, workshops, and militia offices answer to the League before another authority rewrites the corridor."
IUL_ufa_field_commissars: "Ufa Field Commissars"
IUL_ufa_field_commissars_desc: "Ufa field commissars connect Bashkir guards, workshop deputies, and bridge detachments without letting the corridor become a single officer's command."
IUL_samara_crossing_ledger: "Samara Crossing Ledger"
IUL_samara_crossing_ledger_desc: "The Samara crossing ledger counts ferries, sidings, rolling stock, and bridge tools so the Volga line cannot be stripped by requisition columns."
IUL_tatar_bashkir_courier_board: "Tatar-Bashkir Courier Board"
IUL_tatar_bashkir_courier_board_desc: "Courier riders and rail messengers carry orders between Tatar committees, Bashkir councils, and mixed towns before panic can break the federal chain."
IUL_bolghar_memory_committee: "Bolghar Memory Committee"
IUL_bolghar_memory_committee_desc: "A memory committee turns Volga Bulgar, Tatar, Bashkir, and civic claims into a guarded political language the League can use without surrendering to myth."
IUL_kama_workshop_trust: "Kama Workshop Trust"
IUL_kama_workshop_trust_desc: "Kama workshops receive a trust charter that keeps repair benches, foundry teams, and rail tools in federal hands."
IUL_volga_fortified_crossings: "Volga Fortified Crossings"
IUL_volga_fortified_crossings_desc: "Bridgeheads, ferry landings, and rail approaches are fortified so the League can hold the corridor even when every army wants its trains."
IUL_bashkir_cavalry_roads: "Bashkir Cavalry Roads"
IUL_bashkir_cavalry_roads_desc: "Bashkir road guards and mounted patrols keep the southern approaches open for federal couriers, repair columns, and reserve camps."
IUL_oilfield_security_cordon: "Oilfield Security Cordon"
IUL_oilfield_security_cordon_desc: "Security posts around oil stores and workshop fuel yards stop both Moscow requisitions and foreign envoys from turning the League into a supply office."
IUL_river_port_customs_board: "River-Port Customs Board"
IUL_river_port_customs_board_desc: "Customs boards at river ports and crossings make recognition, transit papers, and League dues part of the same federal corridor law."
IUL_kazan_ufa_signal_line: "Kazan-Ufa Signal Line"
IUL_kazan_ufa_signal_line_desc: "A signal line between Kazan, Ufa, and the corridor towns keeps federal messages moving when telegraph clerks receive rival orders."
IUL_no_requisition_without_federal_vote: "No Requisition Without Federal Vote"
IUL_no_requisition_without_federal_vote_desc: "The hard corridor faction declares that no train, ferry, fuel store, or workshop convoy leaves without a federal vote."
IUL_rail_and_river_patrols: "Rail and River Patrols"
IUL_rail_and_river_patrols_desc: "Patrols follow the rail embankments and river landings, protecting the corridor from raids, seizure orders, and sudden declarations."
IUL_volga_trade_letters: "Volga Trade Letters"
IUL_volga_trade_letters_desc: "Letters to neighboring republics describe the League as the authority that can keep Volga trade moving without surrendering the crossings."
IUL_league_corridor_bargain: "League Corridor Bargain"
IUL_league_corridor_bargain_desc: "The League offers guarded transit, workshops, and fuel discipline in exchange for federal recognition and anti-puppet guarantees."
IUL_bashkir_rear_camps: "Bashkir Rear Camps"
IUL_bashkir_rear_camps_desc: "Rear camps on the Bashkir roads shelter patrols, repair crews, and field stores for a long fight over the Volga-Ural line."
IUL_corridor_staff_map: "Corridor Staff Map"
IUL_corridor_staff_map_desc: "A sealed staff map turns bridges, ferries, rail yards, workshops, and reserve roads into one emergency command plan."
IUL_bolghar_question: "The Bolghar Question"
IUL_bolghar_question_desc: "Federal deputies decide how far old Volga names may shape League legitimacy without letting ancient claims swallow the living corridor."
IUL_federal_corridor_compact: "Federal Corridor Compact"
IUL_federal_corridor_compact_desc: "A compact binds trade letters, river customs, League observers, and Bolghar memory into terms for a recognized Volga-Ural federation."
IUL_volga_ural_endurance: "Volga-Ural Endurance"
IUL_volga_ural_endurance_desc: "Endurance plans tie the workshops, crossings, rear camps, signal lines, and federal deputies into a corridor authority built to outlast the collapse."
IUL_birth: "Raise the Volga-Ural League"
IUL_birth_desc: "Kazan, Ufa, Samara, and corridor committees form a league to keep Volga-Ural autonomy alive while the center fractures."
IUL_first_guard: "Muster the Crossing Guards"
IUL_first_guard_desc: "Bridge guards, ferry watchmen, and rail detachments become the first shield around the Volga corridor."
IUL_stores: "Inventory Corridor Stores"
IUL_stores_desc: "The League inventories workshops, depots, rolling stock, fuel, and grain before requisition orders strip the corridor bare."
IUL_legitimacy: "Issue the Federal Autonomy Charter"
IUL_legitimacy_desc: "A charter presents the League as a federal autonomy authority defending Volga-Ural peoples and industry."
IUL_rival: "Name the Requisition Columns"
IUL_rival_desc: "Moscow envoys, breakaway quartermasters, separatist militias, and rail claimants are named before they claim the corridor."
IUL_doctrine: "Write River-Rail Defense Doctrine"
IUL_doctrine_desc: "Defense doctrine treats crossings, rail junctions, workshops, and river approaches as one political front."
IUL_economy: "Workshops beside the River"
IUL_economy_desc: "Workshops, river ports, repair depots, and rail sheds are folded into one corridor ledger."
IUL_league: "Bargain with the League"
IUL_league_desc: "Foreign and republican contacts are useful only if they accept Volga-Ural autonomy rather than another depot claim."
IUL_foreign: "Screen Corridor Envoys"
IUL_foreign_desc: "Envoys seeking rail access, workshops, or recognition are screened through the Federal Council."
IUL_inner_faction: "Balance National and Civic Claims"
IUL_inner_faction_desc: "Tatar, Bashkir, Russian, German, worker, and rail delegates are forced into one uneasy federal majority."
IUL_special_arm: "Arm the Defense Committees"
IUL_special_arm_desc: "Defense committees receive rifles, repair crews, bridge maps, and rail signals to defend the corridor."
IUL_supply: "Hold the Volga Junctions"
IUL_supply_desc: "Junctions and crossings are guarded as the hinge between autonomy politics and practical survival."
IUL_enemy_front: "Prepare the Requisition Front"
IUL_enemy_front_desc: "The League prepares for Moscow columns, breakaway seizures, and desperate commanders who see the corridor only as supply."
IUL_civil_rule: "Protect Federal Council Authority"
IUL_civil_rule_desc: "Council authority is protected so the League remains a civic autonomy regime rather than a pure guard command."
IUL_propaganda: "Print the Corridor Program"
IUL_propaganda_desc: "Proclamations present Idel-Ural as federal autonomy, river defense, workshop discipline, and survival through corridor law."
IUL_settlement: "Draft an Autonomy Settlement"
IUL_settlement_desc: "Settlement terms define how Moscow and neighboring authorities may cross or draw supplies without claiming command."
IUL_radical_turn: "The Hard Corridor Faction"
IUL_radical_turn_desc: "A hard corridor faction demands stricter train controls, deeper committee command, and no concessions to requisition boards."
IUL_war_plan: "Campaign along the Volga Line"
IUL_war_plan_desc: "Campaign plans treat crossings, junctions, depots, and workshops as one defended Volga-Ural front."
IUL_industry_plan: "Permanent Workshop Councils"
IUL_industry_plan_desc: "Permanent workshop councils give rail guards, engineers, and federal deputies enough structure to keep production alive."
IUL_diplomatic_plan: "Recognition through the Corridor"
IUL_diplomatic_plan_desc: "Recognition work turns guarded crossings, stable workshops, and controlled rail access into a case for autonomy."
IUL_kazan_ufa_workshop_cordon: "Kazan-Ufa Workshop Cordon"
IUL_kazan_ufa_workshop_cordon_desc: "Workshop guards, rail police, and federal deputies bind Kazan and Ufa supply rooms into one guarded industrial cordon."
IUL_orenburg_approach_posts: "Orenburg Approach Posts"
IUL_orenburg_approach_posts_desc: "Southern posts watch the Orenburg approaches so requisition columns and steppe raiders cannot open the corridor from behind."
IUL_federal_congress_missions: "Federal Congress Missions"
IUL_federal_congress_missions_desc: "Delegates carry the corridor charter to neighboring republics, worker boards, and League rooms where recognition can become a federal guarantee."
IUL_hidden_doctrine: "The Sealed Corridor Statutes"
IUL_hidden_doctrine_desc: "Sealed statutes prepare emergency powers for the day ordinary federal bargaining cannot protect the corridor."
IUL_extreme_gate: "Survive into the Endgame"
IUL_extreme_gate_desc: "The Idel-Ural League crosses from autonomy defense into a total mandate over every crossing, workshop, and train."
IUL_extreme_path: "Federal Corridor Mandate"
IUL_extreme_path_desc: "The hard corridor faction recasts survival as a league-wide mandate that accepts no requisition train and no passive junction."
IUL_endgame: "Endgame Direction"
IUL_endgame_desc: "The Idel-Ural League aims to leave the collapse with the crossings guarded, workshops secured, and federal recognition accepted."
IUL_democratic: "Idel-Ural Federal Congress"
IUL_democratic_DEF: "the Idel-Ural Federal Congress"
IUL_democratic_ADJ: "Idel-Ural Federal"
