BAC: "Birobidzhan Autonomous Commune"
BAC_DEF: "the Birobidzhan Autonomous Commune"
BAC_ADJ: "Birobidzhan"
BAC_democratic: "Birobidzhan Civic Commune"
BAC_democratic_DEF: "the Birobidzhan Civic Commune"
BAC_democratic_ADJ: "Birobidzhan"
BAC_communism: "Birobidzhan Autonomous Commune"
BAC_communism_DEF: "the Birobidzhan Autonomous Commune"
BAC_communism_ADJ: "Birobidzhan"
BAC_fascism: "Amur Border Directorate"
BAC_fascism_DEF: "the Amur Border Directorate"
BAC_fascism_ADJ: "Amur"
BAC_neutrality: "Birobidzhan Autonomous Commune"
BAC_neutrality_DEF: "the Birobidzhan Autonomous Commune"
BAC_neutrality_ADJ: "Birobidzhan"
BAC_leader_desc: "The Settlement Defense Council speaks for the Birobidzhan settlements, the refugee committees, and the archive keepers who refuse to wait for orders from Moscow or from Far Eastern officers."
chaosx.nr5_custom.22.t: "Birobidzhan Declares an Autonomous Commune"
chaosx.nr5_custom.22.d: "Settlement committees in Birobidzhan have formed an autonomous commune around food stores, archives, and a defensive militia. The council asks for relief and recognition while warning that forced relocation orders will be refused."
chaosx.nr5_custom.22.a: "The settlements will not move quietly."
BAC_soviet_collapse_focus_tree: "Birobidzhan Autonomous Commune Focus Tree"
BAC_soviet_collapse_focus_tree_desc: "The Birobidzhan Autonomous Commune tree turns settlement defense, refugee administration, humanitarian petitions, archive evacuation, and Far Eastern bargaining into a playable collapse authority."
bac_settlement_defense_committees: "Settlement Defense Committees"
bac_settlement_defense_committees_desc: "Local defense committees guard the settlements, food stores, archives, and river routes that keep Birobidzhan alive."
bac_refugee_archive_tensions: "Refugee and Archive Tensions"
bac_refugee_archive_tensions_desc: "Refugee delegates, archive keepers, local cadres, and militia officers all claim a voice in the commune, and none can be ignored safely."
bac_autonomous_commune_mandate: "Autonomous Commune Mandate"
bac_autonomous_commune_mandate_desc: "Emergency statutes place every settlement, archive, convoy, and militia guard under the authority of the commune."
bac_consolidate_claim: "Consolidate the Commune Charter"
bac_consolidate_claim_desc: "Spend political and command authority to make the Birobidzhan charter harder for outside powers to dismiss."
bac_mobilize_signature_forces: "Mobilize Settlement Militia"
bac_mobilize_signature_forces_desc: "Spend political and command authority to raise the local militia around defended settlements and evacuation routes."
bac_push_extreme_route: "Empower the Archive Mandate"
bac_push_extreme_route_desc: "Spend political and command authority to place Birobidzhan under a harsher emergency mandate."
bac_organize_settlement_defense: "Organize Settlement Defense"
bac_organize_settlement_defense_desc: "Build guard rosters, warning posts, and fallback routes for the settlements before outside forces decide their fate."
bac_petition_foreign_jewish_organizations: "Petition Foreign Jewish Organizations"
bac_petition_foreign_jewish_organizations_desc: "Send appeals abroad for relief, observers, and public attention before Birobidzhan becomes an easy footnote."
bac_evacuate_archives: "Evacuate the Archives"
bac_evacuate_archives_desc: "Move records, ledgers, and cultural collections into defended stores before they can be seized or destroyed."
bac_bargain_with_far_eastern_republic: "Bargain with the Far Eastern Republic"
bac_bargain_with_far_eastern_republic_desc: "Offer limited cooperation to Far Eastern neighbors without surrendering the commune charter."
bac_request_food_and_medicine: "Request Food and Medicine"
bac_request_food_and_medicine_desc: "Turn humanitarian appeals into practical shipments of food, medicine, and field supplies."
bac_refuse_forced_relocation_orders: "Refuse Forced Relocation Orders"
bac_refuse_forced_relocation_orders_desc: "Reject outside relocation orders and bind the militia to the defense of the settlements."
BAC_birth: "Form the Settlement Defense Council"
BAC_birth_desc: "Birobidzhan organizes a civilian defense council to keep the settlements, archives, and food stores alive while distant authorities argue over orders."
BAC_first_guard: "Muster Settlement Guards"
BAC_first_guard_desc: "Local guards take responsibility for railway stops, farms, storehouses, and river crossings before outside troops can dictate terms."
BAC_stores: "Inventory Food and Medicine"
BAC_stores_desc: "A full inventory of grain, medicine, tools, and fuel gives the commune a realistic map of what can be defended and what must be requested."
BAC_legitimacy: "Issue the Commune Charter"
BAC_legitimacy_desc: "The council publishes a charter that frames autonomy as survival rather than rebellion."
BAC_rival: "Name the Relocation Boards"
BAC_rival_desc: "Refugee delegates, local cadres, and settlement committees receive defined seats before suspicion tears the administration apart."
BAC_doctrine: "Write Defensive Militia Rules"
BAC_doctrine_desc: "Militia officers prepare rules for defense in depth, evacuation corridors, and restrained use of the limited weapons available."
BAC_economy: "River Farms and Workshops"
BAC_economy_desc: "Workshops, farms, and river supply points are bound into a modest economy built for endurance."
BAC_league: "Petition the League"
BAC_league_desc: "The commune asks foreign observers to treat Birobidzhan as a humanitarian emergency with political consequences."
BAC_foreign: "Screen Humanitarian Envoys"
BAC_foreign_desc: "Aid missions are welcomed, but their escorts, papers, and promises are checked before they enter the settlements."
BAC_inner_faction: "Balance Refugees and Cadres"
BAC_inner_faction_desc: "The council balances desperate arrivals, older settlers, and party officials who still believe Moscow will return with binding orders."
BAC_special_arm: "Arm the Local Militia"
BAC_special_arm_desc: "The best rifles and ammunition are issued to a militia meant to delay attackers long enough for evacuation and relief."
BAC_supply: "Protect the Archive Stores"
BAC_supply_desc: "Archive rooms and supply rooms receive the same guards, because the commune cannot afford to lose either memory or bread."
BAC_enemy_front: "Prepare the Border-Post Front"
BAC_enemy_front_desc: "The border posts are mapped as warning lines, not trophies, and their garrisons are ordered to report before they fight."
BAC_civil_rule: "Keep Settlement Law"
BAC_civil_rule_desc: "Civil law remains visible in the settlements so the defense regime does not become another occupation."
BAC_propaganda: "Print the Commune Bulletin"
BAC_propaganda_desc: "Small bulletins explain ration rules, evacuation routes, and the claim that Birobidzhan speaks for its own people."
BAC_settlement: "Draft the Far Eastern Bargain"
BAC_settlement_desc: "The council prepares terms for Far Eastern neighbors without surrendering the settlement charter."
BAC_radical_turn: "The Hard Archive Faction"
BAC_radical_turn_desc: "A hard faction argues that the archive, the militia, and the relief rolls must override every outside order."
BAC_war_plan: "Defend the River Settlements"
BAC_war_plan_desc: "Defense plans focus on delaying actions around the river settlements and the safe movement of civilians."
BAC_industry_plan: "Permanent Commune Workshops"
BAC_industry_plan_desc: "Temporary repair shops are reorganized as a permanent industrial base for tools, carts, rifles, and field kitchens."
BAC_diplomatic_plan: "Recognition through Relief"
BAC_diplomatic_plan_desc: "Diplomacy is tied to relief work so every shipment also proves that the commune can govern responsibly."
BAC_birobidzhan_archive_workshops: "Birobidzhan Archive Workshops"
BAC_birobidzhan_archive_workshops_desc: "Archive clerks, repair crews, and settlement guards turn the Birobidzhan workshops into a protected base for tools, relief wagons, and field kitchens."
BAC_amur_relief_posts: "Amur Relief Posts"
BAC_amur_relief_posts_desc: "Relief posts along the Amur approaches shelter civilians, watch the crossings, and keep militia detachments close enough to delay raiders."
BAC_observer_relief_conference: "Observer Relief Conference"
BAC_observer_relief_conference_desc: "Foreign observers, Far Eastern neighbors, and relief committees are shown the rolls, kitchens, and guarded routes that make recognition practical."
BAC_hidden_doctrine: "The Sealed Archive Statutes"
BAC_hidden_doctrine_desc: "Secret statutes define who can move records, issue evacuation orders, and keep the commune alive if the council is scattered."
BAC_extreme_gate: "Survive into the Endgame"
BAC_extreme_gate_desc: "Birobidzhan prepares for a collapse so deep that survival itself becomes the only constitutional principle."
BAC_extreme_path: "Autonomous Commune Mandate"
BAC_extreme_path_desc: "The commune claims emergency authority over every settlement, archive, convoy, and militia unit under its protection."
BAC_endgame: "Endgame Direction"
BAC_endgame_desc: "The council chooses how the commune will carry its charter through the final shape of the Soviet collapse."

